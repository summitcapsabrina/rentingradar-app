// Merge all lessons from one chapter into another, then remove the source
// chapter. Lessons are appended to the bottom of the destination chapter.
function _teMergeChapterInto(fromIdx, toIdx){
  if(fromIdx === toIdx) return; // no-op (user re-selected the current chapter)
  if(!_teState.chapters[fromIdx] || !_teState.chapters[toIdx]){ _teRender(); return; }
  const fromTitle = _teState.chapters[fromIdx].title || '(untitled)';
  const toTitle = _teState.chapters[toIdx].title || '(untitled)';
  showAppConfirm('Merge all lessons from "' + esc(fromTitle) + '" into "' + esc(toTitle) + '"? The "' + esc(fromTitle) + '" chapter will be removed.', {
    title: 'Merge Chapters',
    icon: '🔀',
    confirmText: 'Merge',
    cancelText: 'Cancel',
    confirmClass: 'btn-primary',
    onConfirm: () => {
      _teMutate(st => {
        // Reassign every step that lived in fromIdx to live in toIdx
        st.steps.forEach(s => { if(s.chapter === fromIdx) s.chapter = toIdx; });
        // Remove the source chapter
        st.chapters.splice(fromIdx, 1);
        // Decrement every step.chapter that was greater than fromIdx (since
        // we just removed an entry from the chapters array)
        st.steps.forEach(s => { if(s.chapter > fromIdx) s.chapter--; });
        _teRecomputeChapterSteps(st);
      });
      _teSelectedStep = -1;
      _teRender();
    },
    onCancel: () => {
      // User cancelled — re-render so the dropdown reverts to current
      _teRender();
    }
  });
}

function _teEditChapterTitle(ci, val){
  // Don't push history on every keystroke — coalesce. And don't re-render
  // mid-typing or we'll steal focus from the input.
  _teState.chapters[ci].title = val;
  if(!_teEditChapterTitle._pending){
    _teEditChapterTitle._pending = true;
    setTimeout(() => {
      _teEditChapterTitle._pending = false;
      _tePushHistory();
      const active = document.activeElement;
      const isStillTyping = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA');
      if(!isStillTyping) _teRender();
      else _teRefreshToolbarDirty();
    }, 800);
  }
}
function _teMoveChapter(ci, dir){
  const ni = ci + dir;
  if(ni < 0 || ni >= _teState.chapters.length) return;
  _teMutate(st => {
    const tmp = st.chapters[ci]; st.chapters[ci] = st.chapters[ni]; st.chapters[ni] = tmp;
    // Reindex step.chapter references
    st.steps.forEach(s => {
      if(s.chapter === ci) s.chapter = ni;
      else if(s.chapter === ni) s.chapter = ci;
    });
  });
}
function _teDeleteChapter(ci){
  const ch = _teState.chapters[ci];
  const chTitle = (ch && ch.title) || '(untitled)';
  const lessonCount = ((ch && ch.steps) || []).length;
  showAppConfirm('Delete the chapter "' + esc(chTitle) + '" and all ' + lessonCount + ' of its lesson' + (lessonCount===1?'':'s') + '? This cannot be undone (use Undo if you change your mind before saving).', {
    title: 'Delete Chapter',
    icon: '🗑️',
    confirmText: 'Delete',
    cancelText: 'Cancel',
    confirmClass: 'btn-primary',
    onConfirm: () => {
      _teMutate(st => {
        const removeIdxs = (st.chapters[ci].steps || []).slice().sort((a,b)=>b-a);
        removeIdxs.forEach(idx => st.steps.splice(idx, 1));
        st.chapters.splice(ci, 1);
        _teRecomputeChapterSteps(st);
        st.steps.forEach(s => { if(s.chapter > ci) s.chapter--; else if(s.chapter === ci) s.chapter = Math.max(0, ci-1); });
        _teRecomputeChapterSteps(st);
      });
      _teSelectedStep = -1;
      _teRender();
    }
  });
}

function _teRecomputeChapterSteps(st){
  st.chapters.forEach((ch, ci) => { ch.steps = []; });
  st.steps.forEach((s, si) => {
    if(s.chapter >= 0 && s.chapter < st.chapters.length){
      st.chapters[s.chapter].steps.push(si);
    }
  });
}

// Merge chapters that share the same (case-insensitive, trimmed) title.
// Keeps the first occurrence's tier; remaps every step's `chapter` index to
// point at the surviving chapter; rebuilds chapters[].steps from scratch.
function _teConsolidateChapters(st){
  if(!st || !Array.isArray(st.chapters) || !Array.isArray(st.steps)) return;
  const seen = {}; // normalizedTitle -> new index
  const newChapters = [];
  const remap = {}; // oldIndex -> newIndex
  let beforeCount = st.chapters.length;
  st.chapters.forEach((ch, oldIdx) => {
    // Aggressively normalize: trim, lowercase, collapse whitespace, strip
    // surrounding punctuation. Empty titles all collapse to a single
    // "Untitled" bucket so they don't pollute the list.
    let raw = String(ch.title||'').trim();
    let key = raw.toLowerCase().replace(/\s+/g,' ').replace(/^[\s\-_,.;:]+|[\s\-_,.;:]+$/g,'');
    if(!key) key = '__untitled__';
    if(key in seen){
      remap[oldIdx] = seen[key];
    } else {
      const newIdx = newChapters.length;
      seen[key] = newIdx;
      remap[oldIdx] = newIdx;
      const displayTitle = raw || 'Untitled Chapter';
      newChapters.push({ title: displayTitle, tier: ch.tier || 'free', steps: [] });
    }
  });
  st.steps.forEach(s => {
    const oldCh = (typeof s.chapter === 'number') ? s.chapter : 0;
    s.chapter = (oldCh in remap) ? remap[oldCh] : 0;
  });
  st.chapters = newChapters;
  _teRecomputeChapterSteps(st);
  if(newChapters.length !== beforeCount){
    console.log('[TutEditor] Consolidated', beforeCount, '→', newChapters.length, 'chapters');
  }
}

function _teAddStep(ci){
  _teMutate(st => {
    const newStep = { chapter:ci, image:'', title:'New Lesson', desc:'', highlight:null, tier: (st.chapters[ci] && st.chapters[ci].tier) || 'free' };
    st.steps.push(newStep);
    const newIdx = st.steps.length - 1;
    if(!st.chapters[ci].steps) st.chapters[ci].steps = [];
    st.chapters[ci].steps.push(newIdx);
  });
  _teSelectedStep = _teState.steps.length - 1;
  _teRender();
}

function _teSelectStep(si){
  _teSelectedStep = si;
  _teRender();
}

function _teEditStepField(si, field, val){
  if(!_teState.steps[si]) return;
  _teState.steps[si][field] = val;
  // Coalesce text-input history. Do NOT re-render on every keystroke —
  // a re-render rebuilds the textarea/input DOM and yanks focus away,
  // making it impossible to type more than one character at a time.
  if(field === 'title' || field === 'desc'){
    if(!_teEditStepField._pending) _teEditStepField._pending = {};
    if(!_teEditStepField._pending[si+'_'+field]){
      _teEditStepField._pending[si+'_'+field] = true;
      setTimeout(() => {
        _teEditStepField._pending[si+'_'+field] = false;
        _tePushHistory();
        // Only render if user is no longer focused on this field, to avoid
        // stealing focus mid-typing.
        const active = document.activeElement;
        const isStillTyping = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA');
        if(!isStillTyping) _teRender();
        else _teRefreshToolbarDirty();
      }, 800);
    }
  } else {
    _teMutate(()=>{});
  }
}

function _teRefreshToolbarDirty(){
  // Update only the Save / Publish button states without re-rendering the
  // whole editor (which would steal focus from the textarea/input the user
  // is typing in). Falls back to a full render if buttons aren't found.
  try {
    const dirty = _teIsDirty();
    const unpub = _teHasUnpublished();
    const btns = document.querySelectorAll('#teRoot button');
    btns.forEach(b => {
      const t = (b.textContent||'').trim();
      if(t.indexOf('Save Draft') !== -1){
        b.disabled = !dirty;
        b.style.background = dirty ? '#f59e0b' : 'transparent';
        b.style.color = dirty ? '#000' : 'var(--text2)';
        b.style.borderColor = dirty ? '#f59e0b' : 'var(--border)';
        b.style.cursor = dirty ? 'pointer' : 'not-allowed';
      } else if(t.indexOf('Publish') !== -1){
        b.disabled = !unpub;
        b.style.background = unpub ? 'var(--primary)' : 'rgba(99,129,250,.18)';
        b.style.cursor = unpub ? 'pointer' : 'not-allowed';
        b.style.opacity = unpub ? '1' : '.5';
      }
    });
  } catch(e){ /* swallow */ }
}

function _teMoveStepInChapter(ci, posInChapter, dir){
  _teMutate(st => {
    const arr = st.chapters[ci].steps;
    const ni = posInChapter + dir;
    if(ni < 0 || ni >= arr.length) return;
    const tmp = arr[posInChapter]; arr[posInChapter] = arr[ni]; arr[ni] = tmp;
  });
}

function _teMoveStepToChapter(si, newChapter){
  _teMutate(st => {
    const oldCh = st.steps[si].chapter;
    st.steps[si].chapter = newChapter;
    if(st.chapters[oldCh]) st.chapters[oldCh].steps = (st.chapters[oldCh].steps||[]).filter(x => x !== si);
    if(st.chapters[newChapter]){
      if(!st.chapters[newChapter].steps) st.chapters[newChapter].steps = [];
      st.chapters[newChapter].steps.push(si);
    }
  });
}

function _teDeleteStep(si){
  const s = _teState.steps[si];
  const lessonTitle = (s && s.title) || '(untitled)';
  showAppConfirm('Delete the lesson "' + esc(lessonTitle) + '"? You can use Undo to bring it back if you change your mind before saving.', {
    title: 'Delete Lesson',
    icon: '🗑️',
    confirmText: 'Delete',
    cancelText: 'Cancel',
    confirmClass: 'btn-primary',
    onConfirm: () => {
      _teMutate(st => {
        st.steps.splice(si, 1);
        _teRecomputeChapterSteps(st);
      });
      _teSelectedStep = -1;
      _teRender();
    }
  });
}

function _teClearHighlight(si){
  _teMutate(st => { st.steps[si].highlight = null; });
}

async function _teUploadScreenshot(input, si){
  const file = input.files && input.files[0];
  if(!file) return;
  if(!file.type.startsWith('image/')){ showToast('Please select an image file', 'error', 3000); return; }
  if(file.size > 5 * 1024 * 1024){ showToast('Image must be under 5MB', 'error', 3000); return; }
  if(typeof firebase.storage !== 'function'){ showToast('Storage SDK not loaded', 'error', 3000); return; }
  try {
    showToast('Uploading screenshot…', 'info', 2000);
    const ext = (file.name.split('.').pop() || 'png').toLowerCase();
    const id = 'tut_' + Date.now() + '_' + Math.random().toString(36).slice(2,9);
    const ref = firebase.storage().ref('tutorialScreenshots/' + id + '.' + ext);
    await ref.put(file);
    const url = await ref.getDownloadURL();
    _teMutate(st => { st.steps[si].image = url; });
    showToast('Screenshot uploaded', 'success', 2000);
  } catch(err){
    console.error('Upload failed:', err);
    showToast('Upload failed: ' + (err.message||err), 'error', 4000);
  }
}

function _teWireHighlightDrag(){
  const wrap = document.getElementById('teImgWrap');
  if(!wrap) return;
  let dragRect = null;
  wrap.addEventListener('mousedown', function(e){
    if(e.button !== 0) return;
    const rect = wrap.getBoundingClientRect();
    const startX = ((e.clientX - rect.left) / rect.width) * 100;
    const startY = ((e.clientY - rect.top) / rect.height) * 100;
    let endX = startX, endY = startY;
    // Remove any existing drag preview
    const oldPrev = wrap.querySelector('.te-drag-preview');
    if(oldPrev) oldPrev.remove();
    const preview = document.createElement('div');
    preview.className = 'te-drag-preview';
    preview.style.cssText = 'position:absolute;border:2px dashed #6381fa;background:rgba(99,129,250,.12);pointer-events:none;border-radius:4px';
    wrap.appendChild(preview);
    function move(ev){
      const r = wrap.getBoundingClientRect();
      endX = Math.max(0, Math.min(100, ((ev.clientX - r.left) / r.width) * 100));
      endY = Math.max(0, Math.min(100, ((ev.clientY - r.top) / r.height) * 100));
      const x = Math.min(startX, endX), y = Math.min(startY, endY);
      const w = Math.abs(endX - startX), hh = Math.abs(endY - startY);
      preview.style.left = x + '%';
      preview.style.top = y + '%';
      preview.style.width = w + '%';
      preview.style.height = hh + '%';
    }
    function up(){
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
      const x = Math.min(startX, endX), y = Math.min(startY, endY);
      const w = Math.abs(endX - startX), hh = Math.abs(endY - startY);
      if(w < 1.5 || hh < 1.5){
        preview.remove();
        return;
      }
      _teMutate(st => {
        st.steps[_teSelectedStep].highlight = { x: x, y: y, w: w, h: hh };
      });
    }
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
    e.preventDefault();
  });
}

window.addEventListener('beforeunload', function(e){
  if(_teIsDirty()){
    e.preventDefault();
    e.returnValue = 'You have unsaved changes in the Tutorial Editor.';
    return e.returnValue;
  }
});

// ── Tutorial Update Notification System ──
const TUTORIAL_TOTAL_STEPS = 27;
let _tutUpdateNotifications = [];

function _tutLoadUpdateNotifs(){
  try { _tutUpdateNotifications = JSON.parse(localStorage.getItem('rr_tut_update_notifs')||'[]'); } catch(e){ _tutUpdateNotifications=[]; }
}
function _tutSaveUpdateNotifs(){
  try { localStorage.setItem('rr_tut_update_notifs', JSON.stringify(_tutUpdateNotifications)); } catch(e){}
}

function checkTutorialUpdates(){
  loadSettingsPrefs();
  if(settingsPrefs.tutorialUpdateNotifs === false) return;
  _tutLoadUpdateNotifs();
  _tutLoadSeen();
  // Only notify users who previously completed the tutorial
  if(!_tut.seen.slideshow) return;
  const prevTotal = _tut.seen.tutTotal || _tut.seen.tutCompletedCount || 0;
  if(prevTotal <= 0) return;
  if(TUTORIAL_TOTAL_STEPS <= prevTotal) return;
  // Check if we already created a notification for this total
  const existing = _tutUpdateNotifications.find(n => n.newTotal === TUTORIAL_TOTAL_STEPS);
  if(existing) return;
  // New lessons detected — create notification
  const newLessons = TUTORIAL_TOTAL_STEPS - prevTotal;
  const notif = {
    id: 'tut_update_' + TUTORIAL_TOTAL_STEPS,
    newTotal: TUTORIAL_TOTAL_STEPS,
    prevTotal: prevTotal,
    newLessons: newLessons,
    date: new Date().toISOString(),
    read: false
  };
  _tutUpdateNotifications.push(notif);
  _tutSaveUpdateNotifs();
  // Un-mark tutorial as fully completed so progress reflects new lessons
  _tut.seen.slideshow = false;
  _tut.seen.tutTotal = TUTORIAL_TOTAL_STEPS;
  // Keep completedCount as-is so progress bar shows correct partial %
  _tutSaveSeen();
  updateNotifBadges();
}

function getTutorialUpdateNotifs(){
  if(settingsPrefs.tutorialUpdateNotifs === false) return [];
  _tutLoadUpdateNotifs();
  return _tutUpdateNotifications.filter(n => !n.read);
}

function dismissTutorialUpdateNotif(id){
  _tutLoadUpdateNotifs();
  const notif = _tutUpdateNotifications.find(n => n.id === id);
  if(notif) notif.read = true;
  _tutSaveUpdateNotifs();
  updateNotifBadges();
}

function handleTutorialNotifClick(id){
  dismissTutorialUpdateNotif(id);
  switchView('tutorial');
}

// ── Slideshow Tutorial (replaces interactive tutorial) ──
// Track tutorial progress for Settings UI
let _tutProgress = { step:0, total:TUTORIAL_TOTAL_STEPS, pct:0 };

function openTutorialSlideshow(autostart, restart){
  // Remove any existing slideshow
  closeTutorialSlideshow();
  // Persist tutorial-open state so it survives page refresh
  try { sessionStorage.setItem('rr_tutorial_open', '1'); } catch(e){}
  const overlay = document.createElement('div');
  overlay.className = 'tut-slideshow-overlay';
  overlay.id = 'tutSlideshowOverlay';
  const iframe = document.createElement('iframe');
  let params = [];
  if(autostart) params.push('autostart=1');
  if(restart) params.push('restart=1');
  iframe.src = 'tutorial.html' + (params.length ? '?' + params.join('&') : '');
  iframe.allow = 'fullscreen';
  overlay.appendChild(iframe);
  document.body.appendChild(overlay);
  // Listen for messages from iframe
  window._tutSlideshowHandler = function(e){
    if(!e.data) return;
    if(e.data.type === 'tutorialProgress'){
      // Update progress tracking
      _tutProgress.step = e.data.step;
      _tutProgress.total = e.data.total;
      _tutProgress.pct = Math.round((e.data.completedCount || 0) / e.data.total * 100);
      _tut.seen.tutStep = e.data.step;
      _tut.seen.tutTotal = e.data.total;
      _tut.seen.tutCompletedCount = e.data.completedCount || 0;
      _tutSaveSeen();
    }
    if(e.data.type === 'tutorialClose'){
      closeTutorialSlideshow();
      if(e.data.completed){
        // Mark slideshow as fully completed
        _tut.seen.slideshow = true;
        _tut.seen.tutStep = e.data.lastStep;
        _tutProgress.pct = 100;
      }
      _tutSaveSeen();
      // Re-render if tutorial or settings view is visible
      if(currentView === 'tutorial' || currentView === 'settings') render();
    }
  };
  window.addEventListener('message', window._tutSlideshowHandler);
  // Also allow Escape to close
  window._tutSlideshowEsc = function(e){
    if(e.key === 'Escape') closeTutorialSlideshow();
  };
  window.addEventListener('keydown', window._tutSlideshowEsc);
}

function closeTutorialSlideshow(){
  // Clear tutorial-open state so it doesn't reopen on refresh
  try { sessionStorage.removeItem('rr_tutorial_open'); } catch(e){}
  const overlay = document.getElementById('tutSlideshowOverlay');
  if(overlay) overlay.remove();
  if(window._tutSlideshowHandler){
    window.removeEventListener('message', window._tutSlideshowHandler);
    window._tutSlideshowHandler = null;
  }
  if(window._tutSlideshowEsc){
    window.removeEventListener('keydown', window._tutSlideshowEsc);
    window._tutSlideshowEsc = null;
  }
}

    _tutProgress = { step:0, total:TUTORIAL_TOTAL_STEPS, pct:0 };

async function handleUpgrade(tier){
  try {
    showToast('Preparing checkout...', 'info', 3000);
    var user = firebase.auth().currentUser;
    // Get stripeCustomerId from Firestore to pass to server
    var custId = null;
    if(user){
      var udoc = await db.collection('users').doc(user.uid).get();
      if(udoc.exists && udoc.data().stripeCustomerId) custId = udoc.data().stripeCustomerId;
    }
    const result = await callFunction('createCheckoutSession', { tier: tier, period: billingPeriod, stripeCustomerId: custId });
    if(result.data && result.data.url){
      // Save stripeCustomerId to Firestore before redirect
      if(user && result.data.stripeCustomerId){
        db.collection('users').doc(user.uid).set({ stripeCustomerId: result.data.stripeCustomerId }, { merge: true });
      }
      window.location.href = result.data.url;
    } else {
      showAppAlert('Could not create checkout session. Please try again.', {title: 'Checkout Error', icon: '❌'});
    }
  } catch(err){
    console.error('Checkout error:', err);
    showAppAlert('Checkout failed: ' + (err.message || 'Unknown error'), {title: 'Checkout Error', icon: '❌'});

// Shared: sync subscription with Stripe and write results to Firestore
async function _doSyncSubscription(){
  var user = firebase.auth().currentUser;
  if(!user) return;
  var udoc = await db.collection('users').doc(user.uid).get();
  var custId = udoc.exists ? udoc.data().stripeCustomerId : null;
  var subId = udoc.exists ? udoc.data().stripeSubscriptionId : null;
  if(!custId && !subId) return;
  try {
    var result = await callFunction('syncSubscription', { stripeCustomerId: custId, stripeSubscriptionId: subId });
    if(result.data){
      var d = result.data;
      var updates = { tier: d.tier, subscriptionStatus: d.subscriptionStatus, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
      if(d.stripeCustomerId) updates.stripeCustomerId = d.stripeCustomerId;
      if(d.stripeSubscriptionId) updates.stripeSubscriptionId = d.stripeSubscriptionId;
      else if(d.stripeSubscriptionId === null) updates.stripeSubscriptionId = null;
      if(d.currentPeriodEnd) updates.currentPeriodEnd = d.currentPeriodEnd;
      await db.collection('users').doc(user.uid).update(updates);
      var oldTier = udoc.exists ? udoc.data().tier : 'free';
      setTier(d.tier);
      if(d.tier === 'free' && oldTier !== 'free'){
        showToast('Your subscription status has changed. You are now on the Free plan.', 'info', 6000);
      } else if(d.subscriptionStatus === 'past_due'){
        showToast('Your last payment failed. Please update your payment method.', 'warning', 8000);
      } else if(d.tier !== oldTier){
        showToast('Subscription updated!', 'success', 3000);
      }
      render();
    }
  } catch(e){ console.warn('Subscription sync failed:', e); }
}

// On page load, check if Stripe redirected back after successful checkout
// Calls verifyCheckout to verify payment with Stripe, then writes to Firestore client-side
function checkCheckoutReturn(){
  const params = new URLSearchParams(window.location.search);
  const checkoutStatus = params.get('checkout');
  const sessionId = params.get('session_id');
  if(checkoutStatus === 'success' && sessionId){
    // Clean the URL immediately
    const cleanUrl = window.location.origin + window.location.pathname;
    window.history.replaceState({}, document.title, cleanUrl);
    showToast('Payment successful! Activating your plan...', 'success', 5000);
    // Wait for auth to be ready, then verify with Stripe
    var unsubVerify = firebase.auth().onAuthStateChanged(function(user){
      unsubVerify();
      if(user){
        callFunction('verifyCheckout', { sessionId: sessionId }).then(function(result){
          if(result.data && result.data.tier){
            // Write verified data to Firestore
            var updates = {
              tier: result.data.tier,
              subscriptionStatus: result.data.status || 'active',
              stripeCustomerId: result.data.stripeCustomerId,
              stripeSubscriptionId: result.data.stripeSubscriptionId,
              updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            db.collection('users').doc(user.uid).update(updates).then(function(){
              setTier(result.data.tier);
              showToast('Plan upgraded to ' + result.data.tier.charAt(0).toUpperCase() + result.data.tier.slice(1) + '!', 'success', 4000);
              switchView('pricing');
            });
          }
        }).catch(function(err){
          console.error('Verify checkout error:', err);
          showAppAlert('Your payment was received but we had trouble activating your plan. Please refresh the page or contact support.', {title:'Activation Issue', icon:'⚠️'});
        });
      }
    });
  } else if(checkoutStatus === 'success' && !sessionId){
    // Fallback: no session ID in URL, try reading from Firestore
    const cleanUrl = window.location.origin + window.location.pathname;
    window.history.replaceState({}, document.title, cleanUrl);
    showToast('Payment successful! Activating your plan...', 'success', 5000);
    setTimeout(function(){
      var user = firebase.auth().currentUser;
      if(user){
        db.collection('users').doc(user.uid).get().then(function(doc){
          if(doc.exists && doc.data().tier){
            setTier(doc.data().tier);
            switchView('pricing');
          }
        });
      }
    }, 2000);
  } else if(checkoutStatus === 'cancelled'){
    const cleanUrl = window.location.origin + window.location.pathname;
    window.history.replaceState({}, document.title, cleanUrl);
  }
}

window.RR_EXTENSION_IDS = [

async function _rrProbeExtension(){
  if(!window.chrome || !chrome.runtime || !chrome.runtime.sendMessage){
    window.RR_EXTENSION_INSTALLED = false;
    return false;
  }
  for(const extId of window.RR_EXTENSION_IDS){
    try {
      // Use HEALTH instead of PING so we also get Ollama status in one round-trip
      const health = await new Promise((resolve) => {
        try {
          chrome.runtime.sendMessage(extId, { type: 'HEALTH' }, (response) => {
            if(chrome.runtime.lastError){ resolve(null); return; }
            resolve(response || null);
          });
        } catch(e){ resolve(null); }
      });
      if(health && health.ok){
        window.RR_EXTENSION_INSTALLED = extId;
        window.RR_OLLAMA_HEALTH = health.ollama || null;
        // Also reflect into legacy extensionHealth for the existing Plan page UI
        extensionHealth = {
          extension: true,
          version: health.version,
          ollama: health.ollama && health.ollama.running,
          model: health.ollama && health.ollama.modelInstalled,
        };
        extensionReady = true;
        return extId;
      }
    } catch(_){}
  }
  window.RR_EXTENSION_INSTALLED = false;
  window.RR_OLLAMA_HEALTH = null;
  return false;
}

// Re-probe just the Ollama health without re-running extension detection.
// Used by the "Retry detection" links in the Ollama banner and Plan page.
async function _rrRefreshOllamaHealth(){
  const extId = window.RR_EXTENSION_INSTALLED;
  if(!extId) return null;
  return new Promise((resolve) => {
    try {
      chrome.runtime.sendMessage(extId, { type: 'HEALTH' }, (response) => {
        if(chrome.runtime.lastError){ resolve(null); return; }
        if(response && response.ok){
          window.RR_OLLAMA_HEALTH = response.ollama || null;
          extensionHealth = {
            extension: true,
            version: response.version,
            ollama: response.ollama && response.ollama.running,
            model: response.ollama && response.ollama.modelInstalled,
          };
          resolve(response.ollama);
        } else {
          resolve(null);
        }
      });
    } catch(e){ resolve(null); }
  }).then((ollama) => {
    // Re-render top banners to reflect the refreshed state
    try { if(typeof rrUpdateTopBanners === 'function') rrUpdateTopBanners(window.RR_EXTENSION_INSTALLED); } catch(_){}
    return ollama;

}

// Call the extension to scrape a URL. Returns { ok, data } or { ok:false, error }.
async function rrScrapeViaExtension(url, kind){
  const extId = window.RR_EXTENSION_INSTALLED || await _rrProbeExtension();
  if(!extId) return { ok: false, error: 'extension-not-installed' };
  return new Promise((resolve) => {
    try {
      chrome.runtime.sendMessage(
        extId,
        { type: 'SCRAPE_URL', url: url, kind: kind || 'auto' },
        (response) => {
          if(chrome.runtime.lastError){
            resolve({ ok: false, error: chrome.runtime.lastError.message });
            return;
          }
          if(!response){ resolve({ ok: false, error: 'No response from extension' }); return; }
          resolve(response);
        }
      );
    } catch(e){
      resolve({ ok: false, error: e.message || String(e) });
    }
  });
}

// Receive data pushed in from the extension popup via our content script.
// The content script forwards chrome.runtime.onMessage payloads as
// window.postMessage({ rrExtension: true, type, data }).
window.addEventListener('message', (event) => {
  if(event.source !== window) return;
  const m = event.data;
  if(!m || m.rrExtension !== true) return;
  console.log('[RR crm] got extension message', m.type);
  try {
    if(m.type === 'READY'){
      // Extension content script announced itself — probe once so
      // RR_EXTENSION_INSTALLED gets set, then hide any install banner.
      _rrProbeExtension().then((extId) => { if(extId) rrHideInstallBanner(); });
    } else if(m.type === 'COMP_IMPORTED' && typeof handleExtensionComp === 'function'){
      handleExtensionComp(m.data);
    } else if(m.type === 'LISTING_IMPORTED' && typeof handleExtensionListing === 'function'){
      handleExtensionListing(m.data);
    } else if(m.type === 'LISTING_ENRICHMENT' && typeof handleListingEnrichment === 'function'){
      // Async LLM enrichment patch — arrives 5-15s after the initial
      // import landed. Patches the open record in place with bullets +
      // any LLM-only fields.
      handleListingEnrichment(m.patch);
    }
  } catch(e){ console.error('RR extension message handler error:', e); }
});

      '<button type="button" onclick="rrCopyOllamaPullCmd(this)" style="background:#4f6ef7;border:none;color:#fff;font-weight:600;padding:5px 10px;border-radius:4px;font-size:.72rem;cursor:pointer;white-space:nowrap">Copy</button>' +
      '</div>' +
      '<div style="margin-top:4px;font-size:.72rem;color:var(--text3,#8a8fa3)">Leave the modal open — it\'ll check itself off when the download finishes.</div>';

  const step3Body = step3Done
    ? '<span style="color:#10b981;font-weight:600">All set — AI enrichment is ready.</span> Click <strong>Finish</strong> below.'
    : 'Once both steps above are complete, this step will turn green automatically.' +
      '<div style="margin-top:6px"><button type="button" onclick="_rrRefreshOllamaHealth().then(rrRenderOllamaSetupSteps)" style="background:transparent;border:1px solid var(--border,#2a2e42);color:var(--text2,#b8bdd0);padding:5px 12px;border-radius:5px;font-size:.72rem;cursor:pointer">Check now</button></div>';

function rrCloseOllamaSetupModal(markCompleted){
  if(_rrOllamaSetupPoll){ clearInterval(_rrOllamaSetupPoll); _rrOllamaSetupPoll = null; }
  const overlay = document.getElementById('rrOllamaSetupModal');
  if(overlay) overlay.remove();
  if(markCompleted) rrMarkOllamaSetupCompleted();
  // Refresh the top banner state so if they skipped, the nudge reappears
  _rrProbeExtension().then((extId) => rrUpdateTopBanners(extId));
}

// Decide which (if any) top-of-page banner to show based on current probe state
function rrUpdateTopBanners(extId){
  if(!extId){
    rrHideOllamaBanner();
    rrShowInstallBanner();
    return;
  }
  rrHideInstallBanner();
  // v0.9.0: Claude API is primary — if configured, no Ollama needed.
  chrome.runtime.sendMessage(extId, { type: 'HEALTH' }, (resp) => {
    if (chrome.runtime.lastError || !resp || !resp.ok) return;
    const hasClaude = resp.claude && resp.claude.configured;
    const o = resp.ollama || {};
    if (hasClaude || (o.running && o.modelInstalled)) {
      rrHideOllamaBanner();
      rrMarkOllamaSetupCompleted();
    } else if (o.unknown) {
      rrHideOllamaBanner();
    } else {
      rrShowOllamaBanner();
    }
  });
}

// Probe for the extension shortly after load so the UI can reflect install state
setTimeout(() => {
  _rrProbeExtension().then((extId) => {
    rrUpdateTopBanners(extId);
  });
}, 1500);

// Listen for auth state changes
let _authDataLoaded = false;
firebase.auth().onAuthStateChanged(async (user) => {
  try {
  if(user){
    setUser(user);
    loadEmailPrefs();

    // ── Email verification gate (email/password users only) ──
    // Google sign-in users are automatically emailVerified, so this only blocks email/password signups
    const isEmailProvider = user.providerData && user.providerData.some(function(p){ return p.providerId === 'password'; });
    if(isEmailProvider && !user.emailVerified){
      hideLoadingOverlay();
      showEmailVerificationScreen(user);
      return;
    }
    // If returning from verification (page was reloaded after verify), dismiss overlay
    // and trigger the deferred welcome email for email/password users
    _dismissEmailVerificationScreen();

    // If this is a token refresh for the same user, skip full reload to avoid
    // destroying any open editors or typed content
    if(_authDataLoaded && _currentUid === user.uid){
      // Silently refresh tier and disclaimer state in background without re-rendering
      try {
        const userDoc = await db.collection('users').doc(user.uid).get();
        if(userDoc.exists){
          const data = userDoc.data();
          _disclaimerAcknowledged = !!data.disclaimerAcknowledged;
          _disclaimerVersion = data.disclaimerVersion || 0;
          if(data.disclaimerAcknowledgedAt && data.disclaimerAcknowledgedAt.toDate){ _disclaimerAcknowledgedAt = data.disclaimerAcknowledgedAt.toDate().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}); }
          if(data.tier) setTier(data.tier);
        }
      } catch(e){ /* tier refresh failed, that's ok */ }
      return;
    }
    // Check/create user doc in Firestore
    const userRef = db.collection('users').doc(user.uid);
    const userDoc = await userRef.get();
    if(!userDoc.exists){
      const newUserData = {
        name: user.displayName || 'User',
        email: user.email || '',
        photo: user.photoURL || null,
        tier: 'free',
        disclaimerAcknowledged: false,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      };
      await userRef.set(newUserData);
      checkAndSetAdmin(user, newUserData);
      _disclaimerAcknowledged = false;
      setTier('free');
      // Initialize analysis quota with signup date
      _aqLoad();
      _aqSetSignupDate(new Date().toISOString());
      // New user — load data, then show disclaimer as first thing they see
      await loadDataFromFirestore(user.uid);
      _authDataLoaded = true;
      setTimeout(() => showDisclaimerOverlay(), 400);
      if(_launchTutorialAfterAuth){ _launchTutorialAfterAuth = false; }
      else { _tutCheckAutoStart('free', true); }
    } else {
      const data = userDoc.data();
      // Load disclaimer state BEFORE setting tier (so setTier doesn't re-trigger overlay)
      _disclaimerAcknowledged = !!data.disclaimerAcknowledged;
      _disclaimerVersion = data.disclaimerVersion || 0;
      if(data.disclaimerAcknowledgedAt && data.disclaimerAcknowledgedAt.toDate){ _disclaimerAcknowledgedAt = data.disclaimerAcknowledgedAt.toDate().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}); }
      _tutLoadSeenFromFirestore(data);
      checkAndSetAdmin(user, data);
      // Load analysis quota from Firestore
      _aqLoadFromFirestore(data);
      // Set signup date from Firestore createdAt if not already set
      if(!_analysisQuota.signupDate && data.createdAt){
        const ts = data.createdAt.toDate ? data.createdAt.toDate() : new Date(data.createdAt);
        _aqSetSignupDate(ts.toISOString());
      }
      if(data.tier) setTier(data.tier);
      // Sync profile photo: update Firestore if Google provides a fresh one,
      // or fall back to Firestore photo if Firebase Auth lost it
      if(user.photoURL && user.photoURL !== (data.photo || null)){
        userRef.update({ photo: user.photoURL }).catch(function(e){ console.error('Photo sync error:', e); });
      } else if(!user.photoURL && data.photo){
        // Firebase Auth lost the photo (can happen with Google tokens) — restore from Firestore
        currentUser = currentUser || {};
        currentUser.photo = data.photo;
        try { localStorage.setItem('rr_user', JSON.stringify(currentUser)) } catch(e){}
        renderUserSection();
      }
      // Load user's property data from Firestore
      await loadDataFromFirestore(user.uid);
      _authDataLoaded = true;
      // Show disclaimer as first thing if not yet acknowledged (any tier)
      if(needsDisclaimer()){
        setTimeout(() => showDisclaimerOverlay(), 400);
      }
      else if(_launchTutorialAfterAuth){ _launchTutorialAfterAuth = false; setTimeout(() => openTutorialSlideshow(true), 600); }
      // Restore tutorial if it was open before a page refresh
      else if(sessionStorage.getItem('rr_tutorial_open') === '1'){
        setTimeout(() => openTutorialSlideshow(true), 400);
      }
      // Check if tier tutorial needed (only after disclaimer flow)
      else if(data.tier && _disclaimerAcknowledged){
        _tutCheckAutoStart(data.tier, false);
      }
      // Sync subscription status with Stripe in the background
      // Covers: renewals, failed payments, cancellations, plan changes
      if(data.stripeSubscriptionId || data.stripeCustomerId){
        _doSyncSubscription();
      }
    }
  } else {
    setUser(null);
    _currentUid = null;
    _authDataLoaded = false;
    records = [];
    _isAdmin = false;
    applyAdminUI();
    render();
    hideLoadingOverlay();
  }
  } catch(authErr){
    console.error('Auth state handler error:', authErr);
    hideLoadingOverlay();
  }
});
let currentUser = null;

  const flagMatch = !!(firestoreData && firestoreData.admin === true);

function toggleAuthPw(btn){
  var input = btn.previousElementSibling;
  if(input.type === 'password'){ input.type = 'text'; btn.textContent = 'Hide'; }
  else { input.type = 'password'; btn.textContent = 'Show'; }
}

function showAuthError(msg){
  var el = document.getElementById('authError');
  if(el){ el.textContent = msg; el.style.display = 'block'; }
}

function clearAuthError(){
  var el = document.getElementById('authError');
  if(el){ el.textContent = ''; el.style.display = 'none'; }
}

function setAuthLoading(loading){
  var btn = document.getElementById('authSubmitBtn');
  if(btn) btn.disabled = loading;
}

function handleEmailSignIn(){
  clearAuthError();
  var email = (document.getElementById('authEmail').value || '').trim();
  var password = document.getElementById('authPassword').value || '';
  if(!email){ showAuthError('Please enter your email address.'); return; }
  if(!password){ showAuthError('Please enter your password.'); return; }
  setAuthLoading(true);
  firebase.auth().signInWithEmailAndPassword(email, password).then(function(result){
    closeAuthModal();
    setUser(result.user);
  }).catch(function(err){
    setAuthLoading(false);
    if(err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential'){
      showAuthError('Incorrect password. If you previously signed in with Google, try "Continue with Google" below or use "Forgot password?" to set a password.');
    } else if(err.code === 'auth/user-not-found'){
      showAuthError('No account found with this email. Check your spelling or sign up for a new account.');
    } else if(err.code === 'auth/too-many-requests'){
      showAuthError('Too many failed attempts. Please try again later or reset your password.');
    } else if(err.code === 'auth/invalid-email'){
      showAuthError('Please enter a valid email address.');
    } else {
      showAuthError(err.message);
    }
  });
}

function handleEmailSignUp(){
  clearAuthError();
  var name = (document.getElementById('authName').value || '').trim();
  var email = (document.getElementById('authEmail').value || '').trim();
  var password = document.getElementById('authPassword').value || '';
  var confirm = document.getElementById('authPasswordConfirm').value || '';
  if(!name){ showAuthError('Please enter your name.'); return; }
  if(!email){ showAuthError('Please enter your email address.'); return; }
  if(password.length < 6){ showAuthError('Password must be at least 6 characters.'); return; }
  if(password !== confirm){ showAuthError('Passwords do not match.'); return; }
  setAuthLoading(true);
  firebase.auth().createUserWithEmailAndPassword(email, password).then(function(result){
    return result.user.updateProfile({ displayName: name }).then(function(){
      // Verification email is sent by showEmailVerificationScreen via onAuthStateChanged
      closeAuthModal();
      setUser(result.user);
    });
  }).catch(function(err){
    setAuthLoading(false);
    if(err.code === 'auth/email-already-in-use'){
      showAuthError('An account with this email already exists. If you signed up with Google, use "Continue with Google" to sign in.');
    } else if(err.code === 'auth/invalid-email'){
      showAuthError('Please enter a valid email address.');
    } else if(err.code === 'auth/weak-password'){
      showAuthError('Password is too weak. Please use at least 6 characters.');
    } else {
      showAuthError(err.message);
    }
  });
}

function handlePasswordReset(){
  clearAuthError();
  var successEl = document.getElementById('authSuccess');
  if(successEl) successEl.style.display = 'none';
  var email = (document.getElementById('authEmail').value || '').trim();
  if(!email){ showAuthError('Please enter your email address.'); return; }
  setAuthLoading(true);
  firebase.auth().sendPasswordResetEmail(email).then(function(){
    setAuthLoading(false);
    if(successEl){ successEl.textContent = 'Reset link sent! Check your inbox (and spam folder) for an email from RentingRadar.'; successEl.style.display = 'block'; }
  }).catch(function(err){
    setAuthLoading(false);
    if(err.code === 'auth/user-not-found'){
      showAuthError('No account found with this email address.');
    } else if(err.code === 'auth/invalid-email'){
      showAuthError('Please enter a valid email address.');
    } else {
      showAuthError(err.message);
    }
  });
}

    <button id="emailVerifyResendBtn" onclick="_resendVerificationEmail()" style="display:block;width:100%;padding:10px 0;font-size:.85rem;font-weight:500;border:1px solid var(--border,#30363d);border-radius:8px;background:transparent;color:var(--text2,#8b949e);cursor:pointer;font-family:inherit;margin-bottom:16px;transition:all .15s">Resend Verification Email</button>
    <div id="emailVerifyMsg" style="min-height:20px;font-size:.82rem;margin-bottom:16px"></div>
    <button onclick="_signOutFromVerification()" style="background:none;border:none;color:var(--text3,#6e7681);font-size:.8rem;cursor:pointer;text-decoration:underline;font-family:inherit">Sign out &amp; use a different account</button>
  </div>`;
  document.body.appendChild(overlay);

  // Always send a fresh verification email when this screen appears
  // This handles both new signups AND existing unverified users signing in
  // (whose original link may have expired)
  user.sendEmailVerification().then(function(){
    var msg = document.getElementById('emailVerifyMsg');
    if(msg){ msg.style.color = 'var(--success,#3fb950)'; msg.textContent = 'Verification email sent!'; }
    // Auto-clear the success message after a few seconds
    setTimeout(function(){ if(msg && msg.textContent === 'Verification email sent!') msg.textContent = ''; }, 5000);
  }).catch(function(err){
    var msg = document.getElementById('emailVerifyMsg');
    if(err.code === 'auth/too-many-requests'){
      if(msg){ msg.style.color = 'var(--text3,#6e7681)'; msg.textContent = 'A verification email was recently sent. Please check your inbox and spam folder.'; }
    } else {
      console.error('sendEmailVerification error:', err);
    }
  });
}

function _dismissEmailVerificationScreen(){
  const el = document.getElementById('emailVerifyOverlay');
  if(el){ el.remove(); return true; }
  return false;
}

function _checkEmailVerified(){
  const btn = document.getElementById('emailVerifyCheckBtn');
  const msg = document.getElementById('emailVerifyMsg');
  if(btn) btn.disabled = true;
  if(btn) btn.textContent = 'Checking...';
  const user = firebase.auth().currentUser;
  if(!user){ if(btn){ btn.disabled = false; btn.textContent = "I've Verified My Email"; } return; }
  // Reload user to get latest emailVerified status from Firebase
  user.reload().then(function(){
    if(user.emailVerified){
      if(msg){ msg.style.color = 'var(--success,#3fb950)'; msg.textContent = 'Email verified! Loading your account...'; }
      // Set flag so on reload we know to trigger the welcome email
      try { sessionStorage.setItem('rr_just_verified', '1'); } catch(e){}
      // Reload the page — onAuthStateChanged will fire fresh with emailVerified=true
      setTimeout(function(){ window.location.reload(); }, 800);
    } else {
      if(btn){ btn.disabled = false; btn.textContent = "I've Verified My Email"; }
      if(msg){ msg.style.color = 'var(--warning,#d29922)'; msg.textContent = "Email not verified yet. Please click the link in the email we sent you."; }
    }
  }).catch(function(err){
    if(btn){ btn.disabled = false; btn.textContent = "I've Verified My Email"; }
    if(msg){ msg.style.color = 'var(--danger,#f85149)'; msg.textContent = 'Error checking status. Please try again.'; }
  });
}

function _resendVerificationEmail(){
  if(_emailVerifyResendCooldown) return;
  const btn = document.getElementById('emailVerifyResendBtn');
  const msg = document.getElementById('emailVerifyMsg');
  const user = firebase.auth().currentUser;
  if(!user) return;
  _emailVerifyResendCooldown = true;
  if(btn){ btn.disabled = true; btn.textContent = 'Sending...'; }
  user.sendEmailVerification().then(function(){
    if(msg){ msg.style.color = 'var(--success,#3fb950)'; msg.textContent = 'Verification email sent! Check your inbox.'; }
    if(btn){ btn.textContent = 'Email Sent'; }
    // Cooldown for 60 seconds to prevent spamming
    setTimeout(function(){
      _emailVerifyResendCooldown = false;
      if(btn){ btn.disabled = false; btn.textContent = 'Resend Verification Email'; }
    }, 60000);
  }).catch(function(err){
    _emailVerifyResendCooldown = false;
    if(btn){ btn.disabled = false; btn.textContent = 'Resend Verification Email'; }
    if(err.code === 'auth/too-many-requests'){
      if(msg){ msg.style.color = 'var(--warning,#d29922)'; msg.textContent = 'Too many attempts. Please wait a few minutes before trying again.'; }
    } else {
      if(msg){ msg.style.color = 'var(--danger,#f85149)'; msg.textContent = 'Failed to send email. Please try again.'; }
    }
  });
}

function _signOutFromVerification(){
  _dismissEmailVerificationScreen();
  firebase.auth().signOut();
}

// Google Identity Services — bypasses Firebase __/auth/handler completely
const GIS_CLIENT_ID = '622768449810-s72d56u4fherfif72the4cffb8epk1ml.apps.googleusercontent.com';

function handleGoogleLogin(){
  if(window.google && window.google.accounts && window.google.accounts.oauth2){
    try {
      const tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: GIS_CLIENT_ID,
        scope: 'openid email profile',
        prompt: 'select_account',
        callback: function(tokenResponse){
          if(tokenResponse && tokenResponse.access_token){
            var credential = firebase.auth.GoogleAuthProvider.credential(null, tokenResponse.access_token);
            firebase.auth().signInWithCredential(credential).then(function(result){
              // GIS access-token flow may not populate photoURL — fetch from Google userinfo
              if(!result.user.photoURL){
                fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                  headers: { 'Authorization': 'Bearer ' + tokenResponse.access_token }
                }).then(function(r){ return r.json(); }).then(function(info){
                  if(info.picture){
                    result.user.updateProfile({ photoURL: info.picture }).then(function(){
                      setUser(result.user);
                      // Also persist to Firestore
                      db.collection('users').doc(result.user.uid).update({ photo: info.picture }).catch(function(){});
                    }).catch(function(){ setUser(result.user); });
                  } else { setUser(result.user); }
                }).catch(function(){ setUser(result.user); });
              } else {
                setUser(result.user);
              }
            }).catch(function(err){
              console.error('Firebase credential error:', err.code, err.message);
              showAppAlert('Sign-in failed: ' + err.message, {title: 'Sign-in Error', icon: '❌'});
            });
          }
        },
        error_callback: function(err){
          console.error('Google sign-in error:', err);
          if(err.type !== 'popup_closed'){
            showAppAlert('Google sign-in error: ' + (err.message || err.type || 'Unknown error'), {title: 'Sign-in Error', icon: '❌'});
          }
        }
      });
      tokenClient.requestAccessToken();
    } catch(e){
      console.error('GIS init error:', e);
      handleGoogleLoginLegacy();
    }
  } else {
    handleGoogleLoginLegacy();
  }
}

function handleGoogleLoginLegacy(){
  var provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({ prompt: 'select_account' });
  firebase.auth().signInWithPopup(provider).then(function(result){
    setUser(result.user);
  }).catch(function(err){
    console.error('Login error:', err.code, err.message, err);
    if(err.code === 'auth/popup-closed-by-user' || err.code === 'auth/cancelled-popup-request') return;
    if(err.code === 'auth/popup-blocked'){
      firebase.auth().signInWithRedirect(provider);
    } else {
      showAppAlert('Login failed (' + err.code + '): ' + err.message, {title: 'Login Error', icon: '❌'});
    }
  });
}

// Handle redirect result (fallback for popup-blocked)
firebase.auth().getRedirectResult().then(function(result){

}).catch(function(err){
  if(err.code && err.code !== 'auth/popup-closed-by-user'){

});

/* ===== CSV IMPORT ===== */
let csvImportData = null;
let csvHeaders = [];
const REQUIRED_MAPPINGS = [
  { key:'property', label:'Property Address', required:true },
  { key:'name', label:'Contact Name', required:false },
  { key:'phone', label:'Phone', required:false },
  { key:'email', label:'Email', required:false },
  { key:'status', label:'Status', required:false },
  { key:'link', label:'Listing Link', required:false },
  { key:'note', label:'Notes', required:false },
  { key:'date', label:'Date', required:false },
];

function openImportCsvModal(){
  if(!checkCsvAccess()) return;
  const modal = document.getElementById('detailModal');
  const panel = document.getElementById('detailPanel');
  csvImportData = null; csvHeaders = [];
  panel.innerHTML = `
    <div class="modal-header"><h2>Import CSV</h2><button class="modal-close" onclick="document.getElementById('detailModal').classList.remove('open')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>
    <div class="modal-body" id="csvImportBody">
      <div class="csv-drop" id="csvDropZone" onclick="document.getElementById('csvFileInput').click()" ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="event.preventDefault();this.classList.remove('dragover');handleCsvFile(event.dataTransfer.files[0])">
        <div style="font-size:2rem;margin-bottom:8px">📄</div>
        <div style="font-size:.95rem;font-weight:600;margin-bottom:4px">Drop a CSV file here, or click to browse</div>
        <div style="font-size:.8rem;color:var(--text3)">Supports .csv files with headers in the first row</div>

      </div>
    </div>`;
  modal.classList.add('open');
}

function handleCsvFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    const text = e.target.result;
    parseCsv(text);
  };
  reader.readAsText(file);
}

function parseCsv(text){
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if(lines.length < 2){ showAppAlert('CSV must have a header row and at least one data row.', {title: 'CSV Error', icon: '❌'}); return }

  // Parse headers
  csvHeaders = parseCSVLine(lines[0]);

  // Parse rows
  csvImportData = [];
  for(let i = 1; i < lines.length; i++){
    const vals = parseCSVLine(lines[i]);
    if(vals.some(v => v.trim())) csvImportData.push(vals);
  }

  showCsvMapping();
}

function parseCSVLine(line){
  const result = []; let current = ''; let inQuotes = false;
  for(let i = 0; i < line.length; i++){
    const c = line[i];
    if(c === '"'){ if(inQuotes && line[i+1] === '"'){ current += '"'; i++ } else { inQuotes = !inQuotes } }
    else if(c === ',' && !inQuotes){ result.push(current.trim()); current = '' }
    else { current += c }
  }
  result.push(current.trim());
  return result;
}

function showCsvMapping(){
  const body = document.getElementById('csvImportBody');

  // Auto-detect column mappings
  const autoMap = {};
  csvHeaders.forEach((h, i) => {
    const hl = h.toLowerCase().trim();
    if(hl.includes('property') || hl.includes('address') || hl === 'location') autoMap.property = i;
    else if(hl.includes('name') && !hl.includes('file')) autoMap.name = i;
    else if(hl.includes('phone') || hl.includes('tel') || hl.includes('mobile')) autoMap.phone = i;
    else if(hl.includes('email') || hl.includes('e-mail')) autoMap.email = i;
    else if(hl.includes('status') || hl.includes('stage')) autoMap.status = i;
    else if(hl.includes('link') || hl.includes('url') || hl.includes('listing')) autoMap.link = i;
    else if(hl.includes('note') || hl.includes('comment')) autoMap.note = i;
    else if(hl.includes('date')) autoMap.date = i;
  });

  body.innerHTML = `
    <div style="margin-bottom:16px">
      <div style="font-size:.95rem;font-weight:600;margin-bottom:4px">Map Your Columns</div>
      <div style="font-size:.82rem;color:var(--text2)">Found <strong>${csvImportData.length}</strong> rows and <strong>${csvHeaders.length}</strong> columns. Match your CSV columns to RentingRadar fields:</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 30px 1fr;gap:8px;align-items:center;margin-bottom:16px">
      <div style="font-size:.7rem;font-weight:600;color:var(--text3);text-transform:uppercase">RentingRadar Field</div>
      <div></div>
      <div style="font-size:.7rem;font-weight:600;color:var(--text3);text-transform:uppercase">Your CSV Column</div>
      ${REQUIRED_MAPPINGS.map(m => `
        <div style="font-size:.85rem;font-weight:${m.required?'600':'400'}">${m.label} ${m.required?'<span style="color:var(--danger)">*</span>':''}</div>
        <div style="text-align:center;color:var(--text3)">←</div>
        <select id="csvMap_${m.key}" style="font-size:.82rem;padding:5px 8px">
          <option value="-1">— Skip —</option>
          ${csvHeaders.map((h,i) => `<option value="${i}" ${autoMap[m.key]===i?'selected':''}>${esc(h)}</option>`).join('')}
        </select>
      `).join('')}
    </div>
    <div style="font-size:.82rem;font-weight:600;margin-bottom:8px">Preview (first 5 rows)</div>
    <div class="csv-preview">
      <table>
        <thead><tr>${csvHeaders.map(h => `<th>${esc(h)}</th>`).join('')}</tr></thead>
        <tbody>${csvImportData.slice(0,5).map(row => `<tr>${row.map(cell => `<td title="${esc(cell)}">${esc(cell.substring(0,40))}</td>`).join('')}</tr>`).join('')}</tbody>
      </table>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-secondary" onclick="document.getElementById('detailModal').classList.remove('open')">Cancel</button>
      <button class="btn btn-primary" onclick="executeCsvImport()">Import ${csvImportData.length} Records</button>
    </div>`;
}

function executeCsvImport(){
  // Validate required mappings
  const maps = {};
  for(const m of REQUIRED_MAPPINGS){
    const sel = document.getElementById('csvMap_'+m.key);
    maps[m.key] = sel ? parseInt(sel.value) : -1;
  }

  if(maps.property < 0){
    showAppAlert('Property Address is required. Please map it to a CSV column.', {title: 'CSV Error', icon: '❌'});
    return;
  }

  // Confirm before import
  const preview = csvImportData.slice(0,3).map(row => {
    const addr = maps.property >= 0 ? row[maps.property] : '';
    return addr.substring(0,50);
  }).join(', ');

  // Check property limit
  const limit = TIERS[currentTier]?.maxProperties || 50;
  const remaining = limit === Infinity ? Infinity : limit - records.length;
  const toImport = Math.min(csvImportData.length, remaining === Infinity ? csvImportData.length : remaining);
  if(remaining <= 0){
    showAppAlert("You've reached the "+TIERS[currentTier].name+" plan limit of "+limit+" properties. Upgrade to add more.", {title: 'Property Limit Reached', icon: '📦', onOk: () => switchView('pricing')});
    return;
  }
  const limitNote = remaining !== Infinity && csvImportData.length > remaining ? `\n\nNote: Your ${TIERS[currentTier].name} plan allows ${limit} properties. Only the first ${toImport} of ${csvImportData.length} rows will be imported.` : '';

  const confirmMsg = `Import ${toImport} records?${limitNote}\n\nFirst few: ${preview}...`.replace(/\n\n/g, ' ');
  showAppConfirm(confirmMsg, {
    title: 'Confirm Import',
    icon: '📁',
    confirmText: 'Import',
    onConfirm: function(){
      let imported = 0;
      for(const row of csvImportData){
        // Enforce limit during import
        const curLimit = TIERS[currentTier]?.maxProperties || 50;
        if(curLimit !== Infinity && records.length >= curLimit) break;
        const prop = maps.property >= 0 ? (row[maps.property]||'').trim() : '';
        if(!prop) continue;

        const r = {
          id: uid(),
          property: prop,
          name: maps.name >= 0 ? (row[maps.name]||'').trim() : '',
          phone: maps.phone >= 0 ? (row[maps.phone]||'').trim() : '',
          email: maps.email >= 0 ? (row[maps.email]||'').trim() : '',
          status: maps.status >= 0 ? (row[maps.status]||'').trim() || 'New' : 'New',
          link: maps.link >= 0 ? (row[maps.link]||'').trim() : '',
          note: maps.note >= 0 ? (row[maps.note]||'').trim() : '',
          date: maps.date >= 0 ? (row[maps.date]||'').trim() : new Date().toISOString().split('T')[0],
          followUpDate: null,
          notes: [],
          propertyDetails: {},
          propertyNotes: [],
          createdAt: new Date().toISOString()
        };

        // Validate status — default to New if unrecognized
        if(r.status && !STATUSES.includes(r.status)){
          // Try to fuzzy match
          const match = STATUSES.find(s => s.toLowerCase() === r.status.toLowerCase());
          r.status = match || 'New';
        }

        if(r.note) r.notes.push({ id:uid(), text:r.note, date:r.date, type:'import' });
        records.push(r);
        imported++;
      }

      saveData();
      document.getElementById('detailModal').classList.remove('open');
      render();

let activeHeroEdit = null;

function startHeroEdit(recId, field, containerId){
  if(activeHeroEdit) return; // Already editing

  const r = records.find(x => x.id === recId);
  if(!r) return;

  // Check if this field was auto-imported — show warning if so
  const isAutoImported = (r.propertyNotes||[]).some(n => n.source && n.source.includes('Auto-Import'));
  const currentVal = field === 'monthlyRent' ? (r.propertyDetails?.monthlyRent || '') : (r[field] || '');

  if(isAutoImported && currentVal){
    showAutoImportWarning(recId, field, containerId, currentVal);
    return;
  }

  activateHeroInput(recId, field, containerId, currentVal);
}

function showAutoImportWarning(recId, field, containerId, currentVal){
  // Remove any existing warning
  document.querySelectorAll('.auto-import-warning').forEach(w => w.remove());

  const container = document.getElementById(containerId);
  if(!container) return;
  container.style.position = 'relative';

  const warning = document.createElement('div');
  warning.className = 'auto-import-warning';
  warning.innerHTML = `
    <div class="aiw-title">⚠ Auto-imported data</div>
    <div class="aiw-text">This value was automatically extracted from the listing. Are you sure you want to edit it?</div>
    <div class="aiw-btns">
      <button class="btn btn-primary btn-sm" onclick="this.closest('.auto-import-warning').remove();activateHeroInput('${recId}','${field}','${containerId}','${esc(currentVal)}')">Yes, Edit</button>
      <button class="btn btn-secondary btn-sm" onclick="this.closest('.auto-import-warning').remove()">Cancel</button>
    </div>`;
  container.appendChild(warning);

  // Close on click outside
  setTimeout(() => {
    const closer = (e) => { if(!warning.contains(e.target) && e.target !== container){ warning.remove(); document.removeEventListener('click', closer) } };
    document.addEventListener('click', closer);
  }, 50);
}

function activateHeroInput(recId, field, containerId, currentVal){
  const container = document.getElementById(containerId);
  if(!container) return;
  // Block editing contact/address fields on analyzed properties (non-Pro)
  if(currentTier !== 'pro' && isPropertyAnalyzed(recId) && (field === 'property' || field === 'monthlyRent')){
    showToast('🔒 This field is locked on analyzed properties', 'info', 2500);
    return;
  }
  activeHeroEdit = { recId, field, containerId };

  const isRent = field === 'monthlyRent';
  const displayId = isRent ? 'heroRentDisplay' : 'heroAddressDisplay';
  const displayEl = document.getElementById(displayId);
  if(!displayEl) return;

  if(isRent){
    // Simple input for rent
    const input = document.createElement('input');
    input.type = 'number';
    input.className = 'hero-edit-input';
    input.value = currentVal;
    input.placeholder = 'Monthly rent amount';
    displayEl.replaceWith(input);
    input.focus();
    input.select();
    const editIcon = container.querySelector('.hero-edit-icon');
    if(editIcon) editIcon.style.display = 'none';
    container.onclick = null;
    const save = () => {
      if(!records.find(x=>x.id===recId).propertyDetails) records.find(x=>x.id===recId).propertyDetails = {};
      const _rr = records.find(x=>x.id===recId);
      logRentChange(_rr, input.value.trim());
      _rr.propertyDetails.monthlyRent = input.value.trim();
      saveData(); activeHeroEdit = null; render();
    };
    input.addEventListener('blur', save);
    input.addEventListener('keydown', (e) => { if(e.key==='Enter'){e.preventDefault();input.blur()} if(e.key==='Escape'){activeHeroEdit=null;render()} });
  } else {
    // Open address editor as popup
    showAddressEditorPopup(recId);
  }
}

/* ===== CALCULATOR TAB ===== */
const CALC_DEFAULTS = {
  applicationFees:0, securityDeposit:0, firstMonthRent:0, lastMonthRent:0,
  additionalFee1:0, additionalFee2:0, costPerBR:0,
  extraCommonSpaces:0, costPerExtraSpace:0,
  avgDailyRate:0, estOccupancyRate:0,
  insurance:0, strFee:0, water:0, gas:0, electric:0,
  wifiTv:0, futureRepairs:0, incidentals:0, parking:0,
  garbageRecycling:0, channelManager:0, cityPermit:0,
  coHostPct:0
};
const CLEANING_DEFAULTS = {0:0, 1:500, 2:650, 3:900, 4:1200, 5:1200, 6:1200};

function getCalc(r){
  if(!r.details) r.details = {};
  if(!r.details.calculator) r.details.calculator = {};
  const c = r.details.calculator;
  // Migrate legacy firstLastRent → split into firstMonthRent + lastMonthRent
  if(c.firstLastRent && !c.firstMonthRent && !c.lastMonthRent){
    c.firstMonthRent = c.firstLastRent;
    c.lastMonthRent = 0;
    delete c.firstLastRent;
  }
  for(const [k,v] of Object.entries(CALC_DEFAULTS)){
    if(c[k] === undefined || c[k] === null) c[k] = v;
  }
  // Always sync cleaning default with bedroom count unless user manually edited it
  const br = parseInt((r.propertyDetails||{}).bedrooms) || 0;
  const defaultCleaning = CLEANING_DEFAULTS[Math.min(br,6)] !== undefined ? CLEANING_DEFAULTS[Math.min(br,6)] : 650;
  if(!c._cleaningManual){
    c.cleaning = defaultCleaning;
  }
  return c;
}

function fmtAcct(n){
  if(n===undefined||n===null||isNaN(n)) return '$ —';
  const abs = Math.abs(n);
  const s = '$' + abs.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
  return n < 0 ? '(' + s + ')' : ' ' + s + ' ';
}
function fmtAcct2(n){
  if(n===undefined||n===null||isNaN(n)) return '$ —';
  const abs = Math.abs(n);
  const s = '$' + abs.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  return n < 0 ? '(' + s + ')' : ' ' + s + ' ';
}
function fmtNum(n){
  if(n===undefined||n===null||isNaN(n)) return '—';
  return Number(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:2});
}
function fmtMoney(n){
  if(n===undefined||n===null||isNaN(n)) return '$—';
  const neg = n < 0;
  return (neg?'-':'')+'$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
}

function cRow(label, valHtml, opts={}){
  const cls = opts.total ? ' total-row' : '';
  const hint = opts.hint ? '<span class="calc-label-hint">'+opts.hint+'</span>' : '';
  const tipA = opts.tip ? tipAttrs(label.replace(/<[^>]*>/g,''), opts.tip, true) : '';
  if(tipA){
    return '<div class="calc-row'+cls+'"><div class="calc-label"><span class="tip-label"'+tipA+'>'+label+'</span>'+hint+'</div>'+valHtml+'</div>';
  }
  return '<div class="calc-row'+cls+'"><div class="calc-label">'+label+hint+'</div>'+valHtml+'</div>';
}
function cInput(id, value, opts={}){
  const cls = opts.pct ? ' calc-pct' : '';
  const raw = value !== undefined && value !== null ? value : 0;
  let display;
  if(opts.pct){
    display = raw + '%';
  } else if(opts.noDollar){
    display = raw.toString();
  } else {
    const num = parseFloat(raw) || 0;
    display = '$' + num.toLocaleString('en-US', {minimumFractionDigits: num % 1 !== 0 ? 2 : 0, maximumFractionDigits: 2});
  }
  if(parseFloat(raw) === 0 && !opts.pct) display = '<span style="color:var(--text3)">$0</span>';
  if(parseFloat(raw) === 0 && opts.pct) display = '<span style="color:var(--text3)">0%</span>';
  if(parseFloat(raw) === 0 && opts.noDollar) display = '<span style="color:var(--text3)">0</span>';
  const dataAttrs = ' data-calc-field="'+id+'" data-calc-raw="'+raw+'"'+(opts.pct?' data-calc-pct="1"':'')+(opts.noDollar?' data-calc-nodollar="1"':'');
  return '<div class="calc-val'+cls+'"><div class="calc-editable" onclick="calcEditCell(this)"'+dataAttrs+'>'+display+'</div></div>';
}
function cDisplay(value, opts={}){
  const cls = opts.computed ? ' computed' : (opts.muted ? ' muted' : '');
  return '<div class="calc-val"><span class="calc-display'+cls+'">'+value+'</span></div>';
}

function calcComputeAll(r){
  const pd = r.propertyDetails || {};
  const c = getCalc(r);
  const br = parseInt(pd.bedrooms) || 0;
  const monthlyRent = parseFloat(pd.monthlyRent) || 0;
  const furnishCost = (br * c.costPerBR) + (c.extraCommonSpaces * c.costPerExtraSpace);
  const totalInvested = c.applicationFees + c.securityDeposit + c.firstMonthRent + c.lastMonthRent + c.additionalFee1 + c.additionalFee2 + furnishCost;
  // Pull ADR and occupancy from Analysis comps (only comps with actual values)
  const comps = (r.details && r.details.comps) ? r.details.comps : [];
  const compsWithRate = comps.filter(x => parseFloat(x.nightlyRate) > 0);
  const compsWithOcc = comps.filter(x => parseFloat(x.occupancy) > 0);
  const compsWithDays = comps.filter(x => parseFloat(x.daysAvailable) > 0);
  const compAvgRate = compsWithRate.length > 0 ? compsWithRate.reduce((s,x)=>s+parseFloat(x.nightlyRate),0)/compsWithRate.length : 0;
  const compAvgOcc = compsWithOcc.length > 0 ? compsWithOcc.reduce((s,x)=>s+parseFloat(x.occupancy),0)/compsWithOcc.length : 0;
  const avgDailyRate = compAvgRate;
  const estOccupancyRate = compAvgOcc;
  const daysOccupied = 365 * (estOccupancyRate / 100);
  const annualRevenue = avgDailyRate * daysOccupied;
  const monthlyRevenue = annualRevenue / 12;
  const cleaning = c.cleaning;
  const coHostFee = monthlyRevenue * (c.coHostPct / 100);
  const airbnbFee = monthlyRevenue * 0.03;
  const totalMonthlyExp = c.insurance + c.strFee + c.water + c.gas + c.electric + c.wifiTv + c.futureRepairs + c.incidentals + c.parking + cleaning + c.garbageRecycling + c.channelManager + c.cityPermit + coHostFee + airbnbFee;
  const annualExp = totalMonthlyExp * 12;
  const monthlyNOI = monthlyRevenue - totalMonthlyExp;
  const annualNOI = monthlyNOI * 12;
  const monthlyCF = monthlyNOI - monthlyRent;
  const annualCF = monthlyCF * 12;
  const cocReturn = totalInvested > 0 ? (annualCF / totalInvested * 100) : 0;
  // === Single Weighted Projection with Directional Multipliers ===
  // Loses To comps earn MORE than us → discount their revenue (×0.85)
  // Competes With comps earn SIMILAR → use as-is (×1.0)
  // Beats comps earn LESS than us → boost their revenue (×1.15)
  const DIRECTION_MULT = { loses: 0.85, competes: 1.0, beats: 1.15 };

  // Get each comp's revenue (from annualRevenue or rate×occ×days)
  function _compRevenue(cx){
    let rev = parseFloat(cx.annualRevenue) || 0;
    if(rev === 0){
      const rr = parseFloat(cx.nightlyRate) || 0;
      const oo = parseFloat(cx.occupancy) || 0;
      const dd = parseFloat(cx.daysAvailable) || 365;
      rev = rr * dd * (oo / 100);
    }
    return rev;
  }

  // Filter comps that have revenue data
  const compsWithRevData = comps.filter(cx => _compRevenue(cx) > 0);
  const hasEnoughComps = compsWithRevData.length >= 3;

  // Section counts (for position scoring)
  const losesCount = comps.filter(c => c.rating === 'loses').length;
  const competesCount = comps.filter(c => c.rating === 'competes').length;
  const beatsCount = comps.filter(c => c.rating === 'beats').length;
  const totalSectionComps = losesCount + competesCount + beatsCount;

  // Position score & percentile
  let positionScore = 0;
  let marketPercentile = 50;
  if(totalSectionComps > 0){
    positionScore = (-1 * losesCount + 0 * competesCount + 1 * beatsCount) / totalSectionComps;
    marketPercentile = Math.round((beatsCount + 0.5 * competesCount) / totalSectionComps * 100);
  }

  // Compute projected revenue — weighted by count AND adjusted by direction
  // Plus optimistic/pessimistic ranges using shifted multipliers
  const OPTIMISTIC_MULT  = { loses: 0.95, competes: 1.10, beats: 1.25 };
  const PESSIMISTIC_MULT = { loses: 0.75, competes: 0.90, beats: 1.05 };

  let projectedRevenue = 0, optimisticRevenue = 0, pessimisticRevenue = 0;
  let hasProjectionData = false;

  if(hasEnoughComps){
    let wSum = 0, oSum = 0, pSum = 0, totalWeight = 0;
    compsWithRevData.forEach(cx => {
      const rev = _compRevenue(cx);
      const rating = cx.rating || 'competes';
      wSum += rev * (DIRECTION_MULT[rating] || 1.0);
      oSum += rev * (OPTIMISTIC_MULT[rating] || 1.0);
      pSum += rev * (PESSIMISTIC_MULT[rating] || 1.0);
      totalWeight += 1;
    });
    projectedRevenue = totalWeight > 0 ? Math.round(wSum / totalWeight) : 0;
    optimisticRevenue = totalWeight > 0 ? Math.round(oSum / totalWeight) : 0;
    pessimisticRevenue = totalWeight > 0 ? Math.round(pSum / totalWeight) : 0;
    hasProjectionData = projectedRevenue > 0;
  }

  // Helper: compute derived values for a given annual revenue
  const fixedExp = c.insurance + c.strFee + c.water + c.gas + c.electric + c.wifiTv + c.futureRepairs + c.incidentals + c.parking + cleaning + c.garbageRecycling + c.channelManager + c.cityPermit;
  function deriveFromRev(annRev){
    const mRev = annRev / 12;
    const mExp = fixedExp + mRev * (c.coHostPct / 100) + mRev * 0.03;
    const aExp = mExp * 12;
    const mNOI = mRev - mExp;
    const mCF = mNOI - monthlyRent;
    const aCF = mCF * 12;
    const coc = totalInvested > 0 ? (aCF / totalInvested * 100) : 0;
    return { monthlyRev: mRev, totalMonthlyExp: mExp, annualExp: aExp, monthlyNOI: mNOI, annualNOI: mNOI*12, monthlyCF: mCF, annualCF: aCF, cocReturn: coc };
  }
  const projectedD = hasProjectionData ? deriveFromRev(projectedRevenue) : deriveFromRev(annualRevenue);
  const optimisticD = hasProjectionData ? deriveFromRev(optimisticRevenue) : null;
  const pessimisticD = hasProjectionData ? deriveFromRev(pessimisticRevenue) : null;
  return { c, br, monthlyRent, furnishCost, totalInvested, avgDailyRate, estOccupancyRate, daysOccupied, annualRevenue, monthlyRevenue, cleaning, coHostFee, airbnbFee, totalMonthlyExp, annualExp, monthlyNOI, annualNOI, monthlyCF, annualCF, cocReturn, compsCount: comps.length, projectedRevenue, optimisticRevenue, pessimisticRevenue, hasProjectionData, projectedD, optimisticD, pessimisticD, positionScore, marketPercentile, losesCount: losesCount || 0, competesCount: competesCount || 0, beatsCount: beatsCount || 0 };
}

  const input = document.getElementById('copyExpSearchInput');
  const resultsBox = document.getElementById('copyExpResults');
  input.focus();

  function matchAllWords(text, query){
    if(!text) return false;
    const words = query.split(/\s+/).filter(w => w.length > 0);
    return words.every(w => text.toLowerCase().includes(w));
  }

  function highlightText(text, query){
    if(!text) return '';
    const words = query.split(/\s+/).filter(w => w.length > 0);
    const lower = text.toLowerCase();
    let bestIdx = -1, bestLen = 0;
    for(const w of words){ const i = lower.indexOf(w); if(i >= 0 && w.length > bestLen){ bestIdx = i; bestLen = w.length; } }
    if(bestIdx === -1) return esc(text);
    return esc(text.substring(0,bestIdx)) + '<mark>' + esc(text.substring(bestIdx, bestIdx+bestLen)) + '</mark>' + esc(text.substring(bestIdx+bestLen));
  }

  function renderResults(q){
    _ceIdx = -1;
    if(!q || q.length < 1){
      // Show recently accessed (excluding current property)
      const recents = records.filter(r => r.lastAccessed && r.id !== targetId).sort((a,b) => new Date(b.lastAccessed) - new Date(a.lastAccessed)).slice(0,8);
      if(!recents.length){ resultsBox.innerHTML = '<div class="copy-exp-empty">No recently viewed properties</div>'; return; }
      let html = '';
      recents.forEach((r, i) => {
        const timeAgo = getTimeAgo(r.lastAccessed);
        const sc = getCalc(r);
        const hasExp = EXPENSE_FIELDS.some(k => sc[k] > 0);
        html += '<div class="copy-exp-item" data-id="'+r.id+'" data-idx="'+i+'"><div class="copy-exp-item-icon">🕐</div><div class="copy-exp-item-main"><div class="copy-exp-item-title">'+esc(r.property || 'No address')+'</div><div class="copy-exp-item-sub">'+(r.name?esc(r.name)+' · ':'')+esc(r.status)+' · '+timeAgo+(hasExp?'':' · <span style="color:var(--warning)">No expenses</span>')+'</div></div>'+(i===0?'<div class="copy-exp-item-hint">Shift+Enter</div>':'')+'</div>';

      resultsBox.innerHTML = html;
      attachResultClicks();
      return;
    }

    const matched = [];
    records.forEach(r => {
      if(r.id === targetId) return;
      const searchable = [r.property, r.name, r.phone, r.email].filter(Boolean).join(' ');
      if(matchAllWords(searchable, q)) matched.push(r);
    });

    if(!matched.length){ resultsBox.innerHTML = '<div class="copy-exp-empty">No matching properties</div>'; return; }

    let html = '';
    matched.slice(0,8).forEach((r, i) => {
      const sc = getCalc(r);

      const nameLine = (r.name ? highlightText(r.name, q) : '<span style="opacity:.4">No contact</span>') + (r.status ? ' · <span style="font-weight:600">'+esc(r.status)+'</span>' : '') + (hasExp ? '' : ' · <span style="color:var(--warning)">No expenses</span>');

    });
    resultsBox.innerHTML = html;
    attachResultClicks();
  }

  function attachResultClicks(){
    resultsBox.querySelectorAll('.copy-exp-item').forEach(el => {
      el.addEventListener('click', () => { selectCopySource(el.dataset.id, targetId); });

  function highlightItem(){
    resultsBox.querySelectorAll('.copy-exp-item').forEach((el,i) => el.classList.toggle('active', i === _ceIdx));

  input.addEventListener('keydown', (e) => {

function selectCopySource(sourceId, targetId){
  const source = records.find(r => r.id === sourceId);
  const target = records.find(r => r.id === targetId);
  if(!source || !target) return;

  const sc = getCalc(source);
  const hasExp = EXPENSE_FIELDS.some(k => sc[k] > 0);
  if(!hasExp){
    showAppAlert('The selected property has no Monthly Operating Expenses to copy.', { title: 'No Expenses Found', icon: '⚠️' });
    return;
  }

  // Close search modal
  document.getElementById('copyExpOverlay')?.remove();

  // Build a summary of what will be copied
  const labels = {insurance:'Insurance',strFee:'STR Fee',water:'Water',gas:'Gas',electric:'Electric',wifiTv:'Wifi + TV/Cable',futureRepairs:'Future Repairs',incidentals:'Incidentals',parking:'Parking',garbageRecycling:'Garbage / Recycling',channelManager:'Channel Manager',cityPermit:'City Permit',coHostPct:'Co-Host / PM Fee (%)'};
  const nonZero = EXPENSE_FIELDS.filter(k => sc[k] > 0);
  const summary = nonZero.map(k => labels[k] + ': ' + (k === 'coHostPct' ? sc[k] + '%' : '$' + Number(sc[k]).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}))).join(', ');

  showAppConfirm('Copy all Monthly Operating Expenses from <strong>' + esc(source.property || 'selected property') + '</strong> into this property?<br><br><span style="font-size:.8rem;color:var(--text3)">' + summary + '</span>', {
    title: 'Copy Expenses',
    icon: '📋',
    confirmText: 'Copy Expenses',
    onConfirm: () => {
      if(!target.details) target.details = {};
      if(!target.details.calculator) target.details.calculator = {};
      const tc = target.details.calculator;
      EXPENSE_FIELDS.forEach(k => { tc[k] = sc[k]; });
      // Also copy cleaning if manually set
      if(sc._cleaningManual && sc.cleaning !== undefined){
        tc.cleaning = sc.cleaning;
        tc._cleaningManual = true;
      }
      saveData();
      _rerenderExpensesTab();
      showToast('Expenses copied from ' + (source.property || 'property') + '.', 'success', 4000);
    }
  });
}

  // ─────────────────────────────────────────

  const inv = v.totalInvested;

  }
  const maxNeg = Math.max(...cumVals.filter(v => v < 0).map(v => Math.abs(v)), 1);
  const maxPos = Math.max(...cumVals.filter(v => v >= 0).map(v => v), 1);

  let paybackHeadline, paybackSub, paybackColor;

    paybackHtml += '</div>';
  }

  // ─────────────────────────────────────────
  // SECTION 4: Projected Yearly Net

  const noComps = v.compsCount === 0;

  // Three clickable columns: Pessimistic, Realistic, Optimistic
  const cols = [
    { key:'pessimistic', label:'Pessimistic', color:'var(--num-danger)',
      rev: hasProj ? Math.round(v.pessimisticRevenue) : 0, exp: hasProj ? Math.round(v.pessimisticD.annualExp) : 0, hasData: hasProj },
    { key:'realistic', label:'Realistic', color:'var(--num-computed)',

  // Clickable column headers — selecting a column drives KPIs, Deal Temp, and Payback
  pynHtml += '<div class="pyn-col-headers">';
