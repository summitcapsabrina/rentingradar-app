.settings-row-left .sr-desc{font-size:.78rem;color:var(--text3)}
.settings-row-right{flex-shrink:0;margin-left:16px}
.settings-toggle{width:40px;height:22px;background:var(--border);border-radius:11px;position:relative;cursor:pointer;transition:background .2s}
.settings-toggle.on{background:var(--primary)}
.settings-toggle::after{content:'';width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.settings-toggle.on::after{transform:translateX(18px)}
.settings-value{font-size:.85rem;color:var(--text2);text-align:right}
.settings-profile-card{display:flex;align-items:center;gap:16px;padding:4px 0}
.settings-profile-avatar{width:56px;height:56px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:700;flex-shrink:0}
.settings-profile-avatar img{width:56px;height:56px;border-radius:50%;object-fit:cover}
.settings-profile-info{flex:1}
.settings-profile-info .sp-name{font-size:1.05rem;font-weight:600}
.settings-profile-info .sp-email{font-size:.82rem;color:var(--text2)}
.settings-profile-info .sp-role{font-size:.7rem;color:var(--primary);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.billing-history{width:100%;border-collapse:collapse;font-size:.82rem;margin-top:10px}
.billing-history th{text-align:left;font-size:.7rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;padding:6px 0;border-bottom:1px solid var(--border)}
.billing-history td{padding:8px 0;border-bottom:1px solid var(--border);color:var(--text2)}
.danger-zone{border-color:rgba(239,68,68,.3)}
.danger-zone .settings-section-header{background:rgba(239,68,68,.06)}
.danger-zone .settings-section-header h3{color:var(--danger)}


/* ===== THEME PICKER ===== */
.theme-picker{position:absolute;top:calc(100% + 6px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:300;width:220px;padding:12px;display:none}
.theme-picker.open{display:block}
.theme-picker .tp-section{margin-bottom:10px}
.theme-picker .tp-section:last-child{margin-bottom:0}
.theme-picker .tp-label{font-size:.68rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.tp-mode-toggle{display:flex;background:var(--bg);border-radius:var(--radius);padding:2px;gap:2px}
.tp-mode-toggle button{flex:1;padding:5px;border-radius:6px;font-size:.78rem;font-weight:500;color:var(--text3);display:flex;align-items:center;justify-content:center;gap:4px}
.tp-mode-toggle button.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
.tp-accents{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.tp-accent{height:36px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all .15s;display:flex;align-items:center;justify-content:center;position:relative}
.tp-accent:hover{transform:scale(1.05)}
.tp-accent.active{border-color:var(--text)}
.tp-accent .tp-check{display:none;color:#fff;font-size:.7rem;font-weight:700}
.tp-accent.active .tp-check{display:block}
.tp-accent.locked{opacity:.4;cursor:not-allowed}
.tp-accent.locked::after{content:'🔒';font-size:.5rem;position:absolute;bottom:2px;right:2px}
.tp-accent-label{font-size:.65rem;text-align:center;color:var(--text3);margin-top:2px}

/* ===== PIPELINE PROPERTY LIST ===== */
.pipeline-category-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:14px}
.pipeline-cat-tab{padding:8px 18px;font-size:.82rem;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;display:flex;align-items:center;gap:6px}
.pipeline-cat-tab:hover{opacity:.85;background:var(--primary-light)}
.pipeline-cat-tab.active{font-weight:600}
.pipeline-cat-tab .pct-count{font-size:.7rem;background:var(--bg);padding:1px 7px;border-radius:10px;font-weight:600;color:inherit;opacity:.7}
.pipeline-cat-tab.active .pct-count{opacity:1}
.pipeline-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.pipeline-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:12px 16px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:12px}
.pipeline-card:hover{border-color:var(--primary);box-shadow:var(--card-hover-shadow);transform:translateY(-1px)}
.pipeline-card .plc-main{flex:1;min-width:0}
.pipeline-card .plc-property{font-weight:600;font-size:.92rem;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pipeline-card .plc-name{font-size:.85rem;color:var(--text2);margin-bottom:4px}
.pipeline-card .plc-meta{display:flex;gap:8px;flex-wrap:wrap;font-size:.78rem;color:var(--text3)}
.pipeline-card .plc-status{flex-shrink:0}

/* ===== SALES FUNNEL ===== */
.funnel-wrap{margin-bottom:20px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:16px 20px}
.funnel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.funnel-header h3{font-size:.92rem;font-weight:600}
.funnel-header .fh-total{font-size:.8rem;color:var(--text3)}
.funnel-svg-wrap{width:100%;overflow:visible}
.funnel-svg-wrap svg{width:100%;height:auto;display:block}
.funnel-stage{cursor:pointer;transition:transform .15s ease;transform-origin:center center}
.funnel-stage:hover{transform:scaleX(1.02) scaleY(1.06)}
.funnel-labels{display:flex;margin-bottom:2px}
.funnel-label{text-align:center;font-size:.82rem;font-weight:600;color:var(--text);padding:4px 0}
.funnel-label span{font-size:.7rem;font-weight:400;color:var(--text3);margin-left:4px}
.funnel-leaked-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:10px;flex-wrap:wrap}
.funnel-leaked-chip{display:flex;align-items:center;gap:5px;font-size:.75rem;color:var(--text3);padding:3px 10px;background:var(--bg);border-radius:20px}
.funnel-leaked-chip strong{color:var(--text2);font-weight:600}
.funnel-conversion{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap}
.funnel-kpi{text-align:center}
.funnel-kpi .fk-value{font-size:1.2rem;font-weight:700}
.funnel-kpi .fk-label{font-size:.68rem;color:var(--text3);text-transform:uppercase;letter-spacing:.3px}

<script>
/* ===== DATA LAYER ===== */
const INITIAL_DATA = [];

const STATUSES = ['New','No Contact','Messaged','Left Voicemail','Follow Up','Interested','Meeting','HOA Issues','Not Good Fit','Not Interested','Un-Listed'];
const STATUS_ORDER = {};
STATUSES.forEach((s,i) => STATUS_ORDER[s] = i);

const PIPELINE_STAGES = ['New','No Contact','Messaged','Left Voicemail','Follow Up','Interested','Meeting'];
const CLOSED_STAGES = ['HOA Issues','Not Good Fit','Not Interested','Un-Listed'];

const SELECTABLE_STATUSES = STATUSES;

function statusClass(s){ return 'st-' + (s||'new').toLowerCase().replace(/\s+/g,'-') }
function statusPill(s){ return `<span class="status-pill ${statusClass(s)}">${s||'New'}</span>` }

let records = [];
let currentView = 'dashboard';
let searchQuery = '';
let filterStatus = 'All';
let contactsViewMode = 'table';
let previousView = 'dashboard';
let currentProfileId = null;
let pipelineCategory = 'prospects'; // 'prospects', 'outreach', 'qualified', 'lost'
let pipelineSubCategory = null; // null = all within category, or a specific status string
// profileActiveTab defined in PROFILE TABS section

function uid(){ return '_'+Math.random().toString(36).substr(2,9) }

const DATA_VERSION = 8;
let _saveTimeout = null;
let _currentUid = null;

function loadData(){
  // Start with empty records; Firestore data loads async via onAuthStateChanged
  records = [];
}

async function loadDataFromFirestore(userUid){
  _currentUid = userUid;
  if(!userUid || typeof db === 'undefined') { records = []; render(); return; }
  try {
    // Clear any leftover localStorage data
    window.localStorage.removeItem('arbflow_records');
    window.localStorage.removeItem('arbflow_data_version');
    // Load from Firestore
    const doc = await db.collection('users').doc(userUid).collection('properties').doc('records').get();
    if(doc.exists){
      const data = doc.data();
      records = JSON.parse(data.data || '[]');
      records.forEach(r => { if(!r.propertyDetails) r.propertyDetails={}; if(!r.propertyNotes) r.propertyNotes=[]; if(r.status==='No Longer Interested') r.status='Not Interested'; if(r.status==='Lost') r.status='Not Interested'; });
    } else {
      records = [];
    }
  } catch(e){
    console.error('Failed to load data from Firestore:', e);
    records = [];
  }
  render();
}

function saveData(){
  // Debounce Firestore writes to avoid excessive calls
  if(_saveTimeout) clearTimeout(_saveTimeout);
  _saveTimeout = setTimeout(() => {
    if(_currentUid && typeof db !== 'undefined'){
      db.collection('users').doc(_currentUid).collection('properties').doc('records').set({ 
        data: JSON.stringify(records),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }).catch(e => console.error('Failed to save data:', e));
    }
  }, 1000);
}

/* ===== VIEW ROUTER ===== */
let _handlingPopstate = false;

function switchView(view){
  currentView = view;
  currentProfileId = null;
  clearSearch();
  const navView = view === 'pipeline' ? 'dashboard' : view;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === navView));
  const titles = { dashboard:'Dashboard', pipeline:'Pipeline', contacts:'All Contacts', notifications:'Notifications', pricing:'Your Plan', settings:'Settings' };
  document.getElementById('headerTitle').textContent = titles[view] || '';
  if(!_handlingPopstate) history.pushState({ view: view, profileId: null }, '', '#' + view);
  saveViewState();
  render();
}

function saveViewState(){
  try {
    sessionStorage.setItem('rr_view', currentView);
    sessionStorage.setItem('rr_profileId', currentProfileId || '');
    sessionStorage.setItem('rr_prevView', previousView);
  } catch(e){}
}

function restoreViewState(){
  try {
    const v = sessionStorage.getItem('rr_view');
    const pid = sessionStorage.getItem('rr_profileId');
    const pv = sessionStorage.getItem('rr_prevView');
    const pt = sessionStorage.getItem('rr_profileTab');
    if(v) currentView = v;
    if(pid) currentProfileId = pid;
    if(pv) previousView = pv;
    if(pt) profileActiveTab = pt;
  } catch(e){}
}

function render(){
  closeInlineStatusDD();
  const area = document.getElementById('contentArea');
  area.style.paddingTop = currentView === 'profile' ? '0' : '';
  switch(currentView){
    case 'dashboard': area.innerHTML = renderDashboard(); break;
    case 'pipeline': pipelineCategory=pipelineCategory||'prospects'; currentView='dashboard'; area.innerHTML = renderDashboard(); document.querySelector('.pipeline-category-tabs')?.scrollIntoView({behavior:'smooth',block:'nearest'}); break;
    case 'contacts': area.innerHTML = renderContacts(); break;
    case 'notifications': area.innerHTML = renderNotifications(); break;
    case 'profile': area.innerHTML = renderProfile(); break;
    case 'pricing': area.innerHTML = renderPricing(); break;
    case 'settings': area.innerHTML = renderSettings(); break;
  }
  updateNotifBadges();
  // Set up paste handlers for Activity Log editors
  if(currentView === 'profile' && currentProfileId){
    requestAnimationFrame(() => {
      setupNotePasteHandler('newNoteRte_'+currentProfileId, currentProfileId);
    });
  }
}

/* ===== DASHBOARD ===== */
function renderDashboard(){
  const counts = {};
  STATUSES.forEach(s => counts[s] = 0);
  records.forEach(r => { counts[r.status] = (counts[r.status]||0)+1 });
  const total = records.length;
  const withContact = records.filter(r => r.name || r.phone || r.email).length;
  const active = records.filter(r => PIPELINE_STAGES.includes(r.status)).length;
  const followUps = getFollowUps();
  const overdue = followUps.filter(f => f.type === 'overdue');
  const todayFU = followUps.filter(f => f.type === 'today');
  const upcomingFU = followUps.filter(f => f.type === 'upcoming').slice(0,5);
  const hotLeads = (counts['Interested']||0) + (counts['Meeting']||0);
  const closed = records.filter(r => CLOSED_STAGES.includes(r.status)).length;

  // Meetings upcoming
  const today = new Date().toISOString().split('T')[0];
  const meetings = records.filter(r => r.meetingDate && r.meetingDate >= today)
    .sort((a,b) => a.meetingDate.localeCompare(b.meetingDate)).slice(0,5);
  const pastMeetings = records.filter(r => r.meetingDate && r.meetingDate < today).length;

  // Recent activity — latest notes and status changes
  const recentActivity = records.filter(r => r.date).sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0,6);

  // Needs attention: Follow Up status but no date, or no contact info on active leads
  const needsFollowUp = records.filter(r => r.status === 'Follow Up' && !r.followUpDate);
  const noContact = records.filter(r => PIPELINE_STAGES.includes(r.status) && !r.name && !r.phone && !r.email);

  // Funnel stages
  const funnelStages = [
    { name:'New Leads', statuses:['New','No Contact'], color:'#818cf8', catKey:'prospects' },
    { name:'In Outreach', statuses:['Messaged','Left Voicemail','Follow Up'], color:'#38bdf8', catKey:'outreach' },
    { name:'Qualified', statuses:['Interested','Meeting'], color:'#34d399', catKey:'qualified' }
  ];
  funnelStages.forEach(s => { s.count = records.filter(r => s.statuses.includes(r.status)).length });

  // Conversion rate
  const contacted = records.filter(r => !['New','No Contact'].includes(r.status)).length;
  const convRate = total > 0 ? ((hotLeads/total)*100).toFixed(1) : '0.0';

  let h = '<div class="db-grid">';

  // ── KPI CARDS ──
  h += '<div class="db-kpis">';
  h += `<div class="db-kpi" onclick="switchView('contacts')" style="cursor:pointer"><div class="kpi-icon" style="background:rgba(99,129,250,.12);color:var(--primary)">📋</div><div class="kpi-val">${total}</div><div class="kpi-label">Total Properties</div><div class="kpi-sub">${withContact} with contacts</div></div>`;
  h += `<div class="db-kpi" onclick="pipelineCategory='prospects';render();document.querySelector('.pipeline-category-tabs')?.scrollIntoView({behavior:'smooth',block:'nearest'})" style="cursor:pointer"><div class="kpi-icon" style="background:rgba(56,189,248,.12);color:#38bdf8">🔄</div><div class="kpi-val">${active}</div><div class="kpi-label">Active Pipeline</div><div class="kpi-sub">${closed} closed/lost</div></div>`;
  h += `<div class="db-kpi" onclick="pipelineCategory='qualified';render();document.querySelector('.pipeline-category-tabs')?.scrollIntoView({behavior:'smooth',block:'nearest'})" style="cursor:pointer"><div class="kpi-icon" style="background:rgba(52,211,153,.12);color:#34d399">🔥</div><div class="kpi-val">${hotLeads}</div><div class="kpi-label">Hot Leads</div><div class="kpi-sub">${convRate}% qualification rate</div></div>`;
  h += `<div class="db-kpi" onclick="switchView('notifications')" style="cursor:pointer"><div class="kpi-icon" style="background:${overdue.length?'rgba(239,68,68,.12)':'rgba(52,211,153,.12)'};color:${overdue.length?'var(--danger)':'var(--success)'}">📅</div><div class="kpi-val" style="color:${overdue.length?'var(--danger)':'var(--text)'}">${followUps.length}</div><div class="kpi-label">Follow-Ups Due</div><div class="kpi-sub">${overdue.length} overdue${todayFU.length ? ', '+todayFU.length+' today' : ''}</div></div>`;
  h += `<div class="db-kpi"><div class="kpi-icon" style="background:rgba(168,85,247,.12);color:#a855f7">📅</div><div class="kpi-val">${meetings.length}</div><div class="kpi-label">Upcoming Meetings</div><div class="kpi-sub">${pastMeetings} completed</div></div>`;
  h += '</div>';

  // ── PIPELINE (funnel bar + category tabs + property cards) ──
  const activeCat = pipelineCategory || 'all';
  const cats = FUNNEL_CATEGORIES.map(c => ({
    ...c,
    count: records.filter(r => c.statuses.includes(r.status)).length,
    records: records.filter(r => c.statuses.includes(r.status))
  }));
  const allActive = records.filter(r => PIPELINE_STAGES.includes(r.status));
  const lostRecords = records.filter(r => CLOSED_STAGES.includes(r.status));
  const lostCount = lostRecords.length;

  h += '<div class="db-card">';
  h += '<div class="db-card-hdr"><h3>📊 Pipeline</h3><span class="db-hdr-action" onclick="switchView(\'contacts\')">All Contacts →</span></div>';
  h += '<div class="db-card-body">';

  // Pipeline visual boxes — trashcan style for each category
  const boxMeta = [
    { key:'prospects', col:'129,140,248', icon:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>', label:'New Leads' },
    { key:'outreach', col:'56,189,248', icon:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>', label:'In Outreach' },
    { key:'qualified', col:'52,211,153', icon:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>', label:'Qualified' },
    { key:'lost', col:'239,68,68', icon:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>', label:'Closed/Lost' }
  ];
  if(active > 0 || lostCount > 0){
    // Compute counts and total for proportional widths
    const boxCounts = boxMeta.map(m => m.key === 'lost' ? lostCount : (cats.find(x => x.key===m.key)?.count || 0));
    const boxTotal = boxCounts.reduce((a,b) => a+b, 0) || 1;
    h += '<div class="db-pipeline-boxes">';
    boxMeta.forEach((m, i) => {
      const count = boxCounts[i];
      const isActive = activeCat === m.key;
      const bg = isActive ? 'rgba('+m.col+',.22)' : 'rgba('+m.col+',.08)';
      const border = isActive ? 'rgb('+m.col+')' : 'rgba('+m.col+',.25)';
      const shadow = isActive ? 'box-shadow:0 0 0 3px rgba('+m.col+',.2)' : '';
      const pct = Math.max((count/boxTotal)*100, count > 0 ? 12 : 8);
      h += `<div class="db-pipeline-box ${isActive?'active':''}" onclick="pipelineCategory='${m.key}';render()" style="color:rgb(${m.col});background:${bg};border-color:${border};${shadow};flex:${pct} 0 0">
        <span class="pb-icon">${m.icon}</span>
        <span class="pb-count">${count}</span>
      </div>`;
    });
    h += '</div>';
  } else {
    h += '<div class="db-empty">No properties yet. Add your first property to see your pipeline.</div>';
  }

  // Category tabs — simple colored text tabs
  const catColors = { prospects:'#818cf8', outreach:'#38bdf8', qualified:'#34d399' };
  h += `<div class="pipeline-category-tabs" style="margin-top:14px">
    ${cats.map(c => {
      const isActive = activeCat===c.key;
      const col = catColors[c.key];
      return `<div class="pipeline-cat-tab ${isActive?'active':''}" onclick="pipelineCategory='${c.key}';render()" style="color:${col};${isActive?'border-bottom-color:'+col:''}">${c.name} <span class="pct-count">${c.count}</span></div>`;
    }).join('')}
    <div class="pipeline-cat-tab ${activeCat==='lost'?'active':''}" onclick="pipelineCategory='lost';render()" style="color:var(--danger);${activeCat==='lost'?'border-bottom-color:var(--danger)':''}">Closed/Lost <span class="pct-count">${lostCount}</span></div>
  </div>`;

  // Status breakdown for selected category — clicking navigates to Contacts
  const isLost = activeCat === 'lost';
  const catStatuses = isLost ? CLOSED_STAGES : (cats.find(c => c.key === activeCat)?.statuses || []);
  const statusItems = catStatuses.map(st => ({ status: st, count: records.filter(r => r.status === st).length }));

  // Fixed height: max 4 status rows (Closed/Lost) — keeps card from jumping
  const maxStatusRows = Math.max(...[...FUNNEL_CATEGORIES.map(c => c.statuses.length), CLOSED_STAGES.length]);
  if(statusItems.length > 0){
    h += `<div class="db-status-breakdown" style="min-height:${maxStatusRows * 38}px">`;
    statusItems.forEach(s => {
      const catColor = isLost ? 'var(--danger)' : (funnelStages.find(fs => fs.statuses.includes(s.status))?.color || 'var(--primary)');
      h += `<div class="db-status-row" onclick="filterStatus='${s.status}';switchView('contacts')">
        <div class="db-status-pill-wrap">${statusPill(s.status)}</div>
        <div class="db-status-bar-track"><div class="db-status-bar-fill" style="width:${total > 0 ? Math.max((s.count/total)*100, s.count > 0 ? 3 : 0) : 0}%;background:${catColor}"></div></div>
        <div class="db-status-count">${s.count}</div>
        <svg class="db-status-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </div>`;
    });
    h += '</div>';
  }

  h += '</div></div>';

  // ── MIDDLE ROW: Tasks + Meetings ──
  h += '<div class="db-row">';

  // Today's Tasks & Follow-Ups
  h += '<div class="db-card">';
  h += '<div class="db-card-hdr"><h3>✅ Tasks & Follow-Ups</h3><span class="db-hdr-action" onclick="switchView(\'notifications\')">View All →</span></div>';
  h += '<div class="db-card-body no-pad">';
  const taskItems = [...overdue, ...todayFU, ...upcomingFU, ...needsFollowUp.slice(0,3)];
  if(taskItems.length > 0){
    h += '<ul class="db-task-list">';
    overdue.forEach(r => {
      h += `<li class="db-task-item" onclick="openDetail('${r.id}')"><div class="db-task-dot" style="background:var(--danger)"></div><div class="db-task-info"><div class="db-task-property">${truncate(r.property,35)}</div><div class="db-task-meta">Follow up · ${r.name||'No contact'}</div></div><div class="db-task-date" style="color:var(--danger)">Overdue ${Math.abs(r.diff)}d</div></li>`;
    });
    todayFU.forEach(r => {
      h += `<li class="db-task-item" onclick="openDetail('${r.id}')"><div class="db-task-dot" style="background:var(--warning)"></div><div class="db-task-info"><div class="db-task-property">${truncate(r.property,35)}</div><div class="db-task-meta">Follow up · ${r.name||'No contact'}</div></div><div class="db-task-date" style="color:var(--warning)">Today</div></li>`;
    });
    upcomingFU.forEach(r => {
      const dLabel = r.diff === -1 ? 'Tomorrow' : fmtDate(r.followUpDate);
      h += `<li class="db-task-item" onclick="openDetail('${r.id}')"><div class="db-task-dot" style="background:var(--info)"></div><div class="db-task-info"><div class="db-task-property">${truncate(r.property,35)}</div><div class="db-task-meta">Follow up · ${r.name||'No contact'}</div></div><div class="db-task-date" style="color:var(--info)">${dLabel}</div></li>`;
    });
    needsFollowUp.slice(0,3).forEach(r => {
      h += `<li class="db-task-item" onclick="openDetail('${r.id}')"><div class="db-task-dot" style="background:var(--text3)"></div><div class="db-task-info"><div class="db-task-property">${truncate(r.property,35)}</div><div class="db-task-meta">Needs follow-up date</div></div><div class="db-task-date" style="color:var(--text3)">No date</div></li>`;
    });
    h += '</ul>';
  } else {
    h += '<div class="db-empty">All caught up! No pending tasks.</div>';
  }
  h += '</div></div>';

  // Upcoming Meetings
  h += '<div class="db-card">';
  h += '<div class="db-card-hdr"><h3>📅 Upcoming Meetings</h3></div>';
  h += '<div class="db-card-body no-pad">';
  if(meetings.length > 0){
    h += '<ul class="db-task-list">';
    meetings.forEach(r => {
      const isToday = r.meetingDate === today;
      h += `<li class="db-task-item" onclick="openDetail('${r.id}')"><div class="db-task-dot" style="background:${isToday?'var(--warning)':'var(--primary)'}"></div><div class="db-task-info"><div class="db-task-property">${truncate(r.property,35)}</div><div class="db-task-meta">${r.name||'No contact'}${r.meetingTime ? ' · '+r.meetingTime : ''}</div></div><div class="db-task-date" style="color:${isToday?'var(--warning)':'var(--primary)'}">${isToday ? 'Today' : fmtDate(r.meetingDate)}</div></li>`;
    });
    h += '</ul>';
  } else {
    h += '<div class="db-empty">No upcoming meetings scheduled.</div>';
  }
  h += '</div></div>';

  h += '</div>'; // end db-row

  // ── BOTTOM ROW: Recent Activity + Insights ──
  h += '<div class="db-row">';

  // Recent Activity
  h += '<div class="db-card">';
  h += '<div class="db-card-hdr"><h3>🕐 Recent Activity</h3><span class="db-hdr-action" onclick="switchView(\'contacts\')">All Contacts →</span></div>';
  h += '<div class="db-card-body no-pad">';
  if(recentActivity.length > 0){
    recentActivity.forEach(r => {
      const lastNote = r.notes && r.notes.length > 0 ? r.notes[r.notes.length - 1] : null;
      const noteSnippet = lastNote ? (lastNote.html ? lastNote.html.replace(/<[^>]+>/g,' ').substring(0,50) : (lastNote.text||'').substring(0,50)) : '';
      h += `<div class="db-recent-item" onclick="openDetail('${r.id}')">${statusPill(r.status)}<div class="db-recent-prop">${truncate(r.property,30)}${noteSnippet ? ' <span style="color:var(--text3);font-weight:400;font-size:.76rem">— '+esc(noteSnippet)+'</span>' : ''}</div><div class="db-recent-date">${fmtDate(r.date)}</div></div>`;
    });
  } else {
    h += '<div class="db-empty">No recent activity yet.</div>';
  }
  h += '</div></div>';

  // Insights & Quick Stats
  h += '<div class="db-card">';
  h += '<div class="db-card-hdr"><h3>💡 Insights</h3></div>';
  h += '<div class="db-card-body">';
  const insights = [];
  if(overdue.length > 0) insights.push({ icon:'⚠️', bg:'rgba(239,68,68,.1)', text:`<strong>${overdue.length} overdue follow-up${overdue.length>1?'s':''}</strong> need${overdue.length===1?'s':''} attention today` });
  if(noContact.length > 0) insights.push({ icon:'👤', bg:'rgba(245,158,11,.1)', text:`<strong>${noContact.length} active lead${noContact.length>1?'s':''}</strong> missing contact info` });
  const newCount = counts['New']||0;
  if(newCount > 0) insights.push({ icon:'🆕', bg:'rgba(129,140,248,.1)', text:`<strong>${newCount} new propert${newCount>1?'ies':'y'}</strong> waiting for outreach` });
  if(contacted > 0 && total > 0) insights.push({ icon:'📈', bg:'rgba(56,189,248,.1)', text:`<strong>${((contacted/total)*100).toFixed(0)}%</strong> contact rate — ${contacted} of ${total} properties reached` });
  if(hotLeads > 0) insights.push({ icon:'🔥', bg:'rgba(52,211,153,.1)', text:`<strong>${hotLeads} hot lead${hotLeads>1?'s':''}</strong> in Interested or Meeting stage` });
  const messaged = counts['Messaged']||0;
  const voicemail = counts['Left Voicemail']||0;
  if(messaged + voicemail > 0) insights.push({ icon:'📤', bg:'rgba(56,189,248,.1)', text:`<strong>${messaged + voicemail}</strong> in outreach — ${messaged} messaged, ${voicemail} voicemail` });
  if(closed > 0 && total > 0) insights.push({ icon:'📊', bg:'rgba(239,68,68,.08)', text:`<strong>${((closed/total)*100).toFixed(0)}%</strong> loss rate — ${closed} of ${total} properties closed or lost` });

  if(insights.length > 0){
    insights.slice(0,6).forEach(ins => {
      h += `<div class="db-insight-row"><div class="db-insight-icon" style="background:${ins.bg}">${ins.icon}</div><div class="db-insight-text">${ins.text}</div></div>`;
    });
  } else {
    h += '<div class="db-empty">Add properties to start seeing insights.</div>';
  }
  h += '</div></div>';

  h += '</div>'; // end db-row

  h += '</div>'; // end db-grid

  return h;
}

/* ===== PIPELINE ===== */
const FUNNEL_CATEGORIES = [
  { key:'prospects', name:'New Leads', statuses:['New','No Contact'], color:'#818cf8' },
  { key:'outreach', name:'In Outreach', statuses:['Messaged','Left Voicemail','Follow Up'], color:'#38bdf8' },
  { key:'qualified', name:'Qualified', statuses:['Interested','Meeting'], color:'#34d399' },
];

function renderPipeline(){
  let html = '<div style="margin-bottom:12px"><span style="font-size:.78rem;color:var(--primary);cursor:pointer;display:inline-flex;align-items:center;gap:4px" onclick="switchView(\'dashboard\')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back to Dashboard</span></div>';
  html += renderFunnel(records);

  // Category tabs
  const allActive = records.filter(r => PIPELINE_STAGES.includes(r.status));
  const cats = FUNNEL_CATEGORIES.map(c => ({
    ...c,
    count: records.filter(r => c.statuses.includes(r.status)).length,
    records: records.filter(r => c.statuses.includes(r.status))
  }));

  const activeCat = pipelineCategory || 'all';

  const lostCount = records.filter(r => CLOSED_STAGES.includes(r.status)).length;
  html += `<div class="pipeline-category-tabs">
    <div class="pipeline-cat-tab ${activeCat==='all'?'active':''}" onclick="pipelineCategory='all';pipelineSubCategory=null;render()">All Active <span class="pct-count">${allActive.length}</span></div>
    ${cats.map(c => `<div class="pipeline-cat-tab ${activeCat===c.key?'active':''}" onclick="pipelineCategory='${c.key}';pipelineSubCategory=null;render()">${c.name} <span class="pct-count">${c.count}</span></div>`).join('')}
    ${lostCount > 0 ? `<div class="pipeline-cat-tab ${activeCat==='lost'?'active':''}" onclick="pipelineCategory='lost';pipelineSubCategory=null;render()" style="${activeCat==='lost'?'color:var(--danger);border-bottom-color:var(--danger)':''}">🗑 Lost <span class="pct-count">${lostCount}</span></div>` : ''}
  </div>`;

  // Sub-category chips (only when a specific category is selected, not "all")
  if(activeCat !== 'all'){
    const isLost = activeCat === 'lost';
    const cat = isLost ? { name:'Lost', statuses:CLOSED_STAGES, count:records.filter(r=>CLOSED_STAGES.includes(r.status)).length } : cats.find(c => c.key === activeCat);
    if(cat && cat.statuses.length > 1){
      html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
        <span class="chip ${!pipelineSubCategory?'active':''}" onclick="pipelineSubCategory=null;render()">All ${cat.name} (${cat.count})</span>
        ${cat.statuses.map(st => {
          const cnt = records.filter(r => r.status === st).length;
          return cnt > 0 ? `<span class="chip ${pipelineSubCategory===st?'active':''}" onclick="pipelineSubCategory='${st}';render()">${st} (${cnt})</span>` : '';
        }).join('')}
      </div>`;
    }
  }

  // Get records for selected category
  let displayRecords;
  if(activeCat === 'all'){
    displayRecords = allActive;
  } else if(activeCat === 'lost'){
    displayRecords = records.filter(r => CLOSED_STAGES.includes(r.status));
    if(pipelineSubCategory) displayRecords = displayRecords.filter(r => r.status === pipelineSubCategory);
  } else {
    const cat = cats.find(c => c.key === activeCat);
    displayRecords = cat ? cat.records : [];
    if(pipelineSubCategory) displayRecords = displayRecords.filter(r => r.status === pipelineSubCategory);
  }

  // Apply search filter if active
  if(searchQuery){
    const words = searchQuery.split(/\s+/).filter(w => w.length > 0);
    displayRecords = displayRecords.filter(r => {
      const blob = [r.property, r.name, r.phone, r.email, r.status].filter(Boolean).join(' ').toLowerCase();
      return words.every(w => blob.includes(w));
    });
  }

  if(displayRecords.length === 0){
    html += '<div style="text-align:center;padding:40px;color:var(--text3);font-size:.9rem">No properties in this category</div>';
  } else {
    html += '<div class="pipeline-list">';
    displayRecords.forEach(r => {
      const d = r.propertyDetails || {};
      const rent = d.monthlyRent ? '$'+Number(d.monthlyRent).toLocaleString()+'/mo' : '';
      html += `<div class="pipeline-card" onclick="openDetail('${r.id}')">
        <div class="plc-main">
          <div class="plc-property">${esc(r.property)}</div>
          ${r.name ? `<div class="plc-name">${esc(r.name)}</div>` : ''}
          <div class="plc-meta">
            ${rent ? `<span>${rent}</span>` : ''}
            ${d.bedrooms ? `<span>${d.bedrooms} bd</span>` : ''}
            ${d.bathrooms ? `<span>${d.bathrooms} ba</span>` : ''}
            ${r.phone ? `<span>📞 ${esc(r.phone)}</span>` : ''}
            ${r.date ? `<span>${fmtDate(r.date)}</span>` : ''}
          </div>
        </div>
        <div class="plc-status">${statusPill(r.status)}</div>
      </div>`;
    });
    html += '</div>';
  }

  return html;
}

function renderFunnel(allRecords){
  const total = allRecords.length;
  if(total === 0) return '';

  // Three funnel stages (grouped)
  const stages = [
    { name:'Prospects', statuses:['New','No Contact'], color:'#818cf8', label:'New Leads' },
    { name:'Outreach', statuses:['Messaged','Left Voicemail','Follow Up'], color:'#38bdf8', label:'In Outreach' },
    { name:'Qualified', statuses:['Interested','Meeting'], color:'#34d399', label:'Qualified' },
  ];

  stages.forEach(s => {
    s.count = allRecords.filter(r => s.statuses.includes(r.status)).length;
    s.pct = total > 0 ? (s.count / total * 100).toFixed(1) : 0;
    s.breakdown = s.statuses.map(st => ({ status:st, count:allRecords.filter(r=>r.status===st).length }));
  });

  const leakedCounts = CLOSED_STAGES.map(s => ({ stage:s, count:allRecords.filter(r=>r.status===s).length })).filter(s=>s.count>0);
  const totalLeaked = leakedCounts.reduce((a,b)=>a+b.count,0);
  const contacted = allRecords.filter(r => !['New','No Contact'].includes(r.status)).length;
  const hot = allRecords.filter(r => ['Interested','Meeting'].includes(r.status)).length;

  // SVG horizontal funnel — fixed shape, 3 sections
  const W = 700, H = 120;
  const topY = 0, botY = H;
  // Trapezoid narrows left to right: leftH=full, rightH=narrow
  const sections = [
    { x1:0, x2:W*0.40, topL:0, topR:H*0.12, botL:H, botR:H*0.88 },
    { x1:W*0.40+2, x2:W*0.72, topL:H*0.12, topR:H*0.30, botL:H*0.88, botR:H*0.70 },
    { x1:W*0.72+2, x2:W, topL:H*0.30, topR:H*0.42, botL:H*0.70, botR:H*0.58 },
  ];

  // Build labels row above funnel
  const labelWidths = ['40%','32%','28%'];
  let labelsHtml = '<div class="funnel-labels">';
  stages.forEach((s, i) => {
    labelsHtml += `<div class="funnel-label" style="width:${labelWidths[i]};color:${s.color}">${s.label}</div>`;
  });
  labelsHtml += '</div>';

  // Build SVG funnel — numbers and percentages only, large and prominent
  const catKeys = ['prospects','outreach','qualified'];
  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  stages.forEach((s, i) => {
    const sec = sections[i];
    const points = `${sec.x1},${sec.topL} ${sec.x2},${sec.topR} ${sec.x2},${sec.botR} ${sec.x1},${sec.botL}`;
    const cx = (sec.x1 + sec.x2) / 2;
    const cy = H / 2;
    svg += `<polygon class="funnel-stage" points="${points}" fill="${s.color}" onclick="pipelineCategory='${catKeys[i]}';pipelineSubCategory=null;render()"/>`;
    svg += `<text x="${cx}" y="${cy+6}" text-anchor="middle" fill="#fff" font-size="18" font-weight="800" style="pointer-events:none;text-shadow:0 1px 4px rgba(0,0,0,.35)">${s.count} <tspan fill="rgba(255,255,255,.7)" font-size="13" font-weight="600">(${s.pct}%)</tspan></text>`;
  });
  svg += `</svg>`;

  let html = `<div class="funnel-wrap">
    <div class="funnel-header"><h3>Pipeline Funnel</h3><div class="fh-total">${total} total leads</div></div>
    ${labelsHtml}
    <div class="funnel-svg-wrap">${svg}</div>`;

  // KPI bar
  html += `<div class="funnel-conversion">
    <div class="funnel-kpi"><div class="fk-value" style="color:var(--primary)">${total}</div><div class="fk-label">Total Leads</div></div>
    <div class="funnel-kpi"><div class="fk-value" style="color:var(--info)">${contacted}</div><div class="fk-label">Contacted</div></div>

  </div>`;

  // Lost section — separate from funnel
  if(totalLeaked > 0){
    html += `<div style="margin-top:12px;padding:12px 16px;background:var(--bg);border-radius:var(--radius);display:flex;align-items:center;gap:14px;cursor:pointer" onclick="pipelineCategory='lost';pipelineSubCategory=null;render()">
      <div style="width:36px;height:36px;border-radius:50%;background:var(--danger-light);display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
      </div>
      <div style="flex:1">
        <div style="font-size:.88rem;font-weight:600;color:var(--danger)">Lost</div>
        <div style="font-size:.75rem;color:var(--text3)">${leakedCounts.map(s => s.stage+' ('+s.count+')').join(' · ')}</div>
      </div>
      <div style="font-size:1.3rem;font-weight:700;color:var(--danger)">${totalLeaked}</div>
      <div style="font-size:.75rem;color:var(--text3)">${total>0?(totalLeaked/total*100).toFixed(1):0}%</div>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </div>`;
  }

  html += `</div>`;

  return html;
}

/* ===== NOTIFICATIONS ===== */
function getFollowUps(){
  const now = new Date();
  const today = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  return records.filter(r => r.followUpDate).map(r => {
    const diff = daysDiff(today, r.followUpDate);
    let type = 'upcoming';
    if(diff > 0) type = 'overdue';
    else if(diff === 0) type = 'today';
    return { ...r, type, diff };
  }).sort((a,b) => b.diff - a.diff);
}

function getFollowUpStatus(r){
  if(!r.followUpDate) return null;
  const today = new Date().toISOString().split('T')[0];
  const diff = daysDiff(today, r.followUpDate);
  if(diff > 0) return { type:'overdue', diff };
  if(diff === 0) return { type:'today', diff:0 };
  return { type:'upcoming', diff };
}

function renderNotifications(){
  const followUps = getFollowUps();
  const overdue = followUps.filter(f => f.type==='overdue');
  const today = followUps.filter(f => f.type==='today');
  const upcoming = followUps.filter(f => f.type==='upcoming');

  // Also show Follow Up status records without followUpDate as needing attention
  const needsFollowUp = records.filter(r => r.status === 'Follow Up' && !r.followUpDate);

  if(!followUps.length && !needsFollowUp.length){
    return `<div style="text-align:center;padding:60px 20px;color:var(--text3)">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:12px;opacity:.4"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
      <div style="font-size:1rem;font-weight:600;margin-bottom:4px">All caught up!</div>
      <div>No pending follow-ups. Set a follow-up date on any record to get reminders here.</div>
    </div>`;
  }

  return `<div style="max-width:700px">
    ${overdue.length ? `<div class="notif-section"><h3><span class="dot" style="background:var(--danger)"></span> Overdue (${overdue.length})</h3>${overdue.map(r => renderNotifCard(r)).join('')}</div>` : ''}
    ${today.length ? `<div class="notif-section"><h3><span class="dot" style="background:var(--warning)"></span> Due Today (${today.length})</h3>${today.map(r => renderNotifCard(r)).join('')}</div>` : ''}
    ${upcoming.length ? `<div class="notif-section"><h3><span class="dot" style="background:var(--info)"></span> Upcoming (${upcoming.length})</h3>${upcoming.map(r => renderNotifCard(r)).join('')}</div>` : ''}
    ${needsFollowUp.length ? `<div class="notif-section"><h3><span class="dot" style="background:var(--text3)"></span> Needs Follow-Up Date (${needsFollowUp.length})</h3>${needsFollowUp.map(r => `
      <div class="notif-card" onclick="openDetail('${r.id}')" style="border-left:3px solid var(--text3)">
        <div class="notif-icon" style="background:var(--bg);color:var(--text3)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div>
        <div class="notif-content">
          <div class="nc-property">${r.property}</div>
          <div class="nc-detail">${r.name||'Unknown'} — Status: Follow Up, no date set</div>
        </div>
      </div>`).join('')}</div>` : ''}
  </div>`;
}

function renderNotifCard(r){
  const labels = { overdue:'Overdue by '+Math.abs(r.diff)+' day'+(Math.abs(r.diff)>1?'s':''), today:'Due today', upcoming:'Due '+fmtDate(r.followUpDate) };
  return `<div class="notif-card ${r.type}" onclick="openDetail('${r.id}')">
    <div class="notif-icon ${r.type}"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/></svg></div>
    <div class="notif-content">
      <div class="nc-property">${r.property}</div>
      <div class="nc-detail">${r.name||'Unknown contact'} ${r.phone?'• '+r.phone:''}</div>

    </div>

}

function openDetail(id){

  r.lastAccessed = new Date().toISOString();
  if(!r.propertyDetails) r.propertyDetails = {};
  if(!r.propertyNotes) r.propertyNotes = [];
  saveData();
  previousView = currentView;
  currentProfileId = id;
  currentView = 'profile';
  document.getElementById('searchAutocomplete')?.classList.remove('visible');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('headerTitle').textContent = 'Property Profile';
  if(!_handlingPopstate) history.pushState({ view: 'profile', profileId: id, previousView: previousView }, '', '#profile/' + id);
  saveViewState();
  render();
  window.scrollTo(0,0);
  // Check for pending comps from extension
  checkPendingExtensionComps();
}

  currentProfileId = null;
  switchView(previousView);
}

/* ===== PLATFORM DETECTION ===== */
function detectPlatform(url){
  if(!url) return { name:'Unknown', icon:'🔗', color:'var(--text3)' };
  const u = url.toLowerCase();
  if(u.includes('apartments.com')) return { name:'Apartments.com', icon:'🏢', color:'#e2231a' };
  if(u.includes('hotpads.com')) return { name:'HotPads', icon:'📍', color:'#46a049' };
  if(u.includes('zillow.com')) return { name:'Zillow', icon:'🏠', color:'#006aff' };
  if(u.includes('facebook.com') || u.includes('fb.com')) return { name:'Facebook', icon:'📘', color:'#1877f2' };
  if(u.includes('craigslist.org')) return { name:'Craigslist', icon:'📋', color:'#5a0e8e' };
  if(u.includes('realtor.com')) return { name:'Realtor.com', icon:'🏡', color:'#d92228' };
  if(u.includes('trulia.com')) return { name:'Trulia', icon:'🗺️', color:'#53b50a' };
  if(u.includes('redfin.com')) return { name:'Redfin', icon:'🔴', color:'#a02021' };
  if(u.includes('airbnb.com')) return { name:'Airbnb', icon:'🏘️', color:'#ff5a5f' };
  if(u.includes('vrbo.com')) return { name:'VRBO', icon:'🌴', color:'#3c67f0' };
  if(u.includes('furnished')) return { name:'Furnished Finder', icon:'🛋️', color:'#f79c42' };
  if(u.includes('rent.com')) return { name:'Rent.com', icon:'🔑', color:'#ff6f00' };
  if(u.includes('zumper.com')) return { name:'Zumper', icon:'🏙️', color:'#1c8dd9' };
  return { name: new URL(url).hostname.replace('www.',''), icon:'🔗', color:'var(--primary)' };
}

/* ===== RENDER PROFILE ===== */
function renderProfile(){
  try { return _renderProfileInner(); } catch(e) {
    console.error('[RR] renderProfile crashed for', currentProfileId, e);
    const r = records.find(x => x.id === currentProfileId);
    if(r) { console.error('[RR] Record data:', JSON.stringify({
      id:r.id, property:r.property, name:r.name, notesCount:r.notes?.length,
      noteTypes: r.notes?.map(n=>n.type), noteHasImages: r.notes?.map(n=>!!(n.images&&n.images.length)),
      noteTexts: r.notes?.map(n=>(n.text||'').substring(0,80)),
      noteHtmlSnippets: r.notes?.map(n=>(n.html||'').substring(0,80)),
      hasPropertyNote: !!r.propertyNote,
      propertyNoteSnippet: r.propertyNote ? (r.propertyNote.html||r.propertyNote.text||'').substring(0,80) : null
    })); }
    return '<div style="padding:20px;color:var(--danger)">Error rendering profile. Check browser console (F12) for details.<br><pre style="font-size:.75rem;margin-top:8px;white-space:pre-wrap">'+e.message+'</pre></div>';
  }
}
function _renderProfileInner(){
  const r = records.find(x => x.id === currentProfileId);
  if(!r) return '<div>Record not found</div>';
  const d = r.propertyDetails || {};
  const plat = detectPlatform(r.link);
  const hasDetails = Object.keys(d).some(k => d[k] && (Array.isArray(d[k]) ? d[k].length > 0 : true));
  const showImport = r.link && !hasDetails;
  const activeTab = profileActiveTab || 'details';
  const calcOk = requireTier('basic','Pro Forma');
  const proOk = requireTier('basic','Property Analysis');

  const heroMarket = d.market || '';
  const heroSubmarket = d.submarket || '';

function renderSectionFields(recId, d, section){

  const multiFields = section.fields.filter(f => f.t === 'multi');

  if(selectFields.length){
    html += '<div class="prop-field-grid">';

        html += `<div class="prop-field"><label>${f.l}</label><select onchange="savePropDetail('${recId}','${f.k}',this.value)">${(f.o||[]).map(o=>`<option value="${o}" ${val===o?'selected':''}>${o||'—'}</option>`).join('')}</select></div>`;
      } else if(f.t === 'date'){
        html += `<div class="prop-field"><label>${f.l}</label><input type="date" value="${val}" onchange="savePropDetail('${recId}','${f.k}',this.value)"></div>`;
      } else if(f.t === 'number'){
        html += `<div class="prop-field"><label>${f.l}</label><input type="number" value="${val}" onchange="savePropDetail('${recId}','${f.k}',this.value)" placeholder="—"></div>`;
      } else if(f.t === 'bool'){
        html += `<div class="prop-field"><label>${f.l}</label><select onchange="savePropDetail('${recId}','${f.k}',this.value)"><option value="" ${!val?'selected':''}>—</option><option value="Yes" ${val==='Yes'?'selected':''}>Yes</option><option value="No" ${val==='No'?'selected':''}>No</option></select></div>`;
      } else {
        html += `<div class="prop-field"><label>${f.l}</label><input type="text" value="${esc(val)}" onchange="savePropDetail('${recId}','${f.k}',this.value)" placeholder="—"></div>`;
      }
    });
    html += '</div>';
  }

  multiFields.forEach(f => {
    const selected = d[f.k] || [];
    const hasSelections = selected.length > 0;
    html += `<div class="multi-field-row" style="margin-top:${selectFields.length?'12':'0'}px" onclick="openMultiEditor('${recId}','${f.k}')" title="Click to edit">`;
    html += `<label style="display:block;font-size:.73rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px">${f.l} <svg class="multi-edit-icon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></label>`;
    if(hasSelections){
      html += '<div class="multi-display-chips">';
      selected.forEach(opt => {
        html += `<span class="multi-chip">${opt}</span>`;
      });
      html += '</div>';
    } else {
      html += `<div class="multi-empty-hint">Click to select</div>`;
    }
    html += '</div>';
  });

  return html;
}

function renderSectionReadonly(d, section){

function saveSectionEditor(recId, sectionKey){
  const r = records.find(x => x.id === recId);
  if(!r) return;
  if(!r.propertyDetails) r.propertyDetails = {};
  const section = PROP_SECTIONS.find(s => s.key === sectionKey);
  if(!section) return;

  // Save non-multi fields
  section.fields.filter(f => f.t !== 'multi').forEach(f => {
    const el = document.getElementById('se_'+f.k);
    if(el) r.propertyDetails[f.k] = el.value;
  });

  // Save multi fields
  section.fields.filter(f => f.t === 'multi').forEach(f => {
    const grid = document.querySelector('.se-multi-grid[data-field="'+f.k+'"]');
    if(grid){
      const checked = Array.from(grid.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);
      r.propertyDetails[f.k] = checked;
    }
  });

  // Reset cleaning override if bedrooms changed
  if(sectionKey === 'basic' && r.details && r.details.calculator){
    delete r.details.calculator._cleaningManual;
  }

  saveData();
  document.getElementById('sectionEditOverlay')?.remove();
  render();
}

function savePropDetail(recId, field, value){
  const r = records.find(x => x.id === recId);
  if(!r) return;
  if(!r.propertyDetails) r.propertyDetails = {};
  r.propertyDetails[field] = value;
  // Reset cleaning manual override when bedrooms change so default re-syncs
  if(field === 'bedrooms' && r.details && r.details.calculator){
    delete r.details.calculator._cleaningManual;
  }
  saveData();
  // Re-render Expenses/Calculator/Analysis tabs when relevant fields change
  const crossTabFields = ['monthlyRent','bedrooms','bathrooms','sqft','deposit','applicationFee'];
  if(crossTabFields.includes(field)){
    const expEl = document.querySelector('.tab-content[data-tab="expenses"]');

    const calcEl = document.querySelector('.tab-content[data-tab="calculator"]');
    if(calcEl){ calcEl.innerHTML = renderCalculatorTab(r); }
    const anEl = document.querySelector('.tab-content[data-tab="analysis"]');
    if(anEl && anEl.classList.contains('active')){ anEl.innerHTML = renderAnalysisTab(r); }
  }
}

async function autoImport(recId){
  const r = records.find(x => x.id === recId);
  if(!r || !r.link) return;
  const container = document.getElementById('importContainer_'+recId);
  const plat = detectPlatform(r.link);
  if(!requireTier('basic','Auto Import')){ container.innerHTML = tierGateHtml('basic','Auto Import','Automatically extract property details from listing pages.'); return }
  container.innerHTML = '<div class="import-loading"><div class="spinner"></div><div>Importing from '+plat.name+'...</div><div style="font-size:.78rem;color:var(--text3);margin-top:6px" id="profileImportStatus">Connecting to import server...</div></div>';

  // Try extension-based import
  const statusEl = document.getElementById('profileImportStatus');
  try {
    if(!extensionReady){
      container.innerHTML = `<div class="import-dialog"><h3>Extension Required</h3><p>The RentingRadar Importer extension is needed for auto-import. <a href="${EXTENSION_URL}" target="_blank" style="color:var(--primary);font-weight:600">Download it from the Chrome Web Store</a>, then reload this page.</p><div style="display:flex;gap:8px;margin-top:12px"><button class="btn btn-primary btn-sm" onclick="location.reload()">I've Installed It — Reload</button><button class="btn btn-secondary btn-sm" onclick="showManualEntry('${recId}')">Manual Entry</button></div></div>`;
      return;
    }
    if(statusEl) statusEl.textContent = 'Extension is fetching listing page...';
    const data = await sendImportRequest(r.link);
    if(statusEl) statusEl.textContent = 'Processing extracted data...';

    // Apply the data
    if(!r.propertyDetails) r.propertyDetails = {};
    for(const [key, val] of Object.entries(data.details||{})){
      if(val && (typeof val !== 'object' || (Array.isArray(val) && val.length > 0))){
        r.propertyDetails[key] = val;
      }
    }
    if(!r.propertyNotes) r.propertyNotes = [];
    (data.notes||[]).forEach(n => {
      r.propertyNotes.push({ id:uid(), text:n, date:new Date().toISOString(), source:'Auto-Import ('+plat.name+')' });
    });
    r.propertyNotes.push({ id:uid(), text:'Auto-imported from '+plat.name+' via '+data.parser+'. '+data.fieldsFound+' fields extracted.', date:new Date().toISOString(), source:'System' });
    if(data.warning) r.propertyNotes.push({ id:uid(), text:'Note: '+data.warning, date:new Date().toISOString(), source:'System' });
    saveData();

    container.innerHTML = '<div style="padding:12px;background:var(--success-light);border-radius:var(--radius);color:var(--success);font-size:.85rem;font-weight:500">✓ Import complete! '+data.fieldsFound+' fields extracted'+(data.parser==='ollama'?' using AI':' (basic)')+'. Check details sections below.</div>';
    setTimeout(() => { render() }, 2000);
    return;

  } catch(e){
    console.log('Extension import error:', e);
    container.innerHTML = `<div class="import-dialog">
      <h3>Auto-import issue</h3>
      <p>${esc(e.message||'Could not complete the import.')}</p>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-primary btn-sm" onclick="autoImport('${recId}')">Retry</button>
        <button class="btn btn-secondary btn-sm" onclick="showManualEntry('${recId}')">Manual Entry</button>
      </div>
    </div>`;
  }
}

function parseListingHtml(html, url){
  const result = {};
  const notes = [];
  let fieldsFound = 0;
  const text = html.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ');

  // JSON-LD structured data
  const jsonLdMatches = html.match(/<script[^>]*type\s*=\s*["']application\/ld\+json["'][^>]*>([\s\S]*?)<\/script>/gi) || [];
  for(const m of jsonLdMatches){
    try {
      const jsonStr = m.replace(/<script[^>]*>/i,'').replace(/<\/script>/i,'');
      const j = JSON.parse(jsonStr);
      const items = Array.isArray(j) ? j : [j];
      for(const item of items){
        if(item.numberOfBedrooms) { result.bedrooms = String(item.numberOfBedrooms); fieldsFound++ }
        if(item.numberOfBathroomsTotal || item.numberOfBathrooms) { result.bathrooms = String(item.numberOfBathroomsTotal||item.numberOfBathrooms); fieldsFound++ }
        if(item.floorSize?.value) { result.sqft = String(item.floorSize.value).replace(/[^\d]/g,''); fieldsFound++ }
        if(item.numberOfRooms) notes.push('Total rooms: '+item.numberOfRooms);
        if(item.name) notes.push('Listing title: '+item.name);
        if(item.description) notes.push('Description: '+String(item.description).substring(0,500));
        if(item.offers?.price || item.price) { result.monthlyRent = String(item.offers?.price||item.price).replace(/[^\d.]/g,''); fieldsFound++ }
      }
    } catch(e){}
  }

  // Regex patterns
  const patterns = [
    [/(\d+)\s*(?:bed(?:room)?s?\b|bd\b|br\b)/i, 'bedrooms'],
    [/([\d.]+)\s*(?:bath(?:room)?s?\b|ba\b)/i, 'bathrooms'],
    [/([\d,]+)\s*(?:sq\.?\s*ft|sqft|square feet)/i, 'sqft'],
    [/\$\s*([\d,]+)\s*(?:\/\s*(?:mo|month)|per\s*month|\s*monthly)/i, 'monthlyRent'],
    [/(?:security\s*)?deposit[:\s]*\$\s*([\d,]+)/i, 'deposit'],
    [/(?:application|app)\s*fee[:\s]*\$\s*([\d,]+)/i, 'applicationFee'],
    [/(?:pet)\s*(?:deposit|fee)[:\s]*\$\s*([\d,]+)/i, 'petDeposit'],
    [/(?:pet)\s*rent[:\s]*\$\s*([\d,]+)/i, 'petRentMonthly'],
    [/(?:year|built)[:\s]*(\d{4})/i, 'yearBuilt'],
  ];
  patterns.forEach(([re, key]) => {
    if(!result[key]){ const m = text.match(re); if(m){ result[key] = m[1].replace(',',''); fieldsFound++ } }
  });

  // Amenity detection
  const amenityMap = {
    appliances: { 'Dishwasher':/dishwasher/i, 'Garbage Disposal':/garbage disposal/i, 'Microwave':/microwave/i, 'Refrigerator':/refrigerator|fridge/i },
    interiorFeatures: { 'Fireplace':/fireplace/i, 'Ceiling Fans':/ceiling fan/i, 'Walk-In Closets':/walk.?in closet/i, 'High Ceilings':/(?:high|vaulted|tall) ceiling/i, 'Stainless Steel Appliances':/stainless steel/i, 'Kitchen Island':/kitchen island/i, 'Pantry':/\bpantry\b/i, 'Open Floor Plan':/open (?:floor )?plan/i, 'Walk-In Shower':/walk.?in shower/i, 'Smart Thermostat':/smart thermostat|nest|ecobee/i },
    communityAmenities: { 'Gym/Fitness Center':/\b(?:gym|fitness center|workout)\b/i, 'Swimming Pool':/(?:community |shared )?(?:pool|swimming)/i, 'Dog Park':/dog park/i, 'Playground':/playground/i, 'Clubhouse':/clubhouse/i, 'Business Center':/business center/i, 'Package Lockers':/package (?:locker|room)/i, 'EV Charging':/ev charg|electric vehicle/i, 'Controlled Access/Gated':/(?:gated|controlled access|secure entry)/i, 'Elevator':/\belevator\b/i, 'On-Site Laundry':/(?:on.?site|shared|community) laundry/i, 'Trash Valet':/trash valet/i },
    outdoor: { 'Balcony':/\bbalcony\b/i, 'Patio':/\bpatio\b/i, 'Deck':/\bdeck\b/i },
    flooring: { 'Hardwood':/hardwood/i, 'Carpet':/\bcarpet/i, 'Tile':/\btile\b/i, 'Laminate':/laminate/i, 'Vinyl Plank':/vinyl/i },
    safetyFeatures: { 'Smoke Detectors':/smoke (?:detector|alarm)/i, 'Carbon Monoxide Detectors':/carbon monoxide|co detector/i, 'Gated Entry':/gated (?:entry|community|access)/i },
    utilitiesIncluded: { 'Water':/water included/i, 'Trash':/trash included/i, 'Internet/WiFi':/(?:internet|wifi|wi-fi) included/i },
  };
  for(const [field, checks] of Object.entries(amenityMap)){
    const found = [];
    for(const [label, re] of Object.entries(checks)){
      if(re.test(text)) found.push(label);
    }
    if(found.length){ result[field] = found; fieldsFound += found.length }
  }

  // Laundry
  if(!result.laundry){
    if(/in.?unit (?:washer|w\/d|laundry)/i.test(text)) result.laundry = 'In-Unit W/D';
    else if(/washer.?dryer hookup/i.test(text)) result.laundry = 'W/D Hookups';
    else if(/(?:shared|on.?site|community) laundry/i.test(text)) result.laundry = 'Shared/On-Site';
    if(result.laundry) fieldsFound++;
  }

  // AC
  if(!result.ac){
    if(/central (?:air|a\/c|ac)/i.test(text)) result.ac = 'Central A/C';
    else if(/window (?:unit|ac|a\/c)/i.test(text)) result.ac = 'Window Unit';
    else if(/mini.?split/i.test(text)) result.ac = 'Mini-Split';
    else if(/(?:evaporative|swamp) cool/i.test(text)) result.ac = 'Evaporative/Swamp Cooler';
    if(result.ac) fieldsFound++;
  }

  // Parking
  if(!result.parking){
    if(/(?:attached|2.car|1.car) garage/i.test(text)) result.parking = 'Attached Garage';
    else if(/(?:detached) garage/i.test(text)) result.parking = 'Detached Garage';
    else if(/carport/i.test(text)) result.parking = 'Carport';
    else if(/covered parking/i.test(text)) result.parking = 'Covered Parking';
    else if(/(?:assigned|reserved) (?:spot|space|parking)/i.test(text)) result.parking = 'Assigned Spot';
    if(result.parking) fieldsFound++;
  }

  // Pets
  if(!result.petsAllowed){
    if(/no pets/i.test(text)) result.petsAllowed = 'No Pets';
    else if(/(?:cats? and dogs?|pets? (?:allowed|welcome|ok|friendly))/i.test(text)) result.petsAllowed = 'Yes - All Pets';
    else if(/dogs? (?:allowed|welcome|ok)/i.test(text)) result.petsAllowed = 'Dogs Only';
    else if(/cats? (?:allowed|welcome|ok)/i.test(text)) result.petsAllowed = 'Cats Only';
    if(result.petsAllowed) fieldsFound++;
  }

  // Pool
  if(!result.pool){
    if(/(?:private|own) pool/i.test(text)) result.pool = 'Private';
    else if(/(?:community|shared) pool/i.test(text)) result.pool = 'Community/Shared';
    if(result.pool) fieldsFound++;
  }

  // Collect misc info for notes
  const rentSpecial = text.match(/(?:move.?in |rent )?special[:\s]+(.*?)(?:\.|$)/i);
  if(rentSpecial) notes.push('Move-in special: '+rentSpecial[1].trim().substring(0,200));
  const leaseMatch = text.match(/(?:lease|term)[:\s]*(\d+)\s*month/i);
  if(leaseMatch){ result.leaseTerm = leaseMatch[1]+' Months'; fieldsFound++ }

  return { details: result, notes, fieldsFound };
}

function applyParsedData(recId, parsed){
  const r = records.find(x => x.id === recId);
  if(!r) return;
  if(!r.propertyDetails) r.propertyDetails = {};
  if(!r.propertyNotes) r.propertyNotes = [];

  for(const [key, val] of Object.entries(parsed.details)){
    if(val && (!r.propertyDetails[key] || (Array.isArray(r.propertyDetails[key]) && r.propertyDetails[key].length === 0))){
      r.propertyDetails[key] = val;
    }
  }

  if(parsed.notes.length){
    const timestamp = new Date().toISOString();
    parsed.notes.forEach(n => {
      r.propertyNotes.push({ id:uid(), text:n, date:timestamp, source:'Auto-Import' });
    });
  }
  saveData();
}

function updateField(id, field, value){
  const r = records.find(x => x.id===id);
  if(!r) return;
  const old = r[field];
  r[field] = value;
  if(field === 'status' && old !== value){
    r.notes.push({ id:uid(), text:`Status changed: ${old} → ${value}`, date:new Date().toISOString(), type:'status' });
  }
  saveData();
  updateNotifBadges();
}

  return `<div class="rte-toolbar" data-editor="${editorId}">

    <button type="button" title="Numbered list" data-cmd="insertOrderedList" onmousedown="event.preventDefault();rteCmd('${editorId}','insertOrderedList')">1.</button>
  </div>`;

function rteCmd(editorId, cmd){
  const ed = document.getElementById(editorId);
  if(!ed) return;
  ed.focus();
  document.execCommand(cmd, false, null);
  updateRteToolbar(editorId);
}

function updateRteToolbar(editorId){
  const toolbar = document.querySelector(`.rte-toolbar[data-editor="${editorId}"]`);
  if(!toolbar) return;
  toolbar.querySelectorAll('button[data-cmd]').forEach(btn => {
    const cmd = btn.dataset.cmd;
    btn.classList.toggle('active', document.queryCommandState(cmd));
  });
}

function getRteNestLevel(li){
  let depth = 0;
  let el = li.parentElement;
  while(el){
    if(el.tagName === 'UL' || el.tagName === 'OL') depth++;
    if(el.classList && el.classList.contains('rte-editor')) break;
    el = el.parentElement;
  }
  return depth;
}

function getPrevLiNestLevel(li){
  // Find the previous visible list item and return its nest level
  let prev = li.previousElementSibling;
  if(prev && (prev.tagName === 'LI')){
    return getRteNestLevel(prev);
  }
  // Check if there's a previous sibling that is a nested list
  const parentLi = li.parentElement?.closest('li');
  if(parentLi) return getRteNestLevel(parentLi);
  return 0;
}

function handleRteKeydown(event, recId){
  const ed = event.target.closest('.rte-editor');
  if(!ed) return;
  const editorId = ed.id;

  // Shift+Enter = save
  if(event.shiftKey && event.key === 'Enter'){
    event.preventDefault();
    if(editorId.startsWith('editNoteRte_')){
      // Extract recId and noteId from id: editNoteRte_{recId}_{noteId}
      const parts = editorId.replace('editNoteRte_','').split('_');
      const rId = parts[0];
      const nId = parts.slice(1).join('_');
      saveEditNote(rId, nId);
    } else {
      addNote(recId);
    }
    return;
  }

  // Tab / Shift+Tab for nesting
  if(event.key === 'Tab'){
    const sel = window.getSelection();
    if(!sel.rangeCount) return;
    const li = sel.anchorNode?.nodeType === 3 ? sel.anchorNode.parentElement?.closest('li') : sel.anchorNode?.closest?.('li');
    if(!li) return; // not inside a list item, do nothing special

    event.preventDefault();

    if(event.shiftKey){
      // Outdent
      document.execCommand('outdent', false, null);
    } else {
      // Indent — enforce max 4 levels and +1 constraint
      const currentLevel = getRteNestLevel(li);
      if(currentLevel >= 4) return; // max 4 levels

      // +1 constraint: can only nest 1 deeper than the item above
      const prevLi = li.previousElementSibling;
      if(prevLi && prevLi.tagName === 'LI'){
        const prevLevel = getRteNestLevel(prevLi);
        if(currentLevel >= prevLevel + 1) return; // can't go deeper than prev+1
      } else if(!li.parentElement?.closest('li') && currentLevel >= 1){
        // first item in the list, don't let it nest
        return;
      }

      document.execCommand('indent', false, null);
    }
    return;
  }

  // Update toolbar active states on key events
  setTimeout(() => updateRteToolbar(editorId), 10);
}

// Update toolbar on selection changes within editors
document.addEventListener('selectionchange', function(){
  const sel = window.getSelection();
  if(!sel.rangeCount) return;
  const ed = sel.anchorNode?.nodeType === 3 ? sel.anchorNode.parentElement?.closest('.rte-editor') : sel.anchorNode?.closest?.('.rte-editor');
  if(ed && ed.id) updateRteToolbar(ed.id);
});

// Pending images for new notes (keyed by recId)
const pendingNoteImages = {};
// Pending images for edit note popup
let pendingEditImages = [];

function setupNotePasteHandler(editorId, recId){
  const ed = document.getElementById(editorId);
  if(!ed || ed._pasteSetup) return;
  ed._pasteSetup = true;
  ed.addEventListener('paste', function(e){
    const items = (e.clipboardData || e.originalEvent.clipboardData)?.items;
    if(!items) return;
    for(let i = 0; i < items.length; i++){
      if(items[i].type.indexOf('image') !== -1){
        e.preventDefault();
        const blob = items[i].getAsFile();
        if(!blob) return;
        const reader = new FileReader();
        reader.onload = function(ev){
          const dataUrl = ev.target.result;
          // Determine if this is a new-note editor or edit-note editor
          const isEdit = editorId.startsWith('editNoteRte_');
          if(isEdit){
            pendingEditImages.push(dataUrl);
            renderImgPreview('_editPreview', pendingEditImages);
          } else {
            if(!pendingNoteImages[recId]) pendingNoteImages[recId] = [];
            pendingNoteImages[recId].push(dataUrl);
            renderImgPreview('imgPreview_'+recId, pendingNoteImages[recId]);
          }
        };
        reader.readAsDataURL(blob);
        return;
      }
    }
  });
}

function renderImgPreview(containerId, images){
  let container = document.getElementById(containerId);
  if(!container) return;
  if(!images || images.length === 0){ container.innerHTML = ''; return; }
  let h = '';
  images.forEach((src, idx) => {
    h += '<div class="rte-img-preview-item"><img src="'+src+'" alt="Attachment '+(idx+1)+'"><button class="rte-img-remove" onclick="removePreviewImg(\''+containerId+'\','+idx+')" title="Remove">×</button></div>';
  });
  container.innerHTML = h;
}

function removePreviewImg(containerId, idx){
  if(containerId === '_editPreview'){
    pendingEditImages.splice(idx, 1);
    renderImgPreview(containerId, pendingEditImages);
  } else {
    const recId = containerId.replace('imgPreview_','');
    if(pendingNoteImages[recId]){
      pendingNoteImages[recId].splice(idx, 1);
      renderImgPreview(containerId, pendingNoteImages[recId]);
    }
  }
}

function addNote(id){
  const ed = document.getElementById('newNoteRte_'+id);
  if(!ed) return;
  const html = ed.innerHTML.trim();
  const text = ed.innerText.trim();
  const images = pendingNoteImages[id] || [];
  if(!text && images.length === 0) return;
  const r = records.find(x => x.id===id);
  if(!r) return;
  const type = selectedNoteType[id] || 'note';
  const noteObj = { id:uid(), text:text, html:html, date:new Date().toISOString(), type:type };
  if(images.length > 0) noteObj.images = images;
  r.notes.push(noteObj);
  selectedNoteType[id] = 'note';
  delete pendingNoteImages[id];
  saveData();
  render();
}

function saveEditNote(recId, noteId){
  const r = records.find(x => x.id===recId);
  if(!r) return;
  const note = r.notes.find(n => n.id === noteId);
  if(!note) return;
  const editEditorId = 'editNoteRte_'+recId+'_'+noteId;
  const ed = document.getElementById(editEditorId);
  if(!ed) return;
  const newHtml = ed.innerHTML.trim();
  const newText = ed.innerText.trim();
  if(!newText && pendingEditImages.length === 0) return;
  const activeBtn = document.querySelector('#editNoteTypeBar .note-type-btn.active');
  const newType = activeBtn?.dataset?.type || note.type;
  note.text = newText;
  note.html = newHtml;
  note.type = newType;
  note.editedAt = new Date().toISOString();
  if(pendingEditImages.length > 0){
    note.images = pendingEditImages.slice();
  } else {
    delete note.images;
  }
  pendingEditImages = [];
  saveData();
  document.getElementById('editNoteOverlay')?.remove();
  render();
}

function deleteNote(recId, noteId){
  const r = records.find(x => x.id===recId);
  if(!r) return;
  if(!confirm('Delete this note?')) return;
  r.notes = r.notes.filter(n => n.id !== noteId);
  saveData();
  render();
}

function openNoteImagePopup(recId, noteId, imgIdx){
  const r = records.find(x => x.id === recId);
  if(!r) return;
  const note = r.notes.find(n => n.id === noteId);
  if(!note || !note.images || !note.images[imgIdx]) return;

  const emoji = note.type==='call'?'📞 ':note.type==='text'?'💬 ':note.type==='email'?'📧 ':note.type==='note'?'📝 ':'';
  const label = note.type==='call'?'Call':note.type==='text'?'Text':note.type==='email'?'Email':'Note';
  const noteContent = note.html ? note.html : esc(note.text);
  const totalImages = note.images.length;

  // Build image navigation if multiple images
  let navHtml = '';
  if(totalImages > 1){
    navHtml = '<div style="display:flex;justify-content:center;gap:8px;margin-top:10px">';
    if(imgIdx > 0) navHtml += '<button class="btn btn-secondary btn-sm" onclick="document.getElementById(\'noteImgPopup\').remove();openNoteImagePopup(\''+recId+'\',\''+noteId+'\','+(imgIdx-1)+')">← Prev</button>';
    navHtml += '<span style="font-size:.75rem;color:var(--text3);align-self:center">'+(imgIdx+1)+' of '+totalImages+'</span>';
    if(imgIdx < totalImages-1) navHtml += '<button class="btn btn-secondary btn-sm" onclick="document.getElementById(\'noteImgPopup\').remove();openNoteImagePopup(\''+recId+'\',\''+noteId+'\','+(imgIdx+1)+')">Next →</button>';
    navHtml += '</div>';
  }

  const overlay = document.createElement('div');
  overlay.className = 'note-img-popup-overlay';
  overlay.id = 'noteImgPopup';
  overlay.innerHTML = `<div class="note-img-popup">
    <button class="nip-close" onclick="document.getElementById('noteImgPopup').remove()" title="Close">×</button>
    <div class="nip-text">${noteContent}</div>
    <img src="${note.images[imgIdx]}" alt="Attachment">
    ${navHtml}
    <div class="nip-date">${fmtDateTime(note.date)} • ${emoji}${label}${note.editedAt?' <span style="font-style:italic">(edited)</span>':''}</div>
  </div>`;

  // Close on backdrop click
  overlay.addEventListener('click', function(e){
    if(e.target === overlay) overlay.remove();
  });
  // Close on Escape
  overlay.addEventListener('keydown', function(e){
    if(e.key === 'Escape') overlay.remove();
  });
  document.body.appendChild(overlay);
  overlay.focus();
  overlay.setAttribute('tabindex', '-1');
  overlay.focus();
}

let extensionReady = false;
let extensionHealth = null;
let pendingImport = null;

// Listen for extension messages
window.addEventListener('message', (event) => {
  if(event.source !== window) return;
  if(event.data?.type === 'ARBFLOW_EXTENSION_READY'){
    extensionReady = true;
    // Request health check
    window.postMessage({ type: 'ARBFLOW_HEALTH_CHECK' }, '*');
  }
  if(event.data?.type === 'ARBFLOW_HEALTH_RESPONSE'){
    extensionHealth = event.data;
    extensionReady = !!event.data.extension;
  }
  if(event.data?.type === 'ARBFLOW_IMPORT_RESPONSE'){
    if(pendingImport) pendingImport(event.data);
    pendingImport = null;
  }

  // ─── Comp import from AirDNA extension (Pro feature) ───
  if(event.data?.type === 'RR_COMP_FROM_EXTENSION'){
    handleExtensionComp(event.data.compData);
  }
});

function checkExtension(){
  return new Promise(resolve => {
    window.postMessage({ type: 'ARBFLOW_HEALTH_CHECK' }, '*');
    const handler = (e) => {
      if(e.data?.type === 'ARBFLOW_HEALTH_RESPONSE'){
        window.removeEventListener('message', handler);
        extensionHealth = e.data;
        extensionReady = !!e.data.extension;
        resolve(e.data);
      }
    };
    window.addEventListener('message', handler);
    setTimeout(() => { window.removeEventListener('message', handler); resolve(null) }, 2000);
  });
}

function sendImportRequest(url){
  return new Promise((resolve, reject) => {
    const reqId = uid();
    const timeout = setTimeout(() => { pendingImport = null; reject(new Error('Import timed out')) }, 180000);
    pendingImport = (data) => {
      clearTimeout(timeout);
      if(data.error) reject(new Error(data.error));
      else resolve(data);
    };
    window.postMessage({ type:'ARBFLOW_IMPORT_REQUEST', url, requestId: reqId }, '*');
  });
}

/**
 * Show a toast notification.
 */
function showToast(msg, type = 'info', duration = 4000) {
  let toast = document.getElementById('rr-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'rr-toast';
    toast.className = 'rr-toast';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.className = 'rr-toast ' + type;
  requestAnimationFrame(() => { toast.classList.add('visible'); });
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => { toast.classList.remove('visible'); }, duration);
}

/**
 * Handle a comp imported via the RentingRadar Chrome Extension (AirDNA → Airbnb enrichment).
 * Adds the comp to the currently open property's comps array, or queues it if no profile is open.
 */
function handleExtensionComp(compData) {
  if (!compData) return;

  // Find the target record — use the currently open profile, or the most recently opened one
  let r = null;
  if (currentProfileId) {
    r = records.find(x => x.id === currentProfileId);
  }

  if (!r) {
    // No property open — store in a pending queue and notify user
    if (!window._pendingExtensionComps) window._pendingExtensionComps = [];
    window._pendingExtensionComps.push(compData);
    showToast('Comp received from extension! Open a property to add it.', 'info');
    return;
  }

  const comps = getComps(r);
  if (comps.length >= 20) {
    showToast('Maximum 20 comps reached for this property.', 'warning');
    return;
  }

  // Check for duplicate (by link or airdnaUrl)
  const isDupe = comps.some(c =>
    (compData.link && c.link === compData.link) ||
    (compData.airdnaUrl && c.airdnaUrl === compData.airdnaUrl)
  );
  if (isDupe) {
    showToast('This comp has already been imported.', 'warning');
    return;
  }

  // Add the comp
  comps.push({
    link: compData.link || '',
    linkShort: compData.linkShort || 'AirDNA Import',
    annualRevenue: compData.annualRevenue || 0,
    daysAvailable: compData.daysAvailable || 365,
    occupancy: compData.occupancy || 0,
    nightlyRate: compData.nightlyRate || 0,
    guests: compData.guests || 0,
    bedrooms: compData.bedrooms || 0,
    beds: compData.beds || 0,
    bathrooms: compData.bathrooms || 0,
    host: compData.host || '',
    rating: compData.rating || 'competes',
    notes: compData.notes || '',
    airdnaUrl: compData.airdnaUrl || '',
    source: 'airdna-extension',
    importedAt: compData.importedAt || new Date().toISOString()
  });

  saveData();
  render();
  showToast('Comp imported from AirDNA! (' + comps.length + '/20)', 'success');
}

/**
 * When a property profile is opened, check for any pending extension comps and offer to add them.
 */
function checkPendingExtensionComps() {
  if (!window._pendingExtensionComps || window._pendingExtensionComps.length === 0) return;
  const pending = window._pendingExtensionComps;
  window._pendingExtensionComps = [];
  for (const comp of pending) {
    handleExtensionComp(comp);
  }
}

function extractAddress(url, details){
  // Try to extract address from URL path
  try {
    const path = new URL(url).pathname;
    const parts = path.split('/').filter(p => p && p.length > 3 && !/^[a-z0-9]{6,10}$/.test(p));
    if(parts.length > 0){
      let addr = parts[0].replace(/-/g,' ').replace(/\b\w/g, c => c.toUpperCase());
      if(parts[1] && /unit|apt|ste/i.test(parts[1].replace(/-/g,' '))) addr += ' '+parts[1].replace(/-/g,' ').replace(/\b\w/g, c => c.toUpperCase());
      return addr;
    }
  } catch(e){}
  return details?.propertyType || 'New Property';
}

/* ===== SEARCH & FILTER ===== */
function getFiltered(){
  let list = records;
  if(filterStatus && filterStatus !== 'All') list = list.filter(r => r.status === filterStatus);
  if(searchQuery){
    // Match all words in the query against any field on the record
    const words = searchQuery.split(/\s+/).filter(w => w.length > 0);
    list = list.filter(r => {
      const blob = [r.property, r.name, r.phone, r.email, r.note, r.status].filter(Boolean).join(' ').toLowerCase();
      return words.every(w => blob.includes(w));
    });
  }
  return list;
}

/* ===== EXPORT ===== */
function exportData(format){
  if(!checkCsvAccess()) return;
  const headers = ['Property','Name','Phone','Email','Status','Date','Note','Link','Follow Up Date'];
  const rows = records.map(r => [r.property,r.name,r.phone,r.email,r.status,r.date?r.date.split('T')[0]:'',r.notes.map(n=>n.text).join(' | '),r.link,r.followUpDate||'']);

  if(format === 'csv'){
    const csvContent = [headers, ...rows].map(row => row.map(cell => '"'+(cell||'').replace(/"/g,'""')+'"').join(',')).join('\n');
    downloadFile(csvContent, 'arbitrage_pipeline_'+new Date().toISOString().split('T')[0]+'.csv', 'text/csv');
  }
}

function downloadFile(content, filename, type){
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

/* ===== UTILS ===== */
function truncate(s, n){ return s && s.length > n ? s.substring(0,n)+'…' : (s||'') }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function fmtPhone(s){
  if(!s) return '';
  const digits = s.replace(/\D/g,'');
  if(digits.length === 10) return '('+digits.slice(0,3)+') '+digits.slice(3,6)+'-'+digits.slice(6);
  if(digits.length === 11 && digits[0]==='1') return '('+digits.slice(1,4)+') '+digits.slice(4,7)+'-'+digits.slice(7);
  return esc(s);
}
function fmtDate(d){
  if(!d) return '—';
  try {
    const s = String(d);
    // Date-only strings (YYYY-MM-DD) — parse as local to avoid timezone shift
    if(/^\d{4}-\d{2}-\d{2}$/.test(s)){
      const [y,m,day] = s.split('-').map(Number);
      return new Date(y, m-1, day).toLocaleDateString('en-US',{ month:'short', day:'numeric', year:'numeric' });
    }
    const dt = new Date(d);
    if(isNaN(dt)) return '—';
    return dt.toLocaleDateString('en-US',{ month:'short', day:'numeric', year:'numeric' });
  } catch(e){ return '—' }
}
function fmtDateTime(d){
  if(!d) return '—';
  try {
    const dt = new Date(d);
    if(isNaN(dt)) return '—';
    // If the string has time info (contains T or is a full ISO string), show time
    const hasTime = typeof d === 'string' && (d.includes('T') && !d.endsWith('T00:00:00.000'));
    const datePart = dt.toLocaleDateString('en-US',{ month:'short', day:'numeric', year:'numeric' });
    if(!hasTime) return datePart;
    const timePart = dt.toLocaleTimeString('en-US',{ hour:'numeric', minute:'2-digit', hour12:true });
    return datePart + ' at ' + timePart;
  } catch(e){ return '—' }
}
function daysDiff(today, target){
  const t = new Date(today); const g = new Date(target);
  return Math.floor((t - g) / 86400000);
}

const ACCENTS = [
  { key:'standard', name:'Standard',       darkBg:'#6381fa', lightBg:'#4f6ef7' },
  { key:'crimson',  name:'Crimson Flame',   darkBg:'#ef4444', lightBg:'#dc2626' },
