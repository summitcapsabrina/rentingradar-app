let extensionReady = false;
let extensionHealth = null;
let pendingImport = null;

// Listen for extension messages
window.addEventListener('message', (event) => {
  if(event.source !== window) return;
  if(event.data?.type === 'ARBFLOW_EXTENSION_READY'){
    extensionReady = true;
    // Request health check
    window.postMessage({ type: 'ARBFLOW_HEALTH_CHECK' }, '*');
  }
  if(event.data?.type === 'ARBFLOW_HEALTH_RESPONSE'){
    extensionHealth = event.data;
    extensionReady = !!event.data.extension;
  }
  if(event.data?.type === 'ARBFLOW_IMPORT_RESPONSE'){
    if(pendingImport) pendingImport(event.data);
    pendingImport = null;
  }
});

function checkExtension(){
  return new Promise(resolve => {
    window.postMessage({ type: 'ARBFLOW_HEALTH_CHECK' }, '*');
    const handler = (e) => {
      if(e.data?.type === 'ARBFLOW_HEALTH_RESPONSE'){
        window.removeEventListener('message', handler);
        extensionHealth = e.data;
        extensionReady = !!e.data.extension;
        resolve(e.data);
      }
    };
    window.addEventListener('message', handler);
    setTimeout(() => { window.removeEventListener('message', handler); resolve(null) }, 2000);
  });
}

function sendImportRequest(url){
  return new Promise((resolve, reject) => {
    const reqId = uid();
    const timeout = setTimeout(() => { pendingImport = null; reject(new Error('Import timed out')) }, 180000);
    pendingImport = (data) => {
      clearTimeout(timeout);
      if(data.error) reject(new Error(data.error));
      else resolve(data);
    };
    window.postMessage({ type:'ARBFLOW_IMPORT_REQUEST', url, requestId: reqId }, '*');
  });
}

function extractAddress(url, details){
  // Try to extract address from URL path
  try {
    const path = new URL(url).pathname;
    const parts = path.split('/').filter(p => p && p.length > 3 && !/^[a-z0-9]{6,10}$/.test(p));
    if(parts.length > 0){
      let addr = parts[0].replace(/-/g,' ').replace(/\b\w/g, c => c.toUpperCase());
      if(parts[1] && /unit|apt|ste/i.test(parts[1].replace(/-/g,' '))) addr += ' '+parts[1].replace(/-/g,' ').replace(/\b\w/g, c => c.toUpperCase());
      return addr;
    }
  } catch(e){}
  return details?.propertyType || 'New Property';
}

function getFiltered(){
  let list = records;
  if(filterStatus && filterStatus !== 'All') list = list.filter(r => r.status === filterStatus);
  if(searchQuery){
    // Match all words in the query against any field on the record
    const words = searchQuery.split(/\s+/).filter(w => w.length > 0);
    list = list.filter(r => {
      const blob = [r.property, r.name, r.phone, r.email, r.note, r.status].filter(Boolean).join(' ').toLowerCase();
      return words.every(w => blob.includes(w));
    });
  }
  return list;
}

/* ===== EXPORT ===== */
function exportData(format){
  if(!checkCsvAccess()) return;
  const headers = ['Property','Name','Phone','Email','Status','Date','Note','Link','Follow Up Date'];
  const rows = records.map(r => [r.property,r.name,r.phone,r.email,r.status,r.date?r.date.split('T')[0]:'',r.notes.map(n=>n.text).join(' | '),r.link,r.followUpDate||'']);

  if(format === 'csv'){
    const csvContent = [headers, ...rows].map(row => row.map(cell => '"'+(cell||'').replace(/"/g,'""')+'"').join(',')).join('\n');
    downloadFile(csvContent, 'arbitrage_pipeline_'+new Date().toISOString().split('T')[0]+'.csv', 'text/csv');
  }
}

function downloadFile(content, filename, type){
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

/* ===== UTILS ===== */
function truncate(s, n){ return s && s.length > n ? s.substring(0,n)+'…' : (s||'') }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function fmtDate(d){
  if(!d) return '—';
  try {
    const s = String(d);
    // Date-only strings (YYYY-MM-DD) — parse as local to avoid timezone shift
    if(/^\d{4}-\d{2}-\d{2}$/.test(s)){
      const [y,m,day] = s.split('-').map(Number);
      return new Date(y, m-1, day).toLocaleDateString('en-US',{ month:'short', day:'numeric', year:'numeric' });
    }
    const dt = new Date(d);
    if(isNaN(dt)) return '—';
    return dt.toLocaleDateString('en-US',{ month:'short', day:'numeric', year:'numeric' });
  } catch(e){ return '—' }
}
function fmtDateTime(d){
  if(!d) return '—';
  try {
    const dt = new Date(d);
    if(isNaN(dt)) return '—';
    // If the string has time info (contains T or is a full ISO string), show time
    const hasTime = typeof d === 'string' && (d.includes('T') && !d.endsWith('T00:00:00.000'));
    const datePart = dt.toLocaleDateString('en-US',{ month:'short', day:'numeric', year:'numeric' });
    if(!hasTime) return datePart;
    const timePart = dt.toLocaleTimeString('en-US',{ hour:'numeric', minute:'2-digit', hour12:true });
    return datePart + ' at ' + timePart;
  } catch(e){ return '—' }
}
function daysDiff(today, target){
  const t = new Date(today); const g = new Date(target);
  return Math.floor((t - g) / 86400000);
}

/* ===== THEME TOGGLE ===== */
let isDark = true;
let currentAccent = 'standard'; // standard, crimson, ocean, emerald

const ACCENTS = [
  { key:'standard', name:'Standard',       darkBg:'#6381fa', lightBg:'#4f6ef7' },
  { key:'crimson',  name:'Crimson Flame',   darkBg:'#ef4444', lightBg:'#dc2626' },
  { key:'ocean',    name:'Ocean Depths',    darkBg:'#22d3ee', lightBg:'#0891b2' },
  { key:'emerald',  name:'Emerald Forest',  darkBg:'#34d399', lightBg:'#059669' },
];

function initTheme(){
  try {
    const saved = localStorage.getItem('rr_theme_mode');
    const savedAccent = localStorage.getItem('rr_theme_accent');
    if(saved === 'light') isDark = false;
    if(savedAccent && ACCENTS.find(a => a.key === savedAccent)) currentAccent = savedAccent;
    // Free tier forced to light standard
    if(currentTier === 'free'){ isDark = false; currentAccent = 'standard' }
  } catch(e){}
  applyTheme();
}

function applyTheme(){
  const root = document.documentElement;
  root.classList.toggle('light', !isDark);
  // Remove all accent classes
  ACCENTS.forEach(a => { if(a.key !== 'standard') root.classList.remove('accent-'+a.key) });
  // Apply current accent
  if(currentAccent !== 'standard') root.classList.add('accent-'+currentAccent);
  try {
    localStorage.setItem('rr_theme_mode', isDark ? 'dark' : 'light');
    localStorage.setItem('rr_theme_accent', currentAccent);
  } catch(e){}
  updateThemeUI();

/* ===== AUTOCOMPLETE ===== */
let acIndex = -1;
function showAutocomplete(){
  const q = document.getElementById('globalSearch').value.trim().toLowerCase();
  if(q.length > 0){ updateAutocomplete(q); return }
  // Empty query — show recently accessed
  showRecentlyAccessed();
}
function showRecentlyAccessed(){
  const box = document.getElementById('searchAutocomplete');
  const recents = records.filter(r => r.lastAccessed).sort((a,b) => new Date(b.lastAccessed) - new Date(a.lastAccessed)).slice(0,10);
  if(!recents.length){
    box.innerHTML = '<div style="padding:16px 14px;color:var(--text3);font-size:.85rem;text-align:center">No recently viewed properties</div>';
    box.classList.add('visible'); acIndex = -1; return;
  }
  let html = '<div class="ac-section"><div class="ac-section-label">Recently Viewed</div>';
  recents.forEach((r, i) => {
    const timeAgo = getTimeAgo(r.lastAccessed);
    html += `<div class="ac-item" data-id="${r.id}" data-idx="${i}" onmousedown="acSelect('${r.id}')" onmouseenter="acIndex=${i};highlightAcItem()">
      <div class="ac-icon">🕐</div>
      <div class="ac-main">
        <div class="ac-title">${esc(r.property)}</div>
        <div class="ac-sub">${r.name?esc(r.name)+' • ':''}${esc(r.status)} • ${timeAgo}</div>
      </div>
    </div>`;
  });
  html += '</div>';
  box.innerHTML = html;
  box.classList.add('visible'); acIndex = -1;
}
function getTimeAgo(iso){
  const now = Date.now(), then = new Date(iso).getTime();
  const mins = Math.floor((now - then) / 60000);
  if(mins < 1) return 'Just now';
  if(mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if(hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if(days < 7) return days + 'd ago';
  return fmtDate(iso);
}
function handleSearch(q){
  searchQuery = q.toLowerCase();
  if(q.trim().length > 0) updateAutocomplete(q.toLowerCase());
  else showRecentlyAccessed();
  render();
}
function matchesAllWords(text, query){
  if(!text) return false;
  const words = query.split(/\s+/).filter(w => w.length > 0);
  const lower = text.toLowerCase();
  return words.every(w => lower.includes(w));
}

function updateAutocomplete(q){
  const box = document.getElementById('searchAutocomplete');
  if(!q || q.length < 1){ showRecentlyAccessed(); return }

  // Match records across all searchable fields, deduplicate by record id
  const seen = new Set();
  const matched = [];
  const limit = 8;

  records.forEach(r => {
    if(seen.has(r.id)) return;
    const searchable = [r.property, r.name, r.phone, r.email].filter(Boolean).join(' ');
    if(matchesAllWords(searchable, q)){
      seen.add(r.id);
      matched.push(r);
    }
  });

  if(!matched.length){ box.classList.remove('visible'); acIndex = -1; return }

  function highlight(text, query){
    if(!text) return '';
    const words = query.split(/\s+/).filter(w => w.length > 0);
    const lower = text.toLowerCase();
    let bestIdx = -1, bestLen = 0;
    for(const w of words){ const i = lower.indexOf(w); if(i >= 0 && w.length > bestLen){ bestIdx = i; bestLen = w.length } }
    if(bestIdx === -1) return esc(text);
    return esc(text.substring(0,bestIdx)) + '<mark>' + esc(text.substring(bestIdx, bestIdx+bestLen)) + '</mark>' + esc(text.substring(bestIdx+bestLen));
  }

  let html = '<div class="ac-section">';
  matched.slice(0, limit).forEach((r, flatIdx) => {
    const address = r.property || 'No address';
    const name = r.name || '';
    const status = r.status || '';
    const phone = r.phone || '';
    const email = r.email || '';
    const isFirst = flatIdx === 0;

    // Always show name + status on first sub-line; phone/email on second line only if they matched
    const nameLine = (name ? highlight(name, q) : '<span style="opacity:.4">No contact</span>') + (status ? ' · <span style="font-weight:600">' + esc(status) + '</span>' : '');
    let extraLine = '';
    const extras = [];
    if(phone && matchesAllWords(phone, q)) extras.push('📞 ' + highlight(phone, q));
    if(email && matchesAllWords(email, q)) extras.push('✉️ ' + highlight(email, q));
    if(extras.length) extraLine = '<div class="ac-sub" style="margin-top:1px">' + extras.join(' · ') + '</div>';

    html += `<div class="ac-item" data-id="${r.id}" data-idx="${flatIdx}" onmousedown="acSelect('${r.id}')" onmouseenter="acIndex=${flatIdx};highlightAcItem()">
      <div class="ac-icon">🏠</div>
      <div class="ac-main">
        <div class="ac-title">${highlight(address, q)}</div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="ac-sub">${nameLine}</div>
          ${isFirst ? '<div style="font-size:.58rem;color:var(--text3);opacity:.5;white-space:nowrap;margin-left:8px">Shift+Enter</div>' : ''}
        </div>
        ${extraLine}
      </div>
    </div>`;
  });
  html += '</div>';

  box.innerHTML = html;
  box.classList.add('visible');
  acIndex = -1;
}

function clearSearch(){
  searchQuery = '';
  const inp = document.getElementById('globalSearch');
  if(inp) inp.value = '';
  const box = document.getElementById('searchAutocomplete');
  if(box) box.classList.remove('visible');
}

function acSelect(id){
  clearSearch();
  document.getElementById('globalSearch').blur();
  openDetail(id);
}

function highlightAcItem(){
  const items = document.querySelectorAll('#searchAutocomplete .ac-item');
  items.forEach((el,i) => el.classList.toggle('ac-active', i === acIndex));
}

// Keyboard navigation for autocomplete — attached directly to search input for reliability
function handleSearchKeydown(e){
  const box = document.getElementById('searchAutocomplete');
  if(!box || !box.classList.contains('visible')) return;
  const items = box.querySelectorAll('.ac-item');
  if(!items.length) return;

  if(e.key === 'ArrowDown'){
    e.preventDefault();
    acIndex = Math.min(acIndex + 1, items.length - 1);
    highlightAcItem();
    if(items[acIndex]) items[acIndex].scrollIntoView({ block:'nearest' });
  } else if(e.key === 'ArrowUp'){
    e.preventDefault();
    acIndex = Math.max(acIndex - 1, 0);
    highlightAcItem();
    if(items[acIndex]) items[acIndex].scrollIntoView({ block:'nearest' });
  } else if(e.key === 'Enter' && e.shiftKey){
    e.preventDefault();
    e.stopPropagation();
    const firstId = items[0]?.dataset?.id;
    if(firstId) acSelect(firstId);
  } else if(e.key === 'Enter' && acIndex >= 0){
    e.preventDefault();
    const id = items[acIndex]?.dataset?.id;
    if(id) acSelect(id);
  } else if(e.key === 'Escape'){
    box.classList.remove('visible');
    acIndex = -1;
  }
}

// Close autocomplete when clicking outside
document.addEventListener('click', function(e){
  if(!e.target.closest('.header-search')){
    document.getElementById('searchAutocomplete')?.classList.remove('visible');
    acIndex = -1;
  }
});

// Ctrl+S global shortcut to focus search bar (Ctrl only, not Cmd on Mac)
document.addEventListener('keydown', function(e){
  if(e.ctrlKey && !e.metaKey && e.key === 's'){
    e.preventDefault();

    }
  }

function handleCsvFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    const text = e.target.result;
    parseCsv(text);
  };
  reader.readAsText(file);
}

function parseCsv(text){
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if(lines.length < 2){ alert('CSV must have a header row and at least one data row.'); return }

  // Parse headers
  csvHeaders = parseCSVLine(lines[0]);

  // Parse rows
  csvImportData = [];
  for(let i = 1; i < lines.length; i++){
    const vals = parseCSVLine(lines[i]);
    if(vals.some(v => v.trim())) csvImportData.push(vals);
  }

  showCsvMapping();
}

function parseCSVLine(line){
  const result = []; let current = ''; let inQuotes = false;
  for(let i = 0; i < line.length; i++){
    const c = line[i];
    if(c === '"'){ if(inQuotes && line[i+1] === '"'){ current += '"'; i++ } else { inQuotes = !inQuotes } }
    else if(c === ',' && !inQuotes){ result.push(current.trim()); current = '' }
    else { current += c }
  }
  result.push(current.trim());
  return result;
}

function executeCsvImport(){
  // Validate required mappings
  const maps = {};
  for(const m of REQUIRED_MAPPINGS){
    const sel = document.getElementById('csvMap_'+m.key);
    maps[m.key] = sel ? parseInt(sel.value) : -1;
  }

  if(maps.property < 0){
    alert('Property Address is required. Please map it to a CSV column.');
    return;
  }

  // Confirm before import
  const preview = csvImportData.slice(0,3).map(row => {
    const addr = maps.property >= 0 ? row[maps.property] : '';
    return addr.substring(0,50);
  }).join(', ');

  // Check property limit
  const limit = TIERS[currentTier]?.maxProperties || 50;
  const remaining = limit === Infinity ? Infinity : limit - records.length;
  const toImport = Math.min(csvImportData.length, remaining === Infinity ? csvImportData.length : remaining);
  if(remaining <= 0){
    alert("You've reached the "+TIERS[currentTier].name+" plan limit of "+limit+" properties. Upgrade to add more.");
    switchView('pricing'); return;
  }
  const limitNote = remaining !== Infinity && csvImportData.length > remaining ? `\n\nNote: Your ${TIERS[currentTier].name} plan allows ${limit} properties. Only the first ${toImport} of ${csvImportData.length} rows will be imported.` : '';

  if(!confirm(`Import ${toImport} records?${limitNote}\n\nFirst few: ${preview}...`)) return;

  let imported = 0;
  for(const row of csvImportData){
    // Enforce limit during import
    const curLimit = TIERS[currentTier]?.maxProperties || 50;
    if(curLimit !== Infinity && records.length >= curLimit) break;
    const prop = maps.property >= 0 ? (row[maps.property]||'').trim() : '';
    if(!prop) continue;

    const r = {
      id: uid(),
      property: prop,
      name: maps.name >= 0 ? (row[maps.name]||'').trim() : '',
      phone: maps.phone >= 0 ? (row[maps.phone]||'').trim() : '',
      email: maps.email >= 0 ? (row[maps.email]||'').trim() : '',
      status: maps.status >= 0 ? (row[maps.status]||'').trim() || 'New' : 'New',
      link: maps.link >= 0 ? (row[maps.link]||'').trim() : '',
      note: maps.note >= 0 ? (row[maps.note]||'').trim() : '',
      date: maps.date >= 0 ? (row[maps.date]||'').trim() : new Date().toISOString().split('T')[0],
      followUpDate: null,
      notes: [],
      propertyDetails: {},
      propertyNotes: [],
      createdAt: new Date().toISOString()
    };

    // Validate status — default to New if unrecognized
    if(r.status && !STATUSES.includes(r.status)){
      // Try to fuzzy match
      const match = STATUSES.find(s => s.toLowerCase() === r.status.toLowerCase());
      r.status = match || 'New';
    }

    if(r.note) r.notes.push({ id:uid(), text:r.note, date:r.date, type:'import' });
    records.push(r);
    imported++;
  }

  saveData();
  document.getElementById('detailModal').classList.remove('open');
  render();
  alert(`Successfully imported ${imported} properties!`);
}

let activeHeroEdit = null;

function startHeroEdit(recId, field, containerId){
  if(activeHeroEdit) return; // Already editing

  const r = records.find(x => x.id === recId);
  if(!r) return;

  // Check if this field was auto-imported — show warning if so
  const isAutoImported = (r.propertyNotes||[]).some(n => n.source && n.source.includes('Auto-Import'));
  const currentVal = field === 'monthlyRent' ? (r.propertyDetails?.monthlyRent || '') : (r[field] || '');

  if(isAutoImported && currentVal){
    showAutoImportWarning(recId, field, containerId, currentVal);
    return;
  }

  activateHeroInput(recId, field, containerId, currentVal);
}

function showAutoImportWarning(recId, field, containerId, currentVal){
  // Remove any existing warning
  document.querySelectorAll('.auto-import-warning').forEach(w => w.remove());

  const container = document.getElementById(containerId);
  if(!container) return;
  container.style.position = 'relative';

  const warning = document.createElement('div');
  warning.className = 'auto-import-warning';
  warning.innerHTML = `
    <div class="aiw-title">⚠ Auto-imported data</div>
    <div class="aiw-text">This value was automatically extracted from the listing. Are you sure you want to edit it?</div>
    <div class="aiw-btns">
      <button class="btn btn-primary btn-sm" onclick="this.closest('.auto-import-warning').remove();activateHeroInput('${recId}','${field}','${containerId}','${esc(currentVal)}')">Yes, Edit</button>
      <button class="btn btn-secondary btn-sm" onclick="this.closest('.auto-import-warning').remove()">Cancel</button>
    </div>`;
  container.appendChild(warning);

  // Close on click outside
  setTimeout(() => {
    const closer = (e) => { if(!warning.contains(e.target) && e.target !== container){ warning.remove(); document.removeEventListener('click', closer) } };
    document.addEventListener('click', closer);
  }, 50);
}

function activateHeroInput(recId, field, containerId, currentVal){
  const container = document.getElementById(containerId);
  if(!container) return;
  activeHeroEdit = { recId, field, containerId };

  const isRent = field === 'monthlyRent';
  const displayId = isRent ? 'heroRentDisplay' : 'heroAddressDisplay';
  const displayEl = document.getElementById(displayId);
  if(!displayEl) return;

  if(isRent){
    // Simple input for rent
    const input = document.createElement('input');
    input.type = 'number';
    input.className = 'hero-edit-input';
    input.value = currentVal;
    input.placeholder = 'Monthly rent amount';
    displayEl.replaceWith(input);
    input.focus();
    input.select();
    const editIcon = container.querySelector('.hero-edit-icon');
    if(editIcon) editIcon.style.display = 'none';
    container.onclick = null;
    const save = () => {
      if(!records.find(x=>x.id===recId).propertyDetails) records.find(x=>x.id===recId).propertyDetails = {};
      records.find(x=>x.id===recId).propertyDetails.monthlyRent = input.value.trim();
      saveData(); activeHeroEdit = null; render();
    };
    input.addEventListener('blur', save);
    input.addEventListener('keydown', (e) => { if(e.key==='Enter'){e.preventDefault();input.blur()} if(e.key==='Escape'){activeHeroEdit=null;render()} });
  } else {
    // Open address editor as popup
    showAddressEditorPopup(recId);
  }
}

function setupAddressAutocomplete(inputEl, recId){

  if(!dropdown){
    dropdown = document.createElement('div');
    dropdown.className = 'address-ac';
    wrapper.appendChild(dropdown);
  }

  inputEl.addEventListener('input', function(){
    clearTimeout(addressAcTimeout);
    const q = this.value.trim();
    if(q.length < 3){ dropdown.classList.remove('visible'); return; }
    addressAcTimeout = setTimeout(() => fetchAddressSuggestions(q, dropdown, inputEl, recId), 300);
  });

  inputEl.addEventListener('blur', function(){
    setTimeout(() => dropdown.classList.remove('visible'), 200);
  });

  inputEl.addEventListener('keydown', function(e){
    if(!dropdown.classList.contains('visible')) return;
    const items = dropdown.querySelectorAll('.address-ac-item');
    let idx = Array.from(items).findIndex(i => i.classList.contains('active'));
    if(e.key === 'ArrowDown'){ e.preventDefault(); idx = Math.min(idx+1, items.length-1); items.forEach((it,i) => it.classList.toggle('active',i===idx)); }
    else if(e.key === 'ArrowUp'){ e.preventDefault(); idx = Math.max(idx-1, 0); items.forEach((it,i) => it.classList.toggle('active',i===idx)); }
    else if(e.key === 'Enter' && idx >= 0){ e.preventDefault(); items[idx]?.dispatchEvent(new MouseEvent('mousedown')); }
  });
}

function formatAddressOneLine(parts){
  // "1326 E Chandler Blvd, Phoenix AZ 85048" or flat string
  if(typeof parts === 'string') return parts;
  let s = parts.street || '';
  if(parts.unit) s += ' ' + parts.unit;
  const csz = [parts.city, parts.state].filter(Boolean).join(' ') + (parts.zip ? ' ' + parts.zip : '');
  if(csz.trim()) s += ', ' + csz.trim();
  return s || '';
}

function renderHeroAddress(r){
  const addr = r.addressParts || parseAddressParts(r.property);
  let streetLine = esc(addr.street || r.property);
  if(addr.unit) streetLine += ', ' + esc(addr.unit);
  let html = '<h1 style="font-size:1.35rem;font-weight:700;line-height:1.2;margin:0">' + streetLine + '</h1>';
  let csz = '';
  if(addr.city) csz += addr.city + ',';
  if(addr.state) csz += ' ' + addr.state;
  if(addr.zip) csz += ' ' + addr.zip;
  if(csz.trim()){
    html += '<div style="font-size:1.05rem;color:var(--text);font-weight:600;margin-top:2px">' + esc(csz.trim()) + '</div>';
  }
  return html;
}

function parseAddressParts(property){
  if(!property) return { street:'', unit:'', city:'', state:'', zip:'' };
  // Try to parse "Street, City State Zip" or "Street Unit X, City State Zip"
  const parts = { street:'', unit:'', city:'', state:'', zip:'' };
  // Match unit in the string
  const unitRe = /\s+(#|Unit|Ste|Suite|Apt|Apartment|Bldg)\s*\.?\s*(\S+)/i;
  let clean = property;
  const unitMatch = clean.match(unitRe);
  if(unitMatch){
    parts.unit = unitMatch[1] + ' ' + unitMatch[2];
    clean = clean.replace(unitRe, '');
  }
  // Split on comma
  const commaIdx = clean.indexOf(',');
  if(commaIdx > 0){
    parts.street = clean.substring(0, commaIdx).trim();
    const rest = clean.substring(commaIdx+1).trim();
    // Parse "City State Zip" or "City State" or "City AZ 85048"
    const cszMatch = rest.match(/^(.+?)\s+([A-Z]{2})\s+(\d{5}(?:-\d{4})?)$/);
    if(cszMatch){
      parts.city = cszMatch[1].trim();
      parts.state = cszMatch[2];
      parts.zip = cszMatch[3];
    } else {
      const csMatch = rest.match(/^(.+?)\s+([A-Z]{2})$/);
      if(csMatch){ parts.city = csMatch[1].trim(); parts.state = csMatch[2] }
      else { parts.city = rest }
    }
  } else {
    // No comma — try "Street City AZ Zip" pattern
    const fullMatch = clean.match(/^(.+?)\s+(\w[\w\s]*?)\s+([A-Z]{2})\s+(\d{5})$/);
    if(fullMatch){
      parts.street = fullMatch[1].trim();
      parts.city = fullMatch[2].trim();
      parts.state = fullMatch[3];
      parts.zip = fullMatch[4];
    } else {
      parts.street = clean.trim();
    }
  }
  return parts;
}

function highlightMatch(text, query){
  // Bold all matching portions of the query within the text
  const words = query.toLowerCase().split(/\s+/).filter(w => w.length > 0);
  let result = esc(text);
  // Sort words longest first so we don't double-match substrings
  words.sort((a,b) => b.length - a.length);
  for(const word of words){
    const escaped = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    result = result.replace(new RegExp('(' + escaped + ')', 'gi'), '<strong>$1</strong>');
  }
  return result;
}

function formatFullAddress(parts){
  let s = parts.street || '';
  if(parts.city) s += ', ' + parts.city;
  if(parts.state) s += ' ' + parts.state;
  if(parts.zip) s += ' ' + parts.zip;
  return s;
}

async function fetchAddressSuggestions(query, dropdown, inputEl, recId){
  try {
    const resp = await fetch('https://places.googleapis.com/v1/places:autocomplete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Goog-Api-Key': GPLACES_KEY },
      body: JSON.stringify({
        input: query,
        includedRegionCodes: ['us'],
        includedPrimaryTypes: ['street_address', 'subpremise', 'premise']
      })
    });
    const data = await resp.json();
    if(!data.suggestions || !data.suggestions.length){ dropdown.classList.remove('visible'); return; }

    const places = data.suggestions.filter(s => s.placePrediction).map(s => s.placePrediction);
    if(!places.length){ dropdown.classList.remove('visible'); return; }

    dropdown.innerHTML = places.map(p => {
      const placeId = p.placeId || '';
      const main = p.structuredFormat?.mainText?.text || p.text?.text || '';
      const secondary = p.structuredFormat?.secondaryText?.text || '';
      const display = secondary ? main + ', ' + secondary : main;
      return `<div class="address-ac-item" onmousedown="selectAddress(this,'${recId||''}')" data-place-id="${esc(placeId)}" data-description="${esc(display)}" data-main="${esc(main)}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span>${highlightMatch(display, query)}</span>
      </div>`;
    }).join('');
    dropdown.classList.add('visible');
  } catch(e){
    console.log('Address autocomplete error:', e);
    dropdown.classList.remove('visible');
  }
}

async function selectAddress(el, recId){
  const placeId = el.dataset.placeId || '';
  const description = el.dataset.description || '';
  const dropdown = el.closest('.address-ac');
  if(dropdown) dropdown.classList.remove('visible');

  // Find whichever address input is active
  const addrEdStreet = document.getElementById('addrEdStreet');
  const addInput = document.getElementById('add_property');
  const activeInput = addrEdStreet || addInput;

  function applyParts(parts){
    window._selectedAddrParts = parts;
    const full = formatAddressOneLine(parts);
    if(activeInput) activeInput.value = full || parts.street;
    // Auto-fill city/state/zip fields in the address editor popup if open
    if(addrEdStreet){
      addrEdStreet.value = parts.street || full;
      const cityEl = document.getElementById('addrEdCity');
      const stateEl = document.getElementById('addrEdState');
      const zipEl = document.getElementById('addrEdZip');
      if(cityEl && parts.city) cityEl.value = parts.city;
      if(stateEl && parts.state) stateEl.value = parts.state;
      if(zipEl && parts.zip) zipEl.value = parts.zip;
    }
  }

  if(!placeId){
    applyParts({ street: description, city:'', state:'', zip:'' });
    return;
  }

  try {
    const resp = await fetch('https://places.googleapis.com/v1/places/' + placeId, {
      headers: {
        'X-Goog-Api-Key': GPLACES_KEY,
        'X-Goog-FieldMask': 'addressComponents,formattedAddress'
      }
    });
    const place = await resp.json();
    let parts = { street:'', city:'', state:'', zip:'' };

    if(place.addressComponents){
      const get = (type) => (place.addressComponents.find(c => c.types.includes(type)) || {}).longText || '';
      const getShort = (type) => (place.addressComponents.find(c => c.types.includes(type)) || {}).shortText || '';
      parts.street = [get('street_number'), getShort('route')].filter(Boolean).join(' ');
      parts.city = get('locality') || get('sublocality_level_1') || get('administrative_area_level_2');
      parts.state = getShort('administrative_area_level_1');
      parts.zip = get('postal_code');
    } else {
      parts.street = description;
    }

    applyParts(parts);
  } catch(e){
    console.log('Place details error:', e);
    applyParts({ street: description, city:'', state:'', zip:'' });
  }
}

function saveAddressEditor(recId){
  const r = records.find(x => x.id === recId);
  if(!r) return;

  const streetInput = document.getElementById('addrEdStreet')?.value?.trim() || '';
  const utVal = document.getElementById('addrEdUnitType')?.value || '';
  const unVal = document.getElementById('addrEdUnitNum')?.value?.trim() || '';
  const unit = (utVal && unVal) ? utVal + ' ' + unVal : '';
  const cityVal = document.getElementById('addrEdCity')?.value?.trim() || '';
  const stateVal = document.getElementById('addrEdState')?.value?.trim().toUpperCase() || '';
  const zipVal = document.getElementById('addrEdZip')?.value?.trim() || '';

  const selected = window._selectedAddrParts || {};
  const addrParts = {
    street: selected.street || streetInput,
    unit: unit,
    city: selected.city || cityVal,
    state: selected.state || stateVal,
    zip: selected.zip || zipVal,
  };
  // If autocomplete was used, also fill in city/state/zip fields that were left empty
  if(selected.street){
    if(!addrParts.city && selected.city) addrParts.city = selected.city;
    if(!addrParts.state && selected.state) addrParts.state = selected.state;
    if(!addrParts.zip && selected.zip) addrParts.zip = selected.zip;
  }

  r.addressParts = addrParts;
  r.property = formatAddressOneLine(addrParts);
  window._selectedAddrParts = null;
  saveData();
  document.getElementById('addressEditorOverlay')?.remove();
  render();
}

  const isAutoImported = (r.propertyNotes||[]).some(n => n.source && n.source.includes('Auto-Import'));
  const hasAnyStats = d.bedrooms || d.bathrooms || d.sqft || d.availableDate;

  if(beds !== undefined) r.propertyDetails.bedrooms = beds;
  if(baths !== undefined) r.propertyDetails.bathrooms = baths;

  if(avail !== undefined) r.propertyDetails.availableDate = avail;

  saveData();
  document.getElementById('statsEditorOverlay')?.remove();
  render();

function saveContactCard(recId){
  const r = records.find(x => x.id === recId);
  if(!r) return;
  const oldStatus = r.status;
  r.name = document.getElementById('ce_name')?.value?.trim() || '';
  r.phone = document.getElementById('ce_phone')?.value?.trim() || '';
  r.email = document.getElementById('ce_email')?.value?.trim() || '';
  r.status = document.getElementById('ce_status')?.value || r.status;
  r.followUpDate = document.getElementById('ce_followup')?.value || null;
  r.date = document.getElementById('ce_date')?.value || r.date;
  const newLink = document.getElementById('ce_link')?.value?.trim() || '';
  if(newLink !== r.link){ r.link = newLink }
  if(r.status !== oldStatus){
    r.notes.push({ id:uid(), text:`Status changed: ${oldStatus} → ${r.status}`, date:new Date().toISOString(), type:'status' });
  }
  saveData();
  document.getElementById('cardEditOverlay')?.remove();
  render();
}

/* ===== INLINE STATUS DROPDOWN ===== */
function toggleInlineStatus(e, recId){
  e.stopPropagation();
  const dd = document.getElementById('inlineStatusDD');
  if(!dd) return;
  const isOpen = dd.classList.toggle('open');
  if(isOpen){
    // Position fixed dropdown below the status pill
    const trigger = dd.parentElement;
    const rect = trigger.getBoundingClientRect();
    dd.style.top = (rect.bottom + 4) + 'px';
    dd.style.left = rect.left + 'px';
    // Ensure it doesn't go off-screen at the bottom
    requestAnimationFrame(() => {
      const ddRect = dd.getBoundingClientRect();
      if(ddRect.bottom > window.innerHeight - 10){
        dd.style.top = (rect.top - ddRect.height - 4) + 'px';
      }
    });
  }
}

function setInlineStatus(e, recId, newStatus){
  e.stopPropagation();
  const r = records.find(x => x.id === recId);
  if(!r) return;
  const oldStatus = r.status;
  if(oldStatus === newStatus){ document.getElementById('inlineStatusDD')?.classList.remove('open'); return }
  r.status = newStatus;
  r.notes.push({ id:uid(), text:`Status changed: ${oldStatus} → ${newStatus}`, date:new Date().toISOString(), type:'status' });
  saveData();
  render();
}

// Close inline status dropdown on outside click
document.addEventListener('click', function(e){
  if(!e.target.closest('.inline-status')){
    document.getElementById('inlineStatusDD')?.classList.remove('open');
  }
});

          <div class="settings-row-right"><div class="settings-toggle ${settingsPrefs.sounds===true?'on':''}" onclick="toggleSettingsPref('sounds',this)"></div></div>
        </div>
      </div>
    </div>

    <!-- DISPLAY & APPEARANCE -->
    <div class="settings-section">
      <div class="settings-section-header"><h3>🎨 Appearance</h3></div>
      <div class="settings-section-body">
        <div class="settings-row" style="flex-wrap:wrap">
          <div class="settings-row-left"><div class="sr-label">Theme</div><div class="sr-desc">Mode: ${isDark?'Dark':'Light'} · Accent: ${ACCENTS.find(a=>a.key===currentAccent)?.name||'Standard'}${!requireTier('basic','Themes')?' · <span style="color:var(--text3)">Upgrade to Basic for more themes</span>':''}</div></div>
          <div class="settings-row-right"><button class="btn btn-secondary btn-sm" onclick="toggleSettingsThemePicker()">${document.getElementById('settingsThemePicker')?.style.display==='block'?'Close':'Customize'}</button></div>
          <div id="settingsThemePicker" style="display:none;width:100%;padding-top:12px"></div>
        </div>
        <div class="settings-row">
          <div class="settings-row-left"><div class="sr-label">Default View</div><div class="sr-desc">Which page to show when the app opens</div></div>
          <div class="settings-row-right"><select style="font-size:.82rem;padding:4px 8px;width:auto" onchange="settingsPrefs.defaultView=this.value;saveSettingsPrefs()">
            <option value="dashboard" ${(settingsPrefs.defaultView||'dashboard')==='dashboard'?'selected':''}>Dashboard</option>
            <option value="pipeline" ${settingsPrefs.defaultView==='pipeline'?'selected':''}>Pipeline</option>
            <option value="contacts" ${settingsPrefs.defaultView==='contacts'?'selected':''}>Contacts</option>
          </select></div>
        </div>
        <div class="settings-row">
          <div class="settings-row-left"><div class="sr-label">Compact Mode</div><div class="sr-desc">Reduce spacing for denser information display</div></div>
          <div class="settings-row-right"><div class="settings-toggle ${settingsPrefs.compact===true?'on':''}" onclick="toggleSettingsPref('compact',this)"></div></div>
        </div>
      </div>
    </div>

    <!-- PIPELINE SETTINGS -->
    <div class="settings-section">
      <div class="settings-section-header"><h3>📊 Pipeline</h3></div>
      <div class="settings-section-body">
        <div class="settings-row">
          <div class="settings-row-left"><div class="sr-label">Default Status for New Properties</div><div class="sr-desc">The status assigned to manually added properties</div></div>
          <div class="settings-row-right"><select style="font-size:.82rem;padding:4px 8px;width:auto" onchange="settingsPrefs.defaultStatus=this.value;saveSettingsPrefs()">
            ${STATUSES.map(s => `<option value="${s}" ${(settingsPrefs.defaultStatus||'New')===s?'selected':''}>${s}</option>`).join('')}
          </select></div>
        </div>
        <div class="settings-row">
          <div class="settings-row-left"><div class="sr-label">Show Closed Stages in Pipeline</div><div class="sr-desc">Display HOA Issues, Not Good Fit, Lost, etc. in the Kanban view</div></div>
          <div class="settings-row-right"><div class="settings-toggle ${settingsPrefs.showClosed!==false?'on':''}" onclick="toggleSettingsPref('showClosed',this)"></div></div>
        </div>
      </div>
    </div>

    <!-- IMPORT & EXPORT -->
    <div class="settings-section">
      <div class="settings-section-header"><h3>📁 Data Management</h3></div>
      <div class="settings-section-body">
        <div class="settings-row">
          <div class="settings-row-left"><div class="sr-label">Import CSV</div><div class="sr-desc">Batch import properties from a spreadsheet file</div></div>
          <div class="settings-row-right"><button class="btn btn-secondary btn-sm" onclick="switchView('dashboard');openImportCsvModal()">Import</button></div>
        </div>
        <div class="settings-row">
          <div class="settings-row-left"><div class="sr-label">Export CSV</div><div class="sr-desc">Download all property data as a CSV file</div></div>
          <div class="settings-row-right"><button class="btn btn-secondary btn-sm" onclick="exportData('csv')">Export</button></div>
        </div>
        <div class="settings-row">
          <div class="settings-row-left"><div class="sr-label">Extension Status</div><div class="sr-desc">RentingRadar Importer for automatic data extraction</div></div>
          <div class="settings-row-right"><div class="settings-value" style="color:${extensionReady?'var(--success)':'var(--text3)'}">${extensionReady?'✓ Connected':'Not detected'}</div></div>
        </div>
        <div class="settings-row">
          <div class="settings-row-left"><div class="sr-label">AI Engine Status</div><div class="sr-desc">Local AI for enhanced property data extraction</div></div>
          <div class="settings-row-right"><div class="settings-value" style="color:${extensionHealth?.model?'var(--success)':extensionHealth?.ollama?'var(--warning)':'var(--text3)'}">${extensionHealth?.model?'✓ Ready':extensionHealth?.ollama?'⚠ No model':'Not detected'}</div></div>
        </div>
        <div class="settings-row">
          <div class="settings-row-left"><div class="sr-label">Properties in Database</div><div class="sr-desc">Total records stored locally</div></div>
          <div class="settings-row-right"><div class="settings-value" style="font-weight:600;color:var(--text)">${records.length}</div></div>
        </div>
      </div>
    </div>

    <!-- DANGER ZONE -->
    <div class="settings-section danger-zone">
      <div class="settings-section-header"><h3>⚠ Danger Zone</h3></div>
      <div class="settings-section-body">
        <div class="settings-row">
          <div class="settings-row-left"><div class="sr-label">Reset All Data</div><div class="sr-desc">Clear all properties, notes, and settings. This cannot be undone.</div></div>
          <div class="settings-row-right"><button class="btn btn-secondary btn-sm" style="color:var(--danger);border-color:rgba(239,68,68,.3)" onclick="confirmResetAllData()">Reset Data</button></div>
        </div>
        <div class="settings-row">
          <div class="settings-row-left"><div class="sr-label">Sign Out</div><div class="sr-desc">Sign out of your current session</div></div>
          <div class="settings-row-right"><button class="btn btn-secondary btn-sm" onclick="setUser(null);switchView('dashboard')">Sign Out</button></div>
        </div>
      </div>
    </div>

  </div>`;
}

function openEditProfile(){
  const u = currentUser || {};
  const overlay = document.createElement('div');
  overlay.className = 'card-edit-popup';
  overlay.id = 'cardEditOverlay';
  overlay.innerHTML = `<div class="cep-panel">
    <div class="cep-header"><h3>Edit Profile</h3><button class="modal-close" onclick="document.getElementById('cardEditOverlay').remove()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>
    <div class="cep-body">
      <div class="prop-field-grid">
        <div class="prop-field"><label>Full Name</label><input type="text" id="ep_name" value="${esc(u.name||'')}"></div>
        <div class="prop-field"><label>Email</label><input type="email" id="ep_email" value="${esc(u.email||'')}"></div>
      </div>
    </div>
    <div class="cep-actions">
      <div style="font-size:.65rem;color:var(--text3);margin-right:auto;align-self:center">Shift + Enter to save</div>
      <button class="btn btn-secondary btn-sm" onclick="document.getElementById('cardEditOverlay').remove()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="saveEditProfile()">Save</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);

  // Shift+Enter to save, Escape to cancel
  overlay.addEventListener('keydown', function(e){
    if(e.shiftKey && e.key === 'Enter'){ e.preventDefault(); saveEditProfile(); }
    if(e.key === 'Escape') overlay.remove();
  });

  setTimeout(() => document.getElementById('ep_name')?.focus(), 100);
}

function saveEditProfile(){
  const name = document.getElementById('ep_name')?.value?.trim();
  const email = document.getElementById('ep_email')?.value?.trim();
  if(name) currentUser.name = name;
  if(email) currentUser.email = email;
  try { localStorage.setItem('rr_user', JSON.stringify(currentUser)) } catch(e){}
  document.getElementById('cardEditOverlay')?.remove();
  renderUserSection();
  render();
}

function confirmResetAllData(){
  if(!confirm('Are you sure you want to delete ALL property data, notes, and settings? This cannot be undone.')) return;
  if(!confirm('This will permanently erase everything. Type OK in the next prompt to confirm.')) return;
  const typed = prompt('Type "RESET" to confirm:');
  if(typed !== 'RESET'){ alert('Reset cancelled.'); return }
  try {
    localStorage.removeItem('arbflow_records');
    localStorage.removeItem('arbflow_data_version');
    localStorage.removeItem('rr_prefs');
    localStorage.removeItem('rr_tier');
    localStorage.removeItem('rr_user');
    localStorage.removeItem('arbflow_theme');
  } catch(e){}
  location.reload();
}

/* ===== INIT ===== */
loadTier();
initTheme();
loadUser();
loadSettingsPrefs();
loadData();
restoreViewState();
// Apply the restored view's UI state
if(currentView === 'profile' && currentProfileId){
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('headerTitle').textContent = 'Property Profile';
} else {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === currentView));
  const titles = { dashboard:'Dashboard', pipeline:'Funnel', contacts:'All Contacts', notifications:'Notifications', pricing:'Your Plan', settings:'Settings' };
  document.getElementById('headerTitle').textContent = titles[currentView] || '';
}
render();

// Handle hash-based navigation (e.g., #pricing from extension)
function checkHash(){
  const hash = location.hash.replace('#','');
  const validViews = ['dashboard','pipeline','contacts','notifications','pricing','settings'];
  if(hash && validViews.includes(hash)){
    switchView(hash);
    history.replaceState(null, '', location.pathname);
  }
}
checkHash();
window.addEventListener('hashchange', checkHash);
</script>
</body>
