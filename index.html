.comp-link-cell a{display:flex;align-items:center;justify-content:center;width:100%;height:100%;min-height:34px;padding:4px 8px;color:var(--primary);text-decoration:none;border-radius:4px;transition:background .15s}
.comp-link-cell a:hover{background:rgba(99,129,250,.12)}
.comp-link-cell a svg{flex-shrink:0}
.comp-rating{font-size:.78rem;padding:3px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);cursor:pointer}
.comp-remove{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.75rem;padding:2px;border-radius:4px;line-height:1}
.comp-remove:hover{color:var(--danger,#ef4444);background:rgba(239,68,68,.08)}
.comp-notes-cell{min-width:100px;max-width:160px}
.comp-notes-preview{padding:4px 6px;font-size:.8rem;color:var(--text2);cursor:pointer;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .15s;line-height:1.4}
.comp-notes-preview:hover{background:rgba(99,129,250,.08)}
.comp-editable{padding:0 6px;border-radius:4px;cursor:pointer;height:28px;line-height:28px;font-size:.82rem;transition:background .15s;display:flex;align-items:center;justify-content:center;overflow:hidden;box-sizing:border-box}
.comp-editable:hover{background:rgba(99,129,250,.08)}
.comp-placeholder{color:var(--text3)}
.comp-occ-wrap{display:inline-flex;align-items:center;justify-content:center;gap:0}
.comp-occ-pct{color:var(--text3);font-size:.82rem;flex-shrink:0;margin-left:1px}
/* Averages */
.comp-avg-bar{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px}
.comp-avg-item{flex:1;text-align:center;padding:10px 8px;border-right:1px solid var(--border)}
.comp-avg-item:last-child{border-right:none}
.comp-avg-item .avg-label{font-size:.9rem;text-transform:uppercase;letter-spacing:.3px;color:var(--text3);font-weight:600}
.comp-avg-item .avg-value{font-size:1.22rem;font-weight:700;color:var(--primary);margin-top:2px}
/* Projections bar — larger than averages */
.comp-proj-bar .avg-label{font-size:1.0rem}
.comp-proj-bar .avg-value{font-size:1.4rem}
.comp-proj-bar .comp-avg-item{padding:14px 8px}
/* Revenue projections */
.an-proj-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px}
.an-proj-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center}
.an-proj-card .proj-label{font-size:.76rem;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);font-weight:600;margin-bottom:4px}
.an-proj-card .proj-value{font-size:1.15rem;font-weight:700}
.an-proj-card.likely .proj-value{color:var(--text)}
.an-proj-card.best .proj-value{color:var(--num-success)}
.an-proj-card.worst .proj-value{color:var(--num-danger)}
.an-why{width:100%;padding:6px 8px;border:1px solid transparent;border-radius:var(--radius);font-size:.9rem;background:transparent;color:var(--text);resize:vertical;font-family:inherit;min-height:36px;transition:border-color .15s}
.an-why:hover{border-color:var(--border)}
.an-why:focus{border-color:var(--primary);outline:none;background:var(--surface)}
.an-readonly-summary{font-size:.88rem;color:var(--text2);line-height:1.5;padding:4px 0}
.an-req-editable{cursor:pointer;transition:background .15s}
.an-req-editable:hover{background:rgba(99,129,250,.06)}
/* Comp Section Themes */
.comp-section{border-radius:var(--radius);overflow:hidden;margin-bottom:16px;border:1px solid var(--border)}
.comp-section-hdr{font-size:.84rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.comp-section-hdr .comp-section-count{font-size:.72rem;font-weight:500;opacity:.7;text-transform:none;letter-spacing:0}
.comp-section.loses-to .comp-section-hdr{background:rgba(239,68,68,.08);color:#ef4444;border-bottom:1px solid rgba(239,68,68,.2)}
.comp-section.competes-with .comp-section-hdr{background:rgba(99,129,250,.08);color:var(--primary);border-bottom:1px solid rgba(99,129,250,.2)}
.comp-section.beats .comp-section-hdr{background:rgba(16,185,129,.08);color:#10b981;border-bottom:1px solid rgba(16,185,129,.2)}
.comp-section-body{padding:10px 14px}
.comp-rating-badge{display:inline-block;font-size:.72rem;font-weight:600;padding:2px 10px;border-radius:10px;text-transform:uppercase;letter-spacing:.3px}
.comp-rating-badge.loses{background:rgba(239,68,68,.12);color:#ef4444}
.comp-rating-badge.competes{background:rgba(99,129,250,.12);color:var(--primary)}
.comp-rating-badge.beats{background:rgba(16,185,129,.12);color:#10b981}
.comp-section .comp-table{margin-bottom:0}
.comp-section .comp-add-row{margin:10px 14px 10px}
.comp-section-empty{text-align:center;padding:20px 16px;color:var(--text3);font-size:.85rem}
.req-edit-hint{font-size:.55rem;color:var(--text3);opacity:0;transition:opacity .15s}
.an-req-editable:hover .req-edit-hint{opacity:1}
.comp-inline-input{width:100%;padding:0 4px;border:1px solid transparent;border-radius:3px;font-size:.82rem;background:transparent;color:var(--text);text-align:center;font-family:inherit;transition:border-color .15s;box-sizing:border-box;-moz-appearance:textfield;height:26px;line-height:26px}
.comp-inline-input::-webkit-outer-spin-button,.comp-inline-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.comp-inline-input:hover{border-color:var(--border)}
.comp-inline-input:focus{border-color:var(--primary);outline:none;background:var(--surface)}
.comp-inline-input.sm{width:62px}
.proj-editable{cursor:pointer;border-radius:4px;padding:2px 6px;transition:background .15s}
.proj-editable:hover{background:rgba(99,129,250,.08)}
.comp-avg-item .proj-original{font-size:.68rem;color:var(--text3);font-style:italic;margin-top:1px}
.proj-input{width:100%;padding:4px 6px;border:1px solid transparent;border-radius:4px;font-size:1.1rem;font-weight:700;background:transparent;color:inherit;text-align:center;font-family:inherit;transition:border-color .15s;-moz-appearance:textfield}
.proj-input::-webkit-outer-spin-button,.proj-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.proj-input:hover{border-color:var(--border)}
.proj-input:focus{border-color:var(--primary);outline:none;background:var(--surface)}
.proj-original{font-size:.72rem;color:var(--text3);font-style:italic;margin-top:2px}

/* ===== CARD EDIT HOVER ===== */
.profile-card-header .card-edit-btn{opacity:0;transition:opacity .15s;width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);color:var(--text3);margin-left:auto;flex-shrink:0;cursor:pointer;z-index:2}
.profile-card:hover .card-edit-btn{opacity:1}
.card-edit-btn:hover{background:var(--primary-light);color:var(--primary)}
.clickable-edit{cursor:pointer;transition:background .15s}
.profile-card-header.clickable-edit:hover{background:var(--primary-light)}
.card-readonly.clickable-edit:hover{background:rgba(99,129,250,.04)}
.card-readonly .cr-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.card-readonly .cr-field{flex:1;min-width:80px;position:relative}
.card-readonly .cr-label{font-size:.68rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.card-readonly .cr-value{font-size:.85rem;font-weight:500;color:var(--text)}
.card-readonly .cr-value.empty{color:var(--text3);font-style:italic;font-weight:400;font-size:.78rem}
.card-readonly .cr-value a{color:var(--primary);font-weight:500}
.card-readonly .cr-value.email-val{color:var(--primary);font-weight:500;word-break:break-all}
.card-readonly .clickable-edit{cursor:pointer;border-radius:var(--radius);padding:4px 6px;margin:-4px -6px;transition:background .15s}
.card-readonly .clickable-edit:hover{background:var(--primary-light)}
.cr-val-row{display:flex;align-items:flex-start;gap:3px}
.cr-val-row .cr-value{flex:0 1 auto;min-width:0}
.cr-copy-btn{opacity:0;border:none;background:transparent;cursor:pointer;color:var(--text3);padding:1px;border-radius:3px;transition:opacity .15s,color .15s,background .15s;flex-shrink:0;display:flex;align-items:center;margin-top:-3px}
.cr-field:hover .cr-copy-btn{opacity:1}
.cr-copy-btn:hover{color:var(--primary);background:var(--primary-light)}
.cr-copy-btn.copied{color:var(--success,#22c55e)!important;opacity:1}
.ce-email-error{color:var(--danger);font-size:.72rem;margin-top:3px;display:none}
.ce-email-error.visible{display:block}
/* ===== CUSTOM DATE/TIME PICKER ===== */
.rr-dt-trigger{display:flex;align-items:center;gap:6px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:.85rem;color:var(--text);background:var(--surface);transition:border-color .15s;user-select:none;width:100%}
.rr-dt-trigger:hover{border-color:var(--primary)}
.rr-dt-trigger .rr-dt-icon{color:var(--text3);flex-shrink:0;display:flex;align-items:center}
.rr-dt-trigger .rr-dt-text{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rr-dt-trigger .rr-dt-text.empty{color:var(--text3)}
.rr-dt-trigger .rr-dt-clear{color:var(--text3);display:flex;align-items:center;padding:2px;border-radius:3px;flex-shrink:0;transition:color .15s,background .15s}
.rr-dt-trigger .rr-dt-clear:hover{color:var(--danger);background:rgba(239,68,68,.1)}
.rr-dt-popup{position:fixed;z-index:400;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 12px 40px rgba(0,0,0,.3);padding:12px;width:280px;display:none}
.rr-dt-popup.visible{display:block}
.rr-dt-popup .rr-cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.rr-dt-popup .rr-cal-nav button{border:none;background:transparent;cursor:pointer;color:var(--text2);padding:4px 8px;border-radius:var(--radius);font-size:.85rem;display:flex;align-items:center}
.rr-dt-popup .rr-cal-nav button:hover{background:var(--primary-light);color:var(--primary)}
.rr-dt-popup .rr-cal-title{font-size:.82rem;font-weight:600;color:var(--text)}
.rr-dt-popup .rr-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:10px}
.rr-dt-popup .rr-cal-dow{font-size:.65rem;font-weight:600;color:var(--text3);text-align:center;padding:4px 0;text-transform:uppercase}
.rr-dt-popup .rr-cal-day{font-size:.78rem;text-align:center;padding:5px 0;border-radius:var(--radius);cursor:pointer;color:var(--text);transition:background .1s,color .1s}
.rr-dt-popup .rr-cal-day:hover{background:var(--primary-light)}
.rr-dt-popup .rr-cal-day.other{color:var(--text3);opacity:.4}
.rr-dt-popup .rr-cal-day.today{font-weight:700;color:var(--primary)}
.rr-dt-popup .rr-cal-day.selected{background:var(--primary);color:#fff;font-weight:600}
.rr-dt-popup .rr-time-row{display:flex;align-items:center;gap:6px;padding-top:8px;border-top:1px solid var(--border)}
.rr-dt-popup .rr-time-row label{font-size:.72rem;font-weight:600;color:var(--text3);text-transform:uppercase;white-space:nowrap}
.rr-dt-popup .rr-time-sel{display:flex;align-items:center;gap:3px;flex:1}
.rr-dt-popup .rr-time-sel select{font-size:.8rem;padding:4px 6px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);cursor:pointer;flex:1}
.rr-dt-popup .rr-time-sel select:focus{border-color:var(--primary);outline:none}
.rr-dt-popup .rr-dt-actions{display:flex;justify-content:flex-end;gap:6px;margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.rr-dt-popup .rr-dt-actions button{font-size:.75rem;padding:5px 12px;border-radius:var(--radius);cursor:pointer;border:1px solid var(--border);transition:all .15s}
.rr-dt-popup .rr-dt-actions .rr-dt-done{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:600}
.rr-dt-popup .rr-dt-actions .rr-dt-done:hover{opacity:.9}
.rr-dt-popup .rr-dt-actions .rr-dt-cancel{background:var(--surface);color:var(--text2)}
.rr-dt-popup .rr-dt-actions .rr-dt-cancel:hover{background:var(--primary-light)}
.inline-status{cursor:pointer;position:relative;display:inline-block}
.inline-status:hover{opacity:.85}
.inline-status-dd{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 12px 40px rgba(0,0,0,.35);z-index:9999;min-width:190px;max-height:360px;overflow-y:auto;padding:4px 0;display:none}
.inline-status-dd.open{display:block}
.inline-status-dd .isd-item{padding:7px 12px;cursor:pointer;transition:background .1s;font-size:.82rem}
.inline-status-dd .isd-item:hover{background:var(--primary-light)}
.inline-status-dd .isd-item.current{background:var(--primary-light);font-weight:600}
.card-edit-popup{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:250;display:flex;align-items:center;justify-content:center}
.card-edit-popup .cep-panel{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:0 12px 40px rgba(0,0,0,.3);width:500px;max-width:90vw;max-height:85vh;overflow-y:auto}
.card-edit-popup .cep-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
.card-edit-popup .cep-header h3{font-size:.95rem;font-weight:600}
.card-edit-popup .cep-body{padding:16px 20px;overflow:visible}
.card-edit-popup .cep-actions{display:flex;gap:8px;justify-content:flex-end;padding:12px 20px;border-top:1px solid var(--border)}
/* ===== TEXTAREA HINT ===== */
.note-ta-wrap{position:relative;flex:1}
.note-ta-wrap textarea{width:100%}
.note-ta-hint{position:absolute;bottom:6px;right:8px;font-size:.6rem;color:var(--text3);pointer-events:none;opacity:.6;transition:opacity .15s}
.note-ta-wrap textarea:not(:placeholder-shown) ~ .note-ta-hint{opacity:0}


/* ===== SETTINGS ===== */
.settings-page{max-width:760px;margin:0 auto}
.settings-section{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.settings-section-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.settings-section-header h3{font-size:.92rem;font-weight:600;flex:1}
.settings-section-body{padding:16px 20px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.settings-row-left{flex:1;min-width:0}
.settings-row-left .sr-label{font-size:.88rem;font-weight:500;margin-bottom:1px}
.settings-row-left .sr-desc{font-size:.78rem;color:var(--text3)}
.settings-row-right{flex-shrink:0;margin-left:16px}
.settings-toggle{width:40px;height:22px;background:var(--border);border-radius:11px;position:relative;cursor:pointer;transition:background .2s}
.settings-toggle.on{background:var(--primary)}
.settings-toggle::after{content:'';width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.settings-toggle.on::after{transform:translateX(18px)}
.settings-value{font-size:.85rem;color:var(--text2);text-align:right}
.settings-profile-card{display:flex;align-items:center;gap:16px;padding:4px 0}
.settings-profile-avatar{width:56px;height:56px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:700;flex-shrink:0}
.settings-profile-avatar img{width:56px;height:56px;border-radius:50%;object-fit:cover}
.settings-profile-info{flex:1}
.settings-profile-info .sp-name{font-size:1.05rem;font-weight:600}
.settings-profile-info .sp-email{font-size:.82rem;color:var(--text2)}
.settings-profile-info .sp-role{font-size:.7rem;color:var(--primary);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.billing-history{width:100%;border-collapse:collapse;font-size:.82rem;margin-top:10px}
.billing-history th{text-align:left;font-size:.7rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;padding:6px 0;border-bottom:1px solid var(--border)}
.billing-history td{padding:8px 0;border-bottom:1px solid var(--border);color:var(--text2)}
.danger-zone{border-color:rgba(239,68,68,.3)}
.danger-zone .settings-section-header{background:rgba(239,68,68,.06)}
.danger-zone .settings-section-header h3{color:var(--danger)}

/* ===== DISCLAIMER OVERLAY ===== */
.disclaimer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:center;justify-content:center;animation:tipFadeIn .2s ease}
.disclaimer-modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:0 16px 48px rgba(0,0,0,.35);max-width:640px;width:94vw;max-height:88vh;display:flex;flex-direction:column;animation:tipSlideUp .25s ease}
.disclaimer-modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.disclaimer-modal-header h2{font-size:1.15rem;font-weight:700;color:var(--text);margin:0 0 4px}
.disclaimer-modal-header p{font-size:.8rem;color:var(--text3);margin:0}
.disclaimer-modal-body{flex:1;overflow-y:auto;padding:20px 24px;font-size:.84rem;line-height:1.7;color:var(--text2)}
.disclaimer-modal-body h3{font-size:.92rem;font-weight:700;color:var(--text);margin:20px 0 8px}
.disclaimer-modal-body h3:first-child{margin-top:0}
.disclaimer-modal-body p{margin-bottom:12px}
.disclaimer-modal-body ul{margin:0 0 12px 20px;padding:0}
.disclaimer-modal-body ul li{margin-bottom:4px}
.disclaimer-modal-footer{padding:16px 24px;border-top:1px solid var(--border);flex-shrink:0}
.disclaimer-scroll-hint{text-align:center;font-size:.72rem;color:var(--text3);padding:8px 0 12px;font-style:italic;transition:opacity .2s}
.disclaimer-checkbox{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px}
.disclaimer-checkbox input[type=checkbox]{width:18px;height:18px;margin-top:2px;accent-color:var(--primary);cursor:pointer;flex-shrink:0}
.disclaimer-checkbox label{font-size:.82rem;color:var(--text);line-height:1.45;cursor:pointer}
.disclaimer-btn{width:100%;padding:12px;border:none;border-radius:var(--radius);font-size:.88rem;font-weight:700;cursor:pointer;transition:all .15s}
.disclaimer-btn.enabled{background:var(--primary);color:#fff}
.disclaimer-btn.enabled:hover{filter:brightness(1.1)}
.disclaimer-btn.disabled{background:var(--border);color:var(--text3);cursor:not-allowed}

/* ===== THEME PICKER ===== */
.theme-picker{position:absolute;top:calc(100% + 6px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:300;width:220px;padding:12px;display:none}
.theme-picker.open{display:block}
.theme-picker .tp-section{margin-bottom:10px}
.theme-picker .tp-section:last-child{margin-bottom:0}
.theme-picker .tp-label{font-size:.68rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.tp-mode-toggle{display:flex;background:var(--bg);border-radius:var(--radius);padding:2px;gap:2px}
.tp-mode-toggle button{flex:1;padding:5px;border-radius:6px;font-size:.78rem;font-weight:500;color:var(--text3);display:flex;align-items:center;justify-content:center;gap:4px}
.tp-mode-toggle button.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
.tp-accents{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.tp-accent{height:36px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all .15s;display:flex;align-items:center;justify-content:center;position:relative}
.tp-accent:hover{transform:scale(1.05)}
.tp-accent.active{border-color:var(--text)}
.tp-accent .tp-check{display:none;color:#fff;font-size:.7rem;font-weight:700}
.tp-accent.active .tp-check{display:block}
.tp-accent.locked{opacity:.4;cursor:not-allowed}
.tp-accent.locked::after{content:'🔒';font-size:.5rem;position:absolute;bottom:2px;right:2px}
.tp-accent-label{font-size:.65rem;text-align:center;color:var(--text3);margin-top:2px}

/* ===== PIPELINE PROPERTY LIST ===== */
.pipeline-category-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:14px}
.pipeline-cat-tab{padding:8px 18px;font-size:.82rem;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;display:flex;align-items:center;gap:6px}
.pipeline-cat-tab:hover{opacity:.85;background:var(--primary-light)}
.pipeline-cat-tab.active{font-weight:600}
.pipeline-cat-tab .pct-count{font-size:.7rem;background:var(--bg);padding:1px 7px;border-radius:10px;font-weight:600;color:inherit;opacity:.7}
.pipeline-cat-tab.active .pct-count{opacity:1}
.pipeline-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.pipeline-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:12px 16px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:12px}
.pipeline-card:hover{border-color:var(--primary);box-shadow:var(--card-hover-shadow);transform:translateY(-1px)}
.pipeline-card .plc-main{flex:1;min-width:0}
.pipeline-card .plc-property{font-weight:600;font-size:.92rem;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pipeline-card .plc-name{font-size:.85rem;color:var(--text2);margin-bottom:4px}
.pipeline-card .plc-meta{display:flex;gap:8px;flex-wrap:wrap;font-size:.78rem;color:var(--text3)}
.pipeline-card .plc-status{flex-shrink:0}

/* ===== SALES FUNNEL ===== */
.funnel-wrap{margin-bottom:20px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:16px 20px}
.funnel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.funnel-header h3{font-size:.92rem;font-weight:600}
.funnel-header .fh-total{font-size:.8rem;color:var(--text3)}
.funnel-svg-wrap{width:100%;overflow:visible}
.funnel-svg-wrap svg{width:100%;height:auto;display:block}
.funnel-stage{cursor:pointer;transition:transform .15s ease;transform-origin:center center}
.funnel-stage:hover{transform:scaleX(1.02) scaleY(1.06)}
.funnel-labels{display:flex;margin-bottom:2px}
.funnel-label{text-align:center;font-size:.82rem;font-weight:600;color:var(--text);padding:4px 0}
.funnel-label span{font-size:.7rem;font-weight:400;color:var(--text3);margin-left:4px}
.funnel-leaked-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:10px;flex-wrap:wrap}
.funnel-leaked-chip{display:flex;align-items:center;gap:5px;font-size:.75rem;color:var(--text3);padding:3px 10px;background:var(--bg);border-radius:20px}
.funnel-leaked-chip strong{color:var(--text2);font-weight:600}
.funnel-conversion{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap}
.funnel-kpi{text-align:center}
.funnel-kpi .fk-value{font-size:1.2rem;font-weight:700}
.funnel-kpi .fk-label{font-size:.68rem;color:var(--text3);text-transform:uppercase;letter-spacing:.3px}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .sidebar{width:var(--sidebar-collapsed-w)!important}
  .sidebar .sidebar-brand span,.sidebar .nav-item span,.sidebar .su-info{opacity:0;width:0;overflow:hidden}
  .sidebar .nav-section{color:transparent}
  .sidebar .sidebar-brand{padding:14px 16px}
  .sidebar .sidebar-toggle{opacity:0;pointer-events:none}
  .sidebar .login-btn span{opacity:0;width:0;overflow:hidden}
  .sidebar .login-btn{justify-content:center;padding:6px}
  .kanban-col{min-width:250px}
}
/* Toast notifications */
.rr-toast{position:fixed;bottom:24px;right:24px;z-index:100000;padding:12px 20px;border-radius:10px;font-size:.85rem;font-weight:500;color:#fff;box-shadow:0 8px 30px rgba(0,0,0,0.3);transform:translateY(20px);opacity:0;transition:all .3s ease;pointer-events:none;max-width:360px}
.rr-toast.visible{transform:translateY(0);opacity:1}
.rr-toast.success{background:#10b981}

<script>
/* ===== DATA LAYER ===== */
const INITIAL_DATA = [];

const STATUSES = ['New','No Contact','Messaged','Left Voicemail','Follow Up','Interested','Meeting','HOA Issues','Not Good Fit','Not Interested','Un-Listed'];
const STATUS_ORDER = {};
STATUSES.forEach((s,i) => STATUS_ORDER[s] = i);

const PIPELINE_STAGES = ['New','No Contact','Messaged','Left Voicemail','Follow Up','Interested','Meeting'];
const CLOSED_STAGES = ['HOA Issues','Not Good Fit','Not Interested','Un-Listed'];

const SELECTABLE_STATUSES = STATUSES;

function statusClass(s){ return 'st-' + (s||'new').toLowerCase().replace(/\s+/g,'-') }
function statusPill(s){ return `<span class="status-pill ${statusClass(s)}">${s||'New'}</span>` }

let records = [];
let currentView = 'dashboard';
let searchQuery = '';
let filterStatus = 'All';
let contactsViewMode = 'table';
let previousView = 'dashboard';
let currentProfileId = null;
let pipelineCategory = 'prospects'; // 'prospects', 'outreach', 'qualified', 'lost'
let pipelineSubCategory = null; // null = all within category, or a specific status string
// profileActiveTab defined in PROFILE TABS section

function uid(){ return '_'+Math.random().toString(36).substr(2,9) }

const DATA_VERSION = 8;
let _saveTimeout = null;
let _currentUid = null;

function loadData(){
  // Start with empty records; Firestore data loads async via onAuthStateChanged
  records = [];
}

function hideLoadingOverlay(){
  const ol = document.getElementById('appLoadingOverlay');
  if(ol){ ol.style.opacity = '0'; setTimeout(() => ol.remove(), 350); }
}

async function loadDataFromFirestore(userUid){
  _currentUid = userUid;
  if(!userUid || typeof db === 'undefined') { records = []; render(); hideLoadingOverlay(); return; }
  try {
    // Clear any leftover localStorage data
    window.localStorage.removeItem('arbflow_records');
    window.localStorage.removeItem('arbflow_data_version');
    // Load from Firestore
    const doc = await db.collection('users').doc(userUid).collection('properties').doc('records').get();
    if(doc.exists){
      const data = doc.data();
      records = JSON.parse(data.data || '[]');
      records.forEach(r => { if(!r.propertyDetails) r.propertyDetails={}; if(!r.propertyNotes) r.propertyNotes=[]; if(r.status==='No Longer Interested') r.status='Not Interested'; if(r.status==='Lost') r.status='Not Interested'; });
    } else {
      records = [];
    }
  } catch(e){
    console.error('Failed to load data from Firestore:', e);
    records = [];
  }
  render();
  // Geocode properties that don't have coordinates yet
  geocodeExistingProperties();
  hideLoadingOverlay();
}

function saveData(){
  // Debounce Firestore writes to avoid excessive calls
  if(_saveTimeout) clearTimeout(_saveTimeout);
  _saveTimeout = setTimeout(() => {
    if(_currentUid && typeof db !== 'undefined'){
      db.collection('users').doc(_currentUid).collection('properties').doc('records').set({ 
        data: JSON.stringify(records),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }).catch(e => console.error('Failed to save data:', e));
    }
  }, 1000);
}

/* ===== VIEW ROUTER ===== */
let _handlingPopstate = false;

function switchView(view){
  // Save current profile tab/scroll into history before navigating away
  if(!_handlingPopstate && currentView === 'profile' && currentProfileId){
    const scrollContainer = document.querySelector('.content');
    const savedScrolls = Object.assign({}, tabScrollPositions);
    if(scrollContainer && profileActiveTab) savedScrolls[profileActiveTab] = scrollContainer.scrollTop;
    try {
      history.replaceState(Object.assign({}, history.state, { _profileTab: profileActiveTab, _tabScrolls: savedScrolls }), '');
    } catch(ex){}
  }
  currentView = view;
  currentProfileId = null;
  clearSearch();
  const navView = view === 'pipeline' ? 'dashboard' : view;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === navView));
  const titles = { dashboard:'Dashboard', pipeline:'Pipeline', contacts:'All Contacts', notifications:'Notifications', pricing:'Your Plan', settings:'Settings' };
  document.getElementById('headerTitle').textContent = titles[view] || '';
  if(!_handlingPopstate) history.pushState({ view: view, profileId: null }, '', '#' + view);
  saveViewState();
  render();
  // Auto-trigger dashboard tutorial on first visit
  if(view === 'dashboard' && _authDataLoaded && !_tut.active) _tutCheckDashboard();
}

function saveViewState(){
  try {
    sessionStorage.setItem('rr_view', currentView);
    sessionStorage.setItem('rr_profileId', currentProfileId || '');
    sessionStorage.setItem('rr_prevView', previousView);
  } catch(e){}
}

function restoreViewState(){
  try {
    const v = sessionStorage.getItem('rr_view');
    const pid = sessionStorage.getItem('rr_profileId');
    const pv = sessionStorage.getItem('rr_prevView');
    const pt = sessionStorage.getItem('rr_profileTab');
    if(v) currentView = v;
    if(pid) currentProfileId = pid;
    if(pv) previousView = pv;
    if(pt) profileActiveTab = pt;
  } catch(e){}
}

function render(){
  closeInlineStatusDD();
  const area = document.getElementById('contentArea');
  area.style.paddingTop = currentView === 'profile' ? '0' : '';
  switch(currentView){
    case 'dashboard':
      if(_savedMapState && _savedMapState.filter){ _mapFilter = _savedMapState.filter; }
      if(_savedMapState && _savedMapState.pipelineCat){ pipelineCategory = _savedMapState.pipelineCat; }
      area.innerHTML = renderDashboard(); setTimeout(initDashboardMap, 50); break;
    case 'pipeline': pipelineCategory=pipelineCategory||'prospects'; currentView='dashboard'; area.innerHTML = renderDashboard(); setTimeout(initDashboardMap, 50); document.querySelector('.pipeline-category-tabs')?.scrollIntoView({behavior:'smooth',block:'nearest'}); break;
    case 'contacts': area.innerHTML = renderContacts(); break;
    case 'notifications': area.innerHTML = renderNotifications(); break;
    case 'profile': area.innerHTML = renderProfile(); break;
    case 'pricing': area.innerHTML = renderPricing(); break;
    case 'settings': area.innerHTML = renderSettings(); break;
    case 'help': area.innerHTML = renderHelp(); break;
  }
  updateNotifBadges();
  // Set up paste handlers for Activity Log editors
  if(currentView === 'profile' && currentProfileId){
    requestAnimationFrame(() => {
      setupNotePasteHandler('newNoteRte_'+currentProfileId, currentProfileId);
    });
  }
}

/* ===== DASHBOARD ===== */
function renderDashboard(){
  const counts = {};
  STATUSES.forEach(s => counts[s] = 0);
  records.forEach(r => { counts[r.status] = (counts[r.status]||0)+1 });
  const total = records.length;
  const withContact = records.filter(r => r.name || r.phone || r.email).length;
  const active = records.filter(r => PIPELINE_STAGES.includes(r.status)).length;
  const followUps = getFollowUps();
  const overdue = followUps.filter(f => f.type === 'overdue');
  const todayFU = followUps.filter(f => f.type === 'today');
  const upcomingFU = followUps.filter(f => f.type === 'upcoming').slice(0,5);
  const hotLeads = (counts['Interested']||0) + (counts['Meeting']||0);
  const closed = records.filter(r => CLOSED_STAGES.includes(r.status)).length;

  // Meetings upcoming
  const today = new Date().toISOString().split('T')[0];
  const meetings = records.filter(r => r.meetingDate && r.meetingDate >= today)
    .sort((a,b) => a.meetingDate.localeCompare(b.meetingDate)).slice(0,5);
  const pastMeetings = records.filter(r => r.meetingDate && r.meetingDate < today).length;

  // Recent activity — latest notes and status changes
  const recentActivity = records.filter(r => r.date).sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0,6);

  // Needs attention: Follow Up status but no date, or no contact info on active leads
  const needsFollowUp = records.filter(r => r.status === 'Follow Up' && !r.followUpDate);
  const noContact = records.filter(r => PIPELINE_STAGES.includes(r.status) && !r.name && !r.phone && !r.email);

  // Funnel stages
  const funnelStages = [
    { name:'New Leads', statuses:['New','No Contact'], color:'#818cf8', catKey:'prospects' },
    { name:'In Outreach', statuses:['Messaged','Left Voicemail','Follow Up'], color:'#38bdf8', catKey:'outreach' },
    { name:'Qualified', statuses:['Interested','Meeting'], color:'#34d399', catKey:'qualified' }
  ];
  funnelStages.forEach(s => { s.count = records.filter(r => s.statuses.includes(r.status)).length });

  // Conversion rate
  const contacted = records.filter(r => !['New','No Contact'].includes(r.status)).length;
  const convRate = total > 0 ? ((hotLeads/total)*100).toFixed(1) : '0.0';

  let h = '<div class="db-grid">';

  // ── PIPELINE (standalone, no card wrapper) ──
  h += '<div id="pipelineUIContainer" style="margin-bottom:10px">';
  h += buildPipelineUI();
  h += '</div>';

  // ── MAP (standalone, no card wrapper) ──
  h += '<div class="db-map-standalone">';
  h += '<span class="db-hdr-action" id="mapPropertyCount" style="position:absolute;top:8px;left:12px;font-size:.72rem;z-index:5;background:rgba(0,0,0,.5);color:rgba(255,255,255,.85);padding:3px 8px;border-radius:5px;pointer-events:none"></span>';
  h += '<div id="dashboardMap"></div>';
  h += '</div>';

  // ── KPI CARDS ──
  h += '<div class="db-kpis">';
  h += `<div class="db-kpi" onclick="switchView('contacts')" style="cursor:pointer"><div class="kpi-icon" style="background:rgba(99,129,250,.12);color:var(--primary)">📋</div><div class="kpi-val">${total}</div><div class="kpi-label">Total Properties</div><div class="kpi-sub">${withContact} with contacts</div></div>`;
  h += `<div class="db-kpi" onclick="pipelineCategory='prospects';render();document.querySelector('.pipeline-category-tabs')?.scrollIntoView({behavior:'smooth',block:'nearest'})" style="cursor:pointer"><div class="kpi-icon" style="background:rgba(56,189,248,.12);color:#38bdf8">🔄</div><div class="kpi-val">${active}</div><div class="kpi-label">Active Pipeline</div><div class="kpi-sub">${closed} closed/lost</div></div>`;
  h += `<div class="db-kpi" onclick="pipelineCategory='qualified';render();document.querySelector('.pipeline-category-tabs')?.scrollIntoView({behavior:'smooth',block:'nearest'})" style="cursor:pointer"><div class="kpi-icon" style="background:rgba(52,211,153,.12);color:#34d399">🔥</div><div class="kpi-val">${hotLeads}</div><div class="kpi-label">Hot Leads</div><div class="kpi-sub">${convRate}% qualification rate</div></div>`;
  h += `<div class="db-kpi" onclick="switchView('notifications')" style="cursor:pointer"><div class="kpi-icon" style="background:${overdue.length?'rgba(239,68,68,.12)':'rgba(52,211,153,.12)'};color:${overdue.length?'var(--danger)':'var(--success)'}">📣</div><div class="kpi-val" style="color:${overdue.length?'var(--danger)':'var(--text)'}">${followUps.length}</div><div class="kpi-label">Follow-Ups Due</div><div class="kpi-sub">${overdue.length} overdue${todayFU.length ? ', '+todayFU.length+' today' : ''}</div></div>`;
  h += `<div class="db-kpi"><div class="kpi-icon" style="background:rgba(168,85,247,.12);color:#a855f7">📅</div><div class="kpi-val">${meetings.length}</div><div class="kpi-label">Upcoming Meetings</div><div class="kpi-sub">${pastMeetings} completed</div></div>`;
  h += '</div>';

  // ── MIDDLE ROW: Tasks + Meetings ──
  h += '<div class="db-row">';

  // Today's Tasks & Follow-Ups
  h += '<div class="db-card">';
  h += '<div class="db-card-hdr"><h3>✅ Tasks & Follow-Ups</h3><span class="db-hdr-action" onclick="switchView(\'notifications\')">View All →</span></div>';
  h += '<div class="db-card-body no-pad">';
  const taskItems = [...overdue, ...todayFU, ...upcomingFU, ...needsFollowUp.slice(0,3)];
  if(taskItems.length > 0){
    h += '<ul class="db-task-list">';
    overdue.forEach(r => {
      h += `<li class="db-task-item" onclick="openDetail('${r.id}')"><div class="db-task-dot" style="background:var(--danger)"></div><div class="db-task-info"><div class="db-task-property">${truncate(r.property,35)}</div><div class="db-task-meta">Follow up · ${r.name||'No contact'}</div></div><div class="db-task-date" style="color:var(--danger)">Overdue ${Math.abs(r.diff)}d</div></li>`;
    });
    todayFU.forEach(r => {
      h += `<li class="db-task-item" onclick="openDetail('${r.id}')"><div class="db-task-dot" style="background:var(--warning)"></div><div class="db-task-info"><div class="db-task-property">${truncate(r.property,35)}</div><div class="db-task-meta">Follow up · ${r.name||'No contact'}</div></div><div class="db-task-date" style="color:var(--warning)">Today</div></li>`;
    });
    upcomingFU.forEach(r => {
      const dLabel = r.diff === -1 ? 'Tomorrow' : fmtDate(r.followUpDate);
      h += `<li class="db-task-item" onclick="openDetail('${r.id}')"><div class="db-task-dot" style="background:var(--info)"></div><div class="db-task-info"><div class="db-task-property">${truncate(r.property,35)}</div><div class="db-task-meta">Follow up · ${r.name||'No contact'}</div></div><div class="db-task-date" style="color:var(--info)">${dLabel}</div></li>`;
    });
    needsFollowUp.slice(0,3).forEach(r => {
      h += `<li class="db-task-item" onclick="openDetail('${r.id}')"><div class="db-task-dot" style="background:var(--text3)"></div><div class="db-task-info"><div class="db-task-property">${truncate(r.property,35)}</div><div class="db-task-meta">Needs follow-up date</div></div><div class="db-task-date" style="color:var(--text3)">No date</div></li>`;
    });
    h += '</ul>';
  } else {
    h += '<div class="db-empty">All caught up! No pending tasks.</div>';
  }
  h += '</div></div>';

  // Upcoming Meetings
  h += '<div class="db-card">';
  h += '<div class="db-card-hdr"><h3>📅 Upcoming Meetings</h3></div>';
  h += '<div class="db-card-body no-pad">';
  if(meetings.length > 0){
    h += '<ul class="db-task-list">';
    meetings.forEach(r => {
      const isToday = r.meetingDate === today;
      h += `<li class="db-task-item" onclick="openDetail('${r.id}')"><div class="db-task-dot" style="background:${isToday?'var(--warning)':'var(--primary)'}"></div><div class="db-task-info"><div class="db-task-property">${truncate(r.property,35)}</div><div class="db-task-meta">${r.name||'No contact'}${r.meetingTime ? ' · '+r.meetingTime : ''}</div></div><div class="db-task-date" style="color:${isToday?'var(--warning)':'var(--primary)'}">${isToday ? 'Today' : fmtDate(r.meetingDate)}</div></li>`;
    });
    h += '</ul>';
  } else {
    h += '<div class="db-empty">No upcoming meetings scheduled.</div>';
  }
  h += '</div></div>';

  h += '</div>'; // end db-row

  // ── BOTTOM ROW: Recent Activity + Insights ──
  h += '<div class="db-row">';

  // Recent Activity
  h += '<div class="db-card">';
  h += '<div class="db-card-hdr"><h3>🕐 Recent Activity</h3><span class="db-hdr-action" onclick="switchView(\'contacts\')">All Contacts →</span></div>';
  h += '<div class="db-card-body no-pad">';
  if(recentActivity.length > 0){
    recentActivity.forEach(r => {
      const lastNote = r.notes && r.notes.length > 0 ? r.notes[r.notes.length - 1] : null;
      const noteSnippet = lastNote ? (lastNote.html ? lastNote.html.replace(/<[^>]+>/g,' ').substring(0,50) : (lastNote.text||'').substring(0,50)) : '';
      h += `<div class="db-recent-item" onclick="openDetail('${r.id}')">${statusPill(r.status)}<div class="db-recent-prop">${truncate(r.property,30)}${noteSnippet ? ' <span style="color:var(--text3);font-weight:400;font-size:.76rem">— '+esc(noteSnippet)+'</span>' : ''}</div><div class="db-recent-date">${fmtDate(r.date)}</div></div>`;
    });
  } else {
    h += '<div class="db-empty">No recent activity yet.</div>';
  }
  h += '</div></div>';

  // Insights & Quick Stats
  h += '<div class="db-card">';
  h += '<div class="db-card-hdr"><h3>💡 Insights</h3></div>';
  h += '<div class="db-card-body">';
  const insights = [];
  if(overdue.length > 0) insights.push({ icon:'⚠️', bg:'rgba(239,68,68,.1)', text:`<strong>${overdue.length} overdue follow-up${overdue.length>1?'s':''}</strong> need${overdue.length===1?'s':''} attention today` });
  if(noContact.length > 0) insights.push({ icon:'👤', bg:'rgba(245,158,11,.1)', text:`<strong>${noContact.length} active lead${noContact.length>1?'s':''}</strong> missing contact info` });
  const newCount = counts['New']||0;
  if(newCount > 0) insights.push({ icon:'🆕', bg:'rgba(129,140,248,.1)', text:`<strong>${newCount} new propert${newCount>1?'ies':'y'}</strong> waiting for outreach` });
  if(contacted > 0 && total > 0) insights.push({ icon:'📈', bg:'rgba(56,189,248,.1)', text:`<strong>${((contacted/total)*100).toFixed(0)}%</strong> contact rate — ${contacted} of ${total} properties reached` });
  if(hotLeads > 0) insights.push({ icon:'🔥', bg:'rgba(52,211,153,.1)', text:`<strong>${hotLeads} hot lead${hotLeads>1?'s':''}</strong> in Interested or Meeting stage` });
  const messaged = counts['Messaged']||0;
  const voicemail = counts['Left Voicemail']||0;
  if(messaged + voicemail > 0) insights.push({ icon:'📤', bg:'rgba(56,189,248,.1)', text:`<strong>${messaged + voicemail}</strong> in outreach — ${messaged} messaged, ${voicemail} voicemail` });
  if(closed > 0 && total > 0) insights.push({ icon:'📊', bg:'rgba(239,68,68,.08)', text:`<strong>${((closed/total)*100).toFixed(0)}%</strong> loss rate — ${closed} of ${total} properties closed or lost` });

  if(insights.length > 0){
    insights.slice(0,6).forEach(ins => {
      h += `<div class="db-insight-row"><div class="db-insight-icon" style="background:${ins.bg}">${ins.icon}</div><div class="db-insight-text">${ins.text}</div></div>`;
    });
  } else {
    h += '<div class="db-empty">Add properties to start seeing insights.</div>';
  }
  h += '</div></div>';

  h += '</div>'; // end db-row

  h += '</div>'; // end db-grid

  return h;
}

function buildPipelineUI(){
  const total = records.length;
  const active = records.filter(r => PIPELINE_STAGES.includes(r.status)).length;
  const closed = records.filter(r => CLOSED_STAGES.includes(r.status)).length;
  const activeCat = pipelineCategory || 'all';
  const cats = FUNNEL_CATEGORIES.map(c => ({
    ...c,
    count: records.filter(r => c.statuses.includes(r.status)).length
  }));
  const lostCount = records.filter(r => CLOSED_STAGES.includes(r.status)).length;
  const funnelStages = [
    { name:'New Leads', statuses:['New','No Contact'], color:'#818cf8' },
    { name:'In Outreach', statuses:['Messaged','Left Voicemail','Follow Up'], color:'#38bdf8' },
    { name:'Qualified', statuses:['Interested','Meeting'], color:'#34d399' }
  ];

  const boxMeta = [
    { key:'prospects', col:'129,140,248', icon:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>' },
    { key:'outreach', col:'56,189,248', icon:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>' },
    { key:'qualified', col:'52,211,153', icon:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>' },
    { key:'lost', col:'239,68,68', icon:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>' }
  ];

  let h = '';
  if(active > 0 || lostCount > 0){
    const boxCounts = boxMeta.map(m => m.key === 'lost' ? lostCount : (cats.find(x => x.key===m.key)?.count || 0));
    // For proportional widths: treat 0 same as 1 for min-width, use actual counts for ratio
    const minFlex = 1; // minimum flex value (for 0 or 1 count)
    const flexValues = boxCounts.map(c => Math.max(c, minFlex));
    const totalIsActive = _mapFilter === 'all';
    h += `<div class="db-pipeline-wrap ${totalIsActive?'active':''}" onclick="_mapFilter='all';pipelineCategory='all';updatePipelineUI();setMapFilter('all')">`;
    h += `<div class="db-pipeline-wrap-hdr">
      <span class="pw-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
      <span class="pw-count">${total}</span>
    </div>`;
    h += '<div class="db-pipeline-boxes">';
    boxMeta.forEach((m, i) => {
      const count = boxCounts[i];
      const isEmpty = count === 0;
      const isActive = activeCat === m.key && !isEmpty;
      const bg = isEmpty ? 'var(--bg)' : (isActive ? 'rgba('+m.col+',.22)' : 'rgba('+m.col+',.08)');
      const border = isEmpty ? 'var(--border)' : (isActive ? 'rgb('+m.col+')' : 'rgba('+m.col+',.25)');
      const shadow = isActive ? 'box-shadow:0 0 0 3px rgba('+m.col+',.2)' : '';
      const flex = flexValues[i];
      const disabledClass = isEmpty ? ' disabled' : '';
      const onclick = isEmpty ? '' : `onclick="event.stopPropagation();pipelineCategory='${m.key}';_mapFilter='${m.key}';updatePipelineUI();setMapFilter('${m.key}')"`;
      h += `<div class="db-pipeline-box${disabledClass}${isActive?' active':''}" ${onclick} style="color:${isEmpty?'var(--text3)':'rgb('+m.col+')'};background:${bg};border-color:${border};${shadow};flex:${flex} 0 0;min-width:54px">
        <span class="pb-icon">${m.icon}</span>
        <span class="pb-count">${count}</span>
      </div>`;
    });
    h += '</div></div>';
  } else {
    h += '<div class="db-empty">No properties yet. Add your first property to see your pipeline.</div>';
  }

  // Always show category tabs (no active tab when All Properties selected)
  const catColors = { prospects:'#818cf8', outreach:'#38bdf8', qualified:'#34d399' };
  h += `<div class="pipeline-category-tabs" style="margin-top:14px">
    ${cats.map(c => {
      const isActive = activeCat===c.key;
      const col = catColors[c.key];
      return `<div class="pipeline-cat-tab ${isActive?'active':''}" onclick="pipelineCategory='${c.key}';_mapFilter='${c.key}';updatePipelineUI();setMapFilter('${c.key}')" style="color:${col};${isActive?'border-bottom-color:'+col:''}">${c.name} <span class="pct-count">${c.count}</span></div>`;
    }).join('')}
    <div class="pipeline-cat-tab ${activeCat==='lost'?'active':''}" onclick="pipelineCategory='lost';_mapFilter='lost';updatePipelineUI();setMapFilter('lost')" style="color:var(--danger);${activeCat==='lost'?'border-bottom-color:var(--danger)':''}">Closed/Lost <span class="pct-count">${lostCount}</span></div>
  </div>`;

  // Fixed-height status area — populated when a category is selected, empty placeholder when All Properties
  const maxStatusRows = Math.max(...[...FUNNEL_CATEGORIES.map(c => c.statuses.length), CLOSED_STAGES.length]);
  const statusAreaHeight = maxStatusRows * 38;
  if(activeCat !== 'all'){
    const isLost = activeCat === 'lost';
    const catStatuses = isLost ? CLOSED_STAGES : (cats.find(c => c.key === activeCat)?.statuses || []);
    const statusItems = catStatuses.map(st => ({ status: st, count: records.filter(r => r.status === st).length }));
    if(statusItems.length > 0){
      h += `<div class="db-status-breakdown" style="min-height:${statusAreaHeight}px">`;
      statusItems.forEach(s => {
        const catColor = isLost ? 'var(--danger)' : (funnelStages.find(fs => fs.statuses.includes(s.status))?.color || 'var(--primary)');
        h += `<div class="db-status-row" onclick="event.stopPropagation();_mapFilter='status:${s.status}';setMapFilter('status:${s.status}')">
          <div class="db-status-pill-wrap">${statusPill(s.status)}</div>
          <div class="db-status-bar-track"><div class="db-status-bar-fill" style="width:${total > 0 ? Math.max((s.count/total)*100, s.count > 0 ? 3 : 0) : 0}%;background:${catColor}"></div></div>
          <div class="db-status-count">${s.count}</div>
          <svg class="db-status-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>`;
      });
      h += '</div>';
    } else {
      h += `<div style="min-height:${statusAreaHeight}px"></div>`;
    }
  } else {
    h += `<div style="min-height:${statusAreaHeight}px"></div>`;
  }

  return h;
}

function updatePipelineUI(){
  const container = document.getElementById('pipelineUIContainer');
  if(container) container.innerHTML = buildPipelineUI();
}

/* ===== MAP FUNCTIONS ===== */
let dashMap = null;
let _savedMapState = null;
let _savedMapPopupId = null;
let _savedClusterPopup = null; // { coords, scrollTop, clusterId }
let _mapFilter = 'all'; // 'all', category key, or 'status:StatusName'
let _allGeoJson = null; // full unfiltered GeoJSON

function setMapFilter(filter){
  _mapFilter = filter;
  // Close any open map popups (cluster list, property popup)
  document.querySelectorAll('.maplibregl-popup,.mapboxgl-popup').forEach(el => {
    if(el._popup) el._popup.remove(); else el.remove();
  });
  if(!dashMap || !_allGeoJson) return;
  const src = dashMap.getSource('properties');
  if(!src) return;

  // Determine which statuses to show
  let allowedStatuses = null;
  if(filter === 'all'){
    allowedStatuses = null; // show all
  } else if(filter.startsWith('status:')){
    allowedStatuses = [filter.substring(7)];
  } else {
    // category key
    const catMap = { prospects:['New','No Contact'], outreach:['Messaged','Left Voicemail','Follow Up'], qualified:['Interested','Meeting'], lost:CLOSED_STAGES };
    allowedStatuses = catMap[filter] || null;
  }

  const filtered = allowedStatuses ? {
    type:'FeatureCollection',
    features: _allGeoJson.features.filter(f => allowedStatuses.includes(f.properties.status))
  } : _allGeoJson;

  src.setData(filtered);

  // Update count display
  const countEl = document.getElementById('mapPropertyCount');
  if(countEl){
    const shown = filtered.features.length;
    const total = _allGeoJson.features.length;
    countEl.textContent = (filter === 'all' ? shown : shown + ' of ' + total) + ' mapped';
  }

  // Smoothly fly to filtered set
  if(filtered.features.length > 1){
    const bounds = new maplibregl.LngLatBounds();
    filtered.features.forEach(f => bounds.extend(f.geometry.coordinates));
    dashMap.fitBounds(bounds, { padding: 60, maxZoom: 15, duration: 1000, easing: t => t<.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2 });
  } else if(filtered.features.length === 1){
    dashMap.flyTo({ center: filtered.features[0].geometry.coordinates, zoom: 13, duration: 1000, easing: t => t<.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2 });
  }
}

function saveMapState(){
  if(dashMap){ _savedMapState = { center: dashMap.getCenter().toArray(), zoom: dashMap.getZoom(), filter: _mapFilter, pipelineCat: pipelineCategory }; }
}

function clearMapState(){
  _savedMapState = null;
  _savedMapPopupId = null;
  _savedClusterPopup = null;
  _mapFilter = 'all';
}

function copyMapField(btn, text){
  if(!text) return;
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    const orig = btn.innerHTML;
    btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>';
    setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = orig; }, 1500);
  });
}

      '<span style="font-size:.72rem;padding:2px 8px;border-radius:6px;font-weight:600;color:' + statusColor + ';background:' + statusColor + '1a;border:1px solid ' + statusColor + '33">' + esc(p.status || 'New') + '</span>' +
    '</div>' +
    (p.name ? '<div class="map-popup-contact">👤 ' + esc(p.name) + (p.phone ? ' · <span class="map-popup-phone">' + esc(p.phone) + '<button class="map-popup-copy" onclick="event.stopPropagation();copyMapField(this,\'' + esc(p.phone).replace(/'/g, "\\'") + '\')" title="Copy phone">' + copyBtn + '</button></span>' : '') + '</div>' : '') +
    '<button class="map-popup-btn" onclick="_savedMapPopupId=\'' + p.id + '\';saveMapState();openDetail(\'' + p.id + '\')">View Property →</button>' +
  '</div>';
  return { popupId: popupId, html: html };
}

function initDashboardMap(){
  const container = document.getElementById('dashboardMap');
  if(!container) return;

  // Collect geocoded properties
  const geoProps = records.filter(r => {
    const d = r.propertyDetails || {};
    return d.latitude && d.longitude;
  }).map(r => {
    const d = r.propertyDetails || {};
    return {
      id: r.id,
      lat: d.latitude,
      lng: d.longitude,
      property: r.property,
      name: r.name || '',
      phone: r.phone || '',
      status: r.status || '',
      rent: d.monthlyRent || 0,
      beds: d.bedrooms || '—',
      baths: d.bathrooms || '—',
      sqft: d.sqft || '—',
      addressParts: r.addressParts || parseAddressParts(r.property)
    };
  });

  // Update count
  const countEl = document.getElementById('mapPropertyCount');
  if(countEl) countEl.textContent = geoProps.length + ' of ' + records.length + ' mapped';

  if(geoProps.length === 0){
    container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:.82rem;font-style:italic">No geocoded properties yet. Add properties with addresses to see them on the map.</div>';
    return;
  }

  // Destroy existing map
  if(dashMap){ dashMap.remove(); dashMap = null; }

  // Calculate center from properties
  const avgLat = geoProps.reduce((s,p) => s + p.lat, 0) / geoProps.length;
  const avgLng = geoProps.reduce((s,p) => s + p.lng, 0) / geoProps.length;

  // Build GeoJSON and store full set for filtering
  const geojson = {
    type: 'FeatureCollection',
    features: geoProps.map(p => ({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [p.lng, p.lat] },
      properties: { ...p }
    }))
  };
  _allGeoJson = geojson;

  // Init map — use theme-appropriate tiles
  const mapStyle = isDark
    ? 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json'
    : 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json';
  const initCenter = _savedMapState ? _savedMapState.center : [avgLng, avgLat];
  const initZoom = _savedMapState ? _savedMapState.zoom : (geoProps.length === 1 ? 12 : 9);
  const hadSavedState = !!_savedMapState;
  _savedMapState = null;

  dashMap = new maplibregl.Map({
    container: 'dashboardMap',
    style: mapStyle,
    center: initCenter,
    zoom: initZoom,
    attributionControl: false,
    scrollZoom: false
  });

  dashMap.addControl(new maplibregl.NavigationControl(), 'top-right');

  // Ctrl+scroll to zoom smoothly — page scrolls normally otherwise
  const mapEl = dashMap.getContainer();
  let ctrlHintTimer = null;
  let ctrlZoomActive = false;
  let ctrlZoomTimeout = null;

  function enableCtrlZoom(){
    if(!ctrlZoomActive){
      ctrlZoomActive = true;
      dashMap.scrollZoom.enable();
    }
    clearTimeout(ctrlZoomTimeout);
    ctrlZoomTimeout = setTimeout(() => {
      ctrlZoomActive = false;
      dashMap.scrollZoom.disable();
    }, 400);
  }

  mapEl.addEventListener('wheel', (e) => {
    // Skip map zoom hints if scrolling inside a popup (cluster list, property popup, etc.)
    if(e.target.closest && e.target.closest('.maplibregl-popup,.mapboxgl-popup')) return;
    if(e.ctrlKey || e.metaKey){
      e.preventDefault();
      enableCtrlZoom();
    } else if(!ctrlZoomActive) {
      // Show hint at pointer position
      let hint = mapEl.querySelector('.map-ctrl-hint');
      if(!hint){
        hint = document.createElement('div');
        hint.className = 'map-ctrl-hint';
        hint.textContent = 'Hold Ctrl + scroll to zoom';
        mapEl.appendChild(hint);
      }
      const rect = mapEl.getBoundingClientRect();
      hint.style.left = (e.clientX - rect.left) + 'px';
      hint.style.top = (e.clientY - rect.top) + 'px';
      hint.style.opacity = '1';
      clearTimeout(ctrlHintTimer);
      ctrlHintTimer = setTimeout(() => { hint.style.opacity = '0'; }, 1200);
    }
  }, { passive: false });

  // Also enable/disable on keydown/keyup for immediate response
  function onCtrlDown(e){ if((e.key==='Control'||e.key==='Meta') && mapEl.matches(':hover')){ enableCtrlZoom(); }}
  function onCtrlUp(e){ if(e.key==='Control'||e.key==='Meta'){ clearTimeout(ctrlZoomTimeout); ctrlZoomActive=false; dashMap.scrollZoom.disable(); }}
  document.addEventListener('keydown', onCtrlDown);
  document.addEventListener('keyup', onCtrlUp);
  dashMap.on('remove', () => { document.removeEventListener('keydown', onCtrlDown); document.removeEventListener('keyup', onCtrlUp); });

  // Persistent info panel in bottom-right
  const infoPanel = document.createElement('div');
  infoPanel.className = 'map-info-panel';
  infoPanel.innerHTML = '<span class="map-info-icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></span> Ctrl + Scroll to zoom <span class="map-info-sep">·</span> Click pin for details';
  mapEl.appendChild(infoPanel);

  dashMap.on('load', () => {
    // Clustered source — groups nearby properties dynamically
    dashMap.addSource('properties', {
      type: 'geojson',
      data: geojson,
      cluster: true,
      clusterMaxZoom: 18,
      clusterRadius: 50
    });

    // Cluster circles — color by point_count: blue(2-4), green(5-10), red(10+)
    dashMap.addLayer({
      id: 'clusters',
      type: 'circle',
      source: 'properties',
      filter: ['has', 'point_count'],
      paint: {
        'circle-color': [
          'interpolate', ['linear'], ['get', 'point_count'],
          2, '#3b82f6',
          4, '#3b82f6',
          5, '#22c55e',
          10, '#22c55e',
          11, '#ef4444'
        ],
        'circle-radius': [
          'interpolate', ['linear'], ['get', 'point_count'],
          2, 18,
          5, 22,
          10, 28,
          30, 36,
          100, 44
        ],
        'circle-opacity': 0.85,
        'circle-stroke-width': 2,
        'circle-stroke-color': 'rgba(255,255,255,0.6)'
      }
    });

    // Cluster count labels
    dashMap.addLayer({
      id: 'cluster-count',
      type: 'symbol',
      source: 'properties',
      filter: ['has', 'point_count'],
      layout: {
        'text-field': '{point_count_abbreviated}',
        'text-size': 13,
        'text-font': ['Open Sans Bold', 'Arial Unicode MS Bold']
      },
      paint: {
        'text-color': '#ffffff'
      }
    });

    // Individual property pins (unclustered) — always visible
    dashMap.addLayer({
      id: 'unclustered-point',
      type: 'circle',
      source: 'properties',
      filter: ['!', ['has', 'point_count']],
      paint: {
        'circle-radius': ['interpolate', ['linear'], ['zoom'], 5, 5, 16, 9],
        'circle-color': '#6366f1',
        'circle-stroke-width': 2.5,
        'circle-stroke-color': '#fff'
      }
    });

    // Track active popup so we can close it when opening another
    let activeMapPopup = null;

    // Click cluster to show scrollable property list
    let _clusterClickHandled = false;
    dashMap.on('click', 'clusters', async (e) => {
      _clusterClickHandled = true;
      const features = dashMap.queryRenderedFeatures(e.point, { layers: ['clusters'] });
      if(!features.length) return;
      const clusterId = features[0].properties.cluster_id;
      const coords = features[0].geometry.coordinates.slice();
      const pointCount = features[0].properties.point_count;
      const src = dashMap.getSource('properties');
      try {
        // MapLibre v4 uses promise-based API; fall back to callback for older versions
        let leaves;
        const result = src.getClusterLeaves(clusterId, pointCount, 0, (err, cbLeaves) => {
          if(!err && cbLeaves && cbLeaves.length) showClusterPopup(cbLeaves, coords, clusterId);
        });
        if(result && typeof result.then === 'function'){
          leaves = await result;
          if(leaves && leaves.length) showClusterPopup(leaves, coords, clusterId);
        }
      } catch(ex){ console.log('Cluster leaves error:', ex); }
    });

    // Helper: show cluster list popup with slide-to-detail
    function showClusterPopup(leaves, coords, clusterId, restoreScrollTop, restoreDetailId){
      if(activeMapPopup){ activeMapPopup.remove(); activeMapPopup = null; }
      const popupId = 'cp_' + Date.now();

      // Build list panel
      let listHtml = '<div class="cluster-popup-panel" id="' + popupId + '_listpanel">';
      listHtml += '<div class="cluster-popup-header"><span>' + leaves.length + ' Properties</span>';
      listHtml += '<div class="cluster-popup-close" onclick="document.getElementById(\'' + popupId + '\')._popup.remove()" title="Close">✕</div></div>';
      listHtml += '<div class="cluster-popup-list" id="' + popupId + '_list">';
      leaves.forEach(f => {
        const p = f.properties;
        const addr = p.property || 'Unknown Address';
        const st = p.status || 'New';
        const stColor = getStatusColor(st);
        listHtml += '<div class="cluster-popup-item" data-pid="' + p.id + '" onclick="window._clusterSlideToDetail(\'' + popupId + '\',\'' + p.id + '\')">';
        listHtml += '<div class="cluster-popup-item-info">';
        listHtml += '<div class="cluster-popup-item-addr">' + esc(addr) + '</div>';
        listHtml += '<span class="cluster-popup-item-status" style="color:' + stColor + ';background:' + stColor + '1a;border:1px solid ' + stColor + '33">' + esc(st) + '</span>';
        listHtml += '</div>';
        listHtml += '<span class="cluster-popup-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></span>';
        listHtml += '</div>';
      });
      listHtml += '</div></div>';

      // Detail panel placeholder
      let detailHtml = '<div class="cluster-popup-detail" id="' + popupId + '_detail"></div>';

      let html = '<div id="' + popupId + '" class="cluster-popup-slider">' + listHtml + detailHtml + '</div>';

      const popup = new maplibregl.Popup({ className: 'map-cluster-popup', maxWidth: '290px', closeButton: false, closeOnClick: false, closeOnMove: false, anchor: 'bottom' })
        .setLngLat(coords)
        .setHTML(html)
        .addTo(dashMap);
      const popupEl = document.getElementById(popupId);
      if(popupEl) popupEl._popup = popup;
      activeMapPopup = popup;

      // Store leaves data on the wrapper so slide functions can access it
      if(popupEl){
        popupEl._leaves = leaves;
        popupEl._coords = coords;
        popupEl._clusterId = clusterId;
      }

      // Restore scroll position if returning from property profile
      if(typeof restoreScrollTop === 'number'){
        setTimeout(() => {
          const listEl = document.getElementById(popupId + '_list');
          if(listEl) listEl.scrollTop = restoreScrollTop;
        }, 50);
      }

      // If returning and a detail was open, slide to it
      if(restoreDetailId){
        setTimeout(() => { window._clusterSlideToDetail(popupId, restoreDetailId); }, 80);
      }

      // Pan map if popup is clipped
      const mapContainer = dashMap.getContainer();
      const pt = dashMap.project(coords);
      const popupHeight = 300, pad = 20;
      let dx = 0, dy = 0;
      if(pt.y - popupHeight - pad < 0) dy = pt.y - popupHeight - pad;
      if(pt.x - 145 - pad < 0) dx = pt.x - 145 - pad;
      if(pt.x + 145 + pad > mapContainer.clientWidth) dx = pt.x + 145 + pad - mapContainer.clientWidth;
      if(dx !== 0 || dy !== 0) dashMap.panBy([dx, dy], { duration: 300 });
    }

    // Slide from cluster list to property detail
    window._clusterSlideToDetail = function(popupId, propId){
      const wrapper = document.getElementById(popupId);
      if(!wrapper) return;
      const listPanel = document.getElementById(popupId + '_listpanel');
      const detailPanel = document.getElementById(popupId + '_detail');
      if(!listPanel || !detailPanel) return;

      // Find property data from stored leaves
      const leaves = wrapper._leaves || [];
      const leaf = leaves.find(f => f.properties.id === propId);
      if(!leaf) return;
      const p = leaf.properties;

      // Store current scroll position on the list
      const listEl = document.getElementById(popupId + '_list');
      wrapper._listScrollTop = listEl ? listEl.scrollTop : 0;
      wrapper._activeDetailId = propId;

      // Build detail content — same as normal property popup + back button
      const addr = p.property || 'Unknown Address';
      const rent = p.rent ? '$' + Number(p.rent).toLocaleString() + '/mo' : '—';
      const statusColor = getStatusColor(p.status);
      const copyBtn = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';
      const coords = wrapper._coords;
      const clusterId = wrapper._clusterId;

      let dHtml = '<div class="cluster-popup-back" onclick="window._clusterSlideBack(\'' + popupId + '\')" style="position:relative">';
      dHtml += '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>';
      dHtml += '<span>Back to list</span>';
      dHtml += '<div class="cluster-popup-close" onclick="event.stopPropagation();document.getElementById(\'' + popupId + '\')._popup.remove()" title="Close" style="position:absolute;right:10px;top:50%;transform:translateY(-50%)">✕</div>';
      dHtml += '</div>';
      dHtml += '<div class="map-popup-inner">';
      dHtml += '<div class="map-popup-addr">' + esc(addr) + '<button class="map-popup-copy" onclick="event.stopPropagation();copyMapField(this,\'' + esc(addr).replace(/'/g, "\\'") + '\')" title="Copy address">' + copyBtn + '</button></div>';
      dHtml += '<div class="map-popup-divider"></div>';
      dHtml += '<div class="map-popup-stats">';
      dHtml += '<span>🛏 ' + esc(String(p.beds)) + ' bd</span>';
      dHtml += '<span>🛁 ' + esc(String(p.baths)) + ' ba</span>';
      if(p.sqft && p.sqft !== '—') dHtml += '<span>📐 ' + Number(p.sqft).toLocaleString() + ' sqft</span>';
      dHtml += '</div>';
      dHtml += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">';
      dHtml += '<div class="map-popup-rent">' + rent + '</div>';
      dHtml += '<span style="font-size:.72rem;padding:2px 8px;border-radius:6px;font-weight:600;color:' + statusColor + ';background:' + statusColor + '1a;border:1px solid ' + statusColor + '33">' + esc(p.status || 'New') + '</span>';
      dHtml += '</div>';
      if(p.name) {
        dHtml += '<div class="map-popup-contact">👤 ' + esc(p.name);
        if(p.phone) dHtml += ' · <span class="map-popup-phone">' + esc(p.phone) + '<button class="map-popup-copy" onclick="event.stopPropagation();copyMapField(this,\'' + esc(p.phone).replace(/'/g, "\\'") + '\')" title="Copy phone">' + copyBtn + '</button></span>';
        dHtml += '</div>';
      }
      dHtml += '<button class="map-popup-btn" onclick="_savedClusterPopup={coords:[' + coords[0] + ',' + coords[1] + '],clusterId:' + clusterId + ',scrollTop:' + (wrapper._listScrollTop||0) + ',detailId:\'' + p.id + '\'};_savedMapPopupId=null;saveMapState();openDetail(\'' + p.id + '\')">View Property →</button>';
      dHtml += '</div>';

      detailPanel.innerHTML = dHtml;

      // Slide: list out, detail in
      listPanel.classList.add('slide-out');
      detailPanel.classList.add('slide-in');
    };

    // Slide back from detail to cluster list
    window._clusterSlideBack = function(popupId){
      const wrapper = document.getElementById(popupId);
      if(!wrapper) return;
      const listPanel = document.getElementById(popupId + '_listpanel');
      const detailPanel = document.getElementById(popupId + '_detail');
      if(!listPanel || !detailPanel) return;

      wrapper._activeDetailId = null;
      listPanel.classList.remove('slide-out');
      detailPanel.classList.remove('slide-in');

      // Restore scroll position
      setTimeout(() => {
        const listEl = document.getElementById(popupId + '_list');
        if(listEl && wrapper._listScrollTop) listEl.scrollTop = wrapper._listScrollTop;
      }, 30);
    };

    // Close popup when clicking empty map area (skip if click was on cluster or pin)
    dashMap.on('click', (e) => {
      if(_clusterClickHandled){ _clusterClickHandled = false; return; }
      const clusters = dashMap.queryRenderedFeatures(e.point, { layers: ['clusters'] });
      const points = dashMap.queryRenderedFeatures(e.point, { layers: ['unclustered-point'] });
      if(!clusters.length && !points.length && activeMapPopup){ activeMapPopup.remove(); activeMapPopup = null; }
    });

    // Helper: show popup for a property at coords
    function showPropertyPopup(p, coords, shouldPan){
      if(activeMapPopup){ activeMapPopup.remove(); activeMapPopup = null; }
      const built = buildMapPopupHtml(p);
      const popup = new maplibregl.Popup({ className: 'map-popup', maxWidth: '290px', closeButton: false, closeOnClick: false, closeOnMove: false, anchor: 'bottom' })
        .setLngLat(coords)
        .setHTML('<div id="' + built.popupId + '">' + built.html + '</div>')
        .addTo(dashMap);
      const popupEl = document.getElementById(built.popupId);
      if(popupEl) popupEl._popup = popup;
      activeMapPopup = popup;
      if(shouldPan){
        const mapContainer = dashMap.getContainer();
        const pt = dashMap.project(coords);
        const popupHeight = 220, pad = 20;
        let dx = 0, dy = 0;
        if(pt.y - popupHeight - pad < 0) dy = pt.y - popupHeight - pad;
        if(pt.y + pad > mapContainer.clientHeight) dy = pt.y + pad - mapContainer.clientHeight;
        if(pt.x - 145 - pad < 0) dx = pt.x - 145 - pad;
        if(pt.x + 145 + pad > mapContainer.clientWidth) dx = pt.x + 145 + pad - mapContainer.clientWidth;
        if(dx !== 0 || dy !== 0) dashMap.panBy([dx, dy], { duration: 300 });
      }
    }

    // Click individual pin to show popup
    dashMap.on('click', 'unclustered-point', (e) => {
      if(!e.features || !e.features.length) return;
      const f = e.features[0];
      const p = f.properties;
      const coords = f.geometry.coordinates.slice();
      showPropertyPopup(p, coords, true);
    });

    // Restore popup if returning from property profile
    if(hadSavedState && _savedMapPopupId){
      const restoreId = _savedMapPopupId;
      _savedMapPopupId = null;
      const feat = geojson.features.find(f => f.properties.id === restoreId);
      if(feat){
        setTimeout(() => { showPropertyPopup(feat.properties, feat.geometry.coordinates.slice(), false); }, 200);
      }
    } else if(hadSavedState && _savedClusterPopup){
      const sc = _savedClusterPopup;
      _savedClusterPopup = null;
      // Re-query cluster leaves at the saved coordinates after map settles
      setTimeout(async () => {
        // Find the cluster feature nearest to the saved coords
        const rendered = dashMap.queryRenderedFeatures(undefined, { layers: ['clusters'] });
        let best = null, bestDist = Infinity;
        rendered.forEach(f => {
          const fc = f.geometry.coordinates;
          const d = Math.abs(fc[0] - sc.coords[0]) + Math.abs(fc[1] - sc.coords[1]);
          if(d < bestDist){ bestDist = d; best = f; }
        });
        if(best){
          const cid = best.properties.cluster_id;
          const cnt = best.properties.point_count;
          const src = dashMap.getSource('properties');
          try {
            let leaves;
            const restoreCoords = best.geometry.coordinates.slice();
            const result = src.getClusterLeaves(cid, cnt, 0, (err, cbLeaves) => {
              if(!err && cbLeaves && cbLeaves.length) showClusterPopup(cbLeaves, restoreCoords, cid, sc.scrollTop, sc.detailId);
            });
            if(result && typeof result.then === 'function'){
              leaves = await result;
              if(leaves && leaves.length) showClusterPopup(leaves, restoreCoords, cid, sc.scrollTop, sc.detailId);
            }
          } catch(ex){}
        }
      }, 300);
    }

    // Cursor changes on hover
    dashMap.on('mouseenter', 'clusters', () => { dashMap.getCanvas().style.cursor = 'pointer'; });
    dashMap.on('mouseleave', 'clusters', () => { dashMap.getCanvas().style.cursor = ''; });
    dashMap.on('mouseenter', 'unclustered-point', () => { dashMap.getCanvas().style.cursor = 'pointer'; });
    dashMap.on('mouseleave', 'unclustered-point', () => { dashMap.getCanvas().style.cursor = ''; });

    // Fit bounds to all properties (skip if restoring saved map position)
    if(geoProps.length > 1 && !hadSavedState && _mapFilter === 'all'){
      const bounds = new maplibregl.LngLatBounds();
      geoProps.forEach(p => bounds.extend([p.lng, p.lat]));
      dashMap.fitBounds(bounds, { padding: 50, maxZoom: 13 });
    }

    // Apply current map filter
    if(_mapFilter !== 'all'){
      setTimeout(() => {
        // When restoring saved state, apply filter without fly animation
        if(hadSavedState){
          const src = dashMap.getSource('properties');
          if(src && _allGeoJson){
            let allowedStatuses = null;
            if(_mapFilter.startsWith('status:')){ allowedStatuses = [_mapFilter.substring(7)]; }
            else { const catMap = { prospects:['New','No Contact'], outreach:['Messaged','Left Voicemail','Follow Up'], qualified:['Interested','Meeting'], lost:CLOSED_STAGES }; allowedStatuses = catMap[_mapFilter] || null; }
            const filtered = allowedStatuses ? { type:'FeatureCollection', features: _allGeoJson.features.filter(f => allowedStatuses.includes(f.properties.status)) } : _allGeoJson;
            src.setData(filtered);
            const countEl = document.getElementById('mapPropertyCount');
            if(countEl){ countEl.textContent = (filtered.features.length + ' of ' + _allGeoJson.features.length) + ' mapped'; }
          }
        } else {
          setMapFilter(_mapFilter);
        }
      }, 100);
    }
  });
}

async function geocodeExistingProperties(){
  const toGeocode = records.filter(r => {
    const d = r.propertyDetails || {};
    return !d.latitude && r.property && r.property.length > 5;
  });
  if(!toGeocode.length) return;

  for(const r of toGeocode){
    try {
      const addr = r.property;
      const resp = await fetch('https://places.googleapis.com/v1/places:searchText', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Goog-Api-Key': GPLACES_KEY, 'X-Goog-FieldMask': 'places.location' },
        body: JSON.stringify({ textQuery: addr, maxResultCount: 1 })
      });
      const data = await resp.json();
      if(data.places && data.places[0] && data.places[0].location){
        const loc = data.places[0].location;
        if(!r.propertyDetails) r.propertyDetails = {};
        r.propertyDetails.latitude = loc.latitude;
        r.propertyDetails.longitude = loc.longitude;
      }
    } catch(e){
      console.log('Geocode error for', r.property, e);
    }
    // Small delay to avoid rate limiting
    await new Promise(resolve => setTimeout(resolve, 250));
  }
  // Save once after all geocoding, then refresh map
  const geocoded = toGeocode.filter(r => r.propertyDetails && r.propertyDetails.latitude);
  if(geocoded.length > 0){
    saveData();
    if(document.getElementById('dashboardMap')) initDashboardMap();
  }
}
