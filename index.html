const FUNNEL_CATEGORIES = [
  { key:'prospects', name:'New Leads', statuses:['New','No Contact'], color:'#818cf8' },
  { key:'outreach', name:'In Outreach', statuses:['Messaged','Left Voicemail','Follow Up'], color:'#38bdf8' },
  { key:'qualified', name:'Qualified', statuses:['Interested','Meeting'], color:'#34d399' },
];

function renderPipeline(){
  let html = '<div style="margin-bottom:12px"><span style="font-size:.78rem;color:var(--primary);cursor:pointer;display:inline-flex;align-items:center;gap:4px" onclick="clearMapState();switchView(\'dashboard\')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back to Dashboard</span></div>';
  html += renderFunnel(records);

  // Category tabs
  const allActive = records.filter(r => PIPELINE_STAGES.includes(r.status));
  const cats = FUNNEL_CATEGORIES.map(c => ({
    ...c,
    count: records.filter(r => c.statuses.includes(r.status)).length,
    records: records.filter(r => c.statuses.includes(r.status))
  }));

  const activeCat = pipelineCategory || 'all';

  const lostCount = records.filter(r => CLOSED_STAGES.includes(r.status)).length;
  html += `<div class="pipeline-category-tabs">
    <div class="pipeline-cat-tab ${activeCat==='all'?'active':''}" onclick="pipelineCategory='all';pipelineSubCategory=null;render()">All Active <span class="pct-count">${allActive.length}</span></div>
    ${cats.map(c => `<div class="pipeline-cat-tab ${activeCat===c.key?'active':''}" onclick="pipelineCategory='${c.key}';pipelineSubCategory=null;render()">${c.name} <span class="pct-count">${c.count}</span></div>`).join('')}
    ${lostCount > 0 ? `<div class="pipeline-cat-tab ${activeCat==='lost'?'active':''}" onclick="pipelineCategory='lost';pipelineSubCategory=null;render()" style="${activeCat==='lost'?'color:var(--danger);border-bottom-color:var(--danger)':''}">🗑 Lost <span class="pct-count">${lostCount}</span></div>` : ''}
  </div>`;

  // Sub-category chips (only when a specific category is selected, not "all")
  if(activeCat !== 'all'){
    const isLost = activeCat === 'lost';
    const cat = isLost ? { name:'Lost', statuses:CLOSED_STAGES, count:records.filter(r=>CLOSED_STAGES.includes(r.status)).length } : cats.find(c => c.key === activeCat);
    if(cat && cat.statuses.length > 1){
      html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
        <span class="chip ${!pipelineSubCategory?'active':''}" onclick="pipelineSubCategory=null;render()">All ${cat.name} (${cat.count})</span>
        ${cat.statuses.map(st => {
          const cnt = records.filter(r => r.status === st).length;
          return cnt > 0 ? `<span class="chip ${pipelineSubCategory===st?'active':''}" onclick="pipelineSubCategory='${st}';render()">${st} (${cnt})</span>` : '';
        }).join('')}
      </div>`;
    }
  }

  // Get records for selected category
  let displayRecords;
  if(activeCat === 'all'){
    displayRecords = allActive;
  } else if(activeCat === 'lost'){
    displayRecords = records.filter(r => CLOSED_STAGES.includes(r.status));
    if(pipelineSubCategory) displayRecords = displayRecords.filter(r => r.status === pipelineSubCategory);
  } else {
    const cat = cats.find(c => c.key === activeCat);
    displayRecords = cat ? cat.records : [];
    if(pipelineSubCategory) displayRecords = displayRecords.filter(r => r.status === pipelineSubCategory);
  }

  // Apply search filter if active
  if(searchQuery){
    const words = searchQuery.split(/\s+/).filter(w => w.length > 0);
    displayRecords = displayRecords.filter(r => {
      const blob = [r.property, r.name, r.phone, r.email, r.status].filter(Boolean).join(' ').toLowerCase();
      return words.every(w => blob.includes(w));
    });
  }

  if(displayRecords.length === 0){
    html += '<div style="text-align:center;padding:40px;color:var(--text3);font-size:.9rem">No properties in this category</div>';
  } else {
    html += '<div class="pipeline-list">';
    displayRecords.forEach(r => {
      const d = r.propertyDetails || {};
      const rent = d.monthlyRent ? '$'+Number(d.monthlyRent).toLocaleString()+'/mo' : '';
      html += `<div class="pipeline-card" onclick="openDetail('${r.id}')">
        <div class="plc-main">
          <div class="plc-property">${esc(r.property)}</div>
          ${r.name ? `<div class="plc-name">${esc(r.name)}</div>` : ''}
          <div class="plc-meta">
            ${rent ? `<span>${rent}</span>` : ''}
            ${d.bedrooms ? `<span>${d.bedrooms} bd</span>` : ''}
            ${d.bathrooms ? `<span>${d.bathrooms} ba</span>` : ''}
            ${r.phone ? `<span>📞 ${esc(r.phone)}</span>` : ''}
            ${r.date ? `<span>${fmtDate(r.date)}</span>` : ''}
          </div>
        </div>
        <div class="plc-status">${statusPill(r.status)}</div>
      </div>`;
    });
    html += '</div>';
  }

  return html;
}

function renderFunnel(allRecords){
  const total = allRecords.length;
  if(total === 0) return '';

  // Three funnel stages (grouped)
  const stages = [
    { name:'Prospects', statuses:['New','No Contact'], color:'#818cf8', label:'New Leads' },
    { name:'Outreach', statuses:['Messaged','Left Voicemail','Follow Up'], color:'#38bdf8', label:'In Outreach' },
    { name:'Qualified', statuses:['Interested','Meeting'], color:'#34d399', label:'Qualified' },
  ];

  stages.forEach(s => {
    s.count = allRecords.filter(r => s.statuses.includes(r.status)).length;
    s.pct = total > 0 ? (s.count / total * 100).toFixed(1) : 0;
    s.breakdown = s.statuses.map(st => ({ status:st, count:allRecords.filter(r=>r.status===st).length }));
  });

  const leakedCounts = CLOSED_STAGES.map(s => ({ stage:s, count:allRecords.filter(r=>r.status===s).length })).filter(s=>s.count>0);
  const totalLeaked = leakedCounts.reduce((a,b)=>a+b.count,0);
  const contacted = allRecords.filter(r => !['New','No Contact'].includes(r.status)).length;
  const hot = allRecords.filter(r => ['Interested','Meeting'].includes(r.status)).length;

  // SVG horizontal funnel — fixed shape, 3 sections
  const W = 700, H = 120;
  const topY = 0, botY = H;
  // Trapezoid narrows left to right: leftH=full, rightH=narrow
  const sections = [
    { x1:0, x2:W*0.40, topL:0, topR:H*0.12, botL:H, botR:H*0.88 },
    { x1:W*0.40+2, x2:W*0.72, topL:H*0.12, topR:H*0.30, botL:H*0.88, botR:H*0.70 },
    { x1:W*0.72+2, x2:W, topL:H*0.30, topR:H*0.42, botL:H*0.70, botR:H*0.58 },
  ];

  // Build labels row above funnel
  const labelWidths = ['40%','32%','28%'];
  let labelsHtml = '<div class="funnel-labels">';
  stages.forEach((s, i) => {
    labelsHtml += `<div class="funnel-label" style="width:${labelWidths[i]};color:${s.color}">${s.label}</div>`;
  });
  labelsHtml += '</div>';

  // Build SVG funnel — numbers and percentages only, large and prominent
  const catKeys = ['prospects','outreach','qualified'];
  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  stages.forEach((s, i) => {
    const sec = sections[i];
    const points = `${sec.x1},${sec.topL} ${sec.x2},${sec.topR} ${sec.x2},${sec.botR} ${sec.x1},${sec.botL}`;
    const cx = (sec.x1 + sec.x2) / 2;
    const cy = H / 2;
    svg += `<polygon class="funnel-stage" points="${points}" fill="${s.color}" onclick="pipelineCategory='${catKeys[i]}';pipelineSubCategory=null;render()"/>`;
    svg += `<text x="${cx}" y="${cy+6}" text-anchor="middle" fill="#fff" font-size="18" font-weight="800" style="pointer-events:none;text-shadow:0 1px 4px rgba(0,0,0,.35)">${s.count} <tspan fill="rgba(255,255,255,.7)" font-size="13" font-weight="600">(${s.pct}%)</tspan></text>`;
  });
  svg += `</svg>`;

  let html = `<div class="funnel-wrap">
    <div class="funnel-header"><h3>Pipeline Funnel</h3><div class="fh-total">${total} total leads</div></div>
    ${labelsHtml}
    <div class="funnel-svg-wrap">${svg}</div>`;

  // KPI bar
  html += `<div class="funnel-conversion">
    <div class="funnel-kpi"><div class="fk-value" style="color:var(--primary)">${total}</div><div class="fk-label">Total Leads</div></div>
    <div class="funnel-kpi"><div class="fk-value" style="color:var(--info)">${contacted}</div><div class="fk-label">Contacted</div></div>
    <div class="funnel-kpi"><div class="fk-value" style="color:#a78bfa">${hot}</div><div class="fk-label">Qualified</div></div>
    <div class="funnel-kpi"><div class="fk-value" style="color:var(--success)">${total>0?((hot/total)*100).toFixed(1):0}%</div><div class="fk-label">Qualification Rate</div></div>
  </div>`;

  // Lost section — separate from funnel
  if(totalLeaked > 0){
    html += `<div style="margin-top:12px;padding:12px 16px;background:var(--bg);border-radius:var(--radius);display:flex;align-items:center;gap:14px;cursor:pointer" onclick="pipelineCategory='lost';pipelineSubCategory=null;render()">
      <div style="width:36px;height:36px;border-radius:50%;background:var(--danger-light);display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
      </div>
      <div style="flex:1">
        <div style="font-size:.88rem;font-weight:600;color:var(--danger)">Lost</div>
        <div style="font-size:.75rem;color:var(--text3)">${leakedCounts.map(s => s.stage+' ('+s.count+')').join(' · ')}</div>
      </div>
      <div style="font-size:1.3rem;font-weight:700;color:var(--danger)">${totalLeaked}</div>
      <div style="font-size:.75rem;color:var(--text3)">${total>0?(totalLeaked/total*100).toFixed(1):0}%</div>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </div>`;
  }

  html += `</div>`;

  return html;
}

/* ===== NOTIFICATIONS ===== */
function getFollowUps(){
  const now = new Date();
  const today = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  return records.filter(r => r.followUpDate).map(r => {
    const diff = daysDiff(today, r.followUpDate);
    let type = 'upcoming';
    if(diff > 0) type = 'overdue';
    else if(diff === 0) type = 'today';
    return { ...r, type, diff };
  }).sort((a,b) => b.diff - a.diff);
}

function getFollowUpStatus(r){
  if(!r.followUpDate) return null;
  const today = new Date().toISOString().split('T')[0];
  const diff = daysDiff(today, r.followUpDate);
  if(diff > 0) return { type:'overdue', diff };
  if(diff === 0) return { type:'today', diff:0 };
  return { type:'upcoming', diff };
}

function renderNotifications(){
  const followUps = getFollowUps();
  const overdue = followUps.filter(f => f.type==='overdue');
  const today = followUps.filter(f => f.type==='today');
  const upcoming = followUps.filter(f => f.type==='upcoming');

  // Also show Follow Up status records without followUpDate as needing attention
  const needsFollowUp = records.filter(r => r.status === 'Follow Up' && !r.followUpDate);

  if(!followUps.length && !needsFollowUp.length){
    return `<div style="text-align:center;padding:60px 20px;color:var(--text3)">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:12px;opacity:.4"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
      <div style="font-size:1rem;font-weight:600;margin-bottom:4px">All caught up!</div>
      <div>No pending follow-ups. Set a follow-up date on any record to get reminders here.</div>
    </div>`;
  }

  return `<div style="max-width:700px">
    ${overdue.length ? `<div class="notif-section"><h3><span class="dot" style="background:var(--danger)"></span> Overdue (${overdue.length})</h3>${overdue.map(r => renderNotifCard(r)).join('')}</div>` : ''}
    ${today.length ? `<div class="notif-section"><h3><span class="dot" style="background:var(--warning)"></span> Due Today (${today.length})</h3>${today.map(r => renderNotifCard(r)).join('')}</div>` : ''}
    ${upcoming.length ? `<div class="notif-section"><h3><span class="dot" style="background:var(--info)"></span> Upcoming (${upcoming.length})</h3>${upcoming.map(r => renderNotifCard(r)).join('')}</div>` : ''}
    ${needsFollowUp.length ? `<div class="notif-section"><h3><span class="dot" style="background:var(--text3)"></span> Needs Follow-Up Date (${needsFollowUp.length})</h3>${needsFollowUp.map(r => `
      <div class="notif-card" onclick="openDetail('${r.id}')" style="border-left:3px solid var(--text3)">
        <div class="notif-icon" style="background:var(--bg);color:var(--text3)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div>
        <div class="notif-content">
          <div class="nc-property">${r.property}</div>
          <div class="nc-detail">${r.name||'Unknown'} — Status: Follow Up, no date set</div>
        </div>
      </div>`).join('')}</div>` : ''}
  </div>`;
}

function renderNotifCard(r){
  const labels = { overdue:'Overdue by '+Math.abs(r.diff)+' day'+(Math.abs(r.diff)>1?'s':''), today:'Due today', upcoming:'Due '+fmtDate(r.followUpDate) };

/* ===== DETAIL MODAL ===== */
function openDetail(id, restoreTab){
  const r = records.find(x => x.id === id);
  if(!r) return;
  r.lastAccessed = new Date().toISOString();
  if(!r.propertyDetails) r.propertyDetails = {};
  if(!r.propertyNotes) r.propertyNotes = [];
  saveData();
  // Save current profile tab/scroll into history before navigating to new profile
  if(!_handlingPopstate && currentView === 'profile' && currentProfileId){
    const scrollContainer = document.querySelector('.content');
    const savedScrolls = Object.assign({}, tabScrollPositions);
    if(scrollContainer && profileActiveTab) savedScrolls[profileActiveTab] = scrollContainer.scrollTop;
    try {
      history.replaceState(Object.assign({}, history.state, { _profileTab: profileActiveTab, _tabScrolls: savedScrolls }), '');
    } catch(ex){}
  }
  previousView = currentView;
  currentProfileId = id;
  currentView = 'profile';
  // Reset negotiation tools to defaults on fresh open
  if(!restoreTab){
    delete _rentDialPreview[id];
    const _rr = records.find(x => x.id === id);
    if(_rr){ const _an = getAnalysis(_rr); delete _an.concessionWeeks; }
  }
  // Fresh open: reset to Property Details tab at top; Back/Forward: restore saved tab
  if(!restoreTab){
    profileActiveTab = 'details';
    Object.keys(tabScrollPositions).forEach(k => delete tabScrollPositions[k]);
  }
  document.getElementById('searchAutocomplete')?.classList.remove('visible');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('headerTitle').textContent = 'Property Profile';
  if(!_handlingPopstate) history.pushState({ view: 'profile', profileId: id, previousView: previousView }, '', '#profile/' + id);
  saveViewState();
  render();
  const scrollContainer = document.querySelector('.content');
  if(scrollContainer) scrollContainer.scrollTop = 0;
  window.scrollTo(0,0);
  // Check for pending comps from extension
  checkPendingExtensionComps();
}

function closeDetail(){
  currentProfileId = null;
  switchView(previousView);
}

/* ===== PLATFORM DETECTION ===== */
function detectPlatform(url){
  if(!url) return { name:'Unknown', icon:'🔗', color:'var(--text3)' };
  const u = url.toLowerCase();
  if(u.includes('apartments.com')) return { name:'Apartments.com', icon:'🏢', color:'#e2231a' };
  if(u.includes('hotpads.com')) return { name:'HotPads', icon:'📍', color:'#46a049' };
  if(u.includes('zillow.com')) return { name:'Zillow', icon:'🏠', color:'#006aff' };
  if(u.includes('facebook.com') || u.includes('fb.com')) return { name:'Facebook', icon:'📘', color:'#1877f2' };
  if(u.includes('craigslist.org')) return { name:'Craigslist', icon:'📋', color:'#5a0e8e' };
  if(u.includes('realtor.com')) return { name:'Realtor.com', icon:'🏡', color:'#d92228' };
  if(u.includes('trulia.com')) return { name:'Trulia', icon:'🗺️', color:'#53b50a' };
  if(u.includes('redfin.com')) return { name:'Redfin', icon:'🔴', color:'#a02021' };
  if(u.includes('airbnb.com')) return { name:'Airbnb', icon:'🏘️', color:'#ff5a5f' };
  if(u.includes('vrbo.com')) return { name:'VRBO', icon:'🌴', color:'#3c67f0' };
  if(u.includes('furnished')) return { name:'Furnished Finder', icon:'🛋️', color:'#f79c42' };
  if(u.includes('rent.com')) return { name:'Rent.com', icon:'🔑', color:'#ff6f00' };
  if(u.includes('zumper.com')) return { name:'Zumper', icon:'🏙️', color:'#1c8dd9' };
  return { name: new URL(url).hostname.replace('www.',''), icon:'🔗', color:'var(--primary)' };
}

function renderProfile(){
  try { return _renderProfileInner(); } catch(e) {
    console.error('[RR] renderProfile crashed for', currentProfileId, e);
    const r = records.find(x => x.id === currentProfileId);
    if(r) { console.error('[RR] Record data:', JSON.stringify({
      id:r.id, property:r.property, name:r.name, notesCount:r.notes?.length,
      noteTypes: r.notes?.map(n=>n.type), noteHasImages: r.notes?.map(n=>!!(n.images&&n.images.length)),
      noteTexts: r.notes?.map(n=>(n.text||'').substring(0,80)),
      noteHtmlSnippets: r.notes?.map(n=>(n.html||'').substring(0,80)),
      hasPropertyNote: !!r.propertyNote,
      propertyNoteSnippet: r.propertyNote ? (r.propertyNote.html||r.propertyNote.text||'').substring(0,80) : null
    })); }
    return '<div style="padding:20px;color:var(--danger)">Error rendering profile. Check browser console (F12) for details.<br><pre style="font-size:.75rem;margin-top:8px;white-space:pre-wrap">'+e.message+'</pre></div>';
  }
}

function renderSectionFields(recId, d, section){
  let html = '';
  const selectFields = section.fields.filter(f => f.t !== 'multi');
  const multiFields = section.fields.filter(f => f.t === 'multi');

  if(selectFields.length){
    html += '<div class="prop-field-grid">';
    selectFields.forEach(f => {
      const val = d[f.k] || '';
      if(f.t === 'select'){
        html += `<div class="prop-field"><label>${f.l}</label><select onchange="savePropDetail('${recId}','${f.k}',this.value)">${(f.o||[]).map(o=>`<option value="${o}" ${val===o?'selected':''}>${o||'—'}</option>`).join('')}</select></div>`;
      } else if(f.t === 'date'){
        html += `<div class="prop-field"><label>${f.l}</label><input type="date" value="${val}" onchange="savePropDetail('${recId}','${f.k}',this.value)"></div>`;
      } else if(f.t === 'number'){
        html += `<div class="prop-field"><label>${f.l}</label><input type="number" value="${val}" onchange="savePropDetail('${recId}','${f.k}',this.value)" placeholder="—"></div>`;
      } else if(f.t === 'bool'){
        html += `<div class="prop-field"><label>${f.l}</label><select onchange="savePropDetail('${recId}','${f.k}',this.value)"><option value="" ${!val?'selected':''}>—</option><option value="Yes" ${val==='Yes'?'selected':''}>Yes</option><option value="No" ${val==='No'?'selected':''}>No</option></select></div>`;
      } else {
        html += `<div class="prop-field"><label>${f.l}</label><input type="text" value="${esc(val)}" onchange="savePropDetail('${recId}','${f.k}',this.value)" placeholder="—"></div>`;
      }
    });
    html += '</div>';
  }

  multiFields.forEach(f => {
    const selected = d[f.k] || [];
    const hasSelections = selected.length > 0;
    html += `<div class="multi-field-row" style="margin-top:${selectFields.length?'12':'0'}px" onclick="openMultiEditor('${recId}','${f.k}')" title="Click to edit">`;
    html += `<label style="display:block;font-size:.73rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px">${f.l} <svg class="multi-edit-icon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></label>`;
    if(hasSelections){
      html += '<div class="multi-display-chips">';
      selected.forEach(opt => {
        html += `<span class="multi-chip">${opt}</span>`;
      });
      html += '</div>';
    } else {
      html += `<div class="multi-empty-hint">Click to select</div>`;
    }
    html += '</div>';
  });

  return html;
}

function renderSectionReadonly(d, section){
  let html = '';
  const selectFields = section.fields.filter(f => f.t !== 'multi');
  const multiFields = section.fields.filter(f => f.t === 'multi');
  const hasAnyData = section.fields.some(f => { const v = d[f.k]; return v && (Array.isArray(v) ? v.length > 0 : String(v).length > 0); });

  if(!hasAnyData){
    return '<div style="color:var(--text3);font-size:.82rem;font-style:italic;padding:4px 0">No data entered yet — hover to edit</div>';
  }

  if(selectFields.length){
    html += '<div class="section-ro-grid">';
    selectFields.forEach(f => {
      const val = d[f.k] || '';
      if(val){
        html += '<div class="section-ro-field"><div class="ro-label">'+esc(f.l)+'</div><div class="ro-value">'+esc(String(val))+'</div></div>';
      }
    });
    html += '</div>';
  }

  multiFields.forEach(f => {
    const selected = d[f.k] || [];
    if(selected.length > 0){
      html += '<div class="section-ro-multi"><div class="ro-label">'+esc(f.l)+'</div><div class="section-ro-chips">';
      selected.forEach(opt => { html += '<span class="ro-chip">'+esc(opt)+'</span>'; });
      html += '</div></div>';
    }
  });

  return html;
}

function openSectionEditor(recId, sectionKey){
  dismissAllOverlays();
  const r = records.find(x => x.id === recId);
  if(!r) return;
  const d = r.propertyDetails || {};
  const section = PROP_SECTIONS.find(s => s.key === sectionKey);
  if(!section) return;

  let fieldsHtml = '<div class="prop-field-grid">';
  section.fields.filter(f => f.t !== 'multi').forEach(f => {
    const val = d[f.k] || '';
    if(f.t === 'select'){
      fieldsHtml += '<div class="prop-field"><label>'+esc(f.l)+'</label><select id="se_'+f.k+'">'+(f.o||[]).map(o => '<option value="'+esc(o)+'" '+(val===o?'selected':'')+'>'+esc(o||'—')+'</option>').join('')+'</select></div>';
    } else if(f.t === 'date'){
      fieldsHtml += '<div class="prop-field"><label>'+esc(f.l)+'</label><input type="date" id="se_'+f.k+'" value="'+esc(val)+'"></div>';
    } else if(f.t === 'number'){
      fieldsHtml += '<div class="prop-field"><label>'+esc(f.l)+'</label><input type="number" id="se_'+f.k+'" value="'+esc(val)+'" placeholder="—"></div>';
    } else if(f.t === 'bool'){
      fieldsHtml += '<div class="prop-field"><label>'+esc(f.l)+'</label><select id="se_'+f.k+'"><option value="" '+(!val?'selected':'')+'>—</option><option value="Yes" '+(val==='Yes'?'selected':'')+'>Yes</option><option value="No" '+(val==='No'?'selected':'')+'>No</option></select></div>';
    } else {
      fieldsHtml += '<div class="prop-field"><label>'+esc(f.l)+'</label><input type="text" id="se_'+f.k+'" value="'+esc(val)+'" placeholder="—"></div>';
    }
  });
  fieldsHtml += '</div>';

  // Multi-select fields rendered as checkbox grids
  section.fields.filter(f => f.t === 'multi').forEach(f => {
    const selected = d[f.k] || [];
    fieldsHtml += '<div style="margin-top:12px"><label style="display:block;font-size:.73rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">'+esc(f.l)+'</label>';
    fieldsHtml += '<div class="se-multi-grid" data-field="'+f.k+'">';
    (f.o||[]).forEach(opt => {
      const checked = selected.includes(opt);
      fieldsHtml += '<label class="se-multi-opt'+(checked?' checked':'')+'"><input type="checkbox" value="'+esc(opt)+'" '+(checked?'checked':'')+' onchange="this.parentElement.classList.toggle(\'checked\',this.checked)"> '+esc(opt)+'</label>';
    });
    fieldsHtml += '</div></div>';
  });

  const overlay = document.createElement('div');
  overlay.className = 'card-edit-popup';
  overlay.id = 'sectionEditOverlay';
  overlay.innerHTML = '<div class="cep-panel"><div class="cep-header"><h3>'+section.icon+' Edit '+section.label+'</h3><button class="modal-close" onclick="document.getElementById(\'sectionEditOverlay\').remove()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div><div class="cep-body">'+fieldsHtml+'</div><div class="cep-actions"><div style="font-size:.65rem;color:var(--text3);margin-right:auto;align-self:center">Shift + Enter to save</div><button class="btn btn-secondary btn-sm" onclick="document.getElementById(\'sectionEditOverlay\').remove()">Cancel</button><button class="btn btn-primary btn-sm" onclick="saveSectionEditor(\''+recId+'\',\''+sectionKey+'\')">Save Changes</button></div></div>';
  document.body.appendChild(overlay);

  // Shift+Enter to save, Escape to cancel
  overlay.addEventListener('keydown', function(e){
    if(e.shiftKey && e.key === 'Enter'){ e.preventDefault(); saveSectionEditor(recId, sectionKey); }
    if(e.key === 'Escape') overlay.remove();
  });
}

function saveSectionEditor(recId, sectionKey){
  const r = records.find(x => x.id === recId);
  if(!r) return;
  if(!r.propertyDetails) r.propertyDetails = {};
  const section = PROP_SECTIONS.find(s => s.key === sectionKey);
  if(!section) return;

  // Save non-multi fields
  section.fields.filter(f => f.t !== 'multi').forEach(f => {
    const el = document.getElementById('se_'+f.k);
    if(el) r.propertyDetails[f.k] = el.value;
  });

  // Save multi fields
  section.fields.filter(f => f.t === 'multi').forEach(f => {
    const grid = document.querySelector('.se-multi-grid[data-field="'+f.k+'"]');
    if(grid){
      const checked = Array.from(grid.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);
      r.propertyDetails[f.k] = checked;
    }
  });

  // Reset cleaning override if bedrooms changed
  if(sectionKey === 'basic' && r.details && r.details.calculator){
    delete r.details.calculator._cleaningManual;
  }

  saveData();
  document.getElementById('sectionEditOverlay')?.remove();
  render();
}

function toggleSection(header){
  header.classList.toggle('collapsed');
  const body = header.nextElementSibling;
  if(body) body.classList.toggle('collapsed');
}

function isSectionEmpty(d, section){
  return !section.fields.some(f => {
    const v = d[f.k];
    return v && (Array.isArray(v) ? v.length > 0 : String(v).length > 0);
  });
}

function countSectionFilled(d, section){
  return section.fields.filter(f => {
    const v = d[f.k];
    return v && (Array.isArray(v) ? v.length > 0 : String(v).length > 0);
  }).length;
}

function savePropDetail(recId, field, value){
  const r = records.find(x => x.id === recId);
  if(!r) return;
  if(!r.propertyDetails) r.propertyDetails = {};
  r.propertyDetails[field] = value;
  // Reset cleaning manual override when bedrooms change so default re-syncs
  if(field === 'bedrooms' && r.details && r.details.calculator){
    delete r.details.calculator._cleaningManual;
  }
  saveData();
  // Re-render Expenses/Calculator/Analysis tabs when relevant fields change
  const crossTabFields = ['monthlyRent','bedrooms','bathrooms','sqft','deposit','applicationFee'];
  if(crossTabFields.includes(field)){
    const expEl = document.querySelector('.tab-content[data-tab="expenses"]');
    if(expEl){ expEl.innerHTML = renderExpensesTab(r); }
    const calcEl = document.querySelector('.tab-content[data-tab="calculator"]');
    if(calcEl){ calcEl.innerHTML = renderCalculatorTab(r); }
    const anEl = document.querySelector('.tab-content[data-tab="analysis"]');
    if(anEl && anEl.classList.contains('active')){ anEl.innerHTML = renderAnalysisTab(r); }
  }
}

function togglePropCheck(label, recId, field, opt){
  const r = records.find(x => x.id === recId);
  if(!r) return;
  if(!r.propertyDetails) r.propertyDetails = {};
  if(!r.propertyDetails[field]) r.propertyDetails[field] = [];
  const arr = r.propertyDetails[field];
  const idx = arr.indexOf(opt);
  if(idx >= 0) arr.splice(idx, 1);
  else arr.push(opt);
  label.classList.toggle('checked');
  saveData();
}

function openMultiEditor(recId, fieldKey){
  dismissAllOverlays();
  const r = records.find(x => x.id === recId);
  if(!r) return;
  if(!r.propertyDetails) r.propertyDetails = {};
  // Find the field definition
  let fieldDef = null;
  for(const sec of PROP_SECTIONS){
    const f = sec.fields.find(f => f.k === fieldKey);
    if(f){ fieldDef = f; break; }
  }
  if(!fieldDef) return;
  const current = r.propertyDetails[fieldKey] || [];
  // Build a working copy
  const working = [...current];

  const overlay = document.createElement('div');
  overlay.className = 'multi-editor-overlay';
  overlay.id = 'multiEditorOverlay';
  overlay.innerHTML = `<div class="multi-editor">
    <div class="multi-editor-header">
      <h3>${fieldDef.l}</h3>
      <button class="modal-close" onclick="document.getElementById('multiEditorOverlay').remove()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="multi-editor-body">
      <div class="prop-check-grid" id="multiEditorGrid">
        ${(fieldDef.o||[]).map(opt => {
          const checked = working.includes(opt);
          return `<label class="prop-check ${checked?'checked':''}" data-opt="${opt.replace(/"/g,'&quot;')}" onclick="toggleMultiEditorOpt(this)"><input type="checkbox" ${checked?'checked':''}>${opt}</label>`;
        }).join('')}
      </div>
    </div>
    <div class="multi-editor-actions">
      <div class="me-hint">Click options to select/deselect</div>
      <button class="btn btn-secondary btn-sm" onclick="document.getElementById('multiEditorOverlay').remove()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="saveMultiEditor('${recId}','${fieldKey}')">Save</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);

  // Escape to cancel, Shift+Enter to save
  overlay.addEventListener('keydown', function(e){
    if(e.key === 'Escape') overlay.remove();
    if(e.shiftKey && e.key === 'Enter'){ e.preventDefault(); saveMultiEditor(recId, fieldKey); }
  });
}

function toggleMultiEditorOpt(label){
  event.preventDefault();
  label.classList.toggle('checked');
  const cb = label.querySelector('input[type=checkbox]');
  if(cb) cb.checked = label.classList.contains('checked');
}

function saveMultiEditor(recId, fieldKey){
  const r = records.find(x => x.id === recId);

async function autoImport(recId){
  const r = records.find(x => x.id === recId);
  if(!r || !r.link) return;
  const container = document.getElementById('importContainer_'+recId);
  const plat = detectPlatform(r.link);
  if(!requireTier('pro','Auto Import')){ container.innerHTML = tierGateHtml('pro','Auto Import','Automatically extract property details from listing pages.'); return }
  container.innerHTML = '<div class="import-loading"><div class="spinner"></div><div>Importing from '+plat.name+'...</div><div style="font-size:.78rem;color:var(--text3);margin-top:6px" id="profileImportStatus">Connecting to import server...</div></div>';

  // Try extension-based import
  const statusEl = document.getElementById('profileImportStatus');
  try {
    if(!extensionReady){
      container.innerHTML = `<div class="import-dialog"><h3>Extension Required</h3><p>The RentingRadar Importer extension is needed for auto-import. <a href="${EXTENSION_URL}" target="_blank" style="color:var(--primary);font-weight:600">Download it from the Chrome Web Store</a>, then reload this page.</p><div style="display:flex;gap:8px;margin-top:12px"><button class="btn btn-primary btn-sm" onclick="location.reload()">I've Installed It — Reload</button><button class="btn btn-secondary btn-sm" onclick="showManualEntry('${recId}')">Manual Entry</button></div></div>`;
      return;
    }
    if(statusEl) statusEl.textContent = 'Extension is fetching listing page...';
    const data = await sendImportRequest(r.link);
    if(statusEl) statusEl.textContent = 'Processing extracted data...';

    // Apply the data
    if(!r.propertyDetails) r.propertyDetails = {};
    for(const [key, val] of Object.entries(data.details||{})){
      if(val && (typeof val !== 'object' || (Array.isArray(val) && val.length > 0))){
        r.propertyDetails[key] = val;
      }
    }
    if(!r.propertyNotes) r.propertyNotes = [];
    (data.notes||[]).forEach(n => {
      r.propertyNotes.push({ id:uid(), text:n, date:new Date().toISOString(), source:'Auto-Import ('+plat.name+')' });
    });
    r.propertyNotes.push({ id:uid(), text:'Auto-imported from '+plat.name+' via '+data.parser+'. '+data.fieldsFound+' fields extracted.', date:new Date().toISOString(), source:'System' });
    if(data.warning) r.propertyNotes.push({ id:uid(), text:'Note: '+data.warning, date:new Date().toISOString(), source:'System' });
    saveData();

    container.innerHTML = '<div style="padding:12px;background:var(--success-light);border-radius:var(--radius);color:var(--success);font-size:.85rem;font-weight:500">✓ Import complete! '+data.fieldsFound+' fields extracted'+(data.parser==='ollama'?' using AI':' (basic)')+'. Check details sections below.</div>';
    setTimeout(() => { render() }, 2000);
    return;

  } catch(e){
    console.log('Extension import error:', e);
    container.innerHTML = `<div class="import-dialog">
      <h3>Auto-import issue</h3>
      <p>${esc(e.message||'Could not complete the import.')}</p>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-primary btn-sm" onclick="autoImport('${recId}')">Retry</button>
        <button class="btn btn-secondary btn-sm" onclick="showManualEntry('${recId}')">Manual Entry</button>
      </div>
    </div>`;
  }
}

function parseListingHtml(html, url){
  const result = {};
  const notes = [];
  let fieldsFound = 0;
  const text = html.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ');

  // JSON-LD structured data
  const jsonLdMatches = html.match(/<script[^>]*type\s*=\s*["']application\/ld\+json["'][^>]*>([\s\S]*?)<\/script>/gi) || [];
  for(const m of jsonLdMatches){
    try {
      const jsonStr = m.replace(/<script[^>]*>/i,'').replace(/<\/script>/i,'');
      const j = JSON.parse(jsonStr);
      const items = Array.isArray(j) ? j : [j];
      for(const item of items){
        if(item.numberOfBedrooms) { result.bedrooms = String(item.numberOfBedrooms); fieldsFound++ }
        if(item.numberOfBathroomsTotal || item.numberOfBathrooms) { result.bathrooms = String(item.numberOfBathroomsTotal||item.numberOfBathrooms); fieldsFound++ }
        if(item.floorSize?.value) { result.sqft = String(item.floorSize.value).replace(/[^\d]/g,''); fieldsFound++ }
        if(item.numberOfRooms) notes.push('Total rooms: '+item.numberOfRooms);
        if(item.name) notes.push('Listing title: '+item.name);
        if(item.description) notes.push('Description: '+String(item.description).substring(0,500));
        if(item.offers?.price || item.price) { result.monthlyRent = String(item.offers?.price||item.price).replace(/[^\d.]/g,''); fieldsFound++ }
      }
    } catch(e){}
  }

  // Regex patterns
  const patterns = [
    [/(\d+)\s*(?:bed(?:room)?s?\b|bd\b|br\b)/i, 'bedrooms'],
    [/([\d.]+)\s*(?:bath(?:room)?s?\b|ba\b)/i, 'bathrooms'],
    [/([\d,]+)\s*(?:sq\.?\s*ft|sqft|square feet)/i, 'sqft'],
    [/\$\s*([\d,]+)\s*(?:\/\s*(?:mo|month)|per\s*month|\s*monthly)/i, 'monthlyRent'],
    [/(?:security\s*)?deposit[:\s]*\$\s*([\d,]+)/i, 'deposit'],
    [/(?:application|app)\s*fee[:\s]*\$\s*([\d,]+)/i, 'applicationFee'],
    [/(?:pet)\s*(?:deposit|fee)[:\s]*\$\s*([\d,]+)/i, 'petDeposit'],
    [/(?:pet)\s*rent[:\s]*\$\s*([\d,]+)/i, 'petRentMonthly'],
    [/(?:year|built)[:\s]*(\d{4})/i, 'yearBuilt'],
  ];
  patterns.forEach(([re, key]) => {
    if(!result[key]){ const m = text.match(re); if(m){ result[key] = m[1].replace(',',''); fieldsFound++ } }
  });

  // Amenity detection
  const amenityMap = {
    appliances: { 'Dishwasher':/dishwasher/i, 'Garbage Disposal':/garbage disposal/i, 'Microwave':/microwave/i, 'Refrigerator':/refrigerator|fridge/i },
    interiorFeatures: { 'Fireplace':/fireplace/i, 'Ceiling Fans':/ceiling fan/i, 'Walk-In Closets':/walk.?in closet/i, 'High Ceilings':/(?:high|vaulted|tall) ceiling/i, 'Stainless Steel Appliances':/stainless steel/i, 'Kitchen Island':/kitchen island/i, 'Pantry':/\bpantry\b/i, 'Open Floor Plan':/open (?:floor )?plan/i, 'Walk-In Shower':/walk.?in shower/i, 'Smart Thermostat':/smart thermostat|nest|ecobee/i },
    communityAmenities: { 'Gym/Fitness Center':/\b(?:gym|fitness center|workout)\b/i, 'Swimming Pool':/(?:community |shared )?(?:pool|swimming)/i, 'Dog Park':/dog park/i, 'Playground':/playground/i, 'Clubhouse':/clubhouse/i, 'Business Center':/business center/i, 'Package Lockers':/package (?:locker|room)/i, 'EV Charging':/ev charg|electric vehicle/i, 'Controlled Access/Gated':/(?:gated|controlled access|secure entry)/i, 'Elevator':/\belevator\b/i, 'On-Site Laundry':/(?:on.?site|shared|community) laundry/i, 'Trash Valet':/trash valet/i },
    outdoor: { 'Balcony':/\bbalcony\b/i, 'Patio':/\bpatio\b/i, 'Deck':/\bdeck\b/i },
    flooring: { 'Hardwood':/hardwood/i, 'Carpet':/\bcarpet/i, 'Tile':/\btile\b/i, 'Laminate':/laminate/i, 'Vinyl Plank':/vinyl/i },
    safetyFeatures: { 'Smoke Detectors':/smoke (?:detector|alarm)/i, 'Carbon Monoxide Detectors':/carbon monoxide|co detector/i, 'Gated Entry':/gated (?:entry|community|access)/i },
    utilitiesIncluded: { 'Water':/water included/i, 'Trash':/trash included/i, 'Internet/WiFi':/(?:internet|wifi|wi-fi) included/i },
  };
  for(const [field, checks] of Object.entries(amenityMap)){
    const found = [];
    for(const [label, re] of Object.entries(checks)){
      if(re.test(text)) found.push(label);
    }
    if(found.length){ result[field] = found; fieldsFound += found.length }
  }

  // Laundry
  if(!result.laundry){
    if(/in.?unit (?:washer|w\/d|laundry)/i.test(text)) result.laundry = 'In-Unit W/D';
    else if(/washer.?dryer hookup/i.test(text)) result.laundry = 'W/D Hookups';
    else if(/(?:shared|on.?site|community) laundry/i.test(text)) result.laundry = 'Shared/On-Site';
    if(result.laundry) fieldsFound++;
  }

  // AC
  if(!result.ac){
    if(/central (?:air|a\/c|ac)/i.test(text)) result.ac = 'Central A/C';
    else if(/window (?:unit|ac|a\/c)/i.test(text)) result.ac = 'Window Unit';
    else if(/mini.?split/i.test(text)) result.ac = 'Mini-Split';
    else if(/(?:evaporative|swamp) cool/i.test(text)) result.ac = 'Evaporative/Swamp Cooler';
    if(result.ac) fieldsFound++;
  }

  // Parking
  if(!result.parking){
    if(/(?:attached|2.car|1.car) garage/i.test(text)) result.parking = 'Attached Garage';
    else if(/(?:detached) garage/i.test(text)) result.parking = 'Detached Garage';
    else if(/carport/i.test(text)) result.parking = 'Carport';
    else if(/covered parking/i.test(text)) result.parking = 'Covered Parking';
    else if(/(?:assigned|reserved) (?:spot|space|parking)/i.test(text)) result.parking = 'Assigned Spot';
    if(result.parking) fieldsFound++;
  }

  // Pets
  if(!result.petsAllowed){
    if(/no pets/i.test(text)) result.petsAllowed = 'No Pets';
    else if(/(?:cats? and dogs?|pets? (?:allowed|welcome|ok|friendly))/i.test(text)) result.petsAllowed = 'Yes - All Pets';
    else if(/dogs? (?:allowed|welcome|ok)/i.test(text)) result.petsAllowed = 'Dogs Only';
    else if(/cats? (?:allowed|welcome|ok)/i.test(text)) result.petsAllowed = 'Cats Only';
    if(result.petsAllowed) fieldsFound++;
  }

  // Pool
  if(!result.pool){
    if(/(?:private|own) pool/i.test(text)) result.pool = 'Private';
    else if(/(?:community|shared) pool/i.test(text)) result.pool = 'Community/Shared';
    if(result.pool) fieldsFound++;
  }

  // Collect misc info for notes
  const rentSpecial = text.match(/(?:move.?in |rent )?special[:\s]+(.*?)(?:\.|$)/i);
  if(rentSpecial) notes.push('Move-in special: '+rentSpecial[1].trim().substring(0,200));
  const leaseMatch = text.match(/(?:lease|term)[:\s]*(\d+)\s*month/i);
  if(leaseMatch){ result.leaseTerm = leaseMatch[1]+' Months'; fieldsFound++ }

  return { details: result, notes, fieldsFound };
}

function applyParsedData(recId, parsed){
  const r = records.find(x => x.id === recId);
  if(!r) return;
  if(!r.propertyDetails) r.propertyDetails = {};
  if(!r.propertyNotes) r.propertyNotes = [];

  for(const [key, val] of Object.entries(parsed.details)){
    if(val && (!r.propertyDetails[key] || (Array.isArray(r.propertyDetails[key]) && r.propertyDetails[key].length === 0))){
      r.propertyDetails[key] = val;
    }
  }

  if(parsed.notes.length){
    const timestamp = new Date().toISOString();
    parsed.notes.forEach(n => {
      r.propertyNotes.push({ id:uid(), text:n, date:timestamp, source:'Auto-Import' });
    });
  }
  saveData();
}

function updateField(id, field, value){
  const r = records.find(x => x.id===id);
  if(!r) return;
  const old = r[field];
  r[field] = value;
  if(field === 'status' && old !== value){
    r.notes.push({ id:uid(), text:`Status changed: ${old} → ${value}`, date:new Date().toISOString(), type:'status' });
  }
  saveData();
  updateNotifBadges();
}

function getRteNestLevel(li){
  let depth = 0;
  let el = li.parentElement;
  while(el){
    if(el.tagName === 'UL' || el.tagName === 'OL') depth++;
    if(el.classList && el.classList.contains('rte-editor')) break;
    el = el.parentElement;
  }
  return depth;
}

function getPrevLiNestLevel(li){
  // Find the previous visible list item and return its nest level
  let prev = li.previousElementSibling;
  if(prev && (prev.tagName === 'LI')){
    return getRteNestLevel(prev);
  }
  // Check if there's a previous sibling that is a nested list
  const parentLi = li.parentElement?.closest('li');
  if(parentLi) return getRteNestLevel(parentLi);
  return 0;
}

function handleRteKeydown(event, recId){
  const ed = event.target.closest('.rte-editor');
  if(!ed) return;
  const editorId = ed.id;

  // Shift+Enter = save
  if(event.shiftKey && event.key === 'Enter'){
    event.preventDefault();
    if(editorId.startsWith('editNoteRte_')){
      // Extract recId and noteId from id: editNoteRte_{recId}_{noteId}
      const parts = editorId.replace('editNoteRte_','').split('_');
      const rId = parts[0];
      const nId = parts.slice(1).join('_');
      saveEditNote(rId, nId);
    } else {
      addNote(recId);
    }
    return;
  }

  // Tab / Shift+Tab for nesting
  if(event.key === 'Tab'){
    const sel = window.getSelection();
    if(!sel.rangeCount) return;
    const li = sel.anchorNode?.nodeType === 3 ? sel.anchorNode.parentElement?.closest('li') : sel.anchorNode?.closest?.('li');
    if(!li) return; // not inside a list item, do nothing special

    event.preventDefault();

    if(event.shiftKey){
      // Outdent
      document.execCommand('outdent', false, null);
    } else {
      // Indent — enforce max 4 levels and +1 constraint
      const currentLevel = getRteNestLevel(li);
      if(currentLevel >= 4) return; // max 4 levels

      // +1 constraint: can only nest 1 deeper than the item above
      const prevLi = li.previousElementSibling;
      if(prevLi && prevLi.tagName === 'LI'){
        const prevLevel = getRteNestLevel(prevLi);
        if(currentLevel >= prevLevel + 1) return; // can't go deeper than prev+1
      } else if(!li.parentElement?.closest('li') && currentLevel >= 1){
        // first item in the list, don't let it nest
        return;
      }

      document.execCommand('indent', false, null);
    }
    return;
  }

  // Update toolbar active states on key events
  setTimeout(() => updateRteToolbar(editorId), 10);
}

  const sel = window.getSelection();
  if(!sel.rangeCount) return;

// Pending images for new notes (keyed by recId)
const pendingNoteImages = {};
// Pending images for edit note popup
let pendingEditImages = [];

function setupNotePasteHandler(editorId, recId){
  const ed = document.getElementById(editorId);
  if(!ed || ed._pasteSetup) return;
  ed._pasteSetup = true;
  ed.addEventListener('paste', function(e){
    const items = (e.clipboardData || e.originalEvent.clipboardData)?.items;
    if(!items) return;
    for(let i = 0; i < items.length; i++){
      if(items[i].type.indexOf('image') !== -1){
        e.preventDefault();
        const blob = items[i].getAsFile();
        if(!blob) return;
        const reader = new FileReader();
        reader.onload = function(ev){
          const dataUrl = ev.target.result;
          // Determine if this is a new-note editor or edit-note editor
          const isEdit = editorId.startsWith('editNoteRte_');
          if(isEdit){
            pendingEditImages.push(dataUrl);
            renderImgPreview('_editPreview', pendingEditImages);
          } else {
            if(!pendingNoteImages[recId]) pendingNoteImages[recId] = [];
            pendingNoteImages[recId].push(dataUrl);
            renderImgPreview('imgPreview_'+recId, pendingNoteImages[recId]);
          }
        };
        reader.readAsDataURL(blob);
        return;
      }
    }
  });
}

function renderImgPreview(containerId, images){
  let container = document.getElementById(containerId);
  if(!container) return;
  if(!images || images.length === 0){ container.innerHTML = ''; return; }
  let h = '';
  images.forEach((src, idx) => {
    h += '<div class="rte-img-preview-item"><img src="'+src+'" alt="Attachment '+(idx+1)+'"><button class="rte-img-remove" onclick="removePreviewImg(\''+containerId+'\','+idx+')" title="Remove">×</button></div>';
  });
  container.innerHTML = h;
}

function removePreviewImg(containerId, idx){
  if(containerId === '_editPreview'){
    pendingEditImages.splice(idx, 1);
    renderImgPreview(containerId, pendingEditImages);
  } else {
    const recId = containerId.replace('imgPreview_','');
    if(pendingNoteImages[recId]){
      pendingNoteImages[recId].splice(idx, 1);
      renderImgPreview(containerId, pendingNoteImages[recId]);
    }
  }
}

function addNote(id){
  const ed = document.getElementById('newNoteRte_'+id);
  if(!ed) return;
  const html = ed.innerHTML.trim();
  const text = ed.innerText.trim();
  const images = pendingNoteImages[id] || [];
  if(!text && images.length === 0) return;
  const r = records.find(x => x.id===id);
  if(!r) return;
  const type = selectedNoteType[id] || 'note';
  const noteObj = { id:uid(), text:text, html:html, date:new Date().toISOString(), type:type };
  if(images.length > 0) noteObj.images = images;
  r.notes.push(noteObj);
  selectedNoteType[id] = 'note';
  delete pendingNoteImages[id];
  saveData();
  render();
}

// Chrome Web Store URL — replace with your published extension link
const EXTENSION_URL = '#CHROME_WEBSTORE_LINK'; // Replace with: https://chrome.google.com/webstore/detail/your-extension-id

let extensionReady = false;
let extensionHealth = null;
let pendingImport = null;

// Listen for extension messages
window.addEventListener('message', (event) => {
  if(event.source !== window) return;
  if(event.data?.type === 'ARBFLOW_EXTENSION_READY'){
    extensionReady = true;
    // Request health check
    window.postMessage({ type: 'ARBFLOW_HEALTH_CHECK' }, '*');
  }
  if(event.data?.type === 'ARBFLOW_HEALTH_RESPONSE'){
    extensionHealth = event.data;
    extensionReady = !!event.data.extension;
  }
  if(event.data?.type === 'ARBFLOW_IMPORT_RESPONSE'){
    if(pendingImport) pendingImport(event.data);
    pendingImport = null;
  }

  // ─── Comp import from AirDNA extension (Pro feature) ───
  if(event.data?.type === 'RR_COMP_FROM_EXTENSION'){
    handleExtensionComp(event.data.compData);
  }
});

function checkExtension(){
  return new Promise(resolve => {
    window.postMessage({ type: 'ARBFLOW_HEALTH_CHECK' }, '*');
    const handler = (e) => {
      if(e.data?.type === 'ARBFLOW_HEALTH_RESPONSE'){
        window.removeEventListener('message', handler);
        extensionHealth = e.data;
        extensionReady = !!e.data.extension;
        resolve(e.data);
      }
    };
    window.addEventListener('message', handler);
    setTimeout(() => { window.removeEventListener('message', handler); resolve(null) }, 2000);
  });
}

function sendImportRequest(url){
  return new Promise((resolve, reject) => {
    const reqId = uid();
    const timeout = setTimeout(() => { pendingImport = null; reject(new Error('Import timed out')) }, 180000);
    pendingImport = (data) => {
      clearTimeout(timeout);
      if(data.error) reject(new Error(data.error));
      else resolve(data);
    };
    window.postMessage({ type:'ARBFLOW_IMPORT_REQUEST', url, requestId: reqId }, '*');
  });
}

/**
 * Show a toast notification.
 */
function showToast(msg, type = 'info', duration = 4000) {
  let toast = document.getElementById('rr-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'rr-toast';
    toast.className = 'rr-toast';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.className = 'rr-toast ' + type;
  requestAnimationFrame(() => { toast.classList.add('visible'); });
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => { toast.classList.remove('visible'); }, duration);
}

/**
 * Handle a comp imported via the RentingRadar Chrome Extension (AirDNA → Airbnb enrichment).
 * Adds the comp to the currently open property's comps array, or queues it if no profile is open.
 */
function handleExtensionComp(compData) {
  if (!compData) return;

  // Find the target record — use the currently open profile, or the most recently opened one
  let r = null;
  if (currentProfileId) {
    r = records.find(x => x.id === currentProfileId);
  }

  if (!r) {
    // No property open — store in a pending queue and notify user
    if (!window._pendingExtensionComps) window._pendingExtensionComps = [];
    window._pendingExtensionComps.push(compData);
    showToast('Comp received from extension! Open a property to add it.', 'info');
    return;
  }

  const comps = getComps(r);
  const sectionCount = comps.filter(c => c.rating === (compData.rating || 'competes')).length;
  if (sectionCount >= 10) {
    showToast('Maximum 10 comps reached for the ' + (compData.rating || 'competes') + ' section.', 'warning');
    return;
  }

  // Check for duplicate (by link or airdnaUrl)
  const isDupe = comps.some(c =>
    (compData.link && c.link === compData.link) ||
    (compData.airdnaUrl && c.airdnaUrl === compData.airdnaUrl)
  );
  if (isDupe) {
    showToast('This comp has already been imported.', 'warning');
    return;
  }

  // Add the comp
  comps.push({
    link: compData.link || '',
    linkShort: compData.linkShort || 'AirDNA Import',
    annualRevenue: compData.annualRevenue || 0,
    daysAvailable: compData.daysAvailable || 365,
    occupancy: compData.occupancy || 0,
    nightlyRate: compData.nightlyRate || 0,
    guests: compData.guests || 0,
    bedrooms: compData.bedrooms || 0,
    beds: compData.beds || 0,
    bathrooms: compData.bathrooms || 0,
    host: compData.host || '',
    rating: compData.rating || 'competes',
    notes: compData.notes || '',
    airdnaUrl: compData.airdnaUrl || '',
    source: 'airdna-extension',
    importedAt: compData.importedAt || new Date().toISOString()
  });

  saveData();
  render();
  showToast('Comp imported from AirDNA! (' + sectionCount + '/10)', 'success');
}

/**
 * When a property profile is opened, check for any pending extension comps and offer to add them.
 */
function checkPendingExtensionComps() {
  if (!window._pendingExtensionComps || window._pendingExtensionComps.length === 0) return;
  const pending = window._pendingExtensionComps;
  window._pendingExtensionComps = [];
  for (const comp of pending) {
    handleExtensionComp(comp);
  }
}

function extractAddress(url, details){
  // Try to extract address from URL path
  try {
    const path = new URL(url).pathname;
    const parts = path.split('/').filter(p => p && p.length > 3 && !/^[a-z0-9]{6,10}$/.test(p));
    if(parts.length > 0){
      let addr = parts[0].replace(/-/g,' ').replace(/\b\w/g, c => c.toUpperCase());
      if(parts[1] && /unit|apt|ste/i.test(parts[1].replace(/-/g,' '))) addr += ' '+parts[1].replace(/-/g,' ').replace(/\b\w/g, c => c.toUpperCase());
      return addr;
    }
  } catch(e){}
  return details?.propertyType || 'New Property';
}

function saveNewRecord(){
  let street = document.getElementById('add_property').value.trim();
  if(!street){ showAppAlert('Property address is required', {title: 'Validation', icon: '⚠️'}); return }
  const unitType = document.getElementById('add_unit_type')?.value || '';
  const unitNum = document.getElementById('add_unit_num')?.value?.trim() || '';
  const city = document.getElementById('add_city')?.value?.trim() || '';
  const state = document.getElementById('add_state')?.value?.trim() || '';
  const zip = document.getElementById('add_zip')?.value?.trim() || '';
  const unitStr = (unitType && unitNum) ? unitType + ' ' + unitNum : '';
  // Build full property string: "Street Unit, City State Zip"
  let property = street;
  if(unitStr) property += ' ' + unitStr;
  const csz = [city, state].filter(Boolean).join(' ') + (zip ? ' ' + zip : '');
  if(csz.trim()) property += ', ' + csz.trim();
  const addrParts = { street, unit: unitStr, city, state, zip };
  // Read property detail fields
  const market = document.getElementById('add_market')?.value?.trim() || '';
  const submarket = document.getElementById('add_submarket')?.value?.trim() || '';
  const beds = document.getElementById('add_beds')?.value || '';
  const baths = document.getElementById('add_baths')?.value || '';
  const sqft = document.getElementById('add_sqft')?.value || '';
  const rent = document.getElementById('add_rent')?.value || '';
  const meetingDate = document.getElementById('add_meeting')?.value || null;
  const linkEl = document.getElementById('add_link2') || document.getElementById('add_link');
  const propDetails = {};
  if(market) propDetails.market = market;
  if(submarket) propDetails.submarket = submarket;
  if(beds) propDetails.bedrooms = beds;
  if(baths) propDetails.bathrooms = baths;
  if(sqft) propDetails.sqft = sqft;
  if(rent) propDetails.monthlyRent = rent;
  const r = {
    id: uid(), property, addressParts: addrParts,
    name: document.getElementById('add_name').value.trim(),
    phone: document.getElementById('add_phone').value.trim(),
    email: document.getElementById('add_email').value.trim(),
    status: document.getElementById('add_status').value,
    link: linkEl?.value?.trim() || '',
    note: document.getElementById('add_note').value.trim(),
    date: new Date().toISOString().split('T')[0],
    followUpDate: document.getElementById('add_followup').value || null,
    meetingDate: meetingDate,
    notes:[], propertyDetails: propDetails, propertyNotes:[],
    createdAt: new Date().toISOString()
  };
  if(!checkPropertyLimit()){ return }
  if(r.note) r.notes.push({ id:uid(), text:r.note, date:r.date, type:'note' });
  records.unshift(r);
  saveData(); closeAddModal(true);
  openDetail(r.id);
}

/* ===== SEARCH & FILTER ===== */
function getFiltered(){
  let list = records;
  if(filterStatus && filterStatus !== 'All') list = list.filter(r => r.status === filterStatus);
  if(searchQuery){
    // Match all words in the query against any field on the record
    const words = searchQuery.split(/\s+/).filter(w => w.length > 0);
    list = list.filter(r => {
      const blob = [r.property, r.name, r.phone, r.email, r.note, r.status].filter(Boolean).join(' ').toLowerCase();
      return words.every(w => blob.includes(w));
    });
  }
  return list;
}

/* ===== EXPORT ===== */
function exportData(format){
  if(!checkCsvAccess()) return;
  const headers = ['Property','Name','Phone','Email','Status','Date','Note','Link','Follow Up Date'];
  const rows = records.map(r => [r.property,r.name,r.phone,r.email,r.status,r.date?r.date.split('T')[0]:'',r.notes.map(n=>n.text).join(' | '),r.link,r.followUpDate||'']);

  if(format === 'csv'){
    const csvContent = [headers, ...rows].map(row => row.map(cell => '"'+(cell||'').replace(/"/g,'""')+'"').join(',')).join('\n');
    downloadFile(csvContent, 'arbitrage_pipeline_'+new Date().toISOString().split('T')[0]+'.csv', 'text/csv');
  }
}

function downloadFile(content, filename, type){
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

/* ===== UTILS ===== */
function truncate(s, n){ return s && s.length > n ? s.substring(0,n)+'…' : (s||'') }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function getStatusColor(status){
  const m = { 'New':'#818cf8', 'No Contact':'#94a3b8', 'Contacted':'#38bdf8', 'Responded':'#2dd4bf', 'Viewing Scheduled':'#a78bfa', 'Viewed':'#c084fc', 'Application Sent':'#f59e0b', 'Approved':'#22c55e', 'Lease Signed':'#10b981', 'Not Interested':'#64748b', 'Deal Fell Through':'#ef4444', 'Follow Up':'#3b82f6', 'Interested':'#34d399', 'Meeting':'#8b5cf6', 'Messaged':'#06b6d4', 'Left Voicemail':'#f97316' };
  return m[status] || '#94a3b8';
}
function fmtPhone(s){
  if(!s) return '';
  const digits = s.replace(/\D/g,'');
  if(digits.length === 10) return '('+digits.slice(0,3)+') '+digits.slice(3,6)+'-'+digits.slice(6);
  if(digits.length === 11 && digits[0]==='1') return '('+digits.slice(1,4)+') '+digits.slice(4,7)+'-'+digits.slice(7);
  return esc(s);
}
function fmtDate(d){
  if(!d) return '—';
  try {
    const s = String(d);
    // Date-only strings (YYYY-MM-DD) — parse as local to avoid timezone shift
    if(/^\d{4}-\d{2}-\d{2}$/.test(s)){
      const [y,m,day] = s.split('-').map(Number);
      return new Date(y, m-1, day).toLocaleDateString('en-US',{ month:'short', day:'numeric', year:'numeric' });
    }
    const dt = new Date(d);
    if(isNaN(dt)) return '—';
    return dt.toLocaleDateString('en-US',{ month:'short', day:'numeric', year:'numeric' });
  } catch(e){ return '—' }
}
function fmtDateTime(d){
  if(!d) return '—';
  try {
    const dt = new Date(d);
    if(isNaN(dt)) return '—';
    // If the string has time info (contains T or is a full ISO string), show time
    const hasTime = typeof d === 'string' && (d.includes('T') && !d.endsWith('T00:00:00.000'));
    const datePart = dt.toLocaleDateString('en-US',{ month:'short', day:'numeric', year:'numeric' });
    if(!hasTime) return datePart;
    const timePart = dt.toLocaleTimeString('en-US',{ hour:'numeric', minute:'2-digit', hour12:true });
    return datePart + ' at ' + timePart;
  } catch(e){ return '—' }
}
function daysDiff(today, target){
  const t = new Date(today); const g = new Date(target);
  return Math.floor((t - g) / 86400000);
}

      document.querySelector('.sidebar')?.classList.add('collapsed');

  } catch(e){}

function initTheme(){
  try {
    const saved = localStorage.getItem('rr_theme_mode');
    const savedAccent = localStorage.getItem('rr_theme_accent');
    if(saved === 'dark') isDark = true;
    else if(saved === 'light') isDark = false;
    if(savedAccent && ACCENTS.find(a => a.key === savedAccent)) currentAccent = savedAccent;
    // Free tier forced to light standard
    if(currentTier === 'free'){ isDark = false; currentAccent = 'standard' }
  } catch(e){}
  applyTheme();
}

function applyTheme(){
  const root = document.documentElement;
  root.classList.toggle('light', !isDark);
  // Remove all accent classes
  ACCENTS.forEach(a => { if(a.key !== 'standard') root.classList.remove('accent-'+a.key) });
  // Apply current accent
  if(currentAccent !== 'standard') root.classList.add('accent-'+currentAccent);
  try {
    localStorage.setItem('rr_theme_mode', isDark ? 'dark' : 'light');
    localStorage.setItem('rr_theme_accent', currentAccent);
  } catch(e){}
  updateThemeUI();
  // Re-initialize dashboard map with correct theme tiles
  if(document.getElementById('dashboardMap')){ if(dashMap){ dashMap.remove(); dashMap=null; } setTimeout(initDashboardMap,100); }
}

    const timeAgo = getTimeAgo(r.lastAccessed);
    html += `<div class="ac-item" data-id="${r.id}" data-idx="${i}" onmousedown="acSelect('${r.id}')" onmouseenter="acIndex=${i};highlightAcItem()">
      <div class="ac-icon">🕐</div>
      <div class="ac-main">
        <div class="ac-title">${esc(r.property)}</div>
        <div class="ac-sub">${r.name?esc(r.name)+' • ':''}${esc(r.status)} • ${timeAgo}</div>
      </div>
    </div>`;
  });
  html += '</div>';
  box.innerHTML = html;
  box.classList.add('visible'); acIndex = -1;
}
function getTimeAgo(iso){
  const now = Date.now(), then = new Date(iso).getTime();
  const mins = Math.floor((now - then) / 60000);
  if(mins < 1) return 'Just now';
  if(mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if(hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if(days < 7) return days + 'd ago';
  return fmtDate(iso);
}
function handleSearch(q){
  searchQuery = q.toLowerCase();
  if(q.trim().length > 0) updateAutocomplete(q.toLowerCase());
  else showRecentlyAccessed();
  render();
}
function matchesAllWords(text, query){
  if(!text) return false;
  const words = query.split(/\s+/).filter(w => w.length > 0);
  const lower = text.toLowerCase();
  return words.every(w => lower.includes(w));
}

function updateAutocomplete(q){
  const box = document.getElementById('searchAutocomplete');
  if(!q || q.length < 1){ showRecentlyAccessed(); return }

  // Match records across all searchable fields, deduplicate by record id
  const seen = new Set();
  const matched = [];
  const limit = 8;

  records.forEach(r => {
    if(seen.has(r.id)) return;
    const searchable = [r.property, r.name, r.phone, r.email].filter(Boolean).join(' ');
    if(matchesAllWords(searchable, q)){
      seen.add(r.id);
      matched.push(r);
    }
  });

  if(!matched.length){ box.classList.remove('visible'); acIndex = -1; return }

  function highlight(text, query){
    if(!text) return '';
    const words = query.split(/\s+/).filter(w => w.length > 0);
    const lower = text.toLowerCase();
    let bestIdx = -1, bestLen = 0;
    for(const w of words){ const i = lower.indexOf(w); if(i >= 0 && w.length > bestLen){ bestIdx = i; bestLen = w.length } }
    if(bestIdx === -1) return esc(text);
    return esc(text.substring(0,bestIdx)) + '<mark>' + esc(text.substring(bestIdx, bestIdx+bestLen)) + '</mark>' + esc(text.substring(bestIdx+bestLen));
  }

  let html = '<div class="ac-section">';
  matched.slice(0, limit).forEach((r, flatIdx) => {
    const address = r.property || 'No address';
    const name = r.name || '';
    const status = r.status || '';
    const phone = r.phone || '';
    const email = r.email || '';
    const isFirst = flatIdx === 0;

    // Always show name + status on first sub-line; phone/email on second line only if they matched
    const nameLine = (name ? highlight(name, q) : '<span style="opacity:.4">No contact</span>') + (status ? ' · <span style="font-weight:600">' + esc(status) + '</span>' : '');
    let extraLine = '';
    const extras = [];
    if(phone && matchesAllWords(phone, q)) extras.push('📞 ' + highlight(phone, q));
    if(email && matchesAllWords(email, q)) extras.push('✉️ ' + highlight(email, q));
    if(extras.length) extraLine = '<div class="ac-sub" style="margin-top:1px">' + extras.join(' · ') + '</div>';

    html += `<div class="ac-item" data-id="${r.id}" data-idx="${flatIdx}" onmousedown="acSelect('${r.id}')" onmouseenter="acIndex=${flatIdx};highlightAcItem()">
      <div class="ac-icon">🏠</div>
      <div class="ac-main">
        <div class="ac-title">${highlight(address, q)}</div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="ac-sub">${nameLine}</div>
          ${isFirst ? '<div style="font-size:.58rem;color:var(--text3);opacity:.5;white-space:nowrap;margin-left:8px">Shift+Enter</div>' : ''}
        </div>
        ${extraLine}
      </div>
    </div>`;
  });
  html += '</div>';

  box.innerHTML = html;
  box.classList.add('visible');
  acIndex = -1;
}

  searchQuery = '';
  const inp = document.getElementById('globalSearch');

function highlightAcItem(){
  const items = document.querySelectorAll('#searchAutocomplete .ac-item');
  items.forEach((el,i) => el.classList.toggle('ac-active', i === acIndex));
}

// Keyboard navigation for autocomplete — attached directly to search input for reliability
function handleSearchKeydown(e){
  const box = document.getElementById('searchAutocomplete');
  if(!box || !box.classList.contains('visible')) return;
  const items = box.querySelectorAll('.ac-item');
  if(!items.length) return;

  if(e.key === 'ArrowDown'){
    e.preventDefault();
    acIndex = Math.min(acIndex + 1, items.length - 1);
    highlightAcItem();
    if(items[acIndex]) items[acIndex].scrollIntoView({ block:'nearest' });
  } else if(e.key === 'ArrowUp'){
    e.preventDefault();
    acIndex = Math.max(acIndex - 1, 0);
    highlightAcItem();
    if(items[acIndex]) items[acIndex].scrollIntoView({ block:'nearest' });
  } else if(e.key === 'Enter' && e.shiftKey){
    e.preventDefault();
    e.stopPropagation();
    const firstId = items[0]?.dataset?.id;
    if(firstId) acSelect(firstId);
  } else if(e.key === 'Enter' && acIndex >= 0){
    e.preventDefault();
    const id = items[acIndex]?.dataset?.id;
    if(id) acSelect(id);
  } else if(e.key === 'Escape'){
    box.classList.remove('visible');
    acIndex = -1;
  }
}

});

  try {

    if(user && db) db.collection('users').doc(user.uid).update({ tier: tier, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }).catch(()=>{});

  if(tier === 'free'){

    } catch(e){}
    isDark = false; currentAccent = 'standard'; applyTheme();

  // Show disclaimer on upgrade from free to paid
  if(wasFree && tier !== 'free' && !_disclaimerAcknowledged){

// ── Tutorial Engine ──
function startTutorial(name){
  if(!_tutorialDefs[name]) return;
  _tutCleanup();
  _tut.active = true;
  _tut.name = name;
  _tut.step = 0;
  _tut.steps = _tutorialDefs[name];
  _tutShowStep();
}

function _tutCleanup(){
  _tut._cleanup.forEach(fn => { try{fn();}catch(e){} });
  _tut._cleanup = [];
  document.querySelectorAll('.tut-highlight').forEach(el => el.classList.remove('tut-highlight'));
  const els = document.querySelectorAll('.tut-backdrop,.tut-tooltip,.tut-spotlight,.tut-arrow,.tut-welcome,.tut-close-confirm,.tut-overlay');
  els.forEach(el => el.remove());
  _tut._confirmOpen = false;
}

function _tutEnd(){
  _tutCleanup();
  _tut.active = false;
  _tut.seen[_tut.name] = true;
  _tutSaveSeen();
  _tut.name = null;
  _tut.step = 0;
  _tut.steps = [];
}

function _tutShowStep(){
  _tutCleanup();
  if(!_tut.active || _tut.step >= _tut.steps.length) { _tutEnd(); return; }
  const s = _tut.steps[_tut.step];

  // ── waitFor: fast RAF-based polling for element to appear (no fixed delay) ──
  if(s.waitFor && !document.querySelector(s.waitFor)){
    let frames = 0;
    const maxFrames = 240; // ~4s at 60fps
    const poll = function(){
      frames++;
      if(document.querySelector(s.waitFor)){
        // Element appeared — render step on next frame for one clean paint
        requestAnimationFrame(() => _tutShowStep());
      } else if(frames > maxFrames){
        _tutNext(); // skip if never appears
      } else {
        requestAnimationFrame(poll);
      }
    };
    requestAnimationFrame(poll);
    return;
  }

  // ── Auto-navigate: run onEnter to open modals/tabs as needed ──
  if(s.onEnter && !s._onEnterDone){
    s._onEnterDone = true;
    try { s.onEnter(); } catch(e){}
  }

  // Welcome/Complete screens
  if(s.type === 'welcome' || s.type === 'complete'){
    const bd = document.createElement('div'); bd.className='tut-backdrop'; document.body.appendChild(bd);
    bd.addEventListener('click', function(e){ e.stopPropagation(); });
    const w = document.createElement('div'); w.className='tut-welcome';
    w.innerHTML = '<div class="tut-emoji">'+(s.emoji||'👋')+'</div><h2>'+s.title+'</h2><p>'+s.body+'</p>'
      + '<div style="display:flex;gap:10px;justify-content:center">'
      + (s.type==='welcome' ? '<button class="tut-btn tut-btn-secondary" onclick="_tutConfirmClose()">Skip Tutorial</button><button class="tut-btn tut-btn-primary" onclick="_tutNext()">Let\'s Go →</button>'
        : '<button class="tut-btn tut-btn-primary" onclick="_tutEnd()">Finish Tutorial</button>')
      + '</div>';
    document.body.appendChild(w);
    return;
  }

  // Regular targeted step — poll for target if not yet visible
  const targetEl = _tutResolveTarget(s.target);
  if(!targetEl){
    let frames = 0;
    const maxFrames = 300; // ~5s at 60fps
    const poll = function(){
      frames++;
      if(_tutResolveTarget(s.target)){
        requestAnimationFrame(() => _tutShowStep());
      } else if(frames > maxFrames){
        _tut.step++; _tutShowStep(); // skip after timeout
      } else {
        requestAnimationFrame(poll);
      }
    };
    requestAnimationFrame(poll);
    return;
  }

  // Scroll target into view if off-screen
  const _vr = targetEl.getBoundingClientRect();
  if(_vr.top < 0 || _vr.bottom > window.innerHeight){
    targetEl.scrollIntoView({ behavior:'smooth', block:'center' });
  }

  const isNoBlock = !!s.noBlock;

  if(!isNoBlock){
    const bd = document.createElement('div'); bd.className='tut-backdrop'; bd.style.background='transparent'; document.body.appendChild(bd);
    targetEl.classList.add('tut-highlight');
  }

  // Create tooltip — start invisible with no transitions so the first _track frame
  // can position it correctly without any flash or animation from (0,0).
  const tt = document.createElement('div'); tt.className='tut-tooltip'+(isNoBlock?' tut-floating':'');
  tt.style.opacity = '0';
  tt.style.transition = 'none';
  let ttHtml = '<div class="tut-tooltip-header"><span class="tut-step-badge">Step '+(_tut.step+1)+' of '+_tut.steps.length+'</span><span class="tut-title">'+s.title+'</span></div>';
  ttHtml += '<div class="tut-tooltip-body">'+s.body+'</div>';
  ttHtml += '<div class="tut-progress">';
  _tut.steps.forEach((_, i) => { ttHtml += '<div class="tut-progress-dot'+(i<_tut.step?' done':'')+(i===_tut.step?' active':'')+'"></div>'; });
  ttHtml += '</div>';
  ttHtml += '<div class="tut-tooltip-footer"><span class="tut-skip" onclick="_tutConfirmClose()">Close tutorial</span><div class="tut-btns">';
  if(_tut.step > 0) ttHtml += '<button class="tut-btn tut-btn-secondary" onclick="_tutPrev()">← Back</button>';
  ttHtml += '<button class="tut-btn tut-btn-primary" onclick="_tutNext()">Next →</button>';
  ttHtml += '</div></div>';
  tt.innerHTML = ttHtml;
  document.body.appendChild(tt);

  // Create SVG for arrow — quadratic bezier curve, always from tooltip bottom-center
  const arrowSvg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  arrowSvg.className.baseVal = 'tut-arrow';
  const arrowDefs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  // Solid white filled arrowhead, larger and clearly visible
  arrowDefs.innerHTML = '<marker id="tutAH" markerWidth="14" markerHeight="10" refX="13" refY="5" orient="auto" markerUnits="userSpaceOnUse"><polygon points="0,1 13,5 0,9" fill="#fff"/></marker>';
  arrowSvg.appendChild(arrowDefs);
  const arrowPath = document.createElementNS('http://www.w3.org/2000/svg','path');
  arrowPath.setAttribute('fill','none');
  arrowPath.setAttribute('stroke','#fff');
  arrowPath.setAttribute('stroke-width','2');
  arrowPath.setAttribute('stroke-linecap','round');
  arrowPath.setAttribute('marker-end','url(#tutAH)');
  arrowSvg.appendChild(arrowPath);
  document.body.appendChild(arrowSvg);

  // Spotlight element (if not noBlock)
  let spot = null;
  if(!isNoBlock){
    spot = document.createElement('div'); spot.className='tut-spotlight';
    document.body.appendChild(spot);
  }

  // ── Live tracking loop: tooltip, arrow, spotlight all track the target ──
  const pos = s.position || 'bottom';
  let _rafId = 0;
  let _firstFrame = true; // true until first successful positioning
  const GAP = 16;

  function _track(){
    if(!_tut.active || !document.body.contains(tt)) return;
    const tgt = targetEl.getBoundingClientRect();

    // If target is hidden/zero-size, hide tooltip+arrow and keep polling
    if(tgt.width === 0 || tgt.height === 0){
      tt.style.opacity = '0';
      arrowSvg.style.opacity = '0';
      if(spot) spot.style.opacity = '0';
      _rafId = requestAnimationFrame(_track);
      return;
    }

    const ttW = tt.offsetWidth, ttH = tt.offsetHeight;
    const vw = window.innerWidth, vh = window.innerHeight;

    // ── Position tooltip relative to target ──
    let ttLeft, ttTop;
    switch(pos){
      case 'right':
        ttLeft = tgt.right + GAP;
        ttTop = tgt.top + tgt.height/2 - ttH/2;
        break;
      case 'left':
        ttLeft = tgt.left - ttW - GAP;
        ttTop = tgt.top + tgt.height/2 - ttH/2;
        break;
      case 'top':
        ttLeft = tgt.left + tgt.width/2 - ttW/2;
        ttTop = tgt.top - ttH - GAP;
        break;
      default: // bottom
        ttLeft = tgt.left + tgt.width/2 - ttW/2;
        ttTop = tgt.bottom + GAP;
    }
    ttLeft = Math.max(8, Math.min(vw - ttW - 8, ttLeft));
    ttTop = Math.max(8, Math.min(vh - ttH - 8, ttTop));
    tt.style.left = ttLeft + 'px';
    tt.style.top = ttTop + 'px';

    // On the first successful frame, make tooltip visible and re-enable transitions
    if(_firstFrame){
      _firstFrame = false;
      // Force the browser to commit the position before enabling transitions
      void tt.offsetWidth;
      tt.style.transition = '';
      tt.style.opacity = '1';
      arrowSvg.style.opacity = '1';
      if(spot) spot.style.opacity = '1';
    }

    // ── Arrow: bottom-center of tooltip → bottom-center of target ──
    const sx = ttLeft + ttW / 2;
    const sy = ttTop + ttH;
    const ex = tgt.left + tgt.width / 2;
    const ey = tgt.bottom;

    const dx = ex - sx, dy = ey - sy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const minSwoop = 50;
    const hDir = dx >= 0 ? 1 : -1;
    const hOffset = Math.abs(dx) < minSwoop ? hDir * minSwoop : dx * 0.45;
    let cx, cy;
    if(dy >= 0){
      cx = sx + hOffset;
      cy = sy + Math.max(40, dy * 0.5);
    } else {
      const drop = Math.max(40, Math.min(70, dist * 0.25));
      cx = sx + hOffset;
      cy = sy + drop;
    }

    arrowPath.setAttribute('d',
      'M' + sx.toFixed(1) + ',' + sy.toFixed(1) +
      ' Q' + cx.toFixed(1) + ',' + cy.toFixed(1) +
      ' ' + ex.toFixed(1) + ',' + ey.toFixed(1)
    );

    // ── Update spotlight ──
    if(spot){
      const sp = 8;
      spot.style.cssText = 'left:'+(tgt.left-sp)+'px;top:'+(tgt.top-sp)+'px;width:'+(tgt.width+sp*2)+'px;height:'+(tgt.height+sp*2)+'px';
    }

    _rafId = requestAnimationFrame(_track);
  }
  _rafId = requestAnimationFrame(_track);
  _tut._cleanup.push(() => { cancelAnimationFrame(_rafId); });

}

function _tutResolveTarget(target){
  if(!target) return null;
  if(typeof target === 'function'){
    const el = target();
    if(!el) return null;
    const r = el.getBoundingClientRect();
    return (r.width > 0 && r.height > 0) ? el : null;
  }
  const selectors = target.split(',').map(s => s.trim());
  for(const sel of selectors){
    try {
      const el = document.querySelector(sel);
      if(!el) continue;
      const r = el.getBoundingClientRect();
      if(r.width > 0 && r.height > 0) return el;
    } catch(e){}
  }
  return null;
}

// _tutPositionTooltip and _tutDrawArrow are handled by the live _track() RAF loop inside _tutShowStep

function _tutNext(){
  _tut.step++;
  _tutShowStep();
}
function _tutPrev(){
  if(_tut.step <= 0) return;
  // Reset onEnterDone flags so navigation works when revisiting steps
  if(_tut.steps[_tut.step]) _tut.steps[_tut.step]._onEnterDone = false;
  _tut.step--;
  if(_tut.steps[_tut.step]) _tut.steps[_tut.step]._onEnterDone = false;
  _tutShowStep();
}

function _tutConfirmClose(){
  if(_tut._confirmOpen) return;
  _tut._confirmOpen = true;
  const c = document.createElement('div'); c.className='tut-close-confirm';
  c.innerHTML = '<h3>Close Tutorial?</h3><p>You can restart this tutorial anytime from <strong>Settings → Tutorial Walkthrough</strong>.</p>'
    + '<div class="tut-btns"><button class="tut-btn tut-btn-secondary" onclick="_tutCancelClose()">Continue Tutorial</button>'
    + '<button class="tut-btn tut-btn-primary" style="background:#ef4444" onclick="_tutEnd()">Close</button></div>';
  // Add a backdrop behind the confirm
  const cb = document.createElement('div'); cb.className='tut-backdrop'; cb.id='tutConfirmBackdrop'; cb.style.zIndex='10004'; document.body.appendChild(cb);
  c.style.zIndex='10005';
  document.body.appendChild(c);
}
function _tutCancelClose(){
  _tut._confirmOpen = false;
  const cb = document.getElementById('tutConfirmBackdrop'); if(cb) cb.remove();
  document.querySelectorAll('.tut-close-confirm').forEach(el => el.remove());
}

// ── Auto-trigger Logic ──
function _tutCheckAutoStart(tier, isNewUser){
  _tutLoadSeen();
  if(isNewUser && !_tut.seen.free){
    setTimeout(() => startTutorial('free'), 800);
  } else if(tier === 'basic' && !_tut.seen.basic){
    // First time on Basic — wait for profile to be open + disclaimer acknowledged
    setTimeout(() => {
      if(_disclaimerAcknowledged || !requireTier('basic','x')) return; // wait for disclaimer
      startTutorial('basic');
    }, 1200);
  } else if(tier === 'pro' && !_tut.seen.pro){
    setTimeout(() => {
      if(_disclaimerAcknowledged || !requireTier('pro','x')) return;
      startTutorial('pro');
    }, 1200);
  }
}

function _tutCheckDashboard(){
  _tutLoadSeen();
  if(!_tut.seen.dashboard && !_tut.active){
    setTimeout(() => startTutorial('dashboard'), 600);
  }
}

// Called from Settings to restart a tutorial
function restartTutorial(name){
  if(name === 'all'){
    _tut.seen = {};
    _tutSaveSeen();
    showAppAlert('All tutorials reset! They will appear on your next visit to each section.', {title:'Tutorials Reset', icon:'🔄'});
  } else {
    delete _tut.seen[name];
    _tutSaveSeen();
    startTutorial(name);
  }
}
