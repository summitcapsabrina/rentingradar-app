}

function parseAddressParts(property){
  if(!property) return { street:'', unit:'', city:'', state:'', zip:'' };
  // Try to parse "Street, City State Zip" or "Street Unit X, City State Zip"
  const parts = { street:'', unit:'', city:'', state:'', zip:'' };
  // Match unit in the string
  const unitRe = /\s+(#|Unit|Ste|Suite|Apt|Apartment|Bldg)\s*\.?\s*(\S+)/i;
  let clean = property;
  const unitMatch = clean.match(unitRe);
  if(unitMatch){
    parts.unit = unitMatch[1] + ' ' + unitMatch[2];
    clean = clean.replace(unitRe, '');
  }
  // Split on comma
  const commaIdx = clean.indexOf(',');
  if(commaIdx > 0){
    parts.street = clean.substring(0, commaIdx).trim();
    const rest = clean.substring(commaIdx+1).trim();
    // Parse "City State Zip" or "City State" or "City AZ 85048"
    const cszMatch = rest.match(/^(.+?)\s+([A-Z]{2})\s+(\d{5}(?:-\d{4})?)$/);
    if(cszMatch){
      parts.city = cszMatch[1].trim();
      parts.state = cszMatch[2];
      parts.zip = cszMatch[3];
    } else {
      const csMatch = rest.match(/^(.+?)\s+([A-Z]{2})$/);
      if(csMatch){ parts.city = csMatch[1].trim(); parts.state = csMatch[2] }
      else { parts.city = rest }
    }
  } else {
    // No comma — try "Street City AZ Zip" pattern
    const fullMatch = clean.match(/^(.+?)\s+(\w[\w\s]*?)\s+([A-Z]{2})\s+(\d{5})$/);
    if(fullMatch){
      parts.street = fullMatch[1].trim();
      parts.city = fullMatch[2].trim();
      parts.state = fullMatch[3];
      parts.zip = fullMatch[4];
    } else {
      parts.street = clean.trim();
    }
  }
  return parts;
}

function highlightMatch(text, query){
  // Bold matching portions of query words within the text
  // Use marker tokens to avoid regex corrupting inserted HTML tags
  const words = query.toLowerCase().split(/\s+/).filter(w => w.length > 1);
  if(!words.length) return esc(text);
  // Sort longest first to avoid partial overwrites
  words.sort((a,b) => b.length - a.length);
  // Work on raw text, mark matches with tokens, then escape and convert tokens to HTML
  let marks = new Array(text.length).fill(false);
  for(const word of words){
    const escaped = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp(escaped, 'gi');
    let m;
    while((m = re.exec(text)) !== null){
      for(let i = m.index; i < m.index + m[0].length; i++) marks[i] = true;
    }
  }
  // Build result with bold spans around marked runs
  let result = '';
  let inBold = false;
  for(let i = 0; i < text.length; i++){
    if(marks[i] && !inBold){ result += '<strong>'; inBold = true; }
    else if(!marks[i] && inBold){ result += '</strong>'; inBold = false; }
    // Escape each character individually
    const c = text[i];
    if(c === '&') result += '&amp;';
    else if(c === '<') result += '&lt;';
    else if(c === '>') result += '&gt;';
    else if(c === '"') result += '&quot;';
    else result += c;
  }
  if(inBold) result += '</strong>';
  return result;
}

function formatFullAddress(parts){
  let s = parts.street || '';
  if(parts.city) s += ', ' + parts.city;
  if(parts.state) s += ' ' + parts.state;
  if(parts.zip) s += ' ' + parts.zip;
  return s;
}

async function fetchAddressSuggestions(query, dropdown, inputEl, recId){
  // Clean up pasted addresses: normalize whitespace, trim trailing commas
  let q = query.replace(/\s+/g, ' ').replace(/,\s*$/, '').trim();
  if(q.length < 3){ dropdown.classList.remove('visible'); return; }

  async function doFetch(types){
    const body = { input: q, includedRegionCodes: ['us'] };
    if(types) body.includedPrimaryTypes = types;
    const resp = await fetch('https://places.googleapis.com/v1/places:autocomplete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Goog-Api-Key': GPLACES_KEY },
      body: JSON.stringify(body)
    });
    return resp.json();
  }

  try {
    // Try with address types first for best results
    let data = await doFetch(['street_address', 'subpremise', 'premise']);
    let places = (data.suggestions || []).filter(s => s.placePrediction).map(s => s.placePrediction);

    // If no results, retry without type restriction (handles partial city/state/zip queries)
    if(!places.length){
      data = await doFetch(null);
      places = (data.suggestions || []).filter(s => s.placePrediction).map(s => s.placePrediction);
    }

    if(!places.length){ dropdown.classList.remove('visible'); return; }

    dropdown.innerHTML = places.map(p => {
      const placeId = p.placeId || '';
      const main = p.structuredFormat?.mainText?.text || p.text?.text || '';
      const secondary = p.structuredFormat?.secondaryText?.text || '';
      const display = secondary ? main + ', ' + secondary : main;
      return `<div class="address-ac-item" onmousedown="selectAddress(this,'${recId||''}')" data-place-id="${esc(placeId)}" data-description="${esc(display)}" data-main="${esc(main)}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span>${highlightMatch(display, q)}</span>
      </div>`;
    }).join('');
    dropdown.classList.add('visible');
  } catch(e){
    console.log('Address autocomplete error:', e);
    dropdown.classList.remove('visible');
  }
}

async function selectAddress(el, recId){
  const placeId = el.dataset.placeId || '';
  const description = el.dataset.description || '';
  const dropdown = el.closest('.address-ac');
  if(dropdown) dropdown.classList.remove('visible');

  // Find whichever address input is active
  const addrEdStreet = document.getElementById('addrEdStreet');
  const addInput = document.getElementById('add_property');
  const ceAddrInput = document.getElementById('ce_address');
  const activeInput = addrEdStreet || ceAddrInput || addInput;

  function applyParts(parts){
    window._selectedAddrParts = parts;
    const full = formatAddressOneLine(parts);
    if(activeInput) activeInput.value = parts.street || full;
    // Auto-fill city/state/zip fields in the address editor popup if open
    if(addrEdStreet){
      addrEdStreet.value = parts.street || full;
      const cityEl = document.getElementById('addrEdCity');
      const stateEl = document.getElementById('addrEdState');
      const zipEl = document.getElementById('addrEdZip');
      if(cityEl && parts.city) cityEl.value = parts.city;
      if(stateEl && parts.state) stateEl.value = parts.state;
      if(zipEl && parts.zip) zipEl.value = parts.zip;
    }
    // Auto-fill city/state/zip fields in the contact card editor popup if open
    if(ceAddrInput){
      ceAddrInput.value = parts.street || full;
      const ceCityEl = document.getElementById('ce_city');
      const ceStateEl = document.getElementById('ce_state');
      const ceZipEl = document.getElementById('ce_zip');
      if(ceCityEl && parts.city) ceCityEl.value = parts.city;
      if(ceStateEl && parts.state) ceStateEl.value = parts.state;
      if(ceZipEl && parts.zip) ceZipEl.value = parts.zip;
    }
    // Auto-fill city/state/zip in the Add Property manual form
    if(addInput){
      addInput.value = parts.street || full;
      const addCityEl = document.getElementById('add_city');
      const addStateEl = document.getElementById('add_state');
      const addZipEl = document.getElementById('add_zip');
      if(addCityEl) addCityEl.value = parts.city || '';
      if(addStateEl) addStateEl.value = parts.state || '';
      if(addZipEl) addZipEl.value = parts.zip || '';
    }
  }

  if(!placeId){
    applyParts({ street: description, city:'', state:'', zip:'' });
    return;
  }

  try {
    const resp = await fetch('https://places.googleapis.com/v1/places/' + placeId, {
      headers: {
        'X-Goog-Api-Key': GPLACES_KEY,
        'X-Goog-FieldMask': 'addressComponents,formattedAddress,location'
      }
    });
    const place = await resp.json();
    let parts = { street:'', city:'', state:'', zip:'' };

    if(place.addressComponents){
      const get = (type) => (place.addressComponents.find(c => c.types.includes(type)) || {}).longText || '';
      const getShort = (type) => (place.addressComponents.find(c => c.types.includes(type)) || {}).shortText || '';
      parts.street = [get('street_number'), getShort('route')].filter(Boolean).join(' ');
      parts.city = get('locality') || get('sublocality_level_1') || get('administrative_area_level_2');
      parts.state = getShort('administrative_area_level_1');
      parts.zip = get('postal_code');
    } else {
      parts.street = description;
    }

    // Capture geolocation from place details
    if(place.location){
      window._selectedGeoLocation = { lat: place.location.latitude, lng: place.location.longitude };
    } else {
      window._selectedGeoLocation = null;
    }

    applyParts(parts);
  } catch(e){
    console.log('Place details error:', e);
    applyParts({ street: description, city:'', state:'', zip:'' });
  }
}

function saveAddressEditor(recId){
  const r = records.find(x => x.id === recId);
  if(!r) return;

  const streetInput = document.getElementById('addrEdStreet')?.value?.trim() || '';
  const utVal = document.getElementById('addrEdUnitType')?.value || '';
  const unVal = document.getElementById('addrEdUnitNum')?.value?.trim() || '';
  const unit = (utVal && unVal) ? utVal + ' ' + unVal : '';
  const cityVal = document.getElementById('addrEdCity')?.value?.trim() || '';
  const stateVal = document.getElementById('addrEdState')?.value?.trim().toUpperCase() || '';
  const zipVal = document.getElementById('addrEdZip')?.value?.trim() || '';

  const selected = window._selectedAddrParts || {};
  const addrParts = {
    street: selected.street || streetInput,
    unit: unit,
    city: selected.city || cityVal,
    state: selected.state || stateVal,
    zip: selected.zip || zipVal,
  };
  // If autocomplete was used, also fill in city/state/zip fields that were left empty
  if(selected.street){
    if(!addrParts.city && selected.city) addrParts.city = selected.city;
    if(!addrParts.state && selected.state) addrParts.state = selected.state;
    if(!addrParts.zip && selected.zip) addrParts.zip = selected.zip;
  }

  r.addressParts = addrParts;
  r.property = formatAddressOneLine(addrParts);

  // Save geolocation if captured from autocomplete
  if(window._selectedGeoLocation){
    if(!r.propertyDetails) r.propertyDetails = {};
    r.propertyDetails.latitude = window._selectedGeoLocation.lat;
    r.propertyDetails.longitude = window._selectedGeoLocation.lng;
    window._selectedGeoLocation = null;
  }

  window._selectedAddrParts = null;
  saveData();
  document.getElementById('addressEditorOverlay')?.remove();
  render();
}

    </div>
  </div>`;
  document.body.appendChild(overlay);

  // Shift+Enter to save, Escape to cancel
  overlay.addEventListener('keydown', function(e){
    if(e.shiftKey && e.key === 'Enter'){ e.preventDefault(); saveStatsEditor(recId); }
    if(e.key === 'Escape') overlay.remove();
  });

  // Focus first field
  setTimeout(() => document.getElementById('statsBeds')?.focus(), 100);
}

function saveStatsEditor(recId){
  const r = records.find(x => x.id === recId);
  if(!r) return;
  if(!r.propertyDetails) r.propertyDetails = {};

  const beds = document.getElementById('statsBeds')?.value?.trim();
  const baths = document.getElementById('statsBaths')?.value?.trim();
  const sqft = document.getElementById('statsSqft')?.value?.trim();
  const avail = document.getElementById('statsAvail')?.value?.trim();

  if(beds !== undefined) r.propertyDetails.bedrooms = beds;
  if(baths !== undefined) r.propertyDetails.bathrooms = baths;
  if(sqft !== undefined) r.propertyDetails.sqft = sqft;
  if(avail !== undefined) r.propertyDetails.availableDate = avail;

  saveData();
  document.getElementById('statsEditorOverlay')?.remove();
  render();
}


/* ===== CUSTOM DATE/TIME PICKER ===== */
const CALENDAR_ICON = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>';
const CLEAR_X_ICON = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>';
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOWS = ['Su','Mo','Tu','We','Th','Fr','Sa'];

// Store picker state per input
const _dtPickers = {};

function fmtDtDisplay(dateStr, timeStr){
  if(!dateStr) return '';
  // dateStr must be YYYY-MM-DD, timeStr is HH:MM or empty.
  // Guard against bad input (e.g. "Now", "May 1", etc.) — otherwise we
  // render "undefined NaN" into the trigger.
  if(!/^\d{4}-\d{1,2}-\d{1,2}$/.test(String(dateStr))) return '';
  const [y,m,d] = dateStr.split('-').map(Number);
  if(!Number.isFinite(y) || !Number.isFinite(m) || !Number.isFinite(d)) return '';
  const mm = String(m).padStart(2,'0');
  const dd = String(d).padStart(2,'0');
  let s = mm+'/'+dd+'/'+y;
  if(timeStr){
    const [hh,mi] = timeStr.split(':').map(Number);
    const ampm = hh >= 12 ? 'PM' : 'AM';
    const h12 = hh === 0 ? 12 : hh > 12 ? hh - 12 : hh;
    s += ' ' + h12 + ':' + String(mi).padStart(2,'0') + ' ' + ampm;
  }
  return s;
}

function fmtDateTimeForCard(dateStr, timeStr){
  if(!dateStr) return '';
  const datePart = fmtDate(dateStr);
  if(!timeStr) return datePart;
  const [hh,mi] = timeStr.split(':').map(Number);
  const ampm = hh >= 12 ? 'PM' : 'AM';
  const h12 = hh === 0 ? 12 : hh > 12 ? hh - 12 : hh;
  return datePart + ' at ' + h12 + ':' + String(mi).padStart(2,'0') + ' ' + ampm;
}

function renderFollowUpSubtle(r){

  const bell = isPast ? '\uD83D\uDD15' : '\uD83D\uDD14';
  const color = isPast ? 'var(--text3)' : 'var(--danger, #ef4444)';

  const needsAlert = !hasDate && r.status === 'Follow Up';

  const editIcon = '<svg class="inline-date-edit-icon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
  return '<span class="inline-date-edit" onclick="event.stopPropagation();openInlineDatePicker(event,\'' + r.id + '\',\'followUp\')" title="Click to set follow-up date" style="cursor:pointer;font-size:.8rem;color:' + color + ';display:inline-flex;align-items:center;gap:4px;' + borderStyle + ';border-radius:4px;transition:background .15s">'
    + '<span style="font-size:.85rem">' + bell + '</span>'

function renderMeetingSubtle(r){

  return '<span class="inline-date-edit" onclick="event.stopPropagation();openInlineDatePicker(event,\'' + r.id + '\',\'meeting\')" title="Click to set meeting date" style="cursor:pointer;font-size:.8rem;color:' + color + ';display:inline-flex;align-items:center;gap:4px;' + borderStyle + ';border-radius:4px;transition:background .15s">'
    + '<span style="font-size:.85rem">📅</span>'

function setupDateTimePicker(triggerId, opts){
  // opts: { showTime:bool, autoClose:bool, dateVal:'', timeVal:'' }
  const trigger = document.getElementById(triggerId);
  if(!trigger) return;
  // Only accept strictly-formatted YYYY-MM-DD dates. Anything else (e.g.
  // "Now", "May 1", "2026-05-01T00:00", undefined) is treated as empty so
  // the calendar initializes to the current month instead of NaN/undefined.
  const rawDate = opts.dateVal || '';
  const validDate = /^\d{4}-\d{1,2}-\d{1,2}$/.test(rawDate) ? rawDate : '';
  const state = { date: validDate, time: opts.timeVal || '', showTime: opts.showTime !== false, autoClose: !!opts.autoClose, viewMonth: null, viewYear: null };
  if(state.date){
    const [y,m] = state.date.split('-').map(Number);
    if(Number.isFinite(y) && Number.isFinite(m)){
      state.viewMonth = m - 1; state.viewYear = y;
    } else {
      const now = new Date(); state.viewMonth = now.getMonth(); state.viewYear = now.getFullYear();
      state.date = '';
    }
  } else {
    const now = new Date(); state.viewMonth = now.getMonth(); state.viewYear = now.getFullYear();
  }
  _dtPickers[triggerId] = state;
  updateDtTriggerText(triggerId);

  trigger.addEventListener('click', function(e){
    e.stopPropagation();
    // Don't open if clicking the clear button
    if(e.target.closest('.rr-dt-clear')) return;
    openDtPopup(triggerId, state.showTime);
  });
  // Clear button
  const clearBtn = trigger.querySelector('.rr-dt-clear');
  if(clearBtn){
    clearBtn.addEventListener('click', function(e){
      e.stopPropagation();
      state.date = ''; state.time = '';
      updateDtTriggerText(triggerId);
      closeDtPopup();
    });
  }
}

function updateDtTriggerText(triggerId){
  const state = _dtPickers[triggerId];
  const trigger = document.getElementById(triggerId);
  if(!trigger || !state) return;
  const textEl = trigger.querySelector('.rr-dt-text');
  const clearEl = trigger.querySelector('.rr-dt-clear');
  if(!textEl) return;
  if(state.date){
    textEl.textContent = fmtDtDisplay(state.date, state.time);
    textEl.classList.remove('empty');
    if(clearEl) clearEl.style.display = 'flex';
  } else {
    textEl.textContent = state.showTime ? '--/--/---- --:--' : '--/--/----';
    textEl.classList.add('empty');
    if(clearEl) clearEl.style.display = 'none';
  }
}

function openDtPopup(triggerId, showTime){
  closeDtPopup();
  const trigger = document.getElementById(triggerId);
  const state = _dtPickers[triggerId];
  if(!trigger || !state) return;

  const popup = document.createElement('div');
  popup.className = 'rr-dt-popup visible';
  popup.id = 'rrDtPopup';
  popup.dataset.triggerId = triggerId;
  document.body.appendChild(popup);

  // Position below trigger
  const rect = trigger.getBoundingClientRect();
  popup.style.top = (rect.bottom + 4) + 'px';
  popup.style.left = rect.left + 'px';
  // Ensure it doesn't overflow right
  requestAnimationFrame(() => {
    const pr = popup.getBoundingClientRect();
    if(pr.right > window.innerWidth - 10) popup.style.left = (window.innerWidth - pr.width - 10) + 'px';
    if(pr.bottom > window.innerHeight - 10) popup.style.top = (rect.top - pr.height - 4) + 'px';
  });

  renderDtCalendar(popup, state, showTime);

  // Close on outside click
  setTimeout(() => {
    document.addEventListener('click', _dtOutsideClick);
  }, 50);
}

function _dtOutsideClick(e){
  const popup = document.getElementById('rrDtPopup');
  if(!popup) return;
  // After innerHTML re-render, e.target may be detached — check bounding rect
  const rect = popup.getBoundingClientRect();
  const inPopup = e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom;
  if(!inPopup && !popup.contains(e.target) && !e.target.closest('.rr-dt-trigger')){
    closeDtPopup();
  }
}

function closeDtPopup(){
  document.removeEventListener('click', _dtOutsideClick);
  document.getElementById('rrDtPopup')?.remove();
}

function renderDtCalendar(popup, state, showTime){
  const today = new Date();
  const todayStr = today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');

  // Calendar navigation
  let html = `<div class="rr-cal-nav">
    <button onclick="dtNavMonth(-1)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>
    <span class="rr-cal-title">${MONTHS[state.viewMonth]} ${state.viewYear}</span>
    <button onclick="dtNavMonth(1)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></button>
  </div>`;

  // Day-of-week headers
  html += '<div class="rr-cal-grid">';
  DOWS.forEach(d => { html += `<div class="rr-cal-dow">${d}</div>`; });

  // Calendar days
  const firstDay = new Date(state.viewYear, state.viewMonth, 1).getDay();
  const daysInMonth = new Date(state.viewYear, state.viewMonth + 1, 0).getDate();
  const prevMonthDays = new Date(state.viewYear, state.viewMonth, 0).getDate();

  // Previous month fill
  for(let i = firstDay - 1; i >= 0; i--){
    const d = prevMonthDays - i;
    html += `<div class="rr-cal-day other">${d}</div>`;
  }
  // Current month
  for(let d = 1; d <= daysInMonth; d++){
    const ds = state.viewYear+'-'+String(state.viewMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const cls = ['rr-cal-day'];
    if(ds === todayStr) cls.push('today');
    if(ds === state.date) cls.push('selected');
    html += `<div class="${cls.join(' ')}" onclick="dtSelectDay('${ds}')">${d}</div>`;
  }
  // Next month fill
  const totalCells = firstDay + daysInMonth;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for(let i = 1; i <= remaining; i++){
    html += `<div class="rr-cal-day other">${i}</div>`;
  }
  html += '</div>';

  // Time selector
  if(showTime){
    const curH = state.time ? parseInt(state.time.split(':')[0]) : '';
    const curM = state.time ? parseInt(state.time.split(':')[1]) : '';
    const curAmPm = curH !== '' ? (curH >= 12 ? 'PM' : 'AM') : '';
    const displayH = curH !== '' ? (curH === 0 ? 12 : curH > 12 ? curH - 12 : curH) : '';

    let hourOpts = '<option value="">--</option>';
    for(let h = 1; h <= 12; h++){
      hourOpts += `<option value="${h}" ${displayH===h?'selected':''}>${h}</option>`;
    }
    let minOpts = '<option value="">--</option>';
    for(let m = 0; m < 60; m += 5){
      const mv = String(m).padStart(2,'0');
      minOpts += `<option value="${mv}" ${curM!==''&&curM===m?'selected':''}>${mv}</option>`;
    }
    html += `<div class="rr-time-row">
      <label>Time</label>
      <div class="rr-time-sel">
        <select id="rrDtHour" onchange="dtUpdateTime()">${hourOpts}</select>
        <span style="color:var(--text3);font-weight:600">:</span>
        <select id="rrDtMin" onchange="dtUpdateTime()">${minOpts}</select>
        <select id="rrDtAmPm" onchange="dtUpdateTime()">
          <option value="AM" ${curAmPm==='AM'?'selected':''}>AM</option>
          <option value="PM" ${curAmPm==='PM'?'selected':''}>PM</option>
        </select>
      </div>
    </div>`;
  }

  // Actions - show Remove button for inline pickers
  const _inlinePopup = document.getElementById('rrDtPopup');
  const _isInlinePicker = _inlinePopup && _inlinePopup.dataset.inlineRecId;
  html += `<div class="rr-dt-actions">
    ${_isInlinePicker ? '<button class="rr-dt-clear-date" onclick="clearInlineDate()" style="margin-right:auto;color:var(--danger);border-color:var(--danger)">Remove</button>' : ''}
    <button class="rr-dt-cancel" onclick="closeDtPopup()">Cancel</button>
    <button class="rr-dt-done" onclick="dtConfirm()">Done</button>
  </div>`;

  popup.innerHTML = html;
}

function dtNavMonth(dir){
  const popup = document.getElementById('rrDtPopup');
  if(!popup) return;
  const triggerId = popup.dataset.triggerId;
  const state = _dtPickers[triggerId];
  if(!state) return;
  state.viewMonth += dir;
  if(state.viewMonth < 0){ state.viewMonth = 11; state.viewYear--; }
  if(state.viewMonth > 11){ state.viewMonth = 0; state.viewYear++; }
  const showTime = !!popup.querySelector('.rr-time-row');
  renderDtCalendar(popup, state, showTime);
}

function dtSelectDay(dateStr){
  const popup = document.getElementById('rrDtPopup');
  if(!popup) return;
  const triggerId = popup.dataset.triggerId;
  const state = _dtPickers[triggerId];
  if(!state) return;
  state.date = dateStr;
  if(state.autoClose){
    // Auto-close mode: confirm immediately on date select
    updateDtTriggerText(triggerId);
    closeDtPopup();
    return;
  }
  const showTime = !!popup.querySelector('.rr-time-row');
  renderDtCalendar(popup, state, showTime);
}

function dtUpdateTime(){
  const popup = document.getElementById('rrDtPopup');
  if(!popup) return;
  const triggerId = popup.dataset.triggerId;
  const state = _dtPickers[triggerId];
  if(!state) return;
  const h = document.getElementById('rrDtHour')?.value;
  const m = document.getElementById('rrDtMin')?.value;
  const ap = document.getElementById('rrDtAmPm')?.value;
  if(h && m !== ''){
    let h24 = parseInt(h);
    if(ap === 'PM' && h24 !== 12) h24 += 12;
    if(ap === 'AM' && h24 === 12) h24 = 0;
    state.time = String(h24).padStart(2,'0') + ':' + m;
  } else {
    state.time = '';
  }
}

function dtConfirm(){
  const popup = document.getElementById('rrDtPopup');
  if(!popup) return;
  // If this is an inline date picker (from card display), use saveInlineDatePicker
  if(popup.dataset.inlineRecId){
    saveInlineDatePicker();
    return;
  }
  const triggerId = popup.dataset.triggerId;
  const state = _dtPickers[triggerId];
  if(!state) return;
  // Ensure time is captured from selects before closing
  if(popup.querySelector('.rr-time-row')) dtUpdateTime();
  updateDtTriggerText(triggerId);
  closeDtPopup();
}

function getDtValue(triggerId){
  const state = _dtPickers[triggerId];
  if(!state) return { date:'', time:'' };
  return { date: state.date || '', time: state.time || '' };
}

/* ===== INLINE DATE PICKER (for card display) ===== */
function openInlineDatePicker(e, recId, dateType){
  closeDtPopup();
  const r = records.find(x => x.id === recId);
  if(!r) return;

  // Check if editing is locked
  const _contactLocked = currentTier !== 'pro' && isPropertyAnalyzed && isPropertyAnalyzed(recId);
  if(_contactLocked){
    showToast('🔒 Contact & Status is locked on analyzed properties', 'info', 3000);
    return;
  }

  const isFollowUp = dateType === 'followUp';
  const triggerId = '_inline_' + dateType + '_' + recId;
  const existingDate = isFollowUp ? (r.followUpDate || '') : (r.meetingDate || '');
  const existingTime = isFollowUp ? (r.followUpTime || '') : (r.meetingTime || '');

  // Create picker state
  const now = new Date();
  let viewMonth = now.getMonth(), viewYear = now.getFullYear();
  if(existingDate){
    const [y,m] = existingDate.split('-').map(Number);
    viewMonth = m - 1; viewYear = y;
  }
  _dtPickers[triggerId] = { date: existingDate, time: existingTime, showTime: true, autoClose: false, viewMonth: viewMonth, viewYear: viewYear };

  // Create popup
  const popup = document.createElement('div');
  popup.className = 'rr-dt-popup visible';
  popup.id = 'rrDtPopup';
  popup.dataset.triggerId = triggerId;
  popup.dataset.inlineRecId = recId;
  popup.dataset.inlineDateType = dateType;
  document.body.appendChild(popup);

  // Position below the clicked element
  const target = e.currentTarget || e.target;
  const rect = target.getBoundingClientRect();
  popup.style.top = (rect.bottom + 4) + 'px';
  popup.style.left = rect.left + 'px';
  requestAnimationFrame(() => {
    const pr = popup.getBoundingClientRect();
    if(pr.right > window.innerWidth - 10) popup.style.left = (window.innerWidth - pr.width - 10) + 'px';
    if(pr.bottom > window.innerHeight - 10) popup.style.top = (rect.top - pr.height - 4) + 'px';
  });

  renderDtCalendar(popup, _dtPickers[triggerId], true);

  // Override Done button to save inline
  requestAnimationFrame(() => {
    const doneBtn = popup.querySelector('.rr-dt-done');
    if(doneBtn){
      doneBtn.onclick = function(){ saveInlineDatePicker(); };
    }
  });

  setTimeout(() => { document.addEventListener('click', _dtOutsideClick); }, 50);
}

function saveInlineDatePicker(){
  const popup = document.getElementById('rrDtPopup');
  if(!popup) return;
  const triggerId = popup.dataset.triggerId;
  const recId = popup.dataset.inlineRecId;
  const dateType = popup.dataset.inlineDateType;
  if(!recId || !dateType) { closeDtPopup(); return; }

  const r = records.find(x => x.id === recId);
  if(!r) { closeDtPopup(); return; }

  // Capture time from selects
  if(popup.querySelector('.rr-time-row')) dtUpdateTime();
  const state = _dtPickers[triggerId];
  if(!state) { closeDtPopup(); return; }

  const isFollowUp = dateType === 'followUp';
  const newDate = state.date || null;
  const newTime = state.time || null;

  if(newDate && !newTime){
    showToast('Please add a time for the ' + (isFollowUp ? 'follow-up.' : 'meeting.'), 'warning');
    return;
  }

  // Track old values for logging
  const oldDate = isFollowUp ? r.followUpDate : r.meetingDate;
  const oldTime = isFollowUp ? r.followUpTime : r.meetingTime;
  const oldMeetingDate = r.meetingDate;
  const oldMeetingTime = r.meetingTime;

  // Apply changes
  if(isFollowUp){
    r.followUpDate = newDate;
    r.followUpTime = newTime;
  } else {
    r.meetingDate = newDate;
    r.meetingTime = newTime;
  }

  // Activity log
  loadSettingsPrefs();
  if(isFollowUp && settingsPrefs.followUpChangeLog !== false){
    const oldStr = oldDate ? fmtDateTimeForCard(oldDate, oldTime) : 'Not set';
    const newStr = newDate ? fmtDateTimeForCard(newDate, newTime) : 'Cleared';
    if(oldDate !== newDate || oldTime !== newTime){
      r.notes = r.notes || [];
      r.notes.push({ id:uid(), text: newDate ? (oldDate ? oldStr + ' → ' + newStr : newStr) : 'Cleared' + (oldDate ? ' (was ' + oldStr + ')' : ''), date:new Date().toISOString(), type:'followup' });
    }
  }
  if(!isFollowUp && settingsPrefs.meetingChangeLog !== false){
    const oldStr = oldDate ? fmtDateTimeForCard(oldDate, oldTime) : 'Not set';
    const newStr = newDate ? fmtDateTimeForCard(newDate, newTime) : 'Cleared';
    if(oldDate !== newDate || oldTime !== newTime){
      r.notes = r.notes || [];
      r.notes.push({ id:uid(), text: newDate ? (oldDate ? oldStr + ' → ' + newStr : newStr) : 'Cleared' + (oldDate ? ' (was ' + oldStr + ')' : ''), date:new Date().toISOString(), type:'meeting' });
    }
  }

  // Meeting-specific: schedule notifications + send calendar invite
  if(!isFollowUp && r.meetingDate && (r.meetingDate !== oldMeetingDate || r.meetingTime !== oldMeetingTime)){
    requestNotificationPermission(function(granted){
      if(granted){
        scheduleMeetingNotifications(r);
        startNotificationLoop();
        showToast('Meeting reminders scheduled!', 'success');
      }
    });
    _sendMeetingCalendarInvite(r);
  }

  closeDtPopup();
  delete _dtPickers[triggerId];
  saveData();
  render();
}

function clearInlineDate(){
  const popup = document.getElementById('rrDtPopup');
  if(!popup) return;
  const triggerId = popup.dataset.triggerId;
  const recId = popup.dataset.inlineRecId;
  const dateType = popup.dataset.inlineDateType;
  if(!recId || !dateType) { closeDtPopup(); return; }
  const r = records.find(x => x.id === recId);
  if(!r) { closeDtPopup(); return; }

  const isFollowUp = dateType === 'followUp';
  const oldDate = isFollowUp ? r.followUpDate : r.meetingDate;
  const oldTime = isFollowUp ? r.followUpTime : r.meetingTime;
  const oldStr = oldDate ? fmtDateTimeForCard(oldDate, oldTime) : '';

  // Clear the date
  if(isFollowUp){
    r.followUpDate = null;
    r.followUpTime = null;
  } else {
    r.meetingDate = null;
    r.meetingTime = null;
  }

  // Activity log
  loadSettingsPrefs();
  if(oldDate){
    if(isFollowUp && settingsPrefs.followUpChangeLog !== false){
      r.notes = r.notes || [];
      r.notes.push({ id:uid(), text:'Cleared (was ' + oldStr + ')', date:new Date().toISOString(), type:'followup' });
    }
    if(!isFollowUp && settingsPrefs.meetingChangeLog !== false){
      r.notes = r.notes || [];
      r.notes.push({ id:uid(), text:'Cleared (was ' + oldStr + ')', date:new Date().toISOString(), type:'meeting' });
    }
  }

  closeDtPopup();
  if(triggerId) delete _dtPickers[triggerId];
  saveData();
  render();
}

/* ===== CARD EDIT POPUPS ===== */
function dismissAllOverlays(){
  ['cardEditOverlay','sectionEditOverlay','editNoteOverlay','noteImgPopup','propNoteEditorOverlay','multiEditorOverlay','deleteConfirmOverlay'].forEach(id => document.getElementById(id)?.remove());
  document.querySelectorAll('.stats-popup-overlay,.multi-editor-overlay,.card-edit-popup,.note-img-popup-overlay').forEach(el => el.remove());
}

function openCardEditor(recId, cardType){
  dismissAllOverlays();
  const r = records.find(x => x.id === recId);
  if(!r) return;
  // Block editing Contact & Status on analyzed properties (non-Pro)
  if(cardType === 'contact' && currentTier !== 'pro' && isPropertyAnalyzed(recId)){
    showToast('🔒 Contact & Status is locked on analyzed properties', 'info', 3000);
    return;
  }
  const d = r.propertyDetails || {};

  let title = '', fieldsHtml = '', saveHandler = '';

  if(cardType === 'contact'){
    title = 'Edit Contact & Status';
    // Parse existing unit into type + number
    const ceAddr = r.addressParts || parseAddressParts(r.property);
    let ceUnitType = '', ceUnitNum = '';
    if(ceAddr.unit){
      const ceUm = ceAddr.unit.match(/^(#|Unit|Ste|Suite|Apt|Apartment|Bldg|Building)\s*\.?\s*(.+)$/i);
      if(ceUm){ ceUnitType = ceUm[1].replace('.',''); ceUnitNum = ceUm[2]; }
      else { ceUnitNum = ceAddr.unit; }
    }
    const isAvailNow = d.availableDate === 'now';
    fieldsHtml = `
      <div class="prop-field" style="margin-bottom:6px;position:relative"><label>Address</label><input type="text" id="ce_address" value="${esc(ceAddr.street || r.property)}" placeholder="Start typing an address..." autocomplete="off"></div>
      <div class="prop-field-grid" style="margin-bottom:10px">
        <div class="prop-field"><label>Unit Type</label><select id="ce_unit_type" style="font-size:.9rem;padding:7px 10px;width:100%">
          <option value="">No unit</option>
          <option value="#" ${ceUnitType==='#'?'selected':''}>&#35;</option>
          <option value="Unit" ${ceUnitType==='Unit'?'selected':''}>Unit</option>
          <option value="Apt" ${ceUnitType==='Apt'?'selected':''}>Apt</option>
          <option value="Suite" ${ceUnitType==='Suite'?'selected':''}>Suite</option>
          <option value="Ste" ${ceUnitType==='Ste'?'selected':''}>Ste</option>
          <option value="Bldg" ${ceUnitType==='Bldg'?'selected':''}>Bldg</option>
        </select></div>
        <div class="prop-field"><label>Unit Number</label><input type="text" id="ce_unit_num" value="${esc(ceUnitNum)}" placeholder="${ceUnitType ? ceUnitType + ' number' : 'Unit number'}" style="${ceUnitType||ceUnitNum?'':'opacity:.5'}"></div>
        <div class="prop-field"><label>City</label><input type="text" id="ce_city" value="${esc(ceAddr.city||'')}" placeholder="City"></div>
        <div class="prop-field"><label>State</label><input type="text" id="ce_state" value="${esc(ceAddr.state||'')}" placeholder="AZ" maxlength="2" style="text-transform:uppercase"></div>
        <div class="prop-field"><label>ZIP Code</label><input type="text" id="ce_zip" value="${esc(ceAddr.zip||'')}" placeholder="85001" maxlength="10"></div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <div class="prop-field" style="flex:1;min-width:0"><label>Market</label><input type="text" id="ce_market" value="${esc(d.market||'')}" placeholder="Phoenix/Scottsdale" style="font-size:.82rem;padding:5px 6px"></div>
        <div class="prop-field" style="flex:1;min-width:0"><label>Submarket</label><input type="text" id="ce_submarket" value="${esc(d.submarket||'')}" placeholder="Tempe" style="font-size:.82rem;padding:5px 6px"></div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <div class="prop-field" style="flex:1;min-width:0"><label>Beds</label><input type="number" id="ce_beds" value="${esc(d.bedrooms||'')}" placeholder="3" min="0" step="1" style="font-size:.82rem;padding:5px 6px"></div>
        <div class="prop-field" style="flex:1;min-width:0"><label>Baths</label><input type="number" id="ce_baths" value="${esc(d.bathrooms||'')}" placeholder="2" min="0" step="0.5" style="font-size:.82rem;padding:5px 6px"></div>
        <div class="prop-field" style="flex:1;min-width:0"><label>Sq Ft</label><input type="number" id="ce_sqft" value="${esc(d.sqft||'')}" placeholder="1200" min="0" style="font-size:.82rem;padding:5px 6px"></div>
        <div class="prop-field" style="flex:1;min-width:0"><label>Rent</label><input type="number" id="ce_rent" value="${esc(d.monthlyRent||'')}" placeholder="2500" min="0" style="font-size:.82rem;padding:5px 6px"></div>
      </div>
      <div class="prop-field-grid" style="margin-bottom:10px">
        <div class="prop-field"><label>Available Date</label><div style="display:flex;align-items:center;gap:8px"><div class="rr-dt-trigger${isAvailNow?' rr-dt-disabled':''}" id="dt_available" style="flex:1${isAvailNow?';opacity:.4;pointer-events:none':''}"><span class="rr-dt-icon">${CALENDAR_ICON}</span><span class="rr-dt-text empty">--/--/----</span><span class="rr-dt-clear" title="Clear">${CLEAR_X_ICON}</span></div><label style="display:flex;align-items:center;gap:4px;font-size:.78rem;font-weight:400;text-transform:none;letter-spacing:0;color:var(--text2);cursor:pointer;white-space:nowrap"><input type="checkbox" id="ce_avail_now" ${isAvailNow?'checked':''} onchange="const t=document.getElementById('dt_available');if(this.checked){t.style.opacity='.4';t.style.pointerEvents='none';t.classList.add('rr-dt-disabled');const s=window._dtPickers&&window._dtPickers['dt_available'];if(s){s.date='';updateDtTriggerText('dt_available')}}else{t.style.opacity='1';t.style.pointerEvents='';t.classList.remove('rr-dt-disabled')}"> Now</label></div></div>
      </div>
      <div class="prop-field-grid">
        <div class="prop-field"><label>Contact Name</label><input type="text" id="ce_name" value="${esc(r.name)}"></div>
        <div class="prop-field"><label>Phone</label><input type="text" id="ce_phone" value="${esc(r.phone)}"></div>
        <div class="prop-field"><label>Email</label><input type="email" id="ce_email" value="${esc(r.email)}" oninput="validateEmailField()"><div class="ce-email-error" id="ce_email_error">Please enter a valid email address</div></div>
        <div class="prop-field"><label>Status</label><select id="ce_status">${SELECTABLE_STATUSES.map(s=>`<option value="${s}" ${r.status===s?'selected':''}>${s}</option>`).join('')}</select></div>
        <div class="prop-field"><label>Follow-Up Date</label><div class="rr-dt-trigger" id="dt_followup"><span class="rr-dt-icon">${CALENDAR_ICON}</span><span class="rr-dt-text empty">--/--/---- --:--</span><span class="rr-dt-clear" title="Clear">${CLEAR_X_ICON}</span></div></div>
        <div class="prop-field"><label>Meeting Date</label><div class="rr-dt-trigger" id="dt_meeting"><span class="rr-dt-icon">${CALENDAR_ICON}</span><span class="rr-dt-text empty">--/--/---- --:--</span><span class="rr-dt-clear" title="Clear">${CLEAR_X_ICON}</span></div></div>
        <div class="prop-field"><label>First Contacted</label><div class="rr-dt-trigger" id="dt_firstcontact"><span class="rr-dt-icon">${CALENDAR_ICON}</span><span class="rr-dt-text empty">--/--/---- --:--</span><span class="rr-dt-clear" title="Clear">${CLEAR_X_ICON}</span></div></div>
      </div>
      <div class="prop-field" style="margin-top:10px"><label>Listing Link</label><input type="url" id="ce_link" value="${esc(r.link)}"></div>`;
    saveHandler = 'saveContactCard';
  }

  const overlay = document.createElement('div');
  overlay.className = 'card-edit-popup';
  overlay.id = 'cardEditOverlay';
  overlay.innerHTML = `<div class="cep-panel">
    <div class="cep-header"><h3>${title}</h3><button class="modal-close" onclick="document.getElementById('cardEditOverlay').remove()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>
    <div class="cep-body">${fieldsHtml}</div>
    <div class="cep-actions">
      <div style="font-size:.65rem;color:var(--text3);margin-right:auto;align-self:center">Shift + Enter to save</div>
      <button class="btn btn-secondary btn-sm" onclick="document.getElementById('cardEditOverlay').remove()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="${saveHandler}('${recId}')">Save Changes</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);

  // Shift+Enter to save, Escape to cancel
  overlay.addEventListener('keydown', function(e){
    if(e.shiftKey && e.key === 'Enter'){ e.preventDefault(); window[saveHandler](recId); }
    if(e.key === 'Escape') overlay.remove();
  });

  setTimeout(() => {
    // Setup address autocomplete + unit interaction for contact card
    if(cardType === 'contact'){
      const ceAddrEl = document.getElementById('ce_address');
      if(ceAddrEl){
        window._selectedAddrParts = null;
        setupAddressAutocomplete(ceAddrEl, recId);
      }
      const ceUtSelect = document.getElementById('ce_unit_type');
      const ceUnInput = document.getElementById('ce_unit_num');
      if(ceUtSelect && ceUnInput){
        ceUtSelect.addEventListener('change', () => {
          ceUnInput.style.opacity = ceUtSelect.value ? '1' : '.5';
          ceUnInput.placeholder = ceUtSelect.value ? ceUtSelect.value + ' number' : 'Unit number';
          if(ceUtSelect.value) ceUnInput.focus();
        });
      }
      // Setup custom date/time pickers
      const rec = records.find(x => x.id === recId);
      setupDateTimePicker('dt_followup', { showTime:true, dateVal: rec?.followUpDate||'', timeVal: rec?.followUpTime||'' });
      setupDateTimePicker('dt_meeting', { showTime:true, dateVal: rec?.meetingDate||'', timeVal: rec?.meetingTime||'' });
      setupDateTimePicker('dt_firstcontact', { showTime:false, autoClose:true, dateVal: rec?.date ? rec.date.split('T')[0] : '', timeVal:'' });
      // Only feed the picker a strict YYYY-MM-DD. 'now' means available
      // immediately (render empty trigger), and anything else (a stray "May 1"
      // from older imports before date normalization shipped) is also treated
      // as empty so the user can pick a fresh date instead of seeing "undefined NaN".
      const _rawAvail = rec?.propertyDetails?.availableDate;
      const availDateVal = (typeof _rawAvail === 'string' && /^\d{4}-\d{1,2}-\d{1,2}$/.test(_rawAvail)) ? _rawAvail : '';
      setupDateTimePicker('dt_available', { showTime:false, autoClose:true, dateVal: availDateVal, timeVal:'' });
    }
    // Don't auto-focus any field — let the user click where they want
  }, 100);
}

function isValidEmail(email){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}
function validateEmailField(){
  const emailInput = document.getElementById('ce_email');
  const errorEl = document.getElementById('ce_email_error');
  if(!emailInput || !errorEl) return true;
  const val = emailInput.value.trim();
  const valid = !val || isValidEmail(val);
  errorEl.classList.toggle('visible', !valid);
  emailInput.style.borderColor = valid ? '' : 'var(--danger)';
  return valid;
}
function saveContactCard(recId){
  const r = records.find(x => x.id === recId);
  if(!r) return;
  if(!validateEmailField()) return;
  const oldStatus = r.status;

  // Build address from parts
  const streetInput = document.getElementById('ce_address')?.value?.trim() || '';
  const utVal = document.getElementById('ce_unit_type')?.value || '';
  const unVal = document.getElementById('ce_unit_num')?.value?.trim() || '';
  const unit = (utVal && unVal) ? utVal + ' ' + unVal : '';
  const cityVal = document.getElementById('ce_city')?.value?.trim() || '';
  const stateVal = document.getElementById('ce_state')?.value?.trim().toUpperCase() || '';
  const zipVal = document.getElementById('ce_zip')?.value?.trim() || '';

  const selected = window._selectedAddrParts || {};
  const addrParts = {
    street: selected.street || streetInput,
    unit: unit,
    city: cityVal || selected.city || '',
    state: stateVal || selected.state || '',
    zip: zipVal || selected.zip || '',
  };
  const newAddr = formatAddressOneLine(addrParts);
  if(newAddr !== r.property || JSON.stringify(addrParts) !== JSON.stringify(r.addressParts)){
    r.property = newAddr;
    r.addressParts = addrParts;
  }
  window._selectedAddrParts = null;

  // Save property details (beds, baths, sqft, rent, available)
  if(!r.propertyDetails) r.propertyDetails = {};
  const ceBeds = document.getElementById('ce_beds')?.value?.trim();
  const ceBaths = document.getElementById('ce_baths')?.value?.trim();
  const ceSqft = document.getElementById('ce_sqft')?.value?.trim();
  const ceRent = document.getElementById('ce_rent')?.value?.trim();
  const ceAvailNow = document.getElementById('ce_avail_now')?.checked;
  const ceAvailVal = getDtValue('dt_available');
  const ceAvailDate = ceAvailVal.date || '';
  if(ceBeds !== undefined) r.propertyDetails.bedrooms = ceBeds;
  if(ceBaths !== undefined) r.propertyDetails.bathrooms = ceBaths;
  if(ceSqft !== undefined) r.propertyDetails.sqft = ceSqft;
  if(ceRent !== undefined){ logRentChange(r, ceRent); r.propertyDetails.monthlyRent = ceRent; }
  r.propertyDetails.market = document.getElementById('ce_market')?.value?.trim() || '';
  r.propertyDetails.submarket = document.getElementById('ce_submarket')?.value?.trim() || '';
  r.propertyDetails.availableDate = ceAvailNow ? 'now' : ceAvailDate;

  r.name = document.getElementById('ce_name')?.value?.trim() || '';
  r.phone = document.getElementById('ce_phone')?.value?.trim() || '';
  r.email = document.getElementById('ce_email')?.value?.trim() || '';
  r.status = document.getElementById('ce_status')?.value || r.status;
  const oldFollowUpDate = r.followUpDate;
  const oldFollowUpTime = r.followUpTime;
  const fuVal = getDtValue('dt_followup');
  // Require time if follow-up date is set
  if(fuVal.date && !fuVal.time){
    showToast('Please add a time for the follow-up.', 'warning');
    return;
  }
  r.followUpDate = fuVal.date || null;
  r.followUpTime = fuVal.time || null;
  const mtVal = getDtValue('dt_meeting');
  // Require time if meeting date is set
  if(mtVal.date && !mtVal.time){
    showToast('Please add a time for the meeting.', 'warning');
    return;
  }
  const oldMeetingDate = r.meetingDate;
  const oldMeetingTime = r.meetingTime;
  r.meetingDate = mtVal.date || null;
  r.meetingTime = mtVal.time || null;
  const fcVal = getDtValue('dt_firstcontact');
  r.date = fcVal.date || r.date;
  const newLink = document.getElementById('ce_link')?.value?.trim() || '';
  if(newLink !== r.link){ r.link = newLink }
  if(r.status !== oldStatus){
    r.notes.push({ id:uid(), text:`${oldStatus} → ${r.status}`, date:new Date().toISOString(), type:'status' });
  }
  // Log follow-up changes
  loadSettingsPrefs();
  if(settingsPrefs.followUpChangeLog !== false && (r.followUpDate !== oldFollowUpDate || r.followUpTime !== oldFollowUpTime)){
    const oldStr = oldFollowUpDate ? fmtDateTimeForCard(oldFollowUpDate, oldFollowUpTime) : 'Not set';
    const newStr = r.followUpDate ? fmtDateTimeForCard(r.followUpDate, r.followUpTime) : 'Cleared';
    r.notes.push({ id:uid(), text: r.followUpDate ? (oldFollowUpDate ? oldStr + ' → ' + newStr : newStr) : 'Cleared' + (oldFollowUpDate ? ' (was ' + oldStr + ')' : ''), date:new Date().toISOString(), type:'followup' });
  }
  // Log meeting changes
  if(settingsPrefs.meetingChangeLog !== false && (r.meetingDate !== oldMeetingDate || r.meetingTime !== oldMeetingTime)){
    const oldStr = oldMeetingDate ? fmtDateTimeForCard(oldMeetingDate, oldMeetingTime) : 'Not set';
    const newStr = r.meetingDate ? fmtDateTimeForCard(r.meetingDate, r.meetingTime) : 'Cleared';
    r.notes.push({ id:uid(), text: r.meetingDate ? (oldMeetingDate ? oldStr + ' → ' + newStr : newStr) : 'Cleared' + (oldMeetingDate ? ' (was ' + oldStr + ')' : ''), date:new Date().toISOString(), type:'meeting' });
  }

  // Save geolocation if captured from autocomplete
  if(window._selectedGeoLocation){
    r.propertyDetails.latitude = window._selectedGeoLocation.lat;
    r.propertyDetails.longitude = window._selectedGeoLocation.lng;
    window._selectedGeoLocation = null;
  }

  saveData();
  // Schedule meeting notifications if meeting date was set or changed
  if(r.meetingDate && (r.meetingDate !== oldMeetingDate || r.meetingTime !== oldMeetingTime)){
    requestNotificationPermission(function(granted){
      if(granted){
        scheduleMeetingNotifications(r);
        startNotificationLoop();
        showToast('Meeting reminders scheduled!', 'success');
      }
    });
    // Send calendar invite email via Cloud Function
    _sendMeetingCalendarInvite(r);
  }
  document.getElementById('cardEditOverlay')?.remove();
  render();
}

/* ===== INLINE STATUS DROPDOWN ===== */
let _inlineStatusDDEl = null;

function closeInlineStatusDD(){
  if(_inlineStatusDDEl){
    _inlineStatusDDEl.remove();
    _inlineStatusDDEl = null;
  }
}

function toggleInlineStatus(e, recId){
  e.stopPropagation();
  // If already open, close it
  if(_inlineStatusDDEl){
    closeInlineStatusDD();
    return;
  }
  const r = records.find(x => x.id === recId);
  if(!r) return;
  // Create dropdown and append to body (escapes all stacking contexts)
  const dd = document.createElement('div');
  dd.className = 'inline-status-dd open';
  dd.id = 'inlineStatusDD';
  dd.innerHTML = SELECTABLE_STATUSES.map(s =>
    `<div class="isd-item ${r.status===s?'current':''}" data-status="${s}">${statusPill(s)}</div>`
  ).join('');
  document.body.appendChild(dd);
  _inlineStatusDDEl = dd;
  // Position below the trigger
  const trigger = e.currentTarget;
  const rect = trigger.getBoundingClientRect();
  dd.style.top = (rect.bottom + 4) + 'px';
  dd.style.left = rect.left + 'px';
  // If it goes off-screen bottom, allow scrolling within dropdown rather than flipping up
  requestAnimationFrame(() => {
    const ddRect = dd.getBoundingClientRect();
    if(ddRect.bottom > window.innerHeight - 10){
      dd.style.maxHeight = (window.innerHeight - rect.bottom - 14) + 'px';
    }
  });
  // Click handler for items
  dd.addEventListener('click', function(ev){
    ev.stopPropagation();
    const item = ev.target.closest('.isd-item');
    if(!item) return;
    const newStatus = item.dataset.status;
    setInlineStatus(recId, newStatus);
  });
}

function setInlineStatus(recId, newStatus){
  const r = records.find(x => x.id === recId);
  if(!r) return;
  const oldStatus = r.status;
  closeInlineStatusDD();
  if(oldStatus === newStatus) return;
  r.status = newStatus;
  r.notes.push({ id:uid(), text:`${oldStatus} → ${newStatus}`, date:new Date().toISOString(), type:'status' });
  saveData();
  render();
}

// Close inline status dropdown on outside click
document.addEventListener('click', function(e){
  if(_inlineStatusDDEl && !e.target.closest('.inline-status') && !e.target.closest('#inlineStatusDD')){
    closeInlineStatusDD();
  }
});
// Close on scroll so fixed dropdown doesn't drift from trigger
window.addEventListener('scroll', function(e){ if(_inlineStatusDDEl && !_inlineStatusDDEl.contains(e.target)) closeInlineStatusDD(); }, true);

/* ===== COPY FIELD VALUE ===== */
const COPY_ICON = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';
const CHECK_ICON = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>';

function copyRecordField(btn, recId, field){
  const r = records.find(x => x.id === recId);
  if(!r) return;
  const value = r[field] || '';
  if(!value) return;
  navigator.clipboard.writeText(value).then(() => {
    btn.classList.add('copied');
    const origTitle = btn.title;
    btn.title = 'Copied!';
    btn.innerHTML = CHECK_ICON;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.title = origTitle;
      btn.innerHTML = COPY_ICON;
    }, 1500);
  });
}

function editHeroMarket(el, recId){
  const r = records.find(x => x.id === recId);
  if(!r) return;
  if(!r.propertyDetails) r.propertyDetails = {};
  const parent = el.parentElement;
  const wrap = document.createElement('div');
  wrap.className = 'hero-market-edit-wrap';
  const svg = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity:.5;flex-shrink:0"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>';
  wrap.innerHTML = svg;
  const mInput = document.createElement('input');
  mInput.type = 'text';
  mInput.value = r.propertyDetails.market || '';
  mInput.placeholder = 'Market';
  mInput.style.cssText = 'width:110px;padding:2px 6px;border:1px solid var(--border);border-radius:4px;font-size:.78rem;background:var(--bg);color:var(--text);outline:none';
  const arrow = document.createElement('span');
  arrow.style.cssText = 'opacity:.4;font-size:.8rem';
  arrow.textContent = '›';
  const sInput = document.createElement('input');
  sInput.type = 'text';
  sInput.value = r.propertyDetails.submarket || '';
  sInput.placeholder = 'Submarket';
  sInput.style.cssText = 'width:100px;padding:2px 6px;border:1px solid var(--border);border-radius:4px;font-size:.78rem;background:var(--bg);color:var(--text);outline:none';
  wrap.appendChild(mInput);
  wrap.appendChild(arrow);
  wrap.appendChild(sInput);
  el.style.display = 'none';
  parent.appendChild(wrap);
  mInput.focus();
  mInput.select();

  let saved = false;
  function save(){
    if(saved) return;
    saved = true;
    r.propertyDetails.market = mInput.value.trim();
    r.propertyDetails.submarket = sInput.value.trim();
    saveData();
    render();
  }
  function onBlur(e){
    setTimeout(() => {
      if(!wrap.contains(document.activeElement)){
        save();
      }
    }, 100);
  }
  mInput.addEventListener('blur', onBlur);
  sInput.addEventListener('blur', onBlur);
  mInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){ e.preventDefault(); sInput.focus(); sInput.select(); }
    if(e.key === 'Escape'){ saved = true; render(); }
    if(e.key === 'Tab' && !e.shiftKey){ e.preventDefault(); sInput.focus(); sInput.select(); }
  });
  sInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){ e.preventDefault(); save(); }
    if(e.key === 'Escape'){ saved = true; render(); }
    if(e.key === 'Tab' && e.shiftKey){ e.preventDefault(); mInput.focus(); mInput.select(); }
  });
}

// ── Rent History Tracking ──
function logRentChange(r, newRent){
  if(!r.propertyDetails) r.propertyDetails = {};
  if(!r.propertyDetails.rentHistory) r.propertyDetails.rentHistory = [];
  const history = r.propertyDetails.rentHistory;
  const amt = parseFloat(newRent) || 0;
  const today = new Date().toISOString().split('T')[0];
  // Don't log if same amount as last entry
  if(history.length > 0 && history[history.length - 1].amount === amt) return;
  // If last entry was today, update it instead of adding duplicate
  if(history.length > 0 && history[history.length - 1].date === today){
    history[history.length - 1].amount = amt;
  } else {
    history.push({ date: today, amount: amt });
  }
  // Keep max 50 entries
  if(history.length > 50) r.propertyDetails.rentHistory = history.slice(-50);
}

function openRentHistoryPopup(recId){
  const r = records.find(x => x.id === recId);
  if(!r) return;
  if(!r.propertyDetails) r.propertyDetails = {};
  const history = r.propertyDetails.rentHistory || [];
  const currentRent = parseFloat(r.propertyDetails.monthlyRent) || 0;

  const existing = document.getElementById('rentHistoryOverlay');
  if(existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.className = 'multi-editor-overlay';
  overlay.id = 'rentHistoryOverlay';

  let html = '<div class="multi-editor" style="max-width:500px"><div class="multi-editor-header"><h3>Monthly Rent — ' + (currentRent ? '$'+currentRent.toLocaleString()+'/mo' : 'Not Set') + '</h3><button class="modal-close" onclick="document.getElementById(\'rentHistoryOverlay\').remove()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>';
  html += '<div class="multi-editor-body" style="padding:20px">';

  // SVG Chart: Amount (Y) vs Date (X)
  if(history.length >= 2){
    const amounts = history.map(h => h.amount);
    const dates = history.map(h => h.date);
    const minA = Math.min(...amounts);
    const maxA = Math.max(...amounts);
    const range = maxA - minA || 100;
    const padRange = range * 0.1;
    const yMin = Math.max(0, minA - padRange);
    const yMax = maxA + padRange;
    const ySpan = yMax - yMin || 1;
    const svgW = 440, svgH = 160, padL = 52, padR = 12, padT = 12, padB = 32;
    const cw = svgW - padL - padR, ch = svgH - padT - padB;

    html += '<svg viewBox="0 0 '+svgW+' '+svgH+'" style="width:100%;display:block;margin-bottom:12px">';
    // Grid lines
    for(let g = 0; g <= 4; g++){
      const gy = padT + (g / 4) * ch;
      const yVal = yMax - (g / 4) * ySpan;
      html += '<line x1="'+padL+'" y1="'+gy.toFixed(1)+'" x2="'+(svgW-padR)+'" y2="'+gy.toFixed(1)+'" stroke="rgba(148,163,184,.1)" stroke-width="1"/>';
      html += '<text x="'+(padL-6)+'" y="'+(gy+3).toFixed(1)+'" text-anchor="end" fill="var(--text3)" font-size="8" font-weight="500">$'+Math.round(yVal).toLocaleString()+'</text>';
    }
    // Line + points
    const pts = history.map((h, i) => {
      const x = padL + (i / (history.length - 1)) * cw;
      const y = padT + ch - ((h.amount - yMin) / ySpan) * ch;
      return { x, y, amount: h.amount, date: h.date };
    });
    // Area fill
    let areaPath = 'M'+pts[0].x.toFixed(1)+','+(padT+ch);
    pts.forEach(p => { areaPath += ' L'+p.x.toFixed(1)+','+p.y.toFixed(1); });
    areaPath += ' L'+pts[pts.length-1].x.toFixed(1)+','+(padT+ch)+' Z';
    html += '<path d="'+areaPath+'" fill="rgba(16,185,129,.08)"/>';
    // Line segments
    for(let i = 0; i < pts.length - 1; i++){
      const segColor = pts[i+1].amount <= pts[i].amount ? '#10b981' : '#ef4444';
      html += '<line x1="'+pts[i].x.toFixed(1)+'" y1="'+pts[i].y.toFixed(1)+'" x2="'+pts[i+1].x.toFixed(1)+'" y2="'+pts[i+1].y.toFixed(1)+'" stroke="'+segColor+'" stroke-width="2.5" stroke-linecap="round"/>';
    }
    // Data points + labels
    pts.forEach((p, i) => {
      const dotColor = i > 0 && p.amount < pts[i-1].amount ? '#10b981' : i > 0 && p.amount > pts[i-1].amount ? '#ef4444' : 'var(--primary)';
      html += '<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="4" fill="'+dotColor+'" stroke="var(--surface)" stroke-width="2"/>';
      // Amount label above dot
      html += '<text x="'+p.x.toFixed(1)+'" y="'+(p.y - 8).toFixed(1)+'" text-anchor="middle" fill="var(--text)" font-size="7.5" font-weight="700">$'+p.amount.toLocaleString()+'</text>';
    });
    // X-axis date labels (show first, last, and some middle ones)
    const labelIndices = history.length <= 5 ? pts.map((_,i) => i) : [0, Math.floor(pts.length/2), pts.length-1];
    labelIndices.forEach(i => {
      const p = pts[i];
      const d = new Date(p.date + 'T00:00:00');
      const label = (d.getMonth()+1)+'/'+d.getDate();
      html += '<text x="'+p.x.toFixed(1)+'" y="'+(svgH-8)+'" text-anchor="middle" fill="var(--text3)" font-size="7.5" font-weight="500">'+label+'</text>';
    });
    // Y-axis label
    html += '<text x="8" y="'+(padT+ch/2)+'" text-anchor="middle" fill="var(--text3)" font-size="7.5" font-weight="600" transform="rotate(-90,8,'+(padT+ch/2)+')">Monthly Rent</text>';
    html += '</svg>';
  } else if(history.length === 1){
    html += '<div style="text-align:center;padding:20px 0;color:var(--text3);font-size:.82rem">One rent entry recorded on '+fmtDate(history[0].date)+': $'+history[0].amount.toLocaleString()+'/mo<br><span style="font-size:.72rem">The chart will appear after additional changes are recorded.</span></div>';
  } else {
    html += '<div style="text-align:center;padding:20px 0;color:var(--text3);font-size:.82rem">No rent history recorded yet.<br><span style="font-size:.72rem">Changes to the monthly rent will be tracked here going forward.</span></div>';
  }

  // Buttons — matched heights
  html += '<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">';
  html += '<button class="btn btn-secondary" style="padding:10px 20px" onclick="document.getElementById(\'rentHistoryOverlay\').remove()">OK</button>';
  html += '<button class="btn btn-primary" style="padding:10px 20px" onclick="confirmRentChange(\''+recId+'\')">Change Monthly Rent</button>';
  html += '</div>';

  html += '</div></div>';
  overlay.innerHTML = html;
  document.body.appendChild(overlay);
}

function copyAddress(btn, recId){

  let text = addr.street || r.property || '';

  let csz = '';
  if(addr.city) csz += addr.city + ',';
  if(addr.state) csz += ' ' + addr.state;
  if(addr.zip) csz += ' ' + addr.zip;
  if(csz.trim()) text += '\n' + csz.trim();

  });

/* ===== MEETING NOTIFICATION SYSTEM ===== */
const DEFAULT_MEETING_REMINDERS = [
  { label:'1 day', minutes: 1440 },
  { label:'3 hours', minutes: 180 },
  { label:'1 hour', minutes: 60 }
];

function getMeetingReminderSettings(){
  loadSettingsPrefs();
  if(Array.isArray(settingsPrefs.meetingReminders) && settingsPrefs.meetingReminders.length > 0){
    return settingsPrefs.meetingReminders;
  }
  return DEFAULT_MEETING_REMINDERS.map(r => ({ ...r }));
}

function _notifKey(recId, minutesBefore){
  return 'rr_notif_' + recId + '_' + minutesBefore;
}

function scheduleMeetingNotifications(r){
  if(!r || !r.meetingDate) return;
  const meetingISO = r.meetingDate + 'T' + (r.meetingTime || '12:00');
  const meetingMs = new Date(meetingISO).getTime();
  if(isNaN(meetingMs)) return;
  const reminders = getMeetingReminderSettings();
  // Clear any previously fired flags for this record so rescheduled meetings re-fire
  reminders.forEach(rem => {
    localStorage.removeItem(_notifKey(r.id, rem.minutes));
  });
}

function checkMeetingNotifications(){
  if(!('Notification' in window)) return;
  if(Notification.permission !== 'granted') return;
  const now = Date.now();
  const reminders = getMeetingReminderSettings();
  records.forEach(r => {
    if(!r.meetingDate) return;
    const meetingISO = r.meetingDate + 'T' + (r.meetingTime || '12:00');
    const meetingMs = new Date(meetingISO).getTime();
    if(isNaN(meetingMs)) return;
    reminders.forEach(rem => {
      const fireAt = meetingMs - (rem.minutes * 60000);
      const key = _notifKey(r.id, rem.minutes);
      if(now >= fireAt && now < meetingMs && !localStorage.getItem(key)){
        localStorage.setItem(key, '1');
        const addr = r.property || 'Unknown property';
        const timeStr = r.meetingTime ? fmtDateTimeForCard(r.meetingDate, r.meetingTime) : fmtDate(r.meetingDate);
        try {
          new Notification('Meeting in ' + rem.label, {
            body: addr + '\n' + timeStr,
            icon: 'https://app.rentingradar.com/favicon.ico',
            tag: key
          });
        } catch(e){}
        showToast('📅 Meeting in ' + rem.label + ': ' + addr, 'info', 6000, { recordId: r.id });
      }
    });
  });
}

function requestNotificationPermission(callback){
  if(!('Notification' in window)){
    showToast('Browser notifications are not supported.', 'warning');
    if(callback) callback(false);
    return;
  }
  if(Notification.permission === 'granted'){
    if(callback) callback(true);
    return;
  }
  if(Notification.permission === 'denied'){
    showToast('Notifications are blocked. Please enable them in your browser settings.', 'warning', 6000);
    if(callback) callback(false);
    return;
  }
  Notification.requestPermission().then(perm => {
    if(perm === 'granted'){
      showToast('Notifications enabled!', 'success');
      if(callback) callback(true);
    } else {
      showToast('Notification permission was not granted.', 'warning');
      if(callback) callback(false);
    }
  });
}

// Start the notification check loop (every 30 seconds)
let _notifInterval = null;
function startNotificationLoop(){
  if(_notifInterval) return;
  checkMeetingNotifications();
  _notifInterval = setInterval(checkMeetingNotifications, 30000);
}

function getTimezoneOptions(selected){

    'America/Phoenix','America/Indiana/Indianapolis','America/Detroit','America/Kentucky/Louisville',

    'Europe/London','Europe/Dublin','Europe/Paris','Europe/Berlin','Europe/Madrid','Europe/Rome','Europe/Amsterdam',
    'Europe/Brussels','Europe/Zurich','Europe/Vienna','Europe/Stockholm','Europe/Oslo','Europe/Helsinki',
    'Europe/Warsaw','Europe/Prague','Europe/Budapest','Europe/Bucharest','Europe/Athens','Europe/Istanbul',
    'Europe/Moscow','Europe/Kiev',
    'Asia/Dubai','Asia/Karachi','Asia/Kolkata','Asia/Dhaka','Asia/Bangkok','Asia/Singapore','Asia/Hong_Kong',
    'Asia/Shanghai','Asia/Tokyo','Asia/Seoul','Asia/Taipei','Asia/Manila','Asia/Jakarta',
    'Australia/Sydney','Australia/Melbourne','Australia/Brisbane','Australia/Perth','Australia/Adelaide',
    'Pacific/Auckland','Pacific/Fiji',
    'Africa/Cairo','Africa/Lagos','Africa/Johannesburg','Africa/Nairobi'
  ];
  var sel = selected || Intl.DateTimeFormat().resolvedOptions().timeZone || 'America/New_York';
  if(tzList.indexOf(sel) === -1) tzList.unshift(sel);
  return tzList.map(function(tz){

function saveClaudeApiKey(){
  var input = document.getElementById('settingsClaudeKey');
  var key = (input && input.value || '').trim();
  if(!key){ showToast('Please enter an API key','warning'); return; }
  if(!key.startsWith('sk-ant-')){ showToast('Invalid key format — should start with sk-ant-','warning'); return; }
  var extId = typeof RR_EXTENSION_ID !== 'undefined' ? RR_EXTENSION_ID : null;
  if(!extId){ showToast('Chrome extension not detected. Install the RentingRadar extension first.','warning'); return; }
  chrome.runtime.sendMessage(extId, { type:'SET_API_KEY', key: key }, function(resp){
    if(chrome.runtime.lastError || !resp || !resp.ok){
      showToast('Failed to save API key — extension error','error');
      return;
    }
    input.value = '';
    input.placeholder = '••••' + key.slice(-4) + ' (saved)';
    showToast('Claude API key saved successfully','success');
    checkAiEngineStatus();
  });
}

function checkAiEngineStatus(){
  var statusEl = document.getElementById('aiEngineStatus');
  if(!statusEl) return;
  statusEl.textContent = 'Checking...';
  var extId = typeof RR_EXTENSION_ID !== 'undefined' ? RR_EXTENSION_ID : null;
  if(!extId){
    statusEl.innerHTML = '<span style="color:var(--warning)">Extension not detected</span>';
    return;
  }
  chrome.runtime.sendMessage(extId, { type:'HEALTH' }, function(resp){
    if(chrome.runtime.lastError || !resp){
      statusEl.innerHTML = '<span style="color:var(--danger)">Cannot reach extension</span>';
      return;
    }
    var parts = [];
    if(resp.claude && resp.claude.configured){
      parts.push('<span style="color:var(--success)">✓ Claude API configured</span> (' + resp.claude.model + ')');
    } else {
      parts.push('<span style="color:var(--text3)">Claude API: not configured</span>');
    }
    if(resp.ollama && resp.ollama.running){
      parts.push('<span style="color:var(--success)">✓ Ollama running</span>' + (resp.ollama.modelInstalled ? ' (' + resp.ollama.model + ')' : ' <span style="color:var(--warning)">(model not installed)</span>'));
    } else {
      parts.push('<span style="color:var(--text3)">Ollama: not running</span>');
    }
    statusEl.innerHTML = parts.join(' · ');
  });
  // Also load the masked key display
  chrome.runtime.sendMessage(extId, { type:'GET_API_KEY' }, function(resp){
    if(resp && resp.ok && resp.key){
      var input = document.getElementById('settingsClaudeKey');
      if(input && !input.value) input.placeholder = resp.key + ' (saved)';
    }
  });
}

// EMAIL PREFERENCES (synced with Firebase Cloud Functions)
// ============================================================
var _emailPrefs = { marketingEmails: true, productEmails: true, weeklyDigest: true };
var _emailPrefsLoaded = false;

function loadEmailPrefs(){
  // Load cached version first for instant UI
  try { _emailPrefs = JSON.parse(localStorage.getItem('rr_email_prefs') || '{}') } catch(e){ _emailPrefs = {} }
  if(_emailPrefs.marketingEmails === undefined) _emailPrefs.marketingEmails = true;
  if(_emailPrefs.productEmails === undefined) _emailPrefs.productEmails = true;
  if(_emailPrefs.weeklyDigest === undefined) _emailPrefs.weeklyDigest = true;

  // Then fetch from server if signed in
  var user = firebase.auth().currentUser;
  if(!user || _emailPrefsLoaded) return;

  user.getIdToken().then(function(token){
    return fetch('/api/emailPreferences', {
      method: 'GET',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }
    });
  }).then(function(resp){ return resp.json() }).then(function(data){
    if(data.result && data.result.data){
      _emailPrefs = data.result.data;
      _emailPrefsLoaded = true;
      try { localStorage.setItem('rr_email_prefs', JSON.stringify(_emailPrefs)) } catch(e){}
      // Update toggle states if settings page is visible
      var elP = document.getElementById('epToggleProduct');
      var elM = document.getElementById('epToggleMarketing');
      var elD = document.getElementById('epToggleDigest');
      if(elP) elP.classList.toggle('on', _emailPrefs.productEmails !== false);
      if(elM) elM.classList.toggle('on', _emailPrefs.marketingEmails !== false);
      if(elD) elD.classList.toggle('on', _emailPrefs.weeklyDigest !== false);
    }
  }).catch(function(err){ console.warn('Could not load email prefs:', err) });
}

function toggleEmailPref(key, el){
  _emailPrefs[key] = !_emailPrefs[key];
  el.classList.toggle('on', _emailPrefs[key]);
  try { localStorage.setItem('rr_email_prefs', JSON.stringify(_emailPrefs)) } catch(e){}

  // Sync to server
  var user = firebase.auth().currentUser;
  if(!user) return;
  user.getIdToken().then(function(token){
    return fetch('/api/emailPreferences', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ data: _emailPrefs })
    });
  }).then(function(resp){ return resp.json() }).then(function(data){
    console.log('Email prefs saved:', data);
  }).catch(function(err){ console.warn('Could not save email prefs:', err) });
}

const FORMSPREE_ID = 'xpqygwvo';

async function submitHelpRequest(){
  const name = document.getElementById('help_name')?.value?.trim() || '';
  const email = document.getElementById('help_email')?.value?.trim() || '';
  const category = document.getElementById('help_category')?.value || 'question';
  const subject = document.getElementById('help_subject')?.value?.trim() || '';
  const details = document.getElementById('help_details')?.value?.trim() || '';
  if(!subject){ showAppAlert('Please enter a subject.', {title: 'Validation', icon: '⚠️'}); return; }
  if(!details){ showAppAlert('Please provide some details.', {title: 'Validation', icon: '⚠️'}); return; }

  const submitBtn = document.querySelector('#helpFeature .btn-primary');
  const msg = document.getElementById('helpSubmitMsg');
  if(submitBtn){ submitBtn.disabled = true; submitBtn.textContent = 'Submitting...'; }

  try {
    const resp = await fetch('https://formspree.io/f/' + FORMSPREE_ID, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({
        name: name,
        _replyto: email,
        category: category,
        _subject: '[' + category.charAt(0).toUpperCase() + category.slice(1) + '] ' + subject,
        message: details,
        tier: currentTier || 'free'
      })
    });
    if(resp.ok){
      document.getElementById('help_subject').value = '';
      document.getElementById('help_details').value = '';
      if(msg){ msg.style.display = 'inline'; msg.textContent = '✓ Submitted — thank you!'; msg.style.color = 'var(--success)'; setTimeout(() => msg.style.display = 'none', 5000); }
    } else {
      const data = await resp.json().catch(() => ({}));
      if(msg){ msg.style.display = 'inline'; msg.textContent = '⚠ Submission failed — please try again.'; msg.style.color = 'var(--danger)'; setTimeout(() => msg.style.display = 'none', 5000); }
      console.error('Formspree error:', data);
    }
  } catch(e){
    console.error('Help submit error:', e);
    if(msg){ msg.style.display = 'inline'; msg.textContent = '⚠ Network error — please try again.'; msg.style.color = 'var(--danger)'; setTimeout(() => msg.style.display = 'none', 5000); }
  }
  if(submitBtn){ submitBtn.disabled = false; submitBtn.textContent = 'Submit'; }
}

async function submitAskExpert(){
  const name = document.getElementById('ae_name')?.value?.trim() || '';
  const email = document.getElementById('ae_email')?.value?.trim() || '';
  const topic = document.getElementById('ae_topic')?.value || 'other';
  const market = document.getElementById('ae_market')?.value?.trim() || '';
  const details = document.getElementById('ae_details')?.value?.trim() || '';
  if(!email){ showAppAlert('Please enter your email so our expert can reach you.', {title: 'Validation', icon: '⚠️'}); return; }
  if(!details){ showAppAlert('Please describe what you need help with.', {title: 'Validation', icon: '⚠️'}); return; }

  const submitBtn = document.querySelector('#contentArea .btn-primary');
  const msg = document.getElementById('aeSubmitMsg');
  if(submitBtn){ submitBtn.disabled = true; submitBtn.textContent = 'Submitting...'; }

  try {
    const resp = await fetch('https://formspree.io/f/' + FORMSPREE_ID, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({
        name: name,
        _replyto: email,
        category: 'expert-consultation',
        _subject: '[Expert Request] ' + topic.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase()) + (market ? ' — ' + market : ''),
        message: details,
        topic: topic,
        market: market,
        tier: currentTier || 'free',
        source: 'ask-an-expert'
      })
    });
    if(resp.ok){
      document.getElementById('ae_details').value = '';
      document.getElementById('ae_market').value = '';
      if(msg){ msg.style.display = 'inline'; msg.textContent = '✓ Request submitted — we\'ll be in touch soon!'; msg.style.color = 'var(--success)'; setTimeout(() => msg.style.display = 'none', 7000); }
    } else {
      if(msg){ msg.style.display = 'inline'; msg.textContent = '⚠ Submission failed — please try again.'; msg.style.color = 'var(--danger)'; setTimeout(() => msg.style.display = 'none', 5000); }
    }
  } catch(e){
    console.error('Ask expert submit error:', e);
    if(msg){ msg.style.display = 'inline'; msg.textContent = '⚠ Network error — please try again.'; msg.style.color = 'var(--danger)'; setTimeout(() => msg.style.display = 'none', 5000); }
  }
  if(submitBtn){ submitBtn.disabled = false; submitBtn.textContent = 'Request Consultation'; }
}

function _epPhotoSelected(input){
  const file = input.files && input.files[0];
  if(!file) return;
  const msg = document.getElementById('epPhotoMsg');
  // Validate: max 5MB, image only
  if(!file.type.startsWith('image/')){
    if(msg){ msg.style.display='block'; msg.style.color='var(--danger)'; msg.textContent='Please select an image file.'; }
    return;
  }
  if(file.size > 5*1024*1024){
    if(msg){ msg.style.display='block'; msg.style.color='var(--danger)'; msg.textContent='Image must be under 5MB.'; }
    return;
  }
  if(msg) msg.style.display='none';
  // Show preview

  reader.onload = function(e){
    const preview = document.getElementById('epPhotoPreview');
    if(preview) preview.innerHTML = '<img src="'+e.target.result+'" alt=""><div class="ep-photo-overlay"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg></div>';
    const removeBtn = document.getElementById('epRemoveBtn');
    if(removeBtn) removeBtn.style.display = '';
    window._epPendingPhoto = { file: file, dataUrl: e.target.result };
  };
  reader.readAsDataURL(file);
}

async function saveEditProfile(){
  const name = document.getElementById('ep_name')?.value?.trim();
  const saveBtn = document.getElementById('epSaveBtn');
  const msg = document.getElementById('epPhotoMsg');
  if(!name){
    if(msg){ msg.style.display='block'; msg.style.color='var(--danger)'; msg.textContent='Name is required.'; }
    return;
  }
  if(saveBtn){ saveBtn.disabled = true; saveBtn.textContent = 'Saving...'; }

  const user = firebase.auth().currentUser;
  if(!user){ document.getElementById('cardEditOverlay')?.remove(); return; }

  let photoURL = currentUser?.photo || null;

  try {
    // Handle photo upload or removal
    if(window._epPendingPhoto === 'remove'){
      photoURL = null;
      // Delete from Storage if exists
      try {
        const ref = firebase.storage().ref('profilePhotos/' + user.uid);
        await ref.delete();
      } catch(e){ /* file may not exist */ }
    } else if(window._epPendingPhoto && window._epPendingPhoto.file){
      // Upload to Firebase Storage
      if(msg){ msg.style.display='block'; msg.style.color='var(--text2)'; msg.textContent='Uploading photo...'; }
      const ref = firebase.storage().ref('profilePhotos/' + user.uid);
      await ref.put(window._epPendingPhoto.file);
      photoURL = await ref.getDownloadURL();
    }

    // Update Firebase Auth profile
    await user.updateProfile({ displayName: name, photoURL: photoURL });

    // Update Firestore
    const userRef = db.collection('users').doc(user.uid);
    await userRef.update({ name: name, photo: photoURL });

    // Update local state
    currentUser.name = name;
    currentUser.photo = photoURL;
    try { localStorage.setItem('rr_user', JSON.stringify(currentUser)) } catch(e){}
    setRRCookie(user);

    window._epPendingPhoto = null;
    document.getElementById('cardEditOverlay')?.remove();
    renderUserSection();
    render();
  } catch(err){
    console.error('Save profile error:', err);
    if(msg){ msg.style.display='block'; msg.style.color='var(--danger)'; msg.textContent='Error saving: ' + (err.message||'Unknown error'); }
    if(saveBtn){ saveBtn.disabled = false; saveBtn.textContent = 'Save'; }
  }
}
