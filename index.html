<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentingRadar</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
/* ===== RESET & VARIABLES ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* Dark mode (default) */
:root{
  --bg:#0f1117;--surface:#1a1d2e;--border:#2a2e3f;--text:#e4e6f0;--text2:#9399b2;--text3:#5a5f7a;
  --primary:#6381fa;--primary-hover:#7b94ff;--primary-light:rgba(79,110,247,.15);
  --danger:#ef4444;--danger-light:rgba(239,68,68,.12);--success:#34d399;--success-light:rgba(52,211,153,.12);
  --warning:#f59e0b;--warning-light:rgba(245,158,11,.12);--info:#3b82f6;
  --num-computed:#6381fa;--num-success:#34d399;--num-danger:#ef4444;--num-warning:#f59e0b;
  --sidebar-bg:#0b0d14;--sidebar-border:rgba(255,255,255,.06);
  --sidebar-w:200px;--sidebar-collapsed-w:64px;--header-h:56px;--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.3);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;
  --card-hover-shadow:0 4px 12px rgba(0,0,0,.3);
  --input-bg:#141620;
}

/* Light mode */
:root.light{
  --bg:#f5f6fa;--surface:#fff;--border:#e2e5f1;--text:#1a1d2e;--text2:#5a5f7a;--text3:#9399b2;
  --primary:#4f6ef7;--primary-hover:#3d5be0;--primary-light:#eef1ff;
  --danger:#ef4444;--danger-light:#fef2f2;--success:#10b981;--success-light:#ecfdf5;
  --warning:#f59e0b;--warning-light:#fffbeb;--info:#3b82f6;
  --num-computed:#818cf8;--num-success:#10b981;--num-danger:#ef4444;--num-warning:#f59e0b;
  --sidebar-bg:#1a1d2e;--sidebar-border:rgba(255,255,255,.08);
  --shadow:0 1px 3px rgba(0,0,0,.08);
  --card-hover-shadow:0 4px 12px rgba(0,0,0,.1);
  --input-bg:#f0f1f5;
}


/* Accent: Crimson Flame */
:root.accent-crimson{--primary:#ef4444;--primary-hover:#dc2626;--primary-light:rgba(239,68,68,.15);--sidebar-bg:#3b0f0f;--sidebar-border:rgba(239,68,68,.15)}
:root.light.accent-crimson{--primary:#dc2626;--primary-hover:#b91c1c;--primary-light:#fef2f2;--sidebar-bg:#5c1a1a;--sidebar-border:rgba(239,68,68,.12)}

/* Accent: Ocean Depths */
:root.accent-ocean{--primary:#22d3ee;--primary-hover:#06b6d4;--primary-light:rgba(34,211,238,.15);--sidebar-bg:#0c2a3d;--sidebar-border:rgba(34,211,238,.15)}
:root.light.accent-ocean{--primary:#0891b2;--primary-hover:#0e7490;--primary-light:#e0f7fa;--sidebar-bg:#103d52;--sidebar-border:rgba(14,116,144,.12)}

/* Accent: Emerald Forest */
:root.accent-emerald{--primary:#34d399;--primary-hover:#10b981;--primary-light:rgba(52,211,153,.15);--sidebar-bg:#0c2e1e;--sidebar-border:rgba(52,211,153,.15)}
:root.light.accent-emerald{--primary:#059669;--primary-hover:#047857;--primary-light:#ecfdf5;--sidebar-bg:#14432b;--sidebar-border:rgba(5,150,105,.12)}

html{font-size:16.5px}
body{font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden;height:100vh;transition:background .2s,color .2s}
a{color:var(--primary);text-decoration:none}
button{font-family:var(--font);cursor:pointer;border:none;background:none;font-size:.875rem}
input,textarea,select{font-family:var(--font);font-size:.875rem;border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;outline:none;width:100%;transition:border .15s;background:var(--input-bg);color:var(--text)}
input:focus,textarea:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,110,247,.12)}
select option{background:var(--surface);color:var(--text)}
textarea{resize:vertical;min-height:80px}

/* ===== LAYOUT ===== */
.app{display:flex;height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--sidebar-bg);color:#fff;display:flex;flex-direction:column;flex-shrink:0;z-index:100;transition:width .25s ease;overflow:hidden}
.sidebar-brand{padding:14px 0 14px 16px;font-size:1rem;font-weight:700;letter-spacing:-.3px;border-bottom:1px solid var(--sidebar-border);display:flex;align-items:center;gap:10px;white-space:nowrap;overflow:hidden;position:relative;min-height:52px}
.sidebar-brand svg.brand-icon{width:24px;height:24px;fill:var(--primary);flex-shrink:0}
.sidebar-brand span{opacity:1;transition:opacity .15s ease .05s}
.sidebar-nav{flex:1;padding:8px 0}
.nav-section{padding:0 16px;margin-bottom:4px;font-size:.6rem;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.35);margin-top:14px;white-space:nowrap;overflow:hidden;opacity:1;transition:opacity .15s ease;height:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 16px;color:rgba(255,255,255,.65);transition:color .15s,background .15s;cursor:pointer;position:relative;white-space:nowrap;overflow:hidden}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.06)}
.nav-item.active{color:#fff;background:rgba(79,110,247,.2)}
.nav-item.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--primary);border-radius:0 3px 3px 0}
.nav-item svg{width:18px;height:18px;flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.nav-item span{opacity:1;transition:opacity .15s ease .05s}
.sidebar-toggle{position:absolute;right:8px;top:50%;transform:translateY(-50%);display:flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:4px;cursor:pointer;color:rgba(255,255,255,.4);border:none;transition:color .15s;background:transparent;flex-shrink:0}
.sidebar-toggle:hover{color:rgba(255,255,255,.8)}
.sidebar-toggle svg{width:14px;height:14px;transition:transform .3s ease}
.sidebar.collapsed .sidebar-toggle svg{transform:scaleX(-1)}
.sidebar.collapsed{width:var(--sidebar-collapsed-w)}
.sidebar.collapsed .sidebar-brand{padding:14px 16px;cursor:pointer}
.sidebar.collapsed .sidebar-brand span{opacity:0;width:0;overflow:hidden;transition:opacity .1s ease}
.sidebar.collapsed .nav-section{color:transparent;transition:color .1s ease}
.sidebar.collapsed .nav-item span{opacity:0;width:0;overflow:hidden;transition:opacity .1s ease}
.sidebar.collapsed .nav-item .nav-badge{position:absolute;top:5px;left:26px;font-size:0;min-width:6px;width:6px;height:6px;padding:0;border-radius:50%;pointer-events:none;opacity:1;overflow:visible}
.sidebar.collapsed .su-info{opacity:0;position:absolute;pointer-events:none;transition:opacity .1s ease}
.sidebar.collapsed .sidebar-user{padding:12px 14px}
.sidebar.collapsed .su-profile{flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:2px 0}
.su-collapsed-tier{display:none;text-align:center;width:100%}
.sidebar.collapsed .su-collapsed-tier{display:block}
.sidebar.collapsed .login-btn span{opacity:0;width:0;overflow:hidden;position:absolute}
.sidebar.collapsed .login-btn{justify-content:center;padding:6px 14px;width:auto;min-width:0;gap:0}
.sidebar.collapsed .nav-item[title]:hover::after{content:attr(title);position:absolute;left:100%;top:50%;transform:translateY(-50%);margin-left:8px;padding:4px 10px;background:#1a1d2e;color:#fff;font-size:.75rem;border-radius:4px;white-space:nowrap;z-index:200;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:.7rem;font-weight:600;padding:1px 7px;border-radius:10px;min-width:20px;text-align:center}
.sidebar-user{padding:12px 14px;border-top:1px solid var(--sidebar-border);position:relative}
.sidebar-user .su-profile{display:flex;align-items:center;gap:10px;cursor:pointer;padding:6px;border-radius:var(--radius);transition:background .15s}
.sidebar-user .su-profile:hover{background:rgba(255,255,255,.06)}
.sidebar-user .su-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#fff}
.sidebar-user .su-avatar img{width:32px;height:32px;border-radius:50%;object-fit:cover}
.sidebar-user .su-info{flex:1;min-width:0;overflow:hidden;opacity:1;position:relative;pointer-events:auto;transition:opacity .15s ease .05s}
.sidebar-user .su-name{font-size:.82rem;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-user .su-tier{display:inline-flex}
.sidebar-user .user-menu{position:fixed;bottom:auto;left:auto;right:auto;top:auto;z-index:9999;min-width:220px;background:var(--sidebar-bg);color:#e4e6f0;border-color:rgba(255,255,255,.1);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.sidebar-user .user-menu .user-menu-header{border-color:rgba(255,255,255,.1)}
.sidebar-user .user-menu .um-name{color:#e4e6f0}
.sidebar-user .user-menu .um-email{color:#9399b2}
.sidebar-user .user-menu .user-menu-item{color:#e4e6f0}
.sidebar-user .user-menu .user-menu-item:hover{background:rgba(255,255,255,.08)}
.sidebar-user .user-menu .user-menu-item svg{color:#9399b2}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.header{height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0}
.header-title{font-size:1.15rem;font-weight:600}
.header-search{position:relative;width:320px}
.header-search input{padding-left:36px;background:var(--input-bg);border:1px solid var(--border)}
.header-search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text3)}
.header-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:var(--radius);font-weight:500;transition:all .15s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover)}
.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--primary-light)}
.btn-sm{padding:5px 10px;font-size:.8rem}
.btn-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);color:var(--text2);position:relative}
.btn-icon:hover{background:var(--bg)}
.btn-icon .badge{position:absolute;top:2px;right:2px;width:16px;height:16px;background:var(--danger);color:#fff;font-size:.6rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
.content{flex:1;overflow-y:scroll;padding:20px 24px}

/* ===== STATUS PILLS ===== */
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:.8rem;font-weight:600;white-space:nowrap}
.status-pill::before{content:'';width:6px;height:6px;border-radius:50%}
.st-follow-up{background:rgba(59,130,246,.15);color:#60a5fa}.st-follow-up::before{background:#60a5fa}
.st-interested{background:rgba(16,185,129,.15);color:#34d399}.st-interested::before{background:#34d399}
.st-meeting{background:rgba(139,92,246,.15);color:#a78bfa}.st-meeting::before{background:#a78bfa}
.st-messaged{background:rgba(14,165,233,.15);color:#38bdf8}.st-messaged::before{background:#38bdf8}
.st-lvm{background:rgba(245,158,11,.15);color:#fbbf24}.st-lvm::before{background:#fbbf24}
.st-left-voicemail{background:rgba(245,158,11,.15);color:#fbbf24}.st-left-voicemail::before{background:#fbbf24}
.st-no-contact{background:rgba(148,163,184,.12);color:#94a3b8}.st-no-contact::before{background:#94a3b8}
.st-not-interested{background:rgba(239,68,68,.15);color:#f87171}.st-not-interested::before{background:#f87171}
.st-not-good-fit{background:rgba(236,72,153,.15);color:#f472b6}.st-not-good-fit::before{background:#f472b6}
.st-hoa-issues{background:rgba(251,146,60,.15);color:#fb923c}.st-hoa-issues::before{background:#fb923c}
.st-lost{background:rgba(100,116,139,.15);color:#94a3b8}.st-lost::before{background:#94a3b8}
.st-un-listed{background:rgba(100,116,139,.1);color:#78716c}.st-un-listed::before{background:#78716c}
.st-no-longer-interested{background:rgba(239,68,68,.12);color:#fca5a5}.st-no-longer-interested::before{background:#fca5a5}
.st-new{background:rgba(99,129,250,.15);color:#818cf8}.st-new::before{background:#818cf8}

/* Light mode status overrides */
:root.light .st-follow-up{background:#dbeafe;color:#1e40af}:root.light .st-follow-up::before{background:#1e40af}
:root.light .st-interested{background:#d1fae5;color:#065f46}:root.light .st-interested::before{background:#065f46}
:root.light .st-meeting{background:#ede9fe;color:#5b21b6}:root.light .st-meeting::before{background:#5b21b6}
:root.light .st-messaged{background:#e0f2fe;color:#0369a1}:root.light .st-messaged::before{background:#0369a1}
:root.light .st-lvm{background:#fef3c7;color:#92400e}:root.light .st-lvm::before{background:#92400e}
:root.light .st-left-voicemail{background:#fef3c7;color:#92400e}:root.light .st-left-voicemail::before{background:#92400e}
:root.light .st-no-contact{background:#f3f4f6;color:#4b5563}:root.light .st-no-contact::before{background:#9ca3af}
:root.light .st-not-interested{background:#fee2e2;color:#991b1b}:root.light .st-not-interested::before{background:#991b1b}
:root.light .st-not-good-fit{background:#fce7f3;color:#9d174d}:root.light .st-not-good-fit::before{background:#9d174d}
:root.light .st-hoa-issues{background:#ffedd5;color:#9a3412}:root.light .st-hoa-issues::before{background:#9a3412}
:root.light .st-lost{background:#f1f5f9;color:#64748b}:root.light .st-lost::before{background:#64748b}
:root.light .st-un-listed{background:#f5f5f4;color:#78716c}:root.light .st-un-listed::before{background:#78716c}
:root.light .st-no-longer-interested{background:#fef2f2;color:#b91c1c}:root.light .st-no-longer-interested::before{background:#b91c1c}
:root.light .st-new{background:#e0e7ff;color:#3730a3}:root.light .st-new::before{background:#3730a3}

/* ===== DASHBOARD ===== */
.db-grid{display:grid;gap:16px}
.db-kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.db-kpi{background:var(--surface);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);border:1px solid var(--border);position:relative;overflow:hidden;transition:all .15s}
.db-kpi:hover{border-color:var(--primary);transform:translateY(-1px)}
.db-kpi .kpi-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;margin-bottom:8px}
.db-kpi .kpi-val{font-size:1.5rem;font-weight:800;line-height:1.1}
.db-kpi .kpi-label{font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-top:3px}
.db-kpi .kpi-sub{font-size:.72rem;color:var(--text3);margin-top:4px}
.db-kpi .kpi-trend{position:absolute;top:12px;right:12px;font-size:.68rem;font-weight:600;padding:2px 6px;border-radius:4px}
.db-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.db-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.db-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden}
.db-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.db-card-hdr h3{font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:6px;margin:0}
.db-card-hdr .db-hdr-action{font-size:.72rem;color:var(--primary);cursor:pointer;font-weight:500}
.db-card-hdr .db-hdr-action:hover{text-decoration:underline}
.db-card-body{padding:12px 16px}
.db-card-body.no-pad{padding:0}
.db-task-list{list-style:none;padding:0;margin:0}
.db-task-item{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;font-size:.84rem}
.db-task-item:last-child{border-bottom:none}
.db-task-item:hover{background:var(--primary-light)}
.db-task-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.db-task-info{flex:1;min-width:0}
.db-task-property{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.db-task-meta{font-size:.72rem;color:var(--text3)}
.db-task-date{font-size:.72rem;font-weight:600;flex-shrink:0;white-space:nowrap}
.db-empty{text-align:center;padding:24px 16px;color:var(--text3);font-size:.84rem}
.db-pipeline-wrap{border-radius:var(--radius);border:2px solid var(--border);padding:10px 10px 10px;cursor:pointer;transition:all .3s ease;position:relative}
.db-pipeline-wrap:hover{border-color:var(--text3)}
.db-pipeline-wrap.active{border-color:var(--text3);background:rgba(147,153,178,.08);box-shadow:0 0 0 3px rgba(147,153,178,.08)}
.db-pipeline-wrap-hdr{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px;color:var(--text2);padding:0 2px}
.db-pipeline-wrap.active .db-pipeline-wrap-hdr{color:var(--text)}
.db-pipeline-wrap-hdr .pw-icon{line-height:1;display:flex;align-items:center}
.db-pipeline-wrap-hdr .pw-count{font-size:.92rem;font-weight:800;line-height:1}
.db-pipeline-wrap-hdr .pw-label{font-size:.7rem;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.db-pipeline-boxes{display:flex;gap:8px}
.db-pipeline-box{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:54px;height:64px;border-radius:var(--radius);border:2px solid transparent;cursor:pointer;transition:all .3s ease;gap:3px;position:relative}
.db-pipeline-box:hover{filter:brightness(1.25);z-index:1}
.db-pipeline-box.disabled{opacity:.35;cursor:default;pointer-events:none}
.db-pipeline-box .pb-icon{line-height:1}
.db-pipeline-box .pb-count{font-size:.85rem;font-weight:800;line-height:1}
.db-status-breakdown{display:flex;flex-direction:column;gap:2px;margin-top:4px}
.db-status-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:var(--radius);cursor:pointer;transition:background .1s}
.db-status-row:hover{background:var(--primary-light)}
.db-status-pill-wrap{width:120px;flex-shrink:0}
.db-status-bar-track{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.db-status-bar-fill{height:100%;border-radius:4px;transition:width .3s ease}
.db-status-count{font-size:.85rem;font-weight:700;min-width:28px;text-align:right;color:var(--text)}
.db-status-arrow{color:var(--text3);flex-shrink:0}
.db-funnel-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:8px}
.db-funnel-leg{display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--text2);cursor:pointer}
.db-funnel-leg:hover{color:var(--primary)}
.db-funnel-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.db-stage-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px;margin-top:10px}
.db-stage-item{background:var(--bg);border-radius:var(--radius);padding:8px 10px;cursor:pointer;transition:all .15s;text-align:center}
.db-stage-item:hover{background:var(--primary-light);transform:translateY(-1px)}
.db-stage-count{font-size:1.15rem;font-weight:700}
.db-stage-label{font-size:.65rem;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.db-recent-item{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.db-recent-item:last-child{border-bottom:none}
.db-recent-item:hover{background:var(--primary-light)}
.db-recent-prop{flex:1;min-width:0;font-size:.84rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.db-recent-date{font-size:.7rem;color:var(--text3);flex-shrink:0}
.db-insight-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.db-insight-row:last-child{border-bottom:none}
.db-insight-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
.db-insight-text{flex:1;font-size:.82rem;line-height:1.4}
.db-insight-text strong{font-weight:600}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:16px 20px;box-shadow:var(--shadow);border:1px solid var(--border)}
.stat-card .label{font-size:.8rem;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-card .value{font-size:1.6rem;font-weight:700}
.stat-card .sub{font-size:.8rem;color:var(--text3);margin-top:2px}

/* ===== MAP CARD ===== */
.db-map-standalone{border-radius:var(--radius);overflow:hidden;position:relative;margin-bottom:16px;border:1px solid var(--border)}
#dashboardMap{width:100%;height:340px;border-radius:var(--radius)}
.map-popup{font-family:inherit}
.map-popup .mapboxgl-popup-content,.map-popup .maplibregl-popup-content{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:0;box-shadow:0 12px 32px rgba(0,0,0,.25),0 2px 6px rgba(0,0,0,.1);max-width:290px;overflow:hidden}
.map-popup .mapboxgl-popup-tip,.map-popup .maplibregl-popup-tip{border-top-color:var(--surface);border-bottom-color:var(--surface);border-left-color:transparent;border-right-color:transparent}
.map-popup .mapboxgl-popup-close-button,.map-popup .maplibregl-popup-close-button{display:none}
.map-popup-close{position:absolute;top:10px;right:10px;width:26px;height:26px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:14px;line-height:1;transition:all .15s;z-index:2;box-shadow:0 1px 4px rgba(0,0,0,.12)}
.map-popup-close:hover{color:var(--text);background:var(--surface);border-color:var(--text3)}
.map-popup-inner{padding:14px 16px;position:relative}
.map-popup-addr{font-size:.84rem;font-weight:700;color:var(--text);margin-bottom:8px;line-height:1.35;padding-right:30px}
.map-popup-divider{height:1px;background:var(--border);margin:0 -16px 10px;opacity:.7}
.map-popup-stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px;font-size:.74rem;color:var(--text2)}
.map-popup-stats span{display:flex;align-items:center;gap:3px;background:var(--bg);padding:3px 8px;border-radius:6px;border:1px solid var(--border)}
.map-popup-rent{font-size:.92rem;font-weight:700;color:var(--num-success);margin-bottom:8px;letter-spacing:-.01em}
.map-popup-contact{font-size:.74rem;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:4px}
.map-popup-btn{display:block;width:100%;padding:9px 0;text-align:center;font-size:.78rem;font-weight:600;color:#fff;background:var(--primary);border:none;border-radius:8px;cursor:pointer;transition:all .15s;letter-spacing:.01em}
.map-popup-btn:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.15)}
.map-popup-copy{opacity:0;border:none;background:transparent;cursor:pointer;color:var(--text3);padding:2px;border-radius:4px;transition:opacity .15s,color .15s;display:inline-flex;align-items:center;vertical-align:middle;margin-left:4px}
.map-popup-addr:hover .map-popup-copy,.map-popup-phone:hover .map-popup-copy{opacity:1}
.map-popup-copy:hover{color:var(--primary)}
.map-popup-copy.copied{color:var(--success,#22c55e)!important;opacity:1}
.map-popup-phone{cursor:default;display:inline-flex;align-items:center;gap:2px}
.map-ctrl-hint{position:absolute;transform:translate(-50%,-120%);background:var(--surface);color:var(--text);border:1px solid var(--border);padding:8px 16px;border-radius:10px;font-size:.8rem;font-weight:600;pointer-events:none;z-index:20;opacity:0;transition:opacity .25s;box-shadow:0 4px 16px rgba(0,0,0,.25);letter-spacing:.01em;white-space:nowrap}
.map-info-panel{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.6);color:rgba(255,255,255,.85);padding:5px 10px;border-radius:6px;font-size:.68rem;pointer-events:none;z-index:5;display:flex;align-items:center;gap:4px;backdrop-filter:blur(4px);letter-spacing:.01em}
.map-cluster-popup .mapboxgl-popup-content,.map-cluster-popup .maplibregl-popup-content{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:0;box-shadow:0 12px 32px rgba(0,0,0,.25),0 2px 6px rgba(0,0,0,.1);max-width:290px;min-width:250px;overflow:hidden}
.map-cluster-popup .mapboxgl-popup-tip,.map-cluster-popup .maplibregl-popup-tip{border-top-color:var(--surface);border-bottom-color:var(--surface);border-left-color:transparent;border-right-color:transparent}
.map-cluster-popup .mapboxgl-popup-close-button,.map-cluster-popup .maplibregl-popup-close-button{display:none}
.cluster-popup-slider{position:relative;overflow:hidden}
.cluster-popup-panel{transition:transform .25s ease,opacity .2s ease}
.cluster-popup-panel.slide-out{transform:translateX(-100%);opacity:0;position:absolute;top:0;left:0;width:100%;pointer-events:none}
.cluster-popup-detail{transform:translateX(100%);opacity:0;position:absolute;top:0;left:0;width:100%;pointer-events:none;transition:transform .25s ease,opacity .2s ease}
.cluster-popup-detail.slide-in{transform:translateX(0);opacity:1;position:relative;pointer-events:auto}
.cluster-popup-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)}
.cluster-popup-header span{font-size:.78rem;font-weight:700;color:var(--text)}
.cluster-popup-close{width:24px;height:24px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:13px;line-height:1;transition:all .15s}
.cluster-popup-close:hover{color:var(--text);background:var(--surface);border-color:var(--text3)}
.cluster-popup-back{display:flex;align-items:center;gap:5px;padding:8px 14px;border-bottom:1px solid var(--border);cursor:pointer;font-size:.74rem;font-weight:600;color:var(--primary);transition:background .12s}
.cluster-popup-back:hover{background:var(--bg)}
.cluster-popup-back svg{flex-shrink:0}
.cluster-popup-list{max-height:220px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.cluster-popup-list::-webkit-scrollbar{width:5px}
.cluster-popup-list::-webkit-scrollbar-track{background:transparent}
.cluster-popup-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.cluster-popup-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border)}
.cluster-popup-item:last-child{border-bottom:none}
.cluster-popup-item:hover{background:var(--bg)}
.cluster-popup-item-info{flex:1;min-width:0}
.cluster-popup-item-addr{font-size:.78rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cluster-popup-item-status{font-size:.65rem;font-weight:600;padding:1px 6px;border-radius:4px;display:inline-block;margin-top:2px}
.cluster-popup-arrow{color:var(--primary);font-size:1.1rem;font-weight:700;flex-shrink:0;transition:transform .15s;line-height:1}
.cluster-popup-item:hover .cluster-popup-arrow{transform:translateX(2px)}
.map-info-icon{display:inline-flex;align-items:center;opacity:.7}
.map-info-sep{opacity:.4;margin:0 1px}

/* ===== TABLE ===== */
.table-wrap{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden}
.table-toolbar{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:4px 12px;border-radius:20px;font-size:.8rem;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid var(--border);color:var(--text2)}
.chip:hover{border-color:var(--primary);color:var(--primary)}
.chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
table{width:100%;border-collapse:collapse}
thead{background:var(--bg)}
th{text-align:left;padding:10px 14px;font-size:.78rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
th:hover{color:var(--text)}
td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:.9rem;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr.clickable{cursor:pointer;transition:background .1s}
tr.clickable:hover{background:var(--primary-light)}
.td-property{font-weight:600;color:var(--text)}
.td-name{color:var(--text)}
.td-phone{color:var(--text2);font-family:'SF Mono',monospace;font-size:.85rem}
.td-date{color:var(--text3);font-size:.85rem}
.td-link a{color:var(--primary);font-size:.85rem}
.empty-row{text-align:center;padding:40px;color:var(--text3)}

/* ===== KANBAN ===== */
.kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:16px;min-height:calc(100vh - 180px)}
.kanban-col{min-width:280px;max-width:320px;flex-shrink:0;background:var(--bg);border-radius:var(--radius);display:flex;flex-direction:column}
.kanban-header{padding:12px 14px;font-weight:600;font-size:.85rem;display:flex;align-items:center;gap:8px;border-bottom:2px solid var(--border);background:var(--surface);border-radius:var(--radius) var(--radius) 0 0}
.kanban-header .count{background:var(--bg);color:var(--text3);font-size:.7rem;padding:2px 8px;border-radius:10px;font-weight:600}
.kanban-cards{flex:1;padding:8px;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.kanban-card{background:var(--surface);border-radius:var(--radius);padding:12px;box-shadow:var(--shadow);border:1px solid var(--border);cursor:pointer;transition:all .15s}
.kanban-card:hover{box-shadow:var(--card-hover-shadow);transform:translateY(-1px)}
.kanban-card .kc-property{font-weight:600;font-size:.85rem;margin-bottom:6px;line-height:1.3}
.kanban-card .kc-name{font-size:.8rem;color:var(--text2);margin-bottom:4px}
.kanban-card .kc-meta{display:flex;gap:8px;flex-wrap:wrap;font-size:.7rem;color:var(--text3)}
.kanban-card .kc-followup{margin-top:6px;font-size:.7rem;padding:3px 8px;border-radius:4px;display:inline-block}
.kc-followup.overdue{background:var(--danger-light);color:#f87171;font-weight:600}
.kc-followup.today{background:var(--warning-light);color:#fbbf24;font-weight:600}
.kc-followup.upcoming{background:rgba(59,130,246,.12);color:#60a5fa}
:root.light .kc-followup.overdue{background:#fef2f2;color:#b91c1c}
:root.light .kc-followup.today{background:#fffbeb;color:#92400e}
:root.light .kc-followup.upcoming{background:#eff6ff;color:#1d4ed8}

/* ===== MODAL / DETAIL PANEL ===== */
.app-footer{text-align:center;padding:12px 16px;font-size:.7rem;color:var(--text3);border-top:1px solid var(--border);background:var(--bg)}
.app-footer a{color:var(--text3);text-decoration:none}
.app-footer a:hover{color:var(--primary);text-decoration:underline}
.app-footer span{margin:0 4px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;justify-content:flex-end}
.modal-overlay.open{display:flex}
.modal-panel{width:560px;max-width:90vw;background:var(--surface);height:100vh;overflow-y:auto;box-shadow:-4px 0 24px rgba(0,0,0,.12);animation:slideIn .2s ease}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.modal-header{display:flex;align-items:center;justify-content:between;padding:16px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:5}
.modal-header h2{flex:1;font-size:1rem;font-weight:600}
.modal-close{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);color:var(--text3)}
.modal-close:hover{background:var(--bg);color:var(--text)}
.modal-body{padding:24px}
.field-group{margin-bottom:20px}
.field-label{display:block;font-size:.75rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.field-value{font-size:.9rem;color:var(--text);line-height:1.5}
.field-value a{word-break:break-all}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.modal-section{margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
.modal-section h3{font-size:.85rem;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}

/* ===== NOTES / ACTIVITY ===== */
.note-list{display:flex;flex-direction:column;gap:10px}
.note-item{background:var(--bg);border-radius:var(--radius);padding:10px 14px;position:relative}
.note-item .note-date{font-size:.75rem;color:var(--text3);display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.note-item .note-text{font-size:.9rem;line-height:1.5}
.note-item .note-edited{font-size:.7rem;color:var(--text3);font-style:italic;margin-top:2px}
.note-item .note-actions{position:absolute;bottom:8px;right:8px;display:flex;gap:4px;opacity:0;transition:opacity .15s;z-index:2}
.note-item:hover .note-actions,.note-item .note-actions:focus-within{opacity:1}
.note-actions button{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:4px;color:var(--text3);background:var(--surface);border:1px solid var(--border);cursor:pointer}
.note-actions button:hover{color:var(--primary);border-color:var(--primary)}
.note-actions button.del:hover{color:var(--danger);border-color:var(--danger)}
.note-input-wrap{display:flex;gap:8px;margin-top:10px}
.note-input-wrap textarea{flex:1}
.note-type-bar{display:flex;gap:2px;margin-bottom:6px}
.note-type-btn{padding:3px 10px;font-size:.7rem;font-weight:500;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--text3);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:4px}
.note-type-btn:hover{border-color:var(--text2);color:var(--text2)}
.note-type-btn.active{background:var(--primary-light);border-color:var(--primary);color:var(--primary);font-weight:600}
.rte-toolbar{display:flex;gap:2px;padding:4px 6px;border:1px solid var(--border);border-bottom:none;border-radius:var(--radius) var(--radius) 0 0;background:var(--bg)}
.rte-toolbar button{width:28px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:4px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:.8rem;font-weight:600;transition:all .12s}
.rte-toolbar button:hover{background:var(--surface);color:var(--text)}
.rte-toolbar button.active{background:var(--primary-light);color:var(--primary)}
.rte-toolbar .rte-sep{width:1px;background:var(--border);margin:3px 4px;flex-shrink:0}
.rte-editor{min-height:72px;max-height:140px;overflow-y:auto;padding:8px 10px;font-size:.9rem;line-height:1.5;border:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);background:var(--input-bg);color:var(--text);outline:none;position:relative}
.rte-editor:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,110,247,.15)}
.rte-editor:empty::before{content:attr(data-placeholder);color:var(--text3);pointer-events:none}
.rte-editor:empty::after{content:attr(data-hint);position:absolute;bottom:6px;right:10px;font-size:.6rem;color:var(--text3);opacity:.6;pointer-events:none}
.rte-editor:focus::before,.rte-editor:focus::after{display:none}
.rte-editor ul,.rte-editor ol{margin:2px 0;padding-left:20px}
.rte-editor ul ul,.rte-editor ol ol{margin:0}
.rte-editor li{margin:1px 0}
.rte-editor ul{list-style-type:disc}
.rte-editor ul ul{list-style-type:circle}
.rte-editor ul ul ul{list-style-type:square}
.rte-editor ul ul ul ul{list-style-type:'▫ '}
.note-text ul,.note-text ol{margin:2px 0;padding-left:20px}
.note-text ul ul,.note-text ol ol{margin:0}
.note-text li{margin:1px 0}
.note-text ul{list-style-type:disc}
.note-text ul ul{list-style-type:circle}
.note-text ul ul ul{list-style-type:square}
.note-text ul ul ul ul{list-style-type:'▫ '}
.note-images{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.note-img-thumb{max-width:80px;max-height:80px;width:auto;height:auto;border-radius:6px;border:1px solid var(--border);cursor:pointer;transition:all .15s;object-fit:cover}
.note-img-thumb:hover{border-color:var(--primary);box-shadow:0 2px 8px rgba(0,0,0,.15)}
.note-img-badge{display:inline-flex;align-items:center;gap:4px;font-size:.68rem;color:var(--text3);margin-top:4px}
.rte-editor img{max-width:120px;max-height:80px;border-radius:4px;vertical-align:middle;margin:2px}
.rte-img-preview{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;padding:0 2px}
.rte-img-preview-item{position:relative;display:inline-block}
.rte-img-preview-item img{width:60px;height:60px;object-fit:cover;border-radius:6px;border:1px solid var(--border)}
.rte-img-preview-item .rte-img-remove{position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:var(--danger);color:#fff;border:none;cursor:pointer;font-size:.65rem;display:flex;align-items:center;justify-content:center;line-height:1;opacity:0;transition:opacity .15s}
.rte-img-preview-item:hover .rte-img-remove{opacity:1}
.note-img-popup-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.note-img-popup{background:var(--surface);border-radius:12px;padding:20px;max-width:min(700px,90vw);max-height:90vh;overflow:auto;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.note-img-popup img{max-width:100%;max-height:70vh;border-radius:8px;display:block;margin:0 auto}
.note-img-popup .nip-text{margin-bottom:14px;font-size:.9rem;line-height:1.5;color:var(--text);text-align:left;word-wrap:break-word;overflow-wrap:break-word;white-space:pre-wrap;padding-right:36px}
.note-img-popup .nip-date{font-size:.75rem;color:var(--text3);text-align:right;margin-top:12px}
.note-img-popup .nip-close{position:absolute;top:12px;right:12px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px;color:var(--text3);background:var(--bg);border:1px solid var(--border);cursor:pointer;font-size:1rem;z-index:1}
.note-img-popup .nip-close:hover{color:var(--text);border-color:var(--text2)}

/* ===== NOTIFICATIONS PANEL ===== */
.notif-panel{display:none;flex-direction:column}
.notif-panel.active-view{display:flex}
.notif-section{margin-bottom:24px}
.notif-section h3{font-size:.85rem;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.notif-section h3 .dot{width:8px;height:8px;border-radius:50%}
.notif-card{background:var(--surface);border-radius:var(--radius);padding:14px 18px;border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:8px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:14px}
.notif-card:hover{box-shadow:var(--card-hover-shadow)}
.notif-card.overdue{border-left:3px solid var(--danger)}
.notif-card.today{border-left:3px solid var(--warning)}
.notif-card.upcoming{border-left:3px solid var(--info)}
.notif-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.notif-icon.overdue{background:var(--danger-light);color:var(--danger)}
.notif-icon.today{background:var(--warning-light);color:var(--warning)}
.notif-icon.upcoming{background:rgba(59,130,246,.12);color:var(--info)}
.notif-content{flex:1;min-width:0}
.notif-content .nc-property{font-weight:600;font-size:.95rem}
.notif-content .nc-detail{font-size:.85rem;color:var(--text2);margin-top:2px}
.notif-content .nc-date{font-size:.8rem;color:var(--text3);margin-top:4px}
.notif-dismiss{flex-shrink:0;color:var(--text3);font-size:.75rem;padding:4px 8px;border-radius:4px}
.notif-dismiss:hover{background:var(--bg);color:var(--text)}

/* ===== VIEW TOGGLE ===== */
.view-toggle{display:flex;background:var(--bg);border-radius:var(--radius);padding:2px;gap:2px}
.view-toggle button{padding:5px 14px;border-radius:6px;font-size:.8rem;font-weight:500;color:var(--text2)}
.view-toggle button.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* ===== THEME TOGGLE ===== */
/* Theme toggle is now a header icon button — styled via .btn-icon */

/* ===== AUTOCOMPLETE ===== */
.search-autocomplete{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.25);max-height:360px;overflow-y:auto;z-index:300;display:none}
.search-autocomplete.visible{display:block}
.ac-section{padding:6px 0}
.ac-section-label{padding:4px 14px;font-size:.65rem;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);font-weight:600}
.ac-item{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;transition:background .1s}
.ac-item:hover,.ac-item.ac-active{background:var(--primary-light)}
.ac-item .ac-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0;background:var(--bg);color:var(--text3)}
.ac-item .ac-main{flex:1;min-width:0}
.ac-item .ac-title{font-size:.85rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ac-item .ac-title mark{background:rgba(99,129,250,.25);color:var(--primary);border-radius:2px;padding:0 1px}
:root.light .ac-item .ac-title mark{background:#dbeafe;color:#1e40af}
.ac-item .ac-sub{font-size:.7rem;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}



/* ===== TIER / PRICING ===== */
.pricing-page{max-width:900px;margin:0 auto}
.pricing-header{text-align:center;margin-bottom:28px}
.pricing-header h2{font-size:1.5rem;font-weight:700;margin-bottom:6px}
.pricing-header p{font-size:.9rem;color:var(--text2)}
.billing-toggle{display:inline-flex;align-items:center;gap:10px;margin-top:14px;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:4px}
.billing-toggle .bt-opt{padding:6px 18px;border-radius:20px;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .15s;color:var(--text3)}
.billing-toggle .bt-opt.active{background:var(--primary);color:#fff}
.billing-toggle .bt-opt:not(.active):hover{color:var(--text)}
.billing-save-badge{font-size:.7rem;font-weight:700;color:#fff;background:#10b981;padding:3px 10px;border-radius:10px;margin-left:6px}
.pc-price-old{font-size:.9rem;color:var(--text3);text-decoration:line-through;margin-right:6px;font-weight:400}
.pc-billed{font-size:.72rem;color:var(--text3);margin-top:2px}
.pricing-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:900px){.pricing-cards{grid-template-columns:1fr}}
.pricing-card{background:var(--surface);border-radius:var(--radius);border:2px solid var(--border);padding:24px;display:flex;flex-direction:column;transition:all .2s;position:relative}
.pricing-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:var(--card-hover-shadow)}
.pricing-card.popular{border-color:var(--primary)}
.pricing-card.popular::before{content:'MOST POPULAR';position:absolute;top:-11px;left:50%;transform:translateX(-50%);background:var(--primary);color:#fff;font-size:.6rem;font-weight:700;padding:2px 12px;border-radius:10px;letter-spacing:.5px}
.pricing-card.current{border-color:var(--success);box-shadow:0 0 0 1px var(--success)}
.pricing-card.current::after{content:'CURRENT PLAN';position:absolute;top:-11px;right:16px;background:var(--success);color:#fff;font-size:.6rem;font-weight:700;padding:2px 10px;border-radius:10px;letter-spacing:.5px}
.pc-name{font-size:1.1rem;font-weight:700;margin-bottom:4px}
.pc-price{font-size:2rem;font-weight:800;margin-bottom:2px}
.pc-price span{font-size:.85rem;font-weight:400;color:var(--text3)}
.pc-desc{font-size:.8rem;color:var(--text2);margin-bottom:16px;min-height:36px}
.pc-features{list-style:none;margin-bottom:20px;flex:1}
.pc-features li{font-size:.82rem;padding:5px 0;display:flex;align-items:flex-start;gap:8px;line-height:1.4}
.pc-features li::before{content:'✓';color:var(--success);font-weight:700;flex-shrink:0}
.pc-features li.disabled{color:var(--text3)}
.pc-features li.disabled::before{content:'—';color:var(--text3)}
.pc-btn{padding:10px;border-radius:var(--radius);font-weight:600;font-size:.85rem;text-align:center;cursor:pointer;transition:all .15s;border:2px solid var(--border);color:var(--text)}
.pc-btn:hover{border-color:var(--primary);color:var(--primary)}
.pc-btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.pc-btn.primary:hover{background:var(--primary-hover);border-color:var(--primary-hover)}
.pc-btn.current-btn{background:var(--success);color:#fff;border-color:var(--success);cursor:default}
.tier-badge{display:inline-flex;align-items:center;gap:4px;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px}
.tier-free{background:rgba(148,163,184,.15);color:#94a3b8}
.tier-basic{background:rgba(245,158,11,.15);color:#f59e0b}
.tier-pro{background:rgba(16,185,129,.15);color:#10b981}
.tier-gate{text-align:center;padding:20px;border-radius:var(--radius);border:1px dashed var(--border);margin:12px 0}
.tier-gate .tg-icon{font-size:1.5rem;margin-bottom:8px}
.tier-gate .tg-label{font-size:.85rem;font-weight:600;margin-bottom:4px}
.tier-gate .tg-desc{font-size:.78rem;color:var(--text2);margin-bottom:10px}
.setup-steps{counter-reset:step}
.setup-step{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start}
.setup-step::before{counter-increment:step;content:counter(step);width:24px;height:24px;background:var(--primary);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0}
.setup-step-content{flex:1;font-size:.85rem;line-height:1.5}
.setup-step-content code{background:var(--input-bg);padding:1px 6px;border-radius:3px;font-size:.8rem}
.setup-step-content img{max-width:100%;border-radius:var(--radius);margin-top:6px;border:1px solid var(--border)}

/* ===== PROFILE PAGE ===== */
.profile-hero{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.profile-sticky-header{position:sticky;top:0;z-index:40;background:var(--bg);padding:20px 24px 12px;border-bottom:1px solid var(--border);margin:0 -24px 16px}
.profile-hero-left{flex:1;min-width:0;position:relative}
.hero-contact-name{font-size:1.05rem;color:var(--text2);margin-top:2px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.hero-contact-item{display:inline-flex;align-items:center;gap:4px}
.hero-contact-item .hero-copy-btn{opacity:0;border:none;background:transparent;cursor:pointer;color:var(--text3);padding:2px;border-radius:4px;transition:opacity .15s,color .15s;display:inline-flex;align-items:center;flex-shrink:0}
.hero-contact-item:hover .hero-copy-btn{opacity:1}
.hero-contact-item .hero-copy-btn:hover{color:var(--primary)}
.hero-contact-item .hero-copy-btn.copied{color:var(--success,#22c55e)!important;opacity:1}
.hero-address-wrap{position:relative;display:inline-flex;align-items:flex-start;gap:6px}
.hero-address-wrap .hero-copy-btn{opacity:0;border:none;background:transparent;cursor:pointer;color:var(--text3);padding:2px;border-radius:4px;transition:opacity .15s,color .15s;display:inline-flex;align-items:center;flex-shrink:0;align-self:center}
.hero-address-wrap:hover .hero-copy-btn{opacity:1}
.hero-address-wrap .hero-copy-btn:hover{color:var(--primary)}
.hero-address-wrap .hero-copy-btn.copied{color:var(--success,#22c55e)!important;opacity:1}
.btn-danger{background:var(--danger);color:#fff;border:none}
.btn-danger:hover{background:#dc2626}
.profile-hero h1{font-size:1.65rem;font-weight:700;line-height:1.3;margin-bottom:2px}
.profile-hero-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.profile-hero-actions{display:flex;gap:8px;flex-shrink:0;align-items:flex-start}
.profile-platform{display:inline-flex;align-items:center;gap:6px;font-size:.8rem;padding:5px 12px;background:transparent;border:none;border-radius:var(--radius);color:var(--primary);transition:all .15s}
.profile-platform:hover{background:var(--primary-light)}
.profile-platform svg{width:14px;height:14px}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:900px){.profile-grid{grid-template-columns:1fr}}
.profile-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden}
.profile-card-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;cursor:pointer;user-select:none;transition:background .1s;min-height:38px;box-sizing:border-box}
.profile-card-header:hover{background:var(--primary-light)}
.profile-card-header h3{font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:8px;margin:0}
.profile-card-header .chevron{width:16px;height:16px;color:var(--text3);transition:transform .2s}
.profile-card-header.collapsed .chevron{transform:rotate(-90deg)}
.profile-card-body{padding:14px 16px;border-top:1px solid var(--border)}
.profile-card-body.collapsed{display:none}
.prop-field-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
.prop-field label{display:block;font-size:.73rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.prop-field input,.prop-field select{font-size:.88rem;padding:5px 8px}
.prop-check-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.prop-check{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.78rem;cursor:pointer;transition:all .12s;border:1px solid var(--border);color:var(--text2);user-select:none}
.prop-check:hover{border-color:var(--primary);color:var(--primary)}
.prop-check.checked{background:var(--primary);color:#fff;border-color:var(--primary)}
.prop-check input[type=checkbox]{display:none}
.multi-field-row{cursor:pointer;border-radius:var(--radius);padding:6px 8px;margin:-6px -8px;margin-bottom:4px;transition:background .15s}
.multi-field-row:hover{background:var(--primary-light)}
.multi-field-row .multi-edit-icon{opacity:0;transition:opacity .15s;vertical-align:middle;margin-left:3px;color:var(--text3)}
.multi-field-row:hover .multi-edit-icon{opacity:1}
.section-readonly-body{position:relative;padding:14px 16px 10px}
.section-edit-btn{position:absolute;top:8px;right:10px;display:flex;align-items:center;gap:4px;padding:6px 14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text2);font-size:.75rem;font-weight:600;cursor:pointer;opacity:0;transition:all .15s;z-index:2}
.section-edit-btn.visible{opacity:1}
.section-edit-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.section-ro-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px 16px;margin-bottom:8px}
.section-ro-field .ro-label{font-size:.68rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.section-ro-field .ro-value{font-size:.82rem;color:var(--text)}
.section-ro-field .ro-value.empty{color:var(--text3);font-style:italic}
.section-ro-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.section-ro-chips .ro-chip{font-size:.72rem;padding:2px 8px;background:var(--primary-light);color:var(--primary);border-radius:10px;font-weight:500}
.section-ro-multi{margin-top:8px}
.section-ro-multi .ro-label{font-size:.68rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.se-multi-grid{display:flex;flex-wrap:wrap;gap:6px 8px}
.se-multi-opt{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:.8rem;color:var(--text2);cursor:pointer;transition:all .15s;user-select:none;white-space:nowrap}
.se-multi-opt:hover{border-color:var(--primary);background:rgba(99,129,250,.04)}
.se-multi-opt.checked{border-color:var(--primary);background:var(--primary-light);color:var(--primary);font-weight:500}
.se-multi-opt input[type="checkbox"]{accent-color:var(--primary);margin:0}
.multi-display-chips{display:flex;flex-wrap:wrap;gap:5px}
.multi-chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:.78rem;background:var(--primary);color:#fff;border:1px solid var(--primary)}
.multi-empty-hint{font-size:.82rem;color:var(--text3);font-style:italic;padding:2px 0}
.multi-editor-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:250;display:flex;align-items:center;justify-content:center}
.multi-editor{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:0 12px 40px rgba(0,0,0,.3);width:520px;max-width:90vw;max-height:80vh;display:flex;flex-direction:column}
.multi-editor-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.multi-editor-header h3{font-size:1rem;font-weight:600;margin:0}
.multi-editor-body{padding:16px 20px;overflow-y:auto;flex:1}
.multi-editor-actions{padding:12px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;gap:8px}
.multi-editor-actions .me-hint{font-size:.65rem;color:var(--text3);margin-right:auto}
.import-dialog{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:20px;margin-bottom:20px}
.import-dialog h3{font-size:.95rem;font-weight:600;margin-bottom:4px}
.import-dialog p{font-size:.82rem;color:var(--text2);margin-bottom:14px}
.import-options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.import-option{padding:16px;border-radius:var(--radius);border:2px solid var(--border);cursor:pointer;transition:all .15s;text-align:center}
.import-option:hover{border-color:var(--primary);background:var(--primary-light)}
.import-option .io-icon{font-size:1.4rem;margin-bottom:6px}
.import-option .io-title{font-weight:600;font-size:.88rem;margin-bottom:3px}
.import-option .io-desc{font-size:.73rem;color:var(--text2)}
.import-loading{text-align:center;padding:24px;color:var(--text2)}
.import-loading .spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.prop-note-item{background:var(--input-bg);border-radius:var(--radius);padding:10px 14px;border-left:3px solid var(--info);margin-bottom:6px;position:relative}
.prop-note-item:hover .note-actions{opacity:1}
.prop-note-item .pn-date{font-size:.73rem;color:var(--text3);margin-bottom:3px}
.prop-note-item .pn-text{font-size:.88rem;line-height:1.5}
.prop-note-display{font-size:.85rem;line-height:1.5;max-height:12em;overflow:hidden;display:-webkit-box;-webkit-line-clamp:8;-webkit-box-orient:vertical;color:var(--text)}
.prop-note-display ul,.prop-note-display ol{margin:2px 0;padding-left:20px}
.prop-note-display ul ul,.prop-note-display ol ol{margin:0}
.prop-note-display li{margin:1px 0}
.prop-note-display ul{list-style-type:disc}
.prop-note-display ul ul{list-style-type:circle}
.prop-note-display ul ul ul{list-style-type:square}
.prop-note-display ul ul ul ul{list-style-type:'▫ '}
.prop-note-clickable{border-radius:var(--radius);padding:6px 10px;margin:-4px -6px;transition:background .15s}
.prop-note-clickable:hover{background:var(--primary-light)}
.profile-full{margin-bottom:16px}
.profile-section-title{font-size:.95rem;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.profile-contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:600px){.profile-contact-grid{grid-template-columns:1fr}}



/* ===== CSV IMPORT ===== */
.csv-preview{max-height:300px;overflow:auto;border:1px solid var(--border);border-radius:var(--radius);margin:12px 0}
.csv-preview table{width:100%;font-size:.78rem}
.csv-preview th{position:sticky;top:0;background:var(--surface);z-index:1}
.csv-preview td{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.csv-mapping{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin:12px 0}
.csv-mapping .arrow{color:var(--text3);font-size:.8rem}
.csv-mapping label{font-size:.78rem;font-weight:600;color:var(--text2)}
.csv-mapping select{font-size:.8rem;padding:5px 8px}
.csv-drop{border:2px dashed var(--border);border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer;transition:all .15s}
.csv-drop:hover,.csv-drop.dragover{border-color:var(--primary);background:var(--primary-light)}
.csv-drop input[type=file]{display:none}

/* ===== LOGIN / USER ===== */
.user-avatar{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid var(--border);transition:border-color .15s;object-fit:cover}
.user-avatar:hover{border-color:var(--primary)}
.login-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:var(--radius);font-size:.8rem;font-weight:500;background:var(--surface);border:1px solid var(--border);color:var(--text);cursor:pointer;transition:all .15s}
.login-btn:hover{border-color:var(--primary);color:var(--primary)}
.login-btn svg{width:16px;height:16px;flex-shrink:0}
.user-menu{position:absolute;top:100%;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.25);min-width:200px;z-index:300;display:none;overflow:hidden}
.user-menu.open{display:block}
.user-menu-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.user-menu-header img{width:32px;height:32px;border-radius:50%}
.user-menu-header .um-name{font-size:.85rem;font-weight:600}
.user-menu-header .um-email{font-size:.7rem;color:var(--text3)}
.user-menu-item{padding:10px 14px;font-size:.82rem;cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:8px}
.user-menu-item:hover{background:var(--primary-light)}
.user-menu-item svg{width:16px;height:16px;color:var(--text3)}


/* ===== EDITABLE HERO FIELDS ===== */
.hero-editable{position:relative;display:inline-flex;align-items:center;gap:6px;cursor:default}
.hero-editable .hero-edit-icon{opacity:0;transition:opacity .15s;color:var(--text3);flex-shrink:0}
.hero-editable:hover .hero-edit-icon{opacity:1}
.hero-editable:hover{cursor:pointer}
.hero-editable h1{margin-bottom:0}
.hero-rent{font-size:1.15rem;font-weight:700;color:var(--success);margin-top:2px;display:flex;align-items:center;gap:6px}
.hero-rent .no-rent{color:var(--text3);font-weight:400;font-size:.85rem}
.hero-edit-input{background:var(--input-bg);border:1px solid var(--primary);border-radius:var(--radius);padding:4px 10px;font-size:inherit;font-weight:inherit;font-family:inherit;color:var(--text);outline:none;width:100%}
.hero-edit-input:focus{box-shadow:0 0 0 3px rgba(79,110,247,.15)}
h1 .hero-edit-input{font-size:1.35rem}
.hero-rent .hero-edit-input{font-size:1.15rem;color:var(--success);max-width:160px}
.auto-import-warning{position:absolute;top:100%;left:0;background:var(--surface);border:1px solid var(--warning);border-radius:var(--radius);padding:10px 14px;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:50;min-width:280px;font-size:.8rem}
.auto-import-warning .aiw-title{font-weight:600;color:var(--warning);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.auto-import-warning .aiw-text{color:var(--text2);margin-bottom:8px;line-height:1.4}
.auto-import-warning .aiw-btns{display:flex;gap:6px}


/* ===== STATS EDIT ===== */
.hero-stats-wrap{position:relative;display:flex;align-items:center;gap:0;cursor:pointer;border-radius:var(--radius);padding:2px 4px;margin:-2px -4px;transition:background .15s}
.hero-stats-wrap:hover{background:var(--primary-light)}
.hero-stats-wrap .stats-edit-btn{opacity:0;transition:opacity .15s;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(--text3);cursor:pointer;flex-shrink:0;margin-left:4px;z-index:2}
.hero-stats-wrap:hover .stats-edit-btn{opacity:1}
.hero-stats-wrap .stats-edit-btn:hover{background:var(--primary-light);color:var(--primary)}
.stats-popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:250;display:flex;align-items:center;justify-content:center}
.stats-popup{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:0 12px 40px rgba(0,0,0,.3);width:420px;max-width:90vw;padding:20px 24px}
.stats-popup h3{font-size:1rem;font-weight:600;margin-bottom:4px}
.stats-popup .sp-desc{font-size:.8rem;color:var(--text2);margin-bottom:16px}
.stats-popup .sp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stats-popup .sp-field label{display:block;font-size:.7rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.stats-popup .sp-field input{font-size:.9rem;padding:7px 10px}
.stats-popup .sp-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* ===== ADDRESS AUTOCOMPLETE ===== */
.address-ac{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.25);max-height:240px;overflow-y:auto;z-index:300;display:none}
.address-ac.visible{display:block}
.address-ac-item{padding:8px 12px;font-size:.82rem;cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:8px}
.address-ac-item:hover,.address-ac-item.active{background:var(--primary-light)}
.address-ac-item svg{width:14px;height:14px;color:var(--text3);flex-shrink:0}
/* Google Places PAC dropdown styling */
.pac-container{background:var(--surface);border:1px solid var(--border);border-radius:0 0 8px 8px;box-shadow:0 8px 24px rgba(0,0,0,.25);font-family:inherit;z-index:9999;margin-top:0}
.pac-item{padding:8px 12px;font-size:.82rem;cursor:pointer;color:var(--text);border-top:1px solid var(--border)}
.pac-item:hover,.pac-item-selected{background:var(--primary-light)}
.pac-item-query{font-size:.82rem;color:var(--text);font-weight:500}
.pac-matched{font-weight:700;color:var(--primary)}
.pac-icon{display:none}
.pac-logo:after{display:none}

/* ===== HERO STATS ROW ===== */
.hero-stats{display:flex;align-items:center;gap:16px;margin-top:6px;flex-wrap:wrap}
.hero-stat{display:flex;align-items:center;gap:5px;font-size:.82rem;color:var(--text2)}
.hero-stat strong{font-weight:700;color:var(--text);font-size:.9rem}
.hero-rent-editable{border-radius:4px;padding:0 4px;margin:-0px -4px;transition:background .15s}
.hero-rent-editable:hover{background:rgba(99,129,250,.08)}
.hero-market-badge{position:absolute;top:12px;right:16px;display:flex;align-items:center;gap:5px;font-size:.78rem;color:var(--text2);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 12px;cursor:pointer;transition:all .15s;z-index:2;white-space:nowrap}
.hero-market-badge:hover{border-color:var(--primary);background:rgba(99,129,250,.04);color:var(--text)}
.hero-market-empty{border-style:dashed}
.hero-market-edit-wrap{position:absolute;top:12px;right:16px;display:flex;align-items:center;gap:6px;z-index:3;background:var(--surface);border:1px solid var(--primary);border-radius:20px;padding:4px 10px;box-shadow:0 0 0 2px rgba(99,129,250,.15)}
.hero-stat-divider{width:1px;height:16px;background:var(--border)}

/* ===== PROFILE TABS ===== */
.profile-tabs{display:flex;gap:4px;align-items:center;margin-left:auto;flex-shrink:0}
.profile-tab{padding:5px 12px;font-size:.78rem;font-weight:500;color:var(--text3);cursor:pointer;border-radius:var(--radius);border:1px solid var(--border);transition:all .15s;display:flex;align-items:center;gap:4px;white-space:nowrap;background:var(--surface)}
.profile-tab:hover{color:var(--text);background:var(--primary-light);border-color:var(--primary)}
.profile-tab.active{color:var(--primary);background:var(--primary-light);border-color:var(--primary);font-weight:500}
.profile-tab .tab-lock{font-size:.6rem;padding:1px 6px;border-radius:8px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.profile-tab .tab-lock.locked{background:rgba(148,163,184,.15);color:#94a3b8}
.profile-tab .tab-lock.basic{background:rgba(245,158,11,.15);color:#f59e0b}
.profile-tab .tab-lock.pro{background:rgba(16,185,129,.15);color:#10b981}
.profile-tabs-container{position:relative}
.tab-content{display:none;min-width:0}
.tab-content.active{display:block}

/* ===== LOCKED TAB OVERLAY ===== */
.tab-locked-overlay{text-align:center;padding:40px 20px}
.tab-locked-overlay .tlo-icon{font-size:2.5rem;margin-bottom:12px}
.tab-locked-overlay .tlo-title{font-size:1.1rem;font-weight:700;margin-bottom:6px}
.tab-locked-overlay .tlo-desc{font-size:.85rem;color:var(--text2);max-width:400px;margin:0 auto 16px}


/* ===== CALCULATOR TAB ===== */
.calc-layout{display:grid;grid-template-columns:2fr 3fr;gap:16px}
@media(max-width:900px){.calc-layout{grid-template-columns:1fr}}
.calc-panel{min-width:0}
.calc-section{margin-bottom:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.calc-section-header{font-size:.78rem;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;background:rgba(99,129,250,.06);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.calc-section-body{padding:6px 12px}
.nft-hint-q{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;border:1.5px solid var(--text3);font-size:.6rem;color:var(--text3);opacity:0;transition:opacity .2s;font-weight:700;line-height:1;flex-shrink:0}
.nft-title-row:hover .nft-hint-q{opacity:1}
.calc-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;gap:8px}
.calc-row+.calc-row{border-top:1px solid rgba(148,163,184,.06)}
.calc-row.total-row{border-top:2px solid var(--border);padding-top:6px;margin-top:2px}
.calc-row.total-row .calc-label{font-weight:700;color:var(--text)}
.calc-row.total-row .calc-val{font-weight:700;font-size:.85rem}
.calc-label{font-size:.85rem;color:var(--text2);flex:1;min-width:0;line-height:1.3}
.calc-label-hint{font-size:.65rem;color:var(--text3);font-style:italic;display:block}
.tip-label{cursor:default;display:inline}
.tip-label:hover{cursor:help}
.calc-val{width:110px;flex-shrink:0;text-align:right;display:flex;align-items:center;justify-content:flex-end;gap:0}
.pyn-col-headers{display:flex;align-items:flex-end;padding:8px 12px 0;gap:4px}
.pyn-label-spacer{flex:1;min-width:0}
.pyn-col-header{width:108px;flex-shrink:0;text-align:center;padding:6px 4px 4px;cursor:pointer;border-radius:6px 6px 0 0;transition:all .15s;position:relative;user-select:none}
.pyn-col-header:hover:not(.pyn-col-disabled){background:rgba(148,163,184,.08)}
.pyn-col-header.pyn-col-active{background:rgba(99,129,250,.06)}
.pyn-col-header.pyn-col-disabled{opacity:.4;cursor:default}
.pyn-col-label{font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--col-color)}
.pyn-col-active .pyn-col-label{font-size:.78rem}
.pyn-col-indicator{height:3px;background:var(--col-color);border-radius:3px 3px 0 0;margin:-1px -4px 0;position:absolute;bottom:0;left:4px;right:4px}
.pyn-body .calc-row{gap:4px}
.pyn-body .calc-label{font-size:.88rem}
.pyn-body .total-row .calc-label{font-size:.92rem}
.pyn-val{width:108px;text-align:center;justify-content:center;font-size:.88rem;transition:opacity .15s}
.pyn-val .calc-display{font-size:.88rem}
.pyn-val-active{background:rgba(99,129,250,.04);border-radius:4px}
.pyn-body .total-row .pyn-val{font-size:.94rem}
.calc-dollar-sign{font-size:.78rem;color:var(--text3);font-weight:500;margin-right:1px;flex-shrink:0}
.calc-pct-sign{font-size:.78rem;color:var(--text3);font-weight:500;margin-left:1px;flex-shrink:0}
.calc-editable{padding:0 6px;border-radius:4px;cursor:pointer;height:28px;line-height:28px;font-size:.82rem;transition:background .15s;display:flex;align-items:center;justify-content:flex-end;overflow:hidden;box-sizing:border-box;width:100%;font-variant-numeric:tabular-nums}
.calc-editable:hover{background:rgba(99,129,250,.08)}
.calc-inline-input{width:100%;padding:0 4px;border:1px solid var(--primary);border-radius:3px;font-size:.82rem;background:var(--surface);color:var(--text);text-align:right;font-family:inherit;box-sizing:border-box;-moz-appearance:textfield;height:26px;line-height:26px;outline:none;box-shadow:0 0 0 2px rgba(99,129,250,.15)}
.calc-inline-input::-webkit-outer-spin-button,.calc-inline-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.calc-val input{width:100%;text-align:right;padding:4px 6px;border:1px solid transparent;border-radius:4px;font-size:.82rem;background:transparent;color:var(--text);font-family:inherit;transition:all .15s;cursor:pointer}
.calc-val input:hover{border-color:var(--border);background:rgba(148,163,184,.06)}
.calc-val input:focus{border-color:var(--primary);outline:none;background:var(--surface);box-shadow:0 0 0 2px rgba(99,129,250,.15)}
.calc-val .calc-display{font-size:.82rem;color:var(--text);font-weight:500;padding:4px 6px;display:block}
.calc-val .calc-display.computed{color:var(--num-computed);font-weight:600}
.calc-val .calc-display.muted{color:var(--text3);font-size:.78rem}
.calc-pct{width:80px}
.calc-pct input{width:100%}
/* Summary boxes on right panel */
.calc-kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.calc-kpi-grid-left .calc-kpi{padding:12px 10px}
.calc-kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 16px;text-align:center}
.calc-kpi .kpi-label{font-size:.75rem;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);font-weight:600;margin-bottom:6px;display:flex;flex-direction:column;align-items:center;gap:3px}
.kpi-proj-tag{font-size:.58rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:1px 8px;border:1px solid;border-radius:10px;line-height:1.5;opacity:.85}
.calc-kpi .kpi-monthly{font-size:1.25rem;font-weight:700;color:var(--text);line-height:1.4}
.calc-kpi .kpi-per{font-size:.78rem;font-weight:400;color:var(--text3);margin-left:2px}
.calc-kpi .kpi-annual{font-size:.78rem;color:var(--text3);margin-top:6px}
.calc-kpi.positive .kpi-monthly{color:var(--num-success)}
.calc-kpi.negative .kpi-monthly{color:var(--num-danger)}
/* Payback table */
.payback-chart{display:flex;flex-direction:column;gap:4px}
.payback-row{display:flex;align-items:center;gap:6px;height:22px}
.payback-yr-label{width:28px;font-size:.68rem;font-weight:600;color:var(--text3);text-align:right;flex-shrink:0}
.payback-bar-track{flex:1;height:16px;position:relative;border-radius:3px;background:rgba(148,163,184,.06)}
.payback-zero-line{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--border);z-index:1}
.payback-bar{height:100%;border-radius:3px;transition:width .4s ease;position:absolute;top:0;min-width:2px}
.payback-bar-neg{right:50%;border-radius:3px 0 0 3px}
.payback-bar-pos{left:50%;border-radius:0 3px 3px 0}
.payback-val{width:70px;font-size:.72rem;font-weight:700;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
.payback-break-marker{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:.7rem;color:#f59e0b;z-index:2;filter:drop-shadow(0 0 2px rgba(0,0,0,.3))}
.payback-chart-compact .payback-row{height:18px;gap:4px}
.payback-chart-compact .payback-bar-track{height:12px}
.payback-chart-compact .payback-yr-label{white-space:nowrap;width:26px;font-size:.62rem}
.payback-chart-compact .payback-val{width:auto;min-width:0;font-size:.65rem;white-space:nowrap}
.payback-chart-compact{gap:2px}
/* Tip popup (click-to-open tooltips) */
.tip-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300;display:flex;align-items:center;justify-content:center;animation:tipFadeIn .15s ease}
@keyframes tipFadeIn{from{opacity:0}to{opacity:1}}
.tip-popup{background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.25);max-width:400px;width:90vw;padding:20px 22px 16px;animation:tipSlideUp .2s ease}
@keyframes tipSlideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.tip-popup-title{font-size:.88rem;font-weight:700;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.tip-popup-title svg{flex-shrink:0;color:var(--primary)}
.tip-popup-body{font-size:.8rem;line-height:1.55;color:var(--text2);margin-bottom:16px}
.tip-popup-actions{display:flex;justify-content:flex-end;gap:8px}
.tip-btn{padding:6px 14px;border-radius:var(--radius);font-size:.78rem;font-weight:600;cursor:pointer;border:none;transition:background .15s,color .15s}
.tip-btn-ok{background:var(--primary);color:#fff}
.tip-btn-ok:hover{filter:brightness(1.1)}
.tip-btn-disable{background:transparent;color:#fff;border:1px solid var(--border)}
.tip-btn-disable:hover{background:var(--bg);color:#fff}
/* Tip question mark icon */
/* Tip trigger: no visible element — cursor changes to ? on hover via inline style */
/* AI button */
.calc-ai-btn{display:inline-flex;align-items:center;gap:4px;font-size:.68rem;padding:2px 8px;border-radius:12px;border:1px solid rgba(16,185,129,.3);background:rgba(16,185,129,.08);color:#10b981;cursor:pointer;font-weight:600;transition:all .15s}
.calc-ai-btn:hover{background:rgba(16,185,129,.15);border-color:#10b981}
.calc-ai-btn.locked{opacity:.5;cursor:not-allowed;border-color:var(--border);background:rgba(148,163,184,.06);color:var(--text3)}
.calc-copy-btn{display:inline-flex;align-items:center;gap:4px;font-size:.68rem;padding:2px 8px;border-radius:12px;border:1px solid rgba(99,129,250,.3);background:rgba(99,129,250,.08);color:var(--primary);cursor:pointer;font-weight:600;transition:all .15s;margin-left:auto}
.calc-copy-btn:hover{background:rgba(99,129,250,.15);border-color:var(--primary)}
.calc-copy-btn.locked{opacity:.5;cursor:not-allowed;border-color:var(--border);background:rgba(148,163,184,.06);color:var(--text3)}
.copy-exp-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400;display:flex;align-items:center;justify-content:center}
.copy-exp-modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:420px;max-width:92vw;max-height:80vh;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3);display:flex;flex-direction:column}
.copy-exp-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.copy-exp-header h3{font-size:.95rem;font-weight:700;color:var(--text)}
.copy-exp-search{padding:12px 16px;border-bottom:1px solid var(--border)}
.copy-exp-search input{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--border);border-radius:var(--radius);background:var(--input-bg);color:var(--text);font-size:.85rem}
.copy-exp-search input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,110,247,.12);outline:none}
.copy-exp-search-wrap{position:relative}
.copy-exp-search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--text3)}
.copy-exp-results{flex:1;overflow-y:auto;max-height:320px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.copy-exp-results::-webkit-scrollbar{width:5px}
.copy-exp-results::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.copy-exp-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border)}
.copy-exp-item:last-child{border-bottom:none}
.copy-exp-item:hover,.copy-exp-item.active{background:var(--primary-light)}
.copy-exp-item-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0;background:var(--bg);color:var(--text3)}
.copy-exp-item-main{flex:1;min-width:0}
.copy-exp-item-title{font-size:.85rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.copy-exp-item-title mark{background:rgba(99,129,250,.25);color:var(--primary);border-radius:2px;padding:0 1px}
:root.light .copy-exp-item-title mark{background:#dbeafe;color:#1e40af}
.copy-exp-item-sub{font-size:.7rem;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.copy-exp-item-hint{font-size:.58rem;color:var(--text3);opacity:.5;white-space:nowrap;margin-left:8px}
.copy-exp-empty{padding:24px 16px;text-align:center;color:var(--text3);font-size:.85rem}

/* ===== ANALYSIS TAB ===== */
.an-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px}
.an-section-hdr{font-size:.88rem;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.5px;padding:10px 14px;background:rgba(99,129,250,.06);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.an-section-body{padding:12px 14px}
.an-top-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;align-items:stretch}
.an-top-grid .an-section{display:flex;flex-direction:column;margin-bottom:0}
.an-top-grid .an-section-body{flex:1;display:flex;flex-direction:column;justify-content:stretch}
.an-top-grid .an-req-bar{flex:1}
@media(max-width:900px){.an-top-grid{grid-template-columns:1fr}}
.an-field-row{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.an-field-label{font-size:.78rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;min-width:76px;padding-top:4px;flex-shrink:0}
.an-field-val{font-size:.92rem;color:var(--text);flex:1}
.an-field-val textarea{width:100%;padding:5px 8px;border:1px solid transparent;border-radius:4px;font-size:.9rem;background:transparent;color:var(--text);resize:vertical;font-family:inherit;min-height:30px;transition:border-color .15s}
.an-field-val textarea:hover{border-color:var(--border)}
.an-field-val textarea:focus{border-color:var(--primary);outline:none;background:var(--surface)}
/* Required Revenue bar */
.an-req-bar{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;font-size:.85rem}
.an-req-item{flex:1;text-align:center;padding:20px 10px;border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;gap:7px}
.an-req-item:last-child{border-right:none}
.an-req-item.total{background:rgba(99,129,250,.06)}
.an-req-item .req-label{font-size:.8rem;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);font-weight:600}
.an-req-item .req-val{font-size:1.1rem;font-weight:700;color:var(--text)}
.an-req-item .req-period{font-size:.8rem;font-weight:400;color:var(--text3);margin-left:2px}
.an-req-item .req-annual{font-size:.82rem;color:var(--text3)}
.an-req-item .req-yr{font-size:1.1rem;font-weight:700;color:var(--text)}
.an-req-item .req-mo{font-size:.82rem;color:var(--text3)}
/* Comp add */
.comp-add-row{display:flex;gap:8px;margin-top:10px}
.comp-add-row input{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:.9rem;background:var(--surface);color:var(--text)}
.comp-add-row input:focus{border-color:var(--primary);outline:none}
.comp-add-row button{padding:8px 16px;border-radius:var(--radius);border:none;background:var(--primary);color:#fff;font-size:.85rem;font-weight:600;cursor:pointer;white-space:nowrap}
.comp-add-row button:hover{opacity:.9}
/* Comp table */
.comp-table-wrap{overflow-x:auto;margin-bottom:10px}
.comp-table{width:100%;border-collapse:collapse;font-size:.82rem}
.comp-table th{padding:6px 8px;text-align:center;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;border-bottom:2px solid var(--border);font-size:.68rem;white-space:nowrap}
.comp-table td{padding:4px 6px;border-bottom:1px solid rgba(148,163,184,.08);vertical-align:middle;text-align:center;font-variant-numeric:tabular-nums;height:36px;box-sizing:border-box}
.comp-table tr:hover{background:rgba(99,129,250,.04)}
.comp-link-cell{text-align:center !important;padding:0 !important}
