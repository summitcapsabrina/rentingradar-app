  const temps = [
    { key:'no-go', label:'No-Go', icon:'🚫', color:'#ef4444', desc:'This deal likely loses money after accounting for competitive position.', hint:'After factoring in your competitive positioning against nearby competitors, this property may not be able to cover its operating costs — every month held could increase cumulative losses and tie up capital that might be better deployed elsewhere.'+_profReqNote },
    { key:'risky', label:'Risky', icon:'⚠️', color:'#f59e0b', desc:'Thin margins that may leave little room for unexpected costs or vacancies.', hint:'While potentially profitable, margins this thin suggest that a single slow month, unexpected repair, or seasonal vacancy could push the deal into negative territory — consider proceeding only with a strong contingency reserve.'+_profReqNote },
    { key:'potential', label:'Potential', icon:'🔥', color:'#3b82f6', desc:'Solid estimated returns with reasonable margin of safety.', hint:'This property may generate healthy cash flow with enough cushion to help absorb typical vacancy gaps and maintenance surprises, while still potentially delivering a meaningful return on invested capital.'+_profReqNote },
    { key:'slam-dunk', label:'Slam-Dunk', icon:'🏆', color:'#10b981', desc:'Potentially strong returns even after competitive position discount.', hint:'Even after discounting for competitive pressure, this deal may deliver strong monthly cash flow — the kind of margin that should help accelerate payback, could fund portfolio growth, and might better withstand market downturns.'+_profReqNote }
  ];
  dealHtml += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px' + (insufficientComps ? ';opacity:.5' : '') + '">';
  temps.forEach(t => {
    const active = dealTemp === t.key;
    const bg = active ? t.color : 'var(--surface)';
    const border = active ? t.color : 'var(--border)';
    const textColor = active ? '#fff' : 'var(--text3)';
    const opacity = active ? '1' : '0.5';
    dealHtml += '<div onclick="showTip(\''+t.label+'\',\''+t.hint.replace(/'/g,'\\x27')+'\')" style="background:'+bg+';border:2px solid '+border+';border-radius:var(--radius);padding:10px 8px 8px;text-align:center;opacity:'+opacity+';transition:all .2s;cursor:help">';
    dealHtml += '<div style="font-size:1.5rem;margin-bottom:4px">'+t.icon+'</div>';
    dealHtml += '<div style="font-size:.88rem;font-weight:700;color:'+textColor+'">'+t.label+'</div>';
    dealHtml += '<div style="font-size:.68rem;color:'+textColor+';opacity:.8;margin-top:3px">'+t.desc+'</div>';
    dealHtml += '</div>';
  });
  dealHtml += '</div>';

  // Deal Temperature Gauge — continuous bar showing exactly where the adjusted value falls
  if(!insufficientComps){
    // Gauge range: dynamic based on profit requirement
    // Zone boundaries: $0 at 25%, half-profitReq at 50%, profitReq at 75%
    const gaugeMin = -_dtHalf, gaugeMax = _dtProfitReq + _dtHalf, gaugeSpan = gaugeMax - gaugeMin;
    const clampedVal = Math.max(gaugeMin, Math.min(gaugeMax, dealMonthlyNet));
    const gaugePct = ((clampedVal - gaugeMin) / gaugeSpan * 100).toFixed(1);
    // Zone percentages: No-Go 0-25%, Risky 25-50%, Potential 50-75%, Slam-Dunk 75-100%
    const zoneBreaks = [
      { pct: 25, color: '#ef4444' },  // No-Go: -half to $0
      { pct: 50, color: '#f59e0b' },  // Risky: $0 to half
      { pct: 75, color: '#3b82f6' },  // Potential: half to profitReq
      { pct: 100, color: '#10b981' }  // Slam-Dunk: profitReq to profitReq+half
    ];

    // Determine marker color based on which zone it's in
    const markerColor = dealMonthlyNet >= _dtProfitReq ? '#10b981' : dealMonthlyNet >= _dtHalf ? '#3b82f6' : dealMonthlyNet > 0 ? '#f59e0b' : '#ef4444';

    dealHtml += '<div style="margin-bottom:6px">';
    // Gauge track — 4 colored zone segments (horizontal orientation)
    dealHtml += '<div style="position:relative;width:100%;height:40px;margin-bottom:2px">';
    dealHtml += '<div style="position:absolute;top:10px;left:0;width:100%;height:18px;border-radius:9px;overflow:hidden;display:flex">';
    let prevPct = 0;
    zoneBreaks.forEach(z => {
      const w_zone = z.pct - prevPct;
      dealHtml += '<div style="width:'+w_zone+'%;height:100%;background:'+z.color+';opacity:.18"></div>';
      prevPct = z.pct;
    });
    dealHtml += '</div>';
    // Active fill — clips a full-width zone bar at the marker position
    const clipRight = (100 - parseFloat(gaugePct)).toFixed(1);
    dealHtml += '<div style="position:absolute;top:10px;left:0;width:100%;height:18px;border-radius:9px;overflow:hidden;display:flex;clip-path:inset(0 '+clipRight+'% 0 0)">';
    let prevPct2 = 0;
    zoneBreaks.forEach(z => {
      const w_zone = z.pct - prevPct2;
      dealHtml += '<div style="width:'+w_zone+'%;height:100%;background:'+z.color+';opacity:.55"></div>';
      prevPct2 = z.pct;
    });
    dealHtml += '</div>';
    // Marker circle — color matches current zone
    dealHtml += '<div style="position:absolute;top:calc(50% - 15px);left:calc('+gaugePct+'% - 15px);width:30px;height:30px;border-radius:50%;background:'+markerColor+';border:3px solid var(--surface);box-shadow:0 2px 8px rgba(0,0,0,.35);transition:left .3s"></div>';
    dealHtml += '</div>';

    // Zone boundary labels (horizontal)
    dealHtml += '<div style="position:relative;width:100%;margin-top:1px;margin-bottom:4px;display:flex;justify-content:space-between;font-size:.68rem;color:var(--text3)">';
    dealHtml += '<div>'+fmtMoney(-_dtHalf)+'</div>';
    dealHtml += '<div>$0</div>';
    dealHtml += '<div>'+fmtMoney(_dtHalf)+'</div>';
    dealHtml += '<div>'+fmtMoney(_dtProfitReq)+'</div>';
    dealHtml += '<div>'+fmtMoney(_dtProfitReq + _dtHalf)+'+</div>';
    dealHtml += '</div>';
    dealHtml += '</div>';

  } else {
    // Grey placeholder gauge
    dealHtml += '<div style="margin-bottom:6px;opacity:.4">';
    dealHtml += '<div style="position:relative;width:100%;height:40px;margin-bottom:2px">';
    dealHtml += '<div style="position:absolute;top:10px;left:0;width:100%;height:18px;border-radius:9px;overflow:hidden;display:flex">';
    dealHtml += '<div style="width:100%;height:100%;background:rgba(148,163,184,.15)"></div>';
    dealHtml += '</div>';
    dealHtml += '</div>';
    // Zone labels
    dealHtml += '<div style="position:relative;width:100%;margin-top:1px;margin-bottom:4px;display:flex;justify-content:space-between;font-size:.68rem;color:var(--text3)">';
    dealHtml += '<div>'+fmtMoney(-_dtHalf)+'</div><div>$0</div><div>'+fmtMoney(_dtHalf)+'</div><div>'+fmtMoney(_dtProfitReq)+'</div><div>'+fmtMoney(_dtProfitReq+_dtHalf)+'+</div>';
    dealHtml += '</div>';
    dealHtml += '</div>';
    dealHtml += '<div style="text-align:center;font-size:.62rem;color:var(--text3);font-style:italic;margin-bottom:6px">'+dealSource+'</div>';
  }

  // ══════ ASSEMBLE PANELS ══════
  // LEFT PANEL: KPIs + Competitive Position
  h += '<div class="calc-panel">';
  h += kpiHtml;
  h += cpHtml;
  h += '</div>';

  // RIGHT PANEL: PYN + Deal Temperature
  h += '<div class="calc-panel">';
  h += pynHtml;
  h += dealHtml;
  h += '</div>';

  h += '</div>'; // end calc-layout

  // FULL WIDTH: Payback Period (below the grid)
  h += paybackHtml;

  return h;
}


// ══════════════════════════════════════════
// NEGOTIATION TOOLS TAB — separate from Projected ROI
// ══════════════════════════════════════════
function renderNegotiationTab(r){
  const v = calcComputeAll(r);
  const c = v.c;

  // Recompute the necessary values from the calculator
  const modeMap = { optimistic: v.optimisticD, realistic: v.projectedD, pessimistic: v.pessimisticD };
  const selectedD = v.hasProjectionData && modeMap[calcProjMode] ? modeMap[calcProjMode] : (v.hasProjectionData ? v.projectedD : { monthlyNOI: v.monthlyNOI, annualNOI: v.annualNOI, monthlyCF: v.monthlyCF, annualCF: v.annualCF, cocReturn: v.cocReturn });
  const confidence = 0.55 + 0.45 * ((v.positionScore + 1) / 2);
  const confidencePct = Math.round(confidence * 100);
  const _pynAnnualRent = Math.round(v.monthlyRent * 12);
  const _pynRev = v.hasProjectionData ? Math.round(calcProjMode === 'optimistic' ? v.optimisticRevenue : calcProjMode === 'pessimistic' ? v.pessimisticRevenue : v.projectedRevenue) : 0;
  const _pynExp = v.hasProjectionData ? Math.round((calcProjMode === 'optimistic' ? v.optimisticD : calcProjMode === 'pessimistic' ? v.pessimisticD : v.projectedD).annualExp) : 0;
  const _pynNet = v.hasProjectionData ? (_pynRev - _pynExp - _pynAnnualRent) : 0;
  const _pynMonthlyNet = v.hasProjectionData ? Math.round(_pynNet / 12) : Math.round(selectedD.monthlyCF);
  const kpiMonthlyCF = Math.round(_pynMonthlyNet * confidencePct / 100);
  const kpiAnnualCF = kpiMonthlyCF * 12;
  const inv = v.totalInvested;
  const acf = kpiAnnualCF;
  const insufficientComps = v.compsCount < 3;

  // Projection columns for mode selection
  const cols = [
    { key:'pessimistic', label:'Pessimistic', color:'var(--num-danger)', rev: Math.round(v.pessimisticRevenue || 0) , exp: Math.round((v.pessimisticD||{}).annualExp||0) },
    { key:'realistic', label:'Realistic', color:'var(--num-computed)', rev: Math.round(v.projectedRevenue || 0), exp: Math.round((v.projectedD||{}).annualExp||0) },
    { key:'optimistic', label:'Optimistic', color:'var(--num-success)', rev: Math.round(v.optimisticRevenue || 0), exp: Math.round((v.optimisticD||{}).annualExp||0) }
  ];

  const _dtAn = (r.details && r.details.analysis) || {};
  const _dtProfitReq = parseFloat(_dtAn.profitRequirement) || 1000;
  const _dtHalf = Math.round(_dtProfitReq * 0.5);

  const _raRent = v.monthlyRent;
  const _raExp = v.totalMonthlyExp;
  const _raPR = _dtProfitReq;
  const _raPRHalf = _dtHalf;
  const _raAcf = acf;
  const _raInv = inv;
  const _raCF = kpiMonthlyCF;
  const _raConfPct = confidencePct;
  const _raHasData = !insufficientComps && v.hasProjectionData;
  const _raSelectedCol = cols.find(c => c.key === calcProjMode) || cols[1];

  let h = '';

  // Helper: compute deal temp color for a given monthly net
  function _dtColorFor(mn){ return mn >= _raPR ? '#10b981' : mn >= _raPRHalf ? '#3b82f6' : mn > 0 ? '#f59e0b' : '#ef4444'; }
  function _dtLabelFor(mn){ return mn >= _raPR ? 'Slam-Dunk' : mn >= _raPRHalf ? 'Potential' : mn > 0 ? 'Risky' : 'No-Go'; }
  function _dtIconFor(mn){ return mn >= _raPR ? '🏆' : mn >= _raPRHalf ? '🔥' : mn > 0 ? '⚠️' : '🚫'; }

  // Helper: compute adjusted monthly net for a given rent
  function _calcAdjNet(rent){
    if(!_raHasData) return 0;
    const col = _raSelectedCol;
    const annualRent = Math.round(rent * 12);
    const net = col.rev - col.exp - annualRent;
    const monthlyNet = Math.round(net / 12);
    return Math.round(monthlyNet * _raConfPct / 100);
  }

  // Helper: compute payback years for given investment + annual CF
  function _calcPayback(investment, annualCF){
    if(investment <= 0) return null;
    if(annualCF <= 0) return null;
    const yrs = investment / annualCF;
    return yrs <= 10 ? yrs : null;
  }
  function _fmtPayback(yrs){
    if(yrs === null) return '10+ yrs';
    const y = Math.floor(yrs);
    const m = Math.round((yrs - y) * 12);
    if(y === 0) return m + 'mo';
    return y + 'y ' + m + 'm';
  }

  // ── Forecast mode selector (single set, syncs with Projected ROI tab) ──
  const _nftModeLabels = {pessimistic:'Pessimistic',realistic:'Realistic',optimistic:'Optimistic'};
  const _nftModeColors = {pessimistic:'var(--num-danger)',realistic:'var(--num-computed)',optimistic:'var(--num-success)'};
  h += '<div class="calc-section" style="margin-top:0"><div class="calc-section-body" style="padding:0">';
  h += '<div class="nft-mode-bar">';
  ['pessimistic','realistic','optimistic'].forEach(m => {
    const active = m === calcProjMode;
    h += '<div class="nft-mode-col'+(active?' nft-mode-active':'')+'" style="--col-color:'+_nftModeColors[m]+'" onclick="setCalcProjMode(\''+m+'\')">';
    h += '<span class="nft-mode-label">'+_nftModeLabels[m]+'</span>';
    if(active) h += '<div class="nft-mode-indicator"></div>';
    h += '</div>';
  });
  h += '</div>';
  h += '</div></div>';

  // ── Tool cards: Rent Adjustment + Rental Concessions ──
  h += '<div class="calc-section" style="margin-top:0"><div class="calc-section-body" style="padding:0">';
  h += '<div style="display:flex;flex-wrap:wrap">';
  h += '<div style="flex:1;min-width:300px;padding:14px 16px 14px;text-align:center;border-right:1px solid var(--border)">';
  h += '<div class="nft-title-row" style="font-size:.82rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;display:inline-flex;align-items:center;gap:5px;cursor:help"'+tipAttrs('Rent Adjustment','Drag the dial or click the amount to explore what rent would make this deal attractive. This is a projection tool — it does NOT change the actual rent.',true)+'>Rent Adjustment<span class="nft-hint-q">?</span></div>';
  h += '</div>';
  h += '<div style="flex:1;min-width:280px;padding:14px 16px 14px;text-align:center">';
  h += '<div class="nft-title-row" style="font-size:.82rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;display:inline-flex;align-items:center;gap:5px;cursor:help"'+tipAttrs('Rental Concessions','Negotiate free rent weeks to reduce your upfront investment and accelerate break-even. 6–8 weeks is a common target for rental arbitrage.',true)+'>Rental Concessions<span class="nft-hint-q">?</span></div>';
  h += '</div>';
  h += '</div>'; // end title row

  h += '<div style="display:flex;flex-wrap:wrap;height:480px;overflow:hidden;border-top:1px solid var(--border)">';

  // ════════════ LEFT HALF: Rent Adjustment ════════════
  h += '<div style="flex:1;min-width:300px;padding:12px 16px;text-align:center;border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:center">';

  if(!_raHasData || !_raRent){
    h += '<div style="color:var(--text3);font-size:.9rem;padding:18px 0">Set monthly rent and add at least 3 competitors to use the dial</div>';
  } else {
    // Compute zone boundary rents — with safety guards
    function _rentForTarget(target){
      const col = _raSelectedCol;
      if(!col || !col.rev || _raConfPct <= 0) return 0;
      const rawMonthly = target * 100 / _raConfPct;
      const rent = (col.rev - col.exp - rawMonthly * 12) / 12;
      if(!isFinite(rent) || isNaN(rent)) return 0;
      return Math.max(0, Math.round(rent));
    }
    let rentSlamDunk = _rentForTarget(_raPR);
    let rentPotential = _rentForTarget(_raPRHalf);
    const rentRisky = _rentForTarget(1);
    let rentNoGo = _rentForTarget(0);
    // Ensure boundaries are in ascending order (SlamDunk ≤ Potential ≤ NoGo)
    if(rentPotential < rentSlamDunk) rentPotential = rentSlamDunk;
    if(rentNoGo < rentPotential) rentNoGo = rentPotential;
    // Cap all boundaries at current rent
    rentSlamDunk = Math.min(rentSlamDunk, _raRent);
    rentPotential = Math.min(rentPotential, _raRent);
    rentNoGo = Math.min(rentNoGo, _raRent);

    // Dial range: $0 (left, best) to current rent (right, worst)
    const dW = 380, dH = 210, dCx = 190, dCy = 185, dR = 145;
    const rentDialMin = 0;
    const rentDialMax = _raRent;
    const rentDialRange = rentDialMax - rentDialMin || 1;

    // Current dial state
    const dialRent = _rentDialPreview[r.id] !== undefined ? _rentDialPreview[r.id] : _raRent;
    const adjNetDial = _calcAdjNet(dialRent);
    const dtColDial = _dtColorFor(adjNetDial);
    const dtLblDial = _dtLabelFor(adjNetDial);
    const dtIcoDial = _dtIconFor(adjNetDial);

    const needlePct = Math.max(0, Math.min(1, (dialRent - rentDialMin) / rentDialRange));

    // Zone boundary positions on the arc (0=left/$0, 1=right/maxRent)
    const zBoundSlamDunk = Math.max(0, Math.min(1, (rentSlamDunk - rentDialMin) / rentDialRange));
    const zBoundPotential = Math.max(0, Math.min(1, (rentPotential - rentDialMin) / rentDialRange));
    const zBoundNoGo = Math.max(0, Math.min(1, (rentNoGo - rentDialMin) / rentDialRange));

    // Store dial config for drag handler
    const _rdCol = _raSelectedCol;
    h += '<div id="rentDialConfig_'+r.id+'" data-min="'+rentDialMin+'" data-max="'+rentDialMax+'" data-cx="'+dCx+'" data-cy="'+dCy+'" data-r="'+dR+'" data-w="'+dW+'" data-rev="'+_rdCol.rev+'" data-exp="'+_rdCol.exp+'" data-conf="'+_raConfPct+'" data-currentrent="'+_raRent+'" style="display:none"></div>';

    h += '<svg id="rentDial_'+r.id+'" viewBox="0 0 '+dW+' '+dH+'" style="display:block;width:100%;margin:0 auto;cursor:pointer;touch-action:none">';

    // Colored arc segments mapped to actual zone boundaries
    const arcZones = [
      { color: '#10b981', start: 0, end: zBoundSlamDunk },
      { color: '#3b82f6', start: zBoundSlamDunk, end: zBoundPotential },
      { color: '#f59e0b', start: zBoundPotential, end: zBoundNoGo },
      { color: '#ef4444', start: zBoundNoGo, end: 1 }
    ];
    // If all zone boundaries are 0 or equal, draw a single full arc in the worst-zone color
    const _allZonesCollapsed = zBoundSlamDunk <= 0 && zBoundPotential <= 0 && zBoundNoGo <= 0;
    if(_allZonesCollapsed){
      const a1 = Math.PI, a2 = 2 * Math.PI;
      const x1 = dCx + dR * Math.cos(a1), y1 = dCy + dR * Math.sin(a1);
      const x2 = dCx + dR * Math.cos(a2), y2 = dCy + dR * Math.sin(a2);
      h += '<path d="M'+x1.toFixed(1)+','+y1.toFixed(1)+' A'+dR+','+dR+' 0 1,1 '+x2.toFixed(1)+','+(y2-0.01).toFixed(1)+'" fill="none" stroke="#ef4444" stroke-width="28" opacity=".7"/>';
    } else {
      arcZones.forEach(z => {
        if(z.end <= z.start) return;
        const a1 = Math.PI + z.start * Math.PI;
        const a2 = Math.PI + z.end * Math.PI;
        const x1 = dCx + dR * Math.cos(a1), y1 = dCy + dR * Math.sin(a1);
        const x2 = dCx + dR * Math.cos(a2), y2 = dCy + dR * Math.sin(a2);
        if(!isFinite(x1)||!isFinite(y1)||!isFinite(x2)||!isFinite(y2)) return;
        // large-arc-flag is always 0: our full dial is a 180° semicircle, so no single zone can exceed 180°
        h += '<path d="M'+x1.toFixed(1)+','+y1.toFixed(1)+' A'+dR+','+dR+' 0 0,1 '+x2.toFixed(1)+','+y2.toFixed(1)+'" fill="none" stroke="'+z.color+'" stroke-width="28" opacity=".7"/>';
      });
    }

    // Edge labels: $0 at left, current rent at right
    h += '<text x="'+(dCx - dR - 14)+'" y="'+(dCy + 16)+'" text-anchor="start" fill="var(--text)" font-size="11" font-weight="700">$0</text>';
    h += '<text x="'+(dCx + dR + 14)+'" y="'+(dCy + 16)+'" text-anchor="end" fill="var(--text)" font-size="11" font-weight="700">$'+_raRent.toLocaleString()+'</text>';

    // Interior boundary labels + ticks
    const innerBoundaryPcts = [zBoundSlamDunk, zBoundPotential, zBoundNoGo];
    const innerBoundaryRents = [rentSlamDunk, rentPotential, rentNoGo];
    if(!_allZonesCollapsed) innerBoundaryPcts.forEach((pct, i) => {
      if(!isFinite(pct) || pct <= 0.04 || pct >= 0.96) return;
      const angle = Math.PI + pct * Math.PI;
      const lR = dR + 28;
      const lx = dCx + lR * Math.cos(angle);
      const ly = dCy + lR * Math.sin(angle);
      const anchor = pct < 0.3 ? 'start' : pct > 0.7 ? 'end' : 'middle';
      h += '<text x="'+lx.toFixed(1)+'" y="'+ly.toFixed(1)+'" text-anchor="'+anchor+'" fill="var(--text)" font-size="11" font-weight="700">$'+innerBoundaryRents[i].toLocaleString()+'</text>';
      const t1R = dR - 14, t2R = dR + 14;
      const tx1 = dCx + t1R * Math.cos(angle), ty1 = dCy + t1R * Math.sin(angle);
      const tx2 = dCx + t2R * Math.cos(angle), ty2 = dCy + t2R * Math.sin(angle);
      h += '<line x1="'+tx1.toFixed(1)+'" y1="'+ty1.toFixed(1)+'" x2="'+tx2.toFixed(1)+'" y2="'+ty2.toFixed(1)+'" stroke="var(--text)" stroke-width="2" opacity=".5"/>';
    });

    // Zone name labels
    const zoneLabelDefs = [
      {name:'Slam-Dunk',color:'#10b981',start:0,end:zBoundSlamDunk},
      {name:'Potential',color:'#3b82f6',start:zBoundSlamDunk,end:zBoundPotential},
      {name:'Risky',color:'#f59e0b',start:zBoundPotential,end:zBoundNoGo},
      {name:'No-Go',color:'#ef4444',start:zBoundNoGo,end:1}
    ];
    zoneLabelDefs.forEach(z => {
      const span = z.end - z.start;
      if(span < 0.06) return;
      const mid = z.start + span / 2;
      const angle = Math.PI + mid * Math.PI;
      const lr = dR - 36;
      const lx = dCx + lr * Math.cos(angle);
      const ly = dCy + lr * Math.sin(angle);
      h += '<text x="'+lx.toFixed(1)+'" y="'+ly.toFixed(1)+'" text-anchor="middle" fill="'+z.color+'" font-size="11" font-weight="800">'+z.name+'</text>';
    });

    // Arrow needle — black for visibility in both light and dark mode
    const nLen = dR - 10;
    const needleAngle = Math.PI + needlePct * Math.PI;
    const tipLen = 20, tipW = 8;
    const tipX = dCx + (nLen + tipLen * 0.3) * Math.cos(needleAngle);
    const tipY = dCy + (nLen + tipLen * 0.3) * Math.sin(needleAngle);
    const perpAngle = needleAngle + Math.PI / 2;
    const baseX1 = dCx + (nLen - tipLen) * Math.cos(needleAngle) + tipW * Math.cos(perpAngle);
    const baseY1 = dCy + (nLen - tipLen) * Math.sin(needleAngle) + tipW * Math.sin(perpAngle);
    const baseX2 = dCx + (nLen - tipLen) * Math.cos(needleAngle) - tipW * Math.cos(perpAngle);
    const baseY2 = dCy + (nLen - tipLen) * Math.sin(needleAngle) - tipW * Math.sin(perpAngle);
    h += '<line class="dial-needle-body" x1="'+dCx+'" y1="'+dCy+'" x2="'+(dCx + (nLen - tipLen) * Math.cos(needleAngle)).toFixed(1)+'" y2="'+(dCy + (nLen - tipLen) * Math.sin(needleAngle)).toFixed(1)+'" stroke="var(--text)" stroke-width="3.5" stroke-linecap="round"/>';
    h += '<polygon class="dial-needle-arrow" points="'+tipX.toFixed(1)+','+tipY.toFixed(1)+' '+baseX1.toFixed(1)+','+baseY1.toFixed(1)+' '+baseX2.toFixed(1)+','+baseY2.toFixed(1)+'" fill="var(--text)" stroke="rgba(0,0,0,.25)" stroke-width=".5"/>';
    h += '<circle class="dial-hub" cx="'+dCx+'" cy="'+dCy+'" r="10" fill="var(--text)" stroke="rgba(0,0,0,.2)" stroke-width="1.5"/>';
    h += '<circle cx="'+dCx+'" cy="'+dCy+'" r="4" fill="var(--surface)"/>';
    h += '<circle cx="'+dCx+'" cy="'+dCy+'" r="'+dR+'" fill="transparent" id="rentDialHitArea_'+r.id+'" style="cursor:grab"/>';

    h += '</svg>';

    clearTimeout(window._rentDialInitTimer);
    window._rentDialInitTimer = setTimeout(function(){ _initRentDialDrag(r.id); }, 10);

    // Readout — clickable rent to type a value
    h += '<div id="rentDialReadout_'+r.id+'" style="margin:6px 0 4px">';
    h += '<div onclick="openRentDialInput(\''+r.id+'\')" style="font-size:1.6rem;font-weight:800;color:var(--text);cursor:pointer;display:inline-block;border-bottom:2px dashed var(--border);padding-bottom:2px" title="Click to type a rent amount">'+fmtMoney(dialRent)+'/mo</div>';
    h += '<div style="font-size:.95rem;font-weight:700;color:'+dtColDial+'">'+dtIcoDial+' '+dtLblDial+' · '+fmtMoney(adjNetDial)+'/mo net</div>';
    h += '</div>';

    h += '<div style="font-size:.65rem;color:var(--text3);margin-top:6px;font-style:italic;text-align:center;opacity:.7">Click amount or drag dial · Projection only</div>';
  }
  h += '</div>'; // end left half

  // ════════════ RIGHT HALF: Rental Concessions ════════════
  h += '<div style="flex:1;min-width:280px;padding:14px 18px">';

  if(!_raHasData || _raInv <= 0 || _raAcf <= 0){
    h += '<div style="color:var(--text3);font-size:.82rem;text-align:center;padding:12px 0">Add at least 3 competitors and investment details to see concession comparison</div>';
  } else {
    // Use dial preview rent for concession calcs if available
    const _conRent = _rentDialPreview[r.id] !== undefined ? _rentDialPreview[r.id] : _raRent;
    const _conWRaw = getAnalysis(r).concessionWeeks;
    const conW = _conWRaw !== undefined ? parseFloat(_conWRaw) : 6;
    const conSavings = Math.round((_conRent / 4) * conW);
    // Recalculate investment + ACF using dial rent
    const _conAdjNet = _calcAdjNet(_conRent);
    const _conAnnualCF = _conAdjNet * 12;
    const adjInvB = Math.max(0, _raInv - conSavings);
    const pbBefore = _calcPayback(_raInv, _conAnnualCF);
    const pbAfter = _calcPayback(adjInvB, _conAnnualCF);
    const savedMonths = pbBefore !== null && pbAfter !== null ? Math.round((pbBefore - pbAfter) * 12) : 0;

    // Weeks selector — inline: − [X weeks] +
    h += '<div style="display:flex;flex-direction:column;align-items:center;margin-bottom:16px">';
    h += '<div style="display:flex;align-items:center;gap:8px">';
    h += '<button class="btn btn-secondary" style="padding:4px 14px;font-size:.8rem;min-width:34px;font-weight:700'+(conW<=0?';opacity:.35;pointer-events:none':'')+'" onclick="adjustConcessionWeeks(\''+r.id+'\',-1)">−</button>';
    h += '<div onclick="editConcessionWeeks(\''+r.id+'\')" style="cursor:pointer;background:var(--primary);color:#fff;padding:5px 18px;border-radius:20px;font-size:.9rem;font-weight:700;white-space:nowrap">'+conW+' week'+(conW!==1?'s':'')+'</div>';
    h += '<button class="btn btn-secondary" style="padding:4px 14px;font-size:.8rem;min-width:34px;font-weight:700'+(conW>=12?';opacity:.35;pointer-events:none':'')+'" onclick="adjustConcessionWeeks(\''+r.id+'\',1)">+</button>';
    h += '</div>';
    const _savColor = savedMonths > 0 ? '#10b981' : 'var(--text3)';
    h += '<div style="font-size:.72rem;color:'+_savColor+';font-weight:700;margin-top:8px">'+savedMonths+' mo faster · Saves '+fmtMoney(conSavings)+'</div>';
    h += '</div>';

    // Before / After cards
    h += '<div style="display:flex;gap:10px;align-items:stretch">';
    h += '<div style="flex:1;background:var(--bg);border-radius:var(--radius);padding:18px 14px;text-align:center;border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center">';
    h += '<div style="font-size:.66rem;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);margin-bottom:10px">Without Concessions</div>';
    h += '<div style="font-size:1.35rem;font-weight:800;color:var(--text)">'+_fmtPayback(pbBefore)+'</div>';
    h += '<div style="font-size:.72rem;color:var(--text3);margin-top:8px">to break even</div>';
    h += '<div style="font-size:.78rem;color:var(--text3);margin-top:10px;font-weight:600">Investment: '+fmtMoney(_raInv)+'</div>';
    h += '</div>';
    h += '<div style="display:flex;align-items:center;padding:0 4px"><div style="font-size:1.3rem;color:var(--text3)">→</div></div>';
    h += '<div style="flex:1;background:var(--bg);border-radius:var(--radius);padding:18px 14px;text-align:center;border:2px solid #10b981;display:flex;flex-direction:column;align-items:center;justify-content:center">';
    h += '<div style="font-size:.66rem;text-transform:uppercase;letter-spacing:.4px;color:#10b981;margin-bottom:10px">With '+conW+' Week'+(conW!==1?'s':'')+' Free</div>';
    h += '<div style="font-size:1.35rem;font-weight:800;color:#10b981">'+_fmtPayback(pbAfter)+'</div>';
    h += '<div style="font-size:.72rem;color:var(--text3);margin-top:8px">to break even</div>';
    h += '<div style="font-size:.78rem;color:var(--text3);margin-top:10px;font-weight:600">Effective: '+fmtMoney(adjInvB)+'</div>';
    h += '</div>';
    h += '</div>';

    // ── Break-Even Comparison Chart ──
    h += '<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:8px">';

    // Compute cumulative cash flow arrays for 5 years (plotted yearly)
    // Without concessions: start at -investment, add annual CF each year
    const _beCumWithout = [];
    let _beRunW = -_raInv;
    _beCumWithout.push(_beRunW);
    for(let y=1;y<=5;y++){ _beRunW += _conAnnualCF; _beCumWithout.push(_beRunW); }

    // With concessions: start at -(investment - savings), add annual CF each year
    const _beCumWith = [];
    let _beRunC = -adjInvB;
    _beCumWith.push(_beRunC);
    for(let y=1;y<=5;y++){ _beRunC += _conAnnualCF; _beCumWith.push(_beRunC); }

    // Find break-even years for both lines
    function _beFindBE(cum){
      for(let y=1;y<=5;y++){
        if(cum[y-1] < 0 && cum[y] >= 0){
          return y - 1 + (Math.abs(cum[y-1]) / (Math.abs(cum[y-1]) + cum[y]));
        }
      }
      return null;
    }
    const _beYearWithout = _beFindBE(_beCumWithout);
    const _beYearWith = _beFindBE(_beCumWith);

    // Chart dimensions (match Projected ROI break-even style)
    const svgW2 = 420, svgH2 = 180, padL2 = 52, padR2 = 10, padT2 = 10, padB2 = 28;
    const chartW2 = svgW2 - padL2 - padR2, chartH2 = svgH2 - padT2 - padB2;
    const allBEVals = _beCumWithout.concat(_beCumWith);
    const beYMin = Math.min(...allBEVals);
    const beYMax = Math.max(...allBEVals);
    const beYRange = beYMax - beYMin || 1;
    function beY2(val){ return padT2 + chartH2 * (1 - (val - beYMin) / beYRange); }
    function beX2(yr){ return padL2 + (yr / 5) * chartW2; }
    const zeroY2 = beY2(0);

    h += '<div>';
    h += '<svg viewBox="0 0 '+svgW2+' '+svgH2+'" style="width:100%;display:block;margin:0 auto">';

    // Gradient defs
    const conGradId = 'conGrad_'+r.id;
    h += '<defs>';
    h += '<linearGradient id="'+conGradId+'_pos" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#10b981" stop-opacity=".20"/><stop offset="100%" stop-color="#10b981" stop-opacity=".02"/></linearGradient>';
    h += '<linearGradient id="'+conGradId+'_neg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ef4444" stop-opacity=".02"/><stop offset="100%" stop-color="#ef4444" stop-opacity=".20"/></linearGradient>';
    h += '</defs>';

    // Grid lines
    for(let g=0;g<=4;g++){
      const gy = padT2 + (g/4)*chartH2;
      h += '<line x1="'+padL2+'" y1="'+gy.toFixed(1)+'" x2="'+(svgW2-padR2)+'" y2="'+gy.toFixed(1)+'" stroke="rgba(148,163,184,.08)" stroke-width="1"/>';
    }
    // Zero line
    if(zeroY2 >= padT2 && zeroY2 <= padT2+chartH2){
      h += '<line x1="'+padL2+'" y1="'+zeroY2.toFixed(1)+'" x2="'+(svgW2-padR2)+'" y2="'+zeroY2.toFixed(1)+'" stroke="rgba(148,163,184,.35)" stroke-width="1.5" stroke-dasharray="4,3"/>';
      h += '<text x="'+(padL2-4)+'" y="'+(zeroY2+3).toFixed(1)+'" text-anchor="end" fill="rgba(148,163,184,.5)" font-size="8" font-weight="600">$0</text>';
    }

    // Positive area fill for "With Concessions" line
    let posArea = 'M'+beX2(0).toFixed(1)+','+Math.min(zeroY2, padT2+chartH2).toFixed(1);
    for(let y=0;y<=5;y++){ posArea += ' L'+beX2(y).toFixed(1)+','+Math.min(beY2(_beCumWith[y]), zeroY2).toFixed(1); }
    posArea += ' L'+beX2(5).toFixed(1)+','+Math.min(zeroY2, padT2+chartH2).toFixed(1)+' Z';
    h += '<path d="'+posArea+'" fill="url(#'+conGradId+'_pos)"/>';
    // Negative area fill for "With Concessions" line
    let negArea = 'M'+beX2(0).toFixed(1)+','+Math.max(zeroY2, padT2).toFixed(1);
    for(let y=0;y<=5;y++){ negArea += ' L'+beX2(y).toFixed(1)+','+Math.max(beY2(_beCumWith[y]), zeroY2).toFixed(1); }
    negArea += ' L'+beX2(5).toFixed(1)+','+Math.max(zeroY2, padT2).toFixed(1)+' Z';
    h += '<path d="'+negArea+'" fill="url(#'+conGradId+'_neg)"/>';

    // "Without Concessions" line — more transparent
    for(let y=0;y<5;y++){
      const x1 = beX2(y), y1 = beY2(_beCumWithout[y]);
      const x2 = beX2(y+1), y2 = beY2(_beCumWithout[y+1]);
      const segCol = (_beCumWithout[y]<0&&_beCumWithout[y+1]<0)?'#ef4444':(_beCumWithout[y]>=0&&_beCumWithout[y+1]>=0)?'#10b981':'#f59e0b';
      h += '<line x1="'+x1.toFixed(1)+'" y1="'+y1.toFixed(1)+'" x2="'+x2.toFixed(1)+'" y2="'+y2.toFixed(1)+'" stroke="'+segCol+'" stroke-width="2" stroke-linecap="round" opacity=".25"/>';
    }
    // Dots for "Without" line
    for(let y=0;y<=5;y++){
      const dotCol = _beCumWithout[y]<0?'#ef4444':'#10b981';
      h += '<circle cx="'+beX2(y).toFixed(1)+'" cy="'+beY2(_beCumWithout[y]).toFixed(1)+'" r="2" fill="'+dotCol+'" opacity=".3"/>';
    }

    // "With Concessions" line — solid, prominent
    for(let y=0;y<5;y++){
      const x1 = beX2(y), y1 = beY2(_beCumWith[y]);
      const x2 = beX2(y+1), y2 = beY2(_beCumWith[y+1]);
      const segCol = (_beCumWith[y]<0&&_beCumWith[y+1]<0)?'#ef4444':(_beCumWith[y]>=0&&_beCumWith[y+1]>=0)?'#10b981':'#f59e0b';
      h += '<line x1="'+x1.toFixed(1)+'" y1="'+y1.toFixed(1)+'" x2="'+x2.toFixed(1)+'" y2="'+y2.toFixed(1)+'" stroke="'+segCol+'" stroke-width="2.5" stroke-linecap="round"/>';
    }
    // Dots for "With" line
    for(let y=0;y<=5;y++){
      const dotCol = _beCumWith[y]<0?'#ef4444':'#10b981';
      h += '<circle cx="'+beX2(y).toFixed(1)+'" cy="'+beY2(_beCumWith[y]).toFixed(1)+'" r="'+(y===0||y===5?'4':'2.5')+'" fill="'+dotCol+'" stroke="var(--surface)" stroke-width="1.5"/>';
    }

    // Break-even marker for "Without Concessions" — same low opacity as its line
    if(_beYearWithout !== null){
      const bxW = beX2(_beYearWithout);
      h += '<line x1="'+bxW.toFixed(1)+'" y1="'+padT2+'" x2="'+bxW.toFixed(1)+'" y2="'+(svgH2-padB2)+'" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3" opacity=".25"/>';
      h += '<circle cx="'+bxW.toFixed(1)+'" cy="'+zeroY2.toFixed(1)+'" r="3.5" fill="#f59e0b" stroke="var(--surface)" stroke-width="1.5" opacity=".35" filter="drop-shadow(0 1px 2px rgba(0,0,0,.15))"/>';
      const beWLbl = Math.floor(_beYearWithout)+'y '+Math.round((_beYearWithout-Math.floor(_beYearWithout))*12)+'m';
      const lbWX = bxW + (bxW > svgW2/2 ? -8 : 8);
      const lbWAnc = bxW > svgW2/2 ? 'end' : 'start';
      h += '<text x="'+lbWX.toFixed(1)+'" y="'+(svgH2-padB2-6)+'" text-anchor="'+lbWAnc+'" fill="#f59e0b" font-size="7" font-weight="600" opacity=".4">No concessions</text>';
      h += '<text x="'+lbWX.toFixed(1)+'" y="'+(svgH2-padB2-15)+'" text-anchor="'+lbWAnc+'" fill="#f59e0b" font-size="7" font-weight="600" opacity=".4">'+beWLbl+'</text>';
    }

    // Break-even marker for "With Concessions"
    if(_beYearWith !== null){
      const bx = beX2(_beYearWith);
      h += '<line x1="'+bx.toFixed(1)+'" y1="'+padT2+'" x2="'+bx.toFixed(1)+'" y2="'+(svgH2-padB2)+'" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" opacity=".6"/>';
      h += '<circle cx="'+bx.toFixed(1)+'" cy="'+zeroY2.toFixed(1)+'" r="4.5" fill="#f59e0b" stroke="var(--surface)" stroke-width="2" filter="drop-shadow(0 1px 3px rgba(0,0,0,.3))"/>';
      const beLbl = Math.floor(_beYearWith)+'y '+Math.round((_beYearWith-Math.floor(_beYearWith))*12)+'m';
      const lbX = bx + (bx > svgW2/2 ? -8 : 8);
      const lbAnc = bx > svgW2/2 ? 'end' : 'start';
      h += '<text x="'+lbX.toFixed(1)+'" y="'+(padT2+9)+'" text-anchor="'+lbAnc+'" fill="#f59e0b" font-size="8" font-weight="700">Break-even</text>';
      h += '<text x="'+lbX.toFixed(1)+'" y="'+(padT2+18)+'" text-anchor="'+lbAnc+'" fill="#f59e0b" font-size="7.5" font-weight="600">'+beLbl+'</text>';
    }

    // X-axis year labels
    for(let y=0;y<=5;y++){
      h += '<text x="'+beX2(y).toFixed(1)+'" y="'+(svgH2-8)+'" text-anchor="middle" fill="rgba(148,163,184,.5)" font-size="8" font-weight="500">Yr '+y+'</text>';
    }
    // Y-axis labels
    h += '<text x="'+(padL2-4)+'" y="'+(beY2(beYMax)+3).toFixed(1)+'" text-anchor="end" fill="rgba(148,163,184,.4)" font-size="7.5">'+fmtMoney(Math.round(beYMax))+'</text>';
    h += '<text x="'+(padL2-4)+'" y="'+(beY2(beYMin)+3).toFixed(1)+'" text-anchor="end" fill="rgba(148,163,184,.4)" font-size="7.5">'+fmtMoney(Math.round(beYMin))+'</text>';

    h += '</svg>';
    h += '</div>'; // end fixed-height chart wrapper

    // Legend
    h += '<div style="display:flex;justify-content:center;gap:16px;margin-top:4px">';
    h += '<div style="display:flex;align-items:center;gap:4px;font-size:.6rem;color:var(--text3)"><span style="display:inline-block;width:16px;height:2.5px;background:#10b981;border-radius:2px"></span> With '+conW+' wk'+(conW!==1?'s':'')+' free</div>';
    h += '<div style="display:flex;align-items:center;gap:4px;font-size:.6rem;color:var(--text3)"><span style="display:inline-block;width:16px;height:2px;background:var(--text3);border-radius:2px;opacity:.3"></span> Without concessions</div>';
    h += '</div>';

    h += '</div>';
  }
  h += '</div>'; // end right half

  h += '</div>'; // end flex container
  h += '</div></div>'; // end calc-section-body + calc-section

  return h;
}


function onCalcChange(field, value){
  const r = records.find(x => x.id === currentProfileId);
  if(!r) return;
  if(!r.details) r.details = {};
  if(!r.details.calculator) r.details.calculator = {};
  r.details.calculator[field] = parseFloat(value) || 0;
  if(field === 'cleaning') r.details.calculator._cleaningManual = true;
  saveData();
  // Re-render Projected ROI tab since expenses affect projections
  const calcEl = document.querySelector('.tab-content[data-tab="calculator"]');
  if(calcEl){ calcEl.innerHTML = renderCalculatorTab(r); }
  // Re-render Negotiation Tools tab since it shares data
  const negoEl = document.querySelector('.tab-content[data-tab="negotiation"]');
  if(negoEl && currentTier === 'pro'){ negoEl.innerHTML = renderNegotiationTab(r); }
}

function _rerenderCalcTab(){
  const r = records.find(x => x.id === currentProfileId);
  if(!r) return;
  // Re-render Expenses tab if present
  const expEl = document.querySelector('.tab-content[data-tab="expenses"]');
  if(expEl){ expEl.innerHTML = renderExpensesTab(r); }
  // Re-render Projected ROI tab if present
  const tabEl = document.querySelector('.tab-content[data-tab="calculator"]');
  if(tabEl){ tabEl.innerHTML = renderCalculatorTab(r); }
  // Re-render Negotiation Tools tab if present
  const negoEl = document.querySelector('.tab-content[data-tab="negotiation"]');
  if(negoEl && currentTier === 'pro'){ negoEl.innerHTML = renderNegotiationTab(r); }
}

let _activeCalcEdit = null;

function _saveActiveCalcEdit(){
  if(!_activeCalcEdit) return;
  const { input, field } = _activeCalcEdit;
  const val = input.value;
  _activeCalcEdit = null;
  onCalcChange(field, val);
}

function calcEditCell(el, skipBlurSave){
  if(el.querySelector('input')) return;
  // Block editing on analyzed properties (non-Pro)
  if(currentProfileId && currentTier !== 'pro' && isPropertyAnalyzed(currentProfileId)){
    showToast('🔒 Expenses are locked on analyzed properties', 'info', 2500);
    return;
  }
  // Save any active edit first
  if(_activeCalcEdit){
    _activeCalcEdit._skipRerender = true;
    _saveActiveCalcEdit();
  }
  const field = el.dataset.calcField;
  const raw = el.dataset.calcRaw || '0';
  const isCleaning = el.dataset.calcCleaning === '1';
  const isPct = el.dataset.calcPct === '1';

  // Cleaning confirmation
  if(isCleaning){
    showAppConfirm('The cleaning fee is auto-set based on bedroom count. If you change bedrooms in Property Details, this will reset to the default.', {
      title: 'Override Auto-set Cleaning Fee?',
      icon: '⚠️',
      confirmText: 'Override',
      onConfirm: () => {
        // Lock width to prevent layout shift
        const parentVal = el.closest('.calc-val');
        if(parentVal) parentVal.style.width = parentVal.offsetWidth + 'px';

        el.innerHTML = '';
        const input = document.createElement('input');
        input.type = 'number';
        input.className = 'calc-inline-input';
        input.value = raw;
        input.step = isPct ? '1' : 'any';
        if(isPct){ input.min = '0'; input.max = '100'; }
        el.appendChild(input);
        input.focus();
        input.select();

        const editCtx = { input, field, _skipRerender: false };
        _activeCalcEdit = editCtx;

        input.addEventListener('blur', () => {
          if(_activeCalcEdit === editCtx){
            _saveActiveCalcEdit();
            _rerenderCalcTab();
          }
        });

        input.addEventListener('keydown', (e) => {
          if(e.key === 'Enter'){
            e.preventDefault();
            _saveActiveCalcEdit();
            _rerenderCalcTab();
            return;
          }
          if(e.key === 'Escape'){
            _activeCalcEdit = null;
            _rerenderCalcTab();
            return;
          }
          if(e.key === 'Tab'){
            e.preventDefault();
            _saveActiveCalcEdit();
            const allEditables = Array.from(document.querySelectorAll('.calc-editable'));
            const currentIdx = allEditables.indexOf(el);
            const nextIdx = e.shiftKey ? currentIdx - 1 : currentIdx + 1;
            if(nextIdx >= 0 && nextIdx < allEditables.length){
              _rerenderCalcTab();
              requestAnimationFrame(() => {
                const newEditables = Array.from(document.querySelectorAll('.calc-editable'));
                if(newEditables[nextIdx]) calcEditCell(newEditables[nextIdx]);
              });
            } else {
              _rerenderCalcTab();
            }
          }
        });
      }
    });
    return;
  }

  // Lock width to prevent layout shift
  const parentVal = el.closest('.calc-val');
  if(parentVal) parentVal.style.width = parentVal.offsetWidth + 'px';

  el.innerHTML = '';
  const input = document.createElement('input');
  input.type = 'number';
  input.className = 'calc-inline-input';
  input.value = raw;
  input.step = isPct ? '1' : 'any';
  if(isPct){ input.min = '0'; input.max = '100'; }
  el.appendChild(input);
  input.focus();
  input.select();

  const editCtx = { input, field, _skipRerender: false };
  _activeCalcEdit = editCtx;

  input.addEventListener('blur', () => {
    if(_activeCalcEdit === editCtx){
      _saveActiveCalcEdit();
      _rerenderCalcTab();
    }
  });

  input.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){
      e.preventDefault();
      _saveActiveCalcEdit();
      _rerenderCalcTab();
      return;
    }
    if(e.key === 'Escape'){
      _activeCalcEdit = null;
      _rerenderCalcTab();
      return;
    }
    if(e.key === 'Tab'){
      e.preventDefault();
      _saveActiveCalcEdit();
      const allEditables = Array.from(document.querySelectorAll('.calc-editable'));
      const currentIdx = allEditables.indexOf(el);
      const nextIdx = e.shiftKey ? currentIdx - 1 : currentIdx + 1;
      if(nextIdx >= 0 && nextIdx < allEditables.length){
        _rerenderCalcTab();
        requestAnimationFrame(() => {
          const newEditables = Array.from(document.querySelectorAll('.calc-editable'));
          if(newEditables[nextIdx]) calcEditCell(newEditables[nextIdx]);
        });
      } else {
        _rerenderCalcTab();
      }
    }
  });
}

  const addr = r.propertyDetails?.address || r.propertyDetails?.street || r.name || '';
  showAppAlert('AI estimation coming soon! Will analyze market data for ' + (addr || 'this area') + '.', {title: 'Coming Soon', icon: '🔮'});
}

function getComps(r){
  if(!r.details) r.details = {};
  if(!r.details.comps) r.details.comps = [];
  return r.details.comps;
}
function getAnalysis(r){
  if(!r.details) r.details = {};
  if(!r.details.analysis) r.details.analysis = {};
  return r.details.analysis;
}

function migrateCompRatings(r){
  const comps = getComps(r);
  let changed = false;
  comps.forEach(c => {
    if(!c.rating || (c.rating !== 'beats' && c.rating !== 'competes' && c.rating !== 'loses')){
      c.rating = 'competes';
      changed = true;
    }
  });
  if(changed) saveData();
}

function renderAnalysisTab(r){

  const profitReq = parseFloat(an.profitRequirement) || 1000;

  // ── Top: Required Revenue + Revenue Projections side by side ──

  // Left: Required Revenue
  h += '<div class="an-section"><div class="an-section-hdr"'+tipAttrs('Required Revenue','The minimum annual/monthly revenue needed to cover rent, operating expenses, and your desired profit requirement.')+'>Required Revenue</div><div class="an-section-body" style="padding:0">';

  h += '<div class="an-req-item" onclick="showAppAlert(\'Your Profit Requirement is set to <strong>'+fmtMoney(profitReq)+'/mo</strong>. To adjust it, go to the <strong>Projected ROI</strong> tab and click the <strong>Profit Requirement</strong> card. Changing it will recalibrate the Deal Temperature thresholds.\', {title: \'Profit Requirement\', icon: \'ℹ️\'})" style="cursor:help"><div class="req-label">Profit Req</div><div class="req-val">'+fmtMoney(profitReq*12)+'<span class="req-period">/yr</span></div><div class="req-annual">'+fmtMoney(profitReq)+'/mo</div></div>';

  // Right: Comp Strength Breakdown

    const estRevenue = (rateComps.length > 0 && daysComps.length > 0 && occComps.length > 0) ? Math.round(avgRate * avgDays * (avgOcc / 100)) : 0;

  // ── Three Color-Coded Sections ──

        html += '<td><div class="comp-editable" onclick="compEditCell(this)" data-field="nightlyRate" data-rec="'+recId+'" data-idx="'+i+'" data-raw="'+rateRaw+'">'+(rateRaw ? '$'+parseFloat(rateRaw).toFixed(2) : '<span class="comp-placeholder">—</span>')+'</div></td>';

        html += '<td><div class="comp-editable" onclick="compEditCell(this)" data-field="host" data-rec="'+recId+'" data-idx="'+i+'" data-raw="'+esc(comp.host||'')+'" data-type="text">'+(comp.host ? esc(comp.host) : '<span class="comp-placeholder">—</span>')+'</div></td>';
        // Rating is now a non-editable badge

        html += '<td class="comp-notes-cell"><div class="comp-notes-preview" onclick="openCompNoteEditor(\''+recId+'\','+i+')" title="Click to edit notes">'+(notePreview || '<span style="color:var(--text3)">+ Note</span>')+'</div></td>';
        html += '<td class="comp-link-cell">'+(comp.link ? '<a href="'+esc(comp.link)+'" target="_blank" title="'+esc(comp.link)+'">'+linkIcon+'</a>' : '')+'</td>';
        html += '<td><button class="comp-remove" onclick="confirmRemoveComp(\''+recId+'\','+i+')" title="Remove">✕</button></td>';

    // Add comp input (if section has < 10 comps)

      html += '<button onclick="addComp(\''+recId+'\', \''+category+'\')">+ Add Competitor</button>';

  h += renderCompSection(r.id, losesComps, 'loses-to', 'Loses To', '⬇️', '#ef4444', 'loses');

function _normalizeCompLink(url){
  // Strip query params and trailing slashes for consistent comparison
  return (url || '').replace(/\?.*$/,'').replace(/\/+$/,'').toLowerCase();
}

function addComp(recId, category){
  const r = records.find(x => x.id === recId);
  if(!r) return;
  const input = document.getElementById('compLinkInput_' + category);
  const link = input?.value?.trim();
  if(!link){ showAppAlert('Please paste an AirDNA link', {title: 'Validation', icon: '⚠️'}); return }

  // Only AirDNA links are accepted for competitor analysis. If the
  // user pastes anything else, tell them.
  const isAirdna = /^https?:\/\/(?:www\.)?airdna\.co\//i.test(link);
  if(!isAirdna){
    showAppAlert('Competitor Analysis accepts AirDNA links only. Please paste a URL from airdna.co.', {title: 'AirDNA link required', icon: '⚠️'});
    return;
  }

  // Route through the Chrome extension: it opens the AirDNA page,
  // scrapes the metrics (and underlying Airbnb link), and delivers
  // the result via window.postMessage → handleExtensionComp.
  if(typeof rrScrapeViaExtension === 'function'){
    // Remember which category/record this import belongs to so
    // handleExtensionComp can route it correctly.
    window._rrPendingCompCategory = category;
    if(input){ input.disabled = true; input.placeholder = 'Importing from AirDNA…'; }
    rrScrapeViaExtension(link, 'airdna').then((res) => {
      if(input){ input.disabled = false; input.placeholder = 'Paste AirDNA link here...'; }
      if(!res || !res.ok){
        if(res && res.error === 'extension-not-installed'){
          showAppAlert('Install the RentingRadar Chrome extension to import from AirDNA. Open the banner above and click Install.', {title: 'Extension required', icon: '🧩'});
        } else {
          showAppAlert('Could not import from AirDNA: ' + ((res && res.error) || 'Unknown error'), {title: 'Import failed', icon: '⚠️'});
        }
        return;
      }
      // Response includes data — tag it for routing and hand off
      const data = res.data || {};
      data.rating = category;
      data.airdnaUrl = data.airdnaUrl || link;
      if(typeof handleExtensionComp === 'function') handleExtensionComp(data);
      if(input){ input.value = ''; }
    }).catch((e) => {
      if(input){ input.disabled = false; input.placeholder = 'Paste AirDNA link here...'; }
      showAppAlert('Import error: ' + (e.message || e), {title: 'Import failed', icon: '⚠️'});
    });
    return;
  }

  const comps = getComps(r);
  const sectionCount = comps.filter(c => c.rating === category).length;
  if(sectionCount >= 10){ showAppAlert('Maximum 10 competitors per section', {title: 'Limit Reached', icon: '📊'}); return }

  // Check for duplicate link
  const normalizedNew = _normalizeCompLink(link);
  const ratingLabels = { loses:'Loses To', competes:'Competes With', beats:'Beats' };
  const dupeInSame = comps.find(c => c.rating === category && _normalizeCompLink(c.link) === normalizedNew);
  const dupeInOther = comps.find(c => c.rating !== category && _normalizeCompLink(c.link) === normalizedNew);

  if(dupeInSame){
    // Same category duplicate — alert and clear input
    if(input) input.value = '';
    showAppAlert('This property has already been added to the <strong>' + (ratingLabels[category] || category) + '</strong> section.', { title: 'Duplicate Competitor', icon: '⚠️' });
    return;
  }

  if(dupeInOther){
    // Different category duplicate — let user choose to remove or override
    const existingCat = ratingLabels[dupeInOther.rating] || dupeInOther.rating;
    const newCat = ratingLabels[category] || category;
    showAppConfirm('This property is already in the <strong>' + existingCat + '</strong> section. Would you like to move it to <strong>' + newCat + '</strong>, or keep it in both?', {
      title: 'Duplicate Competitor Found',
      icon: '⚠️',
      confirmText: 'Move to ' + newCat,
      cancelText: 'Keep in Both',
      onConfirm: () => {
        // Remove from old category
        const dupeIdx = comps.indexOf(dupeInOther);
        if(dupeIdx >= 0) comps.splice(dupeIdx, 1);
        // Add to new category
        _doAddComp(r, comps, link, category, input);
      },
      onCancel: () => {
        // Keep in both — add to new category as well
        _doAddComp(r, comps, link, category, input);
      }
    });
    return;
  }

  // No duplicate — add normally
  _doAddComp(r, comps, link, category, input);
}

function _doAddComp(r, comps, link, category, input){
  const shortLink = link.replace(/\?.*$/,'').replace(/https?:\/\/(www\.)?airbnb\.com\/rooms\//,'').substring(0,18)+'...';
  comps.push({
    link: link, linkShort: shortLink,
    annualRevenue:0, daysAvailable:0, occupancy:0, nightlyRate:0,
    guests:0, bedrooms:0, beds:0, bathrooms:0, host:'',
    rating: category, notes:''
  });
  if(input) input.value = '';
  saveData();
  render();
}

function confirmRemoveComp(recId, idx){
  showAppConfirm('Are you sure you want to remove this competitor?', {
    title: 'Remove Competitor',
    icon: '🗑️',
    confirmText: 'Remove',
    confirmClass: 'btn-danger',
    onConfirm: () => removeComp(recId, idx)
  });
}

function removeComp(recId, idx){
  const r = records.find(x => x.id === recId);
  if(!r) return;
  getComps(r).splice(idx, 1);
  saveData();
  render();
}

function updateCompField(recId, idx, field, value){
  const r = records.find(x => x.id === recId);
  if(!r) return;
  const comps = getComps(r);
  if(!comps[idx]) return;
  if(['annualRevenue','occupancy','nightlyRate','guests','bedrooms','beds','bathrooms','daysAvailable'].includes(field)){
    comps[idx][field] = parseFloat(value) || 0;
  } else {
    comps[idx][field] = value;
  }
  saveData();
  // Re-render Projected ROI if revenue-related fields change (they drive Forecasted Revenue)
  if(['annualRevenue','occupancy','nightlyRate','daysAvailable','rating'].includes(field)){
    const calcEl = document.querySelector('.tab-content[data-tab="calculator"]');
    if(calcEl){ calcEl.innerHTML = renderCalculatorTab(r); }
    const negoEl2 = document.querySelector('.tab-content[data-tab="negotiation"]');
    if(negoEl2 && currentTier === 'pro'){ negoEl2.innerHTML = renderNegotiationTab(r); }
  }
  // Re-render Expenses tab since revenue affects computed expense rows
  if(['annualRevenue','occupancy','nightlyRate','daysAvailable'].includes(field)){
    const expEl = document.querySelector('.tab-content[data-tab="expenses"]');
    if(expEl){ expEl.innerHTML = renderExpensesTab(r); }
  }
  if(field === 'rating') render();
}

function editConcessionWeeks(recId){
  const r = records.find(x => x.id === recId);
  if(!r) return;
  const an = getAnalysis(r);
  const current = an.concessionWeeks !== undefined ? parseFloat(an.concessionWeeks) : 6;
  const existing = document.getElementById('concessionWeeksOverlay');
  if(existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.className = 'multi-editor-overlay';
  overlay.id = 'concessionWeeksOverlay';
  overlay.innerHTML = '<div class="multi-editor" style="max-width:400px"><div class="multi-editor-header"><h3>Rental Concession Weeks</h3><button class="modal-close" onclick="document.getElementById(\'concessionWeeksOverlay\').remove()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div><div class="multi-editor-body" style="padding:24px 20px"><input type="number" id="concessionWeeksInput" placeholder="Weeks of free rent" value="'+current+'" min="0" max="52" style="font-size:1rem;padding:10px 12px;margin-bottom:8px"><div style="font-size:.72rem;color:var(--text3);margin-bottom:16px">Recommended: 6–8 weeks · Enter to save</div><div style="display:flex;gap:10px;justify-content:flex-end"><button class="btn btn-secondary" onclick="document.getElementById(\'concessionWeeksOverlay\').remove()">Cancel</button><button class="btn btn-primary" onclick="saveConcessionWeeks(\''+recId+'\')">Save</button></div></div></div>';
  document.body.appendChild(overlay);
  const inp = document.getElementById('concessionWeeksInput');
  inp.focus();
  inp.addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); saveConcessionWeeks(recId); }});
}
function saveConcessionWeeks(recId){
  const r = records.find(x => x.id === recId);
  if(!r) return;
  const val = parseFloat(document.getElementById('concessionWeeksInput')?.value) || 0;
  const an = getAnalysis(r);
  an.concessionWeeks = Math.max(0, Math.min(12, val));
  saveData();
  document.getElementById('concessionWeeksOverlay')?.remove();
  render();
}

// ── Rent Adjustment Dial (standalone — does NOT change actual rent) ──
let _rentDialPreview = {}; // { recId: previewRentAmount }
let _rentDialDragging = false;

function _initRentDialDrag(recId){
  const svg = document.getElementById('rentDial_'+recId);
  const cfg = document.getElementById('rentDialConfig_'+recId);
  if(!svg || !cfg) return;
  const dMin = parseFloat(cfg.dataset.min);
  const dMax = parseFloat(cfg.dataset.max);
  const cx = parseFloat(cfg.dataset.cx);
  const cy = parseFloat(cfg.dataset.cy);

  function angleToRent(clientX, clientY){
    const rect = svg.getBoundingClientRect();
    const svgW = parseFloat(cfg.dataset.w) || 320;
    const scaleX = svgW / rect.width; // viewBox width / rendered width
    const svgX = (clientX - rect.left) * scaleX;
    const svgY = (clientY - rect.top) * scaleX;
    const dx = svgX - cx;
    const dy = svgY - cy;
    let angle = Math.atan2(dy, dx); // radians, 0=right, PI/-PI=left
    // Normalize: arc goes from PI (left) to 2PI (right), i.e. top half
    // atan2 returns -PI to PI. We need angle in [PI, 2PI] range
    if(angle > 0 && angle < Math.PI * 0.15) angle = 2 * Math.PI; // clamp to right end
    if(angle >= 0 && angle < Math.PI) return null; // below the arc center, ignore
    if(angle < 0) angle += 2 * Math.PI; // convert -PI..0 to PI..2PI
    const pct = Math.max(0, Math.min(1, (angle - Math.PI) / Math.PI));
    const rent = Math.round(dMin + pct * (dMax - dMin));
    return rent;
  }

  function updateDial(clientX, clientY){
    const rent = angleToRent(clientX, clientY);
    if(rent === null) return;
    _rentDialPreview[recId] = rent;
    // Fast re-render of readout + needle without full tab re-render
    _quickUpdateRentDial(recId, rent);
  }

  function onPointerDown(e){
    if(e.button && e.button !== 0) return;
    e.preventDefault();
    _rentDialDragging = true;
    svg.style.cursor = 'grabbing';
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    updateDial(clientX, clientY);

    function onPointerMove(e2){
      if(!_rentDialDragging) return;
      e2.preventDefault();
      const cx2 = e2.touches ? e2.touches[0].clientX : e2.clientX;
      const cy2 = e2.touches ? e2.touches[0].clientY : e2.clientY;
      updateDial(cx2, cy2);
    }
    function onPointerUp(){
      _rentDialDragging = false;
      svg.style.cursor = 'pointer';
      document.removeEventListener('mousemove', onPointerMove);
      document.removeEventListener('mouseup', onPointerUp);
      document.removeEventListener('touchmove', onPointerMove);
      document.removeEventListener('touchend', onPointerUp);
      // Do a full re-render now to sync everything
      const rr = records.find(x => x.id === currentProfileId);
      const negoEl = document.querySelector('.tab-content[data-tab="negotiation"]');
      if(negoEl && rr) negoEl.innerHTML = renderNegotiationTab(rr);
    }
    document.addEventListener('mousemove', onPointerMove, {passive:false});
    document.addEventListener('mouseup', onPointerUp);
    document.addEventListener('touchmove', onPointerMove, {passive:false});
    document.addEventListener('touchend', onPointerUp);
  }

  svg.addEventListener('mousedown', onPointerDown);
  svg.addEventListener('touchstart', onPointerDown, {passive:false});
}

// Fast visual update of the dial needle + readout during dragging (avoids full re-render)
function _quickUpdateRentDial(recId, rent){
  const svg = document.getElementById('rentDial_'+recId);
  const readout = document.getElementById('rentDialReadout_'+recId);
  const cfg = document.getElementById('rentDialConfig_'+recId);
  if(!svg || !readout || !cfg) return;
  const dMin = parseFloat(cfg.dataset.min);
  const dMax = parseFloat(cfg.dataset.max);
  const cx = parseFloat(cfg.dataset.cx) || 190;
  const cy = parseFloat(cfg.dataset.cy) || 185;
  const R = parseFloat(cfg.dataset.r) || 145;
  const range = dMax - dMin || 1;
  const pct = Math.max(0, Math.min(1, (rent - dMin) / range));
  const angle = Math.PI + pct * Math.PI;

  // Update needle elements
  const needleBody = svg.querySelector('.dial-needle-body');
  const needleArrow = svg.querySelector('.dial-needle-arrow');
  const hub = svg.querySelector('.dial-hub');
  if(needleBody){
    const nLen = R - 10;
    const tipLen = 20;
    const bx = cx + (nLen - tipLen) * Math.cos(angle);
    const by = cy + (nLen - tipLen) * Math.sin(angle);
    needleBody.setAttribute('x2', bx.toFixed(1));
    needleBody.setAttribute('y2', by.toFixed(1));
  }
  if(needleArrow){
    const nLen = R - 10;
    const tipLen = 20, tipW = 8;
    const tipX = cx + (nLen + tipLen * 0.3) * Math.cos(angle);
    const tipY = cy + (nLen + tipLen * 0.3) * Math.sin(angle);
    const perp = angle + Math.PI / 2;
    const b1x = cx + (nLen - tipLen) * Math.cos(angle) + tipW * Math.cos(perp);
    const b1y = cy + (nLen - tipLen) * Math.sin(angle) + tipW * Math.sin(perp);
    const b2x = cx + (nLen - tipLen) * Math.cos(angle) - tipW * Math.cos(perp);
    const b2y = cy + (nLen - tipLen) * Math.sin(angle) - tipW * Math.sin(perp);
    needleArrow.setAttribute('points', tipX.toFixed(1)+','+tipY.toFixed(1)+' '+b1x.toFixed(1)+','+b1y.toFixed(1)+' '+b2x.toFixed(1)+','+b2y.toFixed(1));
  }

  // Compute deal temperature for this rent
  const r = records.find(x => x.id === recId);
  if(!r) return;
  // We need the projection data — use stored helpers via a mini recalc
  // Quick recalc adjNet using the stored config
  const an = getAnalysis(r);
  const pr = parseFloat(an.profitRequirement) || 1000;
  const prHalf = Math.round(pr * 0.5);
  // Read the adjNet from the readout's data attrs if stored, or compute inline
  // For speed, recompute from first principles using cfg data
  const dtCol = function(mn){ return mn >= pr ? '#10b981' : mn >= prHalf ? '#3b82f6' : mn > 0 ? '#f59e0b' : '#ef4444'; };
  const dtLbl = function(mn){ return mn >= pr ? 'Slam-Dunk' : mn >= prHalf ? 'Potential' : mn > 0 ? 'Risky' : 'No-Go'; };
  const dtIco = function(mn){ return mn >= pr ? '🏆' : mn >= prHalf ? '🔥' : mn > 0 ? '⚠️' : '🚫'; };

  // We need col.rev, col.exp, confPct — store them in cfg
  const rev = parseFloat(cfg.dataset.rev) || 0;
  const exp = parseFloat(cfg.dataset.exp) || 0;
  const confPct = parseFloat(cfg.dataset.conf) || 100;
  const annualRent = Math.round(rent * 12);
  const net = rev - exp - annualRent;
  const monthlyNet = Math.round(net / 12);
  const adjNet = Math.round(monthlyNet * confPct / 100);

  const color = dtCol(adjNet);
  const label = dtLbl(adjNet);
  const icon = dtIco(adjNet);

  readout.innerHTML = '<div onclick="openRentDialInput(\''+recId+'\')" style="font-size:1.6rem;font-weight:800;color:var(--text);cursor:pointer;display:inline-block;border-bottom:2px dashed var(--border);padding-bottom:2px" title="Click to type a rent amount">$'+Math.round(rent).toLocaleString()+'/mo</div>'
    + '<div style="font-size:.95rem;font-weight:700;color:'+color+'">'+icon+' '+label+' · $'+adjNet.toLocaleString()+'/mo net</div>';
}
function setRentDialIncrement(recId, val){
  const r = records.find(x => x.id === recId);
  if(!r) return;
  const an = getAnalysis(r);
  an.rentDialIncrement = val;
  _rentDialPreview[recId] = undefined; // reset preview
  saveData();
  render();
}
function adjustRentDial(recId, direction){
  const r = records.find(x => x.id === recId);
  if(!r) return;
  const an = getAnalysis(r);
  const incr = parseFloat(an.rentDialIncrement) || 50;
  const currentRent = parseFloat(r.propertyDetails?.monthlyRent) || 0;
  const previewRent = _rentDialPreview[recId] !== undefined ? _rentDialPreview[recId] : currentRent;
  const newRent = Math.max(0, Math.min(currentRent, previewRent + direction * incr));
  _rentDialPreview[recId] = newRent;
  // Re-render the negotiation tab to update the dial
  const negoEl = document.querySelector('.tab-content[data-tab="negotiation"]');
  if(negoEl){
    const rr = records.find(x => x.id === currentProfileId);
    if(rr) negoEl.innerHTML = renderNegotiationTab(rr);
  }
}

  inp.addEventListener('input', function(){
    const v = parseFloat(this.value);
    const errEl = document.getElementById('rentDialInputErr');
    if(v > currentRent){
      errEl.textContent = 'Cannot exceed current rent of $'+currentRent.toLocaleString()+'/mo';

function saveRentDialInput(recId){
  const r = records.find(x => x.id === recId);
  if(!r) return;
  const currentRent = parseFloat(r.propertyDetails?.monthlyRent) || 0;
  const val = parseFloat(document.getElementById('rentDialInputVal')?.value);
  if(isNaN(val) || val < 0) return;
  if(val > currentRent) return; // blocked
  _rentDialPreview[recId] = Math.round(val);
  document.getElementById('rentDialInputOverlay')?.remove();
  const negoEl = document.querySelector('.tab-content[data-tab="negotiation"]');
  if(negoEl){
    const rr = records.find(x => x.id === currentProfileId);
    if(rr) negoEl.innerHTML = renderNegotiationTab(rr);
  }
}

function adjustConcessionWeeks(recId, delta){
  const r = records.find(x => x.id === recId);
  if(!r) return;
  const an = getAnalysis(r);
  const current = an.concessionWeeks !== undefined ? parseFloat(an.concessionWeeks) : 6;

  saveData();
  const negoEl = document.querySelector('.tab-content[data-tab="negotiation"]');
  if(negoEl){
    const rr = records.find(x => x.id === currentProfileId);
    if(rr) negoEl.innerHTML = renderNegotiationTab(rr);
  }
}

function projEditCell(el){
  if(el.querySelector('input')) return;
  const field = el.dataset.field;
  const recId = el.dataset.rec;
  const raw = el.dataset.raw;

  const input = document.createElement('input');
  input.type = 'number';
  input.className = 'proj-input';
  input.value = raw && raw !== '0' ? raw : '';
  input.placeholder = '$0';

  el.textContent = '';
  el.appendChild(input);
  input.focus();
  input.select();

  const save = () => {
    const val = input.value;
    const r = records.find(x => x.id === recId);
    if(r){
      const an = getAnalysis(r);
      an[field] = val;
      saveData();
      const tabEl = document.querySelector('.tab-content[data-tab="analysis"]');
      if(tabEl){ tabEl.innerHTML = renderAnalysisTab(r); tabEl.classList.add('active'); }
    }
  };

  input.addEventListener('blur', save);
  input.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){ e.preventDefault(); input.blur(); }
    if(e.key === 'Escape'){ input.value = raw; input.blur(); }
  });
}

// Track the currently active comp edit so we can close it when another opens
let _activeCompEdit = null;

function _saveActiveCompEdit(){
  if(!_activeCompEdit) return;
  const { input, recId, idx, field } = _activeCompEdit;
  const val = input.value;
  _activeCompEdit = null;
  updateCompField(recId, idx, field, val);
}

function _rerenderAnalysisTab(){
  const r = records.find(x => x.id === currentProfileId);
  if(r){
    const tabEl = document.querySelector('.tab-content[data-tab="analysis"]');
    if(tabEl){ tabEl.innerHTML = renderAnalysisTab(r); tabEl.classList.add('active'); }
  }
}

function compEditCell(el, skipBlurSave){
  // If clicking the same cell that's already editing, do nothing
  if(el.querySelector('input')) return;

  // Close any existing edit first (save its value without re-rendering yet)
  if(_activeCompEdit){
    _activeCompEdit._skipRerender = true;
    _saveActiveCompEdit();
  }

  const field = el.dataset.field;
  const recId = el.dataset.rec;
  const idx = parseInt(el.dataset.idx);
  const raw = el.dataset.raw;

  // Lock the parent td width so the input doesn't expand the column
  const td = el.closest('td');
  if(td){ td.style.width = td.offsetWidth + 'px'; }

  const isText = el.dataset.type === 'text';
  const step = field === 'nightlyRate' ? '0.01' : (field === 'occupancy' ? '0.1' : '1');
  const input = document.createElement('input');
  input.type = isText ? 'text' : 'number';
  if(!isText) input.step = step;
  input.className = 'comp-inline-input';
  input.style.width = '100%';
  input.style.maxWidth = '100%';
  input.style.boxSizing = 'border-box';
  input.value = isText ? (raw || '') : (raw && raw !== '0' ? raw : '');
  input.placeholder = '—';

  el.textContent = '';
  el.appendChild(input);
  input.focus();
  input.select();

  const editCtx = { input, recId, idx, field, _skipRerender: false };
  _activeCompEdit = editCtx;

  input.addEventListener('blur', () => {
    // Only save+rerender if this edit wasn't already closed by Tab/click on another cell
    if(_activeCompEdit === editCtx){
      _saveActiveCompEdit();
      _rerenderAnalysisTab();
    } else if(!editCtx._skipRerender){
      // Was closed by navigating to another cell — rerender handled elsewhere
    }
  });

  input.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){
      e.preventDefault();
      _saveActiveCompEdit();
      _rerenderAnalysisTab();
      return;
    }
    if(e.key === 'Escape'){
      input.value = raw;
      _activeCompEdit = null;
      _rerenderAnalysisTab();
      return;
    }
    if(e.key === 'Tab'){
      e.preventDefault();
      // Save current value
      _saveActiveCompEdit();

      // Find all editable cells in the current section's table
      const sectionEl = el.closest('.comp-section');
      const table = el.closest('table');
      if(!table) { _rerenderAnalysisTab(); return; }
      const allEditables = Array.from(table.querySelectorAll('.comp-editable'));
      const currentIdx = allEditables.indexOf(el);
      if(currentIdx === -1) { _rerenderAnalysisTab(); return; }

      const nextIdx = e.shiftKey ? currentIdx - 1 : currentIdx + 1;
      if(nextIdx >= 0 && nextIdx < allEditables.length){
        // Re-render first so cells get fresh values, then open the next cell
        _rerenderAnalysisTab();
        // After re-render, find the same cell in the same section's table and open it
        requestAnimationFrame(() => {
          let newTable = null;
          if(sectionEl){
            const sectionClass = Array.from(sectionEl.classList).find(c => c.match(/loses-to|competes-with|beats/));
            if(sectionClass){
              const matchingSection = document.querySelector('.comp-section.' + sectionClass);
              if(matchingSection) newTable = matchingSection.querySelector('.comp-table');
            }
          } else {
            newTable = document.querySelector('.comp-table');
          }
          if(!newTable) return;
          const newEditables = Array.from(newTable.querySelectorAll('.comp-editable'));
          if(newEditables[nextIdx]){
            compEditCell(newEditables[nextIdx]);
          }
        });
      } else {
        _rerenderAnalysisTab();
      }
    }
  });
}

let addressAcTimeout = null;
const GPLACES_KEY = 'AIzaSyDwxwKzucGYrfmP5VmtwkLGLdqzFHy-etg';

function setupAddressAutocomplete(inputEl, recId){
  const wrapper = inputEl.parentElement;
  wrapper.style.position = 'relative';

  let dropdown = wrapper.querySelector('.address-ac');
  if(!dropdown){
    dropdown = document.createElement('div');
    dropdown.className = 'address-ac';
    wrapper.appendChild(dropdown);
  }

  function triggerSearch(delay){
    clearTimeout(addressAcTimeout);
    const q = inputEl.value.trim();
    if(q.length < 3){ dropdown.classList.remove('visible'); return; }
    addressAcTimeout = setTimeout(() => fetchAddressSuggestions(q, dropdown, inputEl, recId), delay);
  }

  // Normal typing
  inputEl.addEventListener('input', function(){ triggerSearch(300); });

  // Paste — trigger immediately with short delay for value to settle
  inputEl.addEventListener('paste', function(){ setTimeout(() => triggerSearch(50), 0); });

  // Browser autofill fires 'change' not 'input'
  inputEl.addEventListener('change', function(){ triggerSearch(50); });

  // Also catch autofill via focus — some browsers fill on focus
  inputEl.addEventListener('focus', function(){
    if(this.value.trim().length >= 3) triggerSearch(200);
  });

  inputEl.addEventListener('blur', function(){
    setTimeout(() => dropdown.classList.remove('visible'), 200);
  });

  inputEl.addEventListener('keydown', function(e){
    if(!dropdown.classList.contains('visible')) return;
    const items = dropdown.querySelectorAll('.address-ac-item');
    let idx = Array.from(items).findIndex(i => i.classList.contains('active'));
    // Arrow Down or Shift (without other modifiers) to move down
    if(e.key === 'ArrowDown' || (e.key === 'Shift' && !e.ctrlKey && !e.altKey && !e.metaKey)){
      e.preventDefault(); idx = Math.min(idx+1, items.length-1); items.forEach((it,i) => it.classList.toggle('active',i===idx));
    }
    // Arrow Up to move up
    else if(e.key === 'ArrowUp'){ e.preventDefault(); idx = Math.max(idx-1, 0); items.forEach((it,i) => it.classList.toggle('active',i===idx)); }
    // Enter to select highlighted item
    else if(e.key === 'Enter' && idx >= 0){ e.preventDefault(); items[idx]?.dispatchEvent(new MouseEvent('mousedown')); }
  });
}

function formatAddressOneLine(parts){
  // "1326 E Chandler Blvd, Phoenix AZ 85048" or flat string
  if(typeof parts === 'string') return parts;
  let s = parts.street || '';
  if(parts.unit) s += ' ' + parts.unit;
  const csz = [parts.city, parts.state].filter(Boolean).join(' ') + (parts.zip ? ' ' + parts.zip : '');
  if(csz.trim()) s += ', ' + csz.trim();
  return s || '';
}

function renderHeroAddress(r){
  const addr = r.addressParts || parseAddressParts(r.property);

  let csz = '';
