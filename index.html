// Chrome Web Store URL
const EXTENSION_URL = 'https://chromewebstore.google.com/detail/rentingradar-importer/eambgkhnefkigdndllhmakfedkncgmoh';

let extensionReady = false;
let extensionHealth = null;
let pendingImport = null;

// Listen for extension messages
window.addEventListener('message', (event) => {
  if(event.source !== window) return;
  if(event.data?.type === 'ARBFLOW_EXTENSION_READY'){
    extensionReady = true;
    // Request health check
    window.postMessage({ type: 'ARBFLOW_HEALTH_CHECK' }, '*');
  }
  if(event.data?.type === 'ARBFLOW_HEALTH_RESPONSE'){
    extensionHealth = event.data;
    extensionReady = !!event.data.extension;
  }
  if(event.data?.type === 'ARBFLOW_IMPORT_RESPONSE'){
    if(pendingImport) pendingImport(event.data);
    pendingImport = null;
  }

  // ─── Comp import from AirDNA extension (Pro feature) ───
  if(event.data?.type === 'RR_COMP_FROM_EXTENSION'){
    handleExtensionComp(event.data.compData);
  }
});

// Proactively check for extension on page load — handles timing where
// the content script's READY message fires before our listener is set up.
// Retries a few times with delays to catch late-loading extensions.
(function probeExtension(){
  var attempts = 0;
  function tryDetect(){
    if(extensionReady || attempts >= 5) return;
    attempts++;
    window.postMessage({ type: 'ARBFLOW_HEALTH_CHECK' }, '*');
    setTimeout(tryDetect, 1000);
  }
  // Start probing after a short delay to let page settle
  setTimeout(tryDetect, 500);
})();

function checkExtension(){
  return new Promise(resolve => {
    window.postMessage({ type: 'ARBFLOW_HEALTH_CHECK' }, '*');
    const handler = (e) => {
      if(e.data?.type === 'ARBFLOW_HEALTH_RESPONSE'){
        window.removeEventListener('message', handler);
        extensionHealth = e.data;
        extensionReady = !!e.data.extension;
        resolve(e.data);
      }
    };
    window.addEventListener('message', handler);
    setTimeout(() => { window.removeEventListener('message', handler); resolve(null) }, 2000);
  });
}

function sendImportRequest(url){
  return new Promise((resolve, reject) => {
    const reqId = uid();
    const timeout = setTimeout(() => { pendingImport = null; reject(new Error('Import timed out')) }, 180000);
    pendingImport = (data) => {
      clearTimeout(timeout);
      if(data.error) reject(new Error(data.error));
      else resolve(data);
    };
    window.postMessage({ type:'ARBFLOW_IMPORT_REQUEST', url, requestId: reqId }, '*');
  });
}

/**
 * Show a toast notification.
 * opts.recordId — if provided, clicking the toast navigates to that property profile
 */
function showToast(msg, type = 'info', duration = 4000, opts = {}) {
  let toast = document.getElementById('rr-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'rr-toast';
    toast.className = 'rr-toast';
    document.body.appendChild(toast);
  }

  // If we're replacing a loading toast with a success/incomplete/failed one,
  // first snap the progress bar up to 100% so the user sees it complete
  // before the toast swap. Without this the bar freezes at its plateau
  // (~95%) and then suddenly vanishes, which feels broken.
  const wasLoading = toast.classList.contains('loading');
  const nowLoading = type === 'loading';
  if (wasLoading && !nowLoading) {
    // Stop the simulated-progress timer but keep the spinner going via CSS.
    if (toast._progressTimer) { clearInterval(toast._progressTimer); toast._progressTimer = null; }
    const bar = toast.querySelector('.rr-toast-progress');
    if (bar) {
      bar.style.transition = 'width .18s ease-out';
      bar.style.width = '100%';
      bar.setAttribute('data-full', '1');
    }
    // Brief delay so the bar actually animates to 100% before we swap in
    // the new toast content.
    const pendingMsg = msg, pendingType = type, pendingDuration = duration, pendingOpts = opts;
    setTimeout(() => { _rrRenderToast(toast, pendingMsg, pendingType, pendingDuration, pendingOpts); }, 200);
    return;
  }

  _rrRenderToast(toast, msg, type, duration, opts);
}

function _rrRenderToast(toast, msg, type, duration, opts) {
  // Cancel any in-flight progress timer left over from a previous loading
  // toast — otherwise the bar would keep stepping under a new toast.
  if (toast._progressTimer) { clearInterval(toast._progressTimer); toast._progressTimer = null; }

  const isLoading = type === 'loading';
  const progressHtml = isLoading ? '<div class="rr-toast-progress"></div>' : '';
  toast.innerHTML = '<span class="rr-toast-msg">' + msg + '</span>'
    + '<button class="rr-toast-close" onclick="event.stopPropagation();document.getElementById(\'rr-toast\').classList.remove(\'visible\')">&times;</button>'
    + progressHtml;
  toast.className = 'rr-toast ' + type + (opts.recordId ? ' clickable' : '');
  toast.onclick = opts.recordId ? function(){ toast.classList.remove('visible'); openDetail(opts.recordId); } : null;
  requestAnimationFrame(() => { toast.classList.add('visible'); });

  if (isLoading) {
    // v0.6.2: asymptotic progress. The bar moves smoothly and constantly
    // toward 100 but NEVER reaches it on its own — the real completion
    // snaps it to 100 via showToast()'s loading→success swap. This way
    // the bar is always moving in unison with elapsed time, and the
    // property profile opens AT THE MOMENT the bar reaches the end, not
    // before (plateau) or after (bar stuck at 100 waiting for work).
    //
    // pct(t) = 100 * (1 - exp(-t / tau))
    // With tau = 6500ms this gives roughly:
    //   t= 2s →  27%
    //   t= 5s →  54%
    //   t= 8s →  71%
    //   t=12s →  84%
    //   t=20s →  95%
    //   t=30s →  99%
    // Always moving forward, never stalling, never overshooting.
    const bar = toast.querySelector('.rr-toast-progress');
    const startedAt = performance.now();
    // v0.9.0: Claude API imports take 3-8s. Ollama fallback 8-20s.
    // tau=5000 gives: t=3s → 45%, t=5s → 63%, t=8s → 80%, t=12s → 91%
    const tau = opts.progressTau || 5000;
    toast._progressTimer = setInterval(() => {
      const elapsed = performance.now() - startedAt;
      // Cap just below 100 so the real completion snap is always visible.
      const pct = Math.min(99.5, 100 * (1 - Math.exp(-elapsed / tau)));
      if (bar) bar.style.width = pct.toFixed(2) + '%';
    }, 80);
  }

  clearTimeout(toast._timer);
  // Loading toasts MUST be persistent — they get explicitly replaced by a
  // success / incomplete / failed toast when the import resolves. Auto-
  // dismissing them after `duration` was the bug that caused users to see
  // "import timed out" right before the property profile actually loaded.
  if (!isLoading) {
    toast._timer = setTimeout(() => { toast.classList.remove('visible'); }, duration);
  }
}

/**
 * Handle a comp imported via the RentingRadar Chrome Extension (AirDNA → Airbnb enrichment).
 * Adds the comp to the currently open property's comps array, or queues it if no profile is open.
 */
function handleExtensionComp(compData) {
  if (!compData) return;

  // Find the target record — use the currently open profile, or the most recently opened one
  let r = null;
  if (currentProfileId) {
    r = records.find(x => x.id === currentProfileId);
  }

  if (!r) {
    // No property open — store in a pending queue and notify user
    if (!window._pendingExtensionComps) window._pendingExtensionComps = [];
    window._pendingExtensionComps.push(compData);
    showToast('Competitor received from extension! Open a property to add it.', 'info');
    return;
  }

  const comps = getComps(r);
  const sectionCount = comps.filter(c => c.rating === (compData.rating || 'competes')).length;
  if (sectionCount >= 10) {
    showToast('Maximum 10 competitors reached for the ' + (compData.rating || 'competes') + ' section.', 'warning');
    return;
  }

  // Check for duplicate (by link or airdnaUrl)
  const isDupe = comps.some(c =>
    (compData.link && c.link === compData.link) ||
    (compData.airdnaUrl && c.airdnaUrl === compData.airdnaUrl)
  );
  if (isDupe) {
    showToast('This competitor has already been imported.', 'warning');
    return;
  }

  // Add the comp
  comps.push({
    link: compData.link || '',
    linkShort: compData.linkShort || 'AirDNA Import',
    annualRevenue: compData.annualRevenue || 0,
    daysAvailable: compData.daysAvailable || 365,
    occupancy: compData.occupancy || 0,
    nightlyRate: compData.nightlyRate || 0,
    guests: compData.guests || 0,
    bedrooms: compData.bedrooms || 0,
    beds: compData.beds || 0,
    bathrooms: compData.bathrooms || 0,
    host: compData.host || '',
    rating: compData.rating || 'competes',
    notes: compData.notes || '',
    airdnaUrl: compData.airdnaUrl || '',
    source: 'airdna-extension',
    importedAt: compData.importedAt || new Date().toISOString()
  });

  saveData();
  render();
  showToast('Competitor imported from AirDNA! (' + sectionCount + '/10)', 'success');
}

/**
 * Handle a listing scraped via the Chrome extension (Zillow, Apartments.com,
 * Hotpads, Facebook Marketplace, Craigslist). Fills the Property Details
 * fields on the currently open record — or the record whose id matches
 * window._rrPendingListingRecordId if set.
 */
/**
 * Normalize a free-form address string via the Google Places API
 * (reuses GPLACES_KEY which already powers manual-entry autocomplete).
 * Returns { street, unit, city, state, zip, lat, lng, formattedAddress }.
 * Falls back to the local regex parser on any failure.
 */
async function rrGeocodeAddress(rawAddress) {
  const fallback = () => {
    const local = (typeof parseAddressParts === 'function' && rawAddress)
      ? parseAddressParts(rawAddress)
      : { street: rawAddress || '', unit: '', city: '', state: '', zip: '' };
    return { ...local, lat: null, lng: null, formattedAddress: rawAddress || '' };
  };
  if (!rawAddress || typeof rawAddress !== 'string') return fallback();
  if (typeof GPLACES_KEY !== 'string' || !GPLACES_KEY) return fallback();
  try {
    // 1) Find the place ID via searchText
    const searchResp = await fetch('https://places.googleapis.com/v1/places:searchText', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Goog-Api-Key': GPLACES_KEY,
        'X-Goog-FieldMask': 'places.id,places.formattedAddress,places.addressComponents,places.location',
      },
      body: JSON.stringify({ textQuery: rawAddress, maxResultCount: 1 }),
    });
    const searchData = await searchResp.json();
    const place = searchData && searchData.places && searchData.places[0];
    if (!place || !place.addressComponents) return fallback();
    const comps = place.addressComponents;
    const get = (type) => (comps.find(c => (c.types || []).includes(type)) || {}).longText || '';
    const getShort = (type) => (comps.find(c => (c.types || []).includes(type)) || {}).shortText || '';
    const streetNum = get('street_number');
    const route = getShort('route') || get('route');
    const street = [streetNum, route].filter(Boolean).join(' ');
    const subpremise = get('subpremise');
    // Preserve the original unit prefix the listing used (Suite, Apt, Ste, #,
    // Bldg, Apartment) instead of always saying "Unit". Google Places strips
    // the prefix and only returns the bare subpremise (e.g. "4B"), so we
    // detect the prefix from the raw address text the user/scraper supplied.
    // Map "Apartment" → "Apt" to match the CRM dropdown options.
    // Default to "#" (the most universal shorthand). "Unit " is only used if
    // the source listing actually says the word "Unit" — otherwise we were
    // injecting a word that wasn't in the listing. The "#" prefix matches
    // the way Zillow / Hotpads / Apartments typically render unit numbers.
    let unitPrefix = '#';
    if (typeof rawAddress === 'string') {
      // Match the # symbol OR a prefix WORD that's followed by an alphanum
      // unit token (so we don't false-positive on the word "unit" appearing
      // mid-sentence in a listing description). Prefer the LAST match in
      // the address — the unit prefix appears AFTER the street, not before.
      const re = /(#|\b(?:Unit|Ste\.?|Suite|Apt\.?|Apartment|Bldg\.?|Building)\b)\s*[A-Za-z0-9-]+/gi;
      let match, last = null;
      while ((match = re.exec(rawAddress)) !== null) last = match;
      if (last) {
        const raw = last[1].replace(/\.$/, '');
        const norm = raw.toLowerCase();
        if (norm === '#') unitPrefix = '#';
        else if (norm === 'ste') unitPrefix = 'Ste';
        else if (norm === 'suite') unitPrefix = 'Suite';
        else if (norm === 'apt' || norm === 'apartment') unitPrefix = 'Apt';
        else if (norm === 'bldg' || norm === 'building') unitPrefix = 'Bldg';
        else if (norm === 'unit') unitPrefix = 'Unit';
      }
    }
    // For "#" prefix the convention is "#4B" (no space); everything else is
    // "<Prefix> <Number>" — matches the manual-entry format builder.
    // v0.7.0: If Google Places didn't return a subpremise (common for
    // smaller buildings), extract the unit token directly from the raw
    // address. The listing clearly stated "#A" or "Apt 4B" — we
    // shouldn't lose it just because Google's geocoder didn't echo it.
    let unitToken = subpremise;
    if (!unitToken && typeof rawAddress === 'string') {
      const unitRe = /(?:#|\b(?:Unit|Ste\.?|Suite|Apt\.?|Apartment|Bldg\.?|Building)\b)\s*([A-Za-z0-9][\w-]*)/gi;
      let um, lastUnit = null;
      while ((um = unitRe.exec(rawAddress)) !== null) lastUnit = um[1];
      if (lastUnit) unitToken = lastUnit;
    }
    const unit = unitToken
      ? (unitPrefix === '#' ? ('#' + unitToken) : (unitPrefix + ' ' + unitToken))
      : '';
    const city = get('locality') || get('sublocality_level_1') || get('administrative_area_level_2') || '';
    const state = getShort('administrative_area_level_1') || '';
    const zip = get('postal_code') || '';
    return {
      street: street || rawAddress,
      unit,
      city,
      state,
      zip,
      lat: place.location ? place.location.latitude : null,
      lng: place.location ? place.location.longitude : null,
      formattedAddress: place.formattedAddress || rawAddress,
    };
  } catch (e) {
    console.log('[RR] rrGeocodeAddress error:', e && e.message);
    return fallback();
  }
}

// Normalize availableDate to 'now' (lowercase) or YYYY-MM-DD. Anything
// unrecognizable returns null so we skip storing it — that prevents the
// Contact & Status date picker from rendering "undefined NaN".
function rrNormalizeAvailableDate(raw) {
  if (raw == null) return null;
  const s = String(raw).trim();
  if (!s) return null;
  const lower = s.toLowerCase();
  if (/^(now|available now|immediately|move[\s-]*in ready|ready now|asap|today)$/.test(lower)) return 'now';
  // Strict ISO (what the picker stores)
  const iso = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (iso) {
    const y = +iso[1], m = +iso[2], d = +iso[3];
    if (m >= 1 && m <= 12 && d >= 1 && d <= 31) {
      return y + '-' + String(m).padStart(2, '0') + '-' + String(d).padStart(2, '0');
    }
    return null;
  }
  // US slash
  const us = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if (us) {
    let y = +us[3]; if (y < 100) y += 2000;
    const m = +us[1], d = +us[2];
    if (m >= 1 && m <= 12 && d >= 1 && d <= 31) return y + '-' + String(m).padStart(2, '0') + '-' + String(d).padStart(2, '0');
    return null;
  }
  // "May 1" / "May 1, 2026" / "May 1st"
  const MO = { jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,sept:9,oct:10,nov:11,dec:12 };
  const word = lower.match(/^([a-z]+)\s+(\d{1,2})(?:st|nd|rd|th)?(?:,?\s+(\d{4}))?$/);
  if (word) {
    const key = word[1].slice(0, word[1].startsWith('sept') ? 4 : 3);
    const m = MO[key]; const d = +word[2];
    if (m && d >= 1 && d <= 31) {
      const now = new Date();
      let y = word[3] ? +word[3] : now.getFullYear();
      if (!word[3]) {
        const guess = new Date(y, m - 1, d);
        if (guess < new Date(now.getFullYear(), now.getMonth(), now.getDate())) y += 1;
      }
      return y + '-' + String(m).padStart(2, '0') + '-' + String(d).padStart(2, '0');
    }
  }
  return null;
}

async function handleExtensionListing(data) {
  if (!data) return;
  // Dump the raw extension payload so we can see exactly what landed.
  // (Open DevTools Console on app.rentingradar.com to inspect.)
  try {
    console.group('[RR] Extension listing import');
    console.log('raw data:', data);
    console.log('beds:', data.bedrooms, 'baths:', data.bathrooms, 'sqft:', data.sqft, 'price:', data.price);
    console.log('propertyDetails keys:', data.propertyDetails ? Object.keys(data.propertyDetails) : []);
    console.log('ai enriched:', data._aiEnriched, 'model:', data._aiModel, 'error:', data._aiError || '(none)');
    if (data._debug) console.log('scraper debug:', data._debug);
    console.groupEnd();
  } catch (_) {}

  // If a specific record id is pending (from a legacy in-profile paste bar),
  // fill that record. Otherwise — including when the data came from the
  // extension popup or the + Add Property paste — create a brand-new property
  // and open its profile.
  const pendingId = window._rrPendingListingRecordId;
  window._rrPendingListingRecordId = null;

  let r = null;
  let createdNew = false;

  if (pendingId) {
    r = records.find(x => x.id === pendingId) || null;
  }

  // Geocode the scraped address through Places — gives us proper
  // street/unit/city/state/zip + lat/lng in one call (no new API key,
  // reuses the existing manual-entry autocomplete setup).
  const geo = await rrGeocodeAddress(data.address);
  const addrParts = {
    street: geo.street || '',
    unit: geo.unit || '',
    city: geo.city || '',
    state: geo.state || '',
    zip: geo.zip || '',
  };
  // Canonical "Street Unit X, City ST ZIP" for the .property field.
  // formatAddressOneLine is the CRM's canonical address formatter — it
  // handles the unit suffix correctly, so contact/status cards and list
  // views all show "1875 Carter Ave Unit 1s, Bronx NY 10457".
  const canonical = formatAddressOneLine(addrParts) || geo.formattedAddress || data.address || data.title || 'New Property';

  if (!r) {
    // Enforce tier/property-count limits just like the manual add flow
    if (typeof checkPropertyLimit === 'function' && !checkPropertyLimit()) return;

    createdNew = true;
    r = {
      id: (typeof uid === 'function' ? uid() : ('r_' + Date.now())),
      property: canonical,
      addressParts: addrParts,
      name: '',
      phone: '',
      email: '',
      status: 'New',
      link: data.sourceUrl || '',
      note: '',
      date: new Date().toISOString().split('T')[0],
      followUpDate: null,
      meetingDate: null,
      notes: [],
      propertyDetails: {},
      propertyNotes: [],
      createdAt: new Date().toISOString(),
    };
    records.unshift(r);
  } else {
    // Fill in address parts on an existing record only if they were empty
    if (!r.addressParts) r.addressParts = { street:'', unit:'', city:'', state:'', zip:'' };
    if (!r.addressParts.street && addrParts.street) r.addressParts = addrParts;
    if ((!r.property || r.property === 'New Property') && canonical) r.property = canonical;
  }

  if (!r.propertyDetails) r.propertyDetails = {};
  const d = r.propertyDetails;

  // Only overwrite empty fields so we don't clobber user edits
  function setIfEmpty(obj, key, val) {
    if (val == null || val === '') return;
    if (obj[key] == null || obj[key] === '' || obj[key] === 0) obj[key] = val;
  }

  if (data.sourceUrl && !r.link) r.link = data.sourceUrl;

  // Core fields
  setIfEmpty(d, 'bedrooms', data.bedrooms);
  setIfEmpty(d, 'bathrooms', data.bathrooms);
  setIfEmpty(d, 'sqft', data.sqft);
  setIfEmpty(d, 'monthlyRent', data.price);

  // Lat/lng from Places geocoding → enables the map view to show this property immediately
  if (geo.lat != null && geo.lng != null) {
    setIfEmpty(d, 'latitude', geo.lat);
    setIfEmpty(d, 'longitude', geo.lng);
  }

  // Deep fields: the scraper populates data.propertyDetails with any
  // PROP_SECTIONS-keyed values it could pull out of structured data.
  // Merge those in without overwriting user edits.
  // Client-side safety net: normalize availableDate even if the extension
  // sends a raw string like "Now", "May 1", or "2026-05-01T00:00".
  if (data.propertyDetails && typeof data.propertyDetails === 'object') {
    if (data.propertyDetails.availableDate != null) {
      data.propertyDetails.availableDate = rrNormalizeAvailableDate(data.propertyDetails.availableDate);
      if (data.propertyDetails.availableDate == null) delete data.propertyDetails.availableDate;
    }
    for (const k in data.propertyDetails) {
      if (!Object.prototype.hasOwnProperty.call(data.propertyDetails, k)) continue;
      const v = data.propertyDetails[k];
      if (v == null || v === '' || (Array.isArray(v) && v.length === 0)) continue;
      if (Array.isArray(v)) {
        // For multi-select fields, union with existing (if any)
        const existing = Array.isArray(d[k]) ? d[k] : [];
        const merged = Array.from(new Set(existing.concat(v)));
        if (merged.length) d[k] = merged;
      } else {
        setIfEmpty(d, k, v);
      }
    }
  }

  // Listing description → Property Note (singular), NOT the Activity Log.
  // We ONLY use AI-extracted bullet points (data.propertyNoteBullets). If
  // Ollama didn't run or didn't return bullets, we leave the Property Note
  // empty rather than dumping the raw listing description — the raw dump
  // was unreadable and the user explicitly asked us to stop doing that.
  const hasExistingNote = r.propertyNote && (r.propertyNote.text || r.propertyNote.html);
  if (!hasExistingNote && Array.isArray(data.propertyNoteBullets) && data.propertyNoteBullets.length) {
    const bullets = data.propertyNoteBullets;
    const noteHtml = '<ul>' + bullets.map((b) => '<li>' + esc(b) + '</li>').join('') + '</ul>';
    const noteText = bullets.map((b) => '• ' + b).join('\n');
    r.propertyNote = {
      text: noteText,
      html: noteHtml,
      date: new Date().toISOString(),
      source: 'Auto-Import (' + (data.source || 'listing') + ')',
    };
  }

  if (typeof saveData === 'function') saveData();
  if (typeof render === 'function') render();

  // ---- Toast: successful / incomplete / failed ----
  // v0.5.0: the LLM is now async — the fast path returns dictionary-only
  // data and the LLM enrichment lands later via LISTING_ENRICHMENT. So
  // "import successful" no longer requires _aiEnriched to be true.
  // We track the pending state on the record so the LISTING_ENRICHMENT
  // handler can find it and patch it in place.
  const coreCount =
    (d.bedrooms != null && d.bedrooms !== '' ? 1 : 0) +
    (d.bathrooms != null && d.bathrooms !== '' ? 1 : 0) +
    (d.sqft != null && d.sqft !== '' ? 1 : 0) +
    (d.monthlyRent != null && d.monthlyRent !== '' ? 1 : 0);
  const hasAnyDetails = Object.keys(d).some((k) => {
    const v = d[k];
    return v != null && v !== '' && (!Array.isArray(v) || v.length > 0);
  });

  let toastMsg, toastTone;
  // v0.8.0: AI enrichment restored — toast reflects AI status.
  const aiOk = data._aiEnriched === true;
  const aiErr = data._aiError || '';
  if (coreCount === 0) {
    toastMsg = 'Import failed — nothing could be read from this listing.';
    toastTone = 'error';
  } else if (coreCount >= 2 && aiOk) {
    toastMsg = createdNew ? 'Import successful.' : 'Property updated from listing.';
    toastTone = 'success';
  } else if (coreCount >= 2 && !aiOk) {
    toastMsg = (createdNew ? 'Import successful' : 'Property updated') + ' — AI details may be incomplete.';
    if (aiErr) toastMsg += ' (' + aiErr.slice(0, 80) + ')';
    toastTone = 'warning';
  } else {
    toastMsg = 'Import partial — some details may need manual entry.';
    if (aiErr) toastMsg += ' (' + aiErr.slice(0, 80) + ')';
    toastTone = 'warning';
  }

  showToast(toastMsg + (data.warning ? ' ' + data.warning : ''), toastTone, 3500);

  if (createdNew && typeof openDetail === 'function') openDetail(r.id);

  if (toastTone !== 'success') {
    console.warn('[RR] Import status:', toastMsg, '— debug:', data._debug || '(no debug trace)', 'ai error:', data._aiError || '(none)');
  }
}

/**
 * Async AI enrichment patcher — receives a LISTING_ENRICHMENT message
 * from the Chrome extension AFTER the initial fast-path import has
 * already opened the property profile. Finds the record by sourceUrl,
 * merges in the LLM additions (Property Note bullets, missing core
 * numbers, utilitiesIncluded, petsAllowed) without clobbering anything
 * the user has touched, and re-renders.
 */
function handleListingEnrichment(patch) {
  if (!patch || typeof patch !== 'object') return;
  const url = String(patch.sourceUrl || '').trim();
  if (!url) {
    console.warn('[RR] LISTING_ENRICHMENT missing sourceUrl');
    return;
  }

  // Find the matching record. Prefer _aiSourceUrl (set when the fast
  // path landed), fall back to .link, fall back to currentProfileId.
  const norm = (s) => String(s || '').trim().toLowerCase().replace(/\/+$/, '');
  const target = norm(url);
  let r = records.find((x) => norm(x._aiSourceUrl) === target)
        || records.find((x) => norm(x.link) === target)
        || (currentProfileId ? records.find((x) => x.id === currentProfileId) : null);

  if (!r) {
    console.warn('[RR] LISTING_ENRICHMENT could not find target record for', url);
    return;
  }

  console.log('[RR] applying LISTING_ENRICHMENT to record', r.id);

  if (!r.propertyDetails) r.propertyDetails = {};
  const d = r.propertyDetails;
  function setIfEmpty(obj, key, val) {
    if (val == null || val === '') return;
    if (obj[key] == null || obj[key] === '' || obj[key] === 0) obj[key] = val;
  }

  // Core numbers (only fill if still missing — never clobber user edits)
  setIfEmpty(d, 'bedrooms', patch.bedrooms);
  setIfEmpty(d, 'bathrooms', patch.bathrooms);
  setIfEmpty(d, 'sqft', patch.sqft);
  setIfEmpty(d, 'monthlyRent', patch.monthlyRent || patch.price);

  // Property details delta (utilitiesIncluded, petsAllowed, availableDate, etc.)
  if (patch.propertyDetails && typeof patch.propertyDetails === 'object') {
    if (patch.propertyDetails.availableDate != null) {
      patch.propertyDetails.availableDate = rrNormalizeAvailableDate(patch.propertyDetails.availableDate);
      if (patch.propertyDetails.availableDate == null) delete patch.propertyDetails.availableDate;
    }
    for (const k in patch.propertyDetails) {
      if (!Object.prototype.hasOwnProperty.call(patch.propertyDetails, k)) continue;
      const v = patch.propertyDetails[k];
      if (v == null || v === '' || (Array.isArray(v) && v.length === 0)) continue;
      if (Array.isArray(v)) {
        const existing = Array.isArray(d[k]) ? d[k] : [];
        const merged = Array.from(new Set(existing.concat(v)));
        if (merged.length) d[k] = merged;
      } else {
        setIfEmpty(d, k, v);
      }
    }
  }

  // Property Note bullets — only fill if the note is still empty (we
  // don't want to overwrite a user's manual notes).
  const hasExistingNote = r.propertyNote && (r.propertyNote.text || r.propertyNote.html);
  if (!hasExistingNote && Array.isArray(patch.propertyNoteBullets) && patch.propertyNoteBullets.length) {
    const bullets = patch.propertyNoteBullets;
    const noteHtml = '<ul>' + bullets.map((b) => '<li>' + esc(b) + '</li>').join('') + '</ul>';
    const noteText = bullets.map((b) => '• ' + b).join('\n');
    r.propertyNote = {
      text: noteText,
      html: noteHtml,
      date: new Date().toISOString(),
      source: 'Auto-Import (AI)',
    };
  }

  // Clear the pending flag — enrichment is done.
  r._aiPending = false;
  if (patch._aiError) {
    r._aiError = patch._aiError;
  } else {
    delete r._aiError;
  }

  if (typeof saveData === 'function') saveData();
  if (typeof render === 'function') render();

  // v0.8.0: AI enrichment restored — enrichment patches are applied inline.
}

/**
 * Called when user clicks "Import details" on the Property Details paste bar.
 */
function importListingFromPaste(recId) {
  const input = document.getElementById('rrListingPasteInput_' + recId);
  const url = input && input.value ? input.value.trim() : '';
  if (!url) { showAppAlert('Please paste a listing URL.', {title: 'Validation', icon: '⚠️'}); return; }

  if (/airdna\.co/i.test(url)) {
    showAppAlert('AirDNA links go in the Competitor Analysis tab. Property Details accepts listing sites only (Zillow, Apartments.com, Hotpads, Facebook Marketplace, Craigslist).', {title: 'Wrong tab', icon: 'ℹ️'});
    return;
  }
  if (typeof rrScrapeViaExtension !== 'function') {
    showAppAlert('Install the RentingRadar Chrome extension to auto-fill from listings.', {title: 'Extension required', icon: '🧩'});
    return;
  }

  window._rrPendingListingRecordId = recId;
  if (input) { input.disabled = true; input.placeholder = 'Importing listing…'; }
  showToast('Importing listing…', 'loading', 30000);

  rrScrapeViaExtension(url, 'listing').then((res) => {
    if (input) { input.disabled = false; input.placeholder = 'Paste a listing link (Zillow, Apartments.com, Hotpads, FB Marketplace, Craigslist)'; input.value = ''; }
    if (!res || !res.ok) {
      if (res && res.error === 'extension-not-installed') {
        showAppAlert('The RentingRadar Chrome extension isn\'t installed. Install it from the Chrome Web Store to enable auto-fill.', {title: 'Extension required', icon: '🧩'});
      } else {
        showAppAlert('Could not import listing: ' + ((res && res.error) || 'Unknown error'), {title: 'Import failed', icon: '⚠️'});
      }
      showToast('Import failed.', 'error');
      return;
    }
    handleExtensionListing(res.data || {});
  }).catch((e) => {
    if (input) { input.disabled = false; input.placeholder = 'Paste a listing link (Zillow, Apartments.com, Hotpads, FB Marketplace, Craigslist)'; }
    showAppAlert('Import error: ' + (e.message || e), {title: 'Import failed', icon: '⚠️'});
    showToast('Import failed.', 'error');
  });
}

// Triggered by the "Import" button on the add-property choice screen.
// Scrapes via the Chrome extension, then delegates to handleExtensionListing
// which creates a brand-new record and opens its profile.
function importFromChoicePaste(){
  const input = document.getElementById('add_choice_url');
  const statusEl = document.getElementById('add_choice_status');
  const url = input && input.value ? input.value.trim() : '';
  if(!url){
    if(statusEl){ statusEl.style.color = 'var(--warning)'; statusEl.textContent = 'Please paste a listing URL.'; }
    return;
  }
  if(/airdna\.co/i.test(url)){
    if(statusEl){ statusEl.style.color = 'var(--warning)'; statusEl.textContent = 'AirDNA links belong in the Competitor Analysis tab, not here.'; }
    return;
  }
  if(typeof rrScrapeViaExtension !== 'function'){
    if(statusEl){ statusEl.style.color = 'var(--warning)'; statusEl.textContent = 'Install the RentingRadar Chrome extension to auto-fill from listings.'; }
    return;
  }
  if(input) input.disabled = true;
  if(statusEl){ statusEl.style.color = 'var(--text2)'; statusEl.textContent = 'Importing listing…'; }
  showToast('Importing listing…', 'loading', 30000);

  // Make sure handleExtensionListing creates a new record (not fills an existing one)
  window._rrPendingListingRecordId = null;

  rrScrapeViaExtension(url, 'listing').then((res) => {
    if(input) input.disabled = false;
    if(!res || !res.ok){
      if(statusEl){
        statusEl.style.color = 'var(--danger)';
        if(res && res.error === 'extension-not-installed'){
          statusEl.textContent = 'The RentingRadar Chrome extension isn\'t installed. Install it from the Chrome Web Store.';
        } else {
          statusEl.textContent = 'Could not import: ' + ((res && res.error) || 'Unknown error');
        }
      }
      return;
    }
    // Close the Add Property modal; handleExtensionListing will open the new profile
    const modal = document.getElementById('detailModal');
    if(modal) modal.classList.remove('open');
    handleExtensionListing(res.data || {});
  }).catch((e) => {
    if(input) input.disabled = false;
    if(statusEl){ statusEl.style.color = 'var(--danger)'; statusEl.textContent = 'Import error: ' + (e.message || e); }
  });
}

function extractAddress(url, details){
  // Try to extract address from URL path
  try {
    const path = new URL(url).pathname;
    const parts = path.split('/').filter(p => p && p.length > 3 && !/^[a-z0-9]{6,10}$/.test(p));
    if(parts.length > 0){
      let addr = parts[0].replace(/-/g,' ').replace(/\b\w/g, c => c.toUpperCase());
      if(parts[1] && /unit|apt|ste/i.test(parts[1].replace(/-/g,' '))) addr += ' '+parts[1].replace(/-/g,' ').replace(/\b\w/g, c => c.toUpperCase());
      return addr;
    }
  } catch(e){}
  return details?.propertyType || 'New Property';
}

/* ===== SEARCH & FILTER ===== */
function getFiltered(){
  let list = records;
  if(filterStatus && filterStatus !== 'All') list = list.filter(r => r.status === filterStatus);
  if(searchQuery){
    const words = searchQuery.split(/\s+/).filter(w => w.length > 0);
    list = list.filter(r => {
      const blob = [r.property, r.name, r.phone, r.email, r.note, r.status].filter(Boolean).join(' ').toLowerCase();
      return words.every(w => blob.includes(w));
    });
  }
  // Multi-column sorting (up to 2)
  if(contactsSortCols.length > 0){
    list = list.slice().sort(function(a, b){
      for(var i = 0; i < contactsSortCols.length; i++){
        var sc = contactsSortCols[i];
        var va = _getSortVal(a, sc.col);
        var vb = _getSortVal(b, sc.col);
        var cmp = 0;
        if(va < vb) cmp = -1; else if(va > vb) cmp = 1;
        if(cmp !== 0) return sc.dir === 'asc' ? cmp : -cmp;
      }
      return 0;
    });
  }
  return list;
}
function _getSortVal(r, col){
  switch(col){
    case 'property': return (r.property||'').toLowerCase();
    case 'name': return (r.name||'').toLowerCase();
    case 'phone': return (r.phone||'');
    case 'email': return (r.email||'').toLowerCase();
    case 'status': return (r.status||'');
    case 'followup': return r.followUpDate||'9999';
    case 'date': return r.date||'';
    default: return '';
  }
}
function toggleContactsSort(col){
  var existing = -1;
  for(var i = 0; i < contactsSortCols.length; i++){
    if(contactsSortCols[i].col === col){ existing = i; break; }
  }
  if(existing >= 0){
    // Cycle: asc → desc → remove
    if(contactsSortCols[existing].dir === 'asc'){
      contactsSortCols[existing].dir = 'desc';
    } else {
      contactsSortCols.splice(existing, 1);
    }
  } else {
    // Add new sort column (max 2)
    if(contactsSortCols.length >= 2) contactsSortCols.shift(); // drop oldest
    contactsSortCols.push({col:col, dir:'asc'});
  }
  render();
}
function clearContactsSort(){ contactsSortCols = []; render(); }

/* ===== EXPORT ===== */
function exportData(format){
  if(!checkCsvAccess()) return;
  const headers = ['Property','Name','Phone','Email','Status','Date','Note','Link','Follow Up Date'];
  const rows = records.map(r => [r.property,r.name,r.phone,r.email,r.status,r.date?r.date.split('T')[0]:'',r.notes.map(n=>n.text).join(' | '),r.link,r.followUpDate||'']);

  if(format === 'csv'){
    const csvContent = [headers, ...rows].map(row => row.map(cell => '"'+(cell||'').replace(/"/g,'""')+'"').join(',')).join('\n');
    downloadFile(csvContent, 'arbitrage_pipeline_'+new Date().toISOString().split('T')[0]+'.csv', 'text/csv');
  }
}

function downloadFile(content, filename, type){
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

/* ===== UTILS ===== */
function truncate(s, n){ return s && s.length > n ? s.substring(0,n)+'…' : (s||'') }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function getStatusColor(status){
  const m = { 'New':'#818cf8', 'No Contact':'#94a3b8', 'Contacted':'#38bdf8', 'Responded':'#2dd4bf', 'Viewing Scheduled':'#a78bfa', 'Viewed':'#c084fc', 'Application Sent':'#f59e0b', 'Approved':'#22c55e', 'Lease Signed':'#10b981', 'Not Interested':'#64748b', 'Deal Fell Through':'#ef4444', 'Follow Up':'#3b82f6', 'Interested':'#34d399', 'Meeting':'#8b5cf6', 'Messaged':'#06b6d4', 'Left Voicemail':'#f97316' };
  return m[status] || '#94a3b8';
}
function fmtPhone(s){
  if(!s) return '';
  const digits = s.replace(/\D/g,'');
  if(digits.length === 10) return '('+digits.slice(0,3)+') '+digits.slice(3,6)+'-'+digits.slice(6);
  if(digits.length === 11 && digits[0]==='1') return '('+digits.slice(1,4)+') '+digits.slice(4,7)+'-'+digits.slice(7);
  return esc(s);
}
function fmtDate(d){
  if(!d) return '—';
  try {
    const s = String(d);
    // Date-only strings (YYYY-MM-DD) — parse as local to avoid timezone shift
    if(/^\d{4}-\d{2}-\d{2}$/.test(s)){
      const [y,m,day] = s.split('-').map(Number);
      return new Date(y, m-1, day).toLocaleDateString('en-US',{ month:'short', day:'numeric', year:'numeric' });
    }
    const dt = new Date(d);
    if(isNaN(dt)) return '—';
    return dt.toLocaleDateString('en-US',{ month:'short', day:'numeric', year:'numeric' });
  } catch(e){ return '—' }
}
function fmtDateTime(d){
  if(!d) return '—';
  try {
    const dt = new Date(d);
    if(isNaN(dt)) return '—';
    // If the string has time info (contains T or is a full ISO string), show time
    const hasTime = typeof d === 'string' && (d.includes('T') && !d.endsWith('T00:00:00.000'));
    const datePart = dt.toLocaleDateString('en-US',{ month:'short', day:'numeric', year:'numeric' });
    if(!hasTime) return datePart;
    const timePart = dt.toLocaleTimeString('en-US',{ hour:'numeric', minute:'2-digit', hour12:true });
    return datePart + ' at ' + timePart;
  } catch(e){ return '—' }
}
function daysDiff(today, target){
  const t = new Date(today); const g = new Date(target);
  return Math.floor((t - g) / 86400000);
}

let acIndex = -1;
function showAutocomplete(){
  const q = document.getElementById('globalSearch').value.trim().toLowerCase();
  if(q.length > 0){ updateAutocomplete(q); return }
  // Empty query — show recently accessed
  showRecentlyAccessed();
}
function showRecentlyAccessed(){
  const box = document.getElementById('searchAutocomplete');
  const recents = records.filter(r => r.lastAccessed && r.id !== currentProfileId).sort((a,b) => new Date(b.lastAccessed) - new Date(a.lastAccessed)).slice(0,10);
  if(!recents.length){
    box.innerHTML = '<div style="padding:16px 14px;color:var(--text3);font-size:.85rem;text-align:center">No recently viewed properties</div>';
    box.classList.add('visible'); acIndex = -1; return;
  }
  let html = '<div class="ac-section"><div class="ac-section-label">Recently Viewed</div>';
  recents.forEach((r, i) => {
    const timeAgo = getTimeAgo(r.lastAccessed);
    html += `<div class="ac-item" data-id="${r.id}" data-idx="${i}" onmousedown="acSelect('${r.id}')" onmouseenter="acIndex=${i};highlightAcItem()">
      <div class="ac-icon">🕐</div>
      <div class="ac-main">
        <div class="ac-title">${esc(r.property)}</div>
        <div class="ac-sub">${r.name?esc(r.name)+' • ':''}${esc(r.status)} • ${timeAgo}</div>
      </div>
    </div>`;
  });
  html += '</div>';
  box.innerHTML = html;
  box.classList.add('visible'); acIndex = -1;
}
function getTimeAgo(iso){
  const now = Date.now(), then = new Date(iso).getTime();
  const mins = Math.floor((now - then) / 60000);
  if(mins < 1) return 'Just now';
  if(mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if(hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if(days < 7) return days + 'd ago';
  return fmtDate(iso);
}
function handleSearch(q){
  searchQuery = q.toLowerCase();
  if(q.trim().length > 0) updateAutocomplete(q.toLowerCase());
  else showRecentlyAccessed();
  render();
}
function matchesAllWords(text, query){
  if(!text) return false;
  const words = query.split(/\s+/).filter(w => w.length > 0);
  const lower = text.toLowerCase();
  return words.every(w => lower.includes(w));
}

function updateAutocomplete(q){
  const box = document.getElementById('searchAutocomplete');
  if(!q || q.length < 1){ showRecentlyAccessed(); return }

  // Match records across all searchable fields, deduplicate by record id
  const seen = new Set();
  const matched = [];
  const limit = 8;

  records.forEach(r => {
    if(seen.has(r.id)) return;
    const searchable = [r.property, r.name, r.phone, r.email].filter(Boolean).join(' ');
    if(matchesAllWords(searchable, q)){
      seen.add(r.id);
      matched.push(r);
    }
  });

  if(!matched.length){ box.classList.remove('visible'); acIndex = -1; return }

  function highlight(text, query){
    if(!text) return '';
    const words = query.split(/\s+/).filter(w => w.length > 0);
    const lower = text.toLowerCase();
    let bestIdx = -1, bestLen = 0;
    for(const w of words){ const i = lower.indexOf(w); if(i >= 0 && w.length > bestLen){ bestIdx = i; bestLen = w.length } }
    if(bestIdx === -1) return esc(text);
    return esc(text.substring(0,bestIdx)) + '<mark>' + esc(text.substring(bestIdx, bestIdx+bestLen)) + '</mark>' + esc(text.substring(bestIdx+bestLen));
  }

  let html = '<div class="ac-section">';
  matched.slice(0, limit).forEach((r, flatIdx) => {
    const address = r.property || 'No address';
    const name = r.name || '';
    const status = r.status || '';
    const phone = r.phone || '';
    const email = r.email || '';
    const isFirst = flatIdx === 0;

    // Always show name + status on first sub-line; phone/email on second line only if they matched
    const nameLine = (name ? highlight(name, q) : '<span style="opacity:.4">No contact</span>') + (status ? ' · <span style="font-weight:600">' + esc(status) + '</span>' : '');
    let extraLine = '';
    const extras = [];
    if(phone && matchesAllWords(phone, q)) extras.push('📞 ' + highlight(phone, q));
    if(email && matchesAllWords(email, q)) extras.push('✉️ ' + highlight(email, q));
    if(extras.length) extraLine = '<div class="ac-sub" style="margin-top:1px">' + extras.join(' · ') + '</div>';

    html += `<div class="ac-item" data-id="${r.id}" data-idx="${flatIdx}" onmousedown="acSelect('${r.id}')" onmouseenter="acIndex=${flatIdx};highlightAcItem()">
      <div class="ac-icon">🏠</div>
      <div class="ac-main">
        <div class="ac-title">${highlight(address, q)}</div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="ac-sub">${nameLine}</div>
          ${isFirst ? '<div style="font-size:.58rem;color:var(--text3);opacity:.5;white-space:nowrap;margin-left:8px">Shift+Enter</div>' : ''}
        </div>
        ${extraLine}
      </div>
    </div>`;
  });
  html += '</div>';

  box.innerHTML = html;
  box.classList.add('visible');
  acIndex = -1;
}

  const inp = document.getElementById('globalSearch');

// Keyboard navigation for autocomplete — attached directly to search input for reliability
function handleSearchKeydown(e){
  const box = document.getElementById('searchAutocomplete');
  if(!box || !box.classList.contains('visible')) return;
  const items = box.querySelectorAll('.ac-item');
  if(!items.length) return;

  if(e.key === 'ArrowDown'){
    e.preventDefault();
    acIndex = Math.min(acIndex + 1, items.length - 1);
    highlightAcItem();
    if(items[acIndex]) items[acIndex].scrollIntoView({ block:'nearest' });
  } else if(e.key === 'ArrowUp'){
    e.preventDefault();
    acIndex = Math.max(acIndex - 1, 0);
    highlightAcItem();
    if(items[acIndex]) items[acIndex].scrollIntoView({ block:'nearest' });
  } else if(e.key === 'Enter' && e.shiftKey){
    e.preventDefault();
    e.stopPropagation();
    const firstId = items[0]?.dataset?.id;
    if(firstId) acSelect(firstId);
  } else if(e.key === 'Enter' && acIndex >= 0){
    e.preventDefault();
    const id = items[acIndex]?.dataset?.id;
    if(id) acSelect(id);
  } else if(e.key === 'Escape'){
    box.classList.remove('visible');
    acIndex = -1;
  }
}

document.addEventListener('keydown', function(e){
  if(e.ctrlKey && !e.metaKey && e.key === 's'){
    if(settingsPrefs.shortcutSearch===false) return;
    e.preventDefault();
    const inp = document.getElementById('globalSearch');
    if(inp){ inp.focus(); inp.select(); }
  }
  // Ctrl+N global shortcut to focus Activity Log note editor
  if(e.ctrlKey && !e.metaKey && e.key === 'n'){
    if(settingsPrefs.shortcutNote===false) return;
    if(currentProfileId){
      const ed = document.getElementById('newNoteRte_'+currentProfileId);
      if(ed){ e.preventDefault(); ed.focus(); }
    }
  }
});

// Stripe API — hosted on Vercel (bypasses Google Cloud org policy)
var VERCEL_API_BASE = 'https://rentingradar-api.vercel.app';

async function callFunction(name, data){
  var user = firebase.auth().currentUser;
  if(!user) throw new Error('Not signed in');
  var token = await user.getIdToken();
  var res = await fetch(VERCEL_API_BASE + '/api/' + name, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ data: data || {} })
  });
  var json = await res.json();
  if(json.error) throw new Error(json.error.message || 'Function call failed');
  return json.result || json;
}

// ── Analysis Quota System ──
// Free: 1 analysis per 30-day cycle (accumulates — previous properties stay unlocked)
// Basic: 10 per 30-day cycle (don't roll over)
// Pro: unlimited
const ANALYSIS_LIMITS = { free: 1, basic: 10, pro: Infinity };
let _analysisQuota = { analyzedProperties: [], cycleStart: null, signupDate: null };

function _aqLoad(){
  try { _analysisQuota = JSON.parse(localStorage.getItem('rr_analysis_quota') || '{}'); } catch(e){}
  if(!_analysisQuota.analyzedProperties) _analysisQuota.analyzedProperties = [];
  if(!_analysisQuota.cycleStart) _analysisQuota.cycleStart = null;
  if(!_analysisQuota.signupDate) _analysisQuota.signupDate = null;
}
function _aqSave(){
  try { localStorage.setItem('rr_analysis_quota', JSON.stringify(_analysisQuota)); } catch(e){}
  // Sync to Firestore
  try {
    const u = firebase.auth().currentUser;
    if(u && db) db.collection('users').doc(u.uid).update({ analysisQuota: _analysisQuota }).catch(()=>{
      db.collection('users').doc(u.uid).set({ analysisQuota: _analysisQuota }, { merge: true }).catch(()=>{});
    });
  } catch(e){}
}
function _aqLoadFromFirestore(data){
  if(data && data.analysisQuota){
    _analysisQuota = data.analysisQuota;
    if(!_analysisQuota.analyzedProperties) _analysisQuota.analyzedProperties = [];
    try { localStorage.setItem('rr_analysis_quota', JSON.stringify(_analysisQuota)); } catch(e){}
  }
}

function _aqGetSignupDate(){
  return _analysisQuota.signupDate || null;
}

function _aqSetSignupDate(dateStr){
  _analysisQuota.signupDate = dateStr;
  _aqSave();
}

// Get the current 30-day cycle boundaries
// Free tier: 30-day cooldown from last analysis date
// Basic tier: 30-day cycle based on signup date
function _aqGetCurrentCycle(){
  const msPerCycle = 30 * 24 * 60 * 60 * 1000;
  const now = new Date();

  // Free tier: cooldown based on most recent analysis date
  if(currentTier === 'free'){
    const analyses = _analysisQuota.analyzedProperties || [];
    if(analyses.length === 0){
      // No analyses yet — user can analyze right away; no reset date needed
      return { start: null, end: null, resetDate: null, freeReady: true };
    }
    // Find the most recent analysis date
    const lastAnalysis = analyses.reduce((latest, a) => {
      const d = new Date(a.date).getTime();
      return d > latest ? d : latest;
    }, 0);
    const cooldownEnd = new Date(lastAnalysis + msPerCycle);
    const ready = now.getTime() >= cooldownEnd.getTime();
    return { start: new Date(lastAnalysis).toISOString(), end: cooldownEnd.toISOString(), resetDate: cooldownEnd, freeReady: ready };
  }

  // Basic tier: cycle based on signup date
  const signup = _aqGetSignupDate();
  if(!signup) return { start: null, end: null, resetDate: null };
  const signupDate = new Date(signup);
  const elapsed = now.getTime() - signupDate.getTime();
  const cycleNum = Math.floor(elapsed / msPerCycle);
  const cycleStart = new Date(signupDate.getTime() + cycleNum * msPerCycle);
  const cycleEnd = new Date(cycleStart.getTime() + msPerCycle);
  return { start: cycleStart.toISOString(), end: cycleEnd.toISOString(), resetDate: cycleEnd };
}

// Get properties analyzed in the CURRENT 30-day cycle
function _aqGetCurrentCycleAnalyses(){
  const cycle = _aqGetCurrentCycle();
  if(!cycle.start) return [];
  const cycleStart = new Date(cycle.start).getTime();
  const cycleEnd = new Date(cycle.end).getTime();
  return _analysisQuota.analyzedProperties.filter(a => {
    const t = new Date(a.date).getTime();
    return t >= cycleStart && t < cycleEnd;
  });
}

// Check if a specific property has EVER been analyzed (permanently unlocked)
function isPropertyAnalyzed(propertyId){
  return _analysisQuota.analyzedProperties.some(a => a.id === propertyId);
}

// Get remaining analyses for the current cycle
function getAnalysisRemaining(){
  if(currentTier === 'pro') return Infinity;
  // Free tier: cooldown-based — either 1 (ready) or 0 (still cooling down)
  if(currentTier === 'free'){
    const cycle = _aqGetCurrentCycle();
    if(cycle.freeReady || cycle.freeReady === undefined && !cycle.start) return 1;
    return 0;
  }
  // Basic tier: count-based within billing cycle
  const limit = ANALYSIS_LIMITS[currentTier] || 0;
  const used = _aqGetCurrentCycleAnalyses().length;
  return Math.max(0, limit - used);
}

// Get total analyses used this cycle
function getAnalysisUsedThisCycle(){
  return _aqGetCurrentCycleAnalyses().length;
}

// Check if user can access analysis tabs for a given property
function canAccessAnalysis(propertyId){
  if(currentTier === 'pro') return true;
  // Property already analyzed — always accessible
  if(isPropertyAnalyzed(propertyId)) return true;
  // Has remaining quota this cycle
  return getAnalysisRemaining() > 0;
}

// Commit a property as analyzed (uses one analysis slot)
function commitPropertyAnalysis(propertyId){
  if(isPropertyAnalyzed(propertyId)) return; // Already analyzed
  _analysisQuota.analyzedProperties.push({
    id: propertyId,
    date: new Date().toISOString()
  });
  _aqSave();

  // If user just used their last analysis, send the quota limit email
  if(currentTier !== 'pro' && getAnalysisRemaining() <= 0){
    _sendAnalysisLimitEmail();
  }
}

// Fire the analysis limit email via Cloud Function
function _sendAnalysisLimitEmail(){
  try {
    const fn = firebase.functions().httpsCallable('sendAnalysisLimitEmail');
    fn({ resetDate: getAnalysisResetDateStr() }).then(res => {
      if(res.data && res.data.sent) console.log('Analysis limit email sent.');
    }).catch(err => console.warn('Analysis limit email error:', err));
  } catch(e){ console.warn('Could not call sendAnalysisLimitEmail:', e); }
}

// Send meeting calendar invite via Cloud Function
function _sendMeetingCalendarInvite(r){
  if(!_currentUid || !r.meetingDate || !r.meetingTime) return;
  try {
    const notes = (r.notes || []).filter(n => n.type === 'note' || !n.type).map(n => {
      if(n.html) return n.html.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
      return (n.text || '').trim();
    }).filter(t => t.length > 0).slice(0, 10);

    callFunction('sendMeetingInvite', {
      meetingDate: r.meetingDate,
      meetingTime: r.meetingTime,
      contactName: r.name || '',
      propertyAddress: r.property || '',
      propertyNotes: notes,
      durationMinutes: 60,
      timezone: getUserTimezone()
    }).then(function(result){
      if(result && result.data && result.data.sent){
        showToast('Calendar invite sent to your email!', 'success', 5000);
      }
    }).catch(function(err){ console.warn('Meeting invite error:', err); });
  } catch(e){ console.warn('Could not call sendMeetingInvite:', e); }
}

// Format the reset date for display
function getAnalysisResetDateStr(){
  const cycle = _aqGetCurrentCycle();
  if(!cycle.resetDate) return '';
  return cycle.resetDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// ====================================================================
// ===== TUTORIAL EDITOR (Admin-only) =====
// ====================================================================
// Firestore: tutorialContent/published (live), tutorialContent/draft (working copy)
// Each doc shape: { chapters:[{title,tier,steps:[stepIdx...]}], steps:[{chapter,image,title,desc,highlight:{x,y,w,h}|null,tier}], updatedAt }
// Screenshots stored in Firebase Storage at tutorialScreenshots/{uuid}.{ext}, referenced by URL.
// Steps may use legacy filename (e.g. '01-dashboard.webp', resolved via tutorials/) or full https:// URLs.

let _teState = { chapters:[], steps:[] };       // working state
let _teSavedSnapshot = null;                    // last-saved draft snapshot (JSON string)
let _tePublishedSnapshot = null;                // last-known published snapshot (JSON string)
let _teUndoStack = [];
let _teRedoStack = [];
let _teLoaded = false;
let _teLoading = false;
let _teSelectedStep = -1;
let _teEditingChapter = -1;
let _teHighlightDrag = null;                    // {startX, startY, rect}
const TE_MAX_HISTORY = 50;

function _teClone(o){ return JSON.parse(JSON.stringify(o)); }
function _teSerialize(s){ return JSON.stringify({ chapters: s.chapters, steps: s.steps }); }
function _teIsDirty(){
  if(!_teLoaded) return false;
  return _teSerialize(_teState) !== _teSavedSnapshot;
}
function _teHasUnpublished(){
  if(!_teLoaded) return false;
  return _teSavedSnapshot !== _tePublishedSnapshot || _teIsDirty();
}
function _tePushHistory(){
  _teUndoStack.push(_teSerialize(_teState));
  if(_teUndoStack.length > TE_MAX_HISTORY) _teUndoStack.shift();
  _teRedoStack = [];
}
function _teMutate(fn){
  _tePushHistory();
  fn(_teState);
  _teRender();
}
function _teUndo(){
  if(_teUndoStack.length === 0) return;
  const cur = _teSerialize(_teState);
  const prev = _teUndoStack.pop();
  _teRedoStack.push(cur);
  const parsed = JSON.parse(prev);
  _teState.chapters = parsed.chapters;
  _teState.steps = parsed.steps;
  _teRender();
}
function _teRedo(){
  if(_teRedoStack.length === 0) return;
  const cur = _teSerialize(_teState);
  const next = _teRedoStack.pop();
  _teUndoStack.push(cur);
  const parsed = JSON.parse(next);
  _teState.chapters = parsed.chapters;
  _teState.steps = parsed.steps;
  _teRender();
}

function _teResolveImageUrl(image){
  if(!image) return '';
  if(image.indexOf('http') === 0) return image;
  return 'tutorials/' + image;
}

let _teLoadError = null;
async function _teLoadFromFirestore(){
  if(_teLoading) return;
  _teLoading = true;
  _teLoadError = null;
  try {
    if(typeof db === 'undefined' || !db){
      throw new Error('Firestore (db) not initialized');
    }
    if(typeof firebase === 'undefined' || !firebase.firestore){
      throw new Error('Firebase SDK not loaded');
    }
    console.log('[TutEditor] Loading tutorial content from Firestore…');
    const draftRef = db.collection('tutorialContent').doc('draft');
    const pubRef = db.collection('tutorialContent').doc('published');
    const draftDoc = await draftRef.get();
    console.log('[TutEditor] draft doc exists:', draftDoc.exists);
    const pubDoc = await pubRef.get();
    console.log('[TutEditor] published doc exists:', pubDoc.exists);

    let draft, pub;
    if(draftDoc.exists){
      const d = draftDoc.data();
      draft = { chapters: d.chapters || [], steps: d.steps || [] };
    }
    if(pubDoc.exists){
      const p = pubDoc.data();
      pub = { chapters: p.chapters || [], steps: p.steps || [] };
    }

    // Seed if neither exists
    if(!draft && !pub){
      console.log('[TutEditor] Seeding from baseline…');
      const seed = _teClone(TE_BASELINE);
      const seedPayload = { chapters: seed.chapters, steps: seed.steps, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
      await draftRef.set(seedPayload);
      console.log('[TutEditor] draft seeded');
      await pubRef.set(seedPayload);
      console.log('[TutEditor] published seeded');
      draft = seed;
      pub = _teClone(seed);
    } else if(!draft){
      draft = _teClone(pub);
      await draftRef.set({ chapters: draft.chapters, steps: draft.steps, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    } else if(!pub){
      pub = _teClone(draft);
    }

    _teState.chapters = draft.chapters;
    _teState.steps = draft.steps;
    // Merge any duplicate chapter names that may have crept into the data
    _teConsolidateChapters(_teState);
    _teSavedSnapshot = _teSerialize(_teState);
    _tePublishedSnapshot = _teSerialize({ chapters: pub.chapters, steps: pub.steps });
    _teUndoStack = [];
    _teRedoStack = [];
    _teLoaded = true;
    console.log('[TutEditor] Loaded successfully:', _teState.chapters.length, 'chapters,', _teState.steps.length, 'steps');
  } catch(err){
    console.error('[TutEditor] Load failed:', err);
    _teLoadError = (err && err.code ? '[' + err.code + '] ' : '') + (err && err.message ? err.message : String(err));
    if(typeof showToast === 'function') showToast('Failed to load tutorial content: ' + _teLoadError, 'error', 5000);
  } finally {
    _teLoading = false;
  }
}

async function _teSaveDraft(){
  if(!_teLoaded) return;
  try {
    const payload = { chapters: _teState.chapters, steps: _teState.steps, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
    await db.collection('tutorialContent').doc('draft').set(payload);
    _teSavedSnapshot = _teSerialize(_teState);
    showToast('Draft saved', 'success', 2000);
    _teRender();
  } catch(err){
    console.error('Save draft failed:', err);
    showToast('Save failed: ' + (err.message||err), 'error', 4000);
  }
}

async function _tePublishDraft(){
  if(!_teLoaded) return;
  if(!_teHasUnpublished()){ showToast('Nothing new to publish', 'info', 2000); return; }
  // If there are unsaved changes, ask to save them first via styled confirm.
  if(_teIsDirty()){
    showAppConfirm('You have unsaved changes. Save them first, then publish?', {
      title: 'Unsaved Changes',
      icon: '💾',
      confirmText: 'Save & Continue',
      cancelText: 'Cancel',
      confirmClass: 'btn-primary',
      onConfirm: async () => {
        await _teSaveDraft();
        _tePromptPublishConfirm();
      }
    });
    return;
  }
  _tePromptPublishConfirm();
}

function _tePromptPublishConfirm(){
  showAppConfirm('Publish the current draft to all users? This will replace the live tutorial immediately.', {
    title: 'Publish Tutorial',
    icon: '🚀',
    confirmText: 'Publish',
    cancelText: 'Cancel',
    confirmClass: 'btn-primary',
    onConfirm: async () => {
      try {
        const payload = { chapters: _teState.chapters, steps: _teState.steps, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
        await db.collection('tutorialContent').doc('published').set(payload);
        _tePublishedSnapshot = _teSerialize(_teState);
        showToast('Tutorial published to all users', 'success', 3000);
        _teRender();
      } catch(err){
        console.error('Publish failed:', err);
        showAppAlert('Publish failed: ' + (err.message||err), { title: 'Publish Failed', icon: '❌' });
      }
    }
  });
}

function renderTutorialEditor(){
  return '<div id="teRoot" style="padding:20px 24px"><div id="teLoading" style="text-align:center;padding:60px;color:var(--text2)">Loading tutorial content…</div></div>';
}

async function initTutorialEditor(){
  // Wait briefly for auth to settle if needed
  if(!_isAdmin){
    for(let i = 0; i < 30; i++){
      await new Promise(r => setTimeout(r, 100));
      if(_isAdmin) break;
    }
  }
  if(!_isAdmin){
    const root = document.getElementById('teRoot');
    if(root) root.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text2)">Access denied. You must be signed in as an admin (help@rentingradar.com) to use the Tutorial Editor.<br><br>Current user: ' + esc((currentUser&&currentUser.email)||'(not signed in)') + '</div>';
    return;
  }
  if(!_teLoaded){
    try {
      await _teLoadFromFirestore();
    } catch(err){
      console.error('[TutEditor] init error:', err);
    }
  }
  if(_teLoaded){
    _teRender();
  } else {
    const root = document.getElementById('teRoot');
    if(root){
      root.innerHTML = '<div style="padding:40px;max-width:640px;margin:0 auto;text-align:center"><div style="font-size:1.1rem;font-weight:700;color:var(--danger);margin-bottom:8px">Could not load tutorial content</div>'
        + '<div style="font-size:.85rem;color:var(--text2);margin-bottom:14px">' + (_teLoadError ? esc(_teLoadError) : 'Unknown error — check the browser console (F12) for details.') + '</div>'
        + '<div style="font-size:.78rem;color:var(--text3);margin-bottom:14px;text-align:left;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px;padding:12px">'
        + '<b>Common causes:</b><br>'
        + '1. Firestore rules for <code>tutorialContent</code> haven\'t been published yet.<br>'
        + '2. You\'re not signed in as <code>help@rentingradar.com</code> (current: <code>' + esc((currentUser&&currentUser.email)||'(none)') + '</code>).<br>'
        + '3. Network/Firebase outage.</div>'
        + '<button onclick="initTutorialEditor()" style="padding:8px 18px;background:var(--primary);color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600">Retry</button></div>';
    }
  }
}

function _teRender(){
  const root = document.getElementById('teRoot');
  if(!root) return;
  if(!_teLoaded){
    root.innerHTML = '<div style="text-align:center;padding:60px;color:var(--text2)">Loading tutorial content…</div>';
    return;
  }
  // Preserve scroll position of the chapter list panel across re-renders so
  // clicking up/down arrows or making edits doesn't snap the user back to the
  // top of the list.
  const _prevChapList = document.getElementById('teChapList');
  const _prevChapScroll = _prevChapList ? _prevChapList.scrollTop : 0;
  const dirty = _teIsDirty();
  const unpub = _teHasUnpublished();
  const totalSteps = _teState.steps.length;
  const totalChapters = _teState.chapters.length;

  let h = '';
  // Toolbar
  h += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px">';
  h += '<div style="font-weight:700;color:var(--text);margin-right:6px">Tutorial Editor</div>';
  h += '<div style="font-size:.78rem;color:var(--text2);margin-right:auto">'+totalChapters+' chapter'+(totalChapters!==1?'s':'')+' · '+totalSteps+' lesson'+(totalSteps!==1?'s':'')+(dirty?' · <span style="color:#f59e0b">unsaved changes</span>':'')+(unpub&&!dirty?' · <span style="color:#818cf8">unpublished changes</span>':'')+'</div>';
  h += '<button onclick="_teUndo()" '+(_teUndoStack.length===0?'disabled':'')+' title="Undo" style="padding:7px 12px;border:1px solid var(--border);background:transparent;color:var(--text);border-radius:6px;cursor:pointer;font-size:.8rem">↶ Undo</button>';
  h += '<button onclick="_teRedo()" '+(_teRedoStack.length===0?'disabled':'')+' title="Redo" style="padding:7px 12px;border:1px solid var(--border);background:transparent;color:var(--text);border-radius:6px;cursor:pointer;font-size:.8rem">↷ Redo</button>';
  h += '<button onclick="_teSaveDraft()" '+(!dirty?'disabled':'')+' style="padding:7px 14px;border:1px solid '+(dirty?'#f59e0b':'var(--border)')+';background:'+(dirty?'#f59e0b':'transparent')+';color:'+(dirty?'#000':'var(--text2)')+';border-radius:6px;cursor:'+(dirty?'pointer':'not-allowed')+';font-weight:600;font-size:.8rem">💾 Save Draft</button>';
  h += '<button onclick="_tePublishDraft()" '+(!unpub?'disabled':'')+' style="padding:7px 14px;border:none;background:'+(unpub?'var(--primary)':'rgba(99,129,250,.18)')+';color:#fff;border-radius:6px;cursor:'+(unpub?'pointer':'not-allowed')+';font-weight:600;font-size:.8rem;opacity:'+(unpub?'1':'.5')+'">🚀 Publish</button>';
  h += '</div>';

  // Two-column layout
  h += '<div style="display:grid;grid-template-columns:340px 1fr;gap:16px;align-items:start">';

  // ── LEFT: Chapters & lessons list ──
  h += '<div id="teChapList" style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;max-height:calc(100vh - 220px);overflow-y:auto">';
  h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div style="font-weight:600;font-size:.85rem;color:var(--text)">Chapters</div><button onclick="_teAddChapter()" title="Add chapter" style="padding:4px 9px;border:1px solid var(--border);background:transparent;color:var(--text);border-radius:5px;cursor:pointer;font-size:.78rem">+ Chapter</button></div>';

  // Compute a global display number for every step based on visual order
  // (chapters in order, lessons within each chapter in their listed order).
  // This way, the number a user sees next to a lesson reflects its actual
  // position in the overall tutorial flow, not its index in the steps array.
  const _teDisplayNum = {};
  let _teRunningNum = 0;
  _teState.chapters.forEach((ch) => {
    (ch.steps||[]).forEach(si => {
      if(_teState.steps[si]){
        _teRunningNum++;
        _teDisplayNum[si] = _teRunningNum;
      }
    });
  });

  _teState.chapters.forEach((ch, ci) => {
    h += '<div style="margin-bottom:14px;border:1px solid var(--border);border-radius:10px;padding:10px 12px 10px 12px;background:rgba(255,255,255,.02)">';
    // Big editable chapter title heading at top of card
    h += '<input value="'+escAttr(ch.title||'')+'" placeholder="Chapter name" title="Click to rename chapter" oninput="_teEditChapterTitle('+ci+',this.value)" style="width:100%;padding:6px 0;margin-bottom:8px;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-size:1rem;font-weight:700;outline:none">';
    // Move-to-chapter dropdown (merge into another chapter)
    h += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">';
    h += '<label style="font-size:.68rem;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600">Chapter</label>';
    h += '<select title="Select another chapter to merge this chapter\'s lessons into it" onchange="_teMergeChapterInto('+ci+',parseInt(this.value))" style="flex:1;padding:5px 8px;background:var(--input-bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:.78rem">';
    _teState.chapters.forEach((other, oi) => {
      h += '<option value="'+oi+'"'+(oi===ci?' selected':'')+'>'+esc(other.title || '(untitled)')+'</option>';
    });
    h += '</select>';
    h += '</div>';
    h += '<div style="display:flex;gap:4px;margin-bottom:6px">';
    h += '<button onclick="_teMoveChapter('+ci+',-1)" '+(ci===0?'disabled':'')+' style="padding:2px 7px;border:1px solid var(--border);background:transparent;color:var(--text2);border-radius:4px;cursor:pointer;font-size:.7rem">↑</button>';
    h += '<button onclick="_teMoveChapter('+ci+',1)" '+(ci===_teState.chapters.length-1?'disabled':'')+' style="padding:2px 7px;border:1px solid var(--border);background:transparent;color:var(--text2);border-radius:4px;cursor:pointer;font-size:.7rem">↓</button>';
    h += '<button onclick="_teDeleteChapter('+ci+')" style="padding:2px 7px;border:1px solid var(--danger);background:transparent;color:var(--danger);border-radius:4px;cursor:pointer;font-size:.7rem;margin-left:auto">Delete</button>';
    h += '</div>';

    // Lessons within chapter
    const stepIdxs = (ch.steps||[]).filter(si => _teState.steps[si]);
    h += '<div>';
    stepIdxs.forEach((si, posInChapter) => {
      const s = _teState.steps[si];
      const sel = _teSelectedStep === si;

    h += '</div>';

    _teState.chapters.forEach((ch, ci) => { h += '<option value="'+ci+'"'+(s.chapter===ci?' selected':'')+'>'+esc(ch.title||'(untitled)')+'</option>'; });
    h += '</select>';
    h += '</div>';

    // Screenshot section
    h += '<div style="margin-bottom:12px"><label style="display:block;font-size:.72rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Screenshot</label>';

    const imgUrl = _teResolveImageUrl(s.image);
    h += '<div id="teImgWrap" style="position:relative;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:#000;user-select:none;cursor:crosshair">';
    if(imgUrl){
      h += '<img id="teImgPreview" src="'+escAttr(imgUrl)+'" style="display:block;width:100%;height:auto;pointer-events:none" draggable="false">';
      if(s.highlight){
        h += '<div id="teHl" style="position:absolute;left:'+s.highlight.x+'%;top:'+s.highlight.y+'%;width:'+s.highlight.w+'%;height:'+s.highlight.h+'%;border:2px solid #6381fa;background:rgba(99,129,250,.18);box-shadow:0 0 0 4px rgba(99,129,250,.18);pointer-events:none;border-radius:4px"></div>';
      }
    } else {
      h += '<div style="padding:40px;text-align:center;color:var(--text3);font-size:.8rem">No screenshot. Upload one above.</div>';
    }
    h += '</div>';
    if(s.highlight){
      h += '<div style="margin-top:6px;display:flex;gap:6px;align-items:center"><span style="font-size:.7rem;color:var(--text3)">Highlight: '+s.highlight.x.toFixed(1)+'%, '+s.highlight.y.toFixed(1)+'%, '+s.highlight.w.toFixed(1)+'%×'+s.highlight.h.toFixed(1)+'%</span>';
      h += '<button onclick="_teClearHighlight('+_teSelectedStep+')" style="margin-left:auto;padding:3px 9px;border:1px solid var(--border);background:transparent;color:var(--text2);border-radius:4px;cursor:pointer;font-size:.7rem">Clear highlight</button></div>';

  h += '</div>'; // right column

  root.innerHTML = h;

  // Restore chapter-list scroll position after re-render so the user stays
  // anchored where they were when they clicked an up/down button.
  const _newChapList = document.getElementById('teChapList');
  if(_newChapList && _prevChapScroll) _newChapList.scrollTop = _prevChapScroll;

  // Wire highlight drag if image present
  if(_teSelectedStep >= 0 && _teState.steps[_teSelectedStep] && _teState.steps[_teSelectedStep].image){
    _teWireHighlightDrag();
  }
}

function escAttr(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Mutations ──
function _teAddChapter(){
  _teShowChapterPrompt({
    title: 'Add New Chapter',
    label: 'Chapter name',
    initial: '',
    okText: 'Add Chapter',
    onSubmit: (raw) => {
      const trimmed = String(raw||'').trim();
      if(!trimmed){
        showAppAlert('Chapter name cannot be empty.', { title: 'Invalid Name', icon: '⚠️' });
        return false;
      }
      const exists = _teState.chapters.some(c => String(c.title||'').trim().toLowerCase() === trimmed.toLowerCase());
      if(exists){
        showAppAlert('A chapter named "' + esc(trimmed) + '" already exists. Please choose a different name.', { title: 'Duplicate Chapter', icon: '⚠️' });
        return false;
      }
      _teMutate(st => {
        st.chapters.push({ title: trimmed, tier:'free', steps:[] });
      });
      return true;
    }
  });
}

// CRM-styled prompt modal for chapter operations (matches showAppAlert/Confirm UI)

    + '</div>'
    + '<div class="multi-editor-body" style="padding:22px 24px">'
