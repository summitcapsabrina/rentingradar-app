function initTheme(){
  try {
    const saved = localStorage.getItem('rr_theme_mode');
    const savedAccent = localStorage.getItem('rr_theme_accent');
    if(saved === 'light') isDark = false;
    if(savedAccent && ACCENTS.find(a => a.key === savedAccent)) currentAccent = savedAccent;
    // Free tier forced to light standard
    if(currentTier === 'free'){ isDark = false; currentAccent = 'standard' }
  } catch(e){}
  applyTheme();
}

function applyTheme(){
  const root = document.documentElement;
  root.classList.toggle('light', !isDark);
  // Remove all accent classes
  ACCENTS.forEach(a => { if(a.key !== 'standard') root.classList.remove('accent-'+a.key) });
  // Apply current accent
  if(currentAccent !== 'standard') root.classList.add('accent-'+currentAccent);

/* ===== AUTOCOMPLETE ===== */
let acIndex = -1;
function showAutocomplete(){
  const q = document.getElementById('globalSearch').value.trim().toLowerCase();
  if(q.length > 0){ updateAutocomplete(q); return }
  // Empty query — show recently accessed
  showRecentlyAccessed();
}
function showRecentlyAccessed(){
  const box = document.getElementById('searchAutocomplete');
  const recents = records.filter(r => r.lastAccessed).sort((a,b) => new Date(b.lastAccessed) - new Date(a.lastAccessed)).slice(0,10);
  if(!recents.length){
    box.innerHTML = '<div style="padding:16px 14px;color:var(--text3);font-size:.85rem;text-align:center">No recently viewed properties</div>';
    box.classList.add('visible'); acIndex = -1; return;
  }
  let html = '<div class="ac-section"><div class="ac-section-label">Recently Viewed</div>';
  recents.forEach((r, i) => {
    const timeAgo = getTimeAgo(r.lastAccessed);
    html += `<div class="ac-item" data-id="${r.id}" data-idx="${i}" onmousedown="acSelect('${r.id}')" onmouseenter="acIndex=${i};highlightAcItem()">
      <div class="ac-icon">🕐</div>
      <div class="ac-main">
        <div class="ac-title">${esc(r.property)}</div>
        <div class="ac-sub">${r.name?esc(r.name)+' • ':''}${esc(r.status)} • ${timeAgo}</div>
      </div>
    </div>`;
  });
  html += '</div>';
  box.innerHTML = html;
  box.classList.add('visible'); acIndex = -1;
}
function getTimeAgo(iso){
  const now = Date.now(), then = new Date(iso).getTime();
  const mins = Math.floor((now - then) / 60000);
  if(mins < 1) return 'Just now';
  if(mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if(hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if(days < 7) return days + 'd ago';
  return fmtDate(iso);
}
function handleSearch(q){
  searchQuery = q.toLowerCase();
  if(q.trim().length > 0) updateAutocomplete(q.toLowerCase());
  else showRecentlyAccessed();
  render();
}
function matchesAllWords(text, query){
  if(!text) return false;
  const words = query.split(/\s+/).filter(w => w.length > 0);
  const lower = text.toLowerCase();
  return words.every(w => lower.includes(w));
}

function updateAutocomplete(q){
  const box = document.getElementById('searchAutocomplete');
  if(!q || q.length < 1){ showRecentlyAccessed(); return }

  // Match records across all searchable fields, deduplicate by record id
  const seen = new Set();
  const matched = [];
  const limit = 8;

  records.forEach(r => {
    if(seen.has(r.id)) return;
    const searchable = [r.property, r.name, r.phone, r.email].filter(Boolean).join(' ');
    if(matchesAllWords(searchable, q)){
      seen.add(r.id);
      matched.push(r);
    }
  });

  if(!matched.length){ box.classList.remove('visible'); acIndex = -1; return }

  function highlight(text, query){
    if(!text) return '';
    const words = query.split(/\s+/).filter(w => w.length > 0);
    const lower = text.toLowerCase();
    let bestIdx = -1, bestLen = 0;
    for(const w of words){ const i = lower.indexOf(w); if(i >= 0 && w.length > bestLen){ bestIdx = i; bestLen = w.length } }
    if(bestIdx === -1) return esc(text);
    return esc(text.substring(0,bestIdx)) + '<mark>' + esc(text.substring(bestIdx, bestIdx+bestLen)) + '</mark>' + esc(text.substring(bestIdx+bestLen));
  }

  let html = '<div class="ac-section">';
  matched.slice(0, limit).forEach((r, flatIdx) => {
    const address = r.property || 'No address';
    const name = r.name || '';
    const status = r.status || '';
    const phone = r.phone || '';
    const email = r.email || '';
    const isFirst = flatIdx === 0;

    // Always show name + status on first sub-line; phone/email on second line only if they matched
    const nameLine = (name ? highlight(name, q) : '<span style="opacity:.4">No contact</span>') + (status ? ' · <span style="font-weight:600">' + esc(status) + '</span>' : '');
    let extraLine = '';
    const extras = [];
    if(phone && matchesAllWords(phone, q)) extras.push('📞 ' + highlight(phone, q));
    if(email && matchesAllWords(email, q)) extras.push('✉️ ' + highlight(email, q));
    if(extras.length) extraLine = '<div class="ac-sub" style="margin-top:1px">' + extras.join(' · ') + '</div>';

    html += `<div class="ac-item" data-id="${r.id}" data-idx="${flatIdx}" onmousedown="acSelect('${r.id}')" onmouseenter="acIndex=${flatIdx};highlightAcItem()">
      <div class="ac-icon">🏠</div>
      <div class="ac-main">
        <div class="ac-title">${highlight(address, q)}</div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="ac-sub">${nameLine}</div>
          ${isFirst ? '<div style="font-size:.58rem;color:var(--text3);opacity:.5;white-space:nowrap;margin-left:8px">Shift+Enter</div>' : ''}
        </div>
        ${extraLine}
      </div>
    </div>`;
  });
  html += '</div>';

  box.innerHTML = html;
  box.classList.add('visible');
  acIndex = -1;
}

function clearSearch(){
  searchQuery = '';
  const inp = document.getElementById('globalSearch');
  if(inp) inp.value = '';
  const box = document.getElementById('searchAutocomplete');
  if(box) box.classList.remove('visible');
}

function acSelect(id){
  clearSearch();
  document.getElementById('globalSearch').blur();
  openDetail(id);
}

function highlightAcItem(){
  const items = document.querySelectorAll('#searchAutocomplete .ac-item');
  items.forEach((el,i) => el.classList.toggle('ac-active', i === acIndex));
}

// Keyboard navigation for autocomplete — attached directly to search input for reliability
function handleSearchKeydown(e){
  const box = document.getElementById('searchAutocomplete');
  if(!box || !box.classList.contains('visible')) return;
  const items = box.querySelectorAll('.ac-item');
  if(!items.length) return;

  if(e.key === 'ArrowDown'){
    e.preventDefault();
    acIndex = Math.min(acIndex + 1, items.length - 1);
    highlightAcItem();
    if(items[acIndex]) items[acIndex].scrollIntoView({ block:'nearest' });
  } else if(e.key === 'ArrowUp'){
    e.preventDefault();
    acIndex = Math.max(acIndex - 1, 0);
    highlightAcItem();
    if(items[acIndex]) items[acIndex].scrollIntoView({ block:'nearest' });
  } else if(e.key === 'Enter' && e.shiftKey){
    e.preventDefault();
    e.stopPropagation();
    const firstId = items[0]?.dataset?.id;
    if(firstId) acSelect(firstId);
  } else if(e.key === 'Enter' && acIndex >= 0){
    e.preventDefault();
    const id = items[acIndex]?.dataset?.id;
    if(id) acSelect(id);
  } else if(e.key === 'Escape'){
    box.classList.remove('visible');
    acIndex = -1;
  }
}

// Close autocomplete when clicking outside
document.addEventListener('click', function(e){
  if(!e.target.closest('.header-search')){
    document.getElementById('searchAutocomplete')?.classList.remove('visible');
    acIndex = -1;
  }
});

// Ctrl+S global shortcut to focus search bar (Ctrl only, not Cmd on Mac)
document.addEventListener('keydown', function(e){
  if(e.ctrlKey && !e.metaKey && e.key === 's'){
    if(settingsPrefs.shortcutSearch===false) return;
    e.preventDefault();
    const inp = document.getElementById('globalSearch');
    if(inp){ inp.focus(); inp.select(); }

  if(e.ctrlKey && !e.metaKey && e.key === 'n'){
    if(settingsPrefs.shortcutNote===false) return;
    if(currentProfileId){
      const ed = document.getElementById('newNoteRte_'+currentProfileId);
      if(ed){ e.preventDefault(); ed.focus(); }
    }
  }
});

  provider.setCustomParameters({ prompt: 'select_account' });
  firebase.auth().signInWithPopup(provider).then(result => {
    setUser(result.user);

    if(err.code === 'auth/popup-closed-by-user' || err.code === 'auth/cancelled-popup-request') return;
    if(err.code === 'auth/popup-blocked'){
      firebase.auth().signInWithRedirect(provider);
    } else {

  });
}

function handleCsvFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    const text = e.target.result;
    parseCsv(text);
  };
  reader.readAsText(file);
}

function parseCsv(text){
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if(lines.length < 2){ alert('CSV must have a header row and at least one data row.'); return }

  // Parse headers
  csvHeaders = parseCSVLine(lines[0]);

  // Parse rows
  csvImportData = [];
  for(let i = 1; i < lines.length; i++){
    const vals = parseCSVLine(lines[i]);
    if(vals.some(v => v.trim())) csvImportData.push(vals);
  }

  showCsvMapping();
}

function parseCSVLine(line){
  const result = []; let current = ''; let inQuotes = false;
  for(let i = 0; i < line.length; i++){
    const c = line[i];
    if(c === '"'){ if(inQuotes && line[i+1] === '"'){ current += '"'; i++ } else { inQuotes = !inQuotes } }
    else if(c === ',' && !inQuotes){ result.push(current.trim()); current = '' }
    else { current += c }
  }
  result.push(current.trim());
  return result;
}

function showCsvMapping(){

    else if(hl.includes('name') && !hl.includes('file')) autoMap.name = i;

    else if(hl.includes('email') || hl.includes('e-mail')) autoMap.email = i;

    else if(hl.includes('link') || hl.includes('url') || hl.includes('listing')) autoMap.link = i;
    else if(hl.includes('note') || hl.includes('comment')) autoMap.note = i;
    else if(hl.includes('date')) autoMap.date = i;
  });

  body.innerHTML = `
    <div style="margin-bottom:16px">
      <div style="font-size:.95rem;font-weight:600;margin-bottom:4px">Map Your Columns</div>

        <select id="csvMap_${m.key}" style="font-size:.82rem;padding:5px 8px">
          <option value="-1">— Skip —</option>
          ${csvHeaders.map((h,i) => `<option value="${i}" ${autoMap[m.key]===i?'selected':''}>${esc(h)}</option>`).join('')}
        </select>
      `).join('')}

      </table>

      <button class="btn btn-secondary" onclick="document.getElementById('detailModal').classList.remove('open')">Cancel</button>
      <button class="btn btn-primary" onclick="executeCsvImport()">Import ${csvImportData.length} Records</button>
    </div>`;

function executeCsvImport(){
  // Validate required mappings
  const maps = {};
  for(const m of REQUIRED_MAPPINGS){
    const sel = document.getElementById('csvMap_'+m.key);
    maps[m.key] = sel ? parseInt(sel.value) : -1;
  }

  if(maps.property < 0){
    alert('Property Address is required. Please map it to a CSV column.');
    return;
  }

  // Confirm before import
  const preview = csvImportData.slice(0,3).map(row => {
    const addr = maps.property >= 0 ? row[maps.property] : '';
    return addr.substring(0,50);
  }).join(', ');

  // Check property limit
  const limit = TIERS[currentTier]?.maxProperties || 50;
  const remaining = limit === Infinity ? Infinity : limit - records.length;
  const toImport = Math.min(csvImportData.length, remaining === Infinity ? csvImportData.length : remaining);
  if(remaining <= 0){
    alert("You've reached the "+TIERS[currentTier].name+" plan limit of "+limit+" properties. Upgrade to add more.");
    switchView('pricing'); return;
  }
  const limitNote = remaining !== Infinity && csvImportData.length > remaining ? `\n\nNote: Your ${TIERS[currentTier].name} plan allows ${limit} properties. Only the first ${toImport} of ${csvImportData.length} rows will be imported.` : '';

  if(!confirm(`Import ${toImport} records?${limitNote}\n\nFirst few: ${preview}...`)) return;

  let imported = 0;
  for(const row of csvImportData){
    // Enforce limit during import
    const curLimit = TIERS[currentTier]?.maxProperties || 50;
    if(curLimit !== Infinity && records.length >= curLimit) break;
    const prop = maps.property >= 0 ? (row[maps.property]||'').trim() : '';
    if(!prop) continue;

    const r = {
      id: uid(),
      property: prop,
      name: maps.name >= 0 ? (row[maps.name]||'').trim() : '',
      phone: maps.phone >= 0 ? (row[maps.phone]||'').trim() : '',
      email: maps.email >= 0 ? (row[maps.email]||'').trim() : '',
      status: maps.status >= 0 ? (row[maps.status]||'').trim() || 'New' : 'New',
      link: maps.link >= 0 ? (row[maps.link]||'').trim() : '',
      note: maps.note >= 0 ? (row[maps.note]||'').trim() : '',
      date: maps.date >= 0 ? (row[maps.date]||'').trim() : new Date().toISOString().split('T')[0],
      followUpDate: null,
      notes: [],
      propertyDetails: {},
      propertyNotes: [],
      createdAt: new Date().toISOString()
    };

    // Validate status — default to New if unrecognized
    if(r.status && !STATUSES.includes(r.status)){
      // Try to fuzzy match
      const match = STATUSES.find(s => s.toLowerCase() === r.status.toLowerCase());
      r.status = match || 'New';
    }

    if(r.note) r.notes.push({ id:uid(), text:r.note, date:r.date, type:'import' });
    records.push(r);
    imported++;
  }

  saveData();
  document.getElementById('detailModal').classList.remove('open');
  render();
  alert(`Successfully imported ${imported} properties!`);
}

function startHeroEdit(recId, field, containerId){

  const currentVal = field === 'monthlyRent' ? (r.propertyDetails?.monthlyRent || '') : (r[field] || '');

function showAutoImportWarning(recId, field, containerId, currentVal){
  // Remove any existing warning
  document.querySelectorAll('.auto-import-warning').forEach(w => w.remove());

  const container = document.getElementById(containerId);
  if(!container) return;
  container.style.position = 'relative';

  const warning = document.createElement('div');
  warning.className = 'auto-import-warning';
  warning.innerHTML = `
    <div class="aiw-title">⚠ Auto-imported data</div>
    <div class="aiw-text">This value was automatically extracted from the listing. Are you sure you want to edit it?</div>

      <button class="btn btn-secondary btn-sm" onclick="this.closest('.auto-import-warning').remove()">Cancel</button>
    </div>`;
  container.appendChild(warning);

  // Close on click outside
  setTimeout(() => {
    const closer = (e) => { if(!warning.contains(e.target) && e.target !== container){ warning.remove(); document.removeEventListener('click', closer) } };
    document.addEventListener('click', closer);
  }, 50);
}

function activateHeroInput(recId, field, containerId, currentVal){
  const container = document.getElementById(containerId);
  if(!container) return;
  activeHeroEdit = { recId, field, containerId };

  const isRent = field === 'monthlyRent';
  const displayId = isRent ? 'heroRentDisplay' : 'heroAddressDisplay';
  const displayEl = document.getElementById(displayId);
  if(!displayEl) return;

  if(isRent){
    // Simple input for rent
    const input = document.createElement('input');
    input.type = 'number';
    input.className = 'hero-edit-input';
    input.value = currentVal;
    input.placeholder = 'Monthly rent amount';
    displayEl.replaceWith(input);
    input.focus();
    input.select();
    const editIcon = container.querySelector('.hero-edit-icon');
    if(editIcon) editIcon.style.display = 'none';
    container.onclick = null;
    const save = () => {
      if(!records.find(x=>x.id===recId).propertyDetails) records.find(x=>x.id===recId).propertyDetails = {};
      records.find(x=>x.id===recId).propertyDetails.monthlyRent = input.value.trim();
      saveData(); activeHeroEdit = null; render();
    };
    input.addEventListener('blur', save);
    input.addEventListener('keydown', (e) => { if(e.key==='Enter'){e.preventDefault();input.blur()} if(e.key==='Escape'){activeHeroEdit=null;render()} });
  } else {
    // Open address editor as popup
    showAddressEditorPopup(recId);
  }
}

function getCalc(r){
  if(!r.details) r.details = {};
  if(!r.details.calculator) r.details.calculator = {};
  const c = r.details.calculator;
  for(const [k,v] of Object.entries(CALC_DEFAULTS)){
    if(c[k] === undefined || c[k] === null) c[k] = v;
  }
  // Always sync cleaning default with bedroom count unless user manually edited it
  const br = parseInt((r.propertyDetails||{}).bedrooms) || 0;
  const defaultCleaning = CLEANING_DEFAULTS[Math.min(br,6)] !== undefined ? CLEANING_DEFAULTS[Math.min(br,6)] : 650;
  if(!c._cleaningManual){
    c.cleaning = defaultCleaning;
  }
  return c;
}

function fmtAcct(n){
  if(n===undefined||n===null||isNaN(n)) return '$ —';
  const abs = Math.abs(n);
  const s = '$' + abs.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
  return n < 0 ? '(' + s + ')' : ' ' + s + ' ';
}
function fmtAcct2(n){
  if(n===undefined||n===null||isNaN(n)) return '$ —';
  const abs = Math.abs(n);
  const s = '$' + abs.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  return n < 0 ? '(' + s + ')' : ' ' + s + ' ';

function fmtNum(n){
  if(n===undefined||n===null||isNaN(n)) return '—';
  return Number(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:2});
}
function fmtMoney(n){
  if(n===undefined||n===null||isNaN(n)) return '$—';
  const neg = n < 0;
  return (neg?'-':'')+'$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
}

function cRow(label, valHtml, opts={}){
  const cls = opts.total ? ' total-row' : '';
  const hint = opts.hint ? '<span class="calc-label-hint">'+opts.hint+'</span>' : '';
  return '<div class="calc-row'+cls+'"><div class="calc-label">'+label+hint+'</div>'+valHtml+'</div>';
}
function cInput(id, value, opts={}){
  const cls = opts.pct ? ' calc-pct' : '';
  const raw = value !== undefined && value !== null ? value : 0;
  let display;
  if(opts.pct){
    display = raw + '%';
  } else if(opts.noDollar){
    display = raw.toString();
  } else {
    const num = parseFloat(raw) || 0;
    display = '$' + num.toLocaleString('en-US', {minimumFractionDigits: num % 1 !== 0 ? 2 : 0, maximumFractionDigits: 2});
  }
  if(parseFloat(raw) === 0 && !opts.pct) display = '<span style="color:var(--text3)">$0</span>';
  if(parseFloat(raw) === 0 && opts.pct) display = '<span style="color:var(--text3)">0%</span>';
  if(parseFloat(raw) === 0 && opts.noDollar) display = '<span style="color:var(--text3)">0</span>';
  const dataAttrs = ' data-calc-field="'+id+'" data-calc-raw="'+raw+'"'+(opts.pct?' data-calc-pct="1"':'')+(opts.noDollar?' data-calc-nodollar="1"':'');
  return '<div class="calc-val'+cls+'"><div class="calc-editable" onclick="calcEditCell(this)"'+dataAttrs+'>'+display+'</div></div>';
}
function cDisplay(value, opts={}){
  const cls = opts.computed ? ' computed' : (opts.muted ? ' muted' : '');
  return '<div class="calc-val"><span class="calc-display'+cls+'">'+value+'</span></div>';
}

function calcComputeAll(r){
  const pd = r.propertyDetails || {};
  const c = getCalc(r);
  const br = parseInt(pd.bedrooms) || 0;
  const monthlyRent = parseFloat(pd.monthlyRent) || 0;
  const furnishCost = (br * c.costPerBR) + (c.extraCommonSpaces * c.costPerExtraSpace);
  const totalInvested = c.applicationFees + c.securityDeposit + c.firstLastRent + c.additionalFee1 + c.additionalFee2 + furnishCost;
  // Pull ADR and occupancy from Analysis comps (only comps with actual values)
  const comps = (r.details && r.details.comps) ? r.details.comps : [];
  const compsWithRate = comps.filter(x => parseFloat(x.nightlyRate) > 0);
  const compsWithOcc = comps.filter(x => parseFloat(x.occupancy) > 0);
  const compsWithDays = comps.filter(x => parseFloat(x.daysAvailable) > 0);
  const compAvgRate = compsWithRate.length > 0 ? compsWithRate.reduce((s,x)=>s+parseFloat(x.nightlyRate),0)/compsWithRate.length : 0;
  const compAvgOcc = compsWithOcc.length > 0 ? compsWithOcc.reduce((s,x)=>s+parseFloat(x.occupancy),0)/compsWithOcc.length : 0;
  const avgDailyRate = compAvgRate;
  const estOccupancyRate = compAvgOcc;
  const daysOccupied = 365 * (estOccupancyRate / 100);
  const annualRevenue = avgDailyRate * daysOccupied;
  const monthlyRevenue = annualRevenue / 12;
  const cleaning = c.cleaning;
  const coHostFee = monthlyRevenue * (c.coHostPct / 100);
  const airbnbFee = monthlyRevenue * 0.03;
  const totalMonthlyExp = c.insurance + c.strFee + c.water + c.gas + c.electric + c.wifiTv + c.futureRepairs + c.incidentals + c.parking + cleaning + c.garbageRecycling + c.channelManager + c.cityPermit + coHostFee + airbnbFee;
  const annualExp = totalMonthlyExp * 12;
  const monthlyNOI = monthlyRevenue - totalMonthlyExp;
  const annualNOI = monthlyNOI * 12;
  const monthlyCF = monthlyNOI - monthlyRent;
  const annualCF = monthlyCF * 12;
  const cocReturn = totalInvested > 0 ? (annualCF / totalInvested * 100) : 0;
  // Compute Likely Revenue from rated comps (same logic as Analysis tab)
  let likelyRevenue = 0, bestRevenue = 0, worstRevenue = 0;
  let hasRatedData = false;
  const ratedCompsWithRev = comps.filter(cx => {
    const rating = cx.rating || '';
    if(!rating) return false;
    const rev = parseFloat(cx.annualRevenue) || 0;
    if(rev > 0) return true;
    const rr = parseFloat(cx.nightlyRate) || 0;
    const oo = parseFloat(cx.occupancy) || 0;
    return rr > 0 && oo > 0;
  });
  if(ratedCompsWithRev.length > 0){
    const MULT = {
      likely: { beats: 1.15, competes: 1.00, loses: 0.85 },
      best:   { beats: 1.20, competes: 1.05, loses: 0.95 },
      worst:  { beats: 1.05, competes: 0.95, loses: 0.80 }
    };
    let sumL = 0, sumB = 0, sumW = 0;
    ratedCompsWithRev.forEach(cx => {
      let rev = parseFloat(cx.annualRevenue) || 0;
      if(rev === 0){
        const rr = parseFloat(cx.nightlyRate) || 0;
        const oo = parseFloat(cx.occupancy) || 0;
        const dd = parseFloat(cx.daysAvailable) || 365;
        rev = rr * dd * (oo / 100);
      }
      const rating = cx.rating;
      sumL += rev * (MULT.likely[rating] || 1);
      sumB += rev * (MULT.best[rating] || 1);
      sumW += rev * (MULT.worst[rating] || 1);
    });
    likelyRevenue = Math.round(sumL / ratedCompsWithRev.length);
    bestRevenue = Math.round(sumB / ratedCompsWithRev.length);
    worstRevenue = Math.round(sumW / ratedCompsWithRev.length);
    hasRatedData = true;
  }
  // Helper: compute derived values for a given annual revenue
  const fixedExp = c.insurance + c.strFee + c.water + c.gas + c.electric + c.wifiTv + c.futureRepairs + c.incidentals + c.parking + cleaning + c.garbageRecycling + c.channelManager + c.cityPermit;
  function deriveFromRev(annRev){
    const mRev = annRev / 12;
    const mExp = fixedExp + mRev * (c.coHostPct / 100) + mRev * 0.03;
    const aExp = mExp * 12;
    const mNOI = mRev - mExp;
    const mCF = mNOI - monthlyRent;
    const aCF = mCF * 12;
    const coc = totalInvested > 0 ? (aCF / totalInvested * 100) : 0;
    return { monthlyRev: mRev, totalMonthlyExp: mExp, annualExp: aExp, monthlyNOI: mNOI, annualNOI: mNOI*12, monthlyCF: mCF, annualCF: aCF, cocReturn: coc };
  }
  const likelyD = hasRatedData ? deriveFromRev(likelyRevenue) : deriveFromRev(annualRevenue);
  const bestD = hasRatedData ? deriveFromRev(bestRevenue) : null;
  const worstD = hasRatedData ? deriveFromRev(worstRevenue) : null;
  return { c, br, monthlyRent, furnishCost, totalInvested, avgDailyRate, estOccupancyRate, daysOccupied, annualRevenue, monthlyRevenue, cleaning, coHostFee, airbnbFee, totalMonthlyExp, annualExp, monthlyNOI, annualNOI, monthlyCF, annualCF, cocReturn, compsCount: comps.length, likelyRevenue, bestRevenue, worstRevenue, hasRatedData, likelyD, bestD, worstD };
}

function renderCalculatorTab(r){
  const pd = r.propertyDetails || {};
  const v = calcComputeAll(r);
  const c = v.c;

  let h = '<div class="calc-layout">';

  // ══════ LEFT PANEL: KPIs + PAYBACK ══════
  h += '<div class="calc-panel">';

  // Resolve active projection data based on selected mode
  const pm = calcProjMode; // 'avg','likely','best','worst'
  const projLabels = { avg:'Comp Avg', likely:'Likely', best:'Best Case', worst:'Worst Case' };
  const projColors = { avg:'var(--text3)', likely:'var(--num-computed)', best:'var(--num-success)', worst:'var(--num-danger)' };
  let activeD; // derived data for selected projection
  if(pm === 'avg' || !v.hasRatedData){
    activeD = { monthlyNOI: v.monthlyNOI, annualNOI: v.annualNOI, monthlyCF: v.monthlyCF, annualCF: v.annualCF, cocReturn: v.cocReturn };
  } else if(pm === 'best' && v.bestD){
    activeD = v.bestD;
  } else if(pm === 'worst' && v.worstD){
    activeD = v.worstD;
  } else {
    activeD = v.likelyD;
  }
  const activeProjLabel = v.hasRatedData ? projLabels[pm] : 'Comp Avg';

  // KPI Cards (top of left panel) — driven by selected projection
  const kpiNOI = activeD.monthlyNOI;
  const kpiAnnualNOI = activeD.annualNOI;
  const kpiMonthlyCF = activeD.monthlyCF;
  const kpiAnnualCF = activeD.annualCF;
  const kpiCoC = activeD.cocReturn;
  const cfClass = kpiMonthlyCF >= 0 ? 'positive' : 'negative';
  const cocClass = kpiCoC >= 0 ? 'positive' : 'negative';
  const kpiTagColor = projColors[v.hasRatedData?pm:'avg'];
  const kpiTagHtml = '<div class="kpi-proj-tag" style="color:'+kpiTagColor+';border-color:'+kpiTagColor+'">'+activeProjLabel+'</div>';
  const insufficientComps = v.compsCount < 3;
  const nedHtml = '<span style="color:var(--text3);font-size:.78rem;font-style:italic">Not Enough Data</span>';
  const nedSubHtml = '<span style="color:var(--text3);font-size:.7rem;font-style:italic">Add at least 3 comps in Competitor Analysis</span>';
  h += '<div class="calc-kpi-grid calc-kpi-grid-left">';
  h += '<div class="calc-kpi"><div class="kpi-label">Net Operating Income'+kpiTagHtml+'</div><div class="kpi-monthly">'+(insufficientComps ? nedHtml : fmtMoney(Math.round(kpiNOI))+'<span class="kpi-per">/mo</span>')+'</div><div class="kpi-annual">'+(insufficientComps ? nedSubHtml : fmtMoney(Math.round(kpiAnnualNOI))+'/yr')+'</div></div>';
  h += '<div class="calc-kpi"><div class="kpi-label">Monthly Rent<div class="kpi-proj-tag" style="color:#d97706;border-color:#d97706">Fixed</div></div><div class="kpi-monthly">'+(v.monthlyRent ? fmtMoney(v.monthlyRent) : '<span style="color:var(--text3);font-style:italic">Set in Property Details</span>')+'<span class="kpi-per">/mo</span></div><div class="kpi-annual">'+fmtMoney(v.monthlyRent*12)+'/yr</div></div>';
  h += '<div class="calc-kpi '+(insufficientComps?'':cfClass)+'"><div class="kpi-label">Cash Flow'+kpiTagHtml+'</div><div class="kpi-monthly">'+(insufficientComps ? nedHtml : fmtMoney(Math.round(kpiMonthlyCF))+'<span class="kpi-per">/mo</span>')+'</div><div class="kpi-annual">'+(insufficientComps ? nedSubHtml : fmtMoney(Math.round(kpiAnnualCF))+'/yr')+'</div></div>';
  h += '<div class="calc-kpi '+(insufficientComps?'':cocClass)+'"><div class="kpi-label">Cash on Cash Return'+kpiTagHtml+'</div><div class="kpi-monthly">'+(insufficientComps ? nedHtml : kpiCoC.toFixed(1)+'%')+'</div><div class="kpi-annual">'+(insufficientComps ? nedSubHtml : fmtMoney(Math.round(v.totalInvested))+' invested')+'</div></div>';
  h += '</div>';

  // Payback Period Visual (compact for left panel) — driven by selected projection
  const inv = v.totalInvested;
  const acf = Math.round(activeD.annualCF);
  const cumVals = [];
  let cumRun = -inv;
  cumVals.push(cumRun);
  let breakEvenYear = null;
  for(let y=1; y<=10; y++){
    const prev = cumRun;
    cumRun += acf;
    cumVals.push(cumRun);
    if(breakEvenYear === null && prev < 0 && cumRun >= 0){
      breakEvenYear = y - 1 + (Math.abs(prev) / (Math.abs(prev) + cumRun));
    }
  }
  const maxNeg = Math.max(...cumVals.filter(v => v < 0).map(v => Math.abs(v)), 1);
  const maxPos = Math.max(...cumVals.filter(v => v >= 0).map(v => v), 1);

  let paybackHeadline, paybackSub, paybackColor;
  if(inv === 0){
    paybackHeadline = 'No Investment';
    paybackSub = 'Enter your costs in the Expenses tab';
    paybackColor = 'var(--text3)';
  } else if(acf <= 0){
    paybackHeadline = 'Not Recoverable';
    paybackSub = 'Cash flow is negative — investment won\'t pay back';
    paybackColor = 'var(--num-danger)';
  } else if(breakEvenYear !== null){
    const yrs = Math.floor(breakEvenYear);
    const mos = Math.round((breakEvenYear - yrs) * 12);
    paybackHeadline = yrs + (yrs===1?' year':' years') + (mos > 0 ? ', ' + mos + (mos===1?' month':' months') : '');
    paybackSub = 'to recover your ' + fmtMoney(inv) + ' investment';
    paybackColor = breakEvenYear <= 3 ? 'var(--num-success)' : breakEvenYear <= 6 ? 'var(--num-warning)' : 'var(--num-danger)';
  } else {
    paybackHeadline = '10+ years';
    paybackSub = 'Investment not recovered within 10 years';
    paybackColor = 'var(--num-danger)';
  }

  h += '<div class="calc-section"><div class="calc-section-header">Payback Period</div><div class="calc-section-body" style="padding:8px 10px">';
  if(insufficientComps){
    h += '<div style="text-align:center;padding:20px 8px">';
    h += '<div style="font-size:1.1rem;font-weight:800;color:var(--text3)">Not Enough Data</div>';
    h += '<div style="font-size:.7rem;color:var(--text3);margin-top:4px">Add at least 3 comps in Competitor Analysis</div>';
    h += '</div>';
  } else {
    h += '<div style="text-align:center;margin-bottom:10px">';
    h += '<div style="font-size:1.1rem;font-weight:800;color:'+paybackColor+'">'+paybackHeadline+'</div>';
    h += '<div style="font-size:.7rem;color:var(--text3);margin-top:1px">'+paybackSub+'</div>';
    h += '</div>';

    h += '<div style="display:flex;justify-content:space-around;margin-bottom:10px;gap:4px">';
    h += '<div style="text-align:center"><div style="font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.4px">Investment</div><div style="font-size:.78rem;font-weight:700;color:var(--num-danger)">'+fmtMoney(inv)+'</div></div>';
    h += '<div style="text-align:center"><div style="font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.4px">Annual Cash Flow</div><div style="font-size:.78rem;font-weight:700;color:'+(acf>=0?'var(--num-success)':'var(--num-danger)')+'">'+fmtMoney(acf)+'/yr</div></div>';
    h += '<div style="text-align:center"><div style="font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.4px">Yr 10 Balance</div><div style="font-size:.78rem;font-weight:700;color:'+(cumVals[10]>=0?'var(--num-success)':'var(--num-danger)')+'">'+fmtMoney(Math.round(cumVals[10]))+'</div></div>';
    h += '</div>';

    h += '<div class="payback-chart payback-chart-compact">';
    for(let y=0; y<=10; y++){
      const val = cumVals[y];
      const isNeg = val < 0;
      const pct = isNeg ? (Math.abs(val)/maxNeg)*48 : (val/maxPos)*48;
      const barColor = isNeg ? 'var(--num-danger)' : 'var(--num-success)';
      const isBreakEven = breakEvenYear !== null && y === Math.ceil(breakEvenYear);
      h += '<div class="payback-row">';
      h += '<div class="payback-yr-label">Yr '+y+'</div>';
      h += '<div class="payback-bar-track">';
      h += '<div class="payback-zero-line"></div>';
      if(isNeg){
        h += '<div class="payback-bar payback-bar-neg" style="width:'+pct.toFixed(1)+'%;background:'+barColor+';opacity:'+(y===0?'1':'.75')+'"></div>';
      } else {
        h += '<div class="payback-bar payback-bar-pos" style="width:'+(val===0?'0':pct.toFixed(1))+'%;background:'+barColor+';opacity:.85"></div>';
      }
      if(isBreakEven){
        h += '<div class="payback-break-marker" title="Break-even point">&#9733;</div>';
      }
      h += '</div>';
      h += '<div class="payback-val" style="color:'+(isNeg?'var(--num-danger)':'var(--num-success)')+'">'+fmtMoney(Math.round(val))+'</div>';
      h += '</div>';
    }
    h += '</div>';
  }
  h += '</div></div>';

  h += '</div>'; // end left panel

  // ══════ RIGHT PANEL: NET INCOME + DEAL TEMP + REVENUE + PAYBACK ══════
  h += '<div class="calc-panel">';

  // Projected Yearly Net (top of right panel) — selectable columns
  const noComps = v.compsCount === 0;
  const hasRated = v.hasRatedData;
  const projAnnualRent = Math.round(v.monthlyRent * 12);
  const noDataHtml = '<span style="color:var(--text3);font-size:.7rem;font-style:italic">No data</span>';
  // Helper: format net value — negative shows red with -($X)/yr, positive shows green
  function fmtNet(val, suffix){
    if(val >= 0) return '<span style="color:var(--num-success);font-weight:700">'+fmtMoney(val)+suffix+'</span>';
    return '<span style="color:var(--num-danger);font-weight:700">-$'+Math.abs(val).toLocaleString()+suffix+'</span>';
  }
  function fmtNetLight(val, suffix){
    if(val >= 0) return '<span style="color:var(--num-success)">'+fmtMoney(val)+suffix+'</span>';
    return '<span style="color:var(--num-danger)">-$'+Math.abs(val).toLocaleString()+suffix+'</span>';
  }

  // Column definitions: order is Comp Avg, Best, Likely, Worst
  const cols = [
    { key:'avg', label:'Comp Avg', color:'var(--text2)', tooltip:'Average from Competitor Analysis comps',
      rev: insufficientComps ? 0 : Math.round(v.annualRevenue), exp: insufficientComps ? 0 : Math.round(v.annualExp), hasData: !insufficientComps },
    { key:'best', label:'Best', color:'var(--num-success)', tooltip:'Best case scenario',
      rev: hasRated ? Math.round(v.bestRevenue) : 0, exp: hasRated ? Math.round(v.bestD.annualExp) : 0, hasData: hasRated },
    { key:'likely', label:'Likely', color:'var(--num-computed)', tooltip:'Likely projection based on comp ratings',
      rev: hasRated ? Math.round(v.likelyRevenue) : 0, exp: hasRated ? Math.round(v.likelyD.annualExp) : 0, hasData: hasRated },
    { key:'worst', label:'Worst', color:'var(--num-danger)', tooltip:'Worst case scenario',
      rev: hasRated ? Math.round(v.worstRevenue) : 0, exp: hasRated ? Math.round(v.worstD.annualExp) : 0, hasData: hasRated }
  ];
  cols.forEach(col => {
    col.net = col.hasData ? (col.rev - col.exp - projAnnualRent) : 0;
    col.monthlyNet = col.hasData ? Math.round(col.net / 12) : 0;
  });

  // Determine effective active mode (fall back to avg if rated data not available)
  const effMode = (hasRated || pm === 'avg') ? pm : 'avg';

  h += '<div class="calc-section"><div class="calc-section-header">Projected Yearly Net</div>';

  // Clickable column headers
  h += '<div class="pyn-col-headers">';
  h += '<div class="pyn-label-spacer"></div>';
  cols.forEach(col => {
    const isActive = col.key === effMode;
    const canClick = col.hasData;
    h += '<div class="pyn-col-header'+(isActive?' pyn-col-active':'')+(!canClick?' pyn-col-disabled':'')+'" ';
    h += 'style="--col-color:'+col.color+'" ';
    if(canClick) h += 'onclick="setCalcProjMode(\''+col.key+'\')" ';
    h += 'title="'+(canClick ? col.tooltip + (isActive ? ' (active)' : ' — click to select') : 'Rate comps in Competitor Analysis to enable')+'">';
    h += '<span class="pyn-col-label">'+col.label+'</span>';
    if(isActive) h += '<div class="pyn-col-indicator"></div>';
    h += '</div>';
  });
  h += '</div>';

  h += '<div class="calc-section-body pyn-body">';

  // Data rows — helper to build a row
  function pynRow(label, getVal, opts){
    const isTotal = opts && opts.total;
    h += '<div class="calc-row'+(isTotal?' total-row':'')+'">';
    h += '<div class="calc-label">'+label+'</div>';
    cols.forEach(col => {
      const isActive = col.key === effMode;
      h += '<div class="calc-val pyn-val'+(isActive?' pyn-val-active':'')+'">';
      h += getVal(col);
      h += '</div>';
    });
    h += '</div>';
  }

  // Annual Revenue
  pynRow('Annual Revenue', col => {
    if(!col.hasData) return noDataHtml;
    return '<span class="calc-display computed">'+fmtAcct(col.rev)+'</span>';
  });

  // Annual Operating Expenses — subtraction sign, same style
  pynRow('Annual Operating Expenses', col => {
    if(!col.hasData) return noDataHtml;
    return '<span class="calc-display computed">-'+fmtMoney(col.exp)+'</span>';
  });

  // Annual Rent — same across all
  pynRow('Annual Rent', col => {
    return '<span class="calc-display computed">-'+fmtMoney(projAnnualRent)+'</span>';
  });

  // Projected Yearly Net
  pynRow('Projected Yearly Net', col => {
    if(!col.hasData) return noDataHtml;
    return fmtNet(col.net, '/yr');
  }, {total:true});

  // Monthly Net
  pynRow('Monthly Net', col => {
    if(!col.hasData) return noDataHtml;
    return fmtNetLight(col.monthlyNet, '/mo');
  });

  h += '</div></div>';

  // Deal Temperature — driven by selected projection
  const dealCol = cols.find(c2 => c2.key === effMode) || cols[0];
  const dealMonthlyNet = dealCol.monthlyNet;
  const dealTemp = insufficientComps ? null : (dealMonthlyNet >= 1000 ? 'slam-dunk' : dealMonthlyNet >= 500 ? 'potential' : dealMonthlyNet > 0 ? 'risky' : 'no-go');
  const dealSource = insufficientComps ? 'Add at least 3 comps in Competitor Analysis' : 'Based on ' + (dealCol.label) + ' projection';
  const temps = [
    { key:'no-go', label:'No-Go', icon:'🚫', color:'#ef4444', desc:'Negative or zero cash flow' },
    { key:'risky', label:'Risky', icon:'⚠️', color:'#f59e0b', desc:'Under $500/mo net' },
    { key:'potential', label:'Potential', icon:'🔥', color:'#3b82f6', desc:'$500–$999/mo net' },
    { key:'slam-dunk', label:'Slam-Dunk', icon:'🏆', color:'#10b981', desc:'$1,000+/mo net' }
  ];
  h += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:6px">';
  temps.forEach(t => {
    const active = dealTemp === t.key;
    const bg = active ? t.color : 'var(--surface)';
    const border = active ? t.color : 'var(--border)';
    const textColor = active ? '#fff' : 'var(--text3)';
    const opacity = active ? '1' : '0.5';
    h += '<div style="background:'+bg+';border:2px solid '+border+';border-radius:var(--radius);padding:12px 8px;text-align:center;opacity:'+opacity+';transition:all .2s">';
    h += '<div style="font-size:1.3rem;margin-bottom:4px">'+t.icon+'</div>';
    h += '<div style="font-size:.82rem;font-weight:700;color:'+textColor+'">'+t.label+'</div>';
    h += '<div style="font-size:.65rem;color:'+textColor+';opacity:.8;margin-top:2px">'+t.desc+'</div>';
    h += '</div>';
  });
  h += '</div>';
  h += '<div style="text-align:right;font-size:.62rem;color:var(--text3);font-style:italic;margin-bottom:16px">'+dealSource+'</div>';

  // Forecasted Revenue (driven by Analysis comps)
  h += '<div class="calc-section"><div class="calc-section-header">Forecasted Revenue</div><div class="calc-section-body">';
  const compHint = noComps ? 'add comps in Competitor Analysis tab' : 'avg from Competitor Analysis comps';
  h += cRow('Average Daily Rate', cDisplay(noComps ? '$0' : fmtAcct2(v.avgDailyRate), {computed:!noComps}), {hint:compHint});
  h += cRow('Avg Occupancy Rate', cDisplay(noComps ? '0%' : Math.round(v.estOccupancyRate)+'%', {computed:!noComps}), {hint:compHint});
  h += cRow('Avg Days/Year Occupied', cDisplay(noComps ? '0' : fmtNum(v.daysOccupied), {computed:!noComps}));
  h += cRow('Annual Revenue', cDisplay(noComps ? '$0' : fmtAcct(Math.round(v.annualRevenue)), {computed:!noComps}));
  h += cRow('Monthly Revenue', cDisplay(noComps ? '$0' : fmtAcct(Math.round(v.monthlyRevenue)), {computed:!noComps}), {total:true});
  h += '</div></div>';

  h += '</div>'; // end right panel
  h += '</div>'; // end calc-layout
  return h;
}

function onCalcChange(field, value){
  const r = records.find(x => x.id === currentProfileId);
  if(!r) return;
  if(!r.details) r.details = {};
  if(!r.details.calculator) r.details.calculator = {};
  r.details.calculator[field] = parseFloat(value) || 0;
  if(field === 'cleaning') r.details.calculator._cleaningManual = true;
  saveData();
  // Re-render Projected Returns tab since expenses affect projections
  const calcEl = document.querySelector('.tab-content[data-tab="calculator"]');
  if(calcEl){ calcEl.innerHTML = renderCalculatorTab(r); }
}

function _rerenderCalcTab(){
  const r = records.find(x => x.id === currentProfileId);
  if(!r) return;
  // Re-render Expenses tab if present
  const expEl = document.querySelector('.tab-content[data-tab="expenses"]');
  if(expEl){ expEl.innerHTML = renderExpensesTab(r); }
  // Re-render Projected Returns tab if present
  const tabEl = document.querySelector('.tab-content[data-tab="calculator"]');
  if(tabEl){ tabEl.innerHTML = renderCalculatorTab(r); }
}

let _activeCalcEdit = null;

function _saveActiveCalcEdit(){
  if(!_activeCalcEdit) return;
  const { input, field } = _activeCalcEdit;
  const val = input.value;
  _activeCalcEdit = null;
  onCalcChange(field, val);
}

function calcEditCell(el, skipBlurSave){
  if(el.querySelector('input')) return;
  // Save any active edit first
  if(_activeCalcEdit){
    _activeCalcEdit._skipRerender = true;
    _saveActiveCalcEdit();
  }
  const field = el.dataset.calcField;
  const raw = el.dataset.calcRaw || '0';
  const isCleaning = el.dataset.calcCleaning === '1';
  const isPct = el.dataset.calcPct === '1';

  // Cleaning confirmation
  if(isCleaning){
    const ok = confirm('The cleaning fee is auto-set based on bedroom count. Are you sure you want to override it?\n\nIf you change bedrooms in Property Details, this will reset to the default.');
    if(!ok) return;
  }

  // Lock width to prevent layout shift
  const parentVal = el.closest('.calc-val');
  if(parentVal) parentVal.style.width = parentVal.offsetWidth + 'px';

  el.innerHTML = '';
  const input = document.createElement('input');
  input.type = 'number';
  input.className = 'calc-inline-input';
  input.value = raw;
  input.step = isPct ? '1' : 'any';
  if(isPct){ input.min = '0'; input.max = '100'; }
  el.appendChild(input);
  input.focus();
  input.select();

  const editCtx = { input, field, _skipRerender: false };
  _activeCalcEdit = editCtx;

  input.addEventListener('blur', () => {
    if(_activeCalcEdit === editCtx){
      _saveActiveCalcEdit();
      _rerenderCalcTab();
    }
  });

  input.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){
      e.preventDefault();
      _saveActiveCalcEdit();
      _rerenderCalcTab();
      return;
    }
    if(e.key === 'Escape'){
      _activeCalcEdit = null;
      _rerenderCalcTab();
      return;
    }
    if(e.key === 'Tab'){
      e.preventDefault();
      _saveActiveCalcEdit();
      const allEditables = Array.from(document.querySelectorAll('.calc-editable'));
      const currentIdx = allEditables.indexOf(el);
      const nextIdx = e.shiftKey ? currentIdx - 1 : currentIdx + 1;
      if(nextIdx >= 0 && nextIdx < allEditables.length){
        _rerenderCalcTab();
        requestAnimationFrame(() => {
          const newEditables = Array.from(document.querySelectorAll('.calc-editable'));
          if(newEditables[nextIdx]) calcEditCell(newEditables[nextIdx]);
        });
      } else {
        _rerenderCalcTab();
      }
    }
  });
}

function getComps(r){
  if(!r.details) r.details = {};
  if(!r.details.comps) r.details.comps = [];
  return r.details.comps;
}
function getAnalysis(r){
  if(!r.details) r.details = {};
  if(!r.details.analysis) r.details.analysis = {};
  return r.details.analysis;
}

function renderAnalysisTab(r){
  const pd = r.propertyDetails || {};
  const an = getAnalysis(r);
  const comps = getComps(r);
  const v = calcComputeAll(r);
  const c = v.c;
  const isProUser = requireTier('pro','Pro Analysis Features');
  const br = parseInt(pd.bedrooms) || 0;
  const profitReq = parseFloat(an.profitRequirement) || 1000;
  // Expenses = total Monthly Operating Expenses from Pro Forma (includes all utilities + cleaning)
  const expenses = v.totalMonthlyExp;

  let h = '';

  // ── Top: Required Revenue + Revenue Projections side by side ──
  h += '<div class="an-top-grid">';

  // Left: Required Revenue
  h += '<div class="an-section"><div class="an-section-hdr">Required Revenue</div><div class="an-section-body" style="padding:0">';
  h += '<div class="an-req-bar" style="border:none;border-radius:0;margin:0">';
  h += '<div class="an-req-item"><div class="req-label">Rent</div><div class="req-val">'+fmtMoney(v.monthlyRent*12)+'<span class="req-period">/yr</span></div><div class="req-annual">'+fmtMoney(v.monthlyRent)+'/mo</div></div>';
  // Expenses — not editable, total from Pro Forma (includes utilities + cleaning)
  h += '<div class="an-req-item" onclick="alert(\'Expenses are calculated from your Monthly Operating Expenses in the Pro Forma tab. Edit individual amounts there.\')" style="cursor:help" title="Edit in Pro Forma → Monthly Operating Expenses"><div class="req-label">Expenses</div><div class="req-val">'+fmtMoney(Math.round(expenses*12))+'<span class="req-period">/yr</span></div><div class="req-annual">'+fmtMoney(Math.round(expenses))+'/mo</div></div>';
  // Profit Requirement — editable with warning under $1000
  h += '<div class="an-req-item an-req-editable" onclick="editAnalysisProfitReq(\''+r.id+'\')"><div class="req-label">Profit Req <span class="req-edit-hint">✎</span></div><div class="req-val">'+fmtMoney(profitReq*12)+'<span class="req-period">/yr</span></div><div class="req-annual">'+fmtMoney(profitReq)+'/mo</div></div>';
  const monthlyReqRev = v.monthlyRent + expenses + profitReq;
  h += '<div class="an-req-item total"><div class="req-label">Required Rev</div><div class="req-val" style="color:var(--primary)">'+fmtMoney(Math.round(monthlyReqRev*12))+'<span class="req-period">/yr</span></div><div class="req-annual">'+fmtMoney(Math.round(monthlyReqRev))+'/mo</div></div>';
  h += '</div>';
  h += '</div></div>';

  // ── Revenue Projections (right side of top grid) ──
  // Rating-weighted projection logic:
  //   Each comp's annual revenue is adjusted by how our property compares:
  //   Beats  → we earn MORE   (Likely ×1.15, Best ×1.20, Worst ×1.05)
  //   Competes → similar       (Likely ×1.00, Best ×1.05, Worst ×0.95)
  //   Loses  → we earn LESS   (Likely ×0.85, Best ×0.95, Worst ×0.80)
  // Only comps with revenue data AND a rating set (not blank) contribute to projections
  let projLikely = 0, projBest = 0, projWorst = 0;
  const compsWithRev = comps.filter(c => {
    const rating = c.rating || '';
    if(!rating) return false; // skip unrated comps
    const rev = parseFloat(c.annualRevenue) || 0;
    if(rev > 0) return true;
    const rate = parseFloat(c.nightlyRate) || 0;
    const occ = parseFloat(c.occupancy) || 0;
    return rate > 0 && occ > 0;
  });

  if(compsWithRev.length > 0){
    const MULT = {
      likely: { beats: 1.15, competes: 1.00, loses: 0.85 },
      best:   { beats: 1.20, competes: 1.05, loses: 0.95 },
      worst:  { beats: 1.05, competes: 0.95, loses: 0.80 }
    };
    let sumLikely = 0, sumBest = 0, sumWorst = 0;
    compsWithRev.forEach(c => {
      let rev = parseFloat(c.annualRevenue) || 0;
      if(rev === 0){
        const rate = parseFloat(c.nightlyRate) || 0;
        const occ = parseFloat(c.occupancy) || 0;
        const days = parseFloat(c.daysAvailable) || 365;
        rev = rate * days * (occ / 100);
      }
      const rating = c.rating;
      sumLikely += rev * (MULT.likely[rating] || 1);
      sumBest += rev * (MULT.best[rating] || 1);
      sumWorst += rev * (MULT.worst[rating] || 1);
    });
    projLikely = Math.round(sumLikely / compsWithRev.length);
    projBest = Math.round(sumBest / compsWithRev.length);
    projWorst = Math.round(sumWorst / compsWithRev.length);
  }

  // Right: Revenue Projections (Best, Likely, Worst Case)
  h += '<div class="an-section"><div class="an-section-hdr">Revenue Projections</div><div class="an-section-body" style="padding:0">';
  h += '<div class="an-req-bar" style="border:none;border-radius:0;margin:0">';
  h += '<div class="an-req-item"><div class="req-label">Best Case</div><div class="req-val" style="color:var(--num-success)">'+(projBest ? fmtMoney(projBest) : '$0')+'<span class="req-period">/yr</span></div><div class="req-annual">'+(projBest ? fmtMoney(Math.round(projBest/12)) : '$0')+'/mo</div></div>';
  h += '<div class="an-req-item"><div class="req-label">Likely</div><div class="req-val" style="color:var(--primary)">'+(projLikely ? fmtMoney(projLikely) : '$0')+'<span class="req-period">/yr</span></div><div class="req-annual">'+(projLikely ? fmtMoney(Math.round(projLikely/12)) : '$0')+'/mo</div></div>';
  h += '<div class="an-req-item"><div class="req-label">Worst Case</div><div class="req-val" style="color:var(--num-danger)">'+(projWorst ? fmtMoney(projWorst) : '$0')+'<span class="req-period">/yr</span></div><div class="req-annual">'+(projWorst ? fmtMoney(Math.round(projWorst/12)) : '$0')+'/mo</div></div>';
  h += '</div>';
  h += '</div></div>';

  h += '</div>'; // end an-top-grid

  // Averages bar (only count comps that have actual values for each metric)
  if(comps.length > 0){
    const rateComps = comps.filter(x => parseFloat(x.nightlyRate) > 0);
    const occComps = comps.filter(x => parseFloat(x.occupancy) > 0);
    const daysComps = comps.filter(x => parseFloat(x.daysAvailable) > 0);
    const avgRate = rateComps.length > 0 ? rateComps.reduce((s,x)=>s+parseFloat(x.nightlyRate),0)/rateComps.length : 0;
    const avgOcc = occComps.length > 0 ? occComps.reduce((s,x)=>s+parseFloat(x.occupancy),0)/occComps.length : 0;
    const avgDays = daysComps.length > 0 ? Math.round(daysComps.reduce((s,x)=>s+parseFloat(x.daysAvailable),0)/daysComps.length) : 0;
    h += '<div class="comp-avg-bar" style="margin-bottom:14px">';
    h += '<div class="comp-avg-item"><div class="avg-label">Average Daily Rate</div><div class="avg-value">'+(rateComps.length > 0 ? '$'+avgRate.toFixed(2) : '—')+'</div></div>';
    h += '<div class="comp-avg-item"><div class="avg-label">Avg Occupancy Rate</div><div class="avg-value">'+(occComps.length > 0 ? Math.round(avgOcc)+'%' : '—')+'</div></div>';
    h += '<div class="comp-avg-item"><div class="avg-label">Avg Days/Year Occupied</div><div class="avg-value">'+(daysComps.length > 0 ? avgDays : '—')+'</div></div>';
    const estRevenue = (rateComps.length > 0 && daysComps.length > 0) ? Math.round(avgRate * avgDays) : 0;
    h += '<div class="comp-avg-item"><div class="avg-label">Average Revenue</div><div class="avg-value">'+(estRevenue > 0 ? fmtMoney(estRevenue) : '—')+'</div></div>';
    h += '</div>';
  }

  // ── Comparable Airbnb Analysis ──
  h += '<div class="an-section"><div class="an-section-hdr">Comparable Airbnb Analysis <span style="font-size:.68rem;color:var(--text3);font-weight:400;text-transform:none;letter-spacing:0">('+comps.length+'/20)</span></div>';
  h += '<div class="an-section-body">';

  // Always show table with columns (even if empty, show headers so Basic users know what to fill)
  h += '<div class="comp-table-wrap"><table class="comp-table">';
  h += '<thead><tr><th>#</th><th>Revenue</th><th>Days</th><th>Occupancy</th><th>Rate</th><th style="min-width:52px">Guests</th><th style="min-width:68px">Bedrooms</th><th style="min-width:46px">Beds</th><th style="min-width:50px">Baths</th><th>Host</th><th>Rating</th><th class="comp-notes-cell">Notes</th><th>Link</th><th></th></tr></thead>';
  h += '<tbody>';
  if(comps.length > 0){
    comps.forEach((comp, i) => {
      const rating = comp.rating !== undefined ? comp.rating : '';
      const linkIcon = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>';
      h += '<tr>';
      h += '<td style="color:var(--text3)">'+(i+1)+'</td>';
      const revRaw = comp.annualRevenue || 0;
      const rateRaw = comp.nightlyRate || 0;
      const occRaw = comp.occupancy || 0;
      const daysRaw = comp.daysAvailable || 0;
      h += '<td><div class="comp-editable" onclick="compEditCell(this)" data-field="annualRevenue" data-rec="'+r.id+'" data-idx="'+i+'" data-raw="'+revRaw+'">'+(revRaw ? fmtMoney(Math.round(revRaw)) : '<span class="comp-placeholder">—</span>')+'</div></td>';
      h += '<td><div class="comp-editable" onclick="compEditCell(this)" data-field="daysAvailable" data-rec="'+r.id+'" data-idx="'+i+'" data-raw="'+daysRaw+'">'+(daysRaw ? daysRaw : '<span class="comp-placeholder">—</span>')+'</div></td>';
      h += '<td><div class="comp-editable" onclick="compEditCell(this)" data-field="occupancy" data-rec="'+r.id+'" data-idx="'+i+'" data-raw="'+occRaw+'">'+(occRaw ? '<span class="comp-occ-wrap">'+Math.round(parseFloat(occRaw))+'<span class="comp-occ-pct">%</span></span>' : '<span class="comp-placeholder">—</span>')+'</div></td>';
      h += '<td><div class="comp-editable" onclick="compEditCell(this)" data-field="nightlyRate" data-rec="'+r.id+'" data-idx="'+i+'" data-raw="'+rateRaw+'">'+(rateRaw ? '$'+parseFloat(rateRaw).toFixed(2) : '<span class="comp-placeholder">—</span>')+'</div></td>';
      h += '<td><div class="comp-editable" onclick="compEditCell(this)" data-field="guests" data-rec="'+r.id+'" data-idx="'+i+'" data-raw="'+(comp.guests||0)+'">'+(comp.guests ? comp.guests : '<span class="comp-placeholder">—</span>')+'</div></td>';
      h += '<td><div class="comp-editable" onclick="compEditCell(this)" data-field="bedrooms" data-rec="'+r.id+'" data-idx="'+i+'" data-raw="'+(comp.bedrooms||0)+'">'+(comp.bedrooms ? comp.bedrooms : '<span class="comp-placeholder">—</span>')+'</div></td>';
      h += '<td><div class="comp-editable" onclick="compEditCell(this)" data-field="beds" data-rec="'+r.id+'" data-idx="'+i+'" data-raw="'+(comp.beds||0)+'">'+(comp.beds ? comp.beds : '<span class="comp-placeholder">—</span>')+'</div></td>';
      h += '<td><div class="comp-editable" onclick="compEditCell(this)" data-field="bathrooms" data-rec="'+r.id+'" data-idx="'+i+'" data-raw="'+(comp.bathrooms||0)+'">'+(comp.bathrooms ? comp.bathrooms : '<span class="comp-placeholder">—</span>')+'</div></td>';
      h += '<td><div class="comp-editable" onclick="compEditCell(this)" data-field="host" data-rec="'+r.id+'" data-idx="'+i+'" data-raw="'+esc(comp.host||'')+'" data-type="text">'+(comp.host ? esc(comp.host) : '<span class="comp-placeholder">—</span>')+'</div></td>';
      h += '<td><select class="comp-rating" onchange="updateCompField(\''+r.id+'\','+i+',\'rating\',this.value)">';
      h += '<option value="" '+(rating===''?'selected':'')+'>—</option>';
      h += '<option value="beats" '+(rating==='beats'?'selected':'')+'>Beats</option>';
      h += '<option value="competes" '+(rating==='competes'?'selected':'')+'>Competes</option>';
      h += '<option value="loses" '+(rating==='loses'?'selected':'')+'>Loses</option>';
      h += '</select></td>';
      const notePreview = comp.notes ? (comp.notes.replace(/<[^>]+>/g,' ').substring(0,30) + (comp.notes.length > 30 ? '...' : '')) : '';
      h += '<td class="comp-notes-cell"><div class="comp-notes-preview" onclick="openCompNoteEditor(\''+r.id+'\','+i+')" title="Click to edit notes">'+(notePreview || '<span style="color:var(--text3)">+ Note</span>')+'</div></td>';
      h += '<td class="comp-link-cell">'+(comp.link ? '<a href="'+esc(comp.link)+'" target="_blank" title="'+esc(comp.link)+'">'+linkIcon+'</a>' : '')+'</td>';
      h += '<td><button class="comp-remove" onclick="confirmRemoveComp(\''+r.id+'\','+i+')" title="Remove">✕</button></td>';
      h += '</tr>';
    });
  } else {
    h += '<tr><td colspan="14" style="text-align:center;padding:24px 16px;color:var(--text3);font-size:.88rem">';
    h += 'No comparables added yet. Paste an Airbnb link below to start your analysis.';
    h += '</td></tr>';
  }
  h += '</tbody></table></div>';

  // Add comp row — at the bottom
  if(comps.length < 20){
    h += '<div class="comp-add-row">';
    h += '<input type="text" id="compLinkInput" placeholder="Paste Airbnb link here..." onkeydown="if(event.key===\'Enter\'){event.preventDefault();addComp(\''+r.id+'\')}" />';
    h += '<button onclick="addComp(\''+r.id+'\')">+ Add Comp</button>';
    h += '</div>';
    h += '<div style="text-align:right;font-size:.68rem;color:var(--text3);margin-top:4px">Enter to add</div>';
  }

  h += '</div></div>';

  return h;
}

function addComp(recId){
  const r = records.find(x => x.id === recId);
  if(!r) return;
  const input = document.getElementById('compLinkInput');
  const link = input?.value?.trim();
  if(!link){ alert('Please paste an Airbnb link'); return }
  const comps = getComps(r);
  if(comps.length >= 20){ alert('Maximum 20 comparables reached'); return }
  const shortLink = link.replace(/\?.*$/,'').replace(/https?:\/\/(www\.)?airbnb\.com\/rooms\//,'').substring(0,18)+'...';

function compEditCell(el, skipBlurSave){
  // If clicking the same cell that's already editing, do nothing
  if(el.querySelector('input')) return;

  // Close any existing edit first (save its value without re-rendering yet)
  if(_activeCompEdit){
    _activeCompEdit._skipRerender = true;
    _saveActiveCompEdit();
  }

  const field = el.dataset.field;
  const recId = el.dataset.rec;
  const idx = parseInt(el.dataset.idx);
  const raw = el.dataset.raw;

  // Lock the parent td width so the input doesn't expand the column
  const td = el.closest('td');
  if(td){ td.style.width = td.offsetWidth + 'px'; }

  const isText = el.dataset.type === 'text';
  const step = field === 'nightlyRate' ? '0.01' : (field === 'occupancy' ? '0.1' : '1');
  const input = document.createElement('input');
  input.type = isText ? 'text' : 'number';
  if(!isText) input.step = step;
  input.className = 'comp-inline-input';
  input.style.width = '100%';
  input.style.maxWidth = '100%';
  input.style.boxSizing = 'border-box';
  input.value = isText ? (raw || '') : (raw && raw !== '0' ? raw : '');
  input.placeholder = '—';

  el.textContent = '';
  el.appendChild(input);
  input.focus();
  input.select();

  const editCtx = { input, recId, idx, field, _skipRerender: false };
  _activeCompEdit = editCtx;

  input.addEventListener('blur', () => {
    // Only save+rerender if this edit wasn't already closed by Tab/click on another cell
    if(_activeCompEdit === editCtx){
      _saveActiveCompEdit();
      _rerenderAnalysisTab();
    } else if(!editCtx._skipRerender){
      // Was closed by navigating to another cell — rerender handled elsewhere
    }
  });

  input.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){
      e.preventDefault();
      _saveActiveCompEdit();
      _rerenderAnalysisTab();
      return;
    }
    if(e.key === 'Escape'){
      input.value = raw;
      _activeCompEdit = null;
      _rerenderAnalysisTab();
      return;
    }
    if(e.key === 'Tab'){
      e.preventDefault();
      // Save current value
      _saveActiveCompEdit();

      // Find all editable cells in the table
      const table = el.closest('table');
      if(!table) { _rerenderAnalysisTab(); return; }
      const allEditables = Array.from(table.querySelectorAll('.comp-editable'));
      const currentIdx = allEditables.indexOf(el);
      if(currentIdx === -1) { _rerenderAnalysisTab(); return; }

      const nextIdx = e.shiftKey ? currentIdx - 1 : currentIdx + 1;
      if(nextIdx >= 0 && nextIdx < allEditables.length){
        // Re-render first so cells get fresh values, then open the next cell
        _rerenderAnalysisTab();
        // After re-render, find the same cell by position and open it
        requestAnimationFrame(() => {
          const newTable = document.querySelector('.comp-table');
          if(!newTable) return;
          const newEditables = Array.from(newTable.querySelectorAll('.comp-editable'));
          if(newEditables[nextIdx]){
            compEditCell(newEditables[nextIdx]);
          }
        });
      } else {
        _rerenderAnalysisTab();
      }
    }
  });
}

function setupAddressAutocomplete(inputEl, recId){
  const wrapper = inputEl.parentElement;
  wrapper.style.position = 'relative';

  let dropdown = wrapper.querySelector('.address-ac');
  if(!dropdown){
    dropdown = document.createElement('div');
    dropdown.className = 'address-ac';
    wrapper.appendChild(dropdown);
  }

  inputEl.addEventListener('input', function(){
    clearTimeout(addressAcTimeout);
    const q = this.value.trim();
    if(q.length < 3){ dropdown.classList.remove('visible'); return; }
    addressAcTimeout = setTimeout(() => fetchAddressSuggestions(q, dropdown, inputEl, recId), 300);
  });

  inputEl.addEventListener('blur', function(){
    setTimeout(() => dropdown.classList.remove('visible'), 200);
  });

  inputEl.addEventListener('keydown', function(e){
    if(!dropdown.classList.contains('visible')) return;
    const items = dropdown.querySelectorAll('.address-ac-item');
    let idx = Array.from(items).findIndex(i => i.classList.contains('active'));
    if(e.key === 'ArrowDown'){ e.preventDefault(); idx = Math.min(idx+1, items.length-1); items.forEach((it,i) => it.classList.toggle('active',i===idx)); }
    else if(e.key === 'ArrowUp'){ e.preventDefault(); idx = Math.max(idx-1, 0); items.forEach((it,i) => it.classList.toggle('active',i===idx)); }
    else if(e.key === 'Enter' && idx >= 0){ e.preventDefault(); items[idx]?.dispatchEvent(new MouseEvent('mousedown')); }
  });
}

function formatAddressOneLine(parts){
  // "1326 E Chandler Blvd, Phoenix AZ 85048" or flat string
  if(typeof parts === 'string') return parts;
  let s = parts.street || '';
  if(parts.unit) s += ' ' + parts.unit;
  const csz = [parts.city, parts.state].filter(Boolean).join(' ') + (parts.zip ? ' ' + parts.zip : '');
  if(csz.trim()) s += ', ' + csz.trim();
  return s || '';
}

function renderHeroAddress(r){
  const addr = r.addressParts || parseAddressParts(r.property);
  let streetLine = esc(addr.street || r.property);
  if(addr.unit) streetLine += ', ' + esc(addr.unit);
  let html = '<h1 style="font-size:1.65rem;font-weight:700;line-height:1.2;margin:0">' + streetLine + '</h1>';
  let csz = '';
  if(addr.city) csz += addr.city + ',';
  if(addr.state) csz += ' ' + addr.state;
  if(addr.zip) csz += ' ' + addr.zip;
  if(csz.trim()){
    html += '<div style="font-size:1.35rem;color:var(--text);font-weight:600;margin-top:2px">' + esc(csz.trim()) + '</div>';
  }
  return html;
}

function parseAddressParts(property){
  if(!property) return { street:'', unit:'', city:'', state:'', zip:'' };
  // Try to parse "Street, City State Zip" or "Street Unit X, City State Zip"
  const parts = { street:'', unit:'', city:'', state:'', zip:'' };
  // Match unit in the string
  const unitRe = /\s+(#|Unit|Ste|Suite|Apt|Apartment|Bldg)\s*\.?\s*(\S+)/i;
  let clean = property;
  const unitMatch = clean.match(unitRe);
  if(unitMatch){
    parts.unit = unitMatch[1] + ' ' + unitMatch[2];
    clean = clean.replace(unitRe, '');
  }
  // Split on comma
  const commaIdx = clean.indexOf(',');
  if(commaIdx > 0){
    parts.street = clean.substring(0, commaIdx).trim();
    const rest = clean.substring(commaIdx+1).trim();
    // Parse "City State Zip" or "City State" or "City AZ 85048"
    const cszMatch = rest.match(/^(.+?)\s+([A-Z]{2})\s+(\d{5}(?:-\d{4})?)$/);
    if(cszMatch){
      parts.city = cszMatch[1].trim();
      parts.state = cszMatch[2];
      parts.zip = cszMatch[3];
    } else {
      const csMatch = rest.match(/^(.+?)\s+([A-Z]{2})$/);
      if(csMatch){ parts.city = csMatch[1].trim(); parts.state = csMatch[2] }
      else { parts.city = rest }
    }
  } else {
    // No comma — try "Street City AZ Zip" pattern
    const fullMatch = clean.match(/^(.+?)\s+(\w[\w\s]*?)\s+([A-Z]{2})\s+(\d{5})$/);
    if(fullMatch){
      parts.street = fullMatch[1].trim();
      parts.city = fullMatch[2].trim();
      parts.state = fullMatch[3];
      parts.zip = fullMatch[4];
    } else {
      parts.street = clean.trim();
    }
  }
  return parts;
}

function highlightMatch(text, query){
  // Bold all matching portions of the query within the text
  const words = query.toLowerCase().split(/\s+/).filter(w => w.length > 0);
  let result = esc(text);
  // Sort words longest first so we don't double-match substrings
  words.sort((a,b) => b.length - a.length);
  for(const word of words){
    const escaped = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    result = result.replace(new RegExp('(' + escaped + ')', 'gi'), '<strong>$1</strong>');
  }
  return result;
}

function formatFullAddress(parts){
  let s = parts.street || '';
  if(parts.city) s += ', ' + parts.city;
  if(parts.state) s += ' ' + parts.state;
  if(parts.zip) s += ' ' + parts.zip;
  return s;
}

async function fetchAddressSuggestions(query, dropdown, inputEl, recId){
  try {
    const resp = await fetch('https://places.googleapis.com/v1/places:autocomplete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Goog-Api-Key': GPLACES_KEY },
      body: JSON.stringify({
        input: query,
        includedRegionCodes: ['us'],
        includedPrimaryTypes: ['street_address', 'subpremise', 'premise']
      })
    });
    const data = await resp.json();
    if(!data.suggestions || !data.suggestions.length){ dropdown.classList.remove('visible'); return; }

    const places = data.suggestions.filter(s => s.placePrediction).map(s => s.placePrediction);
    if(!places.length){ dropdown.classList.remove('visible'); return; }

    dropdown.innerHTML = places.map(p => {
      const placeId = p.placeId || '';
      const main = p.structuredFormat?.mainText?.text || p.text?.text || '';
      const secondary = p.structuredFormat?.secondaryText?.text || '';
      const display = secondary ? main + ', ' + secondary : main;
      return `<div class="address-ac-item" onmousedown="selectAddress(this,'${recId||''}')" data-place-id="${esc(placeId)}" data-description="${esc(display)}" data-main="${esc(main)}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span>${highlightMatch(display, query)}</span>
      </div>`;
    }).join('');
    dropdown.classList.add('visible');
  } catch(e){
    console.log('Address autocomplete error:', e);
    dropdown.classList.remove('visible');
  }
}

async function selectAddress(el, recId){
  const placeId = el.dataset.placeId || '';
  const description = el.dataset.description || '';
  const dropdown = el.closest('.address-ac');
  if(dropdown) dropdown.classList.remove('visible');

  // Find whichever address input is active
  const addrEdStreet = document.getElementById('addrEdStreet');
  const addInput = document.getElementById('add_property');
  const ceAddrInput = document.getElementById('ce_address');
  const activeInput = addrEdStreet || ceAddrInput || addInput;

  function applyParts(parts){
    window._selectedAddrParts = parts;
    const full = formatAddressOneLine(parts);
    if(activeInput) activeInput.value = parts.street || full;
    // Auto-fill city/state/zip fields in the address editor popup if open
    if(addrEdStreet){
      addrEdStreet.value = parts.street || full;
      const cityEl = document.getElementById('addrEdCity');
      const stateEl = document.getElementById('addrEdState');
      const zipEl = document.getElementById('addrEdZip');
      if(cityEl && parts.city) cityEl.value = parts.city;
      if(stateEl && parts.state) stateEl.value = parts.state;
      if(zipEl && parts.zip) zipEl.value = parts.zip;
    }
    // Auto-fill city/state/zip fields in the contact card editor popup if open
    if(ceAddrInput){
      ceAddrInput.value = parts.street || full;
      const ceCityEl = document.getElementById('ce_city');
      const ceStateEl = document.getElementById('ce_state');
      const ceZipEl = document.getElementById('ce_zip');
      if(ceCityEl && parts.city) ceCityEl.value = parts.city;
      if(ceStateEl && parts.state) ceStateEl.value = parts.state;
      if(ceZipEl && parts.zip) ceZipEl.value = parts.zip;
    }
  }

  if(!placeId){
    applyParts({ street: description, city:'', state:'', zip:'' });
    return;
  }

  try {
    const resp = await fetch('https://places.googleapis.com/v1/places/' + placeId, {
      headers: {
        'X-Goog-Api-Key': GPLACES_KEY,
        'X-Goog-FieldMask': 'addressComponents,formattedAddress'
      }
    });
    const place = await resp.json();
    let parts = { street:'', city:'', state:'', zip:'' };

    if(place.addressComponents){
      const get = (type) => (place.addressComponents.find(c => c.types.includes(type)) || {}).longText || '';
      const getShort = (type) => (place.addressComponents.find(c => c.types.includes(type)) || {}).shortText || '';
      parts.street = [get('street_number'), getShort('route')].filter(Boolean).join(' ');
      parts.city = get('locality') || get('sublocality_level_1') || get('administrative_area_level_2');
      parts.state = getShort('administrative_area_level_1');
      parts.zip = get('postal_code');
    } else {
      parts.street = description;
    }

    applyParts(parts);
  } catch(e){
    console.log('Place details error:', e);
    applyParts({ street: description, city:'', state:'', zip:'' });
  }
}

function saveAddressEditor(recId){
  const r = records.find(x => x.id === recId);
  if(!r) return;

  const streetInput = document.getElementById('addrEdStreet')?.value?.trim() || '';
  const utVal = document.getElementById('addrEdUnitType')?.value || '';
  const unVal = document.getElementById('addrEdUnitNum')?.value?.trim() || '';
  const unit = (utVal && unVal) ? utVal + ' ' + unVal : '';
  const cityVal = document.getElementById('addrEdCity')?.value?.trim() || '';
  const stateVal = document.getElementById('addrEdState')?.value?.trim().toUpperCase() || '';
  const zipVal = document.getElementById('addrEdZip')?.value?.trim() || '';

  const selected = window._selectedAddrParts || {};
  const addrParts = {
    street: selected.street || streetInput,
    unit: unit,
    city: selected.city || cityVal,
    state: selected.state || stateVal,
    zip: selected.zip || zipVal,
  };
  // If autocomplete was used, also fill in city/state/zip fields that were left empty
  if(selected.street){
    if(!addrParts.city && selected.city) addrParts.city = selected.city;
    if(!addrParts.state && selected.state) addrParts.state = selected.state;
    if(!addrParts.zip && selected.zip) addrParts.zip = selected.zip;
  }

  r.addressParts = addrParts;
  r.property = formatAddressOneLine(addrParts);
  window._selectedAddrParts = null;
  saveData();
  document.getElementById('addressEditorOverlay')?.remove();
  render();
}
