<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentingRadar</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
/* ===== RESET & VARIABLES ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* Dark mode (default) */
:root{
  --bg:#0f1117;--surface:#1a1d2e;--border:#2a2e3f;--text:#e4e6f0;--text2:#9399b2;--text3:#5a5f7a;
  --primary:#6381fa;--primary-hover:#7b94ff;--primary-light:rgba(79,110,247,.15);
  --danger:#ef4444;--danger-light:rgba(239,68,68,.12);--success:#10b981;--success-light:rgba(16,185,129,.12);
  --warning:#f59e0b;--warning-light:rgba(245,158,11,.12);--info:#3b82f6;
  --sidebar-bg:#0b0d14;--sidebar-border:rgba(255,255,255,.06);
  --sidebar-w:240px;--header-h:56px;--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.3);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;
  --card-hover-shadow:0 4px 12px rgba(0,0,0,.3);
  --input-bg:#141620;
}

/* Light mode */
:root.light{
  --bg:#f5f6fa;--surface:#fff;--border:#e2e5f1;--text:#1a1d2e;--text2:#5a5f7a;--text3:#9399b2;
  --primary:#4f6ef7;--primary-hover:#3d5be0;--primary-light:#eef1ff;
  --danger:#ef4444;--danger-light:#fef2f2;--success:#10b981;--success-light:#ecfdf5;
  --warning:#f59e0b;--warning-light:#fffbeb;--info:#3b82f6;
  --sidebar-bg:#1a1d2e;--sidebar-border:rgba(255,255,255,.08);
  --shadow:0 1px 3px rgba(0,0,0,.08);
  --card-hover-shadow:0 4px 12px rgba(0,0,0,.1);
  --input-bg:#f0f1f5;
}


/* Accent: Crimson Flame */
:root.accent-crimson{--primary:#ef4444;--primary-hover:#dc2626;--primary-light:rgba(239,68,68,.15);--sidebar-bg:#3b0f0f;--sidebar-border:rgba(239,68,68,.15)}
:root.light.accent-crimson{--primary:#dc2626;--primary-hover:#b91c1c;--primary-light:#fef2f2;--sidebar-bg:#5c1a1a;--sidebar-border:rgba(239,68,68,.12)}

/* Accent: Ocean Depths */
:root.accent-ocean{--primary:#22d3ee;--primary-hover:#06b6d4;--primary-light:rgba(34,211,238,.15);--sidebar-bg:#0c2a3d;--sidebar-border:rgba(34,211,238,.15)}
:root.light.accent-ocean{--primary:#0891b2;--primary-hover:#0e7490;--primary-light:#e0f7fa;--sidebar-bg:#103d52;--sidebar-border:rgba(14,116,144,.12)}

/* Accent: Emerald Forest */
:root.accent-emerald{--primary:#34d399;--primary-hover:#10b981;--primary-light:rgba(52,211,153,.15);--sidebar-bg:#0c2e1e;--sidebar-border:rgba(52,211,153,.15)}
:root.light.accent-emerald{--primary:#059669;--primary-hover:#047857;--primary-light:#ecfdf5;--sidebar-bg:#14432b;--sidebar-border:rgba(5,150,105,.12)}

html{font-size:14px}
body{font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden;height:100vh;transition:background .2s,color .2s}
a{color:var(--primary);text-decoration:none}
button{font-family:var(--font);cursor:pointer;border:none;background:none;font-size:.875rem}
input,textarea,select{font-family:var(--font);font-size:.875rem;border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;outline:none;width:100%;transition:border .15s;background:var(--input-bg);color:var(--text)}
input:focus,textarea:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,110,247,.12)}
select option{background:var(--surface);color:var(--text)}
textarea{resize:vertical;min-height:80px}

/* ===== LAYOUT ===== */
.app{display:flex;height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--sidebar-bg);color:#fff;display:flex;flex-direction:column;flex-shrink:0;z-index:100}
.sidebar-brand{padding:16px 20px;font-size:1.1rem;font-weight:700;letter-spacing:-.3px;border-bottom:1px solid var(--sidebar-border);display:flex;align-items:center;gap:10px}
.sidebar-brand svg{width:24px;height:24px;fill:var(--primary)}
.sidebar-nav{flex:1;padding:12px 0}
.nav-section{padding:0 20px;margin-bottom:4px;font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.35);margin-top:16px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;color:rgba(255,255,255,.65);transition:all .15s;cursor:pointer;position:relative}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.06)}
.nav-item.active{color:#fff;background:rgba(79,110,247,.2)}
.nav-item.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--primary);border-radius:0 3px 3px 0}
.nav-item svg{width:18px;height:18px;flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:.7rem;font-weight:600;padding:1px 7px;border-radius:10px;min-width:20px;text-align:center}
.sidebar-user{padding:12px 14px;border-top:1px solid var(--sidebar-border);position:relative}
.sidebar-user .su-profile{display:flex;align-items:center;gap:10px;cursor:pointer;padding:6px;border-radius:var(--radius);transition:background .15s}
.sidebar-user .su-profile:hover{background:rgba(255,255,255,.06)}
.sidebar-user .su-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#fff}
.sidebar-user .su-avatar img{width:32px;height:32px;border-radius:50%;object-fit:cover}
.sidebar-user .su-info{flex:1;min-width:0;overflow:hidden}
.sidebar-user .su-name{font-size:.82rem;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-user .su-tier{display:inline-flex}
.sidebar-user .user-menu{position:absolute;bottom:calc(100% + 6px);left:14px;right:14px;top:auto}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.header{height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0}
.header-title{font-size:1.1rem;font-weight:600}
.header-search{position:relative;width:320px}
.header-search input{padding-left:36px;background:var(--input-bg);border:1px solid var(--border)}
.header-search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text3)}
.header-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:var(--radius);font-weight:500;transition:all .15s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover)}
.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--primary-light)}
.btn-sm{padding:5px 10px;font-size:.8rem}
.btn-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);color:var(--text2);position:relative}
.btn-icon:hover{background:var(--bg)}
.btn-icon .badge{position:absolute;top:2px;right:2px;width:16px;height:16px;background:var(--danger);color:#fff;font-size:.6rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
.content{flex:1;overflow-y:scroll;padding:20px 24px}

/* ===== STATUS PILLS ===== */
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600;white-space:nowrap}
.status-pill::before{content:'';width:6px;height:6px;border-radius:50%}
.st-follow-up{background:rgba(59,130,246,.15);color:#60a5fa}.st-follow-up::before{background:#60a5fa}
.st-interested{background:rgba(16,185,129,.15);color:#34d399}.st-interested::before{background:#34d399}
.st-meeting{background:rgba(139,92,246,.15);color:#a78bfa}.st-meeting::before{background:#a78bfa}
.st-messaged{background:rgba(14,165,233,.15);color:#38bdf8}.st-messaged::before{background:#38bdf8}
.st-lvm{background:rgba(245,158,11,.15);color:#fbbf24}.st-lvm::before{background:#fbbf24}
.st-left-voicemail{background:rgba(245,158,11,.15);color:#fbbf24}.st-left-voicemail::before{background:#fbbf24}
.st-no-contact{background:rgba(148,163,184,.12);color:#94a3b8}.st-no-contact::before{background:#94a3b8}
.st-not-interested{background:rgba(239,68,68,.15);color:#f87171}.st-not-interested::before{background:#f87171}
.st-not-good-fit{background:rgba(236,72,153,.15);color:#f472b6}.st-not-good-fit::before{background:#f472b6}
.st-hoa-issues{background:rgba(251,146,60,.15);color:#fb923c}.st-hoa-issues::before{background:#fb923c}
.st-lost{background:rgba(100,116,139,.15);color:#94a3b8}.st-lost::before{background:#94a3b8}
.st-no-longer-interested{background:rgba(239,68,68,.12);color:#fca5a5}.st-no-longer-interested::before{background:#fca5a5}
.st-new{background:rgba(99,129,250,.15);color:#818cf8}.st-new::before{background:#818cf8}

/* Light mode status overrides */
:root.light .st-follow-up{background:#dbeafe;color:#1e40af}:root.light .st-follow-up::before{background:#1e40af}
:root.light .st-interested{background:#d1fae5;color:#065f46}:root.light .st-interested::before{background:#065f46}
:root.light .st-meeting{background:#ede9fe;color:#5b21b6}:root.light .st-meeting::before{background:#5b21b6}
:root.light .st-messaged{background:#e0f2fe;color:#0369a1}:root.light .st-messaged::before{background:#0369a1}
:root.light .st-lvm{background:#fef3c7;color:#92400e}:root.light .st-lvm::before{background:#92400e}
:root.light .st-left-voicemail{background:#fef3c7;color:#92400e}:root.light .st-left-voicemail::before{background:#92400e}
:root.light .st-no-contact{background:#f3f4f6;color:#4b5563}:root.light .st-no-contact::before{background:#9ca3af}
:root.light .st-not-interested{background:#fee2e2;color:#991b1b}:root.light .st-not-interested::before{background:#991b1b}
:root.light .st-not-good-fit{background:#fce7f3;color:#9d174d}:root.light .st-not-good-fit::before{background:#9d174d}
:root.light .st-hoa-issues{background:#ffedd5;color:#9a3412}:root.light .st-hoa-issues::before{background:#9a3412}
:root.light .st-lost{background:#f1f5f9;color:#64748b}:root.light .st-lost::before{background:#64748b}
:root.light .st-no-longer-interested{background:#fef2f2;color:#b91c1c}:root.light .st-no-longer-interested::before{background:#b91c1c}
:root.light .st-new{background:#e0e7ff;color:#3730a3}:root.light .st-new::before{background:#3730a3}

/* ===== DASHBOARD ===== */
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:16px 20px;box-shadow:var(--shadow);border:1px solid var(--border)}
.stat-card .label{font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-card .value{font-size:1.6rem;font-weight:700}
.stat-card .sub{font-size:.75rem;color:var(--text3);margin-top:2px}

/* ===== TABLE ===== */
.table-wrap{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden}
.table-toolbar{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid var(--border);color:var(--text2)}
.chip:hover{border-color:var(--primary);color:var(--primary)}
.chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
table{width:100%;border-collapse:collapse}
thead{background:var(--bg)}
th{text-align:left;padding:10px 14px;font-size:.75rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
th:hover{color:var(--text)}
td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:.875rem;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr.clickable{cursor:pointer;transition:background .1s}
tr.clickable:hover{background:var(--primary-light)}
.td-property{font-weight:600;color:var(--text)}
.td-name{color:var(--text)}
.td-phone{color:var(--text2);font-family:'SF Mono',monospace;font-size:.8rem}
.td-date{color:var(--text3);font-size:.8rem}
.td-link a{color:var(--primary);font-size:.8rem}
.empty-row{text-align:center;padding:40px;color:var(--text3)}

/* ===== KANBAN ===== */
.kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:16px;min-height:calc(100vh - 180px)}
.kanban-col{min-width:280px;max-width:320px;flex-shrink:0;background:var(--bg);border-radius:var(--radius);display:flex;flex-direction:column}
.kanban-header{padding:12px 14px;font-weight:600;font-size:.85rem;display:flex;align-items:center;gap:8px;border-bottom:2px solid var(--border);background:var(--surface);border-radius:var(--radius) var(--radius) 0 0}
.kanban-header .count{background:var(--bg);color:var(--text3);font-size:.7rem;padding:2px 8px;border-radius:10px;font-weight:600}
.kanban-cards{flex:1;padding:8px;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.kanban-card{background:var(--surface);border-radius:var(--radius);padding:12px;box-shadow:var(--shadow);border:1px solid var(--border);cursor:pointer;transition:all .15s}
.kanban-card:hover{box-shadow:var(--card-hover-shadow);transform:translateY(-1px)}
.kanban-card .kc-property{font-weight:600;font-size:.85rem;margin-bottom:6px;line-height:1.3}
.kanban-card .kc-name{font-size:.8rem;color:var(--text2);margin-bottom:4px}
.kanban-card .kc-meta{display:flex;gap:8px;flex-wrap:wrap;font-size:.7rem;color:var(--text3)}
.kanban-card .kc-followup{margin-top:6px;font-size:.7rem;padding:3px 8px;border-radius:4px;display:inline-block}
.kc-followup.overdue{background:var(--danger-light);color:#f87171;font-weight:600}
.kc-followup.today{background:var(--warning-light);color:#fbbf24;font-weight:600}
.kc-followup.upcoming{background:rgba(59,130,246,.12);color:#60a5fa}
:root.light .kc-followup.overdue{background:#fef2f2;color:#b91c1c}
:root.light .kc-followup.today{background:#fffbeb;color:#92400e}
:root.light .kc-followup.upcoming{background:#eff6ff;color:#1d4ed8}

/* ===== MODAL / DETAIL PANEL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;justify-content:flex-end}
.modal-overlay.open{display:flex}
.modal-panel{width:560px;max-width:90vw;background:var(--surface);height:100vh;overflow-y:auto;box-shadow:-4px 0 24px rgba(0,0,0,.12);animation:slideIn .2s ease}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.modal-header{display:flex;align-items:center;justify-content:between;padding:16px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:5}
.modal-header h2{flex:1;font-size:1rem;font-weight:600}
.modal-close{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);color:var(--text3)}
.modal-close:hover{background:var(--bg);color:var(--text)}
.modal-body{padding:24px}
.field-group{margin-bottom:20px}
.field-label{display:block;font-size:.75rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.field-value{font-size:.9rem;color:var(--text);line-height:1.5}
.field-value a{word-break:break-all}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.modal-section{margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
.modal-section h3{font-size:.85rem;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}

/* ===== NOTES / ACTIVITY ===== */
.note-list{display:flex;flex-direction:column;gap:10px}
.note-item{background:var(--bg);border-radius:var(--radius);padding:10px 14px;position:relative}
.note-item .note-date{font-size:.7rem;color:var(--text3);margin-bottom:4px}
.note-item .note-text{font-size:.85rem;line-height:1.5}
.note-item .note-edited{font-size:.65rem;color:var(--text3);font-style:italic;margin-top:2px}
.note-item .note-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px;opacity:0;transition:opacity .15s}
.note-item:hover .note-actions{opacity:1}
.note-actions button{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:4px;color:var(--text3);background:var(--surface);border:1px solid var(--border)}
.note-actions button:hover{color:var(--primary);border-color:var(--primary)}
.note-actions button.del:hover{color:var(--danger);border-color:var(--danger)}
.note-input-wrap{display:flex;gap:8px;margin-top:10px}
.note-input-wrap textarea{flex:1}
.note-type-bar{display:flex;gap:2px;margin-bottom:6px}
.note-type-btn{padding:3px 10px;font-size:.7rem;font-weight:500;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--text3);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:4px}
.note-type-btn:hover{border-color:var(--text2);color:var(--text2)}
.note-type-btn.active{background:var(--primary-light);border-color:var(--primary);color:var(--primary);font-weight:600}
.rte-toolbar{display:flex;gap:2px;padding:4px 6px;border:1px solid var(--border);border-bottom:none;border-radius:var(--radius) var(--radius) 0 0;background:var(--bg)}
.rte-toolbar button{width:28px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:4px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:.8rem;font-weight:600;transition:all .12s}
.rte-toolbar button:hover{background:var(--surface);color:var(--text)}
.rte-toolbar button.active{background:var(--primary-light);color:var(--primary)}
.rte-toolbar .rte-sep{width:1px;background:var(--border);margin:3px 4px;flex-shrink:0}
.rte-editor{min-height:52px;max-height:140px;overflow-y:auto;padding:8px 10px;font-size:.85rem;line-height:1.5;border:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);background:var(--input-bg);color:var(--text);outline:none}
.rte-editor:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,110,247,.15)}
.rte-editor:empty::before{content:attr(data-placeholder);color:var(--text3);pointer-events:none}
.rte-editor ul,.rte-editor ol{margin:2px 0;padding-left:20px}
.rte-editor ul ul,.rte-editor ol ol{margin:0}
.rte-editor li{margin:1px 0}
.rte-editor ul{list-style-type:disc}
.rte-editor ul ul{list-style-type:circle}
.rte-editor ul ul ul{list-style-type:square}
.rte-editor ul ul ul ul{list-style-type:'▫ '}
.note-text ul,.note-text ol{margin:2px 0;padding-left:20px}
.note-text ul ul,.note-text ol ol{margin:0}
.note-text li{margin:1px 0}
.note-text ul{list-style-type:disc}
.note-text ul ul{list-style-type:circle}
.note-text ul ul ul{list-style-type:square}
.note-text ul ul ul ul{list-style-type:'▫ '}

/* ===== NOTIFICATIONS PANEL ===== */
.notif-panel{display:none;flex-direction:column}
.notif-panel.active-view{display:flex}
.notif-section{margin-bottom:24px}
.notif-section h3{font-size:.85rem;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.notif-section h3 .dot{width:8px;height:8px;border-radius:50%}
.notif-card{background:var(--surface);border-radius:var(--radius);padding:14px 18px;border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:8px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:14px}
.notif-card:hover{box-shadow:var(--card-hover-shadow)}
.notif-card.overdue{border-left:3px solid var(--danger)}
.notif-card.today{border-left:3px solid var(--warning)}
.notif-card.upcoming{border-left:3px solid var(--info)}
.notif-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.notif-icon.overdue{background:var(--danger-light);color:var(--danger)}
.notif-icon.today{background:var(--warning-light);color:var(--warning)}
.notif-icon.upcoming{background:rgba(59,130,246,.12);color:var(--info)}
.notif-content{flex:1;min-width:0}
.notif-content .nc-property{font-weight:600;font-size:.9rem}
.notif-content .nc-detail{font-size:.8rem;color:var(--text2);margin-top:2px}
.notif-content .nc-date{font-size:.75rem;color:var(--text3);margin-top:4px}
.notif-dismiss{flex-shrink:0;color:var(--text3);font-size:.75rem;padding:4px 8px;border-radius:4px}
.notif-dismiss:hover{background:var(--bg);color:var(--text)}

/* ===== VIEW TOGGLE ===== */
.view-toggle{display:flex;background:var(--bg);border-radius:var(--radius);padding:2px;gap:2px}
.view-toggle button{padding:5px 14px;border-radius:6px;font-size:.8rem;font-weight:500;color:var(--text2)}
.view-toggle button.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* ===== THEME TOGGLE ===== */
/* Theme toggle is now a header icon button — styled via .btn-icon */

/* ===== AUTOCOMPLETE ===== */
.search-autocomplete{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.25);max-height:360px;overflow-y:auto;z-index:300;display:none}
.search-autocomplete.visible{display:block}
.ac-section{padding:6px 0}
.ac-section-label{padding:4px 14px;font-size:.65rem;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);font-weight:600}
.ac-item{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;transition:background .1s}
.ac-item:hover,.ac-item.ac-active{background:var(--primary-light)}
.ac-item .ac-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0;background:var(--bg);color:var(--text3)}
.ac-item .ac-main{flex:1;min-width:0}
.ac-item .ac-title{font-size:.85rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ac-item .ac-title mark{background:rgba(99,129,250,.25);color:var(--primary);border-radius:2px;padding:0 1px}
:root.light .ac-item .ac-title mark{background:#dbeafe;color:#1e40af}
.ac-item .ac-sub{font-size:.7rem;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}



/* ===== TIER / PRICING ===== */
.pricing-page{max-width:900px;margin:0 auto}
.pricing-header{text-align:center;margin-bottom:28px}
.pricing-header h2{font-size:1.5rem;font-weight:700;margin-bottom:6px}
.pricing-header p{font-size:.9rem;color:var(--text2)}
.billing-toggle{display:inline-flex;align-items:center;gap:10px;margin-top:14px;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:4px}
.billing-toggle .bt-opt{padding:6px 18px;border-radius:20px;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .15s;color:var(--text3)}
.billing-toggle .bt-opt.active{background:var(--primary);color:#fff}
.billing-toggle .bt-opt:not(.active):hover{color:var(--text)}
.billing-save-badge{font-size:.65rem;font-weight:700;color:var(--success);background:var(--success-light);padding:1px 7px;border-radius:8px;margin-left:4px}
.pc-price-old{font-size:.9rem;color:var(--text3);text-decoration:line-through;margin-right:6px;font-weight:400}
.pc-billed{font-size:.72rem;color:var(--text3);margin-top:2px}
.pricing-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:900px){.pricing-cards{grid-template-columns:1fr}}
.pricing-card{background:var(--surface);border-radius:var(--radius);border:2px solid var(--border);padding:24px;display:flex;flex-direction:column;transition:all .2s;position:relative}
.pricing-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:var(--card-hover-shadow)}
.pricing-card.popular{border-color:var(--primary)}
.pricing-card.popular::before{content:'MOST POPULAR';position:absolute;top:-11px;left:50%;transform:translateX(-50%);background:var(--primary);color:#fff;font-size:.6rem;font-weight:700;padding:2px 12px;border-radius:10px;letter-spacing:.5px}
.pricing-card.current{border-color:var(--success);box-shadow:0 0 0 1px var(--success)}
.pricing-card.current::after{content:'CURRENT PLAN';position:absolute;top:-11px;right:16px;background:var(--success);color:#fff;font-size:.6rem;font-weight:700;padding:2px 10px;border-radius:10px;letter-spacing:.5px}
.pc-name{font-size:1.1rem;font-weight:700;margin-bottom:4px}
.pc-price{font-size:2rem;font-weight:800;margin-bottom:2px}
.pc-price span{font-size:.85rem;font-weight:400;color:var(--text3)}
.pc-desc{font-size:.8rem;color:var(--text2);margin-bottom:16px;min-height:36px}
.pc-features{list-style:none;margin-bottom:20px;flex:1}
.pc-features li{font-size:.82rem;padding:5px 0;display:flex;align-items:flex-start;gap:8px;line-height:1.4}
.pc-features li::before{content:'✓';color:var(--success);font-weight:700;flex-shrink:0}
.pc-features li.disabled{color:var(--text3)}
.pc-features li.disabled::before{content:'—';color:var(--text3)}
.pc-btn{padding:10px;border-radius:var(--radius);font-weight:600;font-size:.85rem;text-align:center;cursor:pointer;transition:all .15s;border:2px solid var(--border);color:var(--text)}
.pc-btn:hover{border-color:var(--primary);color:var(--primary)}
.pc-btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.pc-btn.primary:hover{background:var(--primary-hover);border-color:var(--primary-hover)}
.pc-btn.current-btn{background:var(--success);color:#fff;border-color:var(--success);cursor:default}
.tier-badge{display:inline-flex;align-items:center;gap:4px;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px}
.tier-free{background:rgba(148,163,184,.15);color:#94a3b8}
.tier-basic{background:rgba(245,158,11,.15);color:#f59e0b}
.tier-pro{background:rgba(16,185,129,.15);color:#10b981}
.tier-gate{text-align:center;padding:20px;border-radius:var(--radius);border:1px dashed var(--border);margin:12px 0}
.tier-gate .tg-icon{font-size:1.5rem;margin-bottom:8px}
.tier-gate .tg-label{font-size:.85rem;font-weight:600;margin-bottom:4px}
.tier-gate .tg-desc{font-size:.78rem;color:var(--text2);margin-bottom:10px}
.setup-steps{counter-reset:step}
.setup-step{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start}
.setup-step::before{counter-increment:step;content:counter(step);width:24px;height:24px;background:var(--primary);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0}
.setup-step-content{flex:1;font-size:.85rem;line-height:1.5}
.setup-step-content code{background:var(--input-bg);padding:1px 6px;border-radius:3px;font-size:.8rem}
.setup-step-content img{max-width:100%;border-radius:var(--radius);margin-top:6px;border:1px solid var(--border)}

/* ===== PROFILE PAGE ===== */
.profile-back{display:flex;align-items:center;gap:6px;color:var(--text2);font-size:.85rem;cursor:pointer;padding:4px 0;margin-bottom:12px;transition:color .15s;width:fit-content}
.profile-back:hover{color:var(--primary)}
.profile-back svg{width:16px;height:16px}
.profile-hero{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.profile-hero-left{flex:1;min-width:0}
.profile-hero h1{font-size:1.35rem;font-weight:700;line-height:1.3;margin-bottom:6px}
.profile-hero-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.profile-hero-actions{display:flex;gap:8px;flex-shrink:0;align-items:flex-start}
.profile-platform{display:inline-flex;align-items:center;gap:6px;font-size:.8rem;padding:5px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--primary);transition:all .15s}
.profile-platform:hover{background:var(--primary-light);border-color:var(--primary)}
.profile-platform svg{width:14px;height:14px}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:900px){.profile-grid{grid-template-columns:1fr}}
.profile-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden}
.profile-card-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;cursor:pointer;user-select:none;transition:background .1s}
.profile-card-header:hover{background:var(--primary-light)}
.profile-card-header h3{font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:8px;margin:0}
.profile-card-header .chevron{width:16px;height:16px;color:var(--text3);transition:transform .2s}
.profile-card-header.collapsed .chevron{transform:rotate(-90deg)}
.profile-card-body{padding:14px 16px;border-top:1px solid var(--border)}
.profile-card-body.collapsed{display:none}
.prop-field-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
.prop-field label{display:block;font-size:.68rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.prop-field input,.prop-field select{font-size:.82rem;padding:5px 8px}
.prop-check-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.prop-check{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.73rem;cursor:pointer;transition:all .12s;border:1px solid var(--border);color:var(--text2);user-select:none}
.prop-check:hover{border-color:var(--primary);color:var(--primary)}
.prop-check.checked{background:var(--primary);color:#fff;border-color:var(--primary)}
.prop-check input[type=checkbox]{display:none}
.import-dialog{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:20px;margin-bottom:20px}
.import-dialog h3{font-size:.95rem;font-weight:600;margin-bottom:4px}
.import-dialog p{font-size:.82rem;color:var(--text2);margin-bottom:14px}
.import-options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.import-option{padding:16px;border-radius:var(--radius);border:2px solid var(--border);cursor:pointer;transition:all .15s;text-align:center}
.import-option:hover{border-color:var(--primary);background:var(--primary-light)}
.import-option .io-icon{font-size:1.4rem;margin-bottom:6px}
.import-option .io-title{font-weight:600;font-size:.88rem;margin-bottom:3px}
.import-option .io-desc{font-size:.73rem;color:var(--text2)}
.import-loading{text-align:center;padding:24px;color:var(--text2)}
.import-loading .spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.prop-note-item{background:var(--input-bg);border-radius:var(--radius);padding:10px 14px;border-left:3px solid var(--info);margin-bottom:6px}
.prop-note-item .pn-date{font-size:.68rem;color:var(--text3);margin-bottom:3px}
.prop-note-item .pn-text{font-size:.82rem;line-height:1.5}
.profile-full{margin-bottom:16px}
.profile-section-title{font-size:.95rem;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.profile-contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:600px){.profile-contact-grid{grid-template-columns:1fr}}



/* ===== CSV IMPORT ===== */
.csv-preview{max-height:300px;overflow:auto;border:1px solid var(--border);border-radius:var(--radius);margin:12px 0}
.csv-preview table{width:100%;font-size:.78rem}
.csv-preview th{position:sticky;top:0;background:var(--surface);z-index:1}
.csv-preview td{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.csv-mapping{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin:12px 0}
.csv-mapping .arrow{color:var(--text3);font-size:.8rem}
.csv-mapping label{font-size:.78rem;font-weight:600;color:var(--text2)}
.csv-mapping select{font-size:.8rem;padding:5px 8px}
.csv-drop{border:2px dashed var(--border);border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer;transition:all .15s}
.csv-drop:hover,.csv-drop.dragover{border-color:var(--primary);background:var(--primary-light)}
.csv-drop input[type=file]{display:none}

/* ===== LOGIN / USER ===== */
.user-avatar{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid var(--border);transition:border-color .15s;object-fit:cover}
.user-avatar:hover{border-color:var(--primary)}
.login-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:var(--radius);font-size:.8rem;font-weight:500;background:var(--surface);border:1px solid var(--border);color:var(--text);cursor:pointer;transition:all .15s}
.login-btn:hover{border-color:var(--primary);color:var(--primary)}
.login-btn svg{width:16px;height:16px}
.user-menu{position:absolute;top:100%;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.25);min-width:200px;z-index:300;display:none;overflow:hidden}
.user-menu.open{display:block}
.user-menu-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.user-menu-header img{width:32px;height:32px;border-radius:50%}
.user-menu-header .um-name{font-size:.85rem;font-weight:600}
.user-menu-header .um-email{font-size:.7rem;color:var(--text3)}
.user-menu-item{padding:10px 14px;font-size:.82rem;cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:8px}
.user-menu-item:hover{background:var(--primary-light)}
.user-menu-item svg{width:16px;height:16px;color:var(--text3)}


/* ===== EDITABLE HERO FIELDS ===== */
.hero-editable{position:relative;display:inline-flex;align-items:center;gap:6px;cursor:default}
.hero-editable .hero-edit-icon{opacity:0;transition:opacity .15s;color:var(--text3);flex-shrink:0}
.hero-editable:hover .hero-edit-icon{opacity:1}
.hero-editable:hover{cursor:pointer}
.hero-editable h1{margin-bottom:0}
.hero-rent{font-size:1.15rem;font-weight:700;color:var(--success);margin-top:2px;display:flex;align-items:center;gap:6px}
.hero-rent .no-rent{color:var(--text3);font-weight:400;font-size:.85rem}
.hero-edit-input{background:var(--input-bg);border:1px solid var(--primary);border-radius:var(--radius);padding:4px 10px;font-size:inherit;font-weight:inherit;font-family:inherit;color:var(--text);outline:none;width:100%}
.hero-edit-input:focus{box-shadow:0 0 0 3px rgba(79,110,247,.15)}
h1 .hero-edit-input{font-size:1.35rem}
.hero-rent .hero-edit-input{font-size:1.15rem;color:var(--success);max-width:160px}
.auto-import-warning{position:absolute;top:100%;left:0;background:var(--surface);border:1px solid var(--warning);border-radius:var(--radius);padding:10px 14px;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:50;min-width:280px;font-size:.8rem}
.auto-import-warning .aiw-title{font-weight:600;color:var(--warning);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.auto-import-warning .aiw-text{color:var(--text2);margin-bottom:8px;line-height:1.4}
.auto-import-warning .aiw-btns{display:flex;gap:6px}


/* ===== STATS EDIT ===== */
.hero-stats-wrap{position:relative;display:flex;align-items:center;gap:0}
.hero-stats-wrap .stats-edit-btn{opacity:0;transition:opacity .15s;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(--text3);cursor:pointer;flex-shrink:0;margin-left:4px}
.hero-stats-wrap:hover .stats-edit-btn{opacity:1}
.hero-stats-wrap .stats-edit-btn:hover{background:var(--primary-light);color:var(--primary)}
.stats-popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:250;display:flex;align-items:center;justify-content:center}
.stats-popup{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:0 12px 40px rgba(0,0,0,.3);width:420px;max-width:90vw;padding:20px 24px}
.stats-popup h3{font-size:1rem;font-weight:600;margin-bottom:4px}
.stats-popup .sp-desc{font-size:.8rem;color:var(--text2);margin-bottom:16px}
.stats-popup .sp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stats-popup .sp-field label{display:block;font-size:.7rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.stats-popup .sp-field input{font-size:.9rem;padding:7px 10px}
.stats-popup .sp-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* ===== ADDRESS AUTOCOMPLETE ===== */
.address-ac{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.25);max-height:240px;overflow-y:auto;z-index:300;display:none}
.address-ac.visible{display:block}
.address-ac-item{padding:8px 12px;font-size:.82rem;cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:8px}
.address-ac-item:hover,.address-ac-item.active{background:var(--primary-light)}
.address-ac-item svg{width:14px;height:14px;color:var(--text3);flex-shrink:0}
/* Google Places PAC dropdown styling */
.pac-container{background:var(--surface);border:1px solid var(--border);border-radius:0 0 8px 8px;box-shadow:0 8px 24px rgba(0,0,0,.25);font-family:inherit;z-index:9999;margin-top:0}
.pac-item{padding:8px 12px;font-size:.82rem;cursor:pointer;color:var(--text);border-top:1px solid var(--border)}
.pac-item:hover,.pac-item-selected{background:var(--primary-light)}
.pac-item-query{font-size:.82rem;color:var(--text);font-weight:500}
.pac-matched{font-weight:700;color:var(--primary)}
.pac-icon{display:none}
.pac-logo:after{display:none}

/* ===== HERO STATS ROW ===== */
.hero-stats{display:flex;align-items:center;gap:16px;margin-top:6px;flex-wrap:wrap}
.hero-stat{display:flex;align-items:center;gap:5px;font-size:.82rem;color:var(--text2)}
.hero-stat strong{font-weight:700;color:var(--text);font-size:.9rem}
.hero-stat-divider{width:1px;height:16px;background:var(--border)}

/* ===== PROFILE TABS ===== */
.profile-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:16px;margin-top:8px}
.profile-tab{padding:10px 20px;font-size:.85rem;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.profile-tab:hover{color:var(--text);background:var(--primary-light)}
.profile-tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.profile-tab .tab-lock{font-size:.6rem;padding:1px 6px;border-radius:8px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.profile-tab .tab-lock.locked{background:rgba(148,163,184,.15);color:#94a3b8}
.profile-tab .tab-lock.basic{background:rgba(245,158,11,.15);color:#f59e0b}
.profile-tab .tab-lock.pro{background:rgba(16,185,129,.15);color:#10b981}
.profile-tabs-container{position:relative}
.tab-content{display:none;min-width:0}
.tab-content.active{display:block}

/* ===== LOCKED TAB OVERLAY ===== */
.tab-locked-overlay{text-align:center;padding:40px 20px}
.tab-locked-overlay .tlo-icon{font-size:2.5rem;margin-bottom:12px}
.tab-locked-overlay .tlo-title{font-size:1.1rem;font-weight:700;margin-bottom:6px}
.tab-locked-overlay .tlo-desc{font-size:.85rem;color:var(--text2);max-width:400px;margin:0 auto 16px}


/* ===== CARD EDIT HOVER ===== */
.profile-card-header .card-edit-btn{opacity:0;transition:opacity .15s;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);color:var(--text3);margin-left:auto;flex-shrink:0}
.profile-card:hover .card-edit-btn{opacity:1}
.card-edit-btn:hover{background:var(--primary-light);color:var(--primary)}
.card-readonly .cr-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px}
.card-readonly .cr-field{flex:1;min-width:140px}
.card-readonly .cr-label{font-size:.7rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.card-readonly .cr-value{font-size:.95rem;font-weight:500;color:var(--text)}
.card-readonly .cr-value.empty{color:var(--text3);font-style:italic;font-weight:400;font-size:.85rem}
.card-readonly .cr-value a{color:var(--primary);font-weight:500}
.inline-status{cursor:pointer;position:relative;display:inline-block}
.inline-status:hover{opacity:.85}
.inline-status-dd{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:300;min-width:190px;max-height:360px;overflow-y:auto;padding:4px 0;display:none}
.inline-status-dd.open{display:block}
.inline-status-dd .isd-item{padding:7px 12px;cursor:pointer;transition:background .1s;font-size:.82rem}
.inline-status-dd .isd-item:hover{background:var(--primary-light)}
.inline-status-dd .isd-item.current{background:var(--primary-light);font-weight:600}
.card-edit-popup{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:250;display:flex;align-items:center;justify-content:center}
.card-edit-popup .cep-panel{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:0 12px 40px rgba(0,0,0,.3);width:500px;max-width:90vw;max-height:85vh;overflow-y:auto}
.card-edit-popup .cep-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
.card-edit-popup .cep-header h3{font-size:.95rem;font-weight:600}
.card-edit-popup .cep-body{padding:16px 20px}

/* ===== TEXTAREA HINT ===== */

/* ===== SETTINGS ===== */
.settings-page{max-width:760px;margin:0 auto}

.settings-section-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}

.settings-profile-card{display:flex;align-items:center;gap:16px;padding:4px 0}

/* ===== THEME PICKER ===== */
.theme-picker{position:absolute;top:calc(100% + 6px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:300;width:220px;padding:12px;display:none}

.theme-picker .tp-section{margin-bottom:10px}

.theme-picker .tp-label{font-size:.68rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}

<script>
/* ===== DATA LAYER ===== */
const INITIAL_DATA = [];

const STATUSES = ['New','No Contact','Messaged','Left Voicemail','Follow Up','Interested','Meeting','HOA Issues','Not Good Fit','Not Interested','No Longer Interested','Lost'];
const STATUS_ORDER = {};
STATUSES.forEach((s,i) => STATUS_ORDER[s] = i);

const PIPELINE_STAGES = ['New','No Contact','Messaged','Left Voicemail','Follow Up','Interested','Meeting'];
const CLOSED_STAGES = ['HOA Issues','Not Good Fit','Not Interested','No Longer Interested','Lost'];

function statusClass(s){ return 'st-' + (s||'new').toLowerCase().replace(/\s+/g,'-') }
function statusPill(s){ return `<span class="status-pill ${statusClass(s)}">${s||'New'}</span>` }

let records = [];
let currentView = 'dashboard';
let searchQuery = '';
let filterStatus = 'All';
let contactsViewMode = 'table';
let previousView = 'dashboard';
let currentProfileId = null;
let pipelineCategory = 'all'; // 'all', 'prospects', 'outreach', 'qualified'
let pipelineSubCategory = null; // null = all within category, or a specific status string
// profileActiveTab defined in PROFILE TABS section

function uid(){ return '_'+Math.random().toString(36).substr(2,9) }

const DATA_VERSION = 8;
let _saveTimeout = null;
let _currentUid = null;

function loadData(){
  // Start with empty records; Firestore data loads async via onAuthStateChanged
  records = [];
}

async function loadDataFromFirestore(userUid){
  _currentUid = userUid;
  if(!userUid || typeof db === 'undefined') { records = []; render(); return; }
  try {
    // Clear any leftover localStorage data
    window.localStorage.removeItem('arbflow_records');
    window.localStorage.removeItem('arbflow_data_version');
    // Load from Firestore
    const doc = await db.collection('users').doc(userUid).collection('properties').doc('records').get();
    if(doc.exists){
      const data = doc.data();
      records = JSON.parse(data.data || '[]');
      records.forEach(r => { if(!r.propertyDetails) r.propertyDetails={}; if(!r.propertyNotes) r.propertyNotes=[]; });
    } else {
      records = [];
    }
  } catch(e){
    console.error('Failed to load data from Firestore:', e);
    records = [];
  }
  render();
}

function saveData(){
  // Debounce Firestore writes to avoid excessive calls
  if(_saveTimeout) clearTimeout(_saveTimeout);
  _saveTimeout = setTimeout(() => {
    if(_currentUid && typeof db !== 'undefined'){
      db.collection('users').doc(_currentUid).collection('properties').doc('records').set({ 
        data: JSON.stringify(records),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }).catch(e => console.error('Failed to save data:', e));
    }
  }, 1000);
}

/* ===== VIEW ROUTER ===== */
function switchView(view){
  currentView = view;
  currentProfileId = null;
  clearSearch();
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === view));
  const titles = { dashboard:'Dashboard', pipeline:'Funnel', contacts:'All Contacts', notifications:'Notifications', pricing:'Your Plan', settings:'Settings' };
  document.getElementById('headerTitle').textContent = titles[view] || '';
  saveViewState();
  render();
}

function saveViewState(){
  try {
    sessionStorage.setItem('rr_view', currentView);
    sessionStorage.setItem('rr_profileId', currentProfileId || '');
    sessionStorage.setItem('rr_prevView', previousView);
  } catch(e){}
}

function restoreViewState(){
  try {
    const v = sessionStorage.getItem('rr_view');
    const pid = sessionStorage.getItem('rr_profileId');
    const pv = sessionStorage.getItem('rr_prevView');
    const pt = sessionStorage.getItem('rr_profileTab');
    if(v) currentView = v;
    if(pid) currentProfileId = pid;
    if(pv) previousView = pv;
    if(pt) profileActiveTab = pt;
  } catch(e){}
}

function render(){
  const area = document.getElementById('contentArea');
  switch(currentView){
    case 'dashboard': area.innerHTML = renderDashboard(); break;
    case 'pipeline': area.innerHTML = renderPipeline(); break;
    case 'contacts': area.innerHTML = renderContacts(); break;
    case 'notifications': area.innerHTML = renderNotifications(); break;
    case 'profile': area.innerHTML = renderProfile(); break;
    case 'pricing': area.innerHTML = renderPricing(); break;
    case 'settings': area.innerHTML = renderSettings(); break;
  }
  updateNotifBadges();
}

/* ===== DASHBOARD ===== */
function renderDashboard(){
  const counts = {};
  STATUSES.forEach(s => counts[s] = 0);
  records.forEach(r => { counts[r.status] = (counts[r.status]||0)+1 });
  const total = records.length;
  const withContact = records.filter(r => r.name || r.phone || r.email).length;
  const active = records.filter(r => PIPELINE_STAGES.includes(r.status)).length;
  const followUps = getFollowUps();
  const overdue = followUps.filter(f => f.type === 'overdue').length;
  const recentActivity = records.filter(r => r.date).sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0,8);

  return `
    <div class="stats-row">
      <div class="stat-card"><div class="label">Total Properties</div><div class="value">${total}</div><div class="sub">${withContact} with contact info</div></div>
      <div class="stat-card"><div class="label">Active Pipeline</div><div class="value">${active}</div><div class="sub">${PIPELINE_STAGES.length} stages</div></div>
      <div class="stat-card"><div class="label">Follow Ups Due</div><div class="value" style="color:${overdue?'var(--danger)':'var(--success)'}">${followUps.length}</div><div class="sub">${overdue} overdue</div></div>
      <div class="stat-card"><div class="label">Interested / Meeting</div><div class="value" style="color:var(--success)">${(counts['Interested']||0)+(counts['Meeting']||0)}</div><div class="sub">Hot leads</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div>
        <h3 style="font-size:.95rem;margin-bottom:12px">Pipeline Breakdown</h3>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Status</th><th style="text-align:right">Count</th><th style="text-align:right">%</th></tr></thead>
            <tbody>${STATUSES.map(s => `<tr style="cursor:pointer" onclick="filterStatus='${s}';switchView('contacts')"><td>${statusPill(s)}</td><td style="text-align:right;font-weight:600">${counts[s]||0}</td><td style="text-align:right;color:var(--text3)">${total?Math.round((counts[s]||0)/total*100):0}%</td></tr>`).join('')}</tbody>
          </table>
        </div>
      </div>
      <div>
        <h3 style="font-size:.95rem;margin-bottom:12px">Recent Activity</h3>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Property</th><th>Status</th><th>Date</th></tr></thead>

/* ===== PIPELINE ===== */
const FUNNEL_CATEGORIES = [
  { key:'prospects', name:'New Leads', statuses:['New','No Contact'], color:'#818cf8' },
  { key:'outreach', name:'In Outreach', statuses:['Messaged','Left Voicemail','Follow Up'], color:'#38bdf8' },
  { key:'qualified', name:'Qualified', statuses:['Interested','Meeting'], color:'#34d399' },
];

function renderPipeline(){
  let html = renderFunnel(records);

  // Category tabs
  const allActive = records.filter(r => PIPELINE_STAGES.includes(r.status));
  const cats = FUNNEL_CATEGORIES.map(c => ({
    ...c,
    count: records.filter(r => c.statuses.includes(r.status)).length,
    records: records.filter(r => c.statuses.includes(r.status))
  }));

  const activeCat = pipelineCategory || 'all';

  const lostCount = records.filter(r => CLOSED_STAGES.includes(r.status)).length;
  html += `<div class="pipeline-category-tabs">
    <div class="pipeline-cat-tab ${activeCat==='all'?'active':''}" onclick="pipelineCategory='all';pipelineSubCategory=null;render()">All Active <span class="pct-count">${allActive.length}</span></div>
    ${cats.map(c => `<div class="pipeline-cat-tab ${activeCat===c.key?'active':''}" onclick="pipelineCategory='${c.key}';pipelineSubCategory=null;render()">${c.name} <span class="pct-count">${c.count}</span></div>`).join('')}
    ${lostCount > 0 ? `<div class="pipeline-cat-tab ${activeCat==='lost'?'active':''}" onclick="pipelineCategory='lost';pipelineSubCategory=null;render()" style="${activeCat==='lost'?'color:var(--danger);border-bottom-color:var(--danger)':''}">🗑 Lost <span class="pct-count">${lostCount}</span></div>` : ''}
  </div>`;

  // Sub-category chips (only when a specific category is selected, not "all")
  if(activeCat !== 'all'){
    const isLost = activeCat === 'lost';
    const cat = isLost ? { name:'Lost', statuses:CLOSED_STAGES, count:records.filter(r=>CLOSED_STAGES.includes(r.status)).length } : cats.find(c => c.key === activeCat);
    if(cat && cat.statuses.length > 1){
      html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
        <span class="chip ${!pipelineSubCategory?'active':''}" onclick="pipelineSubCategory=null;render()">All ${cat.name} (${cat.count})</span>
        ${cat.statuses.map(st => {
          const cnt = records.filter(r => r.status === st).length;
          return cnt > 0 ? `<span class="chip ${pipelineSubCategory===st?'active':''}" onclick="pipelineSubCategory='${st}';render()">${st} (${cnt})</span>` : '';
        }).join('')}
      </div>`;
    }
  }

  // Get records for selected category
  let displayRecords;
  if(activeCat === 'all'){
    displayRecords = allActive;
  } else if(activeCat === 'lost'){
    displayRecords = records.filter(r => CLOSED_STAGES.includes(r.status));
    if(pipelineSubCategory) displayRecords = displayRecords.filter(r => r.status === pipelineSubCategory);
  } else {
    const cat = cats.find(c => c.key === activeCat);
    displayRecords = cat ? cat.records : [];
    if(pipelineSubCategory) displayRecords = displayRecords.filter(r => r.status === pipelineSubCategory);
  }

  // Apply search filter if active
  if(searchQuery){
    const words = searchQuery.split(/\s+/).filter(w => w.length > 0);
    displayRecords = displayRecords.filter(r => {
      const blob = [r.property, r.name, r.phone, r.email, r.status].filter(Boolean).join(' ').toLowerCase();
      return words.every(w => blob.includes(w));
    });
  }

  if(displayRecords.length === 0){
    html += '<div style="text-align:center;padding:40px;color:var(--text3);font-size:.9rem">No properties in this category</div>';
  } else {
    html += '<div class="pipeline-list">';
    displayRecords.forEach(r => {
      const d = r.propertyDetails || {};
      const rent = d.monthlyRent ? '$'+Number(d.monthlyRent).toLocaleString()+'/mo' : '';
      html += `<div class="pipeline-card" onclick="openDetail('${r.id}')">
        <div class="plc-main">
          <div class="plc-property">${esc(r.property)}</div>
          ${r.name ? `<div class="plc-name">${esc(r.name)}</div>` : ''}
          <div class="plc-meta">
            ${rent ? `<span>${rent}</span>` : ''}
            ${d.bedrooms ? `<span>${d.bedrooms} bd</span>` : ''}
            ${d.bathrooms ? `<span>${d.bathrooms} ba</span>` : ''}
            ${r.phone ? `<span>📞 ${esc(r.phone)}</span>` : ''}
            ${r.date ? `<span>${fmtDate(r.date)}</span>` : ''}
          </div>
        </div>
        <div class="plc-status">${statusPill(r.status)}</div>
      </div>`;
    });
    html += '</div>';
  }

  return html;
}

function renderFunnel(allRecords){
  const total = allRecords.length;
  if(total === 0) return '';

  // Three funnel stages (grouped)
  const stages = [
    { name:'Prospects', statuses:['New','No Contact'], color:'#818cf8', label:'New Leads' },
    { name:'Outreach', statuses:['Messaged','Left Voicemail','Follow Up'], color:'#38bdf8', label:'In Outreach' },
    { name:'Qualified', statuses:['Interested','Meeting'], color:'#34d399', label:'Qualified' },
  ];

  stages.forEach(s => {
    s.count = allRecords.filter(r => s.statuses.includes(r.status)).length;
    s.pct = total > 0 ? (s.count / total * 100).toFixed(1) : 0;
    s.breakdown = s.statuses.map(st => ({ status:st, count:allRecords.filter(r=>r.status===st).length }));
  });

  const leakedCounts = CLOSED_STAGES.map(s => ({ stage:s, count:allRecords.filter(r=>r.status===s).length })).filter(s=>s.count>0);
  const totalLeaked = leakedCounts.reduce((a,b)=>a+b.count,0);
  const contacted = allRecords.filter(r => !['New','No Contact'].includes(r.status)).length;
  const hot = allRecords.filter(r => ['Interested','Meeting'].includes(r.status)).length;

  // SVG horizontal funnel — fixed shape, 3 sections
  const W = 700, H = 120;
  const topY = 0, botY = H;
  // Trapezoid narrows left to right: leftH=full, rightH=narrow
  const sections = [
    { x1:0, x2:W*0.40, topL:0, topR:H*0.12, botL:H, botR:H*0.88 },
    { x1:W*0.40+2, x2:W*0.72, topL:H*0.12, topR:H*0.30, botL:H*0.88, botR:H*0.70 },
    { x1:W*0.72+2, x2:W, topL:H*0.30, topR:H*0.42, botL:H*0.70, botR:H*0.58 },
  ];

  // Build labels row above funnel
  const labelWidths = ['40%','32%','28%'];
  let labelsHtml = '<div class="funnel-labels">';
  stages.forEach((s, i) => {
    labelsHtml += `<div class="funnel-label" style="width:${labelWidths[i]};color:${s.color}">${s.label}</div>`;
  });
  labelsHtml += '</div>';

  // Build SVG funnel — numbers and percentages only, large and prominent
  const catKeys = ['prospects','outreach','qualified'];
  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  stages.forEach((s, i) => {
    const sec = sections[i];
    const points = `${sec.x1},${sec.topL} ${sec.x2},${sec.topR} ${sec.x2},${sec.botR} ${sec.x1},${sec.botL}`;
    const cx = (sec.x1 + sec.x2) / 2;
    const cy = H / 2;
    svg += `<polygon class="funnel-stage" points="${points}" fill="${s.color}" onclick="pipelineCategory='${catKeys[i]}';pipelineSubCategory=null;render()"/>`;
    svg += `<text x="${cx}" y="${cy+6}" text-anchor="middle" fill="#fff" font-size="18" font-weight="800" style="pointer-events:none;text-shadow:0 1px 4px rgba(0,0,0,.35)">${s.count} <tspan fill="rgba(255,255,255,.7)" font-size="13" font-weight="600">(${s.pct}%)</tspan></text>`;
  });
  svg += `</svg>`;

  let html = `<div class="funnel-wrap">
    <div class="funnel-header"><h3>Pipeline Funnel</h3><div class="fh-total">${total} total leads</div></div>
    ${labelsHtml}
    <div class="funnel-svg-wrap">${svg}</div>`;

  // KPI bar
  html += `<div class="funnel-conversion">
    <div class="funnel-kpi"><div class="fk-value" style="color:var(--primary)">${total}</div><div class="fk-label">Total Leads</div></div>
    <div class="funnel-kpi"><div class="fk-value" style="color:var(--info)">${contacted}</div><div class="fk-label">Contacted</div></div>
    <div class="funnel-kpi"><div class="fk-value" style="color:#a78bfa">${hot}</div><div class="fk-label">Qualified</div></div>
    <div class="funnel-kpi"><div class="fk-value" style="color:var(--success)">${total>0?((hot/total)*100).toFixed(1):0}%</div><div class="fk-label">Qualification Rate</div></div>
  </div>`;

  // Lost section — separate from funnel
  if(totalLeaked > 0){
    html += `<div style="margin-top:12px;padding:12px 16px;background:var(--bg);border-radius:var(--radius);display:flex;align-items:center;gap:14px;cursor:pointer" onclick="pipelineCategory='lost';pipelineSubCategory=null;render()">
      <div style="width:36px;height:36px;border-radius:50%;background:var(--danger-light);display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
      </div>
      <div style="flex:1">
        <div style="font-size:.88rem;font-weight:600;color:var(--danger)">Lost</div>
        <div style="font-size:.75rem;color:var(--text3)">${leakedCounts.map(s => s.stage+' ('+s.count+')').join(' · ')}</div>
      </div>
      <div style="font-size:1.3rem;font-weight:700;color:var(--danger)">${totalLeaked}</div>
      <div style="font-size:.75rem;color:var(--text3)">${total>0?(totalLeaked/total*100).toFixed(1):0}%</div>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </div>`;
  }

  html += `</div>`;

  return html;
}

/* ===== NOTIFICATIONS ===== */
function getFollowUps(){
  const today = new Date().toISOString().split('T')[0];
  return records.filter(r => r.followUpDate).map(r => {
    const diff = daysDiff(today, r.followUpDate);
    let type = 'upcoming';
    if(diff > 0) type = 'overdue';
    else if(diff === 0) type = 'today';
    return { ...r, type, diff };
  }).sort((a,b) => b.diff - a.diff);
}

function getFollowUpStatus(r){
  if(!r.followUpDate) return null;
  const today = new Date().toISOString().split('T')[0];
  const diff = daysDiff(today, r.followUpDate);
  if(diff > 0) return { type:'overdue', diff };
  if(diff === 0) return { type:'today', diff:0 };
  return { type:'upcoming', diff };
}

function renderNotifications(){
  const followUps = getFollowUps();
  const overdue = followUps.filter(f => f.type==='overdue');
  const today = followUps.filter(f => f.type==='today');
  const upcoming = followUps.filter(f => f.type==='upcoming');

  // Also show Follow Up status records without followUpDate as needing attention
  const needsFollowUp = records.filter(r => r.status === 'Follow Up' && !r.followUpDate);

  if(!followUps.length && !needsFollowUp.length){
    return `<div style="text-align:center;padding:60px 20px;color:var(--text3)">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:12px;opacity:.4"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
      <div style="font-size:1rem;font-weight:600;margin-bottom:4px">All caught up!</div>
      <div>No pending follow-ups. Set a follow-up date on any record to get reminders here.</div>
    </div>`;
  }

  return `<div style="max-width:700px">
    ${overdue.length ? `<div class="notif-section"><h3><span class="dot" style="background:var(--danger)"></span> Overdue (${overdue.length})</h3>${overdue.map(r => renderNotifCard(r)).join('')}</div>` : ''}
    ${today.length ? `<div class="notif-section"><h3><span class="dot" style="background:var(--warning)"></span> Due Today (${today.length})</h3>${today.map(r => renderNotifCard(r)).join('')}</div>` : ''}
    ${upcoming.length ? `<div class="notif-section"><h3><span class="dot" style="background:var(--info)"></span> Upcoming (${upcoming.length})</h3>${upcoming.map(r => renderNotifCard(r)).join('')}</div>` : ''}
    ${needsFollowUp.length ? `<div class="notif-section"><h3><span class="dot" style="background:var(--text3)"></span> Needs Follow-Up Date (${needsFollowUp.length})</h3>${needsFollowUp.map(r => `
      <div class="notif-card" onclick="openDetail('${r.id}')" style="border-left:3px solid var(--text3)">
        <div class="notif-icon" style="background:var(--bg);color:var(--text3)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div>
        <div class="notif-content">
          <div class="nc-property">${r.property}</div>
          <div class="nc-detail">${r.name||'Unknown'} — Status: Follow Up, no date set</div>
        </div>
      </div>`).join('')}</div>` : ''}
  </div>`;
}

function renderNotifCard(r){
  const labels = { overdue:'Overdue by '+Math.abs(r.diff)+' day'+(Math.abs(r.diff)>1?'s':''), today:'Due today', upcoming:'Due '+fmtDate(r.followUpDate) };
  return `<div class="notif-card ${r.type}" onclick="openDetail('${r.id}')">
    <div class="notif-icon ${r.type}"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/></svg></div>
    <div class="notif-content">
      <div class="nc-property">${r.property}</div>
      <div class="nc-detail">${r.name||'Unknown contact'} ${r.phone?'• '+r.phone:''}</div>
      <div class="nc-date">${labels[r.type]} • ${statusPill(r.status)}</div>
    </div>
    <button class="notif-dismiss" onclick="event.stopPropagation();dismissFollowUp('${r.id}')" title="Clear follow-up">✓ Done</button>
  </div>`;
}

function dismissFollowUp(id){
  const r = records.find(x => x.id===id);

function detectPlatform(url){
  if(!url) return { name:'Unknown', icon:'🔗', color:'var(--text3)' };
  const u = url.toLowerCase();
  if(u.includes('apartments.com')) return { name:'Apartments.com', icon:'🏢', color:'#e2231a' };
  if(u.includes('hotpads.com')) return { name:'HotPads', icon:'📍', color:'#46a049' };
  if(u.includes('zillow.com')) return { name:'Zillow', icon:'🏠', color:'#006aff' };
  if(u.includes('facebook.com') || u.includes('fb.com')) return { name:'Facebook', icon:'📘', color:'#1877f2' };
  if(u.includes('craigslist.org')) return { name:'Craigslist', icon:'📋', color:'#5a0e8e' };
  if(u.includes('realtor.com')) return { name:'Realtor.com', icon:'🏡', color:'#d92228' };
  if(u.includes('trulia.com')) return { name:'Trulia', icon:'🗺️', color:'#53b50a' };
  if(u.includes('redfin.com')) return { name:'Redfin', icon:'🔴', color:'#a02021' };
  if(u.includes('airbnb.com')) return { name:'Airbnb', icon:'🏘️', color:'#ff5a5f' };
  if(u.includes('vrbo.com')) return { name:'VRBO', icon:'🌴', color:'#3c67f0' };
  if(u.includes('furnished')) return { name:'Furnished Finder', icon:'🛋️', color:'#f79c42' };
  if(u.includes('rent.com')) return { name:'Rent.com', icon:'🔑', color:'#ff6f00' };
  if(u.includes('zumper.com')) return { name:'Zumper', icon:'🏙️', color:'#1c8dd9' };
  return { name: new URL(url).hostname.replace('www.',''), icon:'🔗', color:'var(--primary)' };
}

function renderSectionFields(recId, d, section){
  let html = '';
  const selectFields = section.fields.filter(f => f.t !== 'multi');
  const multiFields = section.fields.filter(f => f.t === 'multi');

  if(selectFields.length){
    html += '<div class="prop-field-grid">';
    selectFields.forEach(f => {
      const val = d[f.k] || '';
      if(f.t === 'select'){
        html += `<div class="prop-field"><label>${f.l}</label><select onchange="savePropDetail('${recId}','${f.k}',this.value)">${(f.o||[]).map(o=>`<option value="${o}" ${val===o?'selected':''}>${o||'—'}</option>`).join('')}</select></div>`;
      } else if(f.t === 'date'){
        html += `<div class="prop-field"><label>${f.l}</label><input type="date" value="${val}" onchange="savePropDetail('${recId}','${f.k}',this.value)"></div>`;
      } else if(f.t === 'number'){
        html += `<div class="prop-field"><label>${f.l}</label><input type="number" value="${val}" onchange="savePropDetail('${recId}','${f.k}',this.value)" placeholder="—"></div>`;
      } else if(f.t === 'bool'){
        html += `<div class="prop-field"><label>${f.l}</label><select onchange="savePropDetail('${recId}','${f.k}',this.value)"><option value="" ${!val?'selected':''}>—</option><option value="Yes" ${val==='Yes'?'selected':''}>Yes</option><option value="No" ${val==='No'?'selected':''}>No</option></select></div>`;
      } else {
        html += `<div class="prop-field"><label>${f.l}</label><input type="text" value="${esc(val)}" onchange="savePropDetail('${recId}','${f.k}',this.value)" placeholder="—"></div>`;
      }
    });
    html += '</div>';
  }

  multiFields.forEach(f => {
    const selected = d[f.k] || [];
    html += `<div style="margin-top:${selectFields.length?'12':'0'}px"><label style="display:block;font-size:.68rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px">${f.l}</label>`;
    html += '<div class="prop-check-grid">';
    (f.o||[]).forEach(opt => {
      const checked = selected.includes(opt);
      html += `<label class="prop-check ${checked?'checked':''}" onclick="togglePropCheck(this,'${recId}','${f.k}','${opt.replace(/'/g,"\\\\'")}')"><input type="checkbox" ${checked?'checked':''}>${opt}</label>`;
    });
    html += '</div></div>';
  });

  return html;
}

async function autoImport(recId){
  const r = records.find(x => x.id === recId);
  if(!r || !r.link) return;
  const container = document.getElementById('importContainer_'+recId);
  const plat = detectPlatform(r.link);
  if(!requireTier('basic','Auto Import')){ container.innerHTML = tierGateHtml('basic','Auto Import','Automatically extract property details from listing pages.'); return }
  container.innerHTML = '<div class="import-loading"><div class="spinner"></div><div>Importing from '+plat.name+'...</div><div style="font-size:.78rem;color:var(--text3);margin-top:6px" id="profileImportStatus">Connecting to import server...</div></div>';

  // Try extension-based import
  const statusEl = document.getElementById('profileImportStatus');
  try {
    if(!extensionReady){
      container.innerHTML = `<div class="import-dialog"><h3>Extension Required</h3><p>The RentingRadar Importer extension is needed for auto-import. <a href="${EXTENSION_URL}" target="_blank" style="color:var(--primary);font-weight:600">Download it from the Chrome Web Store</a>, then reload this page.</p><div style="display:flex;gap:8px;margin-top:12px"><button class="btn btn-primary btn-sm" onclick="location.reload()">I've Installed It — Reload</button><button class="btn btn-secondary btn-sm" onclick="showManualEntry('${recId}')">Manual Entry</button></div></div>`;
      return;
    }
    if(statusEl) statusEl.textContent = 'Extension is fetching listing page...';
    const data = await sendImportRequest(r.link);
    if(statusEl) statusEl.textContent = 'Processing extracted data...';

    // Apply the data
    if(!r.propertyDetails) r.propertyDetails = {};
    for(const [key, val] of Object.entries(data.details||{})){
      if(val && (typeof val !== 'object' || (Array.isArray(val) && val.length > 0))){
        r.propertyDetails[key] = val;
      }
    }
    if(!r.propertyNotes) r.propertyNotes = [];
    (data.notes||[]).forEach(n => {
      r.propertyNotes.push({ id:uid(), text:n, date:new Date().toISOString(), source:'Auto-Import ('+plat.name+')' });
    });
    r.propertyNotes.push({ id:uid(), text:'Auto-imported from '+plat.name+' via '+data.parser+'. '+data.fieldsFound+' fields extracted.', date:new Date().toISOString(), source:'System' });
    if(data.warning) r.propertyNotes.push({ id:uid(), text:'Note: '+data.warning, date:new Date().toISOString(), source:'System' });

    container.innerHTML = '<div style="padding:12px;background:var(--success-light);border-radius:var(--radius);color:var(--success);font-size:.85rem;font-weight:500">✓ Import complete! '+data.fieldsFound+' fields extracted'+(data.parser==='ollama'?' using AI':' (basic)')+'. Check details sections below.</div>';

    return;

  } catch(e){
    console.log('Extension import error:', e);
    container.innerHTML = `<div class="import-dialog">
      <h3>Auto-import issue</h3>
      <p>${esc(e.message||'Could not complete the import.')}</p>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-primary btn-sm" onclick="autoImport('${recId}')">Retry</button>
        <button class="btn btn-secondary btn-sm" onclick="showManualEntry('${recId}')">Manual Entry</button>
      </div>
    </div>`;
  }
}

function parseListingHtml(html, url){
  const result = {};
  const notes = [];
  let fieldsFound = 0;
  const text = html.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ');

  // JSON-LD structured data
  const jsonLdMatches = html.match(/<script[^>]*type\s*=\s*["']application\/ld\+json["'][^>]*>([\s\S]*?)<\/script>/gi) || [];
  for(const m of jsonLdMatches){
    try {
      const jsonStr = m.replace(/<script[^>]*>/i,'').replace(/<\/script>/i,'');
      const j = JSON.parse(jsonStr);
      const items = Array.isArray(j) ? j : [j];
      for(const item of items){
        if(item.numberOfBedrooms) { result.bedrooms = String(item.numberOfBedrooms); fieldsFound++ }
        if(item.numberOfBathroomsTotal || item.numberOfBathrooms) { result.bathrooms = String(item.numberOfBathroomsTotal||item.numberOfBathrooms); fieldsFound++ }
        if(item.floorSize?.value) { result.sqft = String(item.floorSize.value).replace(/[^\d]/g,''); fieldsFound++ }
        if(item.numberOfRooms) notes.push('Total rooms: '+item.numberOfRooms);
        if(item.name) notes.push('Listing title: '+item.name);
        if(item.description) notes.push('Description: '+String(item.description).substring(0,500));
        if(item.offers?.price || item.price) { result.monthlyRent = String(item.offers?.price||item.price).replace(/[^\d.]/g,''); fieldsFound++ }
      }
    } catch(e){}
  }

  // Regex patterns
  const patterns = [
    [/(\d+)\s*(?:bed(?:room)?s?\b|bd\b|br\b)/i, 'bedrooms'],
    [/([\d.]+)\s*(?:bath(?:room)?s?\b|ba\b)/i, 'bathrooms'],
    [/([\d,]+)\s*(?:sq\.?\s*ft|sqft|square feet)/i, 'sqft'],
    [/\$\s*([\d,]+)\s*(?:\/\s*(?:mo|month)|per\s*month|\s*monthly)/i, 'monthlyRent'],
    [/(?:security\s*)?deposit[:\s]*\$\s*([\d,]+)/i, 'deposit'],
    [/(?:application|app)\s*fee[:\s]*\$\s*([\d,]+)/i, 'applicationFee'],
    [/(?:pet)\s*(?:deposit|fee)[:\s]*\$\s*([\d,]+)/i, 'petDeposit'],
    [/(?:pet)\s*rent[:\s]*\$\s*([\d,]+)/i, 'petRentMonthly'],
    [/(?:year|built)[:\s]*(\d{4})/i, 'yearBuilt'],
  ];
  patterns.forEach(([re, key]) => {
    if(!result[key]){ const m = text.match(re); if(m){ result[key] = m[1].replace(',',''); fieldsFound++ } }
  });

  // Amenity detection
  const amenityMap = {
    appliances: { 'Dishwasher':/dishwasher/i, 'Garbage Disposal':/garbage disposal/i, 'Microwave':/microwave/i, 'Refrigerator':/refrigerator|fridge/i },
    interiorFeatures: { 'Fireplace':/fireplace/i, 'Ceiling Fans':/ceiling fan/i, 'Walk-In Closets':/walk.?in closet/i, 'High Ceilings':/(?:high|vaulted|tall) ceiling/i, 'Stainless Steel Appliances':/stainless steel/i, 'Kitchen Island':/kitchen island/i, 'Pantry':/\bpantry\b/i, 'Open Floor Plan':/open (?:floor )?plan/i, 'Walk-In Shower':/walk.?in shower/i, 'Smart Thermostat':/smart thermostat|nest|ecobee/i },
    communityAmenities: { 'Gym/Fitness Center':/\b(?:gym|fitness center|workout)\b/i, 'Swimming Pool':/(?:community |shared )?(?:pool|swimming)/i, 'Dog Park':/dog park/i, 'Playground':/playground/i, 'Clubhouse':/clubhouse/i, 'Business Center':/business center/i, 'Package Lockers':/package (?:locker|room)/i, 'EV Charging':/ev charg|electric vehicle/i, 'Controlled Access/Gated':/(?:gated|controlled access|secure entry)/i, 'Elevator':/\belevator\b/i, 'On-Site Laundry':/(?:on.?site|shared|community) laundry/i, 'Trash Valet':/trash valet/i },
    outdoor: { 'Balcony':/\bbalcony\b/i, 'Patio':/\bpatio\b/i, 'Deck':/\bdeck\b/i },
    flooring: { 'Hardwood':/hardwood/i, 'Carpet':/\bcarpet/i, 'Tile':/\btile\b/i, 'Laminate':/laminate/i, 'Vinyl Plank':/vinyl/i },
    safetyFeatures: { 'Smoke Detectors':/smoke (?:detector|alarm)/i, 'Carbon Monoxide Detectors':/carbon monoxide|co detector/i, 'Gated Entry':/gated (?:entry|community|access)/i },
    utilitiesIncluded: { 'Water':/water included/i, 'Trash':/trash included/i, 'Internet/WiFi':/(?:internet|wifi|wi-fi) included/i },
  };
  for(const [field, checks] of Object.entries(amenityMap)){
    const found = [];
    for(const [label, re] of Object.entries(checks)){
      if(re.test(text)) found.push(label);
    }
    if(found.length){ result[field] = found; fieldsFound += found.length }
  }

  // Laundry
  if(!result.laundry){
    if(/in.?unit (?:washer|w\/d|laundry)/i.test(text)) result.laundry = 'In-Unit W/D';
    else if(/washer.?dryer hookup/i.test(text)) result.laundry = 'W/D Hookups';
    else if(/(?:shared|on.?site|community) laundry/i.test(text)) result.laundry = 'Shared/On-Site';
    if(result.laundry) fieldsFound++;
  }

  // AC
  if(!result.ac){
    if(/central (?:air|a\/c|ac)/i.test(text)) result.ac = 'Central A/C';
    else if(/window (?:unit|ac|a\/c)/i.test(text)) result.ac = 'Window Unit';
    else if(/mini.?split/i.test(text)) result.ac = 'Mini-Split';
    else if(/(?:evaporative|swamp) cool/i.test(text)) result.ac = 'Evaporative/Swamp Cooler';
    if(result.ac) fieldsFound++;
  }

  // Parking
  if(!result.parking){
    if(/(?:attached|2.car|1.car) garage/i.test(text)) result.parking = 'Attached Garage';
    else if(/(?:detached) garage/i.test(text)) result.parking = 'Detached Garage';
    else if(/carport/i.test(text)) result.parking = 'Carport';
    else if(/covered parking/i.test(text)) result.parking = 'Covered Parking';
    else if(/(?:assigned|reserved) (?:spot|space|parking)/i.test(text)) result.parking = 'Assigned Spot';
    if(result.parking) fieldsFound++;
  }

  // Pets
  if(!result.petsAllowed){
    if(/no pets/i.test(text)) result.petsAllowed = 'No Pets';
    else if(/(?:cats? and dogs?|pets? (?:allowed|welcome|ok|friendly))/i.test(text)) result.petsAllowed = 'Yes - All Pets';
    else if(/dogs? (?:allowed|welcome|ok)/i.test(text)) result.petsAllowed = 'Dogs Only';
    else if(/cats? (?:allowed|welcome|ok)/i.test(text)) result.petsAllowed = 'Cats Only';
    if(result.petsAllowed) fieldsFound++;
  }

  // Pool
  if(!result.pool){
    if(/(?:private|own) pool/i.test(text)) result.pool = 'Private';
    else if(/(?:community|shared) pool/i.test(text)) result.pool = 'Community/Shared';
    if(result.pool) fieldsFound++;
  }

  // Collect misc info for notes
  const rentSpecial = text.match(/(?:move.?in |rent )?special[:\s]+(.*?)(?:\.|$)/i);
  if(rentSpecial) notes.push('Move-in special: '+rentSpecial[1].trim().substring(0,200));
  const leaseMatch = text.match(/(?:lease|term)[:\s]*(\d+)\s*month/i);
  if(leaseMatch){ result.leaseTerm = leaseMatch[1]+' Months'; fieldsFound++ }

  return { details: result, notes, fieldsFound };
}

function applyParsedData(recId, parsed){
  const r = records.find(x => x.id === recId);
  if(!r) return;
  if(!r.propertyDetails) r.propertyDetails = {};
  if(!r.propertyNotes) r.propertyNotes = [];

  for(const [key, val] of Object.entries(parsed.details)){
    if(val && (!r.propertyDetails[key] || (Array.isArray(r.propertyDetails[key]) && r.propertyDetails[key].length === 0))){
      r.propertyDetails[key] = val;
    }
  }

  if(parsed.notes.length){
    const timestamp = new Date().toISOString();
    parsed.notes.forEach(n => {
      r.propertyNotes.push({ id:uid(), text:n, date:timestamp, source:'Auto-Import' });
    });
  }
  saveData();
}

function updateField(id, field, value){

  if(!r) return;
  const old = r[field];

    r.notes.push({ id:uid(), text:`Status changed: ${old} → ${value}`, date:new Date().toISOString(), type:'status' });
  }
  saveData();
  updateNotifBadges();
}

function getRteNestLevel(li){
  let depth = 0;
  let el = li.parentElement;
  while(el){
    if(el.tagName === 'UL' || el.tagName === 'OL') depth++;
    if(el.classList && el.classList.contains('rte-editor')) break;
    el = el.parentElement;
  }
  return depth;
}

function getPrevLiNestLevel(li){
  // Find the previous visible list item and return its nest level
  let prev = li.previousElementSibling;
  if(prev && (prev.tagName === 'LI')){
    return getRteNestLevel(prev);
  }
  // Check if there's a previous sibling that is a nested list
  const parentLi = li.parentElement?.closest('li');
  if(parentLi) return getRteNestLevel(parentLi);
  return 0;
}

function handleRteKeydown(event, recId){
  const ed = event.target.closest('.rte-editor');
  if(!ed) return;
  const editorId = ed.id;

  // Shift+Enter = save
  if(event.shiftKey && event.key === 'Enter'){
    event.preventDefault();
    if(editorId.startsWith('editNoteRte_')){
      // Extract recId and noteId from id: editNoteRte_{recId}_{noteId}
      const parts = editorId.replace('editNoteRte_','').split('_');
      const rId = parts[0];
      const nId = parts.slice(1).join('_');
      saveEditNote(rId, nId);
    } else {
      addNote(recId);
    }
    return;
  }

  // Tab / Shift+Tab for nesting
  if(event.key === 'Tab'){
    const sel = window.getSelection();
    if(!sel.rangeCount) return;
    const li = sel.anchorNode?.nodeType === 3 ? sel.anchorNode.parentElement?.closest('li') : sel.anchorNode?.closest?.('li');
    if(!li) return; // not inside a list item, do nothing special

    event.preventDefault();

    if(event.shiftKey){
      // Outdent
      document.execCommand('outdent', false, null);
    } else {
      // Indent — enforce max 4 levels and +1 constraint
      const currentLevel = getRteNestLevel(li);
      if(currentLevel >= 4) return; // max 4 levels

      // +1 constraint: can only nest 1 deeper than the item above
      const prevLi = li.previousElementSibling;
      if(prevLi && prevLi.tagName === 'LI'){
        const prevLevel = getRteNestLevel(prevLi);
        if(currentLevel >= prevLevel + 1) return; // can't go deeper than prev+1
      } else if(!li.parentElement?.closest('li') && currentLevel >= 1){
        // first item in the list, don't let it nest
        return;
      }

      document.execCommand('indent', false, null);
    }
    return;
  }

  // Update toolbar active states on key events
  setTimeout(() => updateRteToolbar(editorId), 10);
}

// Update toolbar on selection changes within editors
document.addEventListener('selectionchange', function(){
  const sel = window.getSelection();
  if(!sel.rangeCount) return;
  const ed = sel.anchorNode?.nodeType === 3 ? sel.anchorNode.parentElement?.closest('.rte-editor') : sel.anchorNode?.closest?.('.rte-editor');
  if(ed && ed.id) updateRteToolbar(ed.id);
});
