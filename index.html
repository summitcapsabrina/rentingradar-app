window.addEventListener('popstate', function(e){
  const state = e.state;
  if(!state){
    // No state — fallback to dashboard
    _handlingPopstate = true;
    switchView('dashboard');
    _handlingPopstate = false;
    return;
  }
  // Before navigating away, save current profile tab/scroll into the CURRENT history entry
  if(currentView === 'profile' && currentProfileId){
    const scrollContainer = document.querySelector('.content');
    const savedScrolls = Object.assign({}, tabScrollPositions);
    if(scrollContainer && profileActiveTab) savedScrolls[profileActiveTab] = scrollContainer.scrollTop;
    try {
      history.replaceState(Object.assign({}, history.state, { _profileTab: profileActiveTab, _tabScrolls: savedScrolls }), '');
    } catch(ex){}
  }
  _handlingPopstate = true;
  try {
    if(state.view === 'profile' && state.profileId){
      const r = records.find(x => x.id === state.profileId);
      if(r){
        // Restore saved tab and scroll positions from history state
        if(state._profileTab){
          profileActiveTab = state._profileTab;
          Object.keys(tabScrollPositions).forEach(k => delete tabScrollPositions[k]);
          if(state._tabScrolls) Object.assign(tabScrollPositions, state._tabScrolls);
        }
        previousView = state.previousView || 'dashboard';
        currentProfileId = state.profileId;
        currentView = 'profile';
        document.getElementById('searchAutocomplete')?.classList.remove('visible');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('headerTitle').textContent = 'Property Profile';
        saveViewState();
        render();
        // Restore scroll position for the active tab
        const scrollContainer = document.querySelector('.content');
        if(scrollContainer && state._profileTab && tabScrollPositions[state._profileTab] !== undefined){
          requestAnimationFrame(() => { scrollContainer.scrollTop = tabScrollPositions[state._profileTab]; });
        } else {
          window.scrollTo(0,0);
        }
      } else {
        switchView('dashboard');
      }
    } else if(state.view){
      currentView = state.view;
      currentProfileId = null;
      clearSearch();
      document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === state.view));

function confirmExportProfile(recId){
  const r = records.find(x => x.id === recId);

  const pd = r.propertyDetails || {};
  const v = calcComputeAll(r);
  const comps = (r.details && r.details.comps) ? r.details.comps : [];

  // ── Check for incomplete data ──
  const warnings = [];

  // Property Analysis tab: comparable properties
  if(comps.length === 0){
    warnings.push('No comparable properties added — the Competitor Analysis section will be empty');
  } else if(comps.length < 3){
    warnings.push('Only ' + comps.length + ' comparable propert' + (comps.length === 1 ? 'y' : 'ies') + ' added — revenue projections require at least 3');
  }

  // Revenue projections
  if(!v.hasProjectionData){
    warnings.push('Revenue projections are unavailable — Definite, Best-Case, and Worst-Case fields will be blank');
  }

  // Expenses tab: key fields for calculations
  const missingExpense = [];
  if(!parseFloat(pd.monthlyRent)) missingExpense.push('Monthly Rent');
  if(!parseInt(pd.bedrooms)) missingExpense.push('Bedrooms');
  if(!v.totalInvested) missingExpense.push('Investment Details');
  if(!v.totalMonthlyExp) missingExpense.push('Monthly Expenses');
  if(missingExpense.length > 0){
    warnings.push('Missing expense data (' + missingExpense.join(', ') + ') — some calculations in the Expenses tab will show as $0');
  }

  if(warnings.length > 0){
    // Show warning with option to proceed or cancel
    const warningHtml = '<span style="color:var(--warning,#d29922);font-weight:600">This export has incomplete data:</span><br><br>' +
      '<ul style="text-align:left;font-size:.84rem;color:var(--text2);margin:0 0 12px;padding-left:20px;line-height:1.7">' +

  function cleanHtml(str){ return (str||'').replace(/<[^>]+>/g,' ').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim(); }

function _buildDesignAmenities(pd){
  const parts = [];
  if(pd.furnished) parts.push(pd.furnished);
  if(pd.view && pd.view !== 'None') parts.push(pd.view + ' View');
  if(pd.architecturalStyle) parts.push(pd.architecturalStyle + ' Style');
  if(pd.flooring && pd.flooring.length) parts.push('Flooring: ' + pd.flooring.join(', '));
  if(pd.pool && pd.pool !== 'None') parts.push('Pool: ' + pd.pool);
  if(pd.hotTub && pd.hotTub !== 'None') parts.push('Hot Tub: ' + pd.hotTub);
  if(pd.outdoor && pd.outdoor.length) parts.push(pd.outdoor.join(', '));
  if(pd.interiorFeatures && pd.interiorFeatures.length) parts.push(pd.interiorFeatures.slice(0,5).join(', '));
  if(pd.communityAmenities && pd.communityAmenities.length) parts.push(pd.communityAmenities.slice(0,5).join(', '));
  return parts.join(' · ') || '';
}

function _buildWhyNarrative(r, v, comps, hasProj, realisticRev, optimisticRev, pessimisticRev){
  if(!hasProj || comps.length < 3) return 'Insufficient competitor data to generate revenue projections. Add at least 3 competitors with revenue data in the Competitor Analysis tab to enable projections.';
  const pd = r.propertyDetails || {};
  const br = parseInt(pd.bedrooms) || 0;
  const rateComps = comps.filter(function(x){ return parseFloat(x.nightlyRate) > 0; });
  const avgRate = rateComps.length > 0 ? rateComps.reduce(function(s,x){return s+parseFloat(x.nightlyRate);},0)/rateComps.length : 0;
  const occComps = comps.filter(function(x){ return parseFloat(x.occupancy) > 0; });
  const avgOcc = occComps.length > 0 ? occComps.reduce(function(s,x){return s+parseFloat(x.occupancy);},0)/occComps.length : 0;
  const losesN = v.losesCount || 0;
  const competesN = v.competesCount || 0;
  const beatsN = v.beatsCount || 0;
  const total = losesN + competesN + beatsN;
  const posLabel = v.positionScore >= 0.5 ? 'strong' : v.positionScore >= 0.15 ? 'favorable' : v.positionScore >= -0.15 ? 'neutral' : v.positionScore >= -0.5 ? 'challenging' : 'weak';

  let text = 'Revenue projections are derived from ' + total + ' comparable properties analyzed in the local market.';
  text += ' The average nightly rate across comparables is $' + avgRate.toFixed(2) + ' with an average occupancy rate of ' + Math.round(avgOcc) + '%.';
  text += ' This property\'s competitive position is rated as ' + posLabel + ' (score: ' + (v.positionScore >= 0 ? '+' : '') + v.positionScore.toFixed(2) + '), where it beats ' + beatsN + ', competes with ' + competesN + ', and loses to ' + losesN + ' comparable' + (losesN !== 1 ? 's' : '') + '.';
  text += '\n\nDefinite (Realistic) projection of $' + realisticRev.toLocaleString() + '/yr applies weighted directional multipliers (Loses ×0.85, Competes ×1.00, Beats ×1.15) to competitor revenue data.';
  text += ' Best-Case (Optimistic) of $' + optimisticRev.toLocaleString() + '/yr uses higher multipliers (×0.95/×1.10/×1.25) reflecting stronger-than-expected performance.';
  text += ' Worst-Case (Pessimistic) of $' + pessimisticRev.toLocaleString() + '/yr uses conservative multipliers (×0.75/×0.90/×1.05) accounting for underperformance risk.';
  if(br) text += ' The property has ' + br + ' bedroom' + (br !== 1 ? 's' : '') + (pd.bathrooms ? ' and ' + pd.bathrooms + ' bathroom' + (parseFloat(pd.bathrooms) !== 1 ? 's' : '') : '') + '.';
  if(pd.monthlyRent) text += ' At an asking rent of $' + Math.round(parseFloat(pd.monthlyRent)).toLocaleString() + '/mo, the spread between projected revenue and total costs will determine deal viability.';
  return text;
}
