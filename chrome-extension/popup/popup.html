<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RentingRadar</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="rr-header">
    <div class="rr-brand">
      <img src="../icons/icon-32.png" alt="" width="24" height="24" />
      <span class="rr-brand-name">RentingRadar</span>
    </div>
  </header>

  <main class="rr-main">
    <section class="rr-state">
      <!-- AI / Extension status bar -->
      <div class="rr-ai-status" id="rrAiStatus">
        <span class="rr-ai-status-text" id="rrAiStatusText">Checking status…</span>
        <button class="rr-btn rr-btn-sm rr-btn-ghost" id="rrAiTestBtn">Test</button>
      </div>

      <label class="rr-label" for="rrUrlInput">Paste a property listing link</label>
      <div class="rr-input-row">
        <input
          type="url"
          id="rrUrlInput"
          class="rr-input"
          placeholder="Paste listing link here..."
          autocomplete="off"
          spellcheck="false"
        />
        <button class="rr-btn rr-btn-primary" id="rrBtnImport">Import</button>
      </div>
      <p class="rr-hint">
        Auto-fills Property Details for the currently open property in your CRM.
        For AirDNA competitor imports, use the paste box inside the Competitor Analysis tab.
      </p>

      <div class="rr-status" id="rrStatus" hidden></div>

      <div class="rr-recent" id="rrRecent" hidden>
        <div class="rr-recent-header">Recent imports</div>
        <ul class="rr-recent-list" id="rrRecentList"></ul>
      </div>
    </section>
  </main>

  <footer class="rr-footer">
    <a href="https://rentingradar.com/terms.html" target="_blank" rel="noopener">Terms</a>
    <span class="rr-sep">·</span>
    <a href="https://rentingradar.com/privacy.html" target="_blank" rel="noopener">Privacy</a>
    <span class="rr-sep">·</span>
    <a href="https://app.rentingradar.com" target="_blank" rel="noopener">Open CRM</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
